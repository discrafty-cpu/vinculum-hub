<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Geometry Viewer — VINCULUM Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e1a; --bg2: #111827; --card: #1a2236; --card-hover: #1f2a42;
  --border: #2a3654; --text: #e8edf5; --muted: #8b9cc0; --dim: #5a6b8f;
  --cyan: #00d4ff; --purple: #b388ff; --green: #00e676; --pink: #ff3b8b;
  --yellow: #ffc107; --orange: #ff9100;
  --grad: linear-gradient(135deg, #00d4ff, #b388ff);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header a { color:var(--cyan); text-decoration:none; font-size:14px; display:flex; align-items:center; gap:6px; transition:color 0.2s; }
.header a:hover { color:var(--purple); }
.header h1 { font-size:20px; font-weight:700; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* Container */
.container { max-width:1100px; margin:0 auto; padding:24px; }

/* Grade Filter */
.grade-filter { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
.grade-btn { padding:8px 18px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.grade-btn:hover { border-color:var(--cyan); color:var(--text); }
.grade-btn.active { background:var(--grad); color:#0a0e1a; border-color:transparent; }

/* Topic Cards */
.topics-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px; margin-bottom:28px; }
.topic-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; transition:all 0.25s; cursor:default; }
.topic-card:hover { border-color:var(--cyan); background:var(--card-hover); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,255,0.08); }
.topic-card.hidden { display:none; }
.tc-top { display:flex; align-items:flex-start; gap:14px; margin-bottom:12px; }
.tc-icon { width:44px; height:44px; border-radius:10px; background:rgba(0,212,255,0.12); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.tc-title { font-size:16px; font-weight:700; margin-bottom:2px; }
.tc-grades { font-size:11px; color:var(--muted); }
.tc-desc { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:10px; }
.tc-formulas { font-size:12px; color:var(--cyan); font-family:'JetBrains Mono',monospace; margin-bottom:10px; display:flex; flex-wrap:wrap; gap:6px 14px; }
.tc-standards { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:14px; }
.std-badge { font-size:10px; padding:3px 7px; border-radius:4px; background:rgba(179,136,255,0.15); color:var(--purple); border:1px solid rgba(179,136,255,0.2); }
.tc-actions { display:flex; gap:8px; }
.btn { padding:8px 16px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
.btn-3d { background:var(--grad); color:#0a0e1a; }
.btn-3d:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,212,255,0.3); }
.btn-print { background:rgba(0,230,118,0.12); color:var(--green); border:1px solid rgba(0,230,118,0.25); }
.btn-print:hover { background:rgba(0,230,118,0.2); }

/* 3D Viewer Panel */
.viewer-panel { max-height:0; overflow:hidden; transition:max-height 0.5s ease, opacity 0.3s ease; opacity:0; margin-bottom:20px; border-radius:12px; border:1px solid var(--border); background:var(--card); }
.viewer-panel.open { max-height:85vh; opacity:1; }
.viewer-header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:linear-gradient(135deg,#1E2761,#2D3A8C); border-radius:12px 12px 0 0; }
.viewer-header h3 { color:#fff; font-size:15px; font-weight:600; }
.viewer-close { background:rgba(255,255,255,0.15); border:none; color:#fff; width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:18px; transition:background 0.2s; }
.viewer-close:hover { background:rgba(255,255,255,0.25); }
.viewer-frame { width:100%; height:80vh; border:none; display:block; }
.viewer-loading { display:flex; align-items:center; justify-content:center; height:80vh; background:#0f1629; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Print Options Panel */
.print-panel { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; display:none; }
.print-panel.open { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.print-panel h3 { font-size:15px; font-weight:700; margin-bottom:16px; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.print-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
.print-label { font-size:13px; color:var(--muted); min-width:90px; font-weight:600; }
.grid-btn { padding:6px 14px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.grid-btn:hover { border-color:var(--cyan); color:var(--text); }
.grid-btn.active { background:var(--cyan); color:#0a0e1a; border-color:var(--cyan); }
.chk-label { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text); cursor:pointer; }
.chk-label input { accent-color:var(--cyan); }
.dok-dot { display:inline-block; width:10px; height:10px; border-radius:50%; }
.dok1 { background:var(--green); }
.dok2 { background:var(--cyan); }
.dok3 { background:var(--pink); }
.btn-generate { padding:12px 28px; background:var(--grad); color:#0a0e1a; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; margin-top:8px; }
.btn-generate:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,212,255,0.3); }

/* Section label */
.section-label { font-size:11px; letter-spacing:0.08em; color:var(--dim); font-weight:700; text-transform:uppercase; margin-bottom:12px; }

@media (max-width:600px) {
  .topics-grid { grid-template-columns:1fr; }
  .tc-actions { flex-direction:column; }
  .btn { width:100%; justify-content:center; }
}
</style>
</head>
<body>

<div class="header">
  <a href="VINCULUM-Hub.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Hub</a>
  <h1>3D Geometry Viewer</h1>
</div>

<div class="container">
  <div class="grade-filter" id="gradeFilter"></div>
  <div class="section-label">GEOMETRY TOPICS</div>
  <div class="topics-grid" id="topicsGrid"></div>

  <div class="viewer-panel" id="viewerPanel">
    <div class="viewer-header">
      <h3 id="viewerTitle">3D Geometry Explorer</h3>
      <button class="viewer-close" onclick="closeViewer()">&times;</button>
    </div>
    <div id="viewerBody">
      <div class="viewer-loading" id="viewerLoading"><div class="spinner"></div></div>
      <iframe class="viewer-frame" id="viewerFrame" src="" allow="fullscreen" style="display:none;"></iframe>
    </div>
  </div>

  <div class="print-panel" id="printPanel">
    <h3 id="printTitle">Print: Pythagorean Theorem</h3>
    <div class="print-row">
      <span class="print-label">Grid Density</span>
      <button class="grid-btn" onclick="setGrid(4)" data-grid="4">4 / page</button>
      <button class="grid-btn active" onclick="setGrid(6)" data-grid="6">6 / page</button>
      <button class="grid-btn" onclick="setGrid(8)" data-grid="8">8 / page</button>
      <button class="grid-btn" onclick="setGrid(10)" data-grid="10">10 / page</button>
    </div>
    <div class="print-row">
      <span class="print-label">Include</span>
      <label class="chk-label"><input type="checkbox" id="chkRef" checked> Reference Sheet</label>
      <label class="chk-label"><input type="checkbox" id="chkKey" checked> Answer Key</label>
    </div>
    <div class="print-row">
      <span class="print-label">DOK Levels</span>
      <label class="chk-label"><input type="checkbox" id="chkD1" checked> <span class="dok-dot dok1"></span> DOK 1</label>
      <label class="chk-label"><input type="checkbox" id="chkD2" checked> <span class="dok-dot dok2"></span> DOK 2</label>
      <label class="chk-label"><input type="checkbox" id="chkD3" checked> <span class="dok-dot dok3"></span> DOK 3</label>
    </div>
    <button class="btn-generate" onclick="generatePDF()">Generate PDF</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

      {stem:'State the Pythagorean Theorem.', answer:'a² + b² = c², where c is the hypotenuse.', hint:'The theorem relates the three sides of a right triangle.'},

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let state = {
  gradeFilter: 'all',
  viewerOpen: false,
  viewerTopic: null,
  printTopic: null,
  gridDensity: 6
};

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function init() {
  renderGradeFilter();
  renderTopics();
}

function renderGradeFilter() {
  const grades = ['all', '6', '7', '8', '10'];
  const labels = { all:'All Grades', '6':'Grade 6', '7':'Grade 7', '8':'Grade 8', '10':'Grade 10' };
  document.getElementById('gradeFilter').innerHTML = grades.map(g =>
    `<button class="grade-btn ${state.gradeFilter===g?'active':''}" onclick="filterGrade('${g}')">${labels[g]}</button>`
  ).join('');
}

function filterGrade(g) {
  state.gradeFilter = g;
  renderGradeFilter();
  renderTopics();
}

function renderTopics() {
  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = TOPICS.map(t => {
    const show = state.gradeFilter === 'all' || t.grades.some(g => String(g) === state.gradeFilter);
    const gradeStr = t.grades.length > 1 ? `Grades ${t.grades.join(', ')}` : `Grade ${t.grades[0]}`;
    const probCount = PROBLEMS[t.id] ? Object.values(PROBLEMS[t.id]).reduce((s,a) => s+a.length, 0) : 0;
    return `
      <div class="topic-card ${show?'':'hidden'}">
        <div class="tc-top">
          <div class="tc-icon">${t.icon}</div>
          <div>
            <div class="tc-title">${t.name}</div>
            <div class="tc-grades">${gradeStr} · ${probCount} problems</div>
          </div>
        </div>
        <div class="tc-desc">${t.desc}</div>
        <div class="tc-formulas">${t.formulas.map(f => `<span>${f}</span>`).join('')}</div>
        <div class="tc-standards">${t.standards.map(s => `<span class="std-badge">${s}</span>`).join('')}</div>
        <div class="tc-actions">
          <button class="btn btn-3d" onclick="launch3D('${t.id}')">Launch 3D</button>
          <button class="btn btn-print" onclick="openPrint('${t.id}')">Print Problems</button>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  3D VIEWER
// ═══════════════════════════════════════════════════════════
function launch3D(topicId) {
  const topic = TOPICS.find(t => t.id === topicId);
  const panel = document.getElementById('viewerPanel');
  const frame = document.getElementById('viewerFrame');
  const loading = document.getElementById('viewerLoading');
  const title = document.getElementById('viewerTitle');

  if (state.viewerOpen && state.viewerTopic === topicId) { closeViewer(); return; }

  title.textContent = topic ? topic.name + ' — 3D Explorer' : '3D Explorer';
  loading.style.display = 'flex';
  frame.style.display = 'none';
  frame.src = 'https://discrafty-cpu.github.io/vinculum-3d-graphing-solution/';
  frame.onload = () => { loading.style.display = 'none'; frame.style.display = 'block'; };

  panel.classList.add('open');
  state.viewerOpen = true;
  state.viewerTopic = topicId;
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeViewer() {
  const panel = document.getElementById('viewerPanel');
  const frame = document.getElementById('viewerFrame');
  panel.classList.remove('open');
  state.viewerOpen = false;
  state.viewerTopic = null;
  setTimeout(() => { frame.src = ''; }, 500);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.viewerOpen) closeViewer(); });

// ═══════════════════════════════════════════════════════════
//  PRINT PANEL
// ═══════════════════════════════════════════════════════════
function openPrint(topicId) {
  const topic = TOPICS.find(t => t.id === topicId);
  const panel = document.getElementById('printPanel');
  const title = document.getElementById('printTitle');

  if (state.printTopic === topicId && panel.classList.contains('open')) {
    panel.classList.remove('open'); state.printTopic = null; return;
  }

  title.textContent = 'Print: ' + topic.name;
  state.printTopic = topicId;
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setGrid(n) {
  state.gridDensity = n;
  document.querySelectorAll('.grid-btn').forEach(b => b.classList.toggle('active', b.dataset.grid == n));
}

// ═══════════════════════════════════════════════════════════
//  PDF GENERATION
// ═══════════════════════════════════════════════════════════
function generatePDF() {
  const topic = TOPICS.find(t => t.id === state.printTopic);
  if (!topic) return alert('Select a topic first.');
  const probs = PROBLEMS[topic.id];
  if (!probs) return alert('No problems available for this topic.');

  const includeRef = document.getElementById('chkRef').checked;
  const includeKey = document.getElementById('chkKey').checked;
  const dokFilter = [];
  if (document.getElementById('chkD1').checked) dokFilter.push('dok1');
  if (document.getElementById('chkD2').checked) dokFilter.push('dok2');
  if (document.getElementById('chkD3').checked) dokFilter.push('dok3');

  // Collect filtered problems
  let allProbs = [];
  dokFilter.forEach(dk => {
    const level = dk === 'dok1' ? 1 : dk === 'dok2' ? 2 : 3;
    (probs[dk] || []).forEach(p => allProbs.push({ ...p, dok: level }));
  });

  if (allProbs.length === 0) return alert('No problems match the selected DOK levels.');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'pt', format: 'letter' });
  const W = 612, H = 792, M = 45, CW = W - 2*M;

  // ── Reference Sheet ──
  if (includeRef) {
    // Header bar
    pdf.setFillColor(30, 39, 97);
    pdf.rect(0, 0, W, 70, 'F');
    pdf.setFillColor(0, 212, 255);
    pdf.rect(0, 68, W, 3, 'F');
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(22);
    pdf.setTextColor(255, 255, 255);
    pdf.text(topic.icon + '  ' + topic.name, M, 42);
    pdf.setFontSize(10);
    pdf.setTextColor(200, 220, 255);
    pdf.text(topic.grades.map(g => 'Grade ' + g).join(' · ') + '  |  ' + topic.standards.join(' · '), M, 58);

    let y = 95;

    // Key Concepts
    pdf.setFontSize(13);
    pdf.setTextColor(30, 39, 97);
    pdf.setFont('helvetica', 'bold');
    pdf.text('KEY CONCEPTS', M, y); y += 18;
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(11);
    pdf.setTextColor(50, 50, 50);
    const descLines = pdf.splitTextToSize(topic.desc, CW);
    pdf.text(descLines, M, y); y += descLines.length * 14 + 12;

    // Formulas
    pdf.setFillColor(240, 245, 255);
    pdf.roundedRect(M, y, CW, 20 + topic.formulas.length * 18, 6, 6, 'F');
    y += 14;
    pdf.setFontSize(12);
    pdf.setTextColor(30, 39, 97);
    pdf.setFont('helvetica', 'bold');
    pdf.text('FORMULAS', M + 12, y); y += 16;
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(12);
    pdf.setTextColor(40, 40, 40);
    topic.formulas.forEach(f => { pdf.text('•  ' + f, M + 16, y); y += 18; });
    y += 12;

    // Vocabulary
    pdf.setFontSize(13);
    pdf.setTextColor(30, 39, 97);
    pdf.setFont('helvetica', 'bold');
    pdf.text('VOCABULARY', M, y); y += 16;
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(11);
    pdf.setTextColor(50, 50, 50);
    const vocabStr = topic.vocab.join('  •  ');
    const vocabLines = pdf.splitTextToSize(vocabStr, CW);
    pdf.text(vocabLines, M, y); y += vocabLines.length * 14 + 16;

    // Worked Example
    if (allProbs.length > 0) {
      const ex = allProbs[0];
      pdf.setFillColor(248, 250, 252);
      pdf.setDrawColor(0, 212, 255);
      pdf.setLineWidth(2);
      const exH = 90;
      pdf.roundedRect(M, y, CW, exH, 6, 6, 'FD');
      y += 16;
      pdf.setFontSize(12);
      pdf.setTextColor(30, 39, 97);
      pdf.setFont('helvetica', 'bold');
      pdf.text('WORKED EXAMPLE (DOK ' + ex.dok + ')', M + 12, y); y += 16;
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(10);
      pdf.setTextColor(40, 40, 40);
      const stemLines = pdf.splitTextToSize(ex.stem, CW - 24);
      pdf.text(stemLines, M + 12, y); y += stemLines.length * 13 + 8;
      pdf.setTextColor(13, 148, 136);
      pdf.setFont('helvetica', 'bold');
      const ansLines = pdf.splitTextToSize('Answer: ' + ex.answer, CW - 24);
      pdf.text(ansLines, M + 12, y);
      y += ansLines.length * 13 + 20;
    }

    // Explore directions
    y += 10;
    pdf.setFontSize(13);
    pdf.setTextColor(30, 39, 97);
    pdf.setFont('helvetica', 'bold');
    pdf.text('EXPLORE IN 3D', M, y); y += 16;
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(10);
    pdf.setTextColor(80, 80, 80);
    pdf.text('Visit the VINCULUM 3D Geometry Viewer to interact with these shapes.', M, y); y += 14;
    pdf.text('Rotate, zoom, and measure — build intuition before solving problems.', M, y);

    // Footer
    pdf.setFontSize(8);
    pdf.setTextColor(150, 150, 150);
    pdf.text('VINCULUM Math Solutions  |  3D Geometry  |  Reference Sheet', M, H - 25);

    if (allProbs.length > 0) pdf.addPage();
  }

  // ── Problem Grid Pages ──
  const density = state.gridDensity;
  const cols = 2;
  const rows = density / cols;
  const cellW = (CW - 10) / cols;
  const cellH = (H - 120) / rows;
  const dokColors = { 1: [0, 230, 118], 2: [0, 212, 255], 3: [255, 59, 139] };
  const dokLabels = { 1: 'DOK 1', 2: 'DOK 2', 3: 'DOK 3' };

  // Skip first problem if it was used as worked example
  const gridProbs = includeRef && allProbs.length > 1 ? allProbs.slice(1) : allProbs;
  const totalPages = Math.ceil(gridProbs.length / density);

  for (let page = 0; page < totalPages; page++) {
    if (page > 0 || includeRef) { if (page > 0) pdf.addPage(); }

    // Page header
    pdf.setFillColor(30, 39, 97);
    pdf.rect(0, 0, W, 50, 'F');
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(14);
    pdf.setTextColor(255, 255, 255);
    pdf.text(topic.name + ' — Practice Problems', M, 32);
    pdf.setFontSize(9);
    pdf.setTextColor(200, 220, 255);
    pdf.text('Page ' + (page + 1) + ' of ' + totalPages + '  |  ' + density + ' problems/page', W - M - 140, 32);

    const startIdx = page * density;
    for (let i = 0; i < density; i++) {
      const pIdx = startIdx + i;
      if (pIdx >= gridProbs.length) break;
      const prob = gridProbs[pIdx];

      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = M + col * (cellW + 10);
      const y = 65 + row * cellH;

      // Cell background
      pdf.setFillColor(248, 250, 252);
      pdf.setDrawColor(200, 210, 225);
      pdf.setLineWidth(0.5);
      pdf.roundedRect(x, y, cellW, cellH - 6, 4, 4, 'FD');

      // DOK badge
      const dc = dokColors[prob.dok] || [100, 100, 100];
      pdf.setFillColor(dc[0], dc[1], dc[2]);
      pdf.roundedRect(x + cellW - 42, y + 4, 38, 14, 3, 3, 'F');
      pdf.setFontSize(7);
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.text(dokLabels[prob.dok], x + cellW - 38, y + 13);

      // Problem number
      pdf.setFillColor(30, 39, 97);
      pdf.circle(x + 14, y + 14, 9, 'F');
      pdf.setFontSize(9);
      pdf.setTextColor(255, 255, 255);
      pdf.text(String(pIdx + 1), x + 14 - (pIdx + 1 > 9 ? 5 : 3), y + 17);

      // Stem text
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(9);
      pdf.setTextColor(30, 30, 30);
      const stemLines = pdf.splitTextToSize(prob.stem, cellW - 30);
      const maxStemLines = Math.min(stemLines.length, Math.floor((cellH - 60) / 12));
      pdf.text(stemLines.slice(0, maxStemLines), x + 10, y + 34);

      // Workspace lines
      const linesStart = y + 34 + maxStemLines * 12 + 8;
      const linesEnd = y + cellH - 14;
      pdf.setDrawColor(220, 225, 235);
      pdf.setLineWidth(0.3);
      for (let ly = linesStart; ly < linesEnd; ly += 14) {
        pdf.line(x + 10, ly, x + cellW - 10, ly);
      }
    }

    // Footer
    pdf.setFontSize(7);
    pdf.setTextColor(150, 150, 150);
    pdf.text('VINCULUM Math Solutions  |  3D Geometry', M, H - 20);
    pdf.text('Name: ___________________________  Date: __________', W - M - 220, H - 20);
  }

  // ── Answer Key ──
  if (includeKey && gridProbs.length > 0) {
    pdf.addPage();
    pdf.setFillColor(30, 39, 97);
    pdf.rect(0, 0, W, 50, 'F');
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(14);
    pdf.setTextColor(255, 255, 255);
    pdf.text(topic.name + ' — Answer Key', M, 32);

    let y = 75;
    pdf.setFontSize(9);
    gridProbs.forEach((prob, i) => {
      if (y > H - 60) { pdf.addPage(); y = 50; }
      pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(30, 39, 97);
      pdf.text((i + 1) + '.', M, y);
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(80, 80, 80);
      const truncStem = prob.stem.length > 60 ? prob.stem.substring(0, 57) + '...' : prob.stem;
      pdf.text(truncStem, M + 18, y);
      y += 13;
      pdf.setTextColor(13, 148, 136);
      pdf.setFont('helvetica', 'bold');
      const ansLines = pdf.splitTextToSize(prob.answer, CW - 18);
      pdf.text(ansLines, M + 18, y);
      y += ansLines.length * 12 + 8;
    });

    pdf.setFontSize(7);
    pdf.setTextColor(150, 150, 150);
    pdf.text('VINCULUM Math Solutions  |  Answer Key', M, H - 20);
  }

  pdf.save(topic.id + '-worksheet.pdf');
}

// Init
document.addEventListener('DOMContentLoaded', init);
</script>
