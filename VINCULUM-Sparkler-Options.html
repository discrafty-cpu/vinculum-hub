<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Sparkler Logo Options</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

/* ═══ VINCULUM THEME SYSTEM ═══ */
:root, [data-theme="dark"] {
  --bg:#0a0e1a;--bg2:#111827;--card:#1a2236;--card2:#1f2a42;
  --border:#2a3654;--text:#e8edf5;--text2:#8b9cc0;--muted:#5a6b8f;
  --cyan:#00d4ff;--pink:#ff3b8b;--yellow:#ffc107;--green:#00e676;
  --purple:#b388ff;--orange:#ff9100;
  --grad:linear-gradient(135deg,#00d4ff,#b388ff);
  --spark1:#00d4ff;--spark2:#b388ff;
}
[data-theme="bright"] {
  --bg:#f0f2f5;--bg2:#ffffff;--card:#ffffff;--card2:#f0f4ff;
  --border:#d8dde8;--text:#1a1f2e;--text2:#4a5568;--muted:#8895a7;
  --cyan:#0094cc;--pink:#d6296e;--yellow:#c79400;--green:#00a858;
  --purple:#7c4dff;--orange:#d47600;
  --grad:linear-gradient(135deg,#0094cc,#7c4dff);
  --spark1:#0094cc;--spark2:#7c4dff;
}
[data-theme="redlaser"] {
  --bg:#0c0508;--bg2:#150a10;--card:#1e0f18;--card2:#2a1422;
  --border:#3d1a2e;--text:#f5e0e8;--text2:#c08a9d;--muted:#7a4d62;
  --cyan:#ff2d55;--pink:#ff6b8a;--yellow:#ff9500;--green:#00e676;
  --purple:#ff4081;--orange:#ff6e40;
  --grad:linear-gradient(135deg,#ff2d55,#ff6e40);
  --spark1:#ff2d55;--spark2:#ff6e40;
}
[data-theme="storm"] {
  --bg:#040812;--bg2:#0a1628;--card:#0f1f3d;--card2:#152a4f;
  --border:#1e3a6e;--text:#d4e4ff;--text2:#7aa0d4;--muted:#4a6a9a;
  --cyan:#00e5ff;--pink:#7c4dff;--yellow:#ffea00;--green:#76ff03;
  --purple:#e040fb;--orange:#ff9100;
  --grad:linear-gradient(135deg,#00e5ff,#ffea00);
  --spark1:#00e5ff;--spark2:#ffea00;
}
[data-theme="frost"] {
  --bg:#dce8f4;--bg2:#e8f2fc;--card:rgba(255,255,255,0.55);--card2:rgba(220,235,250,0.6);
  --border:rgba(160,200,230,0.5);--text:#0c2840;--text2:#2a5580;--muted:#5a8ab0;
  --cyan:#0077bb;--pink:#8844aa;--yellow:#aa7700;--green:#007755;
  --purple:#5533bb;--orange:#cc6600;
  --grad:linear-gradient(135deg,#4db8e8,#88ccff);
  --spark1:#4db8e8;--spark2:#88ccff;
}
[data-theme="emerald"] {
  --bg:#060e08;--bg2:#0c1a10;--card:#142618;--card2:#1c3222;
  --border:#2a4a32;--text:#e0f0e4;--text2:#90b898;--muted:#5a8a64;
  --cyan:#00e676;--pink:#ffab40;--yellow:#ffd740;--green:#69f0ae;
  --purple:#b2ff59;--orange:#ffab40;
  --grad:linear-gradient(135deg,#00e676,#ffd740);
  --spark1:#00e676;--spark2:#ffd740;
}
[data-theme="sunset"] {
  --bg:#0e0808;--bg2:#1a0f0f;--card:#261818;--card2:#332020;
  --border:#4a2828;--text:#f5e8e0;--text2:#c8a090;--muted:#8a6050;
  --cyan:#ff6b35;--pink:#ff2e63;--yellow:#ffc107;--green:#00e676;
  --purple:#ff9ff3;--orange:#ff9f43;
  --grad:linear-gradient(135deg,#ff6b35,#ff2e63);
  --spark1:#ff6b35;--spark2:#ff2e63;
}
[data-theme="spartan"] {
  --bg:#1a1014;--bg2:#241820;--card:#2e2028;--card2:#382830;
  --border:#5a4048;--text:#f5f0f2;--text2:#c8b8c0;--muted:#907880;
  --cyan:#e8dce0;--pink:#d8a0b0;--yellow:#e0c060;--green:#70b878;
  --purple:#c0a8d0;--orange:#d89848;
  --grad:linear-gradient(135deg,#8b1a2b,#c0b8b8);
  --spark1:#e8dce0;--spark2:#8b1a2b;
}


*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.page{max-width:1100px;margin:0 auto;padding:32px 24px;}

.title{text-align:center;font-size:24px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.subtitle{text-align:center;font-size:13px;color:var(--text2);margin-bottom:24px;}

/* Theme bar */
.theme-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:32px;}
.theme-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
.theme-btn:hover{border-color:var(--cyan);color:var(--text);}
.theme-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.06);}

/* Option cards */
.options-grid{display:grid;grid-template-columns:1fr;gap:28px;}
.option-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;transition:all 0.3s;}
.option-card:hover{border-color:var(--cyan);box-shadow:0 4px 24px rgba(0,0,0,0.2);}
.option-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.option-num{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.option-name{font-size:18px;font-weight:800;color:var(--cyan);}
.option-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:20px;}

/* Logo container */
.logo-stage{position:relative;height:80px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:12px;background:var(--bg2);border:1px solid var(--border);}

/* The VINCULUM text */
.logo-text{
  font-size:36px;font-weight:900;letter-spacing:2px;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative;z-index:2;
  font-family:'Inter',sans-serif;
}

/* Sparkler canvas sits under the text */
.sparkler-canvas{position:absolute;bottom:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;}

/* Restart button */
.restart-btn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--card2);color:var(--text2);font-size:11px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;
}
.restart-btn:hover{border-color:var(--cyan);color:var(--cyan);}

.vote-row{display:flex;align-items:center;gap:12px;margin-top:16px;}
.vote-btn{
  padding:8px 20px;border-radius:10px;border:2px solid var(--cyan);
  background:transparent;color:var(--cyan);font-size:13px;font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;
}
.vote-btn:hover{background:var(--cyan);color:var(--bg);}
</style>
</head>
<body data-theme="dark">
<div class="page">
  <div class="title">VINCULUM Sparkler Logo</div>
  <div class="subtitle">5 sparkler animation styles — each adapts to the active theme colors</div>

  <div class="theme-bar" id="themeBar"></div>

  <div class="options-grid" id="optionsGrid"></div>
</div>

<script>
// ═══════════════════════════════════════════
// THEMES
// ═══════════════════════════════════════════
const THEMES = [
  {id:'dark',label:'VINCULUM Dark',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.8"/></svg>'},
  {id:'bright',label:'Bright Mode',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.3"/><line x1="12" y1="1" x2="12" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="20" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'},
  {id:'redlaser',label:'Red Laser',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" fill="currentColor"/><line x1="12" y1="1" x2="12" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="19" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'},
  {id:'storm',label:'Electric Storm',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polygon points="13,2 4,14 11,14 9,22 20,10 13,10" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>'},
  {id:'frost',label:'Arctic Frost',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5.64" y1="5.64" x2="18.36" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'},
  {id:'emerald',label:'Emerald Scholar',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polygon points="12,2 22,9 17,22 7,22 2,9" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.15" stroke-linejoin="round"/><polyline points="2,9 12,13 22,9" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="12" y1="2" x2="12" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>'},
  {id:'sunset',label:'Sunset Blaze',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.2"/><line x1="12" y1="4" x2="12" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="18" x2="22" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 18 A8 8 0 0 1 20 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>'},
  {id:'spartan',label:'Spartan',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 6v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V6L12 2z" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.15"/></svg>'}
];
let currentTheme = 'dark';

// ═══════════════════════════════════════════
// 5 SPARKLER OPTIONS
// ═══════════════════════════════════════════
const OPTIONS = [
  {
    id: 1,
    name: 'Classic Fuse',
    desc: 'A single bright spark travels left-to-right under VINCULUM, leaving a glowing ember trail that fades to grey ash over 5 seconds. After reaching the end, the spark resets and starts again from under the V. Clean, elegant, like a lit fuse.'
  },
  {
    id: 2,
    name: 'Bouncing Sparkler',
    desc: 'The spark travels from V to M, then bounces back M to V, creating a continuous back-and-forth loop. Each direction takes ~7.5 seconds (15 seconds round trip). Embers drift downward slightly as they fade. The spark gets slightly brighter at each bounce point.'
  },
  {
    id: 3,
    name: 'Cascade Shower',
    desc: 'Instead of a single point, the spark throws tiny particles upward as it moves — like a real hand-held sparkler. Particles arc up and fall with gravity, fading from bright theme color to orange to grey. More dramatic and celebratory.'
  },
  {
    id: 4,
    name: 'Comet Trail',
    desc: 'The spark has a long luminous tail (like a comet) that stretches behind it as it moves. The tail is a gradient from the bright spark color to transparent. Faster movement (~8 seconds one way) with a smooth, sweeping feel.'
  },
  {
    id: 5,
    name: 'Firecracker Burst',
    desc: 'The spark moves steadily across, but every ~2 seconds it "pops" — throwing a mini burst of 8-12 particles in all directions. Between pops, just a steady glow moves along. Combines steady motion with periodic bursts of energy.'
  }
];

// ═══════════════════════════════════════════
// SPARKLER ENGINE (Canvas-based)
// ═══════════════════════════════════════════

function getThemeColors() {
  const s = getComputedStyle(document.body);
  return {
    spark1: s.getPropertyValue('--spark1').trim() || s.getPropertyValue('--cyan').trim(),
    spark2: s.getPropertyValue('--spark2').trim() || s.getPropertyValue('--purple').trim(),
    bg: s.getPropertyValue('--bg').trim()
  };
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r=parseInt(hex.substring(0,2),16);
  const g=parseInt(hex.substring(2,4),16);
  const b=parseInt(hex.substring(4,6),16);
  return {r,g,b};
}

function colorToRgb(color) {
  // Handle rgba
  if(color.startsWith('rgba') || color.startsWith('rgb')) {
    const m = color.match(/[\d.]+/g);
    if(m) return {r:parseFloat(m[0]),g:parseFloat(m[1]),b:parseFloat(m[2])};
  }
  return hexToRgb(color);
}

function lerpColor(c1, c2, t) {
  return {
    r: Math.round(c1.r + (c2.r - c1.r) * t),
    g: Math.round(c1.g + (c2.g - c1.g) * t),
    b: Math.round(c1.b + (c2.b - c1.b) * t)
  };
}

class Sparkler {
  constructor(canvas, option) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.option = option;
    this.particles = [];
    this.embers = [];
    this.sparkX = 0;
    this.direction = 1; // 1=right, -1=left
    this.running = false;
    this.startTime = 0;
    this.W = 0;
    this.H = 0;
    this.sparkY = 0;
    this.padL = 0;
    this.padR = 0;
  }

  start() {
    this.resize();
    this.particles = [];
    this.embers = [];
    this.sparkX = this.padL;
    this.direction = 1;
    this.running = true;
    this.startTime = performance.now();
    this.animate();
  }

  stop() {
    this.running = false;
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.canvas.style.width = rect.width + 'px';
    this.canvas.style.height = rect.height + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.W = rect.width;
    this.H = rect.height;
    this.sparkY = this.H - 16;
    // Padding to align with text
    this.padL = this.W * 0.2;
    this.padR = this.W * 0.8;
  }

  animate() {
    if (!this.running) return;
    const now = performance.now();
    const dt = 1/60;

    const colors = getThemeColors();
    const c1 = colorToRgb(colors.spark1);
    const c2 = colorToRgb(colors.spark2);
    const ash = {r:120,g:120,b:120};

    this.ctx.clearRect(0, 0, this.W, this.H);

    const travelDist = this.padR - this.padL;

    switch(this.option) {
      case 1: this.drawClassicFuse(dt, c1, c2, ash, travelDist); break;
      case 2: this.drawBouncingSparkler(dt, c1, c2, ash, travelDist); break;
      case 3: this.drawCascadeShower(dt, c1, c2, ash, travelDist); break;
      case 4: this.drawCometTrail(dt, c1, c2, ash, travelDist); break;
      case 5: this.drawFirecrackerBurst(dt, c1, c2, ash, travelDist); break;
    }

    requestAnimationFrame(() => this.animate());
  }

  // ─── OPTION 1: Classic Fuse ───
  drawClassicFuse(dt, c1, c2, ash, dist) {
    const speed = dist / (15 * 60); // 15 seconds
    this.sparkX += speed * this.direction;

    if (this.sparkX >= this.padR) {
      this.sparkX = this.padL;
      this.embers = [];
    }

    const progress = (this.sparkX - this.padL) / dist;
    const sparkColor = lerpColor(c1, c2, progress);

    // Add ember
    this.embers.push({x: this.sparkX, y: this.sparkY, life: 1, maxLife: 5*60, color: {...sparkColor}});

    // Draw embers
    for (let i = this.embers.length - 1; i >= 0; i--) {
      const e = this.embers[i];
      e.life -= 1/(5*60);
      if (e.life <= 0) { this.embers.splice(i, 1); continue; }
      const fade = Math.max(0, e.life);
      const col = lerpColor(ash, e.color, fade);
      this.ctx.globalAlpha = fade * 0.7;
      this.ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
      this.ctx.beginPath();
      this.ctx.arc(e.x, e.y, 1.5 + fade, 0, Math.PI*2);
      this.ctx.fill();
    }

    // Draw spark
    this.ctx.globalAlpha = 1;
    this.ctx.fillStyle = `rgb(${sparkColor.r},${sparkColor.g},${sparkColor.b})`;
    this.ctx.shadowColor = `rgba(${sparkColor.r},${sparkColor.g},${sparkColor.b},0.8)`;
    this.ctx.shadowBlur = 12;
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 3.5, 0, Math.PI*2);
    this.ctx.fill();

    // Bright center
    this.ctx.fillStyle = '#fff';
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 1.5, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.shadowBlur = 0;
    this.ctx.globalAlpha = 1;
  }

  // ─── OPTION 2: Bouncing Sparkler ───
  drawBouncingSparkler(dt, c1, c2, ash, dist) {
    const speed = dist / (7.5 * 60); // 7.5s per direction
    this.sparkX += speed * this.direction;

    if (this.sparkX >= this.padR) { this.direction = -1; this.sparkX = this.padR; }
    if (this.sparkX <= this.padL) { this.direction = 1; this.sparkX = this.padL; }

    const progress = (this.sparkX - this.padL) / dist;
    const sparkColor = lerpColor(c1, c2, progress);

    // Ember with slight downward drift
    this.embers.push({x: this.sparkX, y: this.sparkY, vy: Math.random()*0.3, life: 1, color: {...sparkColor}});

    for (let i = this.embers.length - 1; i >= 0; i--) {
      const e = this.embers[i];
      e.life -= 1/(5*60);
      e.y += e.vy;
      if (e.life <= 0) { this.embers.splice(i, 1); continue; }
      const fade = Math.max(0, e.life);
      const col = lerpColor(ash, e.color, fade);
      this.ctx.globalAlpha = fade * 0.6;
      this.ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
      this.ctx.beginPath();
      this.ctx.arc(e.x, e.y, 1 + fade * 1.5, 0, Math.PI*2);
      this.ctx.fill();
    }

    // Bounce flash
    const atEdge = this.sparkX <= this.padL + 2 || this.sparkX >= this.padR - 2;

    this.ctx.globalAlpha = 1;
    this.ctx.fillStyle = `rgb(${sparkColor.r},${sparkColor.g},${sparkColor.b})`;
    this.ctx.shadowColor = `rgba(${sparkColor.r},${sparkColor.g},${sparkColor.b},${atEdge?1:0.8})`;
    this.ctx.shadowBlur = atEdge ? 20 : 12;
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, atEdge ? 5 : 3.5, 0, Math.PI*2);
    this.ctx.fill();

    this.ctx.fillStyle = '#fff';
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 1.5, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.shadowBlur = 0;
    this.ctx.globalAlpha = 1;

    // Limit embers for performance
    if (this.embers.length > 500) this.embers.splice(0, 100);
  }

  // ─── OPTION 3: Cascade Shower ───
  drawCascadeShower(dt, c1, c2, ash, dist) {
    const speed = dist / (12 * 60);
    this.sparkX += speed * this.direction;

    if (this.sparkX >= this.padR) {
      this.sparkX = this.padL;
      this.particles = [];
    }

    const progress = (this.sparkX - this.padL) / dist;
    const sparkColor = lerpColor(c1, c2, progress);
    const orange = {r:255,g:160,b:40};

    // Throw particles upward
    for (let i = 0; i < 2; i++) {
      const angle = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.8;
      const vel = 0.5 + Math.random() * 2;
      this.particles.push({
        x: this.sparkX + (Math.random()-0.5)*4,
        y: this.sparkY - 2,
        vx: Math.cos(angle) * vel,
        vy: Math.sin(angle) * vel,
        life: 1,
        color: {...sparkColor},
        size: 0.5 + Math.random() * 1.5
      });
    }

    // Update & draw particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.vy += 0.04; // gravity
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.015;
      if (p.life <= 0 || p.y > this.H + 5) { this.particles.splice(i, 1); continue; }

      // Color: sparkColor → orange → ash
      let col;
      if (p.life > 0.5) col = lerpColor(orange, p.color, (p.life-0.5)*2);
      else col = lerpColor(ash, orange, p.life*2);

      this.ctx.globalAlpha = Math.max(0, p.life) * 0.8;
      this.ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
      this.ctx.fill();
    }

    // Main spark
    this.ctx.globalAlpha = 1;
    this.ctx.fillStyle = `rgb(${sparkColor.r},${sparkColor.g},${sparkColor.b})`;
    this.ctx.shadowColor = `rgba(${sparkColor.r},${sparkColor.g},${sparkColor.b},0.9)`;
    this.ctx.shadowBlur = 16;
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 4, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.fillStyle = '#fff';
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 2, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.shadowBlur = 0;
    this.ctx.globalAlpha = 1;

    if (this.particles.length > 600) this.particles.splice(0, 100);
  }

  // ─── OPTION 4: Comet Trail ───
  drawCometTrail(dt, c1, c2, ash, dist) {
    const speed = dist / (8 * 60); // 8 seconds
    this.sparkX += speed * this.direction;

    if (this.sparkX >= this.padR) {
      this.sparkX = this.padL;
      this.embers = [];
    }

    const progress = (this.sparkX - this.padL) / dist;
    const sparkColor = lerpColor(c1, c2, progress);

    // Add trail points
    this.embers.push({x: this.sparkX, y: this.sparkY, life: 1});

    // Draw comet tail as gradient line
    const tailLen = Math.min(this.embers.length, 80);
    if (tailLen > 2) {
      for (let i = 0; i < tailLen; i++) {
        const idx = this.embers.length - 1 - i;
        if (idx < 0) break;
        const e = this.embers[idx];
        const t = 1 - i / tailLen;
        const col = lerpColor(ash, sparkColor, t);
        this.ctx.globalAlpha = t * t * 0.6;
        this.ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
        this.ctx.beginPath();
        this.ctx.arc(e.x, e.y, 1 + t * 3, 0, Math.PI*2);
        this.ctx.fill();
      }
    }

    // Cleanup old trail
    while (this.embers.length > 100) this.embers.shift();

    // Spark head
    this.ctx.globalAlpha = 1;
    this.ctx.fillStyle = `rgb(${sparkColor.r},${sparkColor.g},${sparkColor.b})`;
    this.ctx.shadowColor = `rgba(${sparkColor.r},${sparkColor.g},${sparkColor.b},0.9)`;
    this.ctx.shadowBlur = 18;
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 4.5, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.fillStyle = '#fff';
    this.ctx.shadowBlur = 0;
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 2, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.globalAlpha = 1;
  }

  // ─── OPTION 5: Firecracker Burst ───
  drawFirecrackerBurst(dt, c1, c2, ash, dist) {
    const speed = dist / (12 * 60);
    this.sparkX += speed * this.direction;

    if (this.sparkX >= this.padR) {
      this.sparkX = this.padL;
      this.particles = [];
      this.embers = [];
    }

    const progress = (this.sparkX - this.padL) / dist;
    const sparkColor = lerpColor(c1, c2, progress);

    // Steady ember trail
    this.embers.push({x: this.sparkX, y: this.sparkY, life: 1, color: {...sparkColor}});

    // Periodic burst every ~2 seconds (120 frames)
    if (!this._burstTimer) this._burstTimer = 0;
    this._burstTimer++;
    if (this._burstTimer >= 120) {
      this._burstTimer = 0;
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const vel = 1 + Math.random() * 2.5;
        this.particles.push({
          x: this.sparkX, y: this.sparkY,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel,
          life: 1, color: {...sparkColor},
          size: 1 + Math.random() * 2
        });
      }
    }

    // Draw embers
    for (let i = this.embers.length - 1; i >= 0; i--) {
      const e = this.embers[i];
      e.life -= 1/(4*60);
      if (e.life <= 0) { this.embers.splice(i, 1); continue; }
      const fade = Math.max(0, e.life);
      const col = lerpColor(ash, e.color, fade);
      this.ctx.globalAlpha = fade * 0.5;
      this.ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
      this.ctx.beginPath();
      this.ctx.arc(e.x, e.y, 1 + fade, 0, Math.PI*2);
      this.ctx.fill();
    }

    // Draw burst particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.vy += 0.03;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.life -= 0.02;
      if (p.life <= 0) { this.particles.splice(i, 1); continue; }
      const col = lerpColor(ash, p.color, p.life);
      this.ctx.globalAlpha = p.life * 0.9;
      this.ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
      this.ctx.fill();
    }

    // Main spark (with pulse)
    const pulse = 1 + 0.2 * Math.sin(this._burstTimer * 0.15);
    this.ctx.globalAlpha = 1;
    this.ctx.fillStyle = `rgb(${sparkColor.r},${sparkColor.g},${sparkColor.b})`;
    this.ctx.shadowColor = `rgba(${sparkColor.r},${sparkColor.g},${sparkColor.b},0.8)`;
    this.ctx.shadowBlur = 14 * pulse;
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 3.5 * pulse, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.fillStyle = '#fff';
    this.ctx.beginPath();
    this.ctx.arc(this.sparkX, this.sparkY, 1.5, 0, Math.PI*2);
    this.ctx.fill();
    this.ctx.shadowBlur = 0;
    this.ctx.globalAlpha = 1;

    if (this.embers.length > 400) this.embers.splice(0, 100);
    if (this.particles.length > 300) this.particles.splice(0, 50);
  }
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
const sparklers = [];

function renderThemeBar() {
  const bar = document.getElementById('themeBar');
  bar.innerHTML = THEMES.map(t =>
    `<button class="theme-btn ${currentTheme===t.id?'active':''}" onclick="switchTheme('${t.id}')">${t.icon} ${t.label}</button>`
  ).join('');
}

function switchTheme(id) {
  currentTheme = id;
  document.body.setAttribute('data-theme', id);
  renderThemeBar();
  // Restart all sparklers to pick up new colors
  sparklers.forEach(s => { s.stop(); s.start(); });
}

function renderOptions() {
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = OPTIONS.map(o => `
    <div class="option-card" id="option-${o.id}">
      <div class="option-header">
        <div>
          <div class="option-num">Option ${o.id}</div>
          <div class="option-name">${o.name}</div>
        </div>
        <button class="restart-btn" onclick="restartSparkler(${o.id})">↻ Restart</button>
      </div>
      <div class="option-desc">${o.desc}</div>
      <div class="logo-stage">
        <div class="logo-text">VINCULUM</div>
        <canvas class="sparkler-canvas" id="canvas-${o.id}"></canvas>
      </div>
    </div>
  `).join('');

  // Initialize sparklers
  sparklers.length = 0;
  OPTIONS.forEach(o => {
    const canvas = document.getElementById(`canvas-${o.id}`);
    const s = new Sparkler(canvas, o.id);
    sparklers.push(s);
    s.start();
  });
}

function restartSparkler(id) {
  const s = sparklers[id-1];
  if(s){ s.stop(); s.embers=[]; s.particles=[]; s.start(); }
}

renderThemeBar();
renderOptions();

// Handle resize
window.addEventListener('resize', () => {
  sparklers.forEach(s => s.resize());
});
</script>
