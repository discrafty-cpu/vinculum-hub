<head>

<style>

/* ═══ VINCULUM THEME SYSTEM ═══ */
:root, [data-theme="dark"] {
  --bg:#0a0e1a;--bg2:#111827;--card:#1a2236;--card2:#1f2a42;
  --border:#2a3654;--text:#e8edf5;--text2:#8b9cc0;--muted:#5a6b8f;
  --cyan:#00d4ff;--pink:#ff3b8b;--yellow:#ffc107;--green:#00e676;
  --purple:#b388ff;--orange:#ff9100;
  --grad:linear-gradient(135deg,#00d4ff,#b388ff);
  --glow:rgba(0,212,255,0.15);--shadow:0 4px 20px rgba(0,0,0,0.4);
}
[data-theme="bright"] {
  --bg:#f0f2f5;--bg2:#ffffff;--card:#ffffff;--card2:#f0f4ff;
  --border:#d8dde8;--text:#1a1f2e;--text2:#4a5568;--muted:#8895a7;
  --cyan:#0094cc;--pink:#d6296e;--yellow:#c79400;--green:#00a858;
  --purple:#7c4dff;--orange:#d47600;
  --grad:linear-gradient(135deg,#0094cc,#7c4dff);
  --glow:rgba(0,148,204,0.08);--shadow:0 2px 12px rgba(0,0,0,0.06);
}
[data-theme="redlaser"] {
  --bg:#0c0508;--bg2:#150a10;--card:#1e0f18;--card2:#2a1422;
  --border:#3d1a2e;--text:#f5e0e8;--text2:#c08a9d;--muted:#7a4d62;
  --cyan:#ff2d55;--pink:#ff6b8a;--yellow:#ff9500;--green:#00e676;
  --purple:#ff4081;--orange:#ff6e40;
  --grad:linear-gradient(135deg,#ff2d55,#ff6e40);
  --glow:rgba(255,45,85,0.15);--shadow:0 4px 24px rgba(255,45,85,0.15);
}
[data-theme="storm"] {
  --bg:#040812;--bg2:#0a1628;--card:#0f1f3d;--card2:#152a4f;
  --border:#1e3a6e;--text:#d4e4ff;--text2:#7aa0d4;--muted:#4a6a9a;
  --cyan:#00e5ff;--pink:#7c4dff;--yellow:#ffea00;--green:#76ff03;
  --purple:#e040fb;--orange:#ff9100;
  --grad:linear-gradient(135deg,#00e5ff,#ffea00);
  --glow:rgba(0,229,255,0.12);--shadow:0 4px 24px rgba(0,229,255,0.12);
}
[data-theme="frost"] {
  --bg:#dce8f4;--bg2:#e8f2fc;--card:rgba(255,255,255,0.55);--card2:rgba(220,235,250,0.6);
  --border:rgba(160,200,230,0.5);--text:#0c2840;--text2:#2a5580;--muted:#5a8ab0;
  --cyan:#0077bb;--pink:#8844aa;--yellow:#aa7700;--green:#007755;
  --purple:#5533bb;--orange:#cc6600;
  --grad:linear-gradient(135deg,#4db8e8,#88ccff);
  --glow:rgba(77,184,232,0.15);--shadow:0 2px 20px rgba(30,100,160,0.08);
}
[data-theme="emerald"] {
  --bg:#060e08;--bg2:#0c1a10;--card:#142618;--card2:#1c3222;
  --border:#2a4a32;--text:#e0f0e4;--text2:#90b898;--muted:#5a8a64;
  --cyan:#00e676;--pink:#ffab40;--yellow:#ffd740;--green:#69f0ae;
  --purple:#b2ff59;--orange:#ffab40;
  --grad:linear-gradient(135deg,#00e676,#ffd740);
  --glow:rgba(0,230,118,0.12);--shadow:0 4px 20px rgba(0,230,118,0.1);
}
[data-theme="sunset"] {
  --bg:#0e0808;--bg2:#1a0f0f;--card:#261818;--card2:#332020;
  --border:#4a2828;--text:#f5e8e0;--text2:#c8a090;--muted:#8a6050;
  --cyan:#ff6b35;--pink:#ff2e63;--yellow:#ffc107;--green:#00e676;
  --purple:#ff9ff3;--orange:#ff9f43;
  --grad:linear-gradient(135deg,#ff6b35,#ff2e63);
  --glow:rgba(255,107,53,0.12);--shadow:0 4px 24px rgba(255,107,53,0.12);
}
[data-theme="spartan"] {
  --bg:#1a1014;--bg2:#241820;--card:#2e2028;--card2:#382830;
  --border:#5a4048;--text:#f5f0f2;--text2:#c8b8c0;--muted:#907880;
  --cyan:#e8dce0;--pink:#d8a0b0;--yellow:#e0c060;--green:#70b878;
  --purple:#c0a8d0;--orange:#d89848;
  --grad:linear-gradient(135deg,#8b1a2b,#c0b8b8);
  --glow:rgba(139,26,43,0.2);--shadow:0 4px 20px rgba(139,26,43,0.15);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;background:var(--bg2);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
}
.topbar-brand{display:flex;align-items:center;gap:12px;}
.topbar-logo{
  width:32px;height:32px;background:var(--grad);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:var(--bg);
}
.topbar-title{font-size:16px;font-weight:800;}
.topbar-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-sub{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:12px;}

/* Hub link */
.hub-link{
  padding:7px 16px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:12px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.hub-link:hover{border-color:var(--cyan);color:var(--cyan);}

/* ── CONTROLS BAR ── */
.controls{
  display:flex;align-items:center;gap:12px;padding:12px 24px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.controls-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-right:4px;}

/* Grade filter pills */
.grade-pills{display:flex;gap:4px;}
.grade-pill{
  padding:5px 14px;border-radius:7px;border:1px solid transparent;
  background:transparent;color:var(--muted);font-size:12px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;
}
.grade-pill:hover{color:var(--text2);background:var(--card);}
.grade-pill.active{background:rgba(0,212,255,0.08);color:var(--cyan);border-color:rgba(0,212,255,0.2);}

/* Theme picker */
.theme-picker{position:relative;}
.theme-picker-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:7px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:12px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;
}
.theme-picker-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.theme-dd{
  position:absolute;top:100%;right:0;margin-top:6px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:6px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:200;
  display:none;
}
.theme-dd.open{display:block;}
.theme-opt{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px;border-radius:7px;border:none;background:transparent;
  width:100%;color:var(--text);font-size:12px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;text-align:left;
}
.theme-opt:hover{background:var(--card);}
.theme-opt.active{background:rgba(0,212,255,0.06);color:var(--cyan);}
.theme-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;}

/* View size toggle */
.size-pills{display:flex;gap:3px;background:var(--card);border-radius:7px;padding:2px;}
.size-pill{
  padding:5px 12px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;
  cursor:pointer;transition:all 0.15s;
}
.size-pill.active{background:var(--bg2);color:var(--cyan);}

/* ── GALLERY GRID ── */
.gallery{
  display:grid;gap:20px;padding:24px;
  grid-template-columns:repeat(auto-fill, minmax(420px, 1fr));
}
.gallery.size-sm{grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));}
.gallery.size-sm .preview-frame{height:240px;}
.gallery.size-lg{grid-template-columns:1fr;}
.gallery.size-lg .preview-frame{height:500px;}

/* App Card */
.app-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:all 0.3s;
}
.app-card:hover{border-color:var(--cyan);box-shadow:var(--shadow);}

.app-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.app-card-info{display:flex;align-items:center;gap:10px;}
.app-card-icon{font-size:18px;}
.app-card-title{font-size:13px;font-weight:700;}
.app-card-grade{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;
  background:rgba(0,212,255,0.08);color:var(--cyan);letter-spacing:1px;
}
.app-card-status{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--green);}
.app-card-actions{display:flex;gap:6px;}
.app-card-btn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:11px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.app-card-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.app-card-btn.primary{background:var(--grad);color:var(--bg);border-color:transparent;font-weight:700;}

/* iframe preview */
.preview-frame{
  height:360px;position:relative;background:var(--bg);
}
.preview-frame iframe{
  width:200%;height:200%;
  transform:scale(0.5);transform-origin:top left;
  border:none;pointer-events:none;
}
.preview-frame.interactive iframe{pointer-events:auto;}
.preview-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  cursor:pointer;z-index:10;
}
.preview-frame.interactive .preview-overlay{display:none;}

/* Loading state */
.preview-loading{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:12px;color:var(--muted);font-weight:600;
}

/* Empty state */
.empty-state{
  text-align:center;padding:60px 24px;color:var(--muted);
}
.empty-state-icon{font-size:40px;margin-bottom:12px;}
.empty-state-text{font-size:14px;font-weight:600;}

/* Stats bar */
.stats-bar{
  display:flex;align-items:center;gap:16px;padding:8px 24px;
  border-bottom:1px solid var(--border);background:var(--bg);
}
.stat{font-size:11px;color:var(--text2);font-weight:500;}
.stat strong{color:var(--cyan);font-weight:700;}

/* Scroll */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:600px){
  .gallery{grid-template-columns:1fr;padding:12px;}
  .controls{padding:8px 12px;}
}
</style>
</head>

};

let currentGrade = 'all';
let currentSize = 'md';
let currentTheme = 'dark';

// Load saved theme
try {
  const saved = localStorage.getItem('vinculum-theme');
  if (saved) { currentTheme = saved; document.documentElement.setAttribute('data-theme', saved); }
} catch(e){}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════

function renderGradePills() {
  const grades = ['all','K','1','2'];
  const labels = {all:'All',K:'Grade K','1':'Grade 1','2':'Grade 2'};
  document.getElementById('gradePills').innerHTML = grades.map(g =>
    `<button class="grade-pill ${currentGrade===g?'active':''}" onclick="setGrade('${g}')">${labels[g]}</button>`
  ).join('');
}

function setGrade(g) {
  currentGrade = g;
  renderGradePills();
  renderGallery();
}

function setSize(s) {
  currentSize = s;
  document.querySelectorAll('.size-pill').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const gallery = document.getElementById('gallery');
  gallery.className = 'gallery' + (s !== 'md' ? ' size-' + s : '');
}

function setTheme(id) {
  currentTheme = id;
  document.documentElement.setAttribute('data-theme', id);
  try { localStorage.setItem('vinculum-theme', id); } catch(e){}
  renderThemeDD();
  // Reload iframes to pick up theme
  document.querySelectorAll('.preview-frame iframe').forEach(iframe => {
    iframe.src = iframe.src;
  });
  document.getElementById('themeDD').classList.remove('open');
}

function toggleDD() {
  document.getElementById('themeDD').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.theme-picker')) document.getElementById('themeDD').classList.remove('open');
});

function renderThemeDD() {
  const dd = document.getElementById('themeDD');
  dd.innerHTML = THEMES.map(t =>
    `<button class="theme-opt ${t.id===currentTheme?'active':''}" onclick="setTheme('${t.id}')">
      <span class="theme-dot" style="background:${t.dot}"></span>
      ${t.icon} ${t.label}
    </button>`
  ).join('');
  const cur = THEMES.find(t => t.id === currentTheme) || THEMES[0];
  document.getElementById('themeIcon').textContent = cur.icon;
  document.getElementById('themeLabel').textContent = cur.label;
}

function renderGallery() {
  const filtered = currentGrade === 'all' ? APPS : APPS.filter(a => a.grade === currentGrade);

  // Stats
  const gradeCount = {};
  APPS.forEach(a => { gradeCount[a.grade] = (gradeCount[a.grade]||0) + 1; });
  document.getElementById('statsBar').innerHTML =
    `<span class="stat">Showing <strong>${filtered.length}</strong> of <strong>${APPS.length}</strong> apps</span>` +
    `<span class="stat">Grade K: <strong>${gradeCount['K']||0}</strong></span>` +
    `<span class="stat">Grade 1: <strong>${gradeCount['1']||0}</strong></span>` +
    `<span class="stat">Grade 2: <strong>${gradeCount['2']||0}</strong></span>`;

  if (filtered.length === 0) {
    document.getElementById('gallery').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;width:40px;height:40px;"><rect x="16" y="20" width="32" height="28" rx="4" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="2"/><line x1="22" y1="32" x2="42" y2="32" stroke="currentColor" stroke-width="2" opacity="0.5"/><circle cx="26" cy="42" r="3" fill="currentColor" opacity="0.3"/><circle cx="38" cy="42" r="3" fill="currentColor" opacity="0.3"/><path d="M20 16 Q20 12 24 12 L40 12 Q44 12 44 16" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/></svg></div><div class="empty-state-text">No apps for this grade yet</div></div>`;
    return;
  }

  document.getElementById('gallery').innerHTML = filtered.map(app => `
    <div class="app-card" id="card-${app.id}">
      <div class="app-card-header">
        <div class="app-card-info">
          <span class="app-card-icon">${TOOL_ICONS[app.id] ? '<span style="display:inline-block;width:22px;height:22px;vertical-align:middle;">'+TOOL_ICONS[app.id]+'</span>' : app.icon}</span>
          <span class="app-card-title">${app.name}</span>
          <span class="app-card-grade">GRADE ${app.grade}</span>
        </div>
        <div class="app-card-actions">
          <span class="app-card-status">BUILT</span>
          <button class="app-card-btn" onclick="toggleInteractive('${app.id}')" title="Click to interact with the live app"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;width:14px;height:14px;vertical-align:middle;margin-right:4px;"><path d="M5 10c-1.5-1.5-2-3-2-5s.5-3.5 2-5M3 18c-1.5-1.5-2-3-2-5s.5-3.5 2-5M8 3c1.5 1.5 3 2 5 2s3.5-.5 5-2M4 4c2 2 3 3 5 3s3-1 5-3M10 12c-1.5-1.5-2-3-2-5s.5-3.5 2-5m-2 12c-1.5 1.5-2 3-2 5s.5 3.5 2 5m2-12c1.5 1.5 3 2 5 2s3.5-.5 5-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg> Interact</button>
          <a href="${app.path}" class="app-card-btn primary" target="_blank">Open ↗</a>
        </div>
      </div>
      <div class="preview-frame" id="frame-${app.id}">
        <div class="preview-loading">Loading preview...</div>
        <div class="preview-overlay" onclick="toggleInteractive('${app.id}')" title="Click to interact"></div>
        <iframe src="${app.path}" loading="lazy" sandbox="allow-scripts allow-same-origin" onload="this.previousElementSibling.previousElementSibling.style.display='none'"></iframe>
      </div>
    </div>
  `).join('');
}

function toggleInteractive(id) {
  const frame = document.getElementById('frame-' + id);
  frame.classList.toggle('interactive');
  const btn = frame.closest('.app-card').querySelector('.app-card-btn');
  if (frame.classList.contains('interactive')) {
    btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;width:14px;height:14px;vertical-align:middle;margin-right:4px;"><rect x="4" y="8" width="16" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 8V6c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="13" r="1.5" fill="currentColor"/></svg> Lock';
    btn.title = 'Click to lock preview (disable interaction)';
  } else {
    btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;width:14px;height:14px;vertical-align:middle;margin-right:4px;"><path d="M5 10c-1.5-1.5-2-3-2-5s.5-3.5 2-5M3 18c-1.5-1.5-2-3-2-5s.5-3.5 2-5M8 3c1.5 1.5 3 2 5 2s3.5-.5 5-2M4 4c2 2 3 3 5 3s3-1 5-3M10 12c-1.5-1.5-2-3-2-5s.5-3.5 2-5m-2 12c-1.5 1.5-2 3-2 5s.5 3.5 2 5m2-12c1.5 1.5 3 2 5 2s3.5-.5 5-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg> Interact';
    btn.title = 'Click to interact with the live app';
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderGradePills();
renderThemeDD();
renderGallery();
</script>
</body>
</html>
