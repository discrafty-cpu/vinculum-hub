<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof Builder - VINCULUM Hub</title>
    <link rel="stylesheet" href="../../vinculum-core.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        .vinculum-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .vinculum-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #667eea;
        }
        .vinculum-header p {
            font-size: 1.1em;
            color: #666;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .vinculum-mode-tab {
            background: #e0e0e0;
            color: #333;
        }
        .vinculum-mode-tab.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }
        .difficulty-selector {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .difficulty-selector label {
            font-weight: bold;
            color: #333;
            margin-right: 10px;
        }
        .vinculum-diff-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid transparent;
        }
        .vinculum-diff-btn.active {
            background: #764ba2;
            color: white;
            border-color: #667eea;
        }
        .content-area {
            min-height: 500px;
        }
        .proof-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .proof-section {
            background: #f9f9f9;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
        }
        .proof-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .statement-box {
            background: white;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            text-align: center;
            font-style: italic;
        }
        .statement-box.filled {
            color: #333;
            font-style: normal;
            border-style: solid;
            background: #e3f2fd;
        }
        .proof-steps {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .proof-step {
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .proof-step.template {
            opacity: 0.7;
            cursor: copy;
        }
        .step-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .step-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .step-field label {
            font-weight: bold;
            color: #667eea;
            font-size: 0.85em;
        }
        .step-field input,
        .step-field textarea {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9em;
        }
        .step-field input:focus,
        .step-field textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #f0f6ff;
        }
        .available-blocks {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        .block {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
        }
        .block:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }
        .block.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        .block-type {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 3px;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .feedback.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border: 2px solid #4caf50;
        }
        .feedback.error {
            background: #ffebee;
            color: #c62828;
            display: block;
            border: 2px solid #f44336;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        button.primary {
            background: #667eea;
            color: white;
            padding: 12px 30px;
        }
        button.primary:hover {
            background: #5568d3;
            transform: scale(1.05);
        }
        button.secondary {
            background: #f0f0f0;
            color: #333;
            padding: 12px 30px;
        }
        button.secondary:hover {
            background: #e0e0e0;
        }
        .problem-description {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
        }
        .problem-description h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .theorem {
            background: #fef5f0;
            border: 2px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .given-prove {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .given-section, .prove-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
        }
        .given-section h4, .prove-section h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .timer-display {
            text-align: center;
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .score-display {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .score-display h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        @media (max-width: 900px) {
            .proof-layout, .given-prove {
                grid-template-columns: 1fr;
            }
            .proof-step {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="vinculum-header">
            <h1>📐 Proof Builder</h1>
            <p>Arrange statements and reasons to build geometric proofs!</p>
        </div>

        <div class="controls">
            <div class="mode-buttons">
                <button class="vinculum-mode-tab active" data-mode="explore"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore</button>
                <button class="vinculum-mode-tab" data-mode="practice"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button>
                <button class="vinculum-mode-tab" data-mode="play"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button>
            </div>
            <div class="difficulty-selector">
                <label>Difficulty:</label>
                <button class="vinculum-diff-btn active" data-difficulty="easy">Easy</button>
                <button class="vinculum-diff-btn" data-difficulty="medium">Medium</button>
                <button class="vinculum-diff-btn" data-difficulty="hard">Hard</button>
            </div>
        </div>

        <div id="feedback" class="feedback"></div>

        <div class="content-area">
            <div id="explore-mode">
                <div class="problem-description" id="explore-problem"></div>
                <div class="theorem" id="explore-theorem"></div>
                <div class="given-prove" id="explore-given-prove"></div>
                <div class="proof-layout">
                    <div class="proof-section">
                        <h3>📋 Complete Proof</h3>
                        <div class="proof-steps" id="explore-proof"></div>
                    </div>
                    <div class="proof-section">
                        <h3>ℹ️ Explanation</h3>
                        <div id="explore-explanation" style="line-height: 1.8; color: #333;"></div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="primary" onclick="loadExploreMode()">Load New Proof</button>
                </div>
            </div>

            <div id="practice-mode" style="display: none;">
                <div class="problem-description" id="practice-problem"></div>
                <div class="theorem" id="practice-theorem"></div>
                <div class="given-prove" id="practice-given-prove"></div>
                <div class="proof-layout">
                    <div class="proof-section">
                        <h3>📝 Your Proof</h3>
                        <div class="proof-steps" id="practice-proof"></div>
                    </div>
                    <div class="proof-section">
                        <h3>📦 Available Blocks</h3>
                        <div class="available-blocks" id="practice-blocks"></div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="primary" onclick="checkPracticeSolution()">Check Proof</button>
                    <button class="secondary" onclick="loadPracticeMode()">New Proof</button>
                </div>
            </div>

            <div id="play-mode" style="display: none;">
                <div class="score-display">
                    <h3>⚡ Proof Puzzler</h3>
                    <div style="font-size: 1.8em; color: #667eea; font-weight: bold;">
                        Score: <span id="play-score">0</span> | Time: <span id="timer">0</span>s
                    </div>
                </div>
                <div class="problem-description" id="play-problem"></div>
                <div class="theorem" id="play-theorem"></div>
                <div class="proof-layout">
                    <div class="proof-section">
                        <h3>📝 Assemble the Proof</h3>
                        <div class="proof-steps" id="play-proof"></div>
                    </div>
                    <div class="proof-section">
                        <h3>📦 Proof Pieces</h3>
                        <div class="available-blocks" id="play-blocks"></div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="primary" onclick="checkPlaySolution()">Submit Proof</button>
                    <button class="secondary" onclick="resetPlay()">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../vinculum-feedback.js"></script><script src="../../vinculum-guide.js"></script><script src="../../vinculum-indigenous.js"></script><script src="../../indigenous-context-panel.js"></script>
    <script src="../../vinculum-input.js"></script>

    <script>
        const proofs = {
            easy: [
                {
                    title: "Vertical Angles",
                    theorem: "Vertical angles are congruent.",
                    given: "∠1 and ∠2 are vertical angles",
                    prove: "∠1 ≅ ∠2",
                    explanation: "When two lines intersect, they form two pairs of opposite angles. These opposite angles (called vertical angles) are always equal in measure.",
                    steps: [
                        { statement: "∠1 and ∠2 are vertical angles", reason: "Given" },
                        { statement: "∠1 and ∠2 are formed by two intersecting lines", reason: "Definition of vertical angles" },
                        { statement: "∠1 ≅ ∠2", reason: "Vertical Angles Theorem" }
                    ]
                }
            ],
            medium: [
                {
                    title: "Isosceles Triangle",
                    theorem: "Base angles of an isosceles triangle are congruent.",
                    given: "Triangle ABC with AB ≅ AC",
                    prove: "∠B ≅ ∠C",
                    explanation: "In an isosceles triangle, the two sides of equal length are called the legs. The angles at the base (opposite the equal sides) are always equal.",
                    steps: [
                        { statement: "AB ≅ AC", reason: "Given" },
                        { statement: "∠B and ∠C are base angles", reason: "Definition of base angles" },
                        { statement: "∠B ≅ ∠C", reason: "Isosceles Triangle Theorem" }
                    ]
                },
                {
                    title: "Parallel Lines Cut by a Transversal",
                    theorem: "Alternate interior angles are congruent.",
                    given: "Lines l and m are parallel, cut by transversal t",
                    prove: "∠3 ≅ ∠6",
                    explanation: "When a transversal crosses two parallel lines, the alternate interior angles (on opposite sides of the transversal, between the parallel lines) are congruent.",
                    steps: [
                        { statement: "l ∥ m", reason: "Given" },
                        { statement: "t is a transversal", reason: "Given" },
                        { statement: "∠3 and ∠6 are alternate interior angles", reason: "Definition" },
                        { statement: "∠3 ≅ ∠6", reason: "Alternate Interior Angles Theorem" }
                    ]
                }
            ],
            hard: [
                {
                    title: "Triangle Congruence (SSS)",
                    theorem: "If three sides of one triangle are congruent to three sides of another, the triangles are congruent.",
                    given: "Triangle ABC and Triangle DEF with AB ≅ DE, BC ≅ EF, AC ≅ DF",
                    prove: "△ABC ≅ △DEF",
                    explanation: "The Side-Side-Side (SSS) postulate states that if all three pairs of corresponding sides are equal, the entire triangles must be identical in shape and size.",
                    steps: [
                        { statement: "AB ≅ DE, BC ≅ EF, AC ≅ DF", reason: "Given" },
                        { statement: "All three pairs of corresponding sides are congruent", reason: "Definition of SSS" },
                        { statement: "△ABC ≅ △DEF", reason: "SSS Congruence Postulate" }
                    ]
                }
            ]
        };

        let currentMode = 'explore';
        let currentDifficulty = 'easy';
        let currentProof = null;
        let playTimer = 0;
        let playTimerInterval = null;
        let playScore = 0;

        function getRandomProof(difficulty) {
            const list = proofs[difficulty];
            return JSON.parse(JSON.stringify(list[Math.floor(Math.random() * list.length)]));
        }

        function renderProofSteps(modeId, proof, editable = false) {
            const container = document.getElementById(`${modeId}-proof`);
            container.innerHTML = '';

            proof.steps.forEach((step, index) => {
                const stepEl = document.createElement('div');
                stepEl.className = 'proof-step';
                if (!editable) {
                    stepEl.innerHTML = `
                        <div>
                            <div class="step-number">${index + 1}</div>
                            <div style="font-weight: bold; color: #333;">${step.statement}</div>
                        </div>
                        <div style="padding: 10px; background: #e3f2fd; border-radius: 6px; color: #667eea;">
                            <strong>Reason:</strong><br>${step.reason}
                        </div>
                    `;
                } else {
                    stepEl.innerHTML = `
                        <div class="step-field">
                            <div class="step-number">${index + 1}</div>
                            <label>Statement:</label>
                            <textarea placeholder="Enter the statement" id="stmt-${index}">${step.statement}</textarea>
                        </div>
                        <div class="step-field">
                            <label>Reason:</label>
                            <textarea placeholder="Enter the reason" id="reason-${index}">${step.reason}</textarea>
                        </div>
                    `;
                }
                container.appendChild(stepEl);
            });
        }

        function loadExploreMode() {
            currentProof = getRandomProof(currentDifficulty);

            document.getElementById('explore-problem').innerHTML = `<h4>${currentProof.title}</h4><p>${currentProof.explanation}</p>`;
            document.getElementById('explore-theorem').textContent = currentProof.theorem;

            document.getElementById('explore-given-prove').innerHTML = `
                <div class="given-section">
                    <h4>Given:</h4>
                    <p>${currentProof.given}</p>
                </div>
                <div class="prove-section">
                    <h4>Prove:</h4>
                    <p>${currentProof.prove}</p>
                </div>
            `;

            renderProofSteps('explore', currentProof, false);
            document.getElementById('explore-explanation').textContent = currentProof.explanation;
        }

        function loadPracticeMode() {
            currentProof = getRandomProof(currentDifficulty);

            document.getElementById('practice-problem').innerHTML = `<h4>${currentProof.title}</h4><p>Complete this proof by filling in the statements and reasons.</p>`;
            document.getElementById('practice-theorem').textContent = currentProof.theorem;

            document.getElementById('practice-given-prove').innerHTML = `
                <div class="given-section">
                    <h4>Given:</h4>
                    <p>${currentProof.given}</p>
                </div>
                <div class="prove-section">
                    <h4>Prove:</h4>
                    <p>${currentProof.prove}</p>
                </div>
            `;

            renderProofSteps('practice', currentProof, true);

            const blocksContainer = document.getElementById('practice-blocks');
            blocksContainer.innerHTML = '';
            currentProof.steps.forEach((step, index) => {
                const block = document.createElement('div');
                block.className = 'block template';
                block.textContent = `${step.reason}`;
                block.onclick = () => {
                    const reasonField = document.getElementById(`reason-${index}`);
                    if (reasonField) reasonField.value = step.reason;
                };
                blocksContainer.appendChild(block);
            });

            document.getElementById('feedback').style.display = 'none';
        }

        function checkPracticeSolution() {
            let correct = 0;
            const steps = currentProof.steps;
            const feedback = document.getElementById('feedback');

            steps.forEach((step, index) => {
                const userStmt = document.getElementById(`stmt-${index}`).value.trim();
                const userReason = document.getElementById(`reason-${index}`).value.trim();

                if (userReason.toLowerCase().includes(step.reason.toLowerCase().split(' ')[0])) {
                    correct++;
                }
            });

            if (correct === steps.length) {
                feedback.className = 'feedback success';
                feedback.textContent = '✅ Perfect! Your proof is complete and correct!';
            } else {
                feedback.className = 'feedback error';
                feedback.textContent = `❌ Check your reasons. You got ${correct}/${steps.length} correct.`;
            }
        }

        function loadPlayMode() {
            playTimer = 0;
            playScore = 0;
            document.getElementById('play-score').textContent = playScore;

            if (playTimerInterval) clearInterval(playTimerInterval);
            playTimerInterval = setInterval(() => {
                playTimer++;
                document.getElementById('timer').textContent = playTimer;
            }, 1000);

            currentProof = getRandomProof(currentDifficulty);

            document.getElementById('play-problem').innerHTML = `<h4>${currentProof.title}</h4><p>Assemble this proof quickly!</p>`;
            document.getElementById('play-theorem').textContent = currentProof.theorem;

            renderProofSteps('play', currentProof, true);

            const blocksContainer = document.getElementById('play-blocks');
            blocksContainer.innerHTML = '';
            let shuffled = [...currentProof.steps].sort(() => Math.random() - 0.5);
            shuffled.forEach((step) => {
                const block = document.createElement('div');
                block.className = 'block';
                block.innerHTML = `<div class="block-type">Reason</div>${step.reason}`;
                block.onclick = () => {
                    const reasons = document.querySelectorAll('#play-proof [id^="reason-"]');
                    const emptyReason = Array.from(reasons).find(r => !r.value);
                    if (emptyReason) emptyReason.value = step.reason;
                };
                blocksContainer.appendChild(block);
            });

            document.getElementById('feedback').style.display = 'none';
        }

        function checkPlaySolution() {
            clearInterval(playTimerInterval);
            let correct = 0;
            const steps = currentProof.steps;

            steps.forEach((step, index) => {
                const userReason = document.getElementById(`reason-${index}`).value.trim();
                if (userReason.toLowerCase() === step.reason.toLowerCase()) {
                    correct++;
                }
            });

            const feedback = document.getElementById('feedback');
            const timeBonus = Math.max(0, 100 - playTimer);

            if (correct === steps.length) {
                playScore += (50 + timeBonus);
                feedback.className = 'feedback success';
                feedback.textContent = `✅ Perfect! +${50 + timeBonus} points!`;
            } else {
                feedback.className = 'feedback error';
                feedback.textContent = `❌ ${correct}/${steps.length} correct. Try again!`;
            }
            document.getElementById('play-score').textContent = playScore;
        }

        function resetPlay() {
            clearInterval(playTimerInterval);
            loadPlayMode();
        }

        document.querySelectorAll('.vinculum-mode-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.vinculum-mode-tab').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.dataset.mode;

                document.getElementById('explore-mode').style.display = 'none';
                document.getElementById('practice-mode').style.display = 'none';
                document.getElementById('play-mode').style.display = 'none';

                if (currentMode === 'explore') {
                    document.getElementById('explore-mode').style.display = 'block';
                    loadExploreMode();
                } else if (currentMode === 'practice') {
                    document.getElementById('practice-mode').style.display = 'block';
                    loadPracticeMode();
                } else if (currentMode === 'play') {
                    document.getElementById('play-mode').style.display = 'block';
                    loadPlayMode();
                }
            });
        });

        document.querySelectorAll('.vinculum-diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDifficulty = e.target.dataset.difficulty;

                if (currentMode === 'explore') {
                    loadExploreMode();
                } else if (currentMode === 'practice') {
                    loadPracticeMode();
                } else if (currentMode === 'play') {
                    loadPlayMode();
                }
            });
        });

        loadExploreMode();
    </script>
</body>
</html>
