<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Geometry Tool</title><link rel="stylesheet" href="../../vinculum-core.css"><style>:root{--bg:#0f0f1e;--bg2:#1a1a2e;--card:#16213e;--text:#e0e0e0;--cyan:#00d9ff;--green:#00ff88;--pink:#ff006e;--orange:#ffa500;--grad:linear-gradient(135deg,#00d9ff,#00ff88)}[data-theme="ocean"]{--bg:#0a1628;--card:#0f2847;--cyan:#4dd0e1;--green:#4cd964}[data-theme="forest"]{--bg:#1a2818;--card:#2d4a2b;--cyan:#1abc9c;--green:#52c41a}[data-theme="sunset"]{--bg:#2d1b1f;--card:#4a2835;--cyan:#ff6b9d;--pink:#ffa360}[data-theme="space"]{--bg:#0a0e27;--card:#1a1a3e;--cyan:#7c3aed;--green:#ec4899}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif}.container{max-width:1200px;margin:0 auto;padding:20px}.vinculum-header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:var(--card);border-bottom:2px solid var(--cyan);border-radius:8px;margin-bottom:30px}.vinculum-header-left{display:flex;align-items:center;gap:15px}.vinculum-back-btn{background:0;border:0;color:var(--cyan);cursor:pointer;padding:8px;display:flex;transition:.3s}.vinculum-back-btn:hover{transform:translateX(-3px);color:var(--green)}.vinculum-title-group h1{margin:0;font-size:28px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.vinculum-badges{display:flex;gap:8px;margin-top:5px}.badge,.tag{font-size:11px;padding:4px 8px;border-radius:4px;background:rgba(0,217,255,.2);color:var(--cyan);border:1px solid var(--cyan)}.tag{background:rgba(0,255,136,.2);color:var(--green);border-color:var(--green)}.tabs{display:flex;gap:10px;margin-bottom:30px;border-bottom:2px solid var(--card)}.tab-btn{padding:12px 20px;background:0;border:0;color:var(--text);cursor:pointer;font-size:16px;transition:.3s;border-bottom:3px solid transparent}.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}.tab-content{display:none}.tab-content.active{display:block}.card{background:var(--card);padding:20px;border-radius:8px;border-left:4px solid var(--cyan);margin-bottom:20px}button{padding:10px 20px;background:var(--cyan);color:var(--bg);border:0;border-radius:4px;cursor:pointer;font-weight:600;transition:.3s}button:hover{background:var(--green);transform:translateY(-2px)}.feedback{padding:15px;border-radius:6px;margin:20px 0;display:none;border-left:4px solid var(--green);background:rgba(0,255,136,.1)}.feedback.show{display:block}.feedback.error{border-left-color:var(--pink);background:rgba(255,0,110,.1);color:var(--pink)}</style></head><body><div class="container"><div class="vinculum-header"><div class="vinculum-header-left"><a href="../../VINCULUM-Hub.html" class="vinculum-back-btn" aria-label="Back to Hub"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a><div class="vinculum-title-group"><h1 class="vinculum-title">Geometry Tool</h1><div class="vinculum-badges"><span class="badge">G-CO</span><span class="tag">GEOMETRY</span></div></div></div><div class="vinculum-header-right"><select class="vinculum-theme-select" onchange="document.body.setAttribute('data-theme', this.value)"><option value="">Theme</option><option value="ocean">Ocean</option><option value="forest">Forest</option><option value="sunset">Sunset</option><option value="space">Space</option></select></div></div><div class="tabs"><button class="tab-btn active" onclick="switchTab('explore')">Explore</button><button class="tab-btn" onclick="switchTab('practice')">Practice</button><button class="tab-btn" onclick="switchTab('play')">Play</button></div><div id="explore" class="tab-content active"><div class="card"><h2>Geometry Exploration</h2><p>Discover geometric concepts through interactive visualization.</p></div></div><div id="practice" class="tab-content"><div class="card"><h2>Practice</h2><button onclick="loadPractice()">Start Practice</button></div></div><div id="play" class="tab-content"><div class="card"><h2>Games</h2><button onclick="startGame()">Start Game</button></div></div><div id="feedback" class="feedback"></div></div><script src="../../vinculum-feedback.js"></script><script src="../../vinculum-input.js"></script><script>function switchTab(t){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active')),document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active')),document.getElementById(t).classList.add('active'),event.target.classList.add('active')}function loadPractice(){document.getElementById('feedback').textContent='Practice loaded!',document.getElementById('feedback').classList.add('show')}function startGame(){document.getElementById('feedback').textContent='Game started!',document.getElementById('feedback').classList.add('show')}</script></body></html>
