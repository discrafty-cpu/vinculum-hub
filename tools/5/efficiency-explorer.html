<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efficiency Explorer - VINCULUM Hub</title>
    <link rel="stylesheet" href="../../vinculum-core.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        .vinculum-header {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .vinculum-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #f5576c;
        }
        .vinculum-header p {
            font-size: 1.1em;
            color: #666;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .vinculum-mode-tab {
            background: #e0e0e0;
            color: #333;
        }
        .vinculum-mode-tab.active {
            background: #f5576c;
            color: white;
            transform: scale(1.05);
        }
        .difficulty-selector {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .difficulty-selector label {
            font-weight: bold;
            color: #333;
            margin-right: 10px;
        }
        .vinculum-diff-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid transparent;
        }
        .vinculum-diff-btn.active {
            background: #f093fb;
            color: white;
            border-color: #f5576c;
        }
        .content-area {
            min-height: 400px;
        }
        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .strategy-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        .strategy-card h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .strategy-steps {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95em;
            line-height: 1.6;
        }
        .strategy-efficiency {
            background: rgba(255,255,255,0.3);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .efficiency-badge {
            display: inline-block;
            background: #fff;
            color: #f5576c;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px 5px 0 0;
        }
        .problem-display {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #f5576c;
        }
        .problem-display h3 {
            color: #f5576c;
            margin-bottom: 10px;
        }
        .problem-text {
            font-size: 1.2em;
            color: #333;
            font-weight: bold;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .feedback.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border: 2px solid #4caf50;
        }
        .feedback.error {
            background: #ffebee;
            color: #c62828;
            display: block;
            border: 2px solid #f44336;
        }
        .comparison-area {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .comparison-table th,
        .comparison-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .comparison-table th {
            background: #f5576c;
            color: white;
            font-weight: bold;
        }
        .comparison-table tr:hover {
            background: #f0f0f0;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        button.primary {
            background: #f5576c;
            color: white;
            padding: 12px 30px;
        }
        button.primary:hover {
            background: #e8435a;
            transform: scale(1.05);
        }
        button.secondary {
            background: #f0f0f0;
            color: #333;
            padding: 12px 30px;
        }
        button.secondary:hover {
            background: #e0e0e0;
        }
        .choice-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .choice-btn {
            background: #f0f0f0;
            color: #333;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .choice-btn.selected {
            background: #f5576c;
            color: white;
            transform: scale(1.05);
        }
        .choice-btn.correct {
            background: #4caf50;
            color: white;
        }
        .choice-btn.incorrect {
            background: #f44336;
            color: white;
        }
        .score-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .score-display h3 {
            color: #f5576c;
            margin-bottom: 10px;
        }
        .score-number {
            font-size: 2.5em;
            color: #f5576c;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            .strategy-grid {
                grid-template-columns: 1fr;
            }
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="vinculum-header">
            <h1>⚡ Efficiency Explorer</h1>
            <p>Discover and compare different problem-solving strategies!</p>
        </div>

        <div class="controls">
            <div class="mode-buttons">
                <button class="vinculum-mode-tab active" data-mode="explore">🔍 Explore</button>
                <button class="vinculum-mode-tab" data-mode="practice">📝 Practice</button>
                <button class="vinculum-mode-tab" data-mode="play">🎮 Play</button>
            </div>
            <div class="difficulty-selector">
                <label>Difficulty:</label>
                <button class="vinculum-diff-btn active" data-difficulty="easy">Easy</button>
                <button class="vinculum-diff-btn" data-difficulty="medium">Medium</button>
                <button class="vinculum-diff-btn" data-difficulty="hard">Hard</button>
            </div>
        </div>

        <div id="feedback" class="feedback"></div>

        <div class="content-area">
            <div id="explore-mode">
                <div class="problem-display">
                    <h3>Problem:</h3>
                    <div class="problem-text" id="explore-problem"></div>
                </div>
                <div class="strategy-grid" id="explore-strategies"></div>
                <div class="action-buttons">
                    <button class="primary" onclick="loadExploreMode()">Load New Problem</button>
                </div>
            </div>

            <div id="practice-mode" style="display: none;">
                <div class="problem-display">
                    <h3>Problem:</h3>
                    <div class="problem-text" id="practice-problem"></div>
                </div>
                <div class="comparison-area">
                    <h3>Compare these strategies:</h3>
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>Strategy</th>
                                <th>Steps</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="practice-comparison"></tbody>
                    </table>
                </div>
                <div>
                    <h3 style="color: #f5576c; margin-bottom: 15px;">Which strategy is more efficient?</h3>
                    <div class="choice-buttons" id="practice-choices"></div>
                </div>
                <div class="action-buttons">
                    <button class="primary" onclick="checkPracticeSolution()">Check Answer</button>
                    <button class="secondary" onclick="loadPracticeMode()">New Problem</button>
                </div>
            </div>

            <div id="play-mode" style="display: none;">
                <div class="score-display">
                    <h3>Strategy Showdown</h3>
                    <div class="score-number" id="play-score">0</div>
                    <p>Problems Solved: <span id="problems-solved">0</span>/5</p>
                </div>
                <div class="problem-display">
                    <h3>Problem:</h3>
                    <div class="problem-text" id="play-problem"></div>
                </div>
                <div class="choice-buttons" id="play-choices"></div>
                <div class="action-buttons">
                    <button class="primary" onclick="checkPlaySolution()">Submit Answer</button>
                    <button class="secondary" onclick="resetPlay()">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../vinculum-feedback.js"></script><script src="../../vinculum-guide.js"></script><script src="../../vinculum-indigenous.js"></script><script src="../../indigenous-context-panel.js"></script>
    <script src="../../vinculum-input.js"></script>

    <script>
        const problems = {
            easy: [
                {
                    problem: "Calculate 15 × 3",
                    strategies: [
                        { name: "Skip Counting", steps: "Count by 15s: 15, 30, 45", time: "3 steps", efficient: true },
                        { name: "Repeated Addition", steps: "15 + 15 + 15 = 45", time: "3 steps", efficient: false }
                    ]
                },
                {
                    problem: "What is 24 ÷ 4?",
                    strategies: [
                        { name: "Division Fact", steps: "Recall: 24 ÷ 4 = 6", time: "1 step", efficient: true },
                        { name: "Repeated Subtraction", steps: "24 - 4 - 4 - 4 - 4 - 4 - 4 = 0, counted 6 times", time: "6 steps", efficient: false }
                    ]
                }
            ],
            medium: [
                {
                    problem: "Multiply 23 × 4",
                    strategies: [
                        { name: "Area Model", steps: "(20 × 4) + (3 × 4) = 80 + 12 = 92", time: "3 steps", efficient: true },
                        { name: "Standard Algorithm", steps: "Stack and multiply: 4 × 3, 4 × 20, add results", time: "3 steps", efficient: true },
                        { name: "Repeated Addition", steps: "23 + 23 + 23 + 23", time: "4 additions", efficient: false }
                    ]
                },
                {
                    problem: "Add 47 + 56",
                    strategies: [
                        { name: "Counting On", steps: "47 + 50 + 6 = 103", time: "2 steps", efficient: true },
                        { name: "Standard Algorithm", steps: "7 + 6 = 13 (write 3, carry 1), 4 + 5 + 1 = 10", time: "3 steps", efficient: true },
                        { name: "Ones by Ones", steps: "47 + 1 + 1 + ... + 1 (56 times)", time: "56 steps", efficient: false }
                    ]
                }
            ],
            hard: [
                {
                    problem: "Calculate 125 × 8",
                    strategies: [
                        { name: "Doubling Strategy", steps: "125 × 2 = 250, 250 × 2 = 500, 500 × 2 = 1000", time: "3 steps", efficient: true },
                        { name: "Distributive Property", steps: "(100 × 8) + (25 × 8) = 800 + 200 = 1000", time: "3 steps", efficient: true },
                        { name: "Standard Algorithm", steps: "Multiply each digit, manage carries and place values", time: "4 steps", efficient: false }
                    ]
                },
                {
                    problem: "Divide 144 by 12",
                    strategies: [
                        { name: "Factor Recognition", steps: "12 × 12 = 144, so 144 ÷ 12 = 12", time: "1 step", efficient: true },
                        { name: "Long Division", steps: "Set up division, divide, multiply, subtract, bring down", time: "5+ steps", efficient: false },
                        { name: "Partial Quotients", steps: "12 × 10 = 120, remainder 24, 12 × 2 = 24, total 12", time: "3 steps", efficient: true }
                    ]
                }
            ]
        };

        let currentMode = 'explore';
        let currentDifficulty = 'easy';
        let currentProblem = null;
        let playScore = 0;
        let problemsSolved = 0;
        let selectedStrategy = null;

        function getRandomProblem(difficulty) {
            const list = problems[difficulty];
            return list[Math.floor(Math.random() * list.length)];
        }

        function displayStrategies(modeId, strats) {
            const container = document.getElementById(`${modeId}-strategies`);
            if (!container) return;
            container.innerHTML = '';

            strats.forEach((strategy, index) => {
                const card = document.createElement('div');
                card.className = 'strategy-card';
                const efficiencyBadge = strategy.efficient ? '✨ Most Efficient' : '🐢 Less Efficient';
                card.innerHTML = `
                    <h3>${strategy.name}</h3>
                    <div class="strategy-steps">
                        <strong>Steps:</strong><br>${strategy.steps}
                    </div>
                    <div class="strategy-efficiency">
                        <strong>Time:</strong> ${strategy.time}<br>
                        <span class="efficiency-badge">${efficiencyBadge}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function loadExploreMode() {
            currentProblem = getRandomProblem(currentDifficulty);
            document.getElementById('explore-problem').textContent = currentProblem.problem;
            displayStrategies('explore', currentProblem.strategies);
            document.getElementById('feedback').style.display = 'none';
        }

        function loadPracticeMode() {
            currentProblem = getRandomProblem(currentDifficulty);
            document.getElementById('practice-problem').textContent = currentProblem.problem;
            selectedStrategy = null;

            const comparisonBody = document.getElementById('practice-comparison');
            comparisonBody.innerHTML = '';
            currentProblem.strategies.forEach((strat) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${strat.name}</strong></td>
                    <td>${strat.steps}</td>
                    <td>${strat.time}</td>
                `;
                comparisonBody.appendChild(row);
            });

            const choicesDiv = document.getElementById('practice-choices');
            choicesDiv.innerHTML = '';
            currentProblem.strategies.forEach((strat, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = strat.name;
                btn.onclick = () => selectPracticeStrategy(index);
                choicesDiv.appendChild(btn);
            });

            document.getElementById('feedback').style.display = 'none';
        }

        function selectPracticeStrategy(index) {
            selectedStrategy = index;
            document.querySelectorAll('#practice-choices .choice-btn').forEach((btn, i) => {
                btn.classList.toggle('selected', i === index);
            });
        }

        function checkPracticeSolution() {
            if (selectedStrategy === null) {
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback error';
                feedback.textContent = '❌ Please select a strategy first!';
                return;
            }

            const isCorrect = currentProblem.strategies[selectedStrategy].efficient;
            const feedback = document.getElementById('feedback');

            document.querySelectorAll('#practice-choices .choice-btn').forEach((btn, i) => {
                btn.classList.remove('selected');
                if (i === selectedStrategy) {
                    btn.classList.add(isCorrect ? 'correct' : 'incorrect');
                }
                if (i < currentProblem.strategies.length && currentProblem.strategies[i].efficient && i !== selectedStrategy) {
                    btn.classList.add('correct');
                }
            });

            if (isCorrect) {
                feedback.className = 'feedback success';
                feedback.textContent = '✅ Excellent! You chose the most efficient strategy!';
            } else {
                feedback.className = 'feedback error';
                feedback.textContent = '❌ Not quite. Look for the strategy with fewest steps!';
            }
        }

        function loadPlayMode() {
            problemsSolved = 0;
            playScore = 0;
            updatePlayScore();
            loadPlayProblem();
        }

        function loadPlayProblem() {
            if (problemsSolved >= 5) {
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback success';
                feedback.textContent = `🎉 Challenge Complete! Final Score: ${playScore}`;
                document.querySelectorAll('#play-choices .choice-btn').forEach(btn => btn.disabled = true);
                return;
            }

            currentProblem = getRandomProblem(currentDifficulty);
            document.getElementById('play-problem').textContent = currentProblem.problem;
            selectedStrategy = null;

            const choicesDiv = document.getElementById('play-choices');
            choicesDiv.innerHTML = '';
            currentProblem.strategies.forEach((strat, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = strat.name;
                btn.onclick = () => selectPlayStrategy(index);
                choicesDiv.appendChild(btn);
            });

            document.getElementById('feedback').style.display = 'none';
        }

        function selectPlayStrategy(index) {
            selectedStrategy = index;
            document.querySelectorAll('#play-choices .choice-btn').forEach((btn, i) => {
                btn.classList.toggle('selected', i === index);
            });
        }

        function checkPlaySolution() {
            if (selectedStrategy === null) {
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback error';
                feedback.textContent = '❌ Please select a strategy!';
                return;
            }

            const isCorrect = currentProblem.strategies[selectedStrategy].efficient;
            document.querySelectorAll('#play-choices .choice-btn').forEach((btn, i) => {
                btn.classList.remove('selected');
                if (i === selectedStrategy) {
                    btn.classList.add(isCorrect ? 'correct' : 'incorrect');
                }
            });

            if (isCorrect) {
                playScore += 10;
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback success';
                feedback.textContent = '✅ Correct! +10 points!';
            } else {
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback error';
                feedback.textContent = '❌ Not correct. Try the next one!';
            }

            problemsSolved++;
            updatePlayScore();
            setTimeout(loadPlayProblem, 1500);
        }

        function updatePlayScore() {
            document.getElementById('play-score').textContent = playScore;
            document.getElementById('problems-solved').textContent = problemsSolved;
        }

        function resetPlay() {
            loadPlayMode();
        }

        document.querySelectorAll('.vinculum-mode-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.vinculum-mode-tab').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.dataset.mode;

                document.getElementById('explore-mode').style.display = 'none';
                document.getElementById('practice-mode').style.display = 'none';
                document.getElementById('play-mode').style.display = 'none';

                if (currentMode === 'explore') {
                    document.getElementById('explore-mode').style.display = 'block';
                    loadExploreMode();
                } else if (currentMode === 'practice') {
                    document.getElementById('practice-mode').style.display = 'block';
                    loadPracticeMode();
                } else if (currentMode === 'play') {
                    document.getElementById('play-mode').style.display = 'block';
                    loadPlayMode();
                }
            });
        });

        document.querySelectorAll('.vinculum-diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDifficulty = e.target.dataset.difficulty;

                if (currentMode === 'explore') {
                    loadExploreMode();
                } else if (currentMode === 'practice') {
                    loadPracticeMode();
                } else if (currentMode === 'play') {
                    loadPlayMode();
                }
            });
        });

        loadExploreMode();
    </script>
</body>
</html>
