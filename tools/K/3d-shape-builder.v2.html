<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VINCULUM — 3D Shape Builder</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

.vinculum-rtm-btn .rtm-icon{font-size:14px;}
*:focus-visible { outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px; }
.sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
  height:100vh; display:flex; flex-direction:column; overflow:hidden; user-select:none;
}

.vinculum-diff-btn:hover { color:var(--text2); }
.main { flex:1; display:flex; overflow:hidden; }

.workspace {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding:12px 16px; position:relative; overflow-y:auto;
}

/* ── 3D CANVAS ── */
.canvas-wrap {
  position:relative; border:2px solid var(--border); border-radius:16px;
  background:var(--card); overflow:hidden; cursor:grab;
  touch-action:none; -webkit-touch-callout:none;
}
.canvas-wrap:active { cursor:grabbing; }
.canvas-wrap canvas { display:block; }
.rotate-hint {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  font-size:11px; color:var(--muted); pointer-events:none; white-space:nowrap;
  opacity:0.7; transition:opacity 0.5s;
}
.canvas-wrap:active .rotate-hint { opacity:0; }

/* ── FACE COUNTER ── */
.face-counter {
  display:flex; gap:16px; justify-content:center; margin-top:10px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:8px 16px;
}
.counter-item { text-align:center; }
.counter-value {
  font-size:24px; font-weight:900; font-family:'JetBrains Mono',monospace;
  color:var(--cyan);
}
.counter-value.correct { color:var(--green); }
.counter-value.wrong { color:var(--pink); }
.counter-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

/* ── SHAPE PICKER ── */
.shape-picker {
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  margin-top:10px; padding:6px 10px;
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
}
.shape-pick-btn {
  width:56px; height:56px; border:2px solid var(--border); border-radius:10px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  background:var(--card); transition:all 0.2s; position:relative;
  -webkit-tap-highlight-color:transparent; flex-direction:column; gap:2px;
}
.shape-pick-btn:hover { border-color:var(--cyan); transform:scale(1.05); }
.shape-pick-btn.active { border-color:var(--cyan); background:rgba(0,212,255,0.1); box-shadow:0 0 10px rgba(0,212,255,0.2); }
.shape-pick-btn .sp-name { font-size:7px; color:var(--muted); text-transform:uppercase; font-weight:700; }

/* ── INSTRUCTION BOX ── */
.instruction-box {
  text-align:center; padding:10px 16px; background:var(--card);
  border:1px solid var(--border); border-radius:12px;
  margin-bottom:10px; max-width:520px; width:100%;
}
.instruction-box .inst-label {
  font-size:11px; color:var(--cyan); font-weight:700;
  text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;
}
.instruction-box .inst-text {
  font-size:16px; font-weight:700; color:var(--text); line-height:1.4;
}

/* ── MC GRID ── */
.mc-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px; max-width:440px; width:100%; }
.mc-btn {
  padding:12px 14px; border-radius:10px; border:2px solid var(--border);
  background:var(--card); color:var(--text); font-size:14px; font-weight:600;
  font-family:inherit; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; gap:8px; -webkit-tap-highlight-color:transparent;
}
.mc-btn:hover { border-color:var(--cyan); background:rgba(0,212,255,0.05); }
.mc-btn.correct-flash { border-color:var(--green); background:rgba(0,230,118,0.15); color:var(--green); }
.mc-btn.incorrect-flash { border-color:var(--pink); background:rgba(255,59,139,0.15); color:var(--pink); }

/* ── PROPERTY BADGE ── */
.prop-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700;
  background:var(--card); border:1px solid var(--border);
}

/* ── CONTROLS ── */
.controls { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; justify-content:center; }
.ctrl-btn {
  padding:8px 16px; border-radius:10px; border:1px solid var(--border);
  background:var(--card); color:var(--text2); font-size:13px; font-weight:600;
  font-family:inherit; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; gap:6px; -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:hover { background:var(--bg2); color:var(--text); }
.ctrl-btn.primary { background:var(--grad); color:var(--bg); border-color:transparent; }

/* ── SCORE ── */
.score-display { text-align:center; padding:14px; background:var(--card); border-radius:12px; margin-bottom:12px; }
.score-value {
  font-size:36px; font-weight:900; font-family:'JetBrains Mono',monospace;
  background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.score-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.streak-bar { height:6px; background:var(--card); border-radius:3px; overflow:hidden; margin-top:8px; }
.streak-fill { height:100%; background:var(--grad); border-radius:3px; transition:width 0.3s; }
.progress-dots { display:flex; gap:5px; justify-content:center; margin-bottom:6px; }
.progress-dot { width:9px; height:9px; border-radius:50%; background:var(--border); }
.progress-dot.correct { background:var(--green); }
.progress-dot.wrong { background:var(--pink); }
.progress-dot.current { background:var(--cyan); box-shadow:0 0 6px var(--cyan); }

/* ── FEEDBACK ── */
.feedback {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  padding:20px 40px; border-radius:20px; font-size:18px; font-weight:700;
  z-index:200; pointer-events:none;
  transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.3s;
  opacity:0; text-align:center; max-width:90vw; line-height:1.4;
}
.feedback.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
.feedback.correct { background:rgba(0,230,118,0.15); color:var(--green); border:2px solid var(--green); }
.feedback.incorrect { background:rgba(255,59,139,0.15); color:var(--pink); border:2px solid var(--pink); }
.feedback.try-again { background:rgba(255,193,7,0.15); color:var(--yellow); border:2px solid var(--yellow); }

/* ── SIDE PANEL ── */
.side-panel { width:280px; background:var(--bg2); border-left:1px solid var(--border); padding:20px; overflow-y:auto; flex-shrink:0; }
.panel-section { margin-bottom:18px; }
.panel-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; }
.panel-text { font-size:13px; color:var(--text2); line-height:1.6; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>

<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" data-mode="explore">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" data-mode="practice">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>

  <div class="vinculum-diff-selector">

    <button class="vinculum-diff-btn active" id="diffE" data-diff="emergent">Cube+Sphere</button>
    <button class="vinculum-diff-btn" id="diffP" data-diff="proficient">4 Shapes</button>
    <button class="vinculum-diff-btn" id="diffA" data-diff="advanced">All</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>
// ══════════════════════════════════════════════════
// 3D SHAPE BUILDER — REAL 3D CANVAS WITH ROTATION
// ══════════════════════════════════════════════════

var PI = Math.PI;
var CW = 460; // canvas width
var CH = 360; // canvas height
var FOCAL = 400; // perspective focal length
var SHAPE_SCALE = 120; // shape size in pixels

// ═══ 3D MATH ═══
function rotateX(v, a) {
  var c=Math.cos(a), s=Math.sin(a);
  return [v[0], v[1]*c - v[2]*s, v[1]*s + v[2]*c];
}
function rotateY(v, a) {
  var c=Math.cos(a), s=Math.sin(a);
  return [v[0]*c + v[2]*s, v[1], -v[0]*s + v[2]*c];
}
function project(v) {
  var d = FOCAL / (FOCAL + v[2]);
  return [CW/2 + v[0]*d, CH/2 + v[1]*d, d];
}
function cross(a, b) {
  return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
}
function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function norm(v) { var l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]); return l>0?[v[0]/l,v[1]/l,v[2]/l]:[0,0,1]; }
function faceCenter(verts, indices) {
  var cx=0,cy=0,cz=0;
  indices.forEach(function(i){cx+=verts[i][0];cy+=verts[i][1];cz+=verts[i][2];});
  var n=indices.length;
  return [cx/n,cy/n,cz/n];
}
function faceNormal(verts, indices) {
  var a=verts[indices[0]], b=verts[indices[1]], c=verts[indices[2]];
  return norm(cross(sub(b,a), sub(c,a)));
}

// ═══ 3D SHAPE GEOMETRY ═══
function makeShape(type) {
  var verts=[], faces=[], edges=[], faceColors=[];
  var FACE_PALETTE = ['#00d4ff','#ff3b8b','#ffc107','#00e676','#b388ff','#ff6e40','#40c4ff','#ea80fc',
                       '#4dd0e1','#f48fb1','#fff176','#81c784','#ce93d8','#ffab91'];

  if (type === 'cube') {
    var s=0.5;
    verts=[[-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],[-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]];
    faces=[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[4,5,1,0],[3,2,6,7]];
    edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  } else if (type === 'sphere') {
    var rings=8, segs=12;
    for(var i=0;i<=rings;i++){
      var phi=PI*i/rings;
      for(var j=0;j<segs;j++){
        var theta=2*PI*j/segs;
        verts.push([0.5*Math.sin(phi)*Math.cos(theta), 0.5*Math.cos(phi), 0.5*Math.sin(phi)*Math.sin(theta)]);
      }
    }
    for(var i=0;i<rings;i++){
      for(var j=0;j<segs;j++){
        var a=i*segs+j, b=i*segs+(j+1)%segs, c=(i+1)*segs+(j+1)%segs, d=(i+1)*segs+j;
        faces.push([a,b,c,d]);
        edges.push([a,b],[a,d]);
      }
    }
  } else if (type === 'cylinder') {
    var N=16, h=0.6, r=0.4;
    // Top ring
    for(var i=0;i<N;i++){var a=2*PI*i/N; verts.push([r*Math.cos(a),-h/2,r*Math.sin(a)]);}
    // Bottom ring
    for(var i=0;i<N;i++){var a=2*PI*i/N; verts.push([r*Math.cos(a),h/2,r*Math.sin(a)]);}
    // Top face
    var topFace=[]; for(var i=0;i<N;i++) topFace.push(i); faces.push(topFace);
    // Bottom face (reversed for correct normal)
    var botFace=[]; for(var i=N-1;i>=0;i--) botFace.push(i+N); faces.push(botFace);
    // Side faces
    for(var i=0;i<N;i++){
      var a=i, b=(i+1)%N, c=(i+1)%N+N, d=i+N;
      faces.push([a,b,c,d]);
      edges.push([a,b],[a,d]);
    }
    // Circle edges
    for(var i=0;i<N;i++){edges.push([i,(i+1)%N]); edges.push([i+N,(i+1)%N+N]);}
  } else if (type === 'cone') {
    var N=16, h=0.7, r=0.4;
    // Apex
    verts.push([0,-h/2,0]); // index 0
    // Base ring
    for(var i=0;i<N;i++){var a=2*PI*i/N; verts.push([r*Math.cos(a),h/2,r*Math.sin(a)]);}
    // Base face (reversed)
    var baseFace=[]; for(var i=N;i>=1;i--) baseFace.push(i); faces.push(baseFace);
    // Side triangles
    for(var i=0;i<N;i++){
      faces.push([0, i+1, (i+1)%N+1]);
      edges.push([0,i+1],[i+1,(i+1)%N+1]);
    }
  } else if (type === 'rectangular prism') {
    var sx=0.65,sy=0.4,sz=0.35;
    verts=[[-sx,-sy,-sz],[sx,-sy,-sz],[sx,sy,-sz],[-sx,sy,-sz],[-sx,-sy,sz],[sx,-sy,sz],[sx,sy,sz],[-sx,sy,sz]];
    faces=[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[4,5,1,0],[3,2,6,7]];
    edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  }

  // Assign colors to faces
  faces.forEach(function(f, i) {
    faceColors.push(FACE_PALETTE[i % FACE_PALETTE.length]);
  });

  return { verts:verts, faces:faces, edges:edges, faceColors:faceColors, type:type };
}

// ═══ 3D SHAPE DATA ═══
var SHAPE_DATA = {
  'cube':              { name:'Cube',             faces:6, edges:12, vertices:8, realWorld:['dice','block','ice cube','box'], faceShape:'squares' },
  'sphere':            { name:'Sphere',           faces:0, edges:0,  vertices:0, realWorld:['ball','globe','marble','orange'], faceShape:'none (curved)' },
  'cylinder':          { name:'Cylinder',         faces:2, edges:2,  vertices:0, realWorld:['can','log','pipe','marker'], faceShape:'circles' },
  'cone':              { name:'Cone',             faces:1, edges:1,  vertices:1, realWorld:['party hat','ice cream cone','funnel','traffic cone'], faceShape:'circle' },
  'rectangular prism': { name:'Rectangular Prism', faces:6, edges:12, vertices:8, realWorld:['book','brick','cereal box','shoe box'], faceShape:'rectangles' }
};

// ═══ MISCONCEPTIONS ═══
var MISCONCEPTIONS = {
  flatVsSolid: { id:'2d-3d', msg:function(s){ return 'A '+s+' is a 3D shape — you can HOLD it. Try rotating it!'; } },
  faceConfusion: { id:'faces', msg:function(s,f){ return 'Faces are the FLAT parts. A '+s+' has '+f+' flat face'+(f!==1?'s':'')+'.'; } },
  edgeConfusion: { id:'edges', msg:function(s,e){ return 'Edges are where two faces MEET. A '+s+' has '+e+' edge'+(e!==1?'s':'')+'.'; } },
  vertexConfusion: { id:'vertices', msg:function(s,v){ return 'Vertices are CORNERS where edges meet. A '+s+' has '+v+'.'; } },
  curvedVsFlat: { id:'curved', msg:function(){ return 'Curved surfaces are NOT faces. Only FLAT surfaces count as faces!'; } }
};

// ═══ STATE ═══
var S = {
  mode:'explore', diff:'emergent',
  shapeType:'cube',
  rotX: -0.4, rotY: 0.5,
  highlightedFaces: {},
  shape3d: null,
  // Practice
  pShapeType: null, pQuestion: null, pAnswer: null,
  pChoices: [], pAnswered: false,
  // Play
  score:0, streak:0, best:0, round:0, total:10,
  roundResults: [],
  playShapeType:null, playQuestion:null, playAnswer:null,
  playChoices:[], playAnswered:false
};

// ═══ HELPERS ═══
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=randInt(0,i);var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function showFB(text,type){var fb=document.getElementById('feedback');fb.textContent=text;fb.className='feedback '+type+' show';setTimeout(function(){fb.classList.remove('show');},2200);}
function toggleReadAloud(){
  if(window.VinculumStories&&VinculumStories.isReading()){VinculumStories.stopReading();document.getElementById('readAloudBtn').textContent='🔊 Read to Me';}
  else{var text=S.shape3d?'This is a '+S.shapeType+'. '+SHAPE_DATA[S.shapeType].realWorld.join(', ')+' are '+S.shapeType+'s.':'Welcome to 3D Shape Builder!';
  if(window.VinculumStories){VinculumStories.readAloud(text,{rate:0.85,onComplete:function(){document.getElementById('readAloudBtn').textContent='🔊 Read to Me';}});document.getElementById('readAloudBtn').textContent='⏹ Stop';}}
}

function getAvailable() {
  if(S.diff==='emergent') return ['cube','sphere'];
  if(S.diff==='proficient') return ['cube','sphere','cylinder','cone'];
  return ['cube','sphere','cylinder','cone','rectangular prism'];
}

// ═══ 3D CANVAS RENDERER ═══
function drawShape(canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);

  if (!S.shape3d) return;

  var shape = S.shape3d;
  var rotatedVerts = shape.verts.map(function(v) {
    var rv = [v[0]*SHAPE_SCALE, v[1]*SHAPE_SCALE, v[2]*SHAPE_SCALE];
    rv = rotateX(rv, S.rotX);
    rv = rotateY(rv, S.rotY);
    return rv;
  });

  // Compute face depths for painter's algorithm
  var faceDepths = shape.faces.map(function(face, fi) {
    var c = faceCenter(rotatedVerts, face);
    return { idx:fi, depth:c[2] };
  });
  faceDepths.sort(function(a,b){ return a.depth - b.depth; }); // far to near

  // Draw faces
  faceDepths.forEach(function(fd) {
    var fi = fd.idx;
    var face = shape.faces[fi];
    var n = faceNormal(rotatedVerts, face);
    var viewDir = [0, 0, 1];
    var dotVal = dot(n, viewDir);

    // Back-face culling (but draw with reduced alpha for sphere)
    var isSphere = shape.type === 'sphere';
    if (dotVal < 0 && !isSphere) return;
    if (dotVal < -0.3 && isSphere) return;

    var pts = face.map(function(vi){ return project(rotatedVerts[vi]); });

    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (var i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();

    // Fill with face color
    var baseColor = shape.faceColors[fi];
    var brightness = 0.4 + 0.6 * Math.max(0, dotVal);
    var highlighted = !!S.highlightedFaces[fi];

    if (highlighted) {
      ctx.fillStyle = 'rgba(0,230,118,0.6)';
      ctx.strokeStyle = '#00e676';
      ctx.lineWidth = 3;
    } else if (isSphere) {
      var alpha = 0.15 + 0.4 * Math.max(0, dotVal);
      ctx.fillStyle = hexToRgba(baseColor, alpha);
      ctx.strokeStyle = hexToRgba(baseColor, alpha * 0.8);
      ctx.lineWidth = 0.5;
    } else {
      ctx.fillStyle = hexToRgba(baseColor, brightness * 0.7);
      ctx.strokeStyle = 'rgba(255,255,255,' + (0.3 + 0.4*brightness) + ')';
      ctx.lineWidth = 1.5;
    }
    ctx.fill();
    ctx.stroke();
  });

  // Draw edges (for non-sphere)
  if (shape.type !== 'sphere') {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    shape.edges.forEach(function(e) {
      var a = project(rotatedVerts[e[0]]);
      var b = project(rotatedVerts[e[1]]);
      ctx.beginPath();
      ctx.moveTo(a[0], a[1]);
      ctx.lineTo(b[0], b[1]);
      ctx.stroke();
    });
  }

  // Draw vertices (for shapes that have them)
  var data = SHAPE_DATA[shape.type];
  if (data && data.vertices > 0) {
    ctx.fillStyle = '#fff';
    // Only draw actual geometric vertices (not mesh vertices)
    var uniqueVerts = {};
    shape.edges.forEach(function(e) {
      [e[0], e[1]].forEach(function(vi) {
        if (!uniqueVerts[vi]) {
          var pt = project(rotatedVerts[vi]);
          ctx.beginPath();
          ctx.arc(pt[0], pt[1], 3 * pt[2], 0, 2*PI);
          ctx.fill();
          uniqueVerts[vi] = true;
        }
      });
    });
  }
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// ═══ DRAG-TO-ROTATE ═══
var dragRot = null;

function initRotateDrag(e) {
  e.preventDefault();
  var cx = e.clientX || (e.touches && e.touches[0].clientX) || 0;
  var cy = e.clientY || (e.touches && e.touches[0].clientY) || 0;
  dragRot = { startX:cx, startY:cy, startRotX:S.rotX, startRotY:S.rotY };
  document.addEventListener('pointermove', onRotateMove, {passive:false});
  document.addEventListener('pointerup', onRotateEnd);
}
function onRotateMove(e) {
  if (!dragRot) return;
  e.preventDefault();
  var cx = e.clientX || 0;
  var cy = e.clientY || 0;
  S.rotY = dragRot.startRotY + (cx - dragRot.startX) * 0.01;
  S.rotX = dragRot.startRotX + (cy - dragRot.startY) * 0.01;
  S.rotX = Math.max(-PI/2, Math.min(PI/2, S.rotX));
  drawShape('canvas3d');
}
function onRotateEnd() {
  dragRot = null;
  document.removeEventListener('pointermove', onRotateMove);
  document.removeEventListener('pointerup', onRotateEnd);
}

// ═══ FACE TAP DETECTION ═══
function onCanvasTap(e) {
  if (S.mode !== 'explore' && S.mode !== 'practice') return;
  if (!S.shape3d) return;
  if (S.shape3d.type === 'sphere') return; // sphere has no flat faces

  var canvas = document.getElementById('canvas3d');
  if (!canvas) return;
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  var shape = S.shape3d;
  var rotatedVerts = shape.verts.map(function(v) {
    var rv = [v[0]*SHAPE_SCALE, v[1]*SHAPE_SCALE, v[2]*SHAPE_SCALE];
    rv = rotateX(rv, S.rotX);
    rv = rotateY(rv, S.rotY);
    return rv;
  });

  // Check faces front-to-back
  var faceDepths = shape.faces.map(function(face, fi) {
    var c = faceCenter(rotatedVerts, face);
    return { idx:fi, depth:c[2] };
  });
  faceDepths.sort(function(a,b){ return b.depth - a.depth; }); // near to far

  for (var f = 0; f < faceDepths.length; f++) {
    var fi = faceDepths[f].idx;
    var face = shape.faces[fi];
    var n = faceNormal(rotatedVerts, face);
    if (dot(n, [0,0,1]) < 0) continue; // skip back faces

    var pts = face.map(function(vi){ return project(rotatedVerts[vi]); });

    // Point-in-polygon test
    if (pointInPolygon(mx, my, pts)) {
      // Toggle highlight
      if (S.highlightedFaces[fi]) {
        delete S.highlightedFaces[fi];
      } else {
        S.highlightedFaces[fi] = true;
      }
      drawShape('canvas3d');
      updateFaceCounter();
      return;
    }
  }
}

function pointInPolygon(px, py, pts) {
  var inside = false;
  for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    var xi = pts[i][0], yi = pts[i][1];
    var xj = pts[j][0], yj = pts[j][1];
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function updateFaceCounter() {
  var el = document.getElementById('faceCount');
  if (el) {
    var count = Object.keys(S.highlightedFaces).length;
    el.textContent = count;
    var data = SHAPE_DATA[S.shapeType];
    if (data) {
      // For shapes with many mesh faces (cylinder, cone), count highlighted unique geometric faces
      var realFaces = data.faces;
      if (count === realFaces && realFaces > 0) {
        el.className = 'counter-value correct';
      } else if (count > realFaces) {
        el.className = 'counter-value wrong';
      } else {
        el.className = 'counter-value';
      }
    }
  }
}

// ═══ MODE SWITCHING ═══
function setMode(mode) {
  S.mode = mode;
  S.highlightedFaces = {};
  S.pAnswered = false;
  S.playAnswered = false;
  if (mode === 'play') { S.round = 0; S.score = 0; S.streak = 0; S.roundResults = []; }
  document.querySelectorAll('.vinculum-mode-tab').forEach(function(t){ t.classList.remove('active-explore','active-practice','active-play'); });
  var tabEl = document.querySelector('[data-mode="'+mode+'"]');
  if (tabEl) tabEl.classList.add('active-'+mode);
  render();

function setDiff(diff) {
  S.diff = diff;
  document.querySelectorAll('.vinculum-diff-btn').forEach(function(b){b.classList.remove('active');});

  var avail = getAvailable();
  if (avail.indexOf(S.shapeType) === -1) S.shapeType = avail[0];
  setMode(S.mode);
}

function selectShape(type) {
  S.shapeType = type;
  S.shape3d = makeShape(type);
  S.highlightedFaces = {};
  S.rotX = -0.4; S.rotY = 0.5;

}

// ═══ RENDER ═══
function render() {
  var ws = document.getElementById('workspace');
  var sp = document.getElementById('sidePanel');
  S.shape3d = makeShape(S.shapeType);

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);

  // Attach canvas listeners after render
  setTimeout(function() {
    var canvas = document.getElementById('canvas3d');
    if (canvas) {
      canvas.addEventListener('pointerdown', function(e) {
        // Short tap = face select, long drag = rotate
        var startTime = Date.now();
        var startX = e.clientX, startY = e.clientY;
        var moved = false;

        function onMove(ev) {
          var dx = ev.clientX - startX, dy = ev.clientY - startY;
          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
        }
        function onUp(ev) {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          if (!moved && (Date.now() - startTime) < 300) {
            onCanvasTap(ev);
          }
        }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);

        initRotateDrag(e);
      }, {passive:false});
    }
  }, 10);

  setTimeout(function() { drawShape('canvas3d'); }, 20);
}

function newPracticeQ() {
  var avail = getAvailable();
  S.pShapeType = avail[randInt(0, avail.length - 1)];
  S.pAnswered = false;
  S.highlightedFaces = {};
  var data = SHAPE_DATA[S.pShapeType];

  // Random question type
  var qTypes = ['name','faces','edges','vertices'];
  if (S.diff === 'emergent') qTypes = ['name','faces'];
  var qType = qTypes[randInt(0, qTypes.length - 1)];

  if (qType === 'name') {
    S.pQuestion = 'What is this 3D shape called?';
    S.pAnswer = data.name;
    var choices = [{ label:data.name, value:data.name }];
    avail.forEach(function(t) {
      if (t !== S.pShapeType && choices.length < 4) {
        choices.push({ label:SHAPE_DATA[t].name, value:SHAPE_DATA[t].name });
      }
    });
    while (choices.length < 4) {
      var extras = ['Pyramid','Pentagon','Hexagon','Octagon'];
      choices.push({ label:extras[choices.length-1], value:extras[choices.length-1] });
    }
    S.pChoices = shuffle(choices);
  } else if (qType === 'faces') {
    S.pQuestion = 'How many FACES does this ' + data.name + ' have?';
    S.pAnswer = data.faces;
    var choices = [{ label:data.faces + ' faces', value:data.faces }];
    var wrongs = [data.faces+1, data.faces-1, data.faces+2].filter(function(x){return x>=0;});
    wrongs.forEach(function(w) {
      if (choices.length < 4) choices.push({ label:w+' faces', value:w });
    });
    while (choices.length < 4) choices.push({ label:(choices.length+3)+' faces', value:choices.length+3 });
    S.pChoices = shuffle(choices);
  } else if (qType === 'edges') {
    S.pQuestion = 'How many EDGES does this ' + data.name + ' have?';
    S.pAnswer = data.edges;
    var choices = [{ label:data.edges+' edges', value:data.edges }];
    [data.edges+1, data.edges-1, data.edges+4, data.edges-2].filter(function(x){return x>=0;}).forEach(function(w) {
      if (choices.length < 4) choices.push({ label:w+' edges', value:w });
    });
    while (choices.length < 4) choices.push({ label:(choices.length+5)+' edges', value:choices.length+5 });
    S.pChoices = shuffle(choices);
  } else {
    S.pQuestion = 'How many VERTICES (corners) does this ' + data.name + ' have?';
    S.pAnswer = data.vertices;
    var choices = [{ label:data.vertices+' vertices', value:data.vertices }];
    [data.vertices+1, data.vertices-1, data.vertices+2].filter(function(x){return x>=0;}).forEach(function(w) {
      if (choices.length < 4) choices.push({ label:w+' vertices', value:w });
    });
    while (choices.length < 4) choices.push({ label:(choices.length+2)+' vertices', value:choices.length+2 });
    S.pChoices = shuffle(choices);
  }
}

function practiceAnswer(ci) {
  if (S.pAnswered) return;
  S.pAnswered = true;

  var choice = S.pChoices[ci];
  var btn = document.getElementById('pBtn'+ci);

  if (choice.value === S.pAnswer) {
    if (btn) btn.classList.add('correct-flash');
    showFB('Correct! ' + SHAPE_DATA[S.pShapeType].name + '!', 'correct');
  } else {
    if (btn) btn.classList.add('incorrect-flash');
    S.pChoices.forEach(function(c,i) {
      if (c.value === S.pAnswer) {
        var cb = document.getElementById('pBtn'+i);
        if (cb) cb.classList.add('correct-flash');
      }
    });
    var data = SHAPE_DATA[S.pShapeType];
    if (S.pQuestion.indexOf('faces') !== -1 && data.faces === 0) {
      showFB(MISCONCEPTIONS.curvedVsFlat.msg(), 'try-again');
    } else if (S.pQuestion.indexOf('faces') !== -1) {
      showFB(MISCONCEPTIONS.faceConfusion.msg(data.name, data.faces), 'try-again');
    } else {
      showFB('Not quite! The answer is ' + S.pAnswer + '.', 'incorrect');
    }
  }

  setTimeout(function() { newPracticeQ(); render(); }, 2200);
}

function newPlayQ() {
  var avail = getAvailable();
  S.playShapeType = avail[randInt(0, avail.length - 1)];
  S.playAnswered = false;
  S.highlightedFaces = {};
  var data = SHAPE_DATA[S.playShapeType];

  var qTypes = ['name','faces','edges','vertices','realworld'];
  if (S.diff === 'emergent') qTypes = ['name','faces'];
  var qType = qTypes[randInt(0, qTypes.length - 1)];

  if (qType === 'name') {
    S.playQuestion = 'What is this 3D shape?';
    S.playAnswer = data.name;
    var choices = [{ label:shapeEmoji(S.playShapeType)+' '+data.name, value:data.name }];
    avail.forEach(function(t) {
      if (t !== S.playShapeType && choices.length < 4) {
        choices.push({ label:shapeEmoji(t)+' '+SHAPE_DATA[t].name, value:SHAPE_DATA[t].name });
      }
    });
    while (choices.length < 4) {
      var extras = [{l:'🔺 Pyramid',v:'Pyramid'},{l:'⬡ Hexagon',v:'Hexagon'},{l:'⬠ Pentagon',v:'Pentagon'}];
      choices.push(extras[choices.length-1] ? {label:extras[choices.length-1].l,value:extras[choices.length-1].v} : {label:'❓ Unknown',value:'Unknown'});
    }
    S.playChoices = shuffle(choices);
  } else if (qType === 'faces') {
    S.playQuestion = 'How many faces does this '+data.name+' have?';
    S.playAnswer = data.faces;
    var choices = [{ label:data.faces+'', value:data.faces }];
    [data.faces+1,data.faces-1,data.faces+2].filter(function(x){return x>=0;}).forEach(function(w) {
      if (choices.length < 4 && w !== data.faces) choices.push({ label:w+'', value:w });
    });
    while (choices.length < 4) choices.push({ label:(choices.length+4)+'', value:choices.length+4 });
    S.playChoices = shuffle(choices);
  } else if (qType === 'edges') {
    S.playQuestion = 'How many edges does this '+data.name+' have?';
    S.playAnswer = data.edges;
    var choices = [{ label:data.edges+'', value:data.edges }];
    [data.edges+2,data.edges-2,data.edges+4].filter(function(x){return x>=0 && x!==data.edges;}).forEach(function(w) {
      if (choices.length < 4) choices.push({ label:w+'', value:w });
    });
    while (choices.length < 4) choices.push({ label:(choices.length+6)+'', value:choices.length+6 });
    S.playChoices = shuffle(choices);
  } else if (qType === 'vertices') {
    S.playQuestion = 'How many vertices does this '+data.name+' have?';
    S.playAnswer = data.vertices;
    var choices = [{ label:data.vertices+'', value:data.vertices }];
    [data.vertices+1,data.vertices-1,data.vertices+2].filter(function(x){return x>=0 && x!==data.vertices;}).forEach(function(w) {
      if (choices.length < 4) choices.push({ label:w+'', value:w });
    });
    while (choices.length < 4) choices.push({ label:(choices.length+3)+'', value:choices.length+3 });
    S.playChoices = shuffle(choices);
  } else {
    var item = data.realWorld[randInt(0, data.realWorld.length-1)];
    S.playQuestion = 'A '+item+' is shaped like a...';
    S.playAnswer = data.name;
    var choices = [{ label:data.name, value:data.name }];
    avail.forEach(function(t) {
      if (t !== S.playShapeType && choices.length < 4) {
        choices.push({ label:SHAPE_DATA[t].name, value:SHAPE_DATA[t].name });
      }
    });
    while (choices.length < 4) choices.push({label:'Pyramid',value:'Pyramid'});
    S.playChoices = shuffle(choices);
  }
}

function playAnswer(ci) {
  if (S.playAnswered) return;
  S.playAnswered = true;

  var choice = S.playChoices[ci];
  var btn = document.getElementById('playBtn'+ci);

  if (choice.value === S.playAnswer) {
    if (btn) btn.classList.add('correct-flash');
    var pts = 10 + (S.streak * 2);
    S.score += pts;
    S.streak++;
    if (S.streak > S.best) S.best = S.streak;
    S.roundResults.push('correct');
    showFB('Correct! +'+pts+' points!', 'correct');
  } else {
    if (btn) btn.classList.add('incorrect-flash');
    S.streak = 0;
    S.roundResults.push('wrong');
    S.playChoices.forEach(function(c,i) {
      if (c.value === S.playAnswer) {
        var cb = document.getElementById('playBtn'+i);
        if (cb) cb.classList.add('correct-flash');
      }
    });
    showFB('The answer is '+S.playAnswer+'.', 'incorrect');
  }

  setTimeout(function() {
    if (S.round >= S.total) {
      showFB('Game Over! Score: '+S.score+' 🏆', 'correct');
      setTimeout(function() { S.round=0; render(); }, 2500);
      return;
    }
    S.round++;
    newPlayQ();
    render();
  }, 1800);
}

// ═══ INIT ═══
document.querySelectorAll('.vinculum-mode-tab').forEach(function(tab) {
  tab.addEventListener('click', function(){ setMode(this.dataset.mode); });
});
document.querySelectorAll('.vinculum-diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function(){ setDiff(this.dataset.diff); });
});

S.shape3d = makeShape(S.shapeType);
render();
