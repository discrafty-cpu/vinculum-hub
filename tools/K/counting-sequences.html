<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Counting Sequences</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
/* ── MODE TABS ── */
/* Difficulty selector */
.vinculum-diff-btn:hover { color: var(--text2); }
/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── HUNDREDS CHART ── */
.chart-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

.hundreds-chart {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  width: fit-content;
  max-width: 100%;
}

.chart-cell {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: rgba(0,212,255,0.05);
  color: var(--text2);
}

.chart-cell:hover {
  transform: scale(1.08);
  border-color: var(--cyan);
}

.chart-cell.highlight-ones {
  background: rgba(0,212,255,0.12);
  color: var(--cyan);
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,212,255,0.3);
}

.chart-cell.highlight-tens {
  background: rgba(0,230,118,0.12);
  color: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(0,230,118,0.3);
}

.chart-cell.highlight-sequence {
  animation: pulse-highlight 0.6s ease-out;
}

/* ── CONTROL BUTTONS ── */
.control-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.control-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.control-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.control-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.control-btn.primary:hover { opacity: 0.9; }

.control-btn.active {
  background: rgba(0,212,255,0.15);
  color: var(--cyan);
  border-color: rgba(0,212,255,0.3);
}

/* ── COUNT FROM INPUT ── */
.count-from-section {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.count-input {
  padding: 8px 12px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 80px;
  transition: all 0.2s;
}

.count-input:focus {
  border-color: var(--cyan);
  outline: none;
}

.count-label {
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
}

/* ── SEQUENCE DISPLAY ── */
.sequence-display {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  padding: 20px;
  background: rgba(0,212,255,0.03);
  border-radius: 12px;
  border: 1px solid var(--border);
  min-height: 60px;
  width: 100%;
  max-width: 900px;
}

.seq-number {
  padding: 8px 16px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  animation: pop 0.3s ease-out;
}

.seq-number.highlight-green {
  background: rgba(0,230,118,0.15);
  color: var(--green);
}

.seq-separator {
  color: var(--muted);
  opacity: 0.6;
  font-size: 14px;
}

/* ── PRACTICE QUESTION ── */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 600px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 12px 0;
}

.sequence-fill {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 16px;
}

.fill-item {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text2);
  border: 2px solid var(--border);
}

.fill-item.blank {
  border-style: dashed;
  border-color: var(--cyan);
  cursor: pointer;
  transition: all 0.2s;
}

.fill-item.blank:hover {
  background: rgba(0,212,255,0.08);
  transform: scale(1.06);
}

.fill-item.blank input {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  outline: none;
}

.answer-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-top: 16px;
  max-width: 400px;
  width: 100%;
}

.answer-btn {
  padding: 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}

.answer-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}

.answer-btn.correct-flash {
  border-color: var(--green);
  background: rgba(0,230,118,0.15);
  color: var(--green);
}

.answer-btn.incorrect-flash {
  border-color: var(--pink);
  background: rgba(255,59,139,0.15);
  color: var(--pink);
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulse-highlight {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); box-shadow: 0 0 24px rgba(0,212,255,0.5); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .chart-cell {
    width: 40px;
    height: 40px;
    font-size: 16px;
  }
  .side-panel {
    width: 220px;
  }
  .hundreds-chart {
    gap: 4px;
    padding: 12px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Counting Sequences</div>
    <span class="vinculum-header-badge">K · CC</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>    <div class="vinculum-header-right">
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">K.CC.1</span>
    <span class="vinculum-std-tag">K.CC.2</span>
    <span class="vinculum-std-tag mn">MN K.1.1.1</span>
  </div>
    </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" data-mode="explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" data-mode="practice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" data-mode="play" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE">1–30</button>
    <button class="vinculum-diff-btn" id="diffD">1–50</button>
    <button class="vinculum-diff-btn" id="diffS">1–100</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

  <script src="../../vinculum-input.js"></script>
<script>

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure
  maxNum: 30,
  selectedNum: null,
  countFromValue: 1,
  isCountingOnes: false,
  isCountingTens: false,
  highlightedNumbers: [],
  countFromStart: 1,

  // Practice
  questionType: null,   // fill-ones | fill-tens | count-from | sequence
  targetSequence: [],
  blanks: [],
  currentBlankIdx: 0,
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  playBest: 0,
  gameEnded: false,
  partialChart: [],
  filledCount: 0
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Counting sequences help us learn to count in different ways.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getMaxNum() {
  return { emergent: 30, developing: 50, secure: 100 }[S.diff];
}

function getChartNumbers() {
  const max = getMaxNum();
  return Array.from({length: max}, (_, i) => i + 1);
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;
  S.isCountingOnes = false;
  S.isCountingTens = false;
  S.highlightedNumbers = [];
  S.selectedNum = null;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.playBest = 0;
    S.gameEnded = false;
    S.filledCount = 0;
    initPlayRound();
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.maxNum = getMaxNum();
  S.selectedNum = null;
  S.isCountingOnes = false;
  S.isCountingTens = false;
  S.highlightedNumbers = [];
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;
  S.playBest = 0;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  const nums = getChartNumbers();

  let html = '<div class="chart-container">';

  // Hundreds chart
  html += '<div class="hundreds-chart">';
  nums.forEach(num => {
    let classes = 'chart-cell';
    if (S.highlightedNumbers.includes(num)) {
      if (S.isCountingTens) {
        classes += ' highlight-tens';
      } else {
        classes += ' highlight-ones';
      }
    }
    html += `<div class="${classes}" onclick="cellClick(${num})">${num}</div>`;
  });
  html += '</div>';

  // Control buttons
  html += '<div class="control-buttons">';
  html += `<button class="control-btn" onclick="countByOnes()">▶ Count by 1s</button>`;
  html += `<button class="control-btn" onclick="countByTens()">▶ Count by 10s</button>`;
  html += `<button class="control-btn" onclick="clearHighlight()">✕ Clear</button>`;
  html += '</div>';

  // Count from input
  html += '<div class="count-from-section">';
  html += '<span class="count-label">Count from:</span>';
  html += `<input type="number" id="countFromInput" class="count-input" value="${S.countFromStart}" min="1" max="${S.maxNum}" />`;
  html += '<button class="control-btn primary" onclick="countFromNumber()">Go</button>';
  html += '</div>';

  // Sequence display
  if (S.highlightedNumbers.length > 0) {
    html += '<div class="sequence-display">';
    S.highlightedNumbers.forEach((num, idx) => {
      html += `<span class="seq-number">${num}</span>`;
      if (idx < S.highlightedNumbers.length - 1) {
        html += '<span class="seq-separator">,</span>';
      }
    });
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">How It Works</div>
      <div class="panel-text">
        <strong>Tap a square</strong> to hear the number spoken.<br><br>
        Use <strong>"Count by 1s"</strong> to sequence through the chart.<br><br>
        Use <strong>"Count by 10s"</strong> to see the pattern in place value.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Counting by 10s</div>
      <div class="panel-text">
        When we count by 10s, we see the <strong>tens pattern</strong>: 10, 20, 30, 40, 50...<br><br>
        This shows us how numbers are <strong>organized by groups of 10</strong>.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standards</div>
      <div class="panel-text">
        <strong>K.CC.1</strong> — Count to 100<br><br>
        <strong>K.CC.2</strong> — Count forward from a given number
      </div>
    </div>
  `;
}

function cellClick(num) {
  S.selectedNum = num;
  speak(num.toString());
  const cells = document.querySelectorAll('.chart-cell');
  cells.forEach((c, i) => {
    if (i + 1 === num) {
      c.classList.add('pop-in');
      setTimeout(() => c.classList.remove('pop-in'), 300);
    }
  });
}

function countByOnes() {
  if (S.isCountingOnes) {
    S.isCountingOnes = false;
    S.highlightedNumbers = [];
  } else {
    S.isCountingOnes = true;
    S.isCountingTens = false;
    S.highlightedNumbers = getChartNumbers();
  }
  render();
  if (S.isCountingOnes) {
    animateSequence(S.highlightedNumbers, false);
  }
}

function countByTens() {
  if (S.isCountingTens) {
    S.isCountingTens = false;
    S.highlightedNumbers = [];
  } else {
    S.isCountingTens = true;
    S.isCountingOnes = false;
    S.highlightedNumbers = [];
    for (let i = 10; i <= S.maxNum; i += 10) {
      S.highlightedNumbers.push(i);
    }
  }
  render();
  if (S.isCountingTens) {
    animateSequence(S.highlightedNumbers, true);
  }
}

function countFromNumber() {
  const input = document.getElementById('countFromInput');
  const start = parseInt(input?.value) || 1;
  if (start < 1 || start > S.maxNum) {
    showFB('Choose 1 to ' + S.maxNum, 'try-again');
    return;
  }
  S.countFromStart = start;
  S.isCountingOnes = true;
  S.isCountingTens = false;
  S.highlightedNumbers = Array.from({length: S.maxNum - start + 1}, (_, i) => start + i);
  render();
  animateSequence(S.highlightedNumbers, false);
}

function animateSequence(nums, isTens) {
  nums.forEach((num, idx) => {
    setTimeout(() => {
      speak(num.toString());
    }, idx * 400);
  });
}

function clearHighlight() {
  S.highlightedNumbers = [];
  S.isCountingOnes = false;
  S.isCountingTens = false;
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  const nums = getChartNumbers();

  let html = '<div class="chart-container">';

  // Score
  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  // Hundreds chart (clickable for reference)
  html += '<div class="hundreds-chart" style="opacity:0.6;pointer-events:none;">';
  nums.forEach(num => {
    html += `<div class="chart-cell">${num}</div>`;
  });
  html += '</div>';

  // Question
  html += '<div class="practice-question">';

  if (S.questionType === 'fill-ones') {
    html += `<div class="question-text">Fill in the missing numbers:</div>`;
    html += '<div class="sequence-fill">';
    S.targetSequence.forEach((num, idx) => {
      if (S.blanks.includes(idx)) {
        html += `<div class="fill-item blank" id="vi-container-${idx}" onclick="focusBlank(${idx})"></div>`;
      } else {
        html += `<div class="fill-item">${num}</div>`;
      }
      if (idx < S.targetSequence.length - 1) {
        html += '<span class="seq-separator">,</span>';
      }
    });
    html += '</div>';
  } else if (S.questionType === 'fill-tens') {
    html += `<div class="question-text">Count by 10s — fill the blanks:</div>`;
    html += '<div class="sequence-fill">';
    S.targetSequence.forEach((num, idx) => {
      if (S.blanks.includes(idx)) {
        html += `<div class="fill-item blank" id="vi-container-${idx}" onclick="focusBlank(${idx})"></div>`;
      } else {
        html += `<div class="fill-item">${num}</div>`;
      }
      if (idx < S.targetSequence.length - 1) {
        html += '<span class="seq-separator">,</span>';
      }
    });
    html += '</div>';
  } else if (S.questionType === 'count-from') {
    html += `<div class="question-text">Start at <span style="color:var(--cyan);font-weight:800;">${S.targetSequence[0]}</span>. What comes next?</div>`;
    html += '<div class="answer-grid">';
    const candidates = generateCandidates(S.targetSequence[0] + 1);
    candidates.forEach(num => {
      html += `<button class="answer-btn" onclick="practiceAnswer(${num})">${num}</button>`;
    });
    html += '</div>';
  } else if (S.questionType === 'sequence') {
    html += `<div class="question-text">What's the next number?</div>`;
    html += '<div class="sequence-fill">';
    S.targetSequence.slice(0, -1).forEach((num, idx) => {
      html += `<span class="seq-number">${num}</span>`;
      if (idx < S.targetSequence.length - 2) {
        html += '<span class="seq-separator">,</span>';
      }
    });
    html += '<span class="seq-separator">,</span>';
    html += '</div>';
    html += '<div class="answer-grid">';
    const candidates = generateCandidates(S.targetSequence[S.targetSequence.length - 1]);
    candidates.forEach(num => {
      html += `<button class="answer-btn" onclick="practiceAnswer(${num})">${num}</button>`;
    });
    html += '</div>';
  }

  html += '</div>';
  html += '</div>';

  ws.innerHTML = html;

  if (['fill-ones', 'fill-tens'].includes(S.questionType)) {
    setTimeout(() => {
      S.blanks.forEach((idx) => {
        const container = document.getElementById(`vi-container-${idx}`);
        if (container && window.VinculumInput) {
          container.innerHTML = '';
          VinculumInput.create(container, {
            type: 'auto',
            answer: S.targetSequence[idx],
            min: 1,
            max: 100,
            onSubmit: function(val) {
              checkBlank(idx, val);
            }
          });
        }
      });
      document.querySelector('[id^="vi-container-"]')?.querySelector('button')?.focus();
    }, 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        Fill in the missing numbers or <strong>tap the answer</strong>.<br><br>
        Think about the <strong>pattern</strong> in the sequence!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Sequences</div>
      <div class="panel-text">
        A <strong>sequence</strong> is numbers in order. When we count, we follow a pattern: each number is <strong>one more</strong> than before.
      </div>
    </div>
  `;
}

function focusBlank(idx) {
  const input = document.getElementById(`blank-${idx}`);
  if (input) input.focus();
}

function checkBlank(idx, val) {
  if (val === S.targetSequence[idx]) {
    showFB('✓ Correct!', 'correct');
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function generateCandidates(correct) {
  const candidates = new Set([correct]);
  while (candidates.size < 5) {
    candidates.add(correct + randInt(-2, 2));
  }
  return Array.from(candidates).sort(() => Math.random() - 0.5);
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;
  S.selectedNum = null;
  S.blanks = [];
  S.currentBlankIdx = 0;

  const questionTypes = [];
  if (S.diff === 'emergent') {
    questionTypes.push('fill-ones', 'count-from');
  } else if (S.diff === 'developing') {
    questionTypes.push('fill-ones', 'fill-tens', 'count-from', 'sequence');
  } else {
    questionTypes.push('fill-ones', 'fill-tens', 'count-from', 'sequence');
  }

  S.questionType = questionTypes[Math.floor(Math.random() * questionTypes.length)];

  if (S.questionType === 'fill-ones') {
    const start = randInt(1, Math.max(1, S.maxNum - 4));
    S.targetSequence = Array.from({length: 5}, (_, i) => start + i);
    S.blanks = [1, 3];
  } else if (S.questionType === 'fill-tens') {
    S.targetSequence = [10, 20, 30, 40, 50];
    if (S.diff === 'developing') {
      S.targetSequence = [10, 20, 30, 40];
    }
    S.blanks = [1, 3];
  } else if (S.questionType === 'count-from') {
    const start = randInt(1, Math.max(1, S.maxNum - 1));
    S.targetSequence = [start, start + 1];
  } else if (S.questionType === 'sequence') {
    const start = randInt(1, Math.max(1, S.maxNum - 2));
    S.targetSequence = [start, start + 1, start + 2];
  }
}

function practiceAnswer(num) {
  const expected = S.targetSequence[S.targetSequence.length - 1];
  if (num === expected) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  let html = '<div class="chart-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Game Over!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="control-btn primary" onclick="playAgain()" style="margin-top:20px;padding:12px 32px;font-size:16px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div style="display:flex;gap:24px;justify-content:center;align-items:center;margin-bottom:12px;font-size:14px;color:var(--text2);">
      <div><span style="color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:1px;">Round</span><br>${S.playRound} / 5</div>
      <div><span style="color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:1px;">⭐ Score</span><br>${S.playScore}</div>
    </div>`;

    // Partial hundreds chart (race mode)
    html += '<div class="hundreds-chart">';
    const allNums = getChartNumbers();
    allNums.forEach(num => {
      let classes = 'chart-cell';
      if (S.partialChart.includes(num)) {
        classes += ' highlight-ones';
      }
      const isVisible = S.partialChart.includes(num);
      const cellContent = isVisible ? num : '?';
      html += `<div class="${classes}" onclick="playFillNumber(${num})" style="opacity:${isVisible ? 1 : 0.3};">${cellContent}</div>`;
    });
    html += '</div>';

    html += `<div style="text-align:center;margin-top:16px;font-size:14px;color:var(--text2);">
      Fill in missing numbers as fast as you can! ⏱️
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent;padding:8px;">
      <div style="font-size:18px;font-weight:700;color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        <strong>Tap the numbers</strong> in order from your chart.<br><br>
        Complete all the numbers to fill the chart!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Best Streak</div>
      <div class="panel-text" style="font-size:24px;font-weight:800;color:var(--cyan);">🏆 ${S.playBest}</div>
    </div>
  `;
}

function initPlayRound() {
  S.partialChart = [];
  const allNums = getChartNumbers();
  const count = Math.ceil(allNums.length / 2);
  const toAdd = Math.floor(Math.random() * (allNums.length - count)) + 1;
  for (let i = 0; i < count; i++) {
    S.partialChart.push(toAdd + i);
  }
  S.partialChart.sort((a, b) => a - b);
  S.filledCount = 0;
}

function playFillNumber(num) {
  if (S.gameEnded) return;
  if (!S.partialChart.includes(num)) {
    showFB('Not yet!', 'try-again');
    S.playStreak = 0;
    return;
  }

  const expectedNext = S.partialChart[0] + S.filledCount;
  if (num === expectedNext) {
    showFB('✓ Right!', 'correct');
    S.playScore += 5 + (S.playStreak * 2);
    S.playStreak++;
    if (S.playStreak > S.playBest) S.playBest = S.playStreak;
    S.filledCount++;

    if (S.filledCount >= S.partialChart.length) {
      S.playRound++;
      if (S.playRound > 5) {
        S.gameEnded = true;
      } else {
        initPlayRound();
      }
    }
    setTimeout(() => render(), 600);
  } else {
    showFB('Keep going!', 'try-again');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.playBest = Math.max(S.playBest, S.playStreak);
  S.gameEnded = false;
  S.filledCount = 0;
  initPlayRound();
  render();
}
