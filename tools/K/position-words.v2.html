<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Position & Direction Words</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
/* ── MODE TABS ── */
/* Difficulty selector */
.vinculum-diff-btn:hover { color: var(--text2); }
/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

/* ── SCENE GRID ── */
.scene-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 8px;
  width: 300px;
  height: 300px;
  margin: 0 auto;
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
}
.scene-cell {
  border-radius: 12px;
  border: 2px dashed transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  transition: all 0.3s;
}
.scene-cell.ref {
  border-color: var(--purple);
  background: rgba(179,136,255,0.1);
}
.scene-cell.moving {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.1);
}
.scene-cell.target {
  border-color: var(--yellow);
  cursor: pointer;
}
.scene-cell.target:hover {
  background: rgba(255,193,7,0.1);
}

/* ── POSITION BUTTONS ── */
.position-buttons {
  display: flex;
  flex-direction: row;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 16px;
}
.pos-btn {
  padding: 12px 20px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
  font-family: inherit;
}
.pos-btn:hover {
  border-color: var(--cyan);
}
.pos-btn.active {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.15);
  color: var(--cyan);
}

/* ── POSITION LABEL ── */
.position-label {
  font-size: 18px;
  text-align: center;
  margin: 16px 0;
  font-weight: 600;
  color: var(--text);
  min-height: 28px;
}

/* ── INSTRUCTION BOX ── */
.instruction-box {
  text-align: center;
  padding: 16px 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 16px;
  line-height: 1.5;
}

/* ── MC GRID ── */
.mc-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 16px;
}
.mc-btn {
  padding: 14px 24px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 120px;
  text-align: center;
}
.mc-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}
.mc-btn.correct-flash {
  border-color: var(--green);
  background: rgba(0,230,118,0.15);
  color: var(--green);
}
.mc-btn.incorrect-flash {
  border-color: var(--pink);
  background: rgba(255,59,139,0.15);
  color: var(--pink);
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.ctrl-btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ctrl-btn:hover { background: var(--card-hover); color: var(--text); }
.ctrl-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
}
.ctrl-btn.primary:hover { opacity: 0.9; }

/* ── OBJECT PICKER ── */
.object-picker {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.picker-btn {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card);
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.picker-btn:hover { border-color: var(--cyan); transform: scale(1.1); }
.picker-btn.selected { border-color: var(--cyan); background: rgba(0,212,255,0.1); box-shadow: 0 0 12px rgba(0,212,255,0.2); }

/* ── SCORE DISPLAY ── */
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 24px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
  text-align: center;
  max-width: 400px;
  line-height: 1.4;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes slideIn {
  0% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 1; transform: scale(1); }
}
.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.slide-in { animation: slideIn 0.3s ease-out forwards; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Position & Direction Words</div>
    <span class="vinculum-header-badge">K.G</span>
  </div>
    <div class="vinculum-header-right">
      <div class="vinculum-std-tags">

</div>

<!-- ═══ MODE TABS ═══ -->
</div>

  <div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" data-mode="explore">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>

    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice

    <button class="vinculum-diff-btn" id="diffA" data-diff="advanced">All 6</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

  <script src="../../vinculum-input.js"></script>
<script>
// ════════════════════════════════════════
// POSITION DATA
// ════════════════════════════════════════
const POSITIONS = {
  above:    { label:'above',       emoji:'⬆️', description:'higher than' },
  below:    { label:'below',       emoji:'⬇️', description:'lower than' },
  beside:   { label:'beside',      emoji:'↔️', description:'next to' },
  inFrontOf:{ label:'in front of', emoji:'👆', description:'closer to you' },
  behind:   { label:'behind',      emoji:'👇', description:'farther from you' },
  between:  { label:'between',     emoji:'↕️', description:'in the middle of two things' }
};

const SCENE_OBJECTS = ['🏠','🌳','🐕','🚗','⭐','🎾','📦','🧸','🎪','🐈'];

// Grid position map: key → [row, col] in a 3×3 grid (0-indexed)
// Reference object always at center [1,1]
const POSITION_GRID_MAP = {
  above:     [0, 1],
  below:     [2, 1],
  beside:    [1, 2],
  inFrontOf: [2, 1], // in front = closer to viewer = bottom
  behind:    [0, 1], // behind = farther from viewer = top
  between:   [1, 1]  // special: needs two refs
};

// For explore mode, simpler grid positions (no overlap with inFrontOf/behind)
const EXPLORE_GRID = {
  above:     [0, 1],
  below:     [2, 1],
  beside:    [1, 2],
  inFrontOf: [2, 0],
  behind:    [0, 2],
  between:   [1, 1]
};

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let S = {
  mode: 'explore',
  diff: 'emergent',
  availablePositions: [],
  // Explore
  refObject: '🏠',
  movingObject: '⭐',
  currentPosition: 'above',
  // Practice
  pRef: '',
  pMoving: '',
  pPosition: '',
  pChoices: [],
  pType: 'identify', // 'identify' or 'place'
  pAnswered: false,
  // Play
  score: 0,
  streak: 0,
  best: 0,
  round: 0,
  total: 10,
  playRef: '',
  playMoving: '',
  playPosition: '',
  playChoices: [],
  playAnswered: false
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const fb = document.getElementById('feedback');
    const storyEl = document.getElementById('storyBanner');
    const text = storyEl ? storyEl.textContent : (fb ? fb.textContent : 'Welcome to Position and Direction Words!');
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: function() {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// MISCONCEPTIONS DATABASE
// ════════════════════════════════════════
const MISCONCEPTIONS = {
  aboveBelowConfusion: {
    id: 'above-below',
    msg: function(pos) {
      return pos === 'above' ? '"Above" means HIGHER — look UP!' : '"Below" means LOWER — look DOWN!';
    }
  },
  relativeConfusion: {
    id: 'relative',
    msg: function() {
      return 'Position depends on the OTHER object. Where is it compared to the reference?';
    }
  },
  frontBehind: {
    id: 'front-behind',
    msg: function(pos) {
      return pos === 'in front of' ? '"In front of" means CLOSER to you.' : '"Behind" means on the OTHER SIDE, farther away.';
    }
  },
  randomGuess: {
    id: 'random',
    msg: function() {
      return 'Look at the picture. Where is the object compared to the other one?';
    }
  }
};

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function updateAvailablePositions() {
  if (S.diff === 'emergent') {
    S.availablePositions = ['above', 'below'];
  } else if (S.diff === 'proficient') {
    S.availablePositions = ['above', 'below', 'beside', 'inFrontOf'];
  } else {
    S.availablePositions = ['above', 'below', 'beside', 'inFrontOf', 'behind', 'between'];
  }
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[randInt(0, arr.length - 1)];
}

function pickTwo(arr) {
  var a = pick(arr);
  var b = pick(arr.filter(function(x) { return x !== a; }));
  return [a, b];
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = randInt(0, i);
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function showFeedback(text, type, duration) {
  var fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.className = 'feedback ' + type + ' show';
  setTimeout(function() { fb.classList.remove('show'); }, duration || 1800);
}

function posLabel(key) {
  return POSITIONS[key].label;
}

// Get grid position for a position key relative to center ref
// Returns [row, col] in 0-indexed 3×3 grid; ref is at [1,1]
function getGridPos(posKey) {
  var map = {
    above: [0, 1],
    below: [2, 1],
    beside: [1, 2],
    inFrontOf: [2, 0],
    behind: [0, 2],
    between: [1, 0] // left of center for between (third obj on right)
  };
  return map[posKey] || [0, 0];
}

// Determine misconception feedback for wrong answer
function getMisconceptionFeedback(correctPos, chosenPos) {
  // above/below confusion
  if ((correctPos === 'above' && chosenPos === 'below') || (correctPos === 'below' && chosenPos === 'above')) {
    return MISCONCEPTIONS.aboveBelowConfusion.msg(correctPos);
  }
  // in front of / behind confusion
  if ((correctPos === 'inFrontOf' && chosenPos === 'behind') || (correctPos === 'behind' && chosenPos === 'inFrontOf')) {
    return MISCONCEPTIONS.frontBehind.msg(correctPos);
  }
  // above/below vs inFrontOf/behind confusion
  if ((['above','below'].indexOf(correctPos) >= 0 && ['inFrontOf','behind'].indexOf(chosenPos) >= 0) ||
      (['inFrontOf','behind'].indexOf(correctPos) >= 0 && ['above','below'].indexOf(chosenPos) >= 0)) {
    return MISCONCEPTIONS.relativeConfusion.msg();
  }
  return MISCONCEPTIONS.randomGuess.msg();
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;
  S.pAnswered = false;
  S.playAnswered = false;

  document.querySelectorAll('.vinculum-mode-tab').forEach(function(t) {
    t.classList.remove('active-explore', 'active-practice', 'active-play');
  });
  var tabEl = document.querySelector('[data-mode="' + mode + '"]');
  if (tabEl) tabEl.classList.add('active-' + mode);

  if (mode === 'practice') setupPractice();
  if (mode === 'play') { S.score = 0; S.streak = 0; S.round = 0; setupPlayRound(); }

  render();
}

function setDiff(diff) {
  S.diff = diff;
  updateAvailablePositions();
  document.querySelectorAll('.vinculum-diff-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');
  S.currentPosition = S.availablePositions[0];
  setMode(S.mode);
}

// ════════════════════════════════════════
// BUILD SCENE GRID HTML
// ════════════════════════════════════════
function buildSceneGrid(refObj, movObj, posKey, opts) {
  opts = opts || {};
  var cells = [];
  for (var i = 0; i < 9; i++) cells.push('');

  var refIdx = 4; // center = row 1, col 1
  cells[refIdx] = { emoji: refObj, cls: 'ref' };

  if (posKey === 'between') {
    // Place moving object between ref and a third object
    var thirdObj = opts.thirdObject || '🌳';
    // ref at center, moving at left, third at right
    cells[3] = { emoji: movObj, cls: 'moving' };
    cells[5] = { emoji: thirdObj, cls: 'ref' };
  } else {
    var gp = getGridPos(posKey);
    var movIdx = gp[0] * 3 + gp[1];
    cells[movIdx] = { emoji: movObj, cls: 'moving' };
  }

  var html = '<div class="scene-grid">';
  for (var c = 0; c < 9; c++) {
    if (cells[c] && cells[c].emoji) {
      html += '<div class="scene-cell ' + cells[c].cls + '">' + cells[c].emoji + '</div>';
    } else {
      html += '<div class="scene-cell"></div>';
    }
  }
  html += '</div>';
  return html;
}

// Build an interactive grid where user taps to place the moving object
function buildPlacementGrid(refObj, movObj, posKey, opts) {
  opts = opts || {};
  var cells = [];
  for (var i = 0; i < 9; i++) cells.push(null);

  var refIdx = 4;
  cells[refIdx] = { emoji: refObj, cls: 'ref', clickable: false };

  if (posKey === 'between') {
    var thirdObj = opts.thirdObject || '🌳';
    cells[5] = { emoji: thirdObj, cls: 'ref', clickable: false };
  }

  var html = '<div class="scene-grid">';
  for (var c = 0; c < 9; c++) {
    if (cells[c] && cells[c].emoji) {
      html += '<div class="scene-cell ' + cells[c].cls + '">' + cells[c].emoji + '</div>';
    } else {
      html += '<div class="scene-cell target" onclick="handlePlacement(' + c + ')">' + '</div>';
    }
  }
  html += '</div>';
  return html;
}

// ════════════════════════════════════════
// EXPLORE MODE
// ════════════════════════════════════════
function renderExplore(ws, sp) {
  var html = '';

  // Position label
  var pos = POSITIONS[S.currentPosition];
  if (S.currentPosition === 'between') {
    html += '<div class="position-label">The ' + S.movingObject + ' is <strong style="color:var(--cyan);">' + pos.label.toUpperCase() + '</strong> the ' + S.refObject + ' and the 🌳</div>';
  } else {
    html += '<div class="position-label">The ' + S.movingObject + ' is <strong style="color:var(--cyan);">' + pos.label.toUpperCase() + '</strong> the ' + S.refObject + '</div>';
  }

  // Scene grid
  html += buildSceneGrid(S.refObject, S.movingObject, S.currentPosition);

  // Position word buttons
  html += '<div class="position-buttons">';
  S.availablePositions.forEach(function(key) {
    var p = POSITIONS[key];
    var activeClass = S.currentPosition === key ? ' active' : '';
    html += '<button class="pos-btn' + activeClass + '" onclick="setExplorePosition(\'' + key + '\')">' + p.emoji + ' ' + p.label.charAt(0).toUpperCase() + p.label.slice(1) + '</button>';
  });
  html += '</div>';

  // Object pickers
  html += '<div style="margin-top:16px;text-align:center;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;">Reference Object</div>';
  html += '<div class="object-picker">';
  SCENE_OBJECTS.forEach(function(obj) {
    var sel = S.refObject === obj ? ' selected' : '';
    html += '<button class="picker-btn' + sel + '" onclick="pickRef(\'' + obj + '\')">' + obj + '</button>';
  });
  html += '</div>';

  html += '<div style="margin-top:12px;text-align:center;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;">Moving Object</div>';
  html += '<div class="object-picker">';
  SCENE_OBJECTS.forEach(function(obj) {
    var sel = S.movingObject === obj ? ' selected' : '';
    html += '<button class="picker-btn' + sel + '" onclick="pickMoving(\'' + obj + '\')">' + obj + '</button>';
  });
  html += '</div>';

  ws.innerHTML = html;

  // Side panel: definitions
  var defHtml = '<div class="panel-section"><div class="panel-title">Position Words</div>';
  S.availablePositions.forEach(function(key) {
    var p = POSITIONS[key];
    var highlight = S.currentPosition === key ? 'color:var(--cyan);' : '';
    defHtml += '<div style="padding:8px 0;border-bottom:1px solid var(--border);' + highlight + '">';
    defHtml += '<strong>' + p.emoji + ' ' + p.label.charAt(0).toUpperCase() + p.label.slice(1) + '</strong>';
    defHtml += '<div style="font-size:12px;color:var(--muted);margin-top:2px;">' + p.description + '</div>';
    defHtml += '</div>';
  });
  defHtml += '</div>';

  defHtml += '<div class="panel-section"><div class="panel-title">How to Use</div><div class="panel-text">';
  defHtml += '1. Tap a <strong>position button</strong> to move the object<br><br>';
  defHtml += '2. Watch where it goes on the grid<br><br>';
  defHtml += '3. Change the objects with the pickers below';
  defHtml += '</div></div>';

  defHtml += '<div class="panel-section"><div class="panel-title">Standards</div><div class="panel-text">';
  defHtml += '<strong>K.G.1</strong> — Describe objects using names of shapes and position words<br><br>';
  defHtml += '<strong>MN K.4.1.2</strong> — Use words to describe position and direction';
  defHtml += '</div></div>';

  sp.innerHTML = defHtml;
}

function setExplorePosition(key) {
  S.currentPosition = key;
  render();
}

function pickRef(obj) {
  S.refObject = obj;
  if (S.refObject === S.movingObject) {
    S.movingObject = SCENE_OBJECTS.filter(function(o) { return o !== obj; })[0];
  }
  render();
}

function pickMoving(obj) {
  S.movingObject = obj;
  if (S.movingObject === S.refObject) {
    S.refObject = SCENE_OBJECTS.filter(function(o) { return o !== obj; })[0];
  }
  render();
}

// ════════════════════════════════════════
// PRACTICE MODE
// ════════════════════════════════════════
function setupPractice() {
  var objs = pickTwo(SCENE_OBJECTS);
  S.pRef = objs[0];
  S.pMoving = objs[1];
  S.pPosition = pick(S.availablePositions);
  S.pAnswered = false;

  // Alternate between identify and place
  S.pType = Math.random() < 0.5 ? 'identify' : 'place';

  // Build choices for identify type
  if (S.pType === 'identify') {
    var choices = [S.pPosition];
    var others = S.availablePositions.filter(function(p) { return p !== S.pPosition; });
    others = shuffle(others);
    var numChoices = Math.min(S.availablePositions.length, S.diff === 'emergent' ? 2 : S.diff === 'proficient' ? 4 : 6);
    while (choices.length < numChoices && others.length > 0) {
      choices.push(others.shift());
    }
    S.pChoices = shuffle(choices);
  }
}

function renderPractice(ws, sp) {
  var html = '';

  if (S.pType === 'identify') {
    // Show scene, ask "Where is X compared to Y?"
    if (S.pPosition === 'between') {
      html += '<div class="instruction-box">Where is the ' + S.pMoving + ' compared to the ' + S.pRef + ' and the 🌳?</div>';
    } else {
      html += '<div class="instruction-box">Where is the ' + S.pMoving + ' compared to the ' + S.pRef + '?</div>';
    }

    html += buildSceneGrid(S.pRef, S.pMoving, S.pPosition);

    // MC choices
    html += '<div class="mc-grid">';
    S.pChoices.forEach(function(key) {
      var p = POSITIONS[key];
      html += '<button class="mc-btn" id="mc_' + key + '" onclick="practiceAnswer(\'' + key + '\')">' + p.emoji + ' ' + p.label.charAt(0).toUpperCase() + p.label.slice(1) + '</button>';
    });
    html += '</div>';
  } else {
    // Place type: "Place the X ABOVE the Y"
    html += '<div class="instruction-box">Place the ' + S.pMoving + ' <strong style="color:var(--cyan);">' + posLabel(S.pPosition).toUpperCase() + '</strong> the ' + S.pRef;
    if (S.pPosition === 'between') html += ' and the 🌳';
    html += '</div>';

    html += buildPlacementGrid(S.pRef, S.pMoving, S.pPosition);
  }

  // Skip button
  html += '<div class="controls">';
  html += '<button class="ctrl-btn" onclick="skipPractice()">Skip →</button>';
  html += '</div>';

  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = '<div class="panel-section"><div class="panel-title">Instructions</div><div class="panel-text">' +
    (S.pType === 'identify'
      ? 'Look at the picture.<br><br>Tap the <strong>position word</strong> that tells where the ' + S.pMoving + ' is compared to the ' + S.pRef + '.'
      : 'Tap the <strong>empty cell</strong> where you think the ' + S.pMoving + ' should go.') +
    '</div></div>' +
    '<div class="panel-section"><div class="panel-title">Remember</div><div class="panel-text">' +
    '⬆️ <strong>Above</strong> = higher than<br>' +
    '⬇️ <strong>Below</strong> = lower than<br>' +
    (S.diff !== 'emergent' ? '↔️ <strong>Beside</strong> = next to<br>👆 <strong>In front of</strong> = closer to you<br>' : '') +
    (S.diff === 'advanced' ? '👇 <strong>Behind</strong> = farther away<br>↕️ <strong>Between</strong> = in the middle of two things' : '') +
    '</div></div>' +
    '<div class="panel-section"><div class="panel-title">Key Concept</div><div class="panel-text">' +
    'Position words describe where something is <strong>compared to another object</strong>. The same object can be "above" one thing and "below" another!' +
    '</div></div>';
}

function practiceAnswer(chosenKey) {
  if (S.pAnswered) return;
  S.pAnswered = true;

  var btn = document.getElementById('mc_' + chosenKey);
  var correctBtn = document.getElementById('mc_' + S.pPosition);

  if (chosenKey === S.pPosition) {
    if (btn) btn.classList.add('correct-flash');
    showFeedback('✓ Correct! ' + POSITIONS[S.pPosition].emoji + ' ' + posLabel(S.pPosition).charAt(0).toUpperCase() + posLabel(S.pPosition).slice(1), 'correct');
    setTimeout(function() {
      setupPractice();
      render();
    }, 1500);
  } else {
    if (btn) btn.classList.add('incorrect-flash');
    if (correctBtn) correctBtn.classList.add('correct-flash');
    var msg = getMisconceptionFeedback(S.pPosition, chosenKey);
    showFeedback(msg, 'try-again', 2500);
    setTimeout(function() {
      S.pAnswered = false;
      render();
    }, 2500);
  }
}

function handlePlacement(cellIdx) {
  if (S.pAnswered) return;
  S.pAnswered = true;

  var row = Math.floor(cellIdx / 3);
  var col = cellIdx % 3;
  var correctPos = getGridPos(S.pPosition);

  if (S.pPosition === 'between') {
    // For between, correct is row 1, col 1 (center) — but ref is there.
    // Actually for between with ref center and third at [1,2], correct is [1,0]
    if (row === 1 && col === 0) {
      showFeedback('✓ Correct! That is between them!', 'correct');
      setTimeout(function() { setupPractice(); render(); }, 1500);
    } else {
      showFeedback(MISCONCEPTIONS.relativeConfusion.msg(), 'try-again', 2000);
      setTimeout(function() { S.pAnswered = false; render(); }, 2000);
    }
    return;
  }

  if (row === correctPos[0] && col === correctPos[1]) {
    showFeedback('✓ Correct! ' + POSITIONS[S.pPosition].emoji + ' ' + posLabel(S.pPosition).charAt(0).toUpperCase() + posLabel(S.pPosition).slice(1), 'correct');
    setTimeout(function() { setupPractice(); render(); }, 1500);
  } else {
    // Determine what position user actually chose
    var chosenPosKey = null;
    S.availablePositions.forEach(function(key) {
      var gp = getGridPos(key);
      if (gp[0] === row && gp[1] === col) chosenPosKey = key;
    });
    var msg = chosenPosKey ? getMisconceptionFeedback(S.pPosition, chosenPosKey) : MISCONCEPTIONS.randomGuess.msg();
    showFeedback(msg, 'try-again', 2000);
    setTimeout(function() { S.pAnswered = false; render(); }, 2000);
  }
}

function skipPractice() {
  setupPractice();
  render();
}

// ════════════════════════════════════════
// PLAY MODE
// ════════════════════════════════════════
function setupPlayRound() {
  S.round++;
  S.playAnswered = false;
  var objs = pickTwo(SCENE_OBJECTS);
  S.playRef = objs[0];
  S.playMoving = objs[1];
  S.playPosition = pick(S.availablePositions);

  var choices = [S.playPosition];
  var others = S.availablePositions.filter(function(p) { return p !== S.playPosition; });
  others = shuffle(others);
  var numChoices = Math.min(S.availablePositions.length, S.diff === 'emergent' ? 2 : S.diff === 'proficient' ? 4 : 6);
  while (choices.length < numChoices && others.length > 0) {
    choices.push(others.shift());
  }
  S.playChoices = shuffle(choices);
}

function renderPlay(ws, sp) {
  if (S.round === 0) setupPlayRound();

  var html = '';

  // Round indicator
  html += '<div style="text-align:center;margin-bottom:8px;font-size:14px;color:var(--muted);">Round ' + S.round + ' of ' + S.total + '</div>';

  // Question
  if (S.playPosition === 'between') {
    html += '<div class="instruction-box">Where is the ' + S.playMoving + ' compared to the ' + S.playRef + ' and the 🌳?</div>';
  } else {
    html += '<div class="instruction-box">Where is the ' + S.playMoving + ' compared to the ' + S.playRef + '?</div>';
  }

  // Scene
  html += buildSceneGrid(S.playRef, S.playMoving, S.playPosition);

  // MC choices
  html += '<div class="mc-grid">';
  S.playChoices.forEach(function(key) {
    var p = POSITIONS[key];
    html += '<button class="mc-btn" id="play_' + key + '" onclick="playAnswer(\'' + key + '\')">' + p.emoji + ' ' + p.label.charAt(0).toUpperCase() + p.label.slice(1) + '</button>';
  });
  html += '</div>';

  ws.innerHTML = html;

  // Side panel: score
  sp.innerHTML =
    '<div class="score-display"><div class="score-value">' + S.score + '</div><div class="score-label">Score</div></div>' +
    '<div class="score-display" style="background:transparent;padding:8px;">' +
      '<div style="font-size:18px;font-weight:700;color:var(--yellow);">🔥 ' + S.streak + '</div>' +
      '<div class="score-label">Streak</div>' +
      '<div class="streak-bar"><div class="streak-fill" style="width:' + Math.min(S.streak * 20, 100) + '%;"></div></div>' +
    '</div>' +
    '<div class="panel-section"><div class="panel-title">How to Play</div><div class="panel-text">' +
      'Look at the two objects on the grid.<br><br>' +
      'Tap the <strong>position word</strong> that describes where the highlighted object is.<br><br>' +
      'Build a <strong>streak</strong> for bonus points!' +
    '</div></div>' +
    '<div class="panel-section"><div class="panel-title">Best Streak</div>' +
      '<div class="panel-text" style="font-size:24px;font-weight:800;color:var(--purple);">🏆 ' + S.best + '</div>' +
    '</div>';
}

function playAnswer(chosenKey) {
  if (S.playAnswered) return;
  S.playAnswered = true;

  var btn = document.getElementById('play_' + chosenKey);
  var correctBtn = document.getElementById('play_' + S.playPosition);

  if (chosenKey === S.playPosition) {
    if (btn) btn.classList.add('correct-flash');
    S.score += 10 + (S.streak * 2);
    S.streak++;
    if (S.streak > S.best) S.best = S.streak;
    showFeedback('✓ ' + posLabel(S.playPosition).charAt(0).toUpperCase() + posLabel(S.playPosition).slice(1) + '!', 'correct');
  } else {
    if (btn) btn.classList.add('incorrect-flash');
    if (correctBtn) correctBtn.classList.add('correct-flash');
    S.streak = 0;
    var msg = getMisconceptionFeedback(S.playPosition, chosenKey);
    showFeedback(msg, 'incorrect', 2200);
  }

  setTimeout(function() {
    if (S.round >= S.total) {
      showFeedback('Game Over! Score: ' + S.score, 'correct', 2500);
      setTimeout(function() {
        S.round = 0;
        S.score = 0;
        S.streak = 0;
        setupPlayRound();
        render();
      }, 2500);
      return;
    }
    setupPlayRound();
    render();
  }, 1200);
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function render() {
  var ws = document.getElementById('workspace');
  var sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
updateAvailablePositions();

document.querySelectorAll('.vinculum-mode-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    setMode(this.dataset.mode);
  });
});

document.querySelectorAll('.vinculum-diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    setDiff(this.dataset.diff);
  });
});

render();
