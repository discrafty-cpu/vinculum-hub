<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Number Path Explorer</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
/* ── MODE TABS ── */
/* Difficulty selector */
.vinculum-diff-btn:hover { color: var(--text2); }
/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

/* ── NUMBER PATH ── */
.number-path-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 900px;
}

.number-path {
  display: flex;
  gap: 4px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  width: 100%;
  min-height: 100px;
  position: relative;
}

.path-square {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  flex-shrink: 0;
}

.path-square:nth-child(odd) {
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

.path-square:nth-child(even) {
  background: rgba(0,212,255,0.04);
  color: var(--text2);
}

.path-square:hover {
  transform: scale(1.08);
  border-color: var(--cyan);
}

.path-square.selected {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.15);
  box-shadow: 0 0 16px rgba(0,212,255,0.4), inset 0 0 8px rgba(0,212,255,0.2);
}

.path-square.target-square {
  border-color: var(--green);
  background: rgba(0,230,118,0.1);
}

.path-square.target-square.selected {
  box-shadow: 0 0 16px rgba(0,230,118,0.4), inset 0 0 8px rgba(0,230,118,0.2);
}

/* Character token */
.character-token {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan), var(--green));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 800;
  color: var(--bg);
  box-shadow: 0 4px 12px rgba(0,212,255,0.3);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 10;
}

.character-token::before,
.character-token::after {
  content: '';
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--bg);
  border-radius: 50%;
}

.character-token::before {
  top: 10px;
  left: 8px;
}

.character-token::after {
  top: 10px;
  right: 8px;
}

/* Dots representation */
.quantity-display {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  width: 100%;
  min-height: 60px;
  padding: 16px;
  background: rgba(0,212,255,0.03);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.quantity-dots {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  max-width: 300px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--cyan);
  animation: pop 0.3s ease-out;
}

.quantity-label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

/* Neighbors display */
.neighbors-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  padding: 12px 20px;
  background: var(--card);
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--text2);
}

.neighbor-num {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

.neighbor-num.current {
  background: rgba(0,212,255,0.2);
  color: var(--cyan);
  font-weight: 800;
}

.neighbor-arrow {
  color: var(--text2);
  opacity: 0.5;
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 24px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 8px 0;
}

/* Play mode controls */
.play-controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* Game info */
.game-info {
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Answer buttons */
.answer-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-top: 16px;
  max-width: 400px;
  width: 100%;
}

.answer-btn {
  padding: 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}

.answer-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}

.answer-btn.correct-flash {
  border-color: var(--green);
  background: rgba(0,230,118,0.15);
  color: var(--green);
}

.answer-btn.incorrect-flash {
  border-color: var(--pink);
  background: rgba(255,59,139,0.15);
  color: var(--pink);
}

/* Input field */
.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 100px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL (Instructions / Score) ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .number-path {
    gap: 2px;
  }
  .path-square {
    width: 40px;
    height: 40px;
    font-size: 16px;
  }
  .side-panel {
    width: 220px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Number Path Explorer</div>
    <span class="vinculum-header-badge">K · CC</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
    <div class="vinculum-header-right">
      <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">K.CC.4</span>
    <span class="vinculum-std-tag">K.CC.5</span>
    <span class="vinculum-std-tag mn">MN K.1.1.1</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" data-mode="explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" data-mode="practice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" data-mode="play" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE">1–10</button>
    <button class="vinculum-diff-btn" id="diffD">1–15</button>
    <button class="vinculum-diff-btn" id="diffS">1–20</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

  <script src="../../vinculum-input.js"></script>
<script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure
  maxNum: 10,
  selectedNum: null,
  tokenPos: 0,

  // Explore
  // (none needed beyond above)

  // Practice
  questionType: null,   // tap-number | after | before | hops | compare | backward
  targetNum: 0,
  targetNum2: 0,
  hopCount: 0,
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  playBest: 0,
  spinValue: 0,
  gameEnded: false
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Number Paths help us understand number magnitude.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getMaxNum() {
  return { emergent: 10, developing: 15, secure: 20 }[S.diff];
}

function getPathRange() {
  const max = getMaxNum();
  return Array.from({length: max}, (_, i) => i + 1);
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;
  S.selectedNum = null;
  S.tokenPos = 0;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.playBest = 0;
    S.gameEnded = false;
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.maxNum = getMaxNum();
  S.selectedNum = null;
  S.tokenPos = 0;
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;
  S.playBest = 0;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  const path = getPathRange();

  let html = '<div class="number-path-container">';

  // Number path
  html += '<div class="number-path" id="numberPath">';
  path.forEach(num => {
    const isSelected = S.selectedNum === num;
    html += `<div class="path-square ${isSelected ? 'selected' : ''}" onclick="selectNumber(${num})">${num}</div>`;
  });
  html += '<div class="character-token" id="charToken" style="left: ${(S.tokenPos - 1) * 54 + 25}px;"></div>';
  html += '</div>';

  // Neighbors display (if a number is selected)
  if (S.selectedNum !== null) {
    const prev = S.selectedNum - 1;
    const next = S.selectedNum + 1;
    html += `<div class="neighbors-display">
      <span class="neighbor-arrow">←</span>
      ${prev >= 1 ? `<div class="neighbor-num">${prev}</div>` : '<div class="neighbor-num" style="opacity:0.3;">·</div>'}
      <div class="neighbor-num current">${S.selectedNum}</div>
      ${next <= S.maxNum ? `<div class="neighbor-num">${next}</div>` : '<div class="neighbor-num" style="opacity:0.3;">·</div>'}
      <span class="neighbor-arrow">→</span>
    </div>`;
  }

  // Quantity display (dots)
  if (S.selectedNum !== null && S.selectedNum > 0) {
    html += '<div class="quantity-display">';
    html += '<div class="quantity-label">⭐ Quantity:</div>';
    html += '<div class="quantity-dots">';
    for (let i = 0; i < S.selectedNum; i++) {
      html += `<div class="dot" style="animation-delay: ${i * 0.05}s;"></div>`;
    }
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';

  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">How It Works</div>
      <div class="panel-text">
        <strong>Tap any square</strong> to explore the number path.<br><br>
        Watch the <strong>dots appear</strong> below to show the quantity.<br><br>
        See the <strong>neighbors</strong> (before and after) to understand magnitude.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Key Concept</div>
      <div class="panel-text">
        A number path shows numbers in <strong>order</strong>. Each square is <strong>one more</strong> than the one before it. This helps us see that numbers have <strong>magnitude</strong> — some are bigger, some are smaller.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standards</div>
      <div class="panel-text">
        <strong>K.CC.4</strong> — Connect counting to cardinality<br><br>
        <strong>K.CC.5</strong> — Count to answer "how many?"
      </div>
    </div>
  `;
}

function selectNumber(num) {
  S.selectedNum = num;
  S.tokenPos = num;
  speak(num.toString());
  const token = document.getElementById('charToken');
  if (token) {
    token.classList.remove('hop');
    setTimeout(() => token.classList.add('hop'), 10);
  }
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  const path = getPathRange();

  let html = '<div class="number-path-container">';

  // Score at top
  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  // Number path
  html += '<div class="number-path" id="numberPath">';
  path.forEach(num => {
    let classes = 'path-square';
    if (S.selectedNum === num) classes += ' selected';
    if (S.targetNum === num) classes += ' target-square';
    if (S.targetNum2 === num) classes += ' target-square';
    html += `<div class="${classes}" onclick="practiceAnswer(${num})">${num}</div>`;
  });
  html += '</div>';

  // Question
  html += '<div class="practice-question">';

  if (S.questionType === 'tap-number') {
    html += `<div class="question-text">Tap the number:</div>
             <div class="question-highlight">${S.targetNum}</div>`;
  } else if (S.questionType === 'after') {
    html += `<div class="question-text">What comes AFTER <span style="color:var(--cyan);font-weight:800;">${S.targetNum}</span>?</div>
             <div style="margin-top:12px;font-size:14px;color:var(--muted);">Tap the next square →</div>`;
  } else if (S.questionType === 'before') {
    html += `<div class="question-text">What comes BEFORE <span style="color:var(--cyan);font-weight:800;">${S.targetNum}</span>?</div>
             <div style="margin-top:12px;font-size:14px;color:var(--muted);">Tap the previous square ←</div>`;
  } else if (S.questionType === 'hops') {
    html += `<div class="question-text">Count hops from <span style="color:var(--cyan);">${S.targetNum}</span> to <span style="color:var(--green);">${S.targetNum2}</span></div>
             <div style="margin-top:16px;">
               <input type="number" id="hopInput" class="number-input" placeholder="?" min="0" max="20" />
               <button class="play-btn primary" style="margin-top:12px;" onclick="submitHops()">✓ Submit</button>
             </div>`;
  } else if (S.questionType === 'compare') {
    html += `<div class="question-text">Which is MORE?</div>
             <div style="margin-top:16px;display:flex;gap:20px;justify-content:center;">
               <div class="question-highlight" style="cursor:pointer;" onclick="practiceCompare(${S.targetNum})">${S.targetNum}</div>
               <div style="font-size:20px;color:var(--muted);">or</div>
               <div class="question-highlight" style="cursor:pointer;" onclick="practiceCompare(${S.targetNum2})">${S.targetNum2}</div>
             </div>`;
  } else if (S.questionType === 'backward') {
    html += `<div class="question-text">Count backward from ${S.targetNum}. Tap in order.</div>
             <div style="margin-top:12px;font-size:13px;color:var(--muted);">You have tapped: <span id="backCount" style="color:var(--cyan);font-weight:700;">${S.hopCount} square${S.hopCount !== 1 ? 's' : ''}</span></div>`;
  }

  html += '</div>';
  html += '</div>';

  ws.innerHTML = html;

  if (S.questionType === 'hops') {
    setTimeout(() => document.getElementById('hopInput')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        Answer each question by <strong>tapping the number path</strong>.<br><br>
        Think about what you know about the number path to help you!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Key Skill</div>
      <div class="panel-text">
        Understanding the <strong>order</strong> of numbers and their <strong>relationships</strong> — which is before, which is after, which is bigger.
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.totalQuestions = (S.total || 0) + 1;
  S.total = S.totalQuestions;
  S.selectedNum = null;
  S.hopCount = 0;

  const questionTypes = [];
  questionTypes.push('tap-number', 'after', 'before');
  if (S.diff !== 'emergent') questionTypes.push('compare');
  if (S.diff === 'developing') questionTypes.push('hops');
  if (S.diff === 'secure') {
    questionTypes.push('hops', 'backward');
  }

  S.questionType = questionTypes[Math.floor(Math.random() * questionTypes.length)];

  // For emergent, only allow basic questions
  if (S.diff === 'emergent') {
    S.questionType = ['tap-number', 'after'][Math.floor(Math.random() * 2)];
  }

  S.targetNum = randInt(1, Math.max(1, S.maxNum - 1));

  if (S.questionType === 'after') {
    S.targetNum = randInt(1, Math.max(1, S.maxNum - 1));
  } else if (S.questionType === 'before') {
    S.targetNum = randInt(2, S.maxNum);
  } else if (S.questionType === 'hops') {
    S.targetNum = randInt(1, Math.max(1, S.maxNum - 2));
    S.targetNum2 = randInt(S.targetNum + 1, S.maxNum);
  } else if (S.questionType === 'compare') {
    S.targetNum = randInt(1, S.maxNum);
    S.targetNum2 = randInt(1, S.maxNum);
    while (S.targetNum2 === S.targetNum) {
      S.targetNum2 = randInt(1, S.maxNum);
    }
  } else if (S.questionType === 'backward') {
    S.targetNum = randInt(3, S.maxNum);
  }
}

function practiceAnswer(num) {
  if (S.questionType === 'tap-number') {
    if (num === S.targetNum) {
      showFB('✓ Yes!', 'correct');
      S.score++;
      setTimeout(() => {
        newPracticeQuestion();
        render();
      }, 800);
    } else {
      showFB('✗ Try again', 'incorrect');
    }
  } else if (S.questionType === 'after') {
    if (num === S.targetNum + 1) {
      showFB('✓ Correct!', 'correct');
      S.score++;
      setTimeout(() => {
        newPracticeQuestion();
        render();
      }, 800);
    } else {
      showFB('✗ Try again', 'incorrect');
    }
  } else if (S.questionType === 'before') {
    if (num === S.targetNum - 1) {
      showFB('✓ Correct!', 'correct');
      S.score++;
      setTimeout(() => {
        newPracticeQuestion();
        render();
      }, 800);
    } else {
      showFB('✗ Try again', 'incorrect');
    }
  } else if (S.questionType === 'compare') {
    // Should not happen, handled separately
  } else if (S.questionType === 'backward') {
    // Tap tracking for backward counting
    if (S.hopCount === 0 && num === S.targetNum) {
      S.hopCount = 1;
      S.selectedNum = num;
      render();
    } else if (S.hopCount > 0 && num === S.targetNum - S.hopCount) {
      S.hopCount++;
      S.selectedNum = num;
      render();
      if (S.hopCount >= 3) {
        showFB('✓ Great!', 'correct');
        S.score++;
        setTimeout(() => {
          newPracticeQuestion();
          render();
        }, 800);
      }
    } else {
      showFB('✗ Continue from where you are', 'try-again');
    }
  }
}

function practiceCompare(num) {
  if (num > (num === S.targetNum ? S.targetNum2 : S.targetNum)) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else if (num < (num === S.targetNum ? S.targetNum2 : S.targetNum)) {
    showFB('✗ That\'s smaller', 'incorrect');
  } else {
    showFB('✗ They\'re the same!', 'try-again');
  }
}

function submitHops() {
  const input = document.getElementById('hopInput');
  const val = parseInt(input?.value || 0);
  const correct = Math.abs(S.targetNum2 - S.targetNum);

  if (val === correct) {
    showFB('✓ Perfect hops!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try counting again', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  const path = getPathRange();

  let html = '<div class="number-path-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Game Over!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Round</span>
        <span>${S.playRound} / 8</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
    </div>`;

    // Spinner display
    const spinValues = [1, 2, 3];
    if (S.diff === 'emergent') {
      spinValues.length = 2;
    }

    html += `<div style="margin:20px 0;text-align:center;">
      <div style="font-size:14px;color:var(--muted);margin-bottom:8px;">TAP TO SPIN</div>
      <button class="play-btn primary" onclick="spin()" style="font-size:32px;padding:16px 32px;">🎰</button>
      <div id="spinDisplay" style="font-size:48px;font-weight:900;margin-top:12px;font-family:JetBrains Mono;color:var(--cyan);">-</div>
    </div>`;

    // Number path
    html += '<div class="number-path" id="numberPath">';
    path.forEach(num => {
      const isSelected = S.tokenPos === num;
      html += `<div class="path-square ${isSelected ? 'selected' : ''}" onclick="moveToSquare(${num})">${num}</div>`;
    });
    html += '<div class="character-token" id="charToken" style="left: ${(S.tokenPos - 1) * 54 + 25}px;"></div>';
    html += '</div>';

    html += `<div style="text-align:center;margin-top:16px;font-size:14px;color:var(--text2);">
      Spin the value and tap the destination square!
    </div>`;
  }

  html += '</div>';

  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 20, 100)}%;"></div>
    </div>
  </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        <strong>1. Spin</strong> the spinner<br><br>
        <strong>2. Tap</strong> the destination square (current + spin value)<br><br>
        <strong>3. Reach the end</strong> to win!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Best Streak</div>
      <div class="panel-text" style="font-size:24px; font-weight:800; color:var(--purple);">🏆 ${S.playBest}</div>
    </div>
  `;
}

function spin() {
  const spinValues = [1, 2, 3];
  if (S.diff === 'emergent') {
    spinValues.length = 2;
  }

  S.spinValue = spinValues[Math.floor(Math.random() * spinValues.length)];

  const display = document.getElementById('spinDisplay');
  if (display) {
    display.textContent = S.spinValue;
    display.classList.remove('pop-in');
    setTimeout(() => display.classList.add('pop-in'), 10);
  }
}

function moveToSquare(num) {
  if (S.spinValue === 0) {
    showFB('Spin first!', 'try-again');
    return;
  }

  const targetPos = S.tokenPos + S.spinValue;

  if (num === targetPos) {
    showFB('✓ Correct!', 'correct');
    S.tokenPos = num;
    S.playScore += 10 + (S.playStreak * 2);
    S.playStreak++;
    if (S.playStreak > S.playBest) S.playBest = S.playStreak;
    S.spinValue = 0;

    if (S.tokenPos >= S.maxNum) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      S.playRound++;
      if (S.playRound > 8) {
        S.gameEnded = true;
      }
      setTimeout(() => render(), 800);
    }
  } else {
    showFB('✗ Not quite', 'incorrect');
    S.playStreak = 0;
    S.spinValue = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.playBest = Math.max(S.playBest, S.playStreak);
  S.tokenPos = 0;
  S.gameEnded = false;
  render();
}
