<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependent & Independent Variables - VINCULUM</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .vinculum-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background-color: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .vinculum-header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .vinculum-back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background-color: var(--bg2);
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      color: var(--text);
      text-decoration: none;
    }

    .vinculum-back-btn:hover {
      background-color: var(--cyan);
      color: white;
    }

    .vinculum-title {
      font-size: 28px;
      font-weight: 700;
    }

    .badge, .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge {
      background-color: var(--cyan);
      color: white;
    }

    .tag {
      background-color: var(--pink);
      color: white;
    }

    .mode-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border);
    }

    .mode-tab {
      padding: 12px 24px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .mode-tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .mode-content {
      display: none;
    }

    .mode-content.active {
      display: block;
    }

    .content-section {
      background-color: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .content-section h2 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    .difficulty-selector {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .difficulty-btn {
      padding: 8px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background-color: var(--bg2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .difficulty-btn.active {
      background-color: var(--cyan);
      border-color: var(--cyan);
      color: white;
    }

    .scenario-box {
      background-color: var(--bg2);
      padding: 25px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid var(--cyan);
    }

    .scenario-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--cyan);
    }

    .variable-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 20px 0;
    }

    .variable-card {
      background-color: var(--card);
      padding: 15px;
      border-radius: 8px;
      border: 2px solid var(--border);
    }

    .variable-card.independent {
      border-left: 4px solid var(--primary);
    }

    .variable-card.dependent {
      border-left: 4px solid var(--success);
    }

    .variable-label {
      font-size: 12px;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .variable-name {
      font-size: 18px;
      font-weight: 700;
    }

    .input-slider {
      width: 100%;
      margin: 15px 0;
      height: 8px;
      border-radius: 4px;
      outline: none;
      -webkit-appearance: none;
      background: var(--border);
    }

    .input-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
    }

    .input-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      border: none;
    }

    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--primary);
      margin: 0 10px;
    }

    .scenario-flow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--bg2);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .flow-item {
      text-align: center;
      flex: 1;
    }

    .flow-label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .flow-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--cyan);
    }

    .table-container {
      overflow-x: auto;
      margin: 20px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--bg2);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background-color: var(--cyan);
      color: white;
      font-weight: 700;
    }

    tr:hover {
      background-color: rgba(0,0,0,0.05);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: var(--cyan);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: var(--bg2);
      color: var(--text);
      border: 2px solid var(--border);
    }

    .quiz-item {
      background-color: var(--bg2);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid var(--cyan);
    }

    .quiz-item.correct {
      border-left-color: var(--success);
      background-color: rgba(76, 175, 80, 0.1);
    }

    .quiz-item.incorrect {
      border-left-color: var(--error);
      background-color: rgba(244, 67, 54, 0.1);
    }

    .quiz-question {
      font-weight: 600;
      margin-bottom: 12px;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .quiz-option {
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background-color: var(--bg);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      font-weight: 600;
    }

    .quiz-option:hover {
      border-color: var(--cyan);
    }

    .quiz-option.selected {
      background-color: var(--cyan);
      color: white;
      border-color: var(--cyan);
    }

    #feedback {
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .vinculum-header {
        flex-direction: column;
        gap: 15px;
      }

      .scenario-flow {
        flex-direction: column;
      }

      .arrow {
        transform: rotate(90deg);
        margin: 10px 0;
      }

      .variable-display {
        grid-template-columns: 1fr;
      }

      .quiz-options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="vinculum-header">
      <div class="vinculum-header-left">
        <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn">←</a>
        <div>
          <h1 class="vinculum-title">Dependent & Independent Variables</h1>
          <div style="margin-top: 8px;">
            <span class="badge">Grade 6</span>
            <span class="tag">6.EE.C.9</span>
          </div>
        </div>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="explore">Explore</button>
      <button class="mode-tab" data-mode="practice">Practice</button>
      <button class="mode-tab" data-mode="play">Play</button>
    </div>

    <!-- EXPLORE MODE -->
    <div id="explore" class="mode-content active">
      <div class="content-section">
        <h2>Explore: Cause & Effect Relationships</h2>
        <div class="difficulty-selector">
          <label>Scenario:</label>
          <button class="difficulty-btn active" data-scenario="work">Hours Worked</button>
          <button class="difficulty-btn" data-scenario="pages">Pages Read</button>
          <button class="difficulty-btn" data-scenario="plants">Plants Watering</button>
        </div>

        <div class="scenario-box">
          <div class="scenario-title" id="exploreTitle">Work Scenario</div>
          <p id="exploreDesc" style="margin-bottom: 20px; color: var(--text2);"></p>

          <div class="scenario-flow">
            <div class="flow-item">
              <div class="flow-label">Independent Variable (You Control)</div>
              <div class="flow-value" id="exploreIndependent">0</div>
            </div>
            <div class="arrow">→</div>
            <div class="flow-item">
              <div class="flow-label">Dependent Variable (Result)</div>
              <div class="flow-value" id="exploreDependent">$0</div>
            </div>
          </div>

          <label style="display: block; margin-top: 20px; font-weight: 600;">Adjust the independent variable:</label>
          <input type="range" id="exploreSlider" class="input-slider" min="0" max="10" value="0"
                 onchange="exploreMode.updateValue(this.value)" oninput="exploreMode.updateValue(this.value)">
          <div style="text-align: center; margin-top: 10px; color: var(--text2);">0 — 10</div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th id="indepHeader">Hours</th>
                  <th id="depHeader">Money Earned</th>
                </tr>
              </thead>
              <tbody id="exploreTable"></tbody>
            </table>
          </div>

          <div class="button-group">
            <button class="btn-primary" onclick="exploreMode.generateTable()">Fill Table</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PRACTICE MODE -->
    <div id="practice" class="mode-content">
      <div class="content-section">
        <h2>Practice: Identify Variables</h2>
        <div class="difficulty-selector">
          <label>Difficulty:</label>
          <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
          <button class="difficulty-btn" data-difficulty="medium">Medium</button>
          <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>

        <div id="practiceContainer"></div>

        <div class="button-group">
          <button class="btn-primary" onclick="practiceMode.checkAnswers()">Check Answers</button>
          <button class="btn-secondary" onclick="practiceMode.reset()">New Problems</button>
        </div>

        <div style="background-color: var(--bg2); padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: 600;">
          Score: <span id="practiceScore">0/0</span>
        </div>
      </div>
    </div>

    <!-- PLAY MODE -->
    <div id="play" class="mode-content">
      <div class="content-section">
        <h2>Play: Build Your Own Scenario</h2>
        <div class="difficulty-selector">
          <label>Challenge Level:</label>
          <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
          <button class="difficulty-btn" data-difficulty="medium">Medium</button>
          <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="scenario-box">
          <div class="scenario-title">Create a Scenario</div>

          <label style="display: block; margin-top: 20px; font-weight: 600;">Independent Variable (What you control):</label>
          <input type="text" id="independentInput" placeholder="e.g., Hours of practice" style="width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--border); border-radius: 6px; background-color: var(--bg); color: var(--text);">

          <label style="display: block; margin-top: 20px; font-weight: 600;">Dependent Variable (The result):</label>
          <input type="text" id="dependentInput" placeholder="e.g., Skills improved" style="width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--border); border-radius: 6px; background-color: var(--bg); color: var(--text);">

          <label style="display: block; margin-top: 20px; font-weight: 600;">Relationship Rule (e.g., y = 2x + 1):</label>
          <input type="text" id="relationshipInput" placeholder="e.g., Money earned = Hours × $12" style="width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--border); border-radius: 6px; background-color: var(--bg); color: var(--text);">

          <div class="button-group">
            <button class="btn-primary" onclick="playMode.checkScenario()">Check Scenario</button>
            <button class="btn-secondary" onclick="playMode.reset()">Clear</button>
          </div>
        </div>

        <div style="background-color: var(--bg2); padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: 600; display: none;" id="scenarioFeedback"></div>
      </div>
    </div>
  </div>

  <div id="feedback" class="feedback"></div>

  <script src="../../vinculum-feedback.js"></script>
  <script src="../../vinculum-input.js"></script>

  <script>
    const SCENARIOS = {
      work: {
        title: 'Hours Worked → Money Earned',
        desc: 'You earn $15 per hour at your job. How does hours worked affect money earned?',
        independent: 'Hours Worked',
        dependent: 'Money Earned ($)',
        calculate: (x) => x * 15
      },
      pages: {
        title: 'Pages Read → Time Spent',
        desc: 'You read about 5 pages every 10 minutes. How does pages read affect time?',
        independent: 'Pages Read',
        dependent: 'Time Spent (min)',
        calculate: (x) => x * 2
      },
      plants: {
        title: 'Plants Watered → Water Used',
        desc: 'Each plant needs 0.5 liters of water. How many plants affects water?',
        independent: 'Plants Watered',
        dependent: 'Water Used (L)',
        calculate: (x) => x * 0.5
      }
    };

    const PRACTICE_QUESTIONS = {
      easy: [
        { q: 'You bake cookies. How does the number of batches affect the number of cookies made?', indep: 'Number of batches', dep: 'Number of cookies' },
        { q: 'You save $5 per week. How does weeks affect total savings?', indep: 'Number of weeks', dep: 'Total savings ($)' },
        { q: 'A candle burns 1 inch per hour. How does time affect candle length?', indep: 'Hours burned', dep: 'Candle length (inches)' },
        { q: 'Students get 2 homework assignments per week. How does weeks affect total assignments?', indep: 'Number of weeks', dep: 'Total assignments' },
        { q: 'A car travels 60 miles per hour. How does time affect distance?', indep: 'Time (hours)', dep: 'Distance (miles)' }
      ],
      medium: [
        { q: 'A recipe calls for 2 cups flour per batch. How does batches affect flour needed?', indep: 'Number of batches', dep: 'Flour (cups)' },
        { q: 'Plants grow 3 cm per month. How does months affect plant height?', indep: 'Months of growth', dep: 'Plant height (cm)' },
        { q: 'You study 1.5 hours per night. How does nights affect total study time?', indep: 'Number of nights', dep: 'Total study time (hours)' },
        { q: 'A phone costs $50 and adds $35 per month for service. How does months affect total cost?', indep: 'Months', dep: 'Total cost ($)' },
        { q: 'A gym membership costs $30/month after $100 sign-up. How does months affect total paid?', indep: 'Months', dep: 'Total paid ($)' }
      ],
      hard: [
        { q: 'A swimming pool loses 2% of water per day due to evaporation. How does days affect remaining water?', indep: 'Days', dep: 'Remaining water (%)' },
        { q: 'A bacteria doubles every hour. How does hours affect bacteria count?', indep: 'Hours', dep: 'Bacteria count' },
        { q: 'Temperature changes by -3°F per 1000 feet of elevation. How does elevation affect temperature?', indep: 'Elevation (1000s of ft)', dep: 'Temperature change (°F)' },
        { q: 'A loan decreases by $500/month after compound interest. How does months affect loan balance?', indep: 'Months', dep: 'Loan balance ($)' },
        { q: 'Stock price follows y = 2x² where x is years. How do years affect stock price?', indep: 'Years', dep: 'Stock price ($)' }
      ]
    };

    // EXPLORE MODE
    const exploreMode = {
      currentScenario: 'work',

      init() {
        document.querySelectorAll('#explore .difficulty-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('#explore .difficulty-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            this.currentScenario = e.target.dataset.scenario;
            this.render();
          });
        });
        this.render();
      },

      render() {
        const scenario = SCENARIOS[this.currentScenario];
        document.getElementById('exploreTitle').textContent = scenario.title;
        document.getElementById('exploreDesc').textContent = scenario.desc;
        document.getElementById('indepHeader').textContent = scenario.independent;
        document.getElementById('depHeader').textContent = scenario.dependent;
        document.getElementById('exploreIndependent').textContent = '0 ' + scenario.independent.split(' ')[0];
        document.getElementById('exploreDependent').textContent = scenario.calculate(0);
        document.getElementById('exploreSlider').value = 0;
        this.generateTable();
      },

      updateValue(val) {
        const scenario = SCENARIOS[this.currentScenario];
        const result = scenario.calculate(parseInt(val));
        document.getElementById('exploreIndependent').textContent = val + ' ' + scenario.independent.split(' ')[0];
        document.getElementById('exploreDependent').textContent = result + (scenario.dependent.includes('$') ? ' $' : result > 1 ? ' ' : '');
      },

      generateTable() {
        const scenario = SCENARIOS[this.currentScenario];
        const tbody = document.getElementById('exploreTable');
        tbody.innerHTML = '';
        for (let i = 0; i <= 10; i++) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${i}</td><td>${scenario.calculate(i)}</td>`;
          tbody.appendChild(tr);
        }
      }
    };

    // PRACTICE MODE
    const practiceMode = {
      currentDifficulty: 'easy',
      questions: [],

      init() {
        document.querySelectorAll('#practice .difficulty-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('#practice .difficulty-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            this.currentDifficulty = e.target.dataset.difficulty;
            this.reset();
          });
        });
        this.reset();
      },

      reset() {
        const all = PRACTICE_QUESTIONS[this.currentDifficulty];
        this.questions = all.slice(0, 3);
        this.render();
      },

      render() {
        const container = document.getElementById('practiceContainer');
        container.innerHTML = '';

        this.questions.forEach((q, idx) => {
          const div = document.createElement('div');
          div.className = 'quiz-item';
          div.innerHTML = `
            <div class="quiz-question">${q.q}</div>
            <div class="quiz-options">
              <button class="quiz-option" onclick="practiceMode.selectOption(${idx}, 'indep')">Independent: ${q.indep}</button>
              <button class="quiz-option" onclick="practiceMode.selectOption(${idx}, 'dep')">Dependent: ${q.dep}</button>
            </div>
            <div style="margin-top: 10px; font-size: 12px; color: var(--text2);">
              <input type="hidden" data-idx="${idx}" data-indep="${q.indep}" data-dep="${q.dep}">
            </div>
          `;
          container.appendChild(div);
        });
      },

      selectOption(idx, type) {
        const items = document.querySelectorAll('.quiz-item');
        const item = items[idx];
        const buttons = item.querySelectorAll('.quiz-option');
        buttons.forEach(b => b.classList.remove('selected'));
        event.target.classList.add('selected');
      },

      checkAnswers() {
        let correct = 0;
        document.querySelectorAll('.quiz-item').forEach((item, idx) => {
          const selected = item.querySelector('.quiz-option.selected');
          const hidden = item.querySelector('input[type="hidden"]');
          if (selected) {
            const isCorrect = (selected.textContent.includes('Independent') && hidden.dataset.indep) ||
                            (selected.textContent.includes('Dependent') && hidden.dataset.dep);
            if (isCorrect) {
              item.classList.add('correct');
              correct++;
            } else {
              item.classList.add('incorrect');
            }
          }
        });
        document.getElementById('practiceScore').textContent = `${correct}/${this.questions.length}`;
      }
    };

    // PLAY MODE
    const playMode = {
      reset() {
        document.getElementById('independentInput').value = '';
        document.getElementById('dependentInput').value = '';
        document.getElementById('relationshipInput').value = '';
        document.getElementById('scenarioFeedback').style.display = 'none';
      },

      checkScenario() {
        const indep = document.getElementById('independentInput').value.trim();
        const dep = document.getElementById('dependentInput').value.trim();
        const relation = document.getElementById('relationshipInput').value.trim();

        if (!indep || !dep || !relation) {
          showFeedback('Please fill in all fields!', 'error');
          return;
        }

        const fb = document.getElementById('scenarioFeedback');
        fb.style.display = 'block';
        fb.innerHTML = `
          <strong>Your Scenario:</strong><br>
          <strong>Independent:</strong> ${indep}<br>
          <strong>Dependent:</strong> ${dep}<br>
          <strong>Relationship:</strong> ${relation}<br><br>
          <strong>✓ Great thinking!</strong> This is a valid cause-and-effect relationship!
        `;
        showFeedback('Scenario created successfully!', 'success');
      }
    };

    document.querySelectorAll('#play .difficulty-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#play .difficulty-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      });
    });

    // Mode switching
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.mode).classList.add('active');
      });
    });

    // Initialize
    exploreMode.init();
    practiceMode.init();
  </script>
</body>
</html>
