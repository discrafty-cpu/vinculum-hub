<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long Division with Decimals - VINCULUM</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .vinculum-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background-color: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .vinculum-header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .vinculum-back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background-color: var(--bg2);
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      color: var(--text);
      text-decoration: none;
    }

    .vinculum-back-btn:hover {
      background-color: var(--cyan);
      color: white;
    }

    .vinculum-title {
      font-size: 28px;
      font-weight: 700;
    }

    .badge, .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge {
      background-color: var(--cyan);
      color: white;
    }

    .tag {
      background-color: var(--pink);
      color: white;
    }

    .mode-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border);
    }

    .vinculum-mode-tab {
      padding: 12px 24px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .vinculum-mode-tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .mode-content {
      display: none;
    }

    .mode-content.active {
      display: block;
    }

    .content-section {
      background-color: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .content-section h2 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    .difficulty-selector {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .vinculum-diff-btn {
      padding: 8px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background-color: var(--bg2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .vinculum-diff-btn.active {
      background-color: var(--cyan);
      border-color: var(--cyan);
      color: white;
    }

    .division-display {
      background-color: var(--bg2);
      padding: 30px;
      border-radius: 8px;
      margin: 20px 0;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      overflow-x: auto;
      text-align: center;
    }

    .division-problem {
      display: inline-block;
      text-align: right;
      padding: 20px;
      background-color: var(--bg);
      border: 2px solid var(--cyan);
      border-radius: 8px;
    }

    .division-line {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
      padding: 10px 0;
      border-top: 2px solid var(--border);
    }

    .step-indicator {
      background-color: var(--bg2);
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid var(--cyan);
    }

    .step-title {
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 10px;
    }

    .step-description {
      color: var(--text);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    input[type="text"], input[type="number"] {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background-color: var(--bg);
      color: var(--text);
      font-size: 16px;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .practice-problem {
      background-color: var(--bg2);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid var(--cyan);
    }

    .practice-problem.correct {
      border-left-color: var(--success);
      background-color: rgba(76, 175, 80, 0.1);
    }

    .practice-problem.incorrect {
      border-left-color: var(--error);
      background-color: rgba(244, 67, 54, 0.1);
    }

    .problem-number {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background-color: var(--cyan);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: var(--bg2);
      color: var(--text);
      border: 2px solid var(--border);
    }

    .score-display {
      background-color: var(--bg2);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    .timer {
      font-size: 24px;
      text-align: center;
      color: var(--cyan);
      font-weight: 700;
    }

    #feedback {
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .vinculum-header {
        flex-direction: column;
        gap: 15px;
      }

      .division-display {
        font-size: 14px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="vinculum-header">
      <div class="vinculum-header-left">
        <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn">←</a>
        <div>
          <h1 class="vinculum-title">Long Division with Decimals</h1>
          <div style="margin-top: 8px;">
            <span class="badge">Grade 6</span>
            <span class="tag">6.NS.B.2-3</span>
          </div>
        </div>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="explore">Explore</button>
      <button class="mode-tab" data-mode="practice">Practice</button>
      <button class="mode-tab" data-mode="play">Play</button>
    </div>

    <!-- EXPLORE MODE -->
    <div id="explore" class="mode-content active">
      <div class="content-section">
        <h2>Explore: Step-by-Step Long Division</h2>
        <div class="difficulty-selector">
          <label>Difficulty:</label>
          <button class="vinculum-diff-btn active" data-difficulty="easy">Easy</button>
          <button class="vinculum-diff-btn" data-difficulty="medium">Medium</button>
          <button class="vinculum-diff-btn" data-difficulty="hard">Hard</button>
        </div>

        <div class="division-display" id="exploreDisplay">
          12 ÷ 3
        </div>

        <div id="exploreSteps"></div>

        <div class="button-group">
          <button class="btn-primary" onclick="exploreMode.nextStep()">Next Step</button>
          <button class="btn-secondary" onclick="exploreMode.reset()">New Problem</button>
        </div>
      </div>
    </div>

    <!-- PRACTICE MODE -->
    <div id="practice" class="mode-content">
      <div class="content-section">
        <h2>Practice: Solve with Scaffolding</h2>
        <div class="difficulty-selector">
          <label>Difficulty:</label>
          <button class="vinculum-diff-btn active" data-difficulty="easy">Easy</button>
          <button class="vinculum-diff-btn" data-difficulty="medium">Medium</button>
          <button class="vinculum-diff-btn" data-difficulty="hard">Hard</button>
        </div>

        <div id="practiceContainer"></div>

        <div class="button-group">
          <button class="btn-primary" onclick="practiceMode.checkAnswers()">Check All</button>
          <button class="btn-secondary" onclick="practiceMode.reset()">Reset</button>
        </div>

        <div class="score-display">
          <span>Correct:</span>
          <span id="practiceScore">0/0</span>
        </div>
      </div>
    </div>

    <!-- PLAY MODE: Division Race -->
    <div id="play" class="mode-content">
      <div class="content-section">
        <h2>Play: Division Race</h2>
        <div class="difficulty-selector">
          <label>Difficulty:</label>
          <button class="vinculum-diff-btn active" data-difficulty="easy">Easy</button>
          <button class="vinculum-diff-btn" data-difficulty="medium">Medium</button>
          <button class="vinculum-diff-btn" data-difficulty="hard">Hard</button>
        </div>

        <div style="background-color: var(--bg2); padding: 20px; border-radius: 8px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-size: 14px; color: var(--text2); margin-bottom: 5px;">Points</div>
            <div style="font-size: 28px; font-weight: 700; color: var(--cyan);" id="raceScore">0</div>
          </div>
          <div style="text-align: center;">
            <div style="font-size: 14px; color: var(--text2); margin-bottom: 5px;">Time</div>
            <div class="timer" id="raceTimer">60</div>
          </div>
          <div>
            <div style="font-size: 14px; color: var(--text2); margin-bottom: 5px;">Solved</div>
            <div style="font-size: 28px; font-weight: 700; color: var(--cyan);" id="raceSolved">0</div>
          </div>
        </div>

        <div class="division-display" id="raceProblem">
          ÷
        </div>

        <div class="input-group" style="margin: 20px 0;">
          <input type="number" id="raceAnswer" placeholder="Enter answer" step="0.01" style="flex: 1; font-size: 18px;">
        </div>

        <div class="button-group">
          <button class="btn-primary" id="raceStartBtn" onclick="playMode.start()">Start Race</button>
          <button class="btn-primary" id="raceSubmitBtn" onclick="playMode.submit()" style="display: none;">Submit</button>
          <button class="btn-secondary" onclick="playMode.reset()">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <div id="feedback" class="feedback"></div>

  <script src="../../vinculum-feedback.js"></script>
  <script src="../../vinculum-input.js"></script>

  <script>
    const PROBLEMS = {
      easy: [
        { dividend: 12, divisor: 3, answer: 4 },
        { dividend: 15, divisor: 5, answer: 3 },
        { dividend: 20, divisor: 4, answer: 5 },
        { dividend: 18, divisor: 6, answer: 3 },
        { dividend: 24, divisor: 8, answer: 3 }
      ],
      medium: [
        { dividend: 45, divisor: 2, answer: 22.5 },
        { dividend: 75, divisor: 4, answer: 18.75 },
        { dividend: 100, divisor: 8, answer: 12.5 },
        { dividend: 55, divisor: 4, answer: 13.75 },
        { dividend: 35, divisor: 2, answer: 17.5 }
      ],
      hard: [
        { dividend: 137, divisor: 5, answer: 27.4 },
        { dividend: 245, divisor: 8, answer: 30.625 },
        { dividend: 156, divisor: 6, answer: 26 },
        { dividend: 189, divisor: 4, answer: 47.25 },
        { dividend: 273, divisor: 7, answer: 39 }
      ]
    };

    // EXPLORE MODE
    const exploreMode = {
      currentDifficulty: 'easy',
      currentProblem: null,
      currentStep: 0,
      steps: [],

      init() {
        document.querySelectorAll('#explore .vinculum-diff-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('#explore .vinculum-diff-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            this.currentDifficulty = e.target.dataset.difficulty;
            this.reset();
          });
        });
        this.reset();
      },

      reset() {
        const problems = PROBLEMS[this.currentDifficulty];
        this.currentProblem = problems[Math.floor(Math.random() * problems.length)];
        this.currentStep = 0;
        this.generateSteps();
        this.render();
      },

      generateSteps() {
        const p = this.currentProblem;
        this.steps = [
          `Set up: ${p.dividend} ÷ ${p.divisor}`,
          `Divide: ${Math.floor(p.dividend / p.divisor)} goes into ${p.dividend}`,
          `Multiply: ${Math.floor(p.dividend / p.divisor)} × ${p.divisor} = ${Math.floor(p.dividend / p.divisor) * p.divisor}`,
          `Subtract: ${p.dividend} - ${Math.floor(p.dividend / p.divisor) * p.divisor} = ${p.dividend % p.divisor}`,
          `Add decimal point and bring down a 0`,
          `Result: ${p.answer}`
        ];
      },

      render() {
        const display = document.getElementById('exploreDisplay');
        display.textContent = `${this.currentProblem.dividend} ÷ ${this.currentProblem.divisor}`;

        const stepsDiv = document.getElementById('exploreSteps');
        stepsDiv.innerHTML = '';

        for (let i = 0; i <= this.currentStep && i < this.steps.length; i++) {
          const step = document.createElement('div');
          step.className = 'step-indicator';
          step.innerHTML = `<div class="step-title">Step ${i + 1}</div><div class="step-description">${this.steps[i]}</div>`;
          stepsDiv.appendChild(step);
        }

        if (this.currentStep >= this.steps.length - 1) {
          const finalDisplay = document.createElement('div');
          finalDisplay.style.cssText = 'background: linear-gradient(135deg, var(--cyan), var(--primary)); color: white; padding: 20px; border-radius: 8px; text-align: center; font-size: 24px; font-weight: 700; margin-top: 20px;';
          finalDisplay.textContent = `Answer: ${this.currentProblem.answer}`;
          stepsDiv.appendChild(finalDisplay);
        }
      },

      nextStep() {
        if (this.currentStep < this.steps.length - 1) {
          this.currentStep++;
          this.render();
        } else {
          showFeedback('Problem complete! Click "New Problem" to continue.', 'success');
        }
      }
    };

    // PRACTICE MODE
    const practiceMode = {
      currentDifficulty: 'easy',
      problems: [],

      init() {
        document.querySelectorAll('#practice .vinculum-diff-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('#practice .vinculum-diff-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            this.currentDifficulty = e.target.dataset.difficulty;
            this.reset();
          });
        });
        this.reset();
      },

      reset() {
        this.problems = PROBLEMS[this.currentDifficulty].slice(0, 3);
        this.render();
      },

      render() {
        const container = document.getElementById('practiceContainer');
        container.innerHTML = '';

        this.problems.forEach((prob, idx) => {
          const div = document.createElement('div');
          div.className = 'practice-problem';
          div.innerHTML = `
            <div class="problem-number">${prob.dividend} ÷ ${prob.divisor} =</div>
            <input type="number" placeholder="Answer" data-idx="${idx}" data-answer="${prob.answer}" step="0.01" style="width: 120px;">
          `;
          container.appendChild(div);
        });
      },

      checkAnswers() {
        const inputs = document.querySelectorAll('#practiceContainer input');
        let correct = 0;

        inputs.forEach(input => {
          const answer = parseFloat(input.dataset.answer);
          const userAnswer = parseFloat(input.value);
          const problemDiv = input.closest('.practice-problem');

          if (Math.abs(userAnswer - answer) < 0.01) {
            problemDiv.classList.add('correct');
            problemDiv.classList.remove('incorrect');
            correct++;
          } else {
            problemDiv.classList.add('incorrect');
            problemDiv.classList.remove('correct');
          }
        });

        document.getElementById('practiceScore').textContent = `${correct}/${inputs.length}`;
        showFeedback(`${correct} out of ${inputs.length} correct!`, correct === inputs.length ? 'success' : 'info');
      }
    };

    // PLAY MODE
    const playMode = {
      currentDifficulty: 'easy',
      problems: [],
      currentIndex: 0,
      score: 0,
      solved: 0,
      timeLeft: 60,
      gameActive: false,
      timerInterval: null,

      init() {
        document.querySelectorAll('#play .vinculum-diff-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('#play .vinculum-diff-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            this.currentDifficulty = e.target.dataset.difficulty;
          });
        });
      },

      start() {
        this.problems = [...PROBLEMS[this.currentDifficulty]].sort(() => Math.random() - 0.5);
        this.currentIndex = 0;
        this.score = 0;
        this.solved = 0;
        this.timeLeft = 60;
        this.gameActive = true;
        document.getElementById('raceStartBtn').style.display = 'none';
        document.getElementById('raceSubmitBtn').style.display = 'inline-block';
        document.getElementById('raceAnswer').disabled = false;
        this.showProblem();
        this.startTimer();
      },

      showProblem() {
        if (this.currentIndex < this.problems.length) {
          const p = this.problems[this.currentIndex];
          document.getElementById('raceProblem').textContent = `${p.dividend} ÷ ${p.divisor}`;
          document.getElementById('raceAnswer').value = '';
          document.getElementById('raceAnswer').focus();
        }
      },

      submit() {
        if (!this.gameActive || this.currentIndex >= this.problems.length) return;

        const answer = parseFloat(document.getElementById('raceAnswer').value);
        const correct = this.problems[this.currentIndex].answer;

        if (Math.abs(answer - correct) < 0.01) {
          this.score += 10;
          this.solved++;
        }

        document.getElementById('raceScore').textContent = this.score;
        document.getElementById('raceSolved').textContent = this.solved;

        this.currentIndex++;
        if (this.currentIndex < this.problems.length) {
          this.showProblem();
        } else {
          this.endGame();
        }
      },

      startTimer() {
        this.timerInterval = setInterval(() => {
          this.timeLeft--;
          document.getElementById('raceTimer').textContent = this.timeLeft;
          if (this.timeLeft <= 0) {
            this.endGame();
          }
        }, 1000);
      },

      endGame() {
        this.gameActive = false;
        clearInterval(this.timerInterval);
        document.getElementById('raceStartBtn').style.display = 'inline-block';
        document.getElementById('raceSubmitBtn').style.display = 'none';
        document.getElementById('raceAnswer').disabled = true;
        showFeedback(`Race Over! Score: ${this.score} | Solved: ${this.solved}`, 'info');
      },

      reset() {
        this.gameActive = false;
        clearInterval(this.timerInterval);
        this.score = 0;
        this.solved = 0;
        this.timeLeft = 60;
        this.currentIndex = 0;
        document.getElementById('raceStartBtn').style.display = 'inline-block';
        document.getElementById('raceSubmitBtn').style.display = 'none';
        document.getElementById('raceScore').textContent = '0';
        document.getElementById('raceSolved').textContent = '0';
        document.getElementById('raceTimer').textContent = '60';
        document.getElementById('raceAnswer').value = '';
        document.getElementById('raceAnswer').disabled = true;
      }
    };

    // Mode switching
    document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.mode).classList.add('active');
      });
    });

    // Initialize
    exploreMode.init();
    practiceMode.init();
    playMode.init();
  </script>
</body>
</html>
