<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VINCULUM Learning Hub - Volume and Surface Area">
    <meta name="author" content="VINCULUM">
    <title>Volume and Surface Area — VINCULUM Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../vinculum-core.css">

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #0066cc;
            --success: #00a854;
            --error: #ff4d4f;
        }

        .explore-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 1rem 0;
        }

        .shape-builder {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .shape-builder h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .shape-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-group label {
            min-width: 60px;
            font-weight: 500;
        }

        .control-group input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .control-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }

        .shape-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .shape-btn {
            padding: 0.75rem;
            border: 2px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .shape-btn:hover {
            border-color: var(--primary);
            background: rgba(0,102,204,0.05);
        }

        .shape-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .shape-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            color: white;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .shape-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .measurements {
            background: #f0f0f0;
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .measurement-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #ddd;
        }

        .measurement-item:last-child {
            border-bottom: none;
        }

        .measurement-label {
            font-weight: 500;
            color: var(--text);
        }

        .measurement-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 600;
        }

        .practice-content {
            max-width: 600px;
        }

        .problem-card {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .problem-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .problem-dims {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .problem-dims p {
            margin: 0.5rem 0;
            color: var(--text);
        }

        .answer-inputs {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .answer-row label {
            min-width: 120px;
            font-weight: 500;
        }

        .answer-row input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        .answer-row input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .check-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .check-btn:hover {
            background: #0052a3;
        }

        .next-btn {
            padding: 0.75rem 1.5rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .play-content {
            max-width: 800px;
        }

        .game-board {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 2rem;
            color: white;
            margin-bottom: 1.5rem;
        }

        .game-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .challenge {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .challenge-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .target-display {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .submit-btn {
            padding: 0.75rem 1.5rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #008c3a;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .explore-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="vinculum-header">
        <h1>Volume & Surface Area Relationships</h1>
        <span>Grade 6</span>
        <span>CCSS 6.G.A.2</span>
    </div>

    <div class="vinculum-mode-tabs">
        <button class="vinculum-mode-tab" data-mode="explore">Explore</button>
        <button class="vinculum-mode-tab" data-mode="practice">Practice</button>
        <button class="vinculum-mode-tab" data-mode="play">Play</button>

        <div class="difficulty-selector">
            <label for="difficulty-select">Difficulty:</label>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="explore">
        <div class="card">
            <h2>Explore: Build & Visualize Shapes</h2>
            <div id="explore-content" class="explore-content">
                <div class="shape-builder">
                    <h3>Shape Builder</h3>
                    <div class="shape-selector">
                        <button class="shape-btn active" data-shape="cube">Cube</button>
                        <button class="shape-btn" data-shape="rectangular">Rectangular Prism</button>
                        <button class="shape-btn" data-shape="cylinder">Cylinder</button>
                        <button class="shape-btn" data-shape="sphere">Sphere</button>
                    </div>
                    <div id="shape-controls" class="shape-controls"></div>
                </div>
                <div>
                    <div class="shape-preview">
                        <div class="shape-icon" id="shape-icon">📦</div>
                        <div id="shape-name">Cube</div>
                    </div>
                    <div class="measurements">
                        <div class="measurement-item">
                            <span class="measurement-label">Volume:</span>
                            <span class="measurement-value" id="explore-volume">0 units³</span>
                        </div>
                        <div class="measurement-item">
                            <span class="measurement-label">Surface Area:</span>
                            <span class="measurement-value" id="explore-surface">0 units²</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="practice">
        <div class="card">
            <h2>Practice: Calculate Volume & Surface Area</h2>
            <div id="practice-content" class="practice-content">
                <div id="practice-problems"></div>
            </div>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="play">
        <div class="card">
            <h2>Play: Shape Builder Challenge</h2>
            <div id="play-content" class="play-content">
                <div class="game-board">
                    <div class="game-stats">
                        <div class="stat">
                            <div class="stat-label">Score</div>
                            <div class="stat-value" id="game-score">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Round</div>
                            <div class="stat-value" id="game-round">1/5</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Streak</div>
                            <div class="stat-value" id="game-streak">0</div>
                        </div>
                    </div>
                </div>
                <div id="game-challenges"></div>
            </div>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>

    <script src="../../lib/vinculum-input.js"></script>
    <script src="../../lib/vinculum-feedback.js"></script>

    <script>
        let currentDifficulty = 'medium';
        let currentShape = 'cube';
        let gameScore = 0;
        let gameRound = 1;
        let gameStreak = 0;
        let practiceProblems = [];
        let currentProblemIndex = 0;

        // Difficulty ranges
        const difficultyRanges = {
            easy: { min: 1, max: 5 },
            medium: { min: 2, max: 8 },
            hard: { min: 3, max: 12 }
        };

        // Shape calculations
        const shapeFormulas = {
            cube: {
                name: 'Cube',
                icon: '📦',
                params: ['side'],
                volume: (params) => Math.pow(params.side, 3),
                surface: (params) => 6 * Math.pow(params.side, 2)
            },
            rectangular: {
                name: 'Rectangular Prism',
                icon: '📫',
                params: ['length', 'width', 'height'],
                volume: (params) => params.length * params.width * params.height,
                surface: (params) => 2 * (params.length * params.width + params.length * params.height + params.width * params.height)
            },
            cylinder: {
                name: 'Cylinder',
                icon: '🥫',
                params: ['radius', 'height'],
                volume: (params) => Math.PI * Math.pow(params.radius, 2) * params.height,
                surface: (params) => 2 * Math.PI * params.radius * (params.radius + params.height)
            },
            sphere: {
                name: 'Sphere',
                icon: '🔮',
                params: ['radius'],
                volume: (params) => (4/3) * Math.PI * Math.pow(params.radius, 3),
                surface: (params) => 4 * Math.PI * Math.pow(params.radius, 2)
            }
        };

        document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const mode = this.getAttribute('data-mode');
                switchMode(mode);
            });
        });

        document.getElementById('difficulty-select').addEventListener('change', function() {
            currentDifficulty = this.value;
            if (document.querySelector('[data-mode="practice"]').style.display === 'block') {
                renderPractice();
            } else if (document.querySelector('[data-mode="play"]').style.display === 'block') {
                renderPlay();
            }
        });

        function switchMode(mode) {
            document.querySelectorAll('.vinculum-mode-content').forEach(el => {
                el.style.display = 'none';
            });
            document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).style.display = 'block';
            document.querySelector(`.vinculum-mode-tab[data-mode="${mode}"]`).classList.add('active');

            if (mode === 'explore') renderExplore();
            else if (mode === 'practice') renderPractice();
            else if (mode === 'play') renderPlay();
        }

        function renderExplore() {
            const controlsDiv = document.getElementById('shape-controls');
            controlsDiv.innerHTML = '';
            const formula = shapeFormulas[currentShape];

            formula.params.forEach(param => {
                const group = document.createElement('div');
                group.className = 'control-group';
                group.innerHTML = `
                    <label>${param.charAt(0).toUpperCase() + param.slice(1)}:</label>
                    <input type="number" id="explore-${param}" value="5" min="1" max="20" step="0.5">
                    <span>units</span>
                `;
                controlsDiv.appendChild(group);
            });

            document.querySelectorAll('.shape-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.addEventListener('click', function() {
                    currentShape = this.dataset.shape;
                    renderExplore();
                });
            });
            document.querySelector(`[data-shape="${currentShape}"]`).classList.add('active');

            const shapeInputs = document.querySelectorAll('[id^="explore-"]');
            shapeInputs.forEach(input => {
                input.addEventListener('input', updateExploreDisplay);
            });

            document.getElementById('shape-name').textContent = formula.name;
            document.getElementById('shape-icon').textContent = formula.icon;
            updateExploreDisplay();
        }

        function updateExploreDisplay() {
            const formula = shapeFormulas[currentShape];
            const params = {};
            formula.params.forEach(param => {
                params[param] = parseFloat(document.getElementById(`explore-${param}`).value) || 0;
            });

            const volume = formula.volume(params);
            const surface = formula.surface(params);

            document.getElementById('explore-volume').textContent = volume.toFixed(2) + ' units³';
            document.getElementById('explore-surface').textContent = surface.toFixed(2) + ' units²';
        }

        function renderPractice() {
            const container = document.getElementById('practice-content');
            const range = difficultyRanges[currentDifficulty];

            // Generate 3 practice problems
            practiceProblems = [];
            const shapes = ['cube', 'rectangular', 'cylinder'];

            for (let i = 0; i < 3; i++) {
                const shapeKey = shapes[i];
                const formula = shapeFormulas[shapeKey];
                const dims = {};

                formula.params.forEach(param => {
                    dims[param] = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
                });

                const problem = {
                    id: i,
                    shape: shapeKey,
                    dims,
                    volume: formula.volume(dims),
                    surface: formula.surface(dims)
                };

                practiceProblems.push(problem);
            }

            currentProblemIndex = 0;
            renderPracticeProblem();
        }

        function renderPracticeProblem() {
            const container = document.getElementById('practice-content');
            const problem = practiceProblems[currentProblemIndex];
            const formula = shapeFormulas[problem.shape];

            let dimsHtml = '';
            Object.entries(problem.dims).forEach(([key, val]) => {
                dimsHtml += `<p>${key.toUpperCase()}: ${val} units</p>`;
            });

            const html = `
                <div class="problem-card">
                    <div class="problem-title">Problem ${currentProblemIndex + 1} of ${practiceProblems.length}: ${formula.name}</div>
                    <div class="problem-dims">${dimsHtml}</div>
                    <div class="answer-inputs">
                        <div class="answer-row">
                            <label>Volume (units³):</label>
                            <input type="number" id="answer-volume" step="0.01" placeholder="Enter answer">
                        </div>
                        <div class="answer-row">
                            <label>Surface Area (units²):</label>
                            <input type="number" id="answer-surface" step="0.01" placeholder="Enter answer">
                        </div>
                        <button class="check-btn" id="check-btn">Check Answer</button>
                        <button class="next-btn hidden" id="next-btn">Next Problem</button>
                    </div>
                </div>
            `;

            container.innerHTML = html;

            document.getElementById('check-btn').addEventListener('click', checkPracticeProblem);
        }

        function checkPracticeProblem() {
            const volInput = document.getElementById('answer-volume');
            const surfInput = document.getElementById('answer-surface');
            const problem = practiceProblems[currentProblemIndex];

            const volAnswer = parseFloat(volInput.value);
            const surfAnswer = parseFloat(surfInput.value);

            const volTolerance = Math.abs(problem.volume * 0.05);
            const surfTolerance = Math.abs(problem.surface * 0.05);

            const volCorrect = Math.abs(volAnswer - problem.volume) <= volTolerance;
            const surfCorrect = Math.abs(surfAnswer - problem.surface) <= surfTolerance;

            if (volCorrect && surfCorrect) {
                showFeedback('Excellent! Both answers are correct.', 'success');
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('next-btn').addEventListener('click', () => {
                    currentProblemIndex++;
                    if (currentProblemIndex < practiceProblems.length) {
                        renderPracticeProblem();
                    } else {
                        showFeedback('Great job! All problems completed.', 'success');
                    }
                });
            } else {
                if (!volCorrect) showFeedback(`Volume is incorrect. Expected ≈ ${problem.volume.toFixed(2)}`, 'error');
                if (!surfCorrect) showFeedback(`Surface Area is incorrect. Expected ≈ ${problem.surface.toFixed(2)}`, 'error');
            }
        }

        function renderPlay() {
            const container = document.getElementById('play-content');
            gameScore = 0;
            gameRound = 1;
            gameStreak = 0;
            renderGameChallenge();
        }

        function renderGameChallenge() {
            if (gameRound > 5) {
                const html = `
                    <div class="challenge">
                        <div class="challenge-text">🎉 Game Over!</div>
                        <div class="target-display">Final Score: ${gameScore} points</div>
                        <button class="submit-btn" onclick="location.reload()">Play Again</button>
                    </div>
                `;
                document.getElementById('game-challenges').innerHTML = html;
                return;
            }

            const range = difficultyRanges[currentDifficulty];
            const shapes = Object.keys(shapeFormulas).filter(k => k !== 'sphere');
            const shapeKey = shapes[Math.floor(Math.random() * shapes.length)];
            const formula = shapeFormulas[shapeKey];

            const dims = {};
            formula.params.forEach(param => {
                dims[param] = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
            });

            const volume = formula.volume(dims);
            const surface = formula.surface(dims);

            let dimsHtml = '';
            Object.entries(dims).forEach(([key, val]) => {
                dimsHtml += `<p>${key.toUpperCase()}: ${val} units</p>`;
            });

            const targetType = Math.random() > 0.5 ? 'volume' : 'surface';
            const targetValue = targetType === 'volume' ? volume : surface;
            const targetLabel = targetType === 'volume' ? 'Volume (units³)' : 'Surface Area (units²)';

            const html = `
                <div class="challenge">
                    <div class="challenge-text">${formula.name} Challenge</div>
                    <div class="target-display">${dimsHtml}<br><strong>Calculate: ${targetLabel}</strong></div>
                    <div class="answer-row">
                        <input type="number" id="game-answer" step="0.01" placeholder="Enter answer" autofocus>
                        <button class="submit-btn" id="submit-answer">Submit</button>
                    </div>
                </div>
            `;

            document.getElementById('game-challenges').innerHTML = html;
            document.getElementById('submit-answer').addEventListener('click', checkGameAnswer);

            function checkGameAnswer() {
                const answer = parseFloat(document.getElementById('game-answer').value);
                const tolerance = Math.abs(targetValue * 0.1);

                if (Math.abs(answer - targetValue) <= tolerance) {
                    const points = currentDifficulty === 'easy' ? 10 : currentDifficulty === 'medium' ? 20 : 30;
                    gameScore += points;
                    gameStreak++;
                    showFeedback('Correct!', 'success');
                } else {
                    gameStreak = 0;
                    showFeedback(`Incorrect. Expected ≈ ${targetValue.toFixed(2)}`, 'error');
                }

                gameRound++;
                document.getElementById('game-score').textContent = gameScore;
                document.getElementById('game-round').textContent = gameRound + '/5';
                document.getElementById('game-streak').textContent = gameStreak;

                setTimeout(renderGameChallenge, 2000);
            }
        }

        function showFeedback(message, type = 'info') {
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `<div class="feedback-${type}">${message}</div>`;
            feedback.style.display = 'block';
            setTimeout(() => {
                feedback.style.display = 'none';
            }, 3000);
        }

        switchMode('explore');
    </script>
</body>
</html>
