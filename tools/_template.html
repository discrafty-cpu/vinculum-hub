        // Initialize adaptive learning system

            toolName: 'TOOL_TITLE',

        // ───────────────────────────────────────────────────────
        // Mode Tab Switching
        // ───────────────────────────────────────────────────────
        document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const mode = this.getAttribute('data-mode');
                switchMode(mode);
            });
        });

        function switchMode(mode) {
            // Hide all content
            document.querySelectorAll('.vinculum-mode-content').forEach(el => {
                el.style.display = 'none';
            });

            // Deactivate all tabs
            document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected mode
            document.querySelector(`[data-mode="${mode}"]`).style.display = 'block';
            document.querySelector(`.vinculum-mode-tab[data-mode="${mode}"]`).classList.add('active');

            // Render content for this mode
            if (mode === 'explore') {
                renderExplore();
            } else if (mode === 'practice') {
                renderPractice();
            } else if (mode === 'play') {
                renderPlay();
            }
        }

        // Initialize with explore mode
        switchMode('explore');

        /**
         * Show feedback message
         * @param {string} message - The feedback text
         * @param {string} type - 'success', 'error', 'warning', or 'info'
         */
        function showFeedback(message, type = 'info') {
            if (window.VinculumFeedback) {
                VinculumFeedback.show(message, type);
            }
        }

        /**
         * Announce to screen readers
         * @param {string} message - The message to announce
         */
        function announce(message) {
            const srDiv = document.getElementById('sr-announcements');
            if (srDiv) {
                srDiv.textContent = message;
            }
        }
