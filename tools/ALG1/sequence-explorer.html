<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sequence Explorer—VINCULUM ALG1</title><link rel="stylesheet" href="../../vinculum-core.css"><style>body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0}.container{max-width:1200px;margin:0 auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}header{display:flex;align-items:center;gap:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}.header-back{width:40px;height:40px;border-radius:0.5rem;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);text-decoration:none;transition:all 0.2s;font-weight:700}.header-back:hover{border-color:var(--cyan);color:var(--cyan)}.header-title{flex:1}.header-title h1{margin:0;font-size:1.5rem;font-weight:700}.header-title .gradient{background:var(--grad);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}.header-badge{background:var(--cyan);color:var(--bg);padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:700;text-transform:uppercase}.mode-tabs{display:flex;gap:0.5rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem}.mode-tab{padding:0.75rem 1.25rem;background:0;border:0;color:var(--text2);cursor:pointer;font-weight:600;border-bottom:2px solid transparent;transition:all 0.2s}.mode-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}.content{display:none}.content.active{display:block}.main-grid{display:grid;grid-template-columns:1fr 280px;gap:1.5rem}.visualization{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem}.control-panel{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.25rem;display:flex;flex-direction:column;gap:1.25rem;height:fit-content;position:sticky;top:1.25rem}.control-group{display:flex; id-template-columns:1fr 280px;gap:1.5rem}.practice-problem{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem}.option-card{background:var(--bg);border:2px solid var(--border);border-radius:0.75rem;padding:1rem;cursor:pointer;transition:all 0.2s;margin-bottom:1rem}.option-card:hover{border-color:var(--cyan)}.option-card.selected{border-color:var(--cyan);background:color-mix(in srgb,var(--cyan) 10%,var(--bg))}.option-card.correct{border-color:var(--green);background:color-mix(in srgb,var(--green) 10%,var(--bg))}.action-button{background:var(--cyan);color:var(--bg);border:0;padding:0.875rem 1.5rem;border-radius:0.5rem;cursor:pointer;font-weight:700;transition:all 0.2s;margin-top:1rem}.action-button:hover{background:var(--green)}.feedback-message{margin-top:1rem;padding:1rem;border-radius:0.75rem;font-weight:600;text-align:center}.feedback-correct{background:color-mix(in srgb,var(--green) 20%,var(--bg));color:var(--green);border:2px solid var(--green)}.feedback-incorrect{background:color-mix(in srgb,var(--pink) 20%,var(--bg));color:var(--pink);border:2px solid var(--pink)}.standards-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}.standard-tag{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:0.35rem 0.75rem;border-radius:9999px;font-size:0.7rem;font-weight:600;text-transform:uppercase}</style></head><body><div class="container"><header><a href="../../VINCULUM-Hub.html" class="header-back">←</a><div class="header-title"><h1>Sequence<span class="gradient">Explorer</span></h1></div><div class="header-badge">ALG1</div></header><div class="standards-tags"><span class="standard-tag">F-BF.2</span><span class="standard-tag">F-IF.3</span><span class="standard-tag">F-LE.2</span></div><div class="mode-tabs"><button class="vinculum-mode-tab active" data-mode="explore"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore</button><button class="vinculum-mode-tab" data-mode="practice"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button><button class="vinculum-mode-tab" data-mode="play"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button></div><div id="explore" class="content active"><div class="main-grid"><div><div class="visualization"><div style="font-size:0.95rem;color:var(--text2);margin-bottom:1rem">Arithmetic Sequence: Add the same amount each time</div><div class="sequence-display" id="exploreSequence">1, 3, 5, 7, 9, ...</div><div class="table-container"><table class="sequence-table"><thead><tr><th>Term (n)</th><th>Value</th></tr></thead><tbody id="exploreTable"></tbody></table></div><canvas class="graph-canvas" id="explore ol-label">Difficulty</label><div style="display:flex;gap:0.5rem"><button class="difficulty-btn active" data-difficulty="easy">Easy</button><button class="difficulty-btn" data-difficulty="medium">Medium</button><button class="difficulty-btn" data-difficulty="hard">Hard</button></div></div><div class="score-display"><div style="font-size:0.7rem;text-transform:uppercase;opacity:0.9">Correct</div><div class="score-value" id="practiceScore">0</div></div></div></div></div><div id="play" class="content"><div class="practice-grid"><div><div class="practice-problem"><div style="font-size:0.95rem;color:var(--text2);margin-bottom:1rem">Type the next term</div><div style="background:var(--bg);border:2px solid var(--cyan);border-radius:0.75rem;padding:1rem;text-align:center;font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;color:var(--cyan);margin-bottom:1.5rem" id="playSeq">3, 6, 9, 12, ?</div><div style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:2.5rem;font-weight:700;color:var(--cyan);margin-bottom:1.5rem" id="playTimer">15</div><input type="text" id="playInput" style="background:var(--bg);border:2px solid var(--border);color:var(--text);padding:1rem;border-radius:0.75rem;font-size:1.25rem;font-family:'JetBrains Mono',monospace;font-weight:600;width:100%;max-width:300px;text-align:center;margin-bottom:1rem" placeholder="15"><button class="action-button" id="playSubmitBtn">Submit</button><div id="playFeedback"></div></div></div><div class="control-panel"><div class="score-display"><div style="font-size:0.7rem;text-transform:uppercase;opacity:0.9">Correct</div><div class="score-value" id="playScore">0</div></div></div></div></div></div><script>const state={explore:{a1:1,d:2,type:"arithmetic",score:0},practice:{score:0,current:null,selected:null},play:{score:0,timeLeft:15,playing:!1}};function updateExplore(){const e=state.explore.a1,t=state.explore.d;let n="";for(let i=0;i<5;i++)n+=(e+i*t)+", ";document.getElementById("exploreSequence").textContent=n+"...";const i=document.getElementById("exploreTable");i.innerHTML="";for(let n=1;n<=6;n++){const l=document.createElement("tr"),o=document.createElement("td"),a=document.createElement("td");o.textContent=n,a.textContent=e+(n-1)*t,a.style.color="var(--cyan)",a.style.fontWeight="700",l.appendChild(o),l.appendChild(a),i.appendChild(l)}}document.getElementById("firstTermSlider").addEventListener("input",e=>{state.explore.a1=parseInt(e.target.value),document.getElementById("firstTermValue").textContent=`a₁ = ${state.explore.a1}`,updateExplore()}),document.getElementById("differenceSlider").addEventListener("input",e=>{state.explore.d=parseInt(e.target.value),document.getElementById("differenceValue").textContent=`d = ${state.explore.d}`,updateExplore()});function genProblem(){const e={easy:[{seq:[2,4,6,8],next:10},{seq:[5,10,15,20],next:25}],medium:[{seq:[1,4,7,10],next:13},{seq:[10,8,6,4],next:2}],hard:[{seq:[2,6,18],next:54},{seq:[100,50,25],next:12.5}]},t=e.easy[Math.floor(Math.random()*e.easy.length)];return{seq:t.seq,next:t.next}}function renderPractice(){const e=genProblem();state.practice.current=e,state.practice.selected=null;const t=e.seq.join(", ")+" ?";document.getElementById("practiceSeq").textContent=t;const n=document.getElementById("optionGrid");n.innerHTML="";const i=[{val:e.next,correct:!0},{val:e.next+1,correct:!1},{val:e.next-1,correct:!1},{val:e.next+2,correct:!1}];for(let e=i.length-1;e>0;e--){const t=Math.floor(Math.random()*(e+1));[i[e],i[t]]=[i[t],i[e]]}i.forEach((e,t)=>{const i=document.createElement("div");i.className="option-card",i.innerHTML=`<div style="font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700">${e.val}</div>`,i.addEventListener("click",()=>{document.querySelectorAll(".option-card").forEach(e=>e.classList.remove("selected")),i.classList.add("selected"),state.practice.selected=t,document.getElementById("practiceCheckBtn").style.display="block"}),n.appendChild(i)}),document.getElementById("practiceCheckBtn").style.display="none",document.getElementById("practiceFeedback").innerHTML=""}document.getElementById("practiceCheckBtn").addEventListener("click",()=>{if(null===state.practice.selected)return;const e=state.practice.current.options[state.practice.selected].correct,t=document.getElementById("practiceFeedback");e?(state.practice.score++,t.innerHTML='<div class="feedback-message feedback-correct">✓ Correct!</div>',document.querySelectorAll(".option-card")[state.practice.selected].classList.add("correct")):(t.innerHTML='<div class="feedback-message feedback-incorrect">✗ Try again</div>',document.querySelectorAll(".option-card")[state.practice.selected].classList.add("incorrect")),document.getElementById("practiceScore").textContent=state.practice.score,document.getElementById("practiceCheckBtn").style.display="none"}),document.getElementById("practiceNextBtn").addEventListener("click",renderPractice);function renderPlay(){const e=genProblem();state.play.current=e;const t=e.seq.join(", ")+" ?";document.getElementById("playSeq").textContent=t,document.getElementById("playInput").value="",document.getElementById("playFeedback").innerHTML=""}document.getElementById("playSubmitBtn").addEventListener("click",()=>{const e=document.getElementById("playInput").value.trim(),t=`${state.play.current.next}`,n=document.getElementById("playFeedback");e===t?(state.play.score++,n.innerHTML='<div class="feedback-message feedback-correct">✓ Correct!</div>'):(n.innerHTML=`<div class="feedback-message feedback-incorrect">✗ Expected: ${state.play.current.next}</div>`),document.getElementById("playScore").textContent=state.play.score,setTimeout(renderPlay,1500)}),document.querySelectorAll(".mode-tab").forEach(e=>{e.addEventListener("click",()=>{const t=e.dataset.mode;document.querySelectorAll(".mode-tab").forEach(e=>e.classList.remove("active")),document.querySelectorAll(".content").forEach(e=>e.classList.remove("active")),e.classList.add("active"),document.getElementById(t).
