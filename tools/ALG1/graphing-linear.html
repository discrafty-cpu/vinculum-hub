<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphing Linear Equations — VINCULUM ALG1</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    header { display: flex; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .header-back { width: 40px; height: 40px; border-radius: 0.5rem; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); text-decoration: none; transition: all 0.2s; font-weight: 700; }
    .header-back:hover { border-color: var(--cyan); color: var(--cyan); }
    .header-title { flex: 1; } .header-title h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
    .header-title .gradient { background: var(--grad); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-badge { background: var(--cyan); color: var(--bg); padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .mode-tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .mode-tab { padding: 0.75rem 1.25rem; background: none; border: none; color: var(--text2); cursor: pointer; font-weight: 600; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .mode-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .mode-tab:hover { color: var(--text); }
    .content { display: none; animation: fadeIn 0.3s ease; } .content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .main-grid { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; }
    .coordinate-plane-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; display: flex; justify-content: center; align-items: center; }
    .coordinate-plane { max-width: 500px; width: 100%; aspect-ratio: 1; }
    .control-panel { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; height: fit-content; position: sticky; top: 1.25rem; }
    .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .control-label { font-size: 0.875rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
    .slider-input { width: 100%; height: 6px; border-radius: 3px; background: var(--border); outline: none; -webkit-appearance: none; }
    .slider-input::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); cursor: pointer; }
    .value-display { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 1.125rem; font-weight: 700; color: var(--cyan); background: var(--bg); padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border); }
    .equation-display { background: var(--bg); border: 2px solid var(--cyan); border-radius: 0.75rem; padding: 1rem; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 700; color: var(--cyan); }
    .difficulty-selector { display: flex; flex-direction: column; gap: 0.5rem; }
    .difficulty-options { display: flex; gap: 0.5rem; }
    .difficulty-btn { flex: 1; padding: 0.5rem; background: var(--bg); border: 1px solid var(--border); color: var(--text2); border-radius: 0.5rem; cursor: pointer; font-weight: 600; font-size: 0.75rem; transition: all 0.2s; }
    .difficulty-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
    .score-display { background: linear-gradient(135deg, var(--cyan) 0%, var(--green) 100%); color: var(--bg); padding: 0.75rem; border-radius: 0.75rem; text-align: center; font-weight: 700; }
    .score-label { font-size: 0.7rem; opacity: 0.9; text-transform: uppercase; } .score-value { font-size: 1.5rem; margin-top: 0.25rem; }
    .practice-grid { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; }
    .practice-problem { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
    .practice-instruction { font-size: 0.95rem; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
    .option-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .option-card { background: var(--bg); border: 2px solid var(--border); border-radius: 0.75rem; padding: 1rem; cursor: pointer; transition: all 0.2s; text-align: center; }
    .option-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
    .option-card.selected { border-color: var(--cyan); background: color-mix(in srgb, var(--cyan) 10%, var(--bg)); }
    .option-card.correct { border-color: var(--green); background: color-mix(in srgb, var(--green) 10%, var(--bg)); }
    .option-card.incorrect { border-color: var(--pink); background: color-mix(in srgb, var(--pink) 10%, var(--bg)); }
    .option-graph { width: 100%; height: 120px; margin-bottom: 0.5rem; }
    .option-label { font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; font-weight: 600; }
    .play-container { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; }
    .play-challenge { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; text-align: center; }
    .play-graph { width: 100%; max-width: 400px; aspect-ratio: 1; margin: 0 auto 2rem; }
    .play-timer { font-family: 'JetBrains Mono', monospace; font-size: 3rem; font-weight: 700; color: var(--cyan); margin-bottom: 1.5rem; }
    .play-input { background: var(--bg); border: 2px solid var(--border); color: var(--text); padding: 1rem; border-radius: 0.75rem; font-size: 1.25rem; font-family: 'JetBrains Mono', monospace; font-weight: 600; width: 100%; max-width: 300px; text-align: center; transition: border-color 0.2s; }
    .play-input:focus { outline: none; border-color: var(--cyan); }
    .action-button { background: var(--cyan); color: var(--bg); border: none; padding: 0.875rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; margin-top: 1.5rem; }
    .action-button:hover { background: var(--green); transform: translateY(-2px); }
    .feedback-message { margin-top: 1.5rem; padding: 1rem; border-radius: 0.75rem; font-weight: 600; text-align: center; }
    .feedback-correct { background: color-mix(in srgb, var(--green) 20%, var(--bg)); color: var(--green); border: 2px solid var(--green); }
    .feedback-incorrect { background: color-mix(in srgb, var(--pink) 20%, var(--bg)); color: var(--pink); border: 2px solid var(--pink); }
    .standards-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .standard-tag { background: var(--bg); border: 1px solid var(--border); color: var(--text2); padding: 0.35rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="../../VINCULUM-Hub.html" class="header-back">←</a>
      <div class="header-title"><h1>Graphing <span class="gradient">Linear Equations</span></h1></div>
      <div class="header-badge">ALG1</div>
    </header>

    <div class="standards-tags">
      <span class="standard-tag">A-CED.2</span>
      <span class="standard-tag">F-IF.7a</span>
      <span class="standard-tag">MN 9.2.1.6</span>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="explore">🔍 Explore</button>
      <button class="mode-tab" data-mode="practice">📋 Practice</button>
      <button class="mode-tab" data-mode="play">⚡ Play</button>
    </div>

    <div id="explore" class="content active">
      <div class="main-grid">
        <div><div class="coordinate-plane-wrapper">
          <svg class="coordinate-plane" id="explorePlane" viewBox="-510 -510 1020 1020">
            <defs><style>.grid-line{stroke:var(--border);stroke-width:0.5}.axis{stroke:var(--text);stroke-width:1.5}.axis-label{font-size:14px;font-weight:600;fill:var(--text)}.data-line{stroke:var(--cyan);stroke-width:2.5;fill:none}.point-dot{fill:var(--green);r:4}</style></defs>
            <g id="gridLines"></g>
            <line x1="-500" y1="0" x2="500" y2="0" class="axis" />
            <line x1="0" y1="-500" x2="0" y2="500" class="axis" />
            <text x="490" y="-10" class="axis-label">x</text>
            <text x="15" y="-480" class="axis-label">y</text>
            <circle id="yIntercept" cx="0" cy="0" class="point-dot" />
            <line id="lineSegment" class="data-line" x1="0" y1="0" x2="100" y2="-50" />
            <g id="pointsGroup"></g>
          </svg>
        </div></div>

        <div class="control-panel">
          <div class="control-group">
            <label class="control-label">Slope (m)</label>
            <input type="range" id="slopeSlider" class="slider-input" min="-3" max="3" step="0.5" value="1">
            <div class="value-display" id="slopeValue">m = 1</div>
          </div>
          <div class="control-group">
            <label class="control-label">Y-Intercept (b)</label>
            <input type="range" id="interceptSlider" class="slider-input" min="-10" max="10" step="1" value="0">
            <div class="value-display" id="interceptValue">b = 0</div>
          </div>
          <div class="equation-display" id="equationDisplay">y = 1x + 0</div>
          <div class="difficulty-selector">
            <label class="control-label">Difficulty</label>
            <div class="difficulty-options">
              <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
              <button class="difficulty-btn" data-difficulty="medium">Medium</button>
              <button class="difficulty-btn" data-difficulty="hard">Hard</button>
            </div>
          </div>
          <div class="score-display">
            <div class="score-label">Score</div>
            <div class="score-value" id="exploreScore">0</div>
          </div>
        </div>
      </div>
    </div>

    <div id="practice" class="content">
      <div class="practice-grid">
        <div><div class="practice-problem">
          <div class="practice-instruction" id="practiceInstruction">Identify which graph matches the equation below.</div>
          <div class="equation-display" id="practiceEquation">y = 1x + 2</div>
          <div class="option-grid" id="optionGrid"></div>
          <button class="action-button" id="practiceCheckBtn" style="display: none;">Check Answer</button>
          <div id="practiceFeedback"></div>
          <button class="action-button" id="practiceNextBtn">Next Problem</button>
        </div></div>

        <div class="control-panel">
          <div class="difficulty-selector">
            <label class="control-label">Difficulty</label>
            <div class="difficulty-options">
              <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
              <button class="difficulty-btn" data-difficulty="medium">Medium</button>
              <button class="difficulty-btn" data-difficulty="hard">Hard</button>
            </div>
          </div>
          <div class="score-display">
            <div class="score-label">Correct</div>
            <div class="score-value" id="practiceScore">0</div>
          </div>
          <div class="score-display" style="background: linear-gradient(135deg, var(--pink) 0%, var(--cyan) 100%);">
            <div class="score-label">Streak</div>
            <div class="score-value" id="practiceStreak">0</div>
          </div>
        </div>
      </div>
    </div>

    <div id="play" class="content">
      <div class="play-container">
        <div><div class="play-challenge">
          <div style="font-size: 0.95rem; color: var(--text2); margin-bottom: 1rem;">Match the equation to the graph</div>
          <svg class="play-graph" id="playPlane" viewBox="-510 -510 1020 1020">
            <defs><style>.grid-line{stroke:var(--border);stroke-width:0.5}.axis{stroke:var(--text);stroke-width:1.5}.data-line{stroke:var(--cyan);stroke-width:2.5;fill:none}</style></defs>
            <g id="playGrid"></g>
            <line x1="-500" y1="0" x2="500" y2="0" class="axis" />
            <line x1="0" y1="-500" x2="0" y2="500" class="axis" />
            <line id="playLine" class="data-line" x1="0" y1="0" x2="100" y2="-50" />
          </svg>
          <div class="play-timer" id="playTimer">60</div>
          <input type="text" class="play-input" id="playInput" placeholder="y = mx + b">
          <button class="action-button" id="playSubmitBtn">Submit</button>
          <div id="playFeedback"></div>
        </div></div>

        <div class="control-panel">
          <div class="difficulty-selector">
            <label class="control-label">Difficulty</label>
            <div class="difficulty-options">
              <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
              <button class="difficulty-btn" data-difficulty="medium">Medium</button>
              <button class="difficulty-btn" data-difficulty="hard">Hard</button>
            </div>
          </div>
          <div class="score-display">
            <div class="score-label">Correct</div>
            <div class="score-value" id="playScore">0</div>
          </div>
          <div class="score-display" style="background: linear-gradient(135deg, var(--green) 0%, var(--cyan) 100%);">
            <div class="score-label">Rounds</div>
            <div class="score-value" id="playRounds">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

  <script src="../../vinculum-input.js"></script>
  <script src="../../vinculum-core.js"></script>
  <script src="../../vinculum-data.js"></script>
  <script src="../../vinculum-adaptive-hook.js"></script>
  <script src="../../vinculum-3reads.js"></script>
  <script src="../../vinculum-stories.js"></script>
  <script src="../../vinculum-feedback.js"></script>
  <script src="../../vinculum-guide.js"></script>
  <script src="../../vinculum-identity.js"></script>
  <script src="../../vinculum-indigenous.js"></script>
  <script src="../../vinculum-dashboard.js"></script>
</body>
</html>
