<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VINCULUM Learning Hub - Polynomial Introduction">
    <meta name="author" content="VINCULUM">
    <title>Polynomial Introduction — VINCULUM Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../vinculum-core.css">

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #0066cc;
            --success: #00a854;
            --error: #ff4d4f;
        }

        .explore-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin: 1rem 0;
        }

        .algebra-tiles {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .algebra-tiles h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tile {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            cursor: grab;
            transition: all 0.3s;
            color: white;
            font-weight: 600;
        }

        .tile:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .tile:active {
            cursor: grabbing;
        }

        .tile-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .tile-value {
            font-size: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .polynomial-display {
            background: var(--card);
            border: 2px dashed var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .polynomial-header {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .polynomial-expression {
            font-size: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            word-break: break-word;
            min-height: 3em;
        }

        .tile-stats {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #ddd;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 500;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 600;
        }

        .practice-content {
            max-width: 700px;
        }

        .problem-card {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .problem-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .polynomial-show {
            background: #f0f0f0;
            padding: 1.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.3rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--primary);
        }

        .question-text {
            margin-bottom: 1rem;
            color: var(--text);
        }

        .answer-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1rem 0;
        }

        .answer-input {
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .check-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .check-btn:hover {
            background: #0052a3;
        }

        .next-btn {
            padding: 0.75rem 1.5rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .play-content {
            max-width: 750px;
        }

        .game-board {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 1.5rem;
            color: white;
            margin-bottom: 1.5rem;
        }

        .game-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-box {
            background: rgba(255,255,255,0.2);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stat-box-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .puzzle-card {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .puzzle-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .target-expression {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
            font-size: 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .available-polynomials {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .poly-option {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .poly-option:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .poly-option.selected {
            background: var(--success);
            border-color: white;
        }

        .poly-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .selection-display {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            min-height: 60px;
            text-align: center;
        }

        .selection-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .selected-list {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #008c3a;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .explore-content {
                grid-template-columns: 1fr;
            }

            .tiles-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .available-polynomials {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="vinculum-header">
        <h1>Polynomial Introduction</h1>
        <span>Algebra 1</span>
        <span>HSA-APR.1</span>
    </div>

    <div class="vinculum-mode-tabs">
        <button class="vinculum-mode-tab" data-mode="explore">Explore</button>
        <button class="vinculum-mode-tab" data-mode="practice">Practice</button>
        <button class="vinculum-mode-tab" data-mode="play">Play</button>

        <div class="difficulty-selector">
            <label for="difficulty-select">Difficulty:</label>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="explore">
        <div class="card">
            <h2>Explore: Build Polynomials with Algebra Tiles</h2>
            <div id="explore-content" class="explore-content"></div>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="practice">
        <div class="card">
            <h2>Practice: Analyze Polynomials</h2>
            <div id="practice-content" class="practice-content"></div>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="play">
        <div class="card">
            <h2>Play: Polynomial Puzzler</h2>
            <div id="play-content" class="play-content"></div>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>

    <script src="../../lib/vinculum-input.js"></script>
    <script src="../../lib/vinculum-feedback.js"></script>

    <script>
        let currentDifficulty = 'medium';
        let exploredPolynomial = [];
        let practiceIndex = 0;
        let gameScore = 0;
        let gameRound = 1;

        const tileTypes = {
            x2: { label: 'x²', value: 'x²', color: '#667eea' },
            x: { label: 'x', value: 'x', color: '#764ba2' },
            const: { label: '1', value: '1', color: '#ff6b6b' }
        };

        const practiceProblems = [
            { polynomial: '3x² + 2x + 5', type: 'degree' },
            { polynomial: '2x + 7', type: 'terms' },
            { polynomial: '5x² + 0x - 3', type: 'coefficient' },
            { polynomial: '4x² - x + 2', type: 'degree' }
        ];

        const gameTargets = {
            easy: [
                { target: '2x + 3', options: ['x + 3', 'x + 2', 'x', 'x + 1'] },
                { target: '3x² + x', options: ['2x² + x', 'x² + x', 'x² + 2', '2x + 1'] }
            ],
            medium: [
                { target: '2x² + 3x + 1', options: ['x² + 2x + 1', 'x² + x', 'x² + 2x', 'x² + 3x + 1'] },
                { target: 'x² + 4x + 4', options: ['x² + 3x + 1', 'x² + 2x + 2', 'x² + x + 4', 'x² + 2x + 1'] },
                { target: '3x² - 2x', options: ['2x² - x', 'x² - 2x', '2x² - 2x', 'x² + x'] }
            ],
            hard: [
                { target: '2x² + 4x + 2', options: ['x² + 2x + 1', 'x² + 3x + 2', 'x² + x + 1', '2x² + 2x + 1'] },
                { target: '3x² - x + 2', options: ['2x² - x + 1', 'x² + x + 2', '2x² + 2x + 1', 'x² - 2x + 2'] }
            ]
        };

        document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                switchMode(this.getAttribute('data-mode'));
            });
        });

        document.getElementById('difficulty-select').addEventListener('change', function() {
            currentDifficulty = this.value;
        });

        function switchMode(mode) {
            document.querySelectorAll('.vinculum-mode-content').forEach(el => {
                el.style.display = 'none';
            });
            document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).style.display = 'block';
            document.querySelector(`.vinculum-mode-tab[data-mode="${mode}"]`).classList.add('active');

            if (mode === 'explore') renderExplore();
            else if (mode === 'practice') renderPractice();
            else if (mode === 'play') renderPlay();
        }

        function renderExplore() {
            exploredPolynomial = [
                { type: 'x2', count: 1 },
                { type: 'x', count: 2 },
                { type: 'const', count: 3 }
            ];

            const container = document.getElementById('explore-content');

            const tilesHtml = `
                <div class="algebra-tiles">
                    <h3>Algebra Tiles</h3>
                    <div class="tiles-grid">
                        <div class="tile" draggable="true" data-type="x2" ondragstart="dragStart(event)">
                            <div class="tile-label">x² tile</div>
                            <div class="tile-value">x²</div>
                        </div>
                        <div class="tile" draggable="true" data-type="x" ondragstart="dragStart(event)">
                            <div class="tile-label">x tile</div>
                            <div class="tile-value">x</div>
                        </div>
                        <div class="tile" draggable="true" data-type="const" ondragstart="dragStart(event)">
                            <div class="tile-label">Unit tile</div>
                            <div class="tile-value">1</div>
                        </div>
                    </div>
                </div>
            `;

            const polyHtml = `
                <div class="polynomial-display" id="poly-drop" ondragover="dragOver(event)" ondrop="dropTile(event)">
                    <div class="polynomial-header">Build Here</div>
                    <div class="polynomial-expression" id="poly-expr">No tiles yet</div>
                    <div class="tile-stats" id="poly-stats"></div>
                </div>
            `;

            container.innerHTML = tilesHtml + polyHtml;
            updatePolynomialDisplay();
        }

        function dragStart(event) {
            event.dataTransfer.effectAllowed = 'copy';
            event.dataTransfer.setData('tileType', event.target.closest('.tile').dataset.type);
        }

        function dragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'copy';
        }

        function dropTile(event) {
            event.preventDefault();
            const tileType = event.dataTransfer.getData('tileType');
            const existing = exploredPolynomial.find(p => p.type === tileType);
            if (existing) {
                existing.count++;
            } else {
                exploredPolynomial.push({ type: tileType, count: 1 });
            }
            updatePolynomialDisplay();
        }

        function updatePolynomialDisplay() {
            const expr = exploredPolynomial.map(p => {
                const tile = tileTypes[p.type];
                if (p.count === 1) return tile.value;
                return `${p.count}${tile.value}`;
            }).join(' + ');

            document.getElementById('poly-expr').textContent = expr || 'No tiles yet';

            const stats = `
                <div class="stat">
                    <span class="stat-label">Degree:</span>
                    <span class="stat-value">${Math.max(...exploredPolynomial.map(p => p.type === 'x2' ? 2 : p.type === 'x' ? 1 : 0), -1)}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Terms:</span>
                    <span class="stat-value">${exploredPolynomial.length}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Total Tiles:</span>
                    <span class="stat-value">${exploredPolynomial.reduce((sum, p) => sum + p.count, 0)}</span>
                </div>
            `;

            document.getElementById('poly-stats').innerHTML = stats;
        }

        function renderPractice() {
            const container = document.getElementById('practice-content');
            practiceIndex = 0;
            renderPracticeProblem();

            function renderPracticeProblem() {
                if (practiceIndex >= practiceProblems.length) {
                    container.innerHTML = '<div class="problem-card"><div class="problem-title">🎉 Excellent! All problems complete!</div></div>';
                    return;
                }

                const problem = practiceProblems[practiceIndex];

                let answerHtml = '';
                if (problem.type === 'degree') {
                    const degrees = [1, 2, 3, 4];
                    answerHtml = `
                        <div class="question-text">What is the degree of this polynomial?</div>
                        ${degrees.map(d => `
                            <button class="answer-input" style="background: white; border: 2px solid #ddd; cursor: pointer; padding: 0.75rem;"
                                    onclick="checkPracticeAnswer(${d}, 2)">Degree ${d}</button>
                        `).join('')}
                    `;
                } else if (problem.type === 'terms') {
                    const termCounts = [1, 2, 3, 4];
                    answerHtml = `
                        <div class="question-text">How many terms does this polynomial have?</div>
                        ${termCounts.map(t => `
                            <button class="answer-input" style="background: white; border: 2px solid #ddd; cursor: pointer; padding: 0.75rem;"
                                    onclick="checkPracticeAnswer(${t}, 2)">
                                ${t} term${t !== 1 ? 's' : ''}
                            </button>
                        `).join('')}
                    `;
                } else if (problem.type === 'coefficient') {
                    answerHtml = `
                        <div class="question-text">What is the coefficient of x in this polynomial?</div>
                        <input type="number" id="coef-input" placeholder="Enter coefficient" class="answer-input">
                        <button class="check-btn" onclick="checkPracticeAnswer(0, 0)">Check Answer</button>
                    `;
                }

                const html = `
                    <div class="problem-card">
                        <div class="problem-title">Problem ${practiceIndex + 1} of ${practiceProblems.length}</div>
                        <div class="polynomial-show">${problem.polynomial}</div>
                        <div class="answer-section">
                            ${answerHtml}
                        </div>
                    </div>
                `;

                container.innerHTML = html;
            }
        }

        function checkPracticeAnswer(answer, expectedAnswer) {
            const isCorrect = answer === expectedAnswer || (document.getElementById('coef-input') && parseInt(document.getElementById('coef-input').value) === 0);

            if (isCorrect) {
                showFeedback('Correct!', 'success');
            } else {
                showFeedback('Try again!', 'error');
            }

            setTimeout(() => {
                practiceIndex++;
                renderPractice();
            }, 1500);
        }

        function renderPlay() {
            const container = document.getElementById('play-content');
            gameScore = 0;
            gameRound = 1;
            const targets = gameTargets[currentDifficulty];

            renderGamePuzzle(targets);

            function renderGamePuzzle(targets) {
                if (gameRound > targets.length) {
                    container.innerHTML = `
                        <div class="puzzle-card">
                            <div class="puzzle-text">🎉 Game Complete!</div>
                            <div class="target-expression">Final Score: ${gameScore} points</div>
                            <button class="submit-btn" onclick="location.reload()">Play Again</button>
                        </div>
                    `;
                    return;
                }

                const puzzle = targets[gameRound - 1];
                const shuffled = puzzle.options.sort(() => Math.random() - 0.5);

                const html = `
                    <div class="game-board">
                        <div class="game-stats">
                            <div class="stat-box">
                                <div class="stat-box-label">Score</div>
                                <div class="stat-box-value">${gameScore}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-box-label">Round</div>
                                <div class="stat-box-value">${gameRound}/${targets.length}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-box-label">Streak</div>
                                <div class="stat-box-value" id="streak">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="puzzle-card">
                        <div class="puzzle-text">What do these polynomials add up to?</div>
                        <div class="target-expression">${puzzle.target}</div>
                        <div class="available-polynomials" id="options">
                            ${shuffled.map((opt, i) => `
                                <button class="poly-option" onclick="selectOption(this, '${opt}', '${puzzle.target}')">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;

                container.innerHTML = html;
            }
        }

        let selectedOptions = [];

        function selectOption(el, option, target) {
            el.classList.toggle('selected');

            if (el.classList.contains('selected')) {
                selectedOptions.push(option);
            } else {
                selectedOptions = selectedOptions.filter(o => o !== option);
            }

            if (selectedOptions.length > 0) {
                const html = `
                    <div class="puzzle-card" style="margin-top: 1rem;">
                        <div class="selection-display">
                            <div class="selection-label">Selected:</div>
                            <div class="selected-list">${selectedOptions.join(' + ')}</div>
                        </div>
                        <button class="submit-btn" onclick="checkGameAnswer('${target}')">Check Answer</button>
                    </div>
                `;

                let existing = document.querySelector('.selection-display')?.closest('.puzzle-card');
                if (existing) {
                    existing.remove();
                }
                document.querySelector('.puzzle-card').insertAdjacentHTML('afterend', html);
            }
        }

        function checkGameAnswer(target) {
            const sum = addPolynomials(selectedOptions);
            const targetSum = addPolynomials([target]);

            if (sum === targetSum) {
                gameScore += currentDifficulty === 'easy' ? 10 : currentDifficulty === 'medium' ? 20 : 30;
                showFeedback('Correct!', 'success');
            } else {
                showFeedback('Not quite right. Try again!', 'error');
            }

            selectedOptions = [];
            gameRound++;
            setTimeout(() => {
                renderPlay();
            }, 2000);
        }

        function addPolynomials(polys) {
            return polys.join(' + ').replace(/\s+/g, '');
        }

        function showFeedback(message, type = 'info') {
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `<div class="feedback-${type}">${message}</div>`;
            feedback.style.display = 'block';
            setTimeout(() => {
                feedback.style.display = 'none';
            }, 2500);
        }

        switchMode('explore');
    </script>
</body>
</html>
