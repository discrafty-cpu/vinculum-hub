<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Probability Predictions</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.vinculum-std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  align-items: center;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.vinculum-mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.08); color: var(--cyan); border-color: rgba(0,212,255,0.2); }
.vinculum-mode-tab.active-practice { background: rgba(0,212,255,0.08); color: var(--cyan); border-color: rgba(0,212,255,0.2); }
.vinculum-mode-tab.active-play { background: rgba(0,212,255,0.08); color: var(--cyan); border-color: rgba(0,212,255,0.2); }

.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.vinculum-diff-btn {
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-diff-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.vinculum-diff-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }

/* ── MAIN LAYOUT ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.workspace {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 16px;
}
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  margin-top: 8px;
  overflow: hidden;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  padding: 16px 36px;
  border-radius: 16px;
  font-size: 22px;
  font-weight: 800;
  pointer-events: none;
  opacity: 0;
  z-index: 1000;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.feedback.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.feedback.correct { background: rgba(0,200,83,0.15); color: var(--green); border: 2px solid var(--green); }
.feedback.incorrect { background: rgba(255,23,68,0.15); color: var(--pink); border: 2px solid var(--pink); }
.feedback.try-again { background: rgba(255,145,0,0.15); color: var(--orange); border: 2px solid var(--orange); }

/* ── BAG & MARBLE STYLES ── */
.bag-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 600px;
}
.bag-svg-wrap {
  position: relative;
  display: flex;
  justify-content: center;
}
.pull-btn {
  padding: 12px 32px;
  border-radius: 12px;
  border: 2px solid var(--cyan);
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.pull-btn:hover { background: rgba(0,212,255,0.2); transform: scale(1.05); }
.pull-btn:active { transform: scale(0.95); }
.pull-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.drawn-marble {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: inset 0 -4px 8px rgba(0,0,0,0.2), inset 0 4px 8px rgba(255,255,255,0.2);
}

/* ── FREQUENCY TRACKER ── */
.freq-tracker {
  width: 100%;
  max-width: 500px;
}
.freq-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.freq-label {
  width: 60px;
  font-size: 13px;
  font-weight: 600;
  text-align: right;
}
.freq-bar-bg {
  flex: 1;
  height: 22px;
  background: var(--card);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.freq-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.4s ease;
  min-width: 2px;
}
.freq-count {
  width: 40px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text2);
}
.freq-tally {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  min-width: 60px;
}

/* ── COMPOSITION DISPLAY ── */
.composition {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 12px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
}
.comp-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
}
.comp-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.2);
}

/* ── MC CHOICES ── */
.mc-choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 460px;
}
.mc-btn {
  padding: 14px 20px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.mc-btn:hover { border-color: var(--cyan); background: rgba(0,212,255,0.05); }
.mc-btn.correct { border-color: var(--green); background: rgba(0,200,83,0.1); color: var(--green); }
.mc-btn.wrong { border-color: var(--pink); background: rgba(255,23,68,0.1); color: var(--pink); }
.mc-btn:disabled { cursor: not-allowed; opacity: 0.7; }

/* ── PLAY MODE ── */
.game-info {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-bottom: 12px;
}
.info-item {
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
}
.info-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}
.game-over {
  text-align: center;
  padding: 32px;
}
.game-over-title {
  font-size: 28px;
  font-weight: 800;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.game-over-score {
  font-size: 64px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.game-over-label {
  font-size: 14px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 16px;
}
.play-btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.play-btn:hover { border-color: var(--cyan); }
.play-btn.primary {
  background: var(--cyan);
  color: var(--bg);
  border-color: var(--cyan);
}
.play-btn.primary:hover { opacity: 0.9; transform: scale(1.03); }

/* ── SETUP CONTROLS ── */
.setup-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.setup-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
}
.setup-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.setup-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.setup-count {
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  min-width: 24px;
  text-align: center;
}

/* ── RESULT SECTION ── */
.result-section {
  text-align: center;
  padding: 16px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}
.drawn-display {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 40px;
  padding: 8px;
}

/* ═══ ANIMATIONS ═══ */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes marbleDrop {
  0% { transform: translateY(-60px) scale(0.5); opacity: 0; }
  60% { transform: translateY(8px) scale(1.1); opacity: 1; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes bagShake {
  0%, 100% { transform: rotate(0deg); }
  20% { transform: rotate(-3deg); }
  40% { transform: rotate(3deg); }
  60% { transform: rotate(-2deg); }
  80% { transform: rotate(2deg); }
}

.marble-drop { animation: marbleDrop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.bag-shake { animation: bagShake 0.4s ease-in-out; }
.pop-in { animation: pop 0.3s ease-out forwards; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .side-panel { width: 220px; }
  .mc-btn { padding: 12px 16px; font-size: 14px; }
  .drawn-marble { width: 36px; height: 36px; font-size: 11px; }
  .bag-area { max-width: 100%; }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">&#9664; Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Probability Predictions</div>
    <span class="vinculum-header-badge">2 &middot; MD</span>
  </div>
  <div class="vinculum-std-tags" style="display:flex;align-items:center;gap:8px;">
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">&#128266; Read to Me</button>
    <span class="vinculum-std-tag">2.D.5</span>
    <span class="vinculum-std-tag mn">MN 2.D.5</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">Emergent</button>
    <button class="vinculum-diff-btn" id="diffP" onclick="setDiff('proficient')" data-diff="proficient">Proficient</button>
    <button class="vinculum-diff-btn" id="diffA" onclick="setDiff('advanced')" data-diff="advanced">Advanced</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>

// ════════════════════════════════════════
// MARBLE COLORS
// ════════════════════════════════════════
var COLORS = [
  { name: 'Red',    hex: '#ef4444', dark: '#dc2626' },
  { name: 'Blue',   hex: '#3b82f6', dark: '#2563eb' },
  { name: 'Green',  hex: '#22c55e', dark: '#16a34a' },
  { name: 'Yellow', hex: '#eab308', dark: '#ca8a04' },
  { name: 'Purple', hex: '#a855f7', dark: '#9333ea' },
  { name: 'Orange', hex: '#f97316', dark: '#ea580c' }
];

// ════════════════════════════════════════
// MISCONCEPTIONS DATABASE
// ════════════════════════════════════════
var MISCONCEPTIONS = {
  gamblersFallacy: {
    id: 'gamblers-fallacy',
    msg: function() { return 'Each pull is independent! Getting red three times does not make blue more likely next time.'; }
  },
  ignoreComposition: {
    id: 'ignore-composition',
    msg: function() { return 'Look at what is IN the bag. More marbles of a color means that color is pulled more often.'; }
  },
  equalLikelihood: {
    id: 'equal-likelihood',
    msg: function() { return 'Not all colors are equally likely. The number of each color in the bag determines the chances.'; }
  },
  confuseCertainImpossible: {
    id: 'certain-impossible',
    msg: function() { return 'Certain means it MUST happen. Impossible means it CANNOT happen. Check if the color is in the bag.'; }
  },
  smallSampleSize: {
    id: 'small-sample',
    msg: function() { return 'A few pulls might be surprising, but with many pulls the results usually match the bag composition.'; }
  },
  recencyBias: {
    id: 'recency-bias',
    msg: function() { return 'The last pull does not change what is likely next. Focus on how many of each color are in the bag.'; }
  }
};

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
var S = {
  mode: 'explore',
  diff: 'emergent',

  // Explore
  bag: [],
  drawn: [],
  freq: {},
  pulling: false,

  // Practice
  practiceBag: [],
  practiceQ: '',
  practiceChoices: [],
  practiceAnswer: -1,
  practiceAnswered: false,
  practiceCorrect: false,
  score: 0,
  total: 0,

  // Play
  playBag: [],
  playQ: '',
  playChoices: [],
  playAnswer: -1,
  playAnswered: false,
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  playBest: 0,
  gameEnded: false
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').innerHTML = '&#128266; Read to Me';
  } else {
    var text = document.getElementById('sidePanel').textContent || 'Pull marbles from the bag to see which colors come up most often.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: function() {
        document.getElementById('readAloudBtn').innerHTML = '&#128266; Read to Me';
      }});
      document.getElementById('readAloudBtn').innerHTML = '&#9209; Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = randInt(0, i);
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function pickRandom(arr) {
  return arr[randInt(0, arr.length - 1)];
}

function countInBag(bag) {
  var counts = {};
  for (var i = 0; i < bag.length; i++) {
    var c = bag[i].name;
    counts[c] = (counts[c] || 0) + 1;
  }
  return counts;
}

function getMostLikely(bag) {
  var counts = countInBag(bag);
  var max = 0;
  var best = '';
  for (var c in counts) {
    if (counts[c] > max) { max = counts[c]; best = c; }
  }
  return best;
}

function getLeastLikely(bag) {
  var counts = countInBag(bag);
  var min = Infinity;
  var best = '';
  for (var c in counts) {
    if (counts[c] < min) { min = counts[c]; best = c; }
  }
  return best;
}

function getColorByName(name) {
  for (var i = 0; i < COLORS.length; i++) {
    if (COLORS[i].name === name) return COLORS[i];
  }
  return COLORS[0];
}

function tallyStr(n) {
  var s = '';
  var fives = Math.floor(n / 5);
  var ones = n % 5;
  for (var i = 0; i < fives; i++) s += '||||\u0338 ';
  for (var i = 0; i < ones; i++) s += '|';
  return s || '0';
}

// ════════════════════════════════════════
// BAG GENERATORS
// ════════════════════════════════════════
function makeDefaultBag() {
  if (S.diff === 'emergent') {
    // 2 colors, clear difference
    var c1 = COLORS[0], c2 = COLORS[1];
    var bag = [];
    for (var i = 0; i < 5; i++) bag.push(c1);
    for (var i = 0; i < 2; i++) bag.push(c2);
    return bag;
  } else if (S.diff === 'proficient') {
    // 3 colors, varied counts
    var c1 = COLORS[0], c2 = COLORS[1], c3 = COLORS[2];
    var bag = [];
    for (var i = 0; i < 4; i++) bag.push(c1);
    for (var i = 0; i < 3; i++) bag.push(c2);
    for (var i = 0; i < 1; i++) bag.push(c3);
    return bag;
  } else {
    // 4 colors
    var c1 = COLORS[0], c2 = COLORS[1], c3 = COLORS[2], c4 = COLORS[3];
    var bag = [];
    for (var i = 0; i < 5; i++) bag.push(c1);
    for (var i = 0; i < 3; i++) bag.push(c2);
    for (var i = 0; i < 2; i++) bag.push(c3);
    for (var i = 0; i < 1; i++) bag.push(c4);
    return bag;
  }
}

function makeRandomBag(numColors, total) {
  var usedColors = shuffle(COLORS).slice(0, numColors);
  var bag = [];
  var remaining = total;
  for (var i = 0; i < numColors - 1; i++) {
    var count = randInt(1, remaining - (numColors - 1 - i));
    for (var j = 0; j < count; j++) bag.push(usedColors[i]);
    remaining -= count;
  }
  for (var j = 0; j < remaining; j++) bag.push(usedColors[numColors - 1]);
  return bag;
}

// ════════════════════════════════════════
// SVG BAG BUILDER
// ════════════════════════════════════════
function buildBagSVG(bag, w, h, shaking) {
  var svgW = w || 220;
  var svgH = h || 200;
  var bagTop = 50;
  var bagBot = svgH - 20;
  var bagLeft = 40;
  var bagRight = svgW - 40;
  var bagMid = svgW / 2;

  var svg = '<svg width="' + svgW + '" height="' + svgH + '" viewBox="0 0 ' + svgW + ' ' + svgH + '"' +
    (shaking ? ' class="bag-shake"' : '') + '>';

  // Bag body (rounded trapezoid)
  svg += '<path d="M' + (bagLeft + 10) + ',' + bagTop +
    ' L' + (bagLeft - 5) + ',' + bagBot +
    ' Q' + (bagLeft - 5) + ',' + (bagBot + 12) + ' ' + (bagLeft + 10) + ',' + (bagBot + 12) +
    ' L' + (bagRight - 10) + ',' + (bagBot + 12) +
    ' Q' + (bagRight + 5) + ',' + (bagBot + 12) + ' ' + (bagRight + 5) + ',' + bagBot +
    ' L' + (bagRight - 10) + ',' + bagTop +
    ' Z" fill="rgba(120,100,80,0.3)" stroke="rgba(180,160,130,0.6)" stroke-width="2.5"/>';

  // Bag opening (ellipse at top)
  svg += '<ellipse cx="' + bagMid + '" cy="' + bagTop + '" rx="' + ((bagRight - bagLeft) / 2 - 5) + '" ry="12" ' +
    'fill="rgba(100,80,60,0.4)" stroke="rgba(180,160,130,0.6)" stroke-width="2"/>';

  // Draw marbles inside bag
  var shuffled = shuffle(bag);
  var cols = Math.min(bag.length, 5);
  var rows = Math.ceil(bag.length / cols);
  var marbleR = Math.min(14, (bagRight - bagLeft - 30) / (cols * 2));
  var startY = bagBot - 20;
  var rowH = marbleR * 2 + 4;

  for (var i = 0; i < shuffled.length; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var cx = bagLeft + 20 + col * (marbleR * 2 + 6) + (row % 2 === 1 ? marbleR : 0);
    var cy = startY - row * rowH;
    if (cy < bagTop + 16) cy = bagTop + 16;

    svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + marbleR + '" ' +
      'fill="' + shuffled[i].hex + '" stroke="' + shuffled[i].dark + '" stroke-width="1.5">';
    svg += '<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="' + (i * 0.04) + 's" fill="freeze"/>';
    svg += '</circle>';
    // Shine highlight
    svg += '<circle cx="' + (cx - marbleR * 0.3) + '" cy="' + (cy - marbleR * 0.3) + '" r="' + (marbleR * 0.25) + '" ' +
      'fill="rgba(255,255,255,0.4)" />';
  }

  svg += '</svg>';
  return svg;
}

// ════════════════════════════════════════
// FEEDBACK
// ════════════════════════════════════════
function showFB(text, type) {
  var fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.className = 'feedback ' + type + ' show';
  setTimeout(function() { fb.classList.remove('show'); }, 1800);
}

function getMisconceptionFB(bag, userAnswer, correctAnswer) {
  var counts = countInBag(bag);
  var colorNames = Object.keys(counts);
  var allSame = true;
  var first = counts[colorNames[0]];
  for (var i = 1; i < colorNames.length; i++) {
    if (counts[colorNames[i]] !== first) { allSame = false; break; }
  }
  if (allSame) return MISCONCEPTIONS.equalLikelihood.msg();
  if (userAnswer !== correctAnswer) {
    if (Math.random() < 0.3) return MISCONCEPTIONS.gamblersFallacy.msg();
    if (Math.random() < 0.5) return MISCONCEPTIONS.ignoreComposition.msg();
    return MISCONCEPTIONS.smallSampleSize.msg();
  }
  return MISCONCEPTIONS.ignoreComposition.msg();
}

// ════════════════════════════════════════
// MODE / DIFF SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'explore') {
    S.bag = makeDefaultBag();
    S.drawn = [];
    S.freq = {};
  }

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.playBest = 0;
    S.gameEnded = false;
    newPlayQuestion();
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(function(t) {
    t.classList.remove('active-explore', 'active-practice', 'active-play');
  });
  var tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.classList.add('active-' + mode);

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.bag = makeDefaultBag();
  S.drawn = [];
  S.freq = {};
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;
  S.playBest = 0;
  S.practiceAnswered = false;
  S.gameEnded = false;

  document.querySelectorAll('.vinculum-diff-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  var ws = document.getElementById('workspace');
  var sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ════════════════════════════════════════
// PULL MARBLE
// ════════════════════════════════════════
function pullMarble() {
  if (S.pulling || S.bag.length === 0) return;
  S.pulling = true;

  var marble = pickRandom(S.bag);
  S.drawn.push(marble);
  S.freq[marble.name] = (S.freq[marble.name] || 0) + 1;

  render();

  setTimeout(function() {
    S.pulling = false;
  }, 500);
}

function resetDrawn() {
  S.drawn = [];
  S.freq = {};
  render();
}

// ════════════════════════════════════════
// EXPLORE: BAG SETUP
// ════════════════════════════════════════
function adjustBag(colorIdx, delta) {
  var color = COLORS[colorIdx];
  var currentCount = 0;
  for (var i = 0; i < S.bag.length; i++) {
    if (S.bag[i].name === color.name) currentCount++;
  }
  var newCount = Math.max(0, Math.min(10, currentCount + delta));

  // Rebuild bag
  var newBag = [];
  for (var i = 0; i < S.bag.length; i++) {
    if (S.bag[i].name !== color.name) newBag.push(S.bag[i]);
  }
  for (var i = 0; i < newCount; i++) newBag.push(color);
  S.bag = newBag;
  S.drawn = [];
  S.freq = {};
  render();
}

// ════════════════════════════════════════
// EXPLORE MODE
// ════════════════════════════════════════
function renderExplore(ws, sp) {
  var bag = S.bag;
  var counts = countInBag(bag);
  var numColors = S.diff === 'emergent' ? 2 : (S.diff === 'proficient' ? 3 : 4);

  var html = '<div class="bag-area">';

  // Title
  html += '<div style="text-align:center;font-size:16px;font-weight:700;color:var(--text);">Marble Bag</div>';

  // Composition display
  html += '<div class="composition">';
  for (var i = 0; i < numColors; i++) {
    var c = COLORS[i];
    var ct = counts[c.name] || 0;
    html += '<div class="comp-item">';
    html += '<div class="comp-dot" style="background:' + c.hex + ';"></div>';
    html += '<span>' + ct + ' ' + c.name + '</span>';
    html += '</div>';
  }
  html += '</div>';

  // Setup controls
  html += '<div style="display:flex;flex-direction:column;gap:6px;width:100%;max-width:400px;">';
  for (var i = 0; i < numColors; i++) {
    var c = COLORS[i];
    var ct = counts[c.name] || 0;
    html += '<div class="setup-row">';
    html += '<div class="comp-dot" style="background:' + c.hex + ';"></div>';
    html += '<span class="setup-label">' + c.name + '</span>';
    html += '<button class="setup-btn" onclick="adjustBag(' + i + ',-1)" aria-label="Remove ' + c.name + '">-</button>';
    html += '<span class="setup-count">' + ct + '</span>';
    html += '<button class="setup-btn" onclick="adjustBag(' + i + ',1)" aria-label="Add ' + c.name + '">+</button>';
    html += '</div>';
  }
  html += '</div>';

  // SVG Bag
  if (bag.length > 0) {
    html += '<div class="bag-svg-wrap">';
    html += buildBagSVG(bag, 220, 200, S.pulling);
    html += '</div>';

    // Pull button
    html += '<button class="pull-btn" onclick="pullMarble()"' + (S.pulling ? ' disabled' : '') + '>Pull a Marble!</button>';
  } else {
    html += '<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">Add marbles to the bag using the + buttons above.</div>';
  }

  // Last drawn marble
  if (S.drawn.length > 0) {
    var last = S.drawn[S.drawn.length - 1];
    html += '<div style="text-align:center;">';
    html += '<div style="font-size:13px;color:var(--muted);margin-bottom:4px;">You pulled:</div>';
    html += '<div class="drawn-marble marble-drop" style="background:' + last.hex + ';display:inline-flex;margin:0 auto;">' + last.name + '</div>';
    html += '</div>';
  }

  // Frequency tracker
  if (S.drawn.length > 0) {
    html += '<div class="freq-tracker">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    html += '<div style="font-size:14px;font-weight:700;">Results (' + S.drawn.length + ' pulls)</div>';
    html += '<button class="play-btn" onclick="resetDrawn()" style="font-size:12px;padding:4px 12px;">Reset</button>';
    html += '</div>';

    for (var i = 0; i < numColors; i++) {
      var c = COLORS[i];
      var ct = S.freq[c.name] || 0;
      var pct = S.drawn.length > 0 ? Math.round((ct / S.drawn.length) * 100) : 0;
      html += '<div class="freq-row">';
      html += '<div class="freq-label" style="color:' + c.hex + ';">' + c.name + '</div>';
      html += '<div class="freq-bar-bg"><div class="freq-bar-fill" style="width:' + pct + '%;background:' + c.hex + ';"></div></div>';
      html += '<div class="freq-count">' + ct + '</div>';
      html += '<div class="freq-tally">' + tallyStr(ct) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  var spHtml = '<div class="panel-section">';
  spHtml += '<div class="panel-title">How it Works</div>';
  spHtml += '<div class="panel-text">Set up your marble bag using the + and - buttons. Then tap <strong>Pull a Marble</strong> to randomly draw one. The marble goes back in after each pull!</div>';
  spHtml += '</div>';

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Key Idea</div>';
  spHtml += '<div class="panel-text">The more marbles of a color in the bag, the more <strong>likely</strong> you are to pull that color.</div>';
  spHtml += '</div>';

  if (bag.length > 0) {
    spHtml += '<div class="panel-section">';
    spHtml += '<div class="panel-title">Bag Breakdown</div>';
    for (var i = 0; i < numColors; i++) {
      var c = COLORS[i];
      var ct = counts[c.name] || 0;
      if (ct > 0) {
        spHtml += '<div class="panel-text" style="margin-bottom:4px;"><span style="color:' + c.hex + ';font-weight:700;">' + c.name + ':</span> ' + ct + ' out of ' + bag.length + ' (' + Math.round((ct / bag.length) * 100) + '%)</div>';
      }
    }
    spHtml += '</div>';

    // Prediction insight
    var most = getMostLikely(bag);
    if (most) {
      spHtml += '<div class="panel-section">';
      spHtml += '<div class="panel-title">Prediction</div>';
      spHtml += '<div class="panel-text"><span style="color:' + getColorByName(most).hex + ';font-weight:700;">' + most + '</span> is most likely to be pulled because there are more ' + most + ' marbles in the bag.</div>';
      spHtml += '</div>';
    }
  }

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Standard</div>';
  spHtml += '<div class="panel-text" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;">MN 2.D.5</div>';
  spHtml += '</div>';

  sp.innerHTML = spHtml;
}

// ════════════════════════════════════════
// PRACTICE MODE
// ════════════════════════════════════════
function newPracticeQuestion() {
  var numColors, total;
  if (S.diff === 'emergent') {
    numColors = 2; total = randInt(5, 8);
  } else if (S.diff === 'proficient') {
    numColors = 3; total = randInt(7, 12);
  } else {
    numColors = 4; total = randInt(8, 14);
  }

  S.practiceBag = makeRandomBag(numColors, total);
  var counts = countInBag(S.practiceBag);
  var colorNames = Object.keys(counts);

  // Generate question
  var qType;
  if (S.diff === 'emergent') {
    qType = randInt(0, 1);
  } else if (S.diff === 'proficient') {
    qType = randInt(0, 3);
  } else {
    qType = randInt(0, 4);
  }

  var choices = [];
  var answer = -1;

  if (qType === 0) {
    // "Which color is MOST likely?"
    S.practiceQ = 'Which color are you most likely to pull?';
    var most = getMostLikely(S.practiceBag);
    choices = shuffle(colorNames.slice());
    answer = choices.indexOf(most);
  } else if (qType === 1) {
    // "Which color is LEAST likely?"
    S.practiceQ = 'Which color are you least likely to pull?';
    var least = getLeastLikely(S.practiceBag);
    choices = shuffle(colorNames.slice());
    answer = choices.indexOf(least);
  } else if (qType === 2) {
    // Certain / Impossible / Likely
    var missingColor = '';
    for (var i = 0; i < COLORS.length; i++) {
      if (!counts[COLORS[i].name]) { missingColor = COLORS[i].name; break; }
    }
    if (missingColor) {
      S.practiceQ = 'Is it possible to pull a ' + missingColor + ' marble?';
      choices = ['Yes, it is possible', 'No, it is impossible'];
      answer = 1;
    } else {
      S.practiceQ = 'Which color are you most likely to pull?';
      var most = getMostLikely(S.practiceBag);
      choices = shuffle(colorNames.slice());
      answer = choices.indexOf(most);
    }
  } else if (qType === 3) {
    // "If you pull 10 times, which color will come up most?"
    S.practiceQ = 'If you pull 10 marbles, which color will likely come up most?';
    var most = getMostLikely(S.practiceBag);
    choices = shuffle(colorNames.slice());
    answer = choices.indexOf(most);
  } else {
    // "Are all colors equally likely?"
    var allSame = true;
    var first = counts[colorNames[0]];
    for (var i = 1; i < colorNames.length; i++) {
      if (counts[colorNames[i]] !== first) { allSame = false; break; }
    }
    S.practiceQ = 'Are all colors equally likely to be pulled?';
    choices = ['Yes, all colors are equally likely', 'No, some colors are more likely'];
    answer = allSame ? 0 : 1;
  }

  S.practiceChoices = choices;
  S.practiceAnswer = answer;
  S.practiceAnswered = false;
  S.practiceCorrect = false;
}

function renderPractice(ws, sp) {
  var bag = S.practiceBag;
  var counts = countInBag(bag);

  var html = '<div class="bag-area">';

  // Question
  html += '<div style="text-align:center;font-size:17px;font-weight:700;color:var(--text);max-width:460px;">' + S.practiceQ + '</div>';

  // Bag visual + composition
  html += '<div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center;">';
  html += '<div class="bag-svg-wrap">' + buildBagSVG(bag, 180, 170, false) + '</div>';
  html += '<div class="composition" style="flex-direction:column;align-items:flex-start;">';
  for (var c in counts) {
    var col = getColorByName(c);
    html += '<div class="comp-item">';
    html += '<div class="comp-dot" style="background:' + col.hex + ';"></div>';
    html += '<span>' + counts[c] + ' ' + c + '</span>';
    html += '</div>';
  }
  html += '<div style="font-size:12px;color:var(--muted);margin-top:4px;">Total: ' + bag.length + ' marbles</div>';
  html += '</div>';
  html += '</div>';

  // MC choices
  html += '<div class="mc-choices">';
  for (var i = 0; i < S.practiceChoices.length; i++) {
    var ch = S.practiceChoices[i];
    var cls = '';
    var disabled = '';
    if (S.practiceAnswered) {
      disabled = ' disabled';
      if (i === S.practiceAnswer) cls = ' correct';
      else if (i === S.practiceUserChoice && !S.practiceCorrect) cls = ' wrong';
    }
    var col = getColorByName(ch);
    var dot = col && counts[ch] ? '<span class="comp-dot" style="display:inline-block;width:14px;height:14px;background:' + col.hex + ';vertical-align:middle;margin-right:6px;"></span>' : '';
    html += '<button class="mc-btn' + cls + '"' + disabled + ' onclick="checkPractice(' + i + ')" aria-label="' + ch + '">' + dot + ch + '</button>';
  }
  html += '</div>';

  // After answer explanation
  if (S.practiceAnswered) {
    html += '<div style="text-align:center;font-size:13px;color:var(--text2);max-width:440px;margin-top:4px;">';
    if (S.practiceCorrect) {
      html += 'The bag has ' + buildCountStr(counts) + '. The composition tells us the answer!';
    } else {
      html += getMisconceptionFB(bag, S.practiceUserChoice, S.practiceAnswer);
    }
    html += '</div>';
    html += '<button class="play-btn primary" onclick="newPracticeQuestion();S.total++;render();" style="margin-top:4px;">Next Question &#8594;</button>';
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  var spHtml = '<div class="panel-section">';
  spHtml += '<div class="panel-title">Score</div>';
  spHtml += '<div class="score-display">';
  spHtml += '<div class="score-value">' + S.score + '</div>';
  spHtml += '<div class="score-label">out of ' + S.total + '</div>';
  spHtml += '</div></div>';

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Instructions</div>';
  spHtml += '<div class="panel-text">';
  if (S.diff === 'emergent') {
    spHtml += 'Look at how many of each color are in the bag. The color with <strong>more</strong> marbles is <strong>more likely</strong> to be pulled.';
  } else if (S.diff === 'proficient') {
    spHtml += 'Count the marbles of each color. Predict which outcome is most or least likely based on the bag composition.';
  } else {
    spHtml += 'Analyze the bag composition. Consider whether outcomes are certain, impossible, likely, or unlikely. Compare predictions to what would actually happen.';
  }
  spHtml += '</div></div>';

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Tip</div>';
  spHtml += '<div class="panel-text">More of a color = more likely to pull it. If a color is not in the bag, pulling it is <strong>impossible</strong>.</div>';
  spHtml += '</div>';

  sp.innerHTML = spHtml;
}

function buildCountStr(counts) {
  var parts = [];
  for (var c in counts) {
    parts.push(counts[c] + ' ' + c);
  }
  return parts.join(', ');
}

function checkPractice(idx) {
  if (S.practiceAnswered) return;

  S.practiceAnswered = true;
  S.practiceUserChoice = idx;
  S.practiceCorrect = (idx === S.practiceAnswer);
  S.total++;

  if (S.practiceCorrect) {
    S.score++;
    showFB('\u2713 Correct!', 'correct');
  } else {
    showFB('\u2717 Not quite', 'incorrect');
  }

  render();
}

// ════════════════════════════════════════
// PLAY MODE
// ════════════════════════════════════════
function newPlayQuestion() {
  var numColors, total;
  if (S.diff === 'emergent') {
    numColors = 2; total = randInt(5, 8);
  } else if (S.diff === 'proficient') {
    numColors = 3; total = randInt(7, 11);
  } else {
    numColors = 4; total = randInt(8, 14);
  }

  S.playBag = makeRandomBag(numColors, total);
  var counts = countInBag(S.playBag);
  var colorNames = Object.keys(counts);

  // Generate question variety
  var qType;
  if (S.diff === 'emergent') {
    qType = randInt(0, 1);
  } else if (S.diff === 'proficient') {
    qType = randInt(0, 3);
  } else {
    qType = randInt(0, 4);
  }

  var choices = [];
  var answer = -1;

  if (qType === 0) {
    S.playQ = 'Which color is most likely?';
    var most = getMostLikely(S.playBag);
    choices = shuffle(colorNames.slice());
    answer = choices.indexOf(most);
  } else if (qType === 1) {
    S.playQ = 'Which color is least likely?';
    var least = getLeastLikely(S.playBag);
    choices = shuffle(colorNames.slice());
    answer = choices.indexOf(least);
  } else if (qType === 2) {
    var missingColor = '';
    for (var i = 0; i < COLORS.length; i++) {
      if (!counts[COLORS[i].name]) { missingColor = COLORS[i].name; break; }
    }
    if (missingColor) {
      S.playQ = 'Can you pull a ' + missingColor + ' marble?';
      choices = ['Yes', 'No, impossible'];
      answer = 1;
    } else {
      S.playQ = 'Which color is most likely?';
      var most = getMostLikely(S.playBag);
      choices = shuffle(colorNames.slice());
      answer = choices.indexOf(most);
    }
  } else if (qType === 3) {
    S.playQ = 'Pull 10 times. Which color shows up most?';
    var most = getMostLikely(S.playBag);
    choices = shuffle(colorNames.slice());
    answer = choices.indexOf(most);
  } else {
    var allSame = true;
    var first = counts[colorNames[0]];
    for (var i = 1; i < colorNames.length; i++) {
      if (counts[colorNames[i]] !== first) { allSame = false; break; }
    }
    S.playQ = 'Are all colors equally likely?';
    choices = ['Yes, equal', 'No, not equal'];
    answer = allSame ? 0 : 1;
  }

  S.playChoices = choices;
  S.playAnswer = answer;
  S.playAnswered = false;
}

function renderPlay(ws, sp) {
  if (S.gameEnded) {
    renderGameOver(ws, sp);
    return;
  }

  var bag = S.playBag;
  var counts = countInBag(bag);

  var html = '<div class="bag-area">';

  // Game info bar
  html += '<div class="game-info">';
  html += '<div class="info-item"><span class="info-label">Round</span> ' + S.playRound + '/10</div>';
  html += '<div class="info-item"><span class="info-label">Score</span> ' + S.playScore + '</div>';
  html += '<div class="info-item"><span class="info-label">Streak</span> ' + S.playStreak + '</div>';
  html += '</div>';

  // Question
  html += '<div style="text-align:center;font-size:17px;font-weight:700;color:var(--text);max-width:460px;">' + S.playQ + '</div>';

  // Bag visual + composition
  html += '<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;">';
  html += '<div class="bag-svg-wrap">' + buildBagSVG(bag, 160, 150, false) + '</div>';
  html += '<div class="composition" style="flex-direction:column;align-items:flex-start;">';
  for (var c in counts) {
    var col = getColorByName(c);
    html += '<div class="comp-item">';
    html += '<div class="comp-dot" style="background:' + col.hex + ';"></div>';
    html += '<span>' + counts[c] + ' ' + c + '</span>';
    html += '</div>';
  }
  html += '<div style="font-size:12px;color:var(--muted);margin-top:4px;">Total: ' + bag.length + '</div>';
  html += '</div>';
  html += '</div>';

  // MC choices
  if (!S.playAnswered) {
    html += '<div class="mc-choices">';
    for (var i = 0; i < S.playChoices.length; i++) {
      var ch = S.playChoices[i];
      var col = getColorByName(ch);
      var dot = col && counts[ch] ? '<span class="comp-dot" style="display:inline-block;width:14px;height:14px;background:' + col.hex + ';vertical-align:middle;margin-right:6px;"></span>' : '';
      html += '<button class="mc-btn" id="playBtn' + i + '" onclick="checkPlay(' + i + ')" aria-label="' + ch + '">' + dot + ch + '</button>';
    }
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  var spHtml = '<div class="panel-section">';
  spHtml += '<div class="panel-title">Score</div>';
  spHtml += '<div class="score-display">';
  spHtml += '<div class="score-value">' + S.playScore + '</div>';
  spHtml += '<div class="score-label">Points</div>';
  spHtml += '</div>';

  spHtml += '<div class="score-display">';
  spHtml += '<div class="score-value" style="font-size:24px;">' + S.playStreak + '</div>';
  spHtml += '<div class="score-label">Streak</div>';
  spHtml += '<div class="streak-bar"><div class="streak-fill" style="width:' + Math.min(S.playStreak * 10, 100) + '%;"></div></div>';
  spHtml += '</div></div>';

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Scoring</div>';
  spHtml += '<div class="panel-text">Each correct answer: <strong>10 pts</strong> + streak bonus (<strong>streak x 2</strong>). Build your streak for maximum points!</div>';
  spHtml += '</div>';

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Quick Tip</div>';
  spHtml += '<div class="panel-text">';
  if (S.diff === 'emergent') {
    spHtml += 'Count the marbles. The color with more marbles is more likely!';
  } else if (S.diff === 'proficient') {
    spHtml += 'Compare the counts. Which color has the biggest share of the bag?';
  } else {
    spHtml += 'Think about ratios. A color with 5 out of 10 marbles has a 50% chance!';
  }
  spHtml += '</div></div>';

  if (S.playBest > 0) {
    spHtml += '<div class="panel-section">';
    spHtml += '<div class="panel-title">Best Streak</div>';
    spHtml += '<div class="panel-text" style="font-family:\'JetBrains Mono\',monospace;font-size:18px;font-weight:700;color:var(--cyan);">' + S.playBest + '</div>';
    spHtml += '</div>';
  }

  sp.innerHTML = spHtml;
}

function checkPlay(idx) {
  if (S.playAnswered) return;
  S.playAnswered = true;

  var correct = (idx === S.playAnswer);
  var btn = document.getElementById('playBtn' + idx);
  var correctBtn = document.getElementById('playBtn' + S.playAnswer);

  if (correct) {
    showFB('\u2713 Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 2);
    S.playStreak++;
    S.playRound++;

    if (btn) btn.classList.add('correct');

    // Disable all buttons
    for (var i = 0; i < S.playChoices.length; i++) {
      var b = document.getElementById('playBtn' + i);
      if (b) b.disabled = true;
    }

    if (S.playRound > 10) {
      S.playBest = Math.max(S.playBest, S.playStreak);
      setTimeout(function() {
        S.gameEnded = true;
        render();
      }, 900);
    } else {
      setTimeout(function() {
        newPlayQuestion();
        render();
      }, 700);
    }
  } else {
    if (btn) btn.classList.add('wrong');
    var msg = getMisconceptionFB(S.playBag, idx, S.playAnswer);
    showFB('\u2717 ' + S.playChoices[S.playAnswer], 'try-again');
    S.playStreak = 0;
    S.playRound++;

    // Disable all and highlight correct
    for (var i = 0; i < S.playChoices.length; i++) {
      var b = document.getElementById('playBtn' + i);
      if (b) b.disabled = true;
    }
    setTimeout(function() {
      if (correctBtn) {
        correctBtn.style.borderColor = 'var(--green)';
        correctBtn.style.color = 'var(--green)';
      }
    }, 400);

    if (S.playRound > 10) {
      S.playBest = Math.max(S.playBest, S.playStreak);
      setTimeout(function() {
        S.gameEnded = true;
        render();
      }, 1200);
    } else {
      setTimeout(function() {
        newPlayQuestion();
        render();
      }, 1200);
    }
  }
}

function renderGameOver(ws, sp) {
  var html = '<div class="bag-area">';
  html += '<div class="game-over">';
  html += '<div class="game-over-title">Prediction Challenge Complete!</div>';
  html += '<div class="game-over-score">' + S.playScore + '</div>';
  html += '<div class="game-over-label">Total Points</div>';

  // Stars based on score
  var stars = S.playScore >= 80 ? 3 : (S.playScore >= 50 ? 2 : 1);
  html += '<div style="font-size:32px;margin-bottom:16px;">';
  for (var i = 0; i < 3; i++) {
    html += '<span style="opacity:' + (i < stars ? '1' : '0.2') + ';">\u2B50</span>';
  }
  html += '</div>';

  html += '<div style="font-size:14px;color:var(--text2);margin-bottom:20px;">';
  html += 'Best Streak: <strong>' + S.playBest + '</strong>';
  html += '</div>';

  html += '<button class="play-btn primary" onclick="playAgain()">Play Again</button>';
  html += '</div></div>';

  ws.innerHTML = html;

  // Side panel
  var spHtml = '<div class="panel-section">';
  spHtml += '<div class="panel-title">Final Score</div>';
  spHtml += '<div class="score-display">';
  spHtml += '<div class="score-value">' + S.playScore + '</div>';
  spHtml += '<div class="score-label">Points</div>';
  spHtml += '</div></div>';

  spHtml += '<div class="panel-section">';
  spHtml += '<div class="panel-title">Performance</div>';
  spHtml += '<div class="panel-text">';
  if (S.playScore >= 100) {
    spHtml += 'Outstanding! You are a probability prediction expert!';
  } else if (S.playScore >= 70) {
    spHtml += 'Great job! You understand how bag composition affects outcomes.';
  } else if (S.playScore >= 40) {
    spHtml += 'Good effort! Remember: more marbles of a color means more likely.';
  } else {
    spHtml += 'Keep practicing! Count the marbles of each color and compare to predict the outcome.';
  }
  spHtml += '</div></div>';

  sp.innerHTML = spHtml;
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  S.playAnswered = false;
  newPlayQuestion();
  render();
}

S.bag = makeDefaultBag();
newPracticeQuestion();
newPlayQuestion();
render();
