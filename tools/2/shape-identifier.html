<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM — Shape Identifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .vinculum-back-btn {
  display:inline-block;padding:6px 12px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:13px;font-family:inherit;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.vinculum-back-btn:hover { background:var(--card); color:var(--cyan); }
.vinculum-header {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(179, 136, 255, 0.1));
            border-bottom: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vinculum-header-title {
            font-size: 2rem;
            font-weight: 700;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-badges {
            display: flex;
            gap: 0.75rem;
        }

        .badge {
            padding: 0.4rem 0.8rem;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text2);
            font-weight: 500;
        }

        .badge.grade {
            color: var(--cyan);
        }

        .badge.standard {
            color: var(--green);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 2rem;
            display: flex;
            gap: 2rem;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .controls-bar {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .mode-selector {
            display: flex;
            gap: 0.5rem;
            background-color: var(--bg2);
            padding: 0.4rem;
            border-radius: 8px;
            flex: 1;
        }

        .mode-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border: none;
            background: none;
            color: var(--muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            color: var(--text);
            font-weight: 600;
        }

        .mode-btn[data-mode="explore"].active {
            background-color: rgba(0, 212, 255, 0.2);
            color: var(--cyan);
        }

        .mode-btn[data-mode="practice"].active {
            background-color: rgba(0, 230, 118, 0.2);
            color: var(--green);
        }

        .mode-btn[data-mode="play"].active {
            background: linear-gradient(135deg, rgba(255, 59, 139, 0.2), rgba(179, 136, 255, 0.2));
            color: var(--pink);
        }

        .difficulty-selector {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .difficulty-selector label {
            font-size: 0.9rem;
            color: var(--text2);
            margin-right: 0.5rem;
        }

        .difficulty-selector select {
            background-color: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.3s ease;
            min-width: 180px;
        }

        .difficulty-selector select:hover {
            border-color: var(--cyan);
        }

        .workspace {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .workspace-header {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
        }

        .workspace-content {
            flex: 1;
            display: grid;
            gap: 2rem;
        }

        .shape-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .shape-card {
            background-color: var(--card2);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .shape-card:hover {
            border-color: var(--cyan);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.2);
        }

        .shape-card.selected {
            border-color: var(--green);
            background-color: rgba(0, 230, 118, 0.1);
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
        }

        .shape-card-svg {
            width: 100%;
            height: 100px;
            margin-bottom: 0.5rem;
        }

        .shape-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text2);
        }

        .side-panel {
            width: 280px;
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        .attribute {
            font-size: 0.9rem;
            padding: 0.5rem 0.75rem;
            background-color: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            color: var(--text2);
        }

        .attribute-value {
            color: var(--cyan);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .vocabulary-item {
            margin-bottom: 0.8rem;
        }

        .vocabulary-term {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .vocabulary-def {
            font-size: 0.8rem;
            color: var(--text2);
            margin-top: 0.3rem;
            line-height: 1.4;
        }

        .practice-question {
            background-color: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        .question-meta {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 1rem;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .option {
            background-color: var(--bg2);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .option:hover {
            border-color: var(--cyan);
            transform: translateY(-2px);
        }

        .option.selected {
            border-color: var(--cyan);
            background-color: rgba(0, 212, 255, 0.1);
        }

        .option.correct {
            border-color: var(--green);
            background-color: rgba(0, 230, 118, 0.1);
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.3);
        }

        .option.incorrect {
            border-color: var(--pink);
            background-color: rgba(255, 59, 139, 0.1);
        }

        .option-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .option-svg {
            width: 80px;
            height: 80px;
        }

        .option-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text2);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--cyan);
        }

        .checkbox-label {
            font-size: 0.95rem;
            color: var(--text2);
            flex: 1;
        }

        .feedback {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 0.75rem;
        }

        .feedback.show {
            display: flex;
        }

        .feedback.correct {
            background-color: rgba(0, 230, 118, 0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .feedback.incorrect {
            background-color: rgba(255, 59, 139, 0.2);
            color: var(--pink);
            border: 1px solid var(--pink);
        }

        .streak {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--card2);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--yellow);
            font-weight: 600;
        }

        .play-mode-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .timer-display {
            font-size: 3rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            text-align: center;
        }

        .timer-display.warning {
            color: var(--orange);
        }

        .timer-display.danger {
            color: var(--pink);
        }

        .score-display {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
        }

        .play-button {
            padding: 0.8rem 2rem;
            background: var(--grad);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }

        .play-button:active {
            transform: translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .cube-net {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 5px;
            margin: 1rem 0;
        }

        .cube-face {
            width: 80px;
            height: 80px;
            background-color: var(--card2);
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text2);
            transition: all 0.3s ease;
        }

        .cube-face:hover {
            border-color: var(--cyan);
            background-color: rgba(0, 212, 255, 0.1);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .compare-item {
            background-color: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--bg2);
            border-radius: 2px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--grad);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .side-panel {
                width: 100%;
            }

            .controls-bar {
                flex-wrap: wrap;
            }

            .compare-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .workspace-content {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="vinculum-header">
        <div class="vinculum-header-left">
      <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
      <div class="vinculum-header-title"><span>VINCULUM</span> Shape Identifier</div>
      <span class="vinculum-header-badge">2.G</span>
    </div>
    <div class="vinculum-header-content">
            <h1 class="vinculum-header-title">VINCULUM — Shape Identifier</h1>
            <div class="vinculum-header-badges">
                <div class="badge grade">Grade 2</div>
                <div class="badge standard">2.G.A.1</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-area">
            <div class="controls-bar">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="explore">Explore</button>
                    <button class="mode-btn" data-mode="practice">Practice</button>
                    <button class="mode-btn" data-mode="play">Play</button>
                </div>
                <div class="difficulty-selector">
                    <label>Difficulty:</label>
                    <select id="difficulty">
                        <option value="emergent">Emergent</option>
                        <option value="proficient" selected>Proficient</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
            </div>

            <div class="workspace" role="main">
                <div class="workspace-header" id="workspaceHeader">Shape Gallery</div>
                <div class="workspace-content" id="workspaceContent"></div>
            </div>
        </div>

        <div class="side-panel" id="sidePanel">
            <div class="panel-section">
                <div class="panel-title">Vocabulary</div>
                <div id="vocabularyPanel"></div>
            </div>
        </div>
    </div>

<div class="feedback" id="feedback"></div>
    <script>
        // State machine
        const S = {
            mode: 'explore',
            difficulty: 'proficient',
            selectedShapes: [],
            currentQuestion: 0,
            score: 0,
            streak: 0,
            timeRemaining: 60,
            gameActive: false,
            questionsAnswered: 0,
            selectedOption: null,
            answered: false,
            compareMode: false,
            compareShapes: []
        };

        // Shape definitions
        const SHAPES = {
            triangle: {
                name: 'Triangle',
                sides: 3,
                angles: 3,
                rightAngles: 0,
                parallelSides: 0,
                description: 'A shape with 3 sides and 3 angles',
                vertices: 3,
                edges: 3
            },
            rightTriangle: {
                name: 'Right Triangle',
                sides: 3,
                angles: 3,
                rightAngles: 1,
                parallelSides: 0,
                description: 'A triangle with one 90-degree angle',
                vertices: 3,
                edges: 3
            },
            square: {
                name: 'Square',
                sides: 4,
                angles: 4,
                rightAngles: 4,
                parallelSides: 2,
                description: 'A 4-sided shape with all equal sides and all right angles',
                vertices: 4,
                edges: 4
            },
            rectangle: {
                name: 'Rectangle',
                sides: 4,
                angles: 4,
                rightAngles: 4,
                parallelSides: 2,
                description: 'A 4-sided shape with opposite sides equal and all right angles',
                vertices: 4,
                edges: 4
            },
            rhombus: {
                name: 'Rhombus',
                sides: 4,
                angles: 4,
                rightAngles: 0,
                parallelSides: 2,
                description: 'A 4-sided shape with all equal sides (diamond shape)',
                vertices: 4,
                edges: 4
            },
            trapezoid: {
                name: 'Trapezoid',
                sides: 4,
                angles: 4,
                rightAngles: 0,
                parallelSides: 1,
                description: 'A 4-sided shape with exactly one pair of parallel sides',
                vertices: 4,
                edges: 4
            },
            pentagon: {
                name: 'Pentagon',
                sides: 5,
                angles: 5,
                rightAngles: 0,
                parallelSides: 0,
                description: 'A 5-sided shape with 5 angles',
                vertices: 5,
                edges: 5
            },
            hexagon: {
                name: 'Hexagon',
                sides: 6,
                angles: 6,
                rightAngles: 0,
                parallelSides: 0,
                description: 'A 6-sided shape with 6 angles',
                vertices: 6,
                edges: 6
            },
            cube: {
                name: 'Cube',
                sides: 12,
                angles: 0,
                rightAngles: 0,
                parallelSides: 0,
                faces: 6,
                vertices: 8,
                edges: 12,
                description: '3D shape with 6 square faces'
            }
        };

        const VOCABULARY = {
            triangle: 'A polygon with 3 sides',
            quadrilateral: 'A polygon with 4 sides',
            pentagon: 'A polygon with 5 sides',
            hexagon: 'A polygon with 6 sides',
            cube: 'A 3D shape made of 6 square faces',
            face: 'A flat surface on a 3D shape',
            angle: 'The space between two sides where they meet',
            'right angle': 'A 90-degree angle, shown with a small square',
            vertex: 'A corner where two or more sides meet',
            edge: 'A line where two faces meet',
            parallel: 'Lines that never cross and are always the same distance apart'
        };

        // SVG shape renderers
        function renderTriangle(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <polygon points="75,30 30,120 120,120" fill="rgba(0, 212, 255, 0.2)" stroke="#00d4ff" stroke-width="2"/>
                <circle cx="75" cy="30" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="120" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="120" r="4" fill="#ff3b8b"/>
            </svg>`;
        }

        function renderRightTriangle(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <polygon points="30,30 30,120 120,120" fill="rgba(255, 177, 59, 0.2)" stroke="#ffb13b" stroke-width="2"/>
                <circle cx="30" cy="30" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="120" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="120" r="4" fill="#ff3b8b"/>
                <rect x="26" y="116" width="8" height="8" fill="none" stroke="#ffb13b" stroke-width="1"/>
            </svg>`;
        }

        function renderSquare(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <rect x="30" y="30" width="90" height="90" fill="rgba(0, 230, 118, 0.2)" stroke="#00e676" stroke-width="2"/>
                <circle cx="30" cy="30" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="30" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="120" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="120" r="4" fill="#ff3b8b"/>
                <rect x="26" y="26" width="8" height="8" fill="none" stroke="#00e676" stroke-width="1"/>
                <rect x="116" y="26" width="8" height="8" fill="none" stroke="#00e676" stroke-width="1"/>
                <rect x="116" y="116" width="8" height="8" fill="none" stroke="#00e676" stroke-width="1"/>
                <rect x="26" y="116" width="8" height="8" fill="none" stroke="#00e676" stroke-width="1"/>
            </svg>`;
        }

        function renderRectangle(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <rect x="20" y="40" width="110" height="70" fill="rgba(179, 136, 255, 0.2)" stroke="#b388ff" stroke-width="2"/>
                <circle cx="20" cy="40" r="4" fill="#ff3b8b"/>
                <circle cx="130" cy="40" r="4" fill="#ff3b8b"/>
                <circle cx="130" cy="110" r="4" fill="#ff3b8b"/>
                <circle cx="20" cy="110" r="4" fill="#ff3b8b"/>
                <rect x="16" y="36" width="8" height="8" fill="none" stroke="#b388ff" stroke-width="1"/>
                <rect x="126" y="36" width="8" height="8" fill="none" stroke="#b388ff" stroke-width="1"/>
                <rect x="126" y="106" width="8" height="8" fill="none" stroke="#b388ff" stroke-width="1"/>
                <rect x="16" y="106" width="8" height="8" fill="none" stroke="#b388ff" stroke-width="1"/>
            </svg>`;
        }

        function renderRhombus(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <polygon points="75,25 120,75 75,125 30,75" fill="rgba(255, 177, 59, 0.2)" stroke="#ffb13b" stroke-width="2"/>
                <circle cx="75" cy="25" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="75" r="4" fill="#ff3b8b"/>
                <circle cx="75" cy="125" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="75" r="4" fill="#ff3b8b"/>
            </svg>`;
        }

        function renderTrapezoid(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <polygon points="50,40 100,40 115,110 35,110" fill="rgba(255, 145, 0, 0.2)" stroke="#ff9100" stroke-width="2"/>
                <circle cx="50" cy="40" r="4" fill="#ff3b8b"/>
                <circle cx="100" cy="40" r="4" fill="#ff3b8b"/>
                <circle cx="115" cy="110" r="4" fill="#ff3b8b"/>
                <circle cx="35" cy="110" r="4" fill="#ff3b8b"/>
                <line x1="50" y1="42" x2="100" y2="42" stroke="#ff9100" stroke-width="1" stroke-dasharray="2,2"/>
            </svg>`;
        }

        function renderPentagon(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <polygon points="75,20 120,50 105,105 45,105 30,50" fill="rgba(179, 136, 255, 0.2)" stroke="#b388ff" stroke-width="2"/>
                <circle cx="75" cy="20" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="50" r="4" fill="#ff3b8b"/>
                <circle cx="105" cy="105" r="4" fill="#ff3b8b"/>
                <circle cx="45" cy="105" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="50" r="4" fill="#ff3b8b"/>
            </svg>`;
        }

        function renderHexagon(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <polygon points="75,15 120,40 120,90 75,115 30,90 30,40" fill="rgba(255, 193, 7, 0.2)" stroke="#ffc107" stroke-width="2"/>
                <circle cx="75" cy="15" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="40" r="4" fill="#ff3b8b"/>
                <circle cx="120" cy="90" r="4" fill="#ff3b8b"/>
                <circle cx="75" cy="115" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="90" r="4" fill="#ff3b8b"/>
                <circle cx="30" cy="40" r="4" fill="#ff3b8b"/>
            </svg>`;
        }

        function renderCube(size = 150) {
            return `<svg viewBox="0 0 150 150" width="${size}" height="${size}">
                <g>
                    <polygon points="30,50 70,30 110,50 70,70" fill="rgba(0, 212, 255, 0.3)" stroke="#00d4ff" stroke-width="2"/>
                    <polygon points="30,50 50,90 90,110 70,70" fill="rgba(0, 212, 255, 0.2)" stroke="#00d4ff" stroke-width="2"/>
                    <polygon points="70,70 90,110 110,90 110,50" fill="rgba(0, 212, 255, 0.1)" stroke="#00d4ff" stroke-width="2"/>
                </g>
            </svg>`;
        }

        function getShapeSVG(shapeKey, size = 150) {
            const renderers = {
                triangle: renderTriangle,
                rightTriangle: renderRightTriangle,
                square: renderSquare,
                rectangle: renderRectangle,
                rhombus: renderRhombus,
                trapezoid: renderTrapezoid,
                pentagon: renderPentagon,
                hexagon: renderHexagon,
                cube: renderCube
            };
            return renderers[shapeKey] ? renderers[shapeKey](size) : '';
        }

        // Explore mode rendering
        function renderExploreMode() {
            const content = document.getElementById('workspaceContent');
            const shapes = Object.entries(SHAPES);

            let html = '<div class="shape-gallery">';
            for (const [key, shape] of shapes) {
                html += `
                    <div class="shape-card" data-shape="${key}">
                        <div class="shape-card-svg">${getShapeSVG(key)}</div>
                        <div class="shape-name">${shape.name}</div>
                    </div>
                `;
            }
            html += '</div>';

            content.innerHTML = html;
            document.querySelectorAll('.shape-card').forEach(card => {
                card.addEventListener('click', () => selectShape(card.dataset.shape));
            });

            updateSidePanel();
        }

        function selectShape(shapeKey) {
            if (!S.compareMode) {
                document.querySelectorAll('.shape-card').forEach(c => c.classList.remove('selected'));
                document.querySelector(`[data-shape="${shapeKey}"]`).classList.add('selected');
                S.selectedShapes = [shapeKey];
            } else {
                const card = document.querySelector(`[data-shape="${shapeKey}"]`);
                if (card.classList.contains('selected')) {
                    card.classList.remove('selected');
                    S.compareShapes = S.compareShapes.filter(s => s !== shapeKey);
                } else if (S.compareShapes.length < 2) {
                    card.classList.add('selected');
                    S.compareShapes.push(shapeKey);
                }
            }
            updateSidePanel();
        }

        function updateSidePanel() {
            const panel = document.getElementById('vocabularyPanel');

            if (S.selectedShapes.length > 0 || S.compareShapes.length > 0) {
                const shapes = S.compareMode ? S.compareShapes : S.selectedShapes;
                const shape = SHAPES[shapes[0]];

                let html = '<div class="panel-section">';
                html += '<div class="panel-title">Attributes</div>';
                html += `<div class="attribute"><strong>Sides:</strong> <span class="attribute-value">${shape.sides || 'N/A'}</span></div>`;
                html += `<div class="attribute"><strong>Angles:</strong> <span class="attribute-value">${shape.angles || 'N/A'}</span></div>`;
                if (shape.rightAngles !== undefined) {
                    html += `<div class="attribute"><strong>Right Angles:</strong> <span class="attribute-value">${shape.rightAngles}</span></div>`;
                }
                if (shape.parallelSides !== undefined) {
                    html += `<div class="attribute"><strong>Parallel Sides:</strong> <span class="attribute-value">${shape.parallelSides}</span></div>`;
                }
                if (shape.vertices !== undefined) {
                    html += `<div class="attribute"><strong>Vertices:</strong> <span class="attribute-value">${shape.vertices}</span></div>`;
                }
                if (shape.edges !== undefined) {
                    html += `<div class="attribute"><strong>Edges:</strong> <span class="attribute-value">${shape.edges}</span></div>`;
                }
                if (shape.faces !== undefined) {
                    html += `<div class="attribute"><strong>Faces:</strong> <span class="attribute-value">${shape.faces}</span></div>`;
                }
                html += '</div>';

                if (S.compareMode && S.compareShapes.length === 2) {
                    html += '<div class="panel-section">';
                    html += '<div class="panel-title">Comparison</div>';
                    const shape2 = SHAPES[S.compareShapes[1]];
                    const sameSides = shape.sides === shape2.sides;
                    html += `<div class="attribute">Same number of sides? <span class="attribute-value">${sameSides ? '✓' : '✗'}</span></div>`;
                    html += '</div>';
                }

                panel.innerHTML = html;
            } else {
                let html = '<div class="panel-section">';
                html += '<div class="panel-title">Math Terms</div>';
                for (const [term, def] of Object.entries(VOCABULARY)) {
                    html += `
                        <div class="vocabulary-item">
                            <div class="vocabulary-term">${term}</div>
                            <div class="vocabulary-def">${def}</div>
                        </div>
                    `;
                }
                html += '</div>';
                panel.innerHTML = html;
            }
        }

        // Practice mode
        function renderPracticeMode() {
            generatePracticeQuestion();
        }

        function generatePracticeQuestion() {
            const questions = [
                generateAttributeQuestion,
                generateNameQuestion,
                generateFaceQuestion
            ];

            const question = questions[Math.floor(Math.random() * questions.length)]();
            renderQuestion(question);
        }

        function generateAttributeQuestion() {
            const shapeKeys = Object.keys(SHAPES);
            const correctShape = shapeKeys[Math.floor(Math.random() * shapeKeys.length)];
            const shape = SHAPES[correctShape];

            const attrs = [];
            if (shape.sides) attrs.push(`${shape.sides} sides`);
            if (shape.rightAngles > 0) attrs.push(`${shape.rightAngles} right angles`);

            return {
                type: 'attribute',
                question: `Pick the shape with ${attrs.join(' and ')}.`,
                correct: correctShape,
                options: getRandomOptions(correctShape, 4)
            };
        }

        function generateNameQuestion() {
            const shapeKeys = Object.keys(SHAPES);
            const correctShape = shapeKeys[Math.floor(Math.random() * shapeKeys.length)];

            return {
                type: 'name',
                question: `What is this shape?`,
                correct: correctShape,
                options: getRandomOptions(correctShape, 4),
                showShape: true
            };
        }

        function generateFaceQuestion() {
            return {
                type: 'faces',
                question: 'How many faces does a cube have?',
                correct: 'cube',
                options: ['cube'],
                answer: 6
            };
        }

        function getRandomOptions(correct, count) {
            const keys = Object.keys(SHAPES).filter(k => k !== correct);
            const shuffled = keys.sort(() => Math.random() - 0.5);
            return [correct, ...shuffled.slice(0, count - 1)].sort(() => Math.random() - 0.5);
        }

        function renderQuestion(question) {
            const content = document.getElementById('workspaceContent');
            let html = '<div class="practice-question">';
            html += `<div class="question-text">${question.question}</div>`;
            html += `<div class="question-meta">Question ${S.questionsAnswered + 1}</div>`;

            if (question.showShape) {
                html += `<div style="text-align: center; margin: 1rem 0;">${getShapeSVG(question.correct, 180)}</div>`;
            }

            html += '<div class="option-grid">';
            for (const opt of question.options) {
                const shape = SHAPES[opt];
                html += `
                    <div class="option" data-option="${opt}">
                        <div class="option-content">
                            <div class="option-svg">${getShapeSVG(opt, 80)}</div>
                            <div class="option-label">${shape.name}</div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            html += '<div class="feedback"></div>';
            html += `<div class="streak">Streak: <span>${S.streak}</span></div>`;

            content.innerHTML = html;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    if (!S.answered) {
                        handlePracticeAnswer(opt.dataset.option, question.correct);
                    }
                });
            });
        }

        function handlePracticeAnswer(selected, correct) {
            S.answered = true;
            const isCorrect = selected === correct;

            if (isCorrect) {
                S.score++;
                S.streak++;
            } else {
                S.streak = 0;
            }
            S.questionsAnswered++;

            document.querySelectorAll('.option').forEach(opt => {
                if (opt.dataset.option === correct) {
                    opt.classList.add('correct');
                }
                if (opt.dataset.option === selected && selected !== correct) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });

            const feedback = document.querySelector('.feedback');
            feedback.classList.add('show');
            if (isCorrect) {
                feedback.classList.add('correct');
                feedback.textContent = '✓ Correct!';
                showFB('✓ Correct!','correct');
            } else {
                feedback.classList.add('incorrect');
                feedback.textContent = '✗ Try again!';
                showFB('Try again!','incorrect');
            }

            setTimeout(() => {
                S.answered = false;
                generatePracticeQuestion();
            }, 1500);
        }

        // Play mode
        function renderPlayMode() {
            const content = document.getElementById('workspaceContent');
            let html = '<div class="play-mode-container">';
            html += `<div class="timer-display" id="timerDisplay">60</div>`;
            html += `<div class="score-display">Score: <span id="scoreDisplay">0</span></div>`;
            html += `<button class="play-button" id="startButton">Start Game</button>`;
            html += '</div>';

            content.innerHTML = html;
            document.getElementById('startButton').addEventListener('click', startPlayMode);
        }

        function startPlayMode() {
            S.gameActive = true;
            S.timeRemaining = 60;
            S.score = 0;
            S.streak = 0;

            document.getElementById('startButton').style.display = 'none';
            generatePlayQuestion();
            startTimer();
        }

        function startTimer() {
            const timer = setInterval(() => {
                S.timeRemaining--;
                const display = document.getElementById('timerDisplay');
                if (display) {
                    display.textContent = S.timeRemaining;
                    display.classList.remove('warning', 'danger');
                    if (S.timeRemaining <= 10) display.classList.add('danger');
                    else if (S.timeRemaining <= 20) display.classList.add('warning');
                }

                if (S.timeRemaining <= 0) {
                    clearInterval(timer);
                    S.gameActive = false;
                    endGame();
                }
            }, 1000);
        }

        function generatePlayQuestion() {
            if (!S.gameActive) return;
            generatePracticeQuestion();
        }

        function endGame() {
            const content = document.getElementById('workspaceContent');
            let html = '<div class="play-mode-container">';
            html += `<div class="score-display">Final Score: <span>${S.score}</span></div>`;
            html += `<div class="streak">Streak: <span>${S.streak}</span></div>`;
            html += `<button class="play-button" id="restartButton">Play Again</button>`;
            html += '</div>';

            content.innerHTML = html;
            document.getElementById('restartButton').addEventListener('click', startPlayMode);
        }

        // Mode switching
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                S.mode = btn.dataset.mode;
                S.selectedShapes = [];
                S.compareShapes = [];
                S.compareMode = false;
                S.answered = false;
                S.gameActive = false;
                S.questionsAnswered = 0;
                S.score = 0;
                S.streak = 0;

                document.getElementById('workspaceHeader').textContent =
                    S.mode === 'explore' ? 'Shape Gallery' :
                    S.mode === 'practice' ? 'Practice Questions' : 'Speed Round';

                if (S.mode === 'explore') renderExploreMode();
                else if (S.mode === 'practice') renderPracticeMode();
                else renderPlayMode();
            });
        });

        // Difficulty selector
        document.getElementById('difficulty').addEventListener('change', (e) => {
            S.difficulty = e.target.value;
            if (S.mode === 'practice') generatePracticeQuestion();
        });

        // Initialize
        renderExploreMode();
    </script>
