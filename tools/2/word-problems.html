<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM — Word Problem Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .vinculum-back-btn {
  display:inline-block;padding:6px 12px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:13px;font-family:inherit;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.vinculum-back-btn:hover { background:var(--card); color:var(--cyan); }
header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .vinculum-header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .vinculum-header-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        .tag {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
            padding: 0.25rem 0.6rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .mode-difficulty {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .pill-group {
            display: flex;
            gap: 0.5rem;
            background: var(--card);
            padding: 0.35rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .pill {
            padding: 0.5rem 1.2rem;
            border: none;
            background: transparent;
            color: var(--text2);
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .pill.active {
            background: var(--card2);
            color: var(--cyan);
            border: 1px solid var(--cyan);
        }

        .pill:hover:not(.active) {
            color: var(--text);
        }

        /* Main Content Area */
        .main-container {
            display: flex;
            flex: 1;
            gap: 0;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .side-panel {
            width: 280px;
            background: var(--card);
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .workspace::-webkit-scrollbar,
        .side-panel::-webkit-scrollbar {
            width: 8px;
        }

        .workspace::-webkit-scrollbar-track,
        .side-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .workspace::-webkit-scrollbar-thumb,
        .side-panel::-webkit-scrollbar-thumb {
            background: var(--muted);
            border-radius: 4px;
        }

        /* Explore Mode */
        .problem-text {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
            position: relative;
        }

        .number-highlight-cyan {
            background: rgba(0, 212, 255, 0.2);
            color: var(--cyan);
            font-weight: 600;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        .number-highlight-pink {
            background: rgba(255, 59, 139, 0.2);
            color: var(--pink);
            font-weight: 600;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        .bar-model-container {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .bar-model-svg {
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        /* Strategy Buttons */
        .strategy-buttons {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .strategy-btn {
            padding: 0.75rem 1.25rem;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text2);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }

        .strategy-btn.active {
            border-color: var(--cyan);
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
        }

        .strategy-btn:hover {
            border-color: var(--text2);
        }

        /* Problem Type Selector */
        .problem-type-selector {
            margin-bottom: 1.5rem;
        }

        .selector-label {
            font-size: 0.9rem;
            color: var(--text2);
            margin-bottom: 0.75rem;
            display: block;
            font-weight: 600;
        }

        .type-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .type-option {
            padding: 0.75rem;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text2);
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .type-option.active {
            border-color: var(--pink);
            background: rgba(255, 59, 139, 0.1);
            color: var(--pink);
        }

        .type-option:hover {
            border-color: var(--text2);
        }

        .equation-display {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--cyan);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* Practice Mode */
        .scaffolding-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .scaffolding-title {
            font-size: 0.95rem;
            color: var(--text2);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .choice-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .choice-btn {
            padding: 0.9rem 1.2rem;
            border: 1.5px solid var(--border);
            background: var(--card2);
            color: var(--text);
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: left;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }

        .choice-btn:hover {
            border-color: var(--cyan);
            background: var(--card);
        }

        .choice-btn.correct {
            animation: greenGlow 0.6s ease;
            border-color: var(--green);
            background: rgba(0, 230, 118, 0.1);
            color: var(--green);
        }

        .choice-btn.incorrect {
            animation: shake 0.4s ease;
            border-color: var(--pink);
            background: rgba(255, 59, 139, 0.1);
        }

        @keyframes greenGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Play Mode */
        .problem-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: var(--card2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--yellow), var(--pink));
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .score-display {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 0.25rem;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .streak-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid var(--yellow);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            color: var(--yellow);
            font-size: 0.9rem;
        }

        /* Side Panel Content */
        .side-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .side-title {
            font-size: 0.85rem;
            color: var(--text2);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .keyword-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .keyword {
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 0.35rem;
            font-size: 0.8rem;
            color: var(--cyan);
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .info-text {
            font-size: 0.8rem;
            color: var(--text2);
            line-height: 1.4;
        }

        .stat-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text2);
        }

        .stat-bar-fill {
            flex: 1;
            height: 6px;
            background: var(--card2);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-bar-progress {
            height: 100%;
            background: var(--cyan);
            transition: width 0.3s ease;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: slideIn 0.4s ease;
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .button-group button {
            flex: 1;
            padding: 0.75rem 1.25rem;
            border: 1.5px solid var(--border);
            background: var(--card2);
            color: var(--text);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .button-group button:hover {
            border-color: var(--cyan);
            background: var(--card);
        }

        .button-group .primary {
            background: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
        }

        .button-group .primary:hover {
            opacity: 0.9;
        }
    
</style>
</head>
<body>

    <header>
        <div class="vinculum-header-left">
            
        <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
        <div>
                <h1 class="vinculum-header-title"><span>VINCULUM</span> Word Problems</h1>
                <span class="badge">2.OA</span>
                <span class="tag">2.OA.A.1</span>
            </div>
        </div>
        <div class="mode-difficulty">
            <div class="pill-group">
                <button class="pill active" data-mode="explore">Explore</button>
                <button class="pill" data-mode="practice">Practice</button>
                <button class="pill" data-mode="play">Play</button>
            </div>
            <div class="pill-group">
                <button class="pill active" data-difficulty="emergent">Emergent</button>
                <button class="pill" data-difficulty="proficient">Proficient</button>
                <button class="pill" data-difficulty="advanced">Advanced</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="workspace" role="main" id="workspace"></div>
        <div class="side-panel" id="sidePanel"></div>
    </div>

<div class="feedback" id="feedback"></div>
    <script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}
        // State management
        const S = {
            mode: 'explore',
            difficulty: 'emergent',
            currentProblemIdx: 0,
            currentProblem: null,
            selectedStrategy: 'bar-model',
            selectedProblemType: null,
            selectedUnknown: null,
            selectedOperation: null,
            score: 0,
            streak: 0,
            timeLeft: 10,
            timerRunning: false,
            playProblems: [],
            practiceFeedback: null,
        };

        // Problem database
        const PROBLEMS = {
            emergent: [
                {
                    id: 1,
                    type: 'add-to',
                    text: 'Sarah has <span class="number-highlight-cyan">12</span> stickers. Her friend gives her <span class="number-highlight-pink">8</span> more stickers. How many stickers does Sarah have now?',
                    numbers: [12, 8],
                    operation: 'add',
                    answer: 20,
                    unknownPosition: 'result',
                    keyWords: ['has', 'gives', 'more', 'now', 'altogether'],
                    barModelType: 'addTo',
                },
                {
                    id: 2,
                    type: 'take-from',
                    text: 'There are <span class="number-highlight-cyan">15</span> apples in a basket. Tom eats <span class="number-highlight-pink">6</span> apples. How many apples are left?',
                    numbers: [15, 6],
                    operation: 'subtract',
                    answer: 9,
                    unknownPosition: 'result',
                    keyWords: ['eats', 'left', 'takes away', 'how many'],
                    barModelType: 'takeFrom',
                },
                {
                    id: 3,
                    type: 'put-together',
                    text: 'There are <span class="number-highlight-cyan">7</span> red balls and <span class="number-highlight-pink">5</span> blue balls. How many balls are there altogether?',
                    numbers: [7, 5],
                    operation: 'add',
                    answer: 12,
                    unknownPosition: 'result',
                    keyWords: ['altogether', 'in all', 'total', 'combined'],
                    barModelType: 'putTogether',
                },
                {
                    id: 4,
                    type: 'compare',
                    text: 'Lisa has <span class="number-highlight-cyan">14</span> pencils. Mark has <span class="number-highlight-pink">9</span> pencils. How many more pencils does Lisa have?',
                    numbers: [14, 9],
                    operation: 'subtract',
                    answer: 5,
                    unknownPosition: 'result',
                    keyWords: ['more', 'fewer', 'less', 'how many more'],
                    barModelType: 'compare',
                },
                {
                    id: 5,
                    type: 'add-to',
                    text: 'There are <span class="number-highlight-cyan">11</span> birds on a tree. <span class="number-highlight-pink">7</span> more birds fly to the tree. How many birds are there now?',
                    numbers: [11, 7],
                    operation: 'add',
                    answer: 18,
                    unknownPosition: 'result',
                    keyWords: ['more', 'fly to', 'now', 'total'],
                    barModelType: 'addTo',
                },
            ],
            proficient: [
                {
                    id: 10,
                    type: 'add-to',
                    text: 'Jenny had some marbles. She won <span class="number-highlight-pink">18</span> more marbles in a game. Now she has <span class="number-highlight-cyan">42</span> marbles. How many marbles did she have at first?',
                    numbers: [18, 42],
                    operation: 'subtract',
                    answer: 24,
                    unknownPosition: 'start',
                    keyWords: ['had some', 'won', 'more', 'now she has', 'at first'],
                    barModelType: 'addTo',
                },
                {
                    id: 11,
                    type: 'take-from',
                    text: 'A store had <span class="number-highlight-cyan">57</span> books. They sold some books. Now there are <span class="number-highlight-pink">34</span> books left. How many books did they sell?',
                    numbers: [57, 34],
                    operation: 'subtract',
                    answer: 23,
                    unknownPosition: 'change',
                    keyWords: ['had', 'sold some', 'left', 'how many did they sell'],
                    barModelType: 'takeFrom',
                },
                {
                    id: 12,
                    type: 'add-to',
                    text: 'Emma had <span class="number-highlight-cyan">8</span> stickers. She got some more stickers. Now she has <span class="number-highlight-pink">14</span> stickers. How many stickers did she get?',
                    numbers: [8, 14],
                    operation: 'subtract',
                    answer: 6,
                    unknownPosition: 'change',
                    keyWords: ['had', 'got some more', 'now she has', 'how many did she get'],
                    barModelType: 'addTo',
                },
                {
                    id: 13,
                    type: 'put-together',
                    text: 'A fruit stand has some oranges and <span class="number-highlight-pink">28</span> lemons. Altogether it has <span class="number-highlight-cyan">63</span> fruits. How many oranges does it have?',
                    numbers: [28, 63],
                    operation: 'subtract',
                    answer: 35,
                    unknownPosition: 'start',
                    keyWords: ['some oranges', 'lemons', 'altogether', 'how many oranges'],
                    barModelType: 'putTogether',
                },
                {
                    id: 14,
                    type: 'take-from',
                    text: 'Sam had <span class="number-highlight-cyan">15</span> marbles. He lost some marbles playing. Now he has <span class="number-highlight-pink">9</span> marbles. How many marbles did he lose?',
                    numbers: [15, 9],
                    operation: 'subtract',
                    answer: 6,
                    unknownPosition: 'change',
                    keyWords: ['had', 'lost some', 'now he has', 'how many did he lose'],
                    barModelType: 'takeFrom',
                },
            ],
            advanced: [
                {
                    id: 20,
                    type: 'two-step-add',
                    text: 'Maya bought <span class="number-highlight-cyan">15</span> stickers on Monday and <span class="number-highlight-pink">12</span> stickers on Tuesday. Then she gave away <span class="number-highlight-cyan">8</span> stickers. How many stickers does she have left?',
                    numbers: [15, 12, 8],
                    operation: 'add-then-subtract',
                    answer: 19,
                    unknownPosition: 'result',
                    keyWords: ['bought', 'gave away', 'left', 'total first'],
                    barModelType: 'twoStep',
                },
                {
                    id: 21,
                    type: 'two-step-subtract',
                    text: 'There are <span class="number-highlight-cyan">50</span> students. Some go to art class and <span class="number-highlight-pink">8</span> go to music class. After both classes start, there are <span class="number-highlight-cyan">30</span> students left in the classroom. How many went to art class?',
                    numbers: [50, 8, 30],
                    operation: 'subtract-twice',
                    answer: 12,
                    unknownPosition: 'change',
                    keyWords: ['some go', 'art class', 'left', 'how many went to art'],
                    barModelType: 'twoStep',
                },
                {
                    id: 22,
                    type: 'two-step-mixed',
                    text: 'A library had some books. They received <span class="number-highlight-pink">22</span> new books. Then someone returned <span class="number-highlight-cyan">5</span> books. Now the library has <span class="number-highlight-cyan">72</span> books total. How many books did the library have at first?',
                    numbers: [22, 5, 72],
                    operation: 'add-then-add',
                    answer: 45,
                    unknownPosition: 'start',
                    keyWords: ['had some', 'received', 'returned', 'now has', 'at first'],
                    barModelType: 'twoStep',
                },
                {
                    id: 23,
                    type: 'two-step-compare',
                    text: 'Team A scored <span class="number-highlight-cyan">28</span> points. Team B scored <span class="number-highlight-pink">15</span> points. How many more points did Team A score than Team C, which scored <span class="number-highlight-cyan">18</span> points?',
                    numbers: [28, 18],
                    operation: 'subtract',
                    answer: 10,
                    unknownPosition: 'result',
                    keyWords: ['scored', 'more than', 'difference', 'how many'],
                    barModelType: 'compare',
                },
                {
                    id: 24,
                    type: 'two-step-add',
                    text: 'In a garden, there are <span class="number-highlight-cyan">34</span> tulips and <span class="number-highlight-pink">26</span> daisies. A gardener plants some more daisies. Now there are <span class="number-highlight-cyan">79</span> flowers in the garden. How many daisies did the gardener plant?',
                    numbers: [34, 26, 79],
                    operation: 'add-then-add',
                    answer: 19,
                    unknownPosition: 'change',
                    keyWords: ['plants some', 'more', 'now there are', 'how many did gardener plant'],
                    barModelType: 'twoStep',
                },
            ],
        };

        // Generate answer choices
        function generateChoices(answer, difficulty) {
            const offset = difficulty === 'emergent' ? 2 : difficulty === 'proficient' ? 5 : 8;
            const choices = [answer];
            choices.push(answer - offset);
            choices.push(answer + offset);
            choices.push(answer - Math.floor(offset / 2));
            return choices.sort(() => Math.random() - 0.5);
        }

        // Load current problem
        function loadProblem() {
            const problems = PROBLEMS[S.difficulty];
            S.currentProblem = problems[S.currentProblemIdx % problems.length];
        }

        // Render bar model SVG
        function renderBarModel(problem) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 500 300');
            svg.setAttribute('class', 'bar-model-svg');

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            style.textContent = `
                .bar { fill-opacity: 0.8; stroke-width: 2; }
                .bar-label { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 600; }
                .bar-part-label { font-family: 'Inter'; font-size: 12px; }
                .bar-unknown { stroke-dasharray: 4,4; fill-opacity: 0.4; }
            `;
            defs.appendChild(style);
            svg.appendChild(defs);

            const barModelType = problem.barModelType || 'addTo';

            switch (barModelType) {
                case 'addTo':
                case 'takeFrom':
                    renderAddToModel(svg, problem);
                    break;
                case 'putTogether':
                    renderPutTogetherModel(svg, problem);
                    break;
                case 'compare':
                    renderCompareModel(svg, problem);
                    break;
                case 'twoStep':
                    renderTwoStepModel(svg, problem);
                    break;
            }

            return svg;
        }

        function renderAddToModel(svg, problem) {
            const unknownPos = problem.unknownPosition || 'result';
            let num1, num2, total;

            // Determine which numbers to use based on unknown position
            if (unknownPos === 'result') {
                // Standard: start + change = result (unknown result)
                num1 = problem.numbers[0];
                num2 = problem.numbers[1];
                total = num1 + num2;
            } else if (unknownPos === 'change') {
                // Unknown change: start + ? = total
                total = problem.numbers[1];
                num1 = problem.numbers[0];
                num2 = total - num1;
            } else if (unknownPos === 'start') {
                // Unknown start: ? + change = total
                total = problem.numbers[1];
                num2 = problem.numbers[0];
                num1 = total - num2;

            const scale = 150 / Math.max(num1, num2, total);

        // Render functions
        function renderExplore() {
            const workspace = document.getElementById('workspace');
            workspace.innerHTML = '';

            const container = document.createElement('div');
            container.className = 'animate-in';

            const problemText = document.createElement('div');
            problemText.className = 'problem-text';
            problemText.innerHTML = S.currentProblem.text;
            container.appendChild(problemText);

            const barContainer = document.createElement('div');
            barContainer.className = 'bar-model-container';
            const barModel = renderBarModel(S.currentProblem);
            barContainer.appendChild(barModel);
            container.appendChild(barContainer);

            const problemTypeSelector = document.createElement('div');
            problemTypeSelector.className = 'problem-type-selector';

            const selectorLabel = document.createElement('label');
            selectorLabel.className = 'selector-label';
            selectorLabel.textContent = 'Problem Type:';
            problemTypeSelector.appendChild(selectorLabel);

            const typeOptions = document.createElement('div');
            typeOptions.className = 'type-options';

            const types = ['Add-To', 'Take-From', 'Put-Together', 'Compare'];
            const typeValues = ['add-to', 'take-from', 'put-together', 'compare'];

            types.forEach((type, idx) => {
                const btn = document.createElement('button');
                btn.className = 'type-option';
                btn.textContent = type;
                btn.dataset.type = typeValues[idx];
                if (typeValues[idx] === S.currentProblem.type) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.type-option').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    S.selectedProblemType = typeValues[idx];
                    renderSidePanel();
                });
                typeOptions.appendChild(btn);
            });

            problemTypeSelector.appendChild(typeOptions);
            container.appendChild(problemTypeSelector);

            const strategyButtons = document.createElement('div');
            strategyButtons.className = 'strategy-buttons';
            const strategies = [
                { label: 'Bar Model', value: 'bar-model' },
                { label: 'Number Line', value: 'number-line' },
                { label: 'Equation', value: 'equation' },
            ];

            strategies.forEach(strategy => {
                const btn = document.createElement('button');
                btn.className = 'strategy-btn';
                btn.textContent = strategy.label;
                btn.dataset.strategy = strategy.value;
                if (S.selectedStrategy === strategy.value) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    S.selectedStrategy = strategy.value;
                    renderExplore();
                });
                strategyButtons.appendChild(btn);
            });

            container.appendChild(strategyButtons);

            if (S.selectedStrategy === 'equation') {
                const eqContainer = document.createElement('div');
                const unknownPos = S.currentProblem.unknownPosition || 'result';
                const eqDisplay = document.createElement('div');
                eqDisplay.className = 'equation-display';

                // Build equation based on unknown position
                let eqText = '';
                if (unknownPos === 'result') {
                    const num1 = S.currentProblem.numbers[0];
                    const num2 = S.currentProblem.numbers[1];
                    const op = S.currentProblem.operation === 'add' ? '+' : '-';
                    eqText = `${num1} ${op} ${num2} = ?`;
                } else if (unknownPos === 'change') {
                    const num1 = S.currentProblem.numbers[0];
                    const total = S.currentProblem.numbers[1];
                    const op = S.currentProblem.operation === 'add' ? '+' : '-';
                    eqText = `${num1} ${op} ? = ${total}`;
                } else if (unknownPos === 'start') {
                    const num2 = S.currentProblem.numbers[0];
                    const total = S.currentProblem.numbers[1];
                    const op = S.currentProblem.operation === 'add' ? '+' : '-';
                    eqText = `? ${op} ${num2} = ${total}`;
                }

                eqDisplay.textContent = eqText;
                eqContainer.appendChild(eqDisplay);
                container.appendChild(eqContainer);
            }

            workspace.appendChild(container);
            renderSidePanel();
        }

                    });
                    choices.appendChild(btn);
                });

                section.appendChild(choices);
                container.appendChild(section);
            }

            // Step 2: Add or subtract
            if (scaffoldingStep === 2 && S.selectedUnknown !== null) {
                const section = document.createElement('div');
                section.className = 'scaffolding-section animate-in';

                const title = document.createElement('div');
                title.className = 'scaffolding-title';
                title.textContent = '2. Add or subtract?';
                section.appendChild(title);

                const choices = document.createElement('div');
                choices.className = 'choice-group';

                const operations = ['Add (+)', 'Subtract (-)'];
                operations.forEach((op, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = op;
                    btn.addEventListener('click', () => {
                        S.selectedOperation = idx === 0 ? 'add' : 'subtract';
                        renderPractice();
                    });
                    choices.appendChild(btn);
                });

                section.appendChild(choices);
                container.appendChild(section);
            }

            // Step 3: Solve
            if (scaffoldingStep === 3 && S.selectedOperation !== null) {
                const section = document.createElement('div');
                section.className = 'scaffolding-section animate-in';

                const title = document.createElement('div');
                title.className = 'scaffolding-title';
                title.textContent = '3. Solve it!';
                section.appendChild(title);

                const choices = document.createElement('div');
                choices.className = 'choice-group';

                const answerChoices = generateChoices(S.currentProblem.answer, S.difficulty);
                answerChoices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice;

                    btn.addEventListener('click', () => {
                        if (choice === S.currentProblem.answer) {
                            btn.classList.add('correct');
                            S.practiceFeedback = 'correct';
                            showFB('✓ Correct!','correct');
                            setTimeout(() => {
                                S.currentProblemIdx++;
                                S.selectedUnknown = null;
                                S.selectedOperation = null;
                                S.practiceFeedback = null;
                                renderPractice();
                            }, 1500);
                        } else {
                            btn.classList.add('incorrect');
                            S.practiceFeedback = 'incorrect';
                            showFB('Try again!','incorrect');
                            setTimeout(() => {
                                S.practiceFeedback = null;
                                renderPractice();
                            }, 800);
                        }
                    });
                    choices.appendChild(btn);
                });

                section.appendChild(choices);
                container.appendChild(section);

                if (S.practiceFeedback === 'incorrect') {
                    const hint = document.createElement('div');
                    hint.style.cssText = `
                        background: rgba(255, 59, 139, 0.1);
                        border: 1px solid #ff3b8b;
                        padding: 1rem;
                        border-radius: 0.5rem;
                        color: #ff3b8b;
                        font-size: 0.9rem;
                        margin-top: 1rem;
                    `;
                    hint.textContent = `Hint: Try using the bar model to count the parts.`;
                    container.appendChild(hint);
                }
            }

            workspace.appendChild(container);
            renderSidePanel();
        }

        function renderPlay() {
            const workspace = document.getElementById('workspace');
            workspace.innerHTML = '';

            if (S.playProblems.length === 0) {
                S.playProblems = [...PROBLEMS[S.difficulty]].sort(() => Math.random() - 0.5);
            }

            const problem = S.playProblems[0];

            const container = document.createElement('div');
            container.className = 'animate-in';

            // Timer bar
            const timerBar = document.createElement('div');
            timerBar.className = 'timer-bar';
            const timerFill = document.createElement('div');
            timerFill.className = 'timer-fill';
            timerFill.style.width = (S.timeLeft / 10) * 100 + '%';
            timerBar.appendChild(timerFill);
            container.appendChild(timerBar);

            // Score display
            const scoreDisplay = document.createElement('div');
            scoreDisplay.className = 'score-display';

            const scoreItem = document.createElement('div');
            scoreItem.className = 'score-item';
            const scoreLabel = document.createElement('div');
            scoreLabel.className = 'score-label';
            scoreLabel.textContent = 'Score';
            scoreItem.appendChild(scoreLabel);
            const scoreValue = document.createElement('div');
            scoreValue.className = 'score-value';
            scoreValue.textContent = S.score;
            scoreItem.appendChild(scoreValue);
            scoreDisplay.appendChild(scoreItem);

            const streakItem = document.createElement('div');
            streakItem.className = 'streak-indicator';
            streakItem.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><path d="M12 23c-4.97 0-8-3.58-8-7.5 0-3.07 2.17-5.84 4.5-7.5-.28 2.5 1.5 4.5 1.5 4.5s2-2.5 2-5.5c0-1.5-.5-3-1-4 3 1.5 5 4 5 7 0 .5-.08 1-.08 1s1.08-1.18 1.58-2.5C19.78 11.72 20 14.5 20 15.5c0 3.92-3.03 7.5-8 7.5z"/></svg> Streak: ${S.streak}`;
            scoreDisplay.appendChild(streakItem);

            container.appendChild(scoreDisplay);

            // Problem
            const problemCard = document.createElement('div');
            problemCard.className = 'problem-card';
            problemCard.innerHTML = problem.text;
            container.appendChild(problemCard);

            // Answers
            const choices = document.createElement('div');
            choices.className = 'choice-group';

            const answerChoices = generateChoices(problem.answer, S.difficulty);
            answerChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;

                btn.addEventListener('click', () => {
                    if (choice === problem.answer) {
                        btn.classList.add('correct');
                        showFB('✓ Correct!','correct');
                        S.score += 10;
                        S.streak++;
                        setTimeout(() => {
                            S.timeLeft = 10;
                            S.playProblems.shift();
                            if (S.playProblems.length === 0) {
                                S.playProblems = [...PROBLEMS[S.difficulty]].sort(() => Math.random() - 0.5);
                            }
                            renderPlay();
                        }, 1000);
                    } else {
                        btn.classList.add('incorrect');
                        showFB('Try again!','incorrect');
                        S.streak = 0;
                        setTimeout(() => {
                            S.timeLeft = 10;
                            S.playProblems.shift();
                            if (S.playProblems.length === 0) {
                                S.playProblems = [...PROBLEMS[S.difficulty]].sort(() => Math.random() - 0.5);
                            }
                            renderPlay();
                        }, 1500);
                    }
                });
                choices.appendChild(btn);
            });

            container.appendChild(choices);
            workspace.appendChild(container);

            // Timer
            if (!S.timerRunning) {
                S.timerRunning = true;
                const timerInterval = setInterval(() => {
                    S.timeLeft--;
                    if (S.timeLeft <= 0) {
                        clearInterval(timerInterval);
                        S.timerRunning = false;
                        S.streak = 0;
                        S.timeLeft = 10;
                        S.playProblems.shift();
                        if (S.playProblems.length === 0) {
                            S.playProblems = [...PROBLEMS[S.difficulty]].sort(() => Math.random() - 0.5);
                        }
                        renderPlay();
                    } else {
                        renderPlay();
                    }
                }, 1000);
            }

            renderSidePanel();
        }

        function renderSidePanel() {
            const sidePanel = document.getElementById('sidePanel');
            sidePanel.innerHTML = '';

            const section = document.createElement('div');
            section.className = 'side-section';

            const title = document.createElement('div');
            title.className = 'side-title';
            title.textContent = 'Problem Type';
            section.appendChild(title);

            const typeInfo = document.createElement('div');
            typeInfo.className = 'info-text';

            const problemType = S.selectedProblemType || S.currentProblem.type;
            const typeDescriptions = {
                'add-to': 'Start with an amount. Add more. Find the total.',
                'take-from': 'Start with an amount. Take away some. Find what is left.',
                'put-together': 'Two groups. Combine them. Find the total.',
                'compare': 'Compare two amounts. Find the difference.',
                'two-step-add': 'Multiple steps using addition.',
            };

            typeInfo.textContent = typeDescriptions[problemType] || 'Solve this word problem.';
            section.appendChild(typeInfo);

            sidePanel.appendChild(section);

            // Key words section
            const keywordSection = document.createElement('div');
            keywordSection.className = 'side-section';

            const keywordTitle = document.createElement('div');
            keywordTitle.className = 'side-title';
            keywordTitle.textContent = 'Key Words';
            keywordSection.appendChild(keywordTitle);

            const keywordList = document.createElement('div');
            keywordList.className = 'keyword-list';

            S.currentProblem.keyWords.forEach(word => {
                const keyword = document.createElement('div');
                keyword.className = 'keyword';
                keyword.textContent = word;
                keywordList.appendChild(keyword);
            });

            keywordSection.appendChild(keywordList);
            sidePanel.appendChild(keywordSection);

            // Stats section (for practice mode)
            if (S.mode === 'practice') {
                const statsSection = document.createElement('div');
                statsSection.className = 'side-section';

                const statsTitle = document.createElement('div');
                statsTitle.className = 'side-title';
                statsTitle.textContent = 'Scaffolding';
                statsSection.appendChild(statsTitle);

                const steps = ['Find unknown', 'Choose operation', 'Solve'];
                const progress = (S.selectedUnknown !== null ? 1 : 0) + (S.selectedOperation !== null ? 1 : 0);

                steps.forEach((step, idx) => {
                    const bar = document.createElement('div');
                    bar.className = 'stat-bar';

                    const label = document.createElement('div');
                    label.style.fontSize = '0.75rem';
                    label.textContent = step;

                    const barFill = document.createElement('div');
                    barFill.className = 'stat-bar-fill';
                    const progress_el = document.createElement('div');
                    progress_el.className = 'stat-bar-progress';
                    progress_el.style.width = (idx < progress ? 100 : 0) + '%';
                    barFill.appendChild(progress_el);

                    bar.appendChild(label);
                    bar.appendChild(barFill);
                    statsSection.appendChild(bar);
                });

                sidePanel.appendChild(statsSection);
            }
        }

        function render() {
            loadProblem();

            switch (S.mode) {
                case 'explore':
                    renderExplore();
                    break;
                case 'practice':
                    renderPractice();
                    break;
                case 'play':
                    renderPlay();
                    break;
            }
        }

        // Event listeners
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('pill')) {
                const mode = e.target.dataset.mode;
                const difficulty = e.target.dataset.difficulty;

                if (mode) {
                    document.querySelectorAll('.pill-group:first-child .pill').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    S.mode = mode;
                    S.currentProblemIdx = 0;
                    S.selectedUnknown = null;
                    S.selectedOperation = null;
                    S.selectedStrategy = 'bar-model';
                    S.timerRunning = false;
                    S.playProblems = [];
                    S.timeLeft = 10;
                    S.score = 0;
                    S.streak = 0;
                    render();
                }

                if (difficulty) {
                    document.querySelectorAll('.pill-group:last-child .pill').forEach(p => p.classList.remove('active'));
                    e.target.classList.add('active');
                    S.difficulty = difficulty;
                    S.currentProblemIdx = 0;
                    S.selectedUnknown = null;
                    S.selectedOperation = null;
                    S.timerRunning = false;
                    S.playProblems = [];
                    render();
                }
            }
        });

        // Initial render
        render();
    </script>
