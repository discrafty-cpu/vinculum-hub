<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM - Fluency to 20</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .vinculum-back-btn {
  display:inline-block;padding:6px 12px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:13px;font-family:inherit;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.vinculum-back-btn:hover { background:var(--card); color:var(--cyan); }
header {
            padding: 20px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .vinculum-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .badge {
            display: inline-block;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--cyan);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--cyan);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text2);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn:hover {
            background: var(--card);
            color: var(--text);
        }

        .tab-btn.active {
            background: var(--card);
            color: var(--cyan);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--cyan);
        }

        /* ===== DIFFICULTY SELECTOR ===== */
        .difficulty-selector {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
        }

        .difficulty-label {
            font-size: 12px;
            color: var(--text2);
            font-weight: 600;
        }

        .difficulty-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .difficulty-btn.active {
            background: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
        }

        .difficulty-btn:hover {
            border-color: var(--cyan);
        }

        /* ===== MAIN LAYOUT ===== */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow-y: auto;
        }

        .panel {
            width: 280px;
            background: var(--card);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ===== EXPLORE MODE ===== */
        .strategy-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .strategy-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-align: left;
        }

        .strategy-btn:hover {
            background: var(--card);
            border-color: var(--cyan);
        }

        .strategy-btn.active {
            background: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
        }

        /* ===== VISUALIZATIONS ===== */
        .visualization {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-bottom: 40px;
        }

        .ten-frame-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ten-frame {
            display: grid;
            grid-template-columns: repeat(5, 24px);
            grid-template-rows: repeat(2, 24px);
            gap: 6px;
            background: var(--card);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg2);
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .dot.filled {
            background: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }

        .dot.filled.second {
            background: var(--pink);
            border-color: var(--pink);
            box-shadow: 0 0 8px rgba(255, 59, 139, 0.6);
        }

        .equation-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 600;
            color: var(--cyan);
            text-align: center;
            min-height: 48px;
        }

        .number-line {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            min-width: 400px;
            position: relative;
        }

        .number-line-tick {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--text2);
            padding: 0 4px;
        }

        .number-line-tick.highlight {
            color: var(--cyan);
            font-weight: 600;
        }

        .hop {
            position: absolute;
            height: 2px;
            background: var(--pink);
            top: -8px;
        }

        .doubles-visual {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .block-group {
            display: flex;
            gap: 4px;
        }

        .block {
            width: 24px;
            height: 32px;
            background: var(--cyan);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .block.mirror {
            background: var(--pink);
        }

        /* ===== PRACTICE MODE ===== */
        .problem-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 64px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 40px;
            text-align: center;
        }

        .answer-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 400px;
            width: 100%;
        }

        .answer-btn {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 20px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .answer-btn:hover {
            border-color: var(--cyan);
            background: var(--card2);
        }

        .answer-btn.correct {
            background: var(--green);
            border-color: var(--green);
            color: var(--bg);
        }

        .answer-btn.incorrect {
            background: var(--pink);
            border-color: var(--pink);
            color: var(--bg);
        }

        .feedback {
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            min-height: 24px;
        }

        .feedback.correct {
            color: var(--green);
        }

        .feedback.incorrect {
            color: var(--pink);
        }

        /* ===== PLAY MODE ===== */
        .timer-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 20px;
        }

        .timer-display.warning {
            color: var(--orange);
        }

        .timer-display.critical {
            color: var(--pink);
        }

        .score-display {
            font-size: 32px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 20px;
        }

        .start-btn {
            background: var(--cyan);
            border: none;
            color: var(--bg);
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .start-btn:hover {
            background: var(--green);
            transform: scale(1.05);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--card2);
            border-radius: 6px;
            font-size: 13px;
        }

        .stat-label {
            color: var(--text2);
        }

        .stat-value {
            font-weight: 600;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== PANEL ===== */
        .panel-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hint-box {
            background: var(--card2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--cyan);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text2);
        }

        .hint-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--cyan);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 100%;
        }

        .hint-btn:hover {
            background: var(--card);
            border-color: var(--cyan);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slide {
            from { transform: translateX(0); }
            to { transform: translateX(var(--distance, 0)); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .dot.animate {
            animation: bounce 0.4s ease;
        }

        .block.animate {
            animation: pulse 0.3s ease;
        }

        /* ===== SCROLLABLE ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }
    
</style>
</head>
<body>

    <header>
        <div class="vinculum-header-left">
            
        <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
        <div class="logo"><span>VINCULUM</span> Fluency to 20</div>
            <div class="badge">2.OA</div>
            <div class="tags">
                <div class="tag">2.OA.B.2</div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-mode="explore">Explore</button>
        <button class="tab-btn" data-mode="practice">Practice</button>
        <button class="tab-btn" data-mode="play">Play</button>
        <div class="difficulty-selector" id="difficultySelector" style="display: none;">
            <span class="difficulty-label">Difficulty:</span>
            <button class="difficulty-btn active" data-difficulty="emergent">Emergent</button>
            <button class="difficulty-btn" data-difficulty="proficient">Proficient</button>
            <button class="difficulty-btn" data-difficulty="advanced">Advanced</button>
        </div>
    </div>

    <div class="container">
        <div class="workspace" role="main" id="workspace"></div>
        <div class="panel" id="panel"></div>
    </div>

<div class="feedback" id="feedback"></div>
    <script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}
        const S = {
            mode: 'explore',
            difficulty: 'emergent',
            strategy: 'make10',

            // Explore state
            currentProblem: { a: 8, b: 5 },

            // Practice state
            practiceProblems: [],
            practiceIndex: 0,
            practiceScore: 0,
            practiceTotal: 0,
            showFeedback: false,
            feedbackMessage: '',

            // Play state
            playStartTime: null,
            playTimeRemaining: 60,
            playScore: 0,
            playBest: localStorage.getItem('vinculum_best') ? parseInt(localStorage.getItem('vinculum_best')) : 0,
            playActive: false,
            playProblems: [],
            playIndex: 0
        };

        // Generate problems based on difficulty
        function generateProblems(difficulty, count = 10) {
            const problems = [];
            if (difficulty === 'emergent') {
                // Within 10, addition only
                for (let i = 0; i < count; i++) {
                    const a = Math.floor(Math.random() * 8) + 1;
                    const b = Math.floor(Math.random() * (10 - a)) + 1;
                    problems.push({ a, b, op: '+' });
                }
            } else if (difficulty === 'proficient') {
                // Within 20, addition and subtraction
                for (let i = 0; i < count; i++) {
                    const op = Math.random() > 0.5 ? '+' : '-';
                    if (op === '+') {
                        const a = Math.floor(Math.random() * 15) + 1;
                        const b = Math.floor(Math.random() * (20 - a)) + 1;
                        problems.push({ a, b, op });
                    } else {
                        const a = Math.floor(Math.random() * 15) + 6;
                        const b = Math.floor(Math.random() * a) + 1;
                        problems.push({ a, b, op });
                    }
                }
            } else {
                // Advanced: within 20, fast pace
                for (let i = 0; i < count; i++) {
                    const op = Math.random() > 0.5 ? '+' : '-';
                    if (op === '+') {
                        const a = Math.floor(Math.random() * 18) + 2;
                        const b = Math.floor(Math.random() * (20 - a)) + 1;
                        problems.push({ a, b, op });
                    } else {
                        const a = Math.floor(Math.random() * 18) + 2;
                        const b = Math.floor(Math.random() * a) + 1;
                        problems.push({ a, b, op });
                    }
                }
            }
            return problems;
        }

        // Explore mode visualizations
        function renderTenFrame(num) {
            const dots = [];
            for (let i = 0; i < 10; i++) {
                const filled = i < num;
                dots.push(`<div class="dot ${filled ? 'filled' : ''}"></div>`);
            }
            return dots.join('');
        }

        function renderMakeATen(a, b) {
            const total = a + b;
            const remaining = total - 10;

            let html = '<div class="visualization">';
            html += '<div class="ten-frame-container">';
            html += '<div style="font-size: 13px; color: var(--text2);">' + a + '</div>';
            html += '<div class="ten-frame">' + renderTenFrame(a) + '</div>';
            html += '</div>';

            html += '<div class="ten-frame-container">';
            html += '<div style="font-size: 13px; color: var(--text2);">' + b + '</div>';
            html += '<div class="ten-frame">' + renderTenFrame(b) + '</div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="equation-display">' + a + ' + ' + b + ' = 10 + ' + remaining + ' = ' + total + '</div>';
            return html;
        }

        function renderDecompose(a, b) {
            let html = '<div class="visualization" style="flex-direction: column;">';
            html += '<div style="font-size: 14px; color: var(--text2); margin-bottom: 20px;">Decompose: ' + a + ' − ' + b + '</div>';

            // Find how much to subtract to get to 10
            const step1 = a - 10;
            const step2 = b - step1;

            html += '<div class="equation-display">' + a + ' − ' + step1 + ' − ' + step2 + ' = ' + (a - b) + '</div>';
            html += '<div style="font-size: 13px; color: var(--text2); margin-top: 20px;">Step 1: ' + a + ' − ' + step1 + ' = 10</div>';
            html += '<div style="font-size: 13px; color: var(--text2);">Step 2: 10 − ' + step2 + ' = ' + (a - b) + '</div>';
            html += '</div>';
            return html;
        }

        function renderDoubles(num) {
            const blocks = [];
            for (let i = 0; i < num; i++) {
                blocks.push('<div class="block"></div>');
            }
            for (let i = 0; i < num; i++) {
                blocks.push('<div class="block mirror"></div>');
            }

            let html = '<div class="visualization">';
            html += '<div class="doubles-visual">';
            html += '<div class="block-group">' + blocks.slice(0, num).join('') + '</div>';
            html += '<div class="block-group">' + blocks.slice(num).join('') + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="equation-display">' + num + ' + ' + num + ' = ' + (num * 2) + '</div>';
            return html;
        }

        function renderCountOn(a, b, direction = 'up') {
            let html = '<div class="visualization" style="flex-direction: column;">';
            html += '<div style="font-size: 14px; color: var(--text2); margin-bottom: 20px;">Count ' + (direction === 'up' ? 'On' : 'Back') + ': ' + a + ' ' + (direction === 'up' ? '+' : '−') + ' ' + b + '</div>';

            let steps = [];
            for (let i = 0; i <= b; i++) {
                steps.push(direction === 'up' ? (a + i) : (a - i));
            }

            html += '<div class="equation-display">' + a + ' → ' + steps.join(' → ') + ' = ' + steps[steps.length - 1] + '</div>';
            html += '</div>';
            return html;
        }

        // Render explore mode
        function renderExplore() {
            const p = S.currentProblem;
            let visualization = '';

            switch (S.strategy) {
                case 'make10':
                    visualization = renderMakeATen(p.a, p.b);
                    break;
                case 'decompose':
                    visualization = renderDecompose(p.a, p.b);
                    break;
                case 'doubles':
                    visualization = renderDoubles(Math.min(p.a, 10));
                    break;
                case 'counton':
                    visualization = renderCountOn(p.a, p.b);
                    break;
            }

            let panel = '<div class="panel-title">Strategy</div>';
            panel += '<div class="strategy-selector">';

            const strategies = [
                { id: 'make10', label: 'Make a 10' },
                { id: 'decompose', label: 'Decompose' },
                { id: 'doubles', label: 'Doubles' },
                { id: 'counton', label: 'Count On/Back' }
            ];

            strategies.forEach(s => {
                panel += `<button class="strategy-btn ${S.strategy === s.id ? 'active' : ''}" onclick="changeStrategy('${s.id}')">${s.label}</button>`;
            });

            panel += '</div>';
            panel += '<div class="panel-title" style="margin-top: 20px;">Problem</div>';
            panel += '<div class="hint-box">';
            panel += `Try: ${p.a} + ${p.b}`;
            panel += '</div>';

            return { workspace: visualization, panel };
        }

        // Render practice mode
        function renderPractice() {
            if (S.practiceProblems.length === 0) {
                S.practiceProblems = generateProblems(S.difficulty, 20);
                S.practiceIndex = 0;
                S.practiceScore = 0;
                S.practiceTotal = 0;
            }

            const problem = S.practiceProblems[S.practiceIndex];
            const answer = problem.op === '+' ? problem.a + problem.b : problem.a - problem.b;

            // Generate 4 answer choices
            const choices = [answer];
            while (choices.length < 4) {
                const wrong = answer + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
                if (!choices.includes(wrong) && wrong >= 0 && wrong <= 20) {
                    choices.push(wrong);
                }
            }
            choices.sort(() => Math.random() - 0.5);

            let workspace = '<div style="text-align: center; width: 100%;">';
            workspace += `<div class="problem-display">${problem.a} ${problem.op} ${problem.b}</div>`;
            workspace += '<div class="answer-buttons">';

            choices.forEach(choice => {
                const isCorrect = choice === answer;
                const isSelected = S.showFeedback && (choice === answer || (choice !== answer && S.lastSelected === choice));
                let btnClass = 'answer-btn';
                if (S.showFeedback) {
                    if (choice === answer) btnClass += ' correct';
                    else if (choice === S.lastSelected && choice !== answer) btnClass += ' incorrect';
                }

                workspace += `<button class="${btnClass}" onclick="selectAnswer(${choice}, ${answer})" ${S.showFeedback ? 'disabled' : ''}>${choice}</button>`;
            });

            workspace += '</div>';
            if (S.showFeedback) {
                workspace += `<div class="feedback ${S.lastSelected === answer ? 'correct' : 'incorrect'}">${S.feedbackMessage}</div>`;
            }
            workspace += '</div>';

            let panel = '<div class="panel-title">Progress</div>';
            panel += '<div class="stat-row">';
            panel += '<span class="stat-label">Correct</span>';
            panel += `<span class="stat-value">${S.practiceScore}/${S.practiceIndex}</span>`;
            panel += '</div>';
            panel += '<div style="height: 1px; background: var(--border); margin: 10px 0;"></div>';
            panel += '<div class="panel-title">Hint</div>';
            panel += '<button class="hint-btn" onclick="showPracticeHint()">Show Strategy</button>';

            return { workspace, panel };
        }

        // Render play mode
        function renderPlay() {
            if (!S.playActive) {
                let workspace = '<div style="text-align: center;">';
                workspace += '<h2 style="font-size: 32px; margin-bottom: 20px;">Beat the Clock</h2>';
                workspace += '<p style="font-size: 16px; color: var(--text2); margin-bottom: 40px;">60 seconds, as many correct as you can get!</p>';
                workspace += '<button class="start-btn" onclick="startPlay()">Start Game</button>';
                workspace += '</div>';

                let panel = '<div class="panel-title">Personal Best</div>';
                panel += '<div class="stat-row">';
                panel += '<span class="stat-value" style="font-size: 24px;">' + S.playBest + '</span>';
                panel += '</div>';

                return { workspace, panel };
            }

            if (S.playProblems.length === 0) {
                S.playProblems = generateProblems(S.difficulty, 30);
            }

            const problem = S.playProblems[S.playIndex];
            const answer = problem.op === '+' ? problem.a + problem.b : problem.a - problem.b;

            const choices = [answer];
            while (choices.length < 4) {
                const wrong = answer + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
                if (!choices.includes(wrong) && wrong >= 0 && wrong <= 20) {
                    choices.push(wrong);
                }
            }
            choices.sort(() => Math.random() - 0.5);

            let workspace = '<div style="text-align: center; width: 100%;">';
            workspace += `<div class="timer-display ${S.playTimeRemaining <= 10 ? S.playTimeRemaining <= 5 ? 'critical' : 'warning' : ''}">${S.playTimeRemaining}s</div>`;
            workspace += `<div class="score-display">${S.playScore}</div>`;
            workspace += `<div class="problem-display">${problem.a} ${problem.op} ${problem.b}</div>`;
            workspace += '<div class="answer-buttons">';

            choices.forEach(choice => {
                workspace += `<button class="answer-btn" onclick="selectPlayAnswer(${choice}, ${answer})">${choice}</button>`;
            });

            workspace += '</div></div>';

            let panel = '<div class="panel-title">Session Stats</div>';
            panel += '<div class="stat-row">';
            panel += '<span class="stat-label">Score</span>';
            panel += `<span class="stat-value">${S.playScore}</span>`;
            panel += '</div>';
            panel += '<div class="stat-row">';
            panel += '<span class="stat-label">Best</span>';
            panel += `<span class="stat-value">${S.playBest}</span>`;
            panel += '</div>';

            return { workspace, panel };
        }

        // Main render function
        function render() {
            const ws = document.getElementById('workspace');
            const pan = document.getElementById('panel');

            let content = { workspace: '', panel: '' };

            switch (S.mode) {
                case 'explore':
                    content = renderExplore();
                    break;
                case 'practice':
                    content = renderPractice();
                    break;
                case 'play':
                    content = renderPlay();
                    break;
            }

            ws.innerHTML = content.workspace;
            pan.innerHTML = content.panel;
        }

        // Event handlers
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                S.mode = e.target.dataset.mode;
                document.getElementById('difficultySelector').style.display =
                    S.mode === 'practice' || S.mode === 'play' ? 'flex' : 'none';
                S.showFeedback = false;
                render();
            });
        });

        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                S.difficulty = e.target.dataset.difficulty;
                S.practiceProblems = [];
                S.playProblems = [];
                S.showFeedback = false;
                render();
            });
        });

        // Explore functions
        function changeStrategy(strategy) {
            S.strategy = strategy;
            render();
        }

        // Practice functions
        function selectAnswer(choice, correct) {
            S.lastSelected = choice;
            S.showFeedback = true;
            if (choice === correct) {
                S.practiceScore++;
                S.feedbackMessage = 'Correct! Great work!';
                showFB('✓ Correct!','correct');
            } else {
                S.feedbackMessage = `Not quite. The answer is ${correct}.`;
                showFB('Try again!','incorrect');
            }
            S.practiceTotal++;
            render();
            setTimeout(() => {
                S.practiceIndex++;
                if (S.practiceIndex >= S.practiceProblems.length) {
                    S.practiceProblems = [];
                }
                S.showFeedback = false;
                render();
            }, 2000);
        }

        function showPracticeHint() {
            alert('Hint: Try using the "Make a 10" strategy or count on from the first number.');
        }

        // Play functions
        function startPlay() {
            S.playActive = true;
            S.playScore = 0;
            S.playIndex = 0;
            S.playTimeRemaining = 60;
            S.playProblems = generateProblems(S.difficulty, 30);
            render();

            const timer = setInterval(() => {
                S.playTimeRemaining--;
                render();
                if (S.playTimeRemaining <= 0) {
                    clearInterval(timer);
                    endPlay();
                }
            }, 1000);
        }

        function selectPlayAnswer(choice, correct) {
            if (choice === correct) {
                showFB('✓ Correct!','correct');
                S.playScore++;
                S.playIndex++;
                if (S.playIndex >= S.playProblems.length) {
                    S.playProblems = generateProblems(S.difficulty, 30);
                    S.playIndex = 0;
                }
                render();
            } else {
                showFB('Try again!','incorrect');
            }
        }

        function endPlay() {
            if (S.playScore > S.playBest) {
                S.playBest = S.playScore;
                localStorage.setItem('vinculum_best', S.playBest);
            }
            S.playActive = false;
            render();
        }

        // Initial render
        render();
    </script>
