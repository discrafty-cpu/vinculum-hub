<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Number Line Operations</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
.vinculum-rtm-btn .rtm-icon{font-size:14px;}
*:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

.main{flex:1;display:flex;overflow:hidden;}
.workspace{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;}
.side-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);padding:20px;overflow-y:auto;flex-shrink:0;}
.panel-section{margin-bottom:20px;}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
.panel-text{font-size:13px;color:var(--text2);line-height:1.6;}

/* ── Equation Display ── */
.equation{display:flex;align-items:center;gap:12px;font-size:36px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.eq-num{padding:8px 16px;border-radius:12px;min-width:56px;text-align:center;}
.eq-a{background:rgba(0,212,255,0.1);color:var(--cyan);}
.eq-op{color:var(--text2);}
.eq-b{background:rgba(255,59,139,0.1);color:var(--pink);}
.eq-eq{color:var(--text2);}
.eq-result{background:rgba(0,230,118,0.1);color:var(--green);min-width:56px;border:2px dashed rgba(0,230,118,0.3);}
.eq-result.revealed{border-style:solid;}

/* ── Number Line SVG ── */
.nl-svg-wrap{width:100%;max-width:850px;}
.nl-svg-wrap svg{width:100%;height:auto;display:block;}

/* ── Input controls ── */
.input-row{display:flex;gap:12px;align-items:center;}
.num-input{width:80px;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;transition:border-color 0.2s;}
.num-input:focus{border-color:var(--cyan);}
.op-select{padding:10px 16px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;cursor:pointer;}

.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{padding:10px 20px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.ctrl-btn:hover{background:var(--card2);color:var(--text);}
.ctrl-btn.primary{background:var(--grad);color:var(--bg);border-color:transparent;}

.answer-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.answer-btn{width:64px;height:64px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.answer-btn:hover{border-color:var(--cyan);transform:scale(1.08);}
.answer-btn.correct-flash{border-color:var(--green);background:rgba(0,230,118,0.15);color:var(--green);}
.answer-btn.incorrect-flash{border-color:var(--pink);background:rgba(255,59,139,0.15);color:var(--pink);}

.score-display{text-align:center;padding:16px;background:var(--card);border-radius:12px;margin-bottom:12px;}
.score-value{font-size:36px;font-weight:900;font-family:'JetBrains Mono',monospace;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.streak-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:8px;}
.streak-fill{height:100%;background:var(--grad);border-radius:3px;transition:width 0.3s;}

.instruction-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;font-size:15px;color:var(--text2);font-weight:500;max-width:700px;transition:all 0.3s;}
.instruction-box.highlight-cyan{border-color:var(--cyan);color:var(--cyan);}
.instruction-box.highlight-pink{border-color:var(--pink);color:var(--pink);}
.instruction-box.highlight-green{border-color:var(--green);color:var(--green);}

.feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);padding:24px 48px;border-radius:20px;font-size:28px;font-weight:800;z-index:200;pointer-events:none;transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.3s;opacity:0;}
.feedback.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
.feedback.correct{background:rgba(0,230,118,0.15);color:var(--green);border:2px solid var(--green);}
.feedback.incorrect{background:rgba(255,59,139,0.15);color:var(--pink);border:2px solid var(--pink);}
.feedback.try-again{background:rgba(255,193,7,0.15);color:var(--yellow);border:2px solid var(--yellow);}

/* ── Notation Ledger ── */
.ledger-wrap{max-height:260px;overflow-y:auto;display:flex;flex-direction:column-reverse;}
.ledger-entry{padding:8px;border-bottom:1px solid var(--border);font-size:12px;display:flex;flex-direction:column;gap:4px;}
.ledger-entry:last-child{border-bottom:none;}
.ledger-expr{color:var(--pink);font-family:'JetBrains Mono',monospace;font-weight:600;}
.ledger-eq{color:var(--green);font-family:'JetBrains Mono',monospace;font-weight:700;}
.ledger-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.ledger-empty{color:var(--muted);font-size:12px;font-style:italic;text-align:center;padding:16px 0;}

@keyframes drawIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px currentColor);}50%{filter:drop-shadow(0 0 12px currentColor);}}
.anim{opacity:0;}

::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">&#9664; Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Number Line Operations</div>
    <span class="vinculum-header-badge">2.MD</span>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">2.MD.B.5</span>
    <span class="vinculum-std-tag">2.MD.B.6</span>
    <span class="vinculum-std-tag">2.OA.A.1</span>
    <span class="vinculum-std-tag">MN 2.1.2.2</span>
  </div>
</div>

<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab" id="tabExplore" onclick="setMode('explore')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/></svg> Explore</button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn" id="diffE" onclick="setDiff('emergent')">Within 20</button>
    <button class="vinculum-diff-btn" id="diffP" onclick="setDiff('proficient')">2-Digit</button>
    <button class="vinculum-diff-btn" id="diffA" onclick="setDiff('advanced')">Decompose</button>
  </div>
</div>

<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   VINCULUM — Number Line Operations (Grade 2)
   Addition & Subtraction with Measurement Context
   ════════════════════════════════════════════════════════════ */

let S = {
  mode:'explore', diff:'emergent', maxNL:20,
  a:7, b:5, op:'+',
  phase:'ready',
  clickedA:null, clickedR:null,
  stepCurrent:null, stepsCompleted:[],
  // Jump decomposition for 2-digit
  jumpPlan:[], jumpIdx:0, jumpPos:0,
  // Practice
  pA:0, pB:0, pOp:'+', pAnswer:0,
  pRound:0, pCorrect:0, pTotal:8,
  // Play
  score:0, streak:0, best:0, round:0, total:10,
  playA:0, playB:0, playOp:'+', playAnswer:0, playChoices:[],
  // Notation Ledger
  ledger:[]
};

// ── SVG layout ──
const W=800, PAD_L=40, PAD_R=40, NL_Y=180, ARROW1_Y=125, ARROW2_Y=70, SVG_H=230;
const NL_W=W-PAD_L-PAD_R;
function nx(n,max){return PAD_L+(n/max)*NL_W;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

/* ── Feedback toast ── */
function showFB(msg,type){
  const el=document.getElementById('feedback');
  el.textContent=msg;el.className='feedback '+type+' show';
  clearTimeout(showFB._t);
  showFB._t=setTimeout(()=>{el.className='feedback';},1400);
}

/* ── Notation Ledger ── */
function addLedgerEntry(from,to,op,amt){
  if(from===to)return;
  const opSym=op==='+'?'+':'−';
  const expression=`${from} ${opSym} ${amt}`;
  const equation=`${from} ${opSym} ${amt} = ${to}`;
  S.ledger.push({from,to,op:opSym,amt,expression,equation});
}

function renderLedger(){
  let h='<div class="ledger-wrap">';
  if(S.ledger.length===0){
    h+='<div class="ledger-empty">Moves will appear here as expressions and equations</div>';
  } else {
    S.ledger.forEach((e,i)=>{
      h+=`<div class="ledger-entry">
        <div class="ledger-label">Move ${i+1}</div>
        <div class="ledger-expr" id="ledgerExpr${i}"></div>
        <div class="ledger-eq" id="ledgerEq${i}"></div>
      </div>`;
    });
  }
  h+='</div>';
  return h;
}

function renderLedgerKaTeX(){
  S.ledger.forEach((e,i)=>{
    const exprEl=document.getElementById('ledgerExpr'+i);
    const eqEl=document.getElementById('ledgerEq'+i);
    if(exprEl)katex.render(e.expression,exprEl,{throwOnError:false});
    if(eqEl)katex.render(e.equation,eqEl,{throwOnError:false});
  });
}

/* ── Mode & Difficulty ── */
function setMode(m){
  S.mode=m;resetPhase();
  document.querySelectorAll('.vinculum-mode-tab').forEach(t=>t.className='vinculum-mode-tab');
  document.getElementById('tab'+m.charAt(0).toUpperCase()+m.slice(1)).className='vinculum-mode-tab active-'+m;
  S.round=0;S.score=0;S.streak=0;S.pRound=0;S.pCorrect=0;S.ledger=[];
  if(m==='practice')newPractice();
  if(m==='play')newPlay();
  render();
}

function setDiff(d){
  S.diff=d;
  S.maxNL=d==='emergent'?20:100;
  document.querySelectorAll('.vinculum-diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('diff'+d.charAt(0).toUpperCase()).classList.add('active');
  resetPhase();S.ledger=[];
  if(S.mode==='practice'){S.pRound=0;S.pCorrect=0;newPractice();}
  if(S.mode==='play'){S.round=0;S.score=0;S.streak=0;newPlay();}
  render();
}

function resetPhase(){
  S.phase='ready';S.clickedA=null;S.clickedR=null;S.stepCurrent=null;S.stepsCompleted=[];
  S.jumpPlan=[];S.jumpIdx=0;S.jumpPos=0;
}

/* ── Generate problems by difficulty ── */
function genProblem(diff){
  let a,b,op;
  if(diff==='emergent'){
    op=Math.random()>0.4?'+':'-';
    if(op==='+'){a=rand(1,12);b=rand(1,18-a);}
    else{a=rand(5,18);b=rand(1,a-1);}
  } else if(diff==='proficient'){
    op=Math.random()>0.4?'+':'-';
    if(op==='+'){a=rand(10,60);b=rand(2,9);}
    else{a=rand(15,70);b=rand(2,9);}
  } else {
    op=Math.random()>0.4?'+':'-';
    if(op==='+'){a=rand(10,55);b=rand(11,40);while(a+b>99){b=rand(11,99-a);}}
    else{a=rand(30,90);b=rand(11,a-5);}
  }
  const ans=op==='+'?a+b:a-b;
  return{a,b,op,ans};
}

/* ── Build jump decomposition plan ── */
function buildJumpPlan(a,b,op){
  // For emergent: single jumps of 1
  if(S.diff==='emergent'){
    return Array(b).fill(op==='+'?1:-1);
  }
  // For proficient (1-digit b): jump by ones, but group friendly fives/tens
  if(S.diff==='proficient'){
    if(b<=5)return Array(b).fill(op==='+'?1:-1);
    // Jump to nearest ten first, then rest
    const dir=op==='+'?1:-1;
    const target=op==='+'?a+b:a-b;
    const jumps=[];
    if(b<=9){
      // Single hop for small numbers
      jumps.push(b*dir);
    } else {
      const tens=Math.floor(b/10)*10;
      const ones=b-tens;
      if(tens>0)jumps.push(tens*dir);
      if(ones>0)jumps.push(ones*dir);
    }
    return jumps;
  }
  // For advanced (2-digit b): decompose into tens and ones
  const dir=op==='+'?1:-1;
  const tens=Math.floor(b/10)*10;
  const ones=b%10;
  const jumps=[];
  if(tens>0)jumps.push(tens*dir);
  if(ones>0)jumps.push(ones*dir);
  return jumps;
}

/* ══════════════════════════════════════════
   NUMBER LINE SVG BUILDER
   ══════════════════════════════════════════ */

function buildNL(a,b,op,max,phase,clickedA,clickedR,clickable){
  const result=op==='+'?a+b:a-b;
  let html=`<div class="nl-svg-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${SVG_H}" style="overflow:visible;" id="nlSVG">`;

  // Arrowhead markers
  html+=`<defs>
    <marker id="ahCyan" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><polygon points="0 0,12 5,0 10" fill="#00d4ff"/></marker>
    <marker id="ahPink" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><polygon points="0 0,12 5,0 10" fill="#ff3b8b"/></marker>
    <marker id="ahGreen" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto"><polygon points="0 0,12 5,0 10" fill="#00e676"/></marker>
  </defs>`;

  // Number line base
  html+=`<line x1="${PAD_L}" y1="${NL_Y}" x2="${PAD_L+NL_W}" y2="${NL_Y}" stroke="#2a3654" stroke-width="3" stroke-linecap="round"/>`;

  // Determine tick spacing
  let tickStep=1, labelStep=1;
  if(max<=20){tickStep=1;labelStep=1;}
  else if(max<=50){tickStep=5;labelStep=5;}
  else{tickStep=5;labelStep=10;}

  // Draw ticks
  for(let i=0;i<=max;i+=tickStep){
    const x=nx(i,max);
    const isA=(clickedA===i);
    const isR=(clickedR===i);
    const isMajor=(i%labelStep===0);
    const tickColor=isR?'#00e676':isA?'#00d4ff':'#2a3654';
    const tickH=isMajor?(isA||isR?12:8):(isA||isR?10:5);
    const tickW=(isA||isR)?3:isMajor?2:1;

    html+=`<line x1="${x}" y1="${NL_Y-tickH}" x2="${x}" y2="${NL_Y+tickH}" stroke="${tickColor}" stroke-width="${tickW}"/>`;

    if(isMajor||isA||isR){
      const labelColor=isR?'#00e676':isA?'#00d4ff':'#5a6b8f';
      const labelSize=(isA||isR)?15:12;
      const labelWeight=(isA||isR)?900:600;
      html+=`<text x="${x}" y="${NL_Y+28}" text-anchor="middle" fill="${labelColor}" font-size="${labelSize}" font-weight="${labelWeight}" font-family="JetBrains Mono,monospace">${i}</text>`;
    }
  }

  // Also label A and R even if not on a major tick
  if(clickedA!==null && clickedA%labelStep!==0){
    const x=nx(clickedA,max);
    html+=`<text x="${x}" y="${NL_Y+28}" text-anchor="middle" fill="#00d4ff" font-size="15" font-weight="900" font-family="JetBrains Mono,monospace">${clickedA}</text>`;
  }
  if(clickedR!==null && clickedR%labelStep!==0){
    const x=nx(clickedR,max);
    html+=`<text x="${x}" y="${NL_Y+28}" text-anchor="middle" fill="#00e676" font-size="15" font-weight="900" font-family="JetBrains Mono,monospace">${clickedR}</text>`;
  }

  // Zero dot
  html+=`<circle cx="${nx(0,max)}" cy="${NL_Y}" r="5" fill="#8b9cc0"/>`;

  // ── JUMP ARCHES (decomposed jumps) ──
  if(S.jumpPlan.length>0 && clickedA!==null){
    let pos=clickedA;
    const completedJumps=S.jumpIdx;
    for(let j=0;j<completedJumps;j++){
      const jump=S.jumpPlan[j];
      const nextPos=pos+jump;
      const x1=nx(pos,max);
      const x2=nx(nextPos,max);
      const midX=(x1+x2)/2;
      const arcH=Math.min(50,Math.abs(x2-x1)*0.4+15);
      const arcY=NL_Y-arcH;
      const color=jump>0?'#ff3b8b':'#c084fc';

      // Arc
      html+=`<path d="M${x1},${NL_Y-6} Q${midX},${arcY} ${x2},${NL_Y-6}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" class="anim" style="animation:drawIn 0.4s ${j*0.2}s forwards;"/>`;
      // Jump label
      const labelVal=jump>0?`+${jump}`:`${jump}`;
      html+=`<rect x="${midX-20}" y="${arcY-20}" width="40" height="20" rx="8" fill="rgba(255,59,139,0.12)" stroke="${color}" stroke-width="1.5" class="anim" style="animation:drawIn 0.3s ${j*0.2+0.1}s forwards;"/>`;
      html+=`<text x="${midX}" y="${arcY-6}" text-anchor="middle" fill="${color}" font-size="13" font-weight="800" font-family="JetBrains Mono,monospace" class="anim" style="animation:drawIn 0.3s ${j*0.2+0.1}s forwards;">${labelVal}</text>`;
      // Dot at landing
      html+=`<circle cx="${x2}" cy="${NL_Y}" r="6" fill="${color}" stroke="#0a0e1a" stroke-width="2" class="anim" style="animation:drawIn 0.2s ${j*0.2+0.2}s forwards;"/>`;
      pos=nextPos;
    }
  }

  // ── STEP-THROUGH DOTS (emergent mode one-by-one) ──
  const stepsCompleted=S.stepsCompleted||[];
  if(stepsCompleted.length>0 && clickedA!==null && S.diff==='emergent'){
    stepsCompleted.forEach((tick,idx)=>{
      const sx=nx(tick,max);
      html+=`<circle cx="${sx}" cy="${NL_Y}" r="6" fill="#ff3b8b" stroke="#0a0e1a" stroke-width="1.5" opacity="0.9"><animate attributeName="opacity" values="0;0.9" dur="0.2s" fill="freeze"/></circle>`;
      const prevTick=idx===0?clickedA:stepsCompleted[idx-1];
      const px=nx(prevTick,max);
      const arcMidX=(px+sx)/2;
      const arcY=NL_Y-28;
      html+=`<path d="M${px},${NL_Y-6} Q${arcMidX},${arcY} ${sx},${NL_Y-6}" fill="none" stroke="#ff3b8b" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"><animate attributeName="opacity" values="0;0.5" dur="0.3s" fill="freeze"/></path>`;
    });
  }

  // ── CLICKABLE ZONES ──
  if(clickable){
    // Determine clickable range
    const step=S.diff==='emergent'?1:tickStep;
    for(let i=0;i<=max;i+=step){
      const x=nx(i,max);
      let isExpected=false,isNextStep=false;

      if(S.diff==='emergent'){
        if(phase==='click1'&&i===a)isExpected=true;
        if(phase==='stepping'){
          const dir=op==='+'?1:-1;
          const nextExpected=(S.stepCurrent!==null?S.stepCurrent:clickedA)+dir;
          if(i===nextExpected)isNextStep=true;
          const isOnPath=op==='+'?(i>clickedA&&i<=result):(i<clickedA&&i>=result);
          const isDone=stepsCompleted.includes(i);
          if(isOnPath&&!isDone&&!isNextStep){
            html+=`<circle cx="${x}" cy="${NL_Y}" r="6" fill="none" stroke="#ff3b8b" stroke-width="1.5" opacity="0.2"/>`;
          }
        }
      } else {
        if(phase==='click1'&&i===a)isExpected=true;
        if(phase==='jumping'){
          // Highlight the target of the current jump
          const target=S.jumpPos+S.jumpPlan[S.jumpIdx];
          if(i===target)isNextStep=true;
        }
      }

      if(isExpected){
        const gc=phase==='click1'?'#00d4ff':'#ff3b8b';
        html+=`<circle cx="${x}" cy="${NL_Y}" r="14" fill="none" stroke="${gc}" stroke-width="2" opacity="0.5"><animate attributeName="r" values="12;16;12" dur="1.5s" repeatCount="indefinite"/></circle>`;
      }
      if(isNextStep){
        html+=`<circle cx="${x}" cy="${NL_Y}" r="8" fill="none" stroke="#ff3b8b" stroke-width="2" opacity="0"><animate attributeName="r" values="8;24" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="1.5s" repeatCount="indefinite"/></circle>`;
        html+=`<circle cx="${x}" cy="${NL_Y}" fill="#ff3b8b" stroke="#fff" stroke-width="2" opacity="0.8"><animate attributeName="r" values="8;11;8" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/></circle>`;
      }

      html+=`<rect x="${x-18}" y="${NL_Y-25}" width="36" height="50" fill="transparent" style="cursor:pointer;" onclick="tickClick(${i})"/>`;
    }
    // For non-emergent, also add click zones for A and result even if not on tick
    if(S.diff!=='emergent'){
      [a,result].forEach(val=>{
        if(val%step!==0 && val>=0 && val<=max){
          const x=nx(val,max);
          html+=`<rect x="${x-18}" y="${NL_Y-25}" width="36" height="50" fill="transparent" style="cursor:pointer;" onclick="tickClick(${val})"/>`;
        }
      });
    }
  }

  // ── BLUE ARROW: 0 → A ──
  if(clickedA!==null && clickedA>0){
    const x0=nx(0,max),xA=nx(clickedA,max),midX=(x0+xA)/2;
    html+=`<line x1="${x0}" y1="${ARROW1_Y}" x2="${x0}" y2="${NL_Y-10}" stroke="#2a3654" stroke-width="1.5" stroke-dasharray="4,3" class="anim" style="animation:drawIn 0.2s 0s forwards;"/>`;
    html+=`<line x1="${x0}" y1="${ARROW1_Y}" x2="${xA-6}" y2="${ARROW1_Y}" stroke="#00d4ff" stroke-width="5" stroke-linecap="round" marker-end="url(#ahCyan)" class="anim" style="animation:drawIn 0.4s 0.1s forwards;"/>`;
    html+=`<rect x="${midX-22}" y="${ARROW1_Y-26}" width="44" height="22" rx="8" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5" class="anim" style="animation:drawIn 0.3s 0.35s forwards;"/>`;
    html+=`<text x="${midX}" y="${ARROW1_Y-11}" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="800" font-family="JetBrains Mono,monospace" class="anim" style="animation:drawIn 0.3s 0.35s forwards;">${clickedA}</text>`;
    html+=`<line x1="${xA}" y1="${ARROW1_Y}" x2="${xA}" y2="${NL_Y-10}" stroke="#2a3654" stroke-width="1.5" stroke-dasharray="4,3" class="anim" style="animation:drawIn 0.2s 0.25s forwards;"/>`;
    html+=`<circle cx="${xA}" cy="${NL_Y}" r="7" fill="#00d4ff" stroke="#0a0e1a" stroke-width="2" class="anim" style="animation:drawIn 0.3s 0.3s forwards;"/>`;
  }

  // ── GREEN RESULT DOT (when complete) ──
  if(clickedR!==null){
    const xR=nx(clickedR,max);
    html+=`<circle cx="${xR}" cy="${NL_Y}" r="8" fill="#00e676" stroke="#0a0e1a" stroke-width="2" class="anim" style="animation:drawIn 0.3s 0.5s forwards;"/>`;
    html+=`<rect x="${xR-28}" y="${NL_Y+36}" width="56" height="22" rx="8" fill="rgba(0,230,118,0.15)" stroke="#00e676" stroke-width="1.5" class="anim" style="animation:drawIn 0.3s 0.6s forwards;"/>`;
    html+=`<text x="${xR}" y="${NL_Y+51}" text-anchor="middle" fill="#00e676" font-size="14" font-weight="900" font-family="JetBrains Mono,monospace" class="anim" style="animation:drawIn 0.3s 0.6s forwards;">= ${clickedR}</text>`;
  }

  html+='</svg></div>';
  return html;
}


/* ══════════════════════════════════════════
   TICK CLICK HANDLER
   ══════════════════════════════════════════ */

function tickClick(n){
  if(S.mode==='explore')tickClickExplore(n);
  else if(S.mode==='practice')tickClickPractice(n);
}

function tickClickExplore(n){
  const result=S.op==='+'?S.a+S.b:S.a-S.b;

  if(S.diff==='emergent'){
    // Step-by-step one-at-a-time (same as Grade 1)
    if(S.phase==='click1'){
      if(n===S.a){S.clickedA=n;S.stepsCompleted=[];S.stepCurrent=n;S.phase='stepping';render();}
      else showFB(`Click on ${S.a}!`,'try-again');
    } else if(S.phase==='stepping'){
      const dir=S.op==='+'?1:-1;
      const next=S.stepCurrent+dir;
      if(n===next){
        S.stepsCompleted.push(n);S.stepCurrent=n;
        addLedgerEntry(n-dir,n,S.op,1);
        if(n===result){S.clickedR=n;S.phase='done';}
        render();renderLedgerKaTeX();
      } else showFB(`Tap ${next} — count ${S.op==='+'?'forward':'backward'} one step!`,'try-again');
    }
  } else {
    // Jump-based (proficient/advanced): click A, then click each jump target
    if(S.phase==='click1'){
      if(n===S.a){
        S.clickedA=n;
        S.jumpPlan=buildJumpPlan(S.a,S.b,S.op);
        S.jumpIdx=0;S.jumpPos=S.a;
        S.phase='jumping';
        render();
      } else showFB(`Click on ${S.a}!`,'try-again');
    } else if(S.phase==='jumping'){
      const target=S.jumpPos+S.jumpPlan[S.jumpIdx];
      if(n===target){
        const jump=S.jumpPlan[S.jumpIdx];
        addLedgerEntry(S.jumpPos,target,jump>0?'+':'-',Math.abs(jump));
        S.jumpPos=target;S.jumpIdx++;
        if(S.jumpIdx>=S.jumpPlan.length){S.clickedR=target;S.phase='done';}
        render();renderLedgerKaTeX();
      } else {
        const target2=S.jumpPos+S.jumpPlan[S.jumpIdx];
        showFB(`Tap ${target2} — jump ${S.jumpPlan[S.jumpIdx]>0?'+':''}${S.jumpPlan[S.jumpIdx]}!`,'try-again');
      }
    }
  }
}

function tickClickPractice(n){
  const result=S.pOp==='+'?S.pA+S.pB:S.pA-S.pB;

  if(S.diff==='emergent'){
    if(S.phase==='click1'){
      if(n===S.pA){S.clickedA=n;S.stepsCompleted=[];S.stepCurrent=n;S.phase='stepping';render();}
      else showFB(`Click on ${S.pA} first!`,'try-again');
    } else if(S.phase==='stepping'){
      const dir=S.pOp==='+'?1:-1;
      const next=S.stepCurrent+dir;
      if(n===next){
        S.stepsCompleted.push(n);S.stepCurrent=n;
        if(n===result){S.clickedR=n;S.phase='answer';render();setTimeout(()=>{const inp=document.getElementById('practiceAnswer');if(inp)inp.focus();},200);}
        else render();
      } else showFB(`Tap ${next}!`,'try-again');
    }
  } else {
    if(S.phase==='click1'){
      if(n===S.pA){
        S.clickedA=n;
        S.jumpPlan=buildJumpPlan(S.pA,S.pB,S.pOp);
        S.jumpIdx=0;S.jumpPos=S.pA;
        S.phase='jumping';render();
      } else showFB(`Click on ${S.pA}!`,'try-again');
    } else if(S.phase==='jumping'){
      const target=S.jumpPos+S.jumpPlan[S.jumpIdx];
      if(n===target){
        S.jumpPos=target;S.jumpIdx++;
        if(S.jumpIdx>=S.jumpPlan.length){S.clickedR=target;S.phase='answer';render();setTimeout(()=>{const inp=document.getElementById('practiceAnswer');if(inp)inp.focus();},200);}
        else render();
      } else showFB(`Tap ${S.jumpPos+S.jumpPlan[S.jumpIdx]}!`,'try-again');
    }
  }
}


/* ══════════════════════════════════════════
   EXPLORE MODE
   ══════════════════════════════════════════ */

function startExplore(){
  if(S.op==='-'&&S.b>S.a){S.b=S.a;}
  const result=S.op==='+'?S.a+S.b:S.a-S.b;
  if(result<0){showFB('Result can\'t be negative!','try-again');return;}
  if(result>S.maxNL){S.maxNL=Math.min(Math.ceil((result+5)/10)*10,100);}
  S.phase='click1';S.clickedA=null;S.clickedR=null;S.stepCurrent=null;S.stepsCompleted=[];
  S.jumpPlan=[];S.jumpIdx=0;S.jumpPos=0;
  render();
}

function newExplore(){
  resetPhase();
  const p=genProblem(S.diff);
  S.a=p.a;S.b=p.b;S.op=p.op;
  render();
}

function renderExplore(ws,sp){
  const res=S.op==='+'?S.a+S.b:S.a-S.b;
  let h='';

  // Instruction
  if(S.phase==='ready'){
    h+=`<div class="instruction-box">Set your numbers and operation, then click <strong>Go</strong> to build it on the number line</div>`;
  } else if(S.phase==='click1'){
    h+=`<div class="instruction-box highlight-cyan">Click on <strong>${S.a}</strong> — that's your starting number</div>`;
  } else if(S.phase==='stepping'){
    const dir=S.op==='+'?'forward':'backward';
    const stepsLeft=Math.abs(res-S.stepCurrent);
    h+=`<div class="instruction-box highlight-pink">Tap the glowing dot — count ${dir} one step! (${stepsLeft} to go)</div>`;
  } else if(S.phase==='jumping'){
    const jump=S.jumpPlan[S.jumpIdx];
    const target=S.jumpPos+jump;
    h+=`<div class="instruction-box highlight-pink">Tap <strong>${target}</strong> — jump ${jump>0?'+':''}${jump} from ${S.jumpPos}</div>`;
  } else if(S.phase==='done'){
    h+=`<div class="instruction-box highlight-green">${S.a} ${S.op==='+'?'+':'−'} ${S.b} = ${res}</div>`;
  }

  // Equation display
  h+='<div class="equation">';
  h+=`<div class="eq-num eq-a">${S.a}</div>`;
  h+=`<div class="eq-op">${S.op==='+'?'+':'−'}</div>`;
  h+=`<div class="eq-num eq-b">${S.b}</div>`;
  h+=`<div class="eq-eq">=</div>`;
  if(S.phase==='done'){
    h+=`<div class="eq-num eq-result revealed">${res}</div>`;
  } else {
    h+=`<div class="eq-num eq-result">?</div>`;
  }
  h+='</div>';

  // Number line
  const clickable=(S.phase==='click1'||S.phase==='stepping'||S.phase==='jumping');
  h+=buildNL(S.a,S.b,S.op,S.maxNL,S.phase,S.clickedA,S.clickedR,clickable);

  // Controls
  if(S.phase==='ready'){
    h+='<div class="input-row">';
    const maxA=S.diff==='emergent'?18:90;
    const maxB=S.diff==='emergent'?18:45;
    h+=`<input type="number" class="num-input" id="inputA" value="${S.a}" min="0" max="${maxA}" onchange="S.a=Math.max(0,Math.min(${maxA},+this.value));render();" style="border-color:var(--cyan);">`;
    h+=`<select class="op-select" onchange="S.op=this.value;render();"><option value="+" ${S.op==='+'?'selected':''}>+</option><option value="-" ${S.op==='-'?'selected':''}>−</option></select>`;
    h+=`<input type="number" class="num-input" id="inputB" value="${S.b}" min="1" max="${maxB}" onchange="S.b=Math.max(1,Math.min(${maxB},+this.value));render();" style="border-color:var(--pink);">`;
    h+=`<button class="ctrl-btn primary" onclick="startExplore()">Go ▸</button>`;
    h+=`<button class="ctrl-btn" onclick="newExplore()" title="Random problem">🎲</button>`;
    h+='</div>';
  } else if(S.phase==='done'){
    h+='<div class="controls">';
    h+=`<button class="ctrl-btn primary" onclick="newExplore()">Next Problem ▸</button>`;
    h+=`<button class="ctrl-btn" onclick="resetPhase();render();">Reset</button>`;
    h+='</div>';
  }

  ws.innerHTML=h;

  // Side panel
  let sph='';
  sph+='<div class="panel-section"><div class="panel-title">Notation Ledger</div>';
  sph+=renderLedger();
  sph+='</div>';

  sph+='<div class="panel-section"><div class="panel-title">Vocabulary</div><div class="panel-text">';
  sph+='<strong style="color:var(--cyan)">Sum</strong> — answer when adding<br><br>';
  sph+='<strong style="color:var(--pink)">Difference</strong> — answer when subtracting<br><br>';
  sph+='<strong style="color:var(--green)">Decompose</strong> — break a number into tens + ones<br><br>';
  sph+='<strong style="color:var(--yellow)">Number Line</strong> — a line with equally spaced points for each number';
  sph+='</div></div>';

  sph+='<div class="panel-section"><div class="panel-title">Tips</div><div class="panel-text">';
  if(S.diff==='emergent'){
    sph+='Count forward to add, backward to subtract.<br><br>Each hop is one step on the line.';
  } else if(S.diff==='proficient'){
    sph+='Jump the whole amount in one hop.<br><br>Watch how the number line shows your jump!';
  } else {
    sph+='Break big jumps into <strong>tens</strong> and <strong>ones</strong>.<br><br>Example: +27 = +20 then +7';
  }
  sph+='</div></div>';

  sp.innerHTML=sph;
  renderLedgerKaTeX();
}


/* ══════════════════════════════════════════
   PRACTICE MODE
   ══════════════════════════════════════════ */

function newPractice(){
  resetPhase();
  const p=genProblem(S.diff);
  S.pA=p.a;S.pB=p.b;S.pOp=p.op;S.pAnswer=p.ans;
  S.phase='click1';
}

function checkPracticeAnswer(){
  const inp=document.getElementById('practiceAnswer');
  const val=parseInt(inp.value);
  if(isNaN(val)){showFB('Type a number!','try-again');return;}
  if(val===S.pAnswer){
    showFB('Correct!','correct');S.pCorrect++;S.pRound++;
    setTimeout(()=>{
      if(S.pRound>=S.pTotal){S.phase='complete';render();}
      else{newPractice();render();}
    },1000);
  } else {
    showFB(`Not quite — it's ${S.pAnswer}`,'incorrect');S.pRound++;
    setTimeout(()=>{
      if(S.pRound>=S.pTotal){S.phase='complete';render();}
      else{newPractice();render();}
    },1500);
  }
}

function renderPractice(ws,sp){
  let h='';

  if(S.phase==='complete'){
    const pct=Math.round(S.pCorrect/S.pTotal*100);
    h+=`<div class="score-display" style="min-width:320px;"><div class="score-label">Practice Complete</div><div class="score-value">${S.pCorrect} / ${S.pTotal}</div><div style="color:var(--text2);font-size:14px;margin-top:8px;">${pct}% correct</div></div>`;
    h+=`<button class="ctrl-btn primary" onclick="S.pRound=0;S.pCorrect=0;newPractice();render();">Practice Again ▸</button>`;
    ws.innerHTML=h;sp.innerHTML='';return;
  }

  // Progress
  const pct=Math.round(S.pRound/S.pTotal*100);
  h+=`<div style="width:100%;max-width:600px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px;"><span>Problem ${S.pRound+1} of ${S.pTotal}</span><span>${S.pCorrect} correct</span></div><div class="streak-bar"><div class="streak-fill" style="width:${pct}%;"></div></div></div>`;

  // Instruction
  if(S.phase==='click1'){
    h+=`<div class="instruction-box highlight-cyan">Click on <strong>${S.pA}</strong> to start</div>`;
  } else if(S.phase==='stepping'){
    const dir=S.pOp==='+'?'forward':'backward';
    h+=`<div class="instruction-box highlight-pink">Count ${dir} — tap the next glowing dot!</div>`;
  } else if(S.phase==='jumping'){
    const jump=S.jumpPlan[S.jumpIdx];
    const target=S.jumpPos+jump;
    h+=`<div class="instruction-box highlight-pink">Jump to <strong>${target}</strong> (${jump>0?'+':''}${jump})</div>`;
  } else if(S.phase==='answer'){
    h+=`<div class="instruction-box highlight-green">What is ${S.pA} ${S.pOp==='+'?'+':'−'} ${S.pB}?</div>`;
  }

  // Equation
  h+='<div class="equation">';
  h+=`<div class="eq-num eq-a">${S.pA}</div>`;
  h+=`<div class="eq-op">${S.pOp==='+'?'+':'−'}</div>`;
  h+=`<div class="eq-num eq-b">${S.pB}</div>`;
  h+=`<div class="eq-eq">=</div>`;
  h+=`<div class="eq-num eq-result">?</div>`;
  h+='</div>';

  // Number line
  const clickable=(S.phase==='click1'||S.phase==='stepping'||S.phase==='jumping');
  h+=buildNL(S.pA,S.pB,S.pOp,S.maxNL,S.phase,S.clickedA,S.clickedR,clickable);

  // Answer input
  if(S.phase==='answer'){
    h+=`<div class="input-row"><input type="number" class="num-input" id="practiceAnswer" style="width:100px;font-size:28px;" onkeydown="if(event.key==='Enter')checkPracticeAnswer();"><button class="ctrl-btn primary" onclick="checkPracticeAnswer()">Check ✓</button></div>`;
  }

  ws.innerHTML=h;

  // Side panel
  let sph='<div class="panel-section"><div class="panel-title">Practice Tips</div><div class="panel-text">';
  sph+='1. Click the starting number<br><br>';
  if(S.diff==='emergent') sph+='2. Tap each step one at a time<br><br>';
  else sph+='2. Click the landing point for each jump<br><br>';
  sph+='3. Type your answer<br><br>';
  sph+=`Round ${S.pRound+1} of ${S.pTotal}`;
  sph+='</div></div>';
  sp.innerHTML=sph;
}


/* ══════════════════════════════════════════
   PLAY MODE
   ══════════════════════════════════════════ */

function newPlay(){
  const p=genProblem(S.diff);
  S.playA=p.a;S.playB=p.b;S.playOp=p.op;S.playAnswer=p.ans;
  // Generate choices
  const choices=new Set([p.ans]);
  while(choices.size<4){
    const off=rand(1,5)*(Math.random()>0.5?1:-1);
    const wrong=p.ans+off;
    if(wrong>=0&&wrong!==p.ans)choices.add(wrong);
  }
  S.playChoices=[...choices].sort(()=>Math.random()-0.5);
}

function playAnswer(val){
  if(val===S.playAnswer){
    S.score+=10*(1+Math.floor(S.streak/3));S.streak++;
    if(S.streak>S.best)S.best=S.streak;
    showFB('Correct!','correct');
  } else {
    S.streak=0;
    showFB(`${S.playAnswer}`,'incorrect');
  }
  S.round++;
  if(S.round>=S.total){
    setTimeout(()=>{S.phase='gameover';render();},1000);
  } else {
    setTimeout(()=>{newPlay();render();},900);
  }
}

function renderPlay(ws,sp){
  let h='';

  if(S.phase==='gameover'){
    h+=`<div class="score-display" style="min-width:320px;"><div class="score-label">Game Over</div><div class="score-value">${S.score}</div><div style="color:var(--text2);font-size:14px;margin-top:8px;">Best streak: ${S.best}</div></div>`;
    h+=`<button class="ctrl-btn primary" onclick="S.round=0;S.score=0;S.streak=0;S.best=0;S.phase='ready';newPlay();render();">Play Again ▸</button>`;
    ws.innerHTML=h;sp.innerHTML='';return;
  }

  // Score
  h+=`<div class="score-display"><div class="score-label">Score</div><div class="score-value">${S.score}</div><div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.streak*20,100)}%;"></div></div><div style="color:var(--yellow);font-size:12px;font-weight:700;margin-top:4px;">Streak: ${S.streak}</div></div>`;

  // Equation
  const opSym=S.playOp==='+'?'+':'−';
  h+=`<div class="equation"><div class="eq-num eq-a">${S.playA}</div><div class="eq-op">${opSym}</div><div class="eq-num eq-b">${S.playB}</div><div class="eq-eq">=</div><div class="eq-num eq-result">?</div></div>`;

  // Answer buttons
  h+='<div class="answer-grid">';
  S.playChoices.forEach(c=>{
    h+=`<button class="answer-btn" onclick="playAnswer(${c})">${c}</button>`;
  });
  h+='</div>';

  h+=`<div style="color:var(--text2);font-size:12px;">Round ${S.round+1} of ${S.total}</div>`;

  ws.innerHTML=h;

  // Side panel
  let sph='<div class="panel-section"><div class="panel-title">Speed Round</div><div class="panel-text">';
  sph+=`Score: <strong>${S.score}</strong><br><br>`;
  sph+=`Streak: <strong style="color:var(--yellow);">${S.streak}</strong><br><br>`;
  sph+=`Best: <strong>${S.best}</strong><br><br>`;
  sph+='Streak bonuses multiply your points!';
  sph+='</div></div>';
  sp.innerHTML=sph;
}


/* ══════════════════════════════════════════
   RENDER + INIT
   ══════════════════════════════════════════ */

function render(){
  const ws=document.getElementById('workspace'),sp=document.getElementById('sidePanel');
  if(S.mode==='explore')renderExplore(ws,sp);
  else if(S.mode==='practice')renderPractice(ws,sp);
  else renderPlay(ws,sp);
}

// Init
(function(){
  setMode('explore');
  setDiff('emergent');
})();
