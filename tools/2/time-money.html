<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM — Time & Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}/* Header */
.vinculum-back-btn{display:inline-block;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.2s;text-decoration:none;}.vinculum-back-btn:hover{background:var(--card);color:var(--cyan);}.vinculum-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}.vinculum-header-left{display:flex;align-items:center;gap:1rem;}.vinculum-header-title{font-size:1.5rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}.header-meta{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--text2);display:flex;gap:0.75rem;}.meta-tag{background:var(--card);padding:0.25rem 0.75rem;border-radius:1rem;border:1px solid var(--border);}.pill-tabs{display:flex;gap:0.5rem;}.pill-btn{padding:0.5rem 1rem;border:1px solid var(--border);background:var(--card);color:var(--text2);border-radius:1rem;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}.pill-btn.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan);font-weight:600;}.pill-btn:hover:not(.active){border-color:var(--cyan);color:var(--cyan);}/* Main Layout */
.main-container{display:flex;height:calc(100vh - 80px);overflow:hidden;}.workspace{flex:1;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow-y:auto;position:relative;}.side-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);padding:1.5rem;overflow-y:auto;flex-shrink:0;}/* Tabs for EXPLORE,PRACTICE,PLAY */
.vinculum-mode-tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1rem;}.vinculum-mode-tab{padding:0.5rem 1rem;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:0.95rem;font-weight:500;position:relative;transition:color 0.2s;}.vinculum-mode-tab.active{color:var(--cyan);}.vinculum-mode-tab.active::after{content:'';position:absolute;bottom:-1rem;left:0;right:0;height:2px;background:var(--cyan);}.vinculum-mode-tab:hover{color:var(--cyan);}/* Sub-tabs for TIME and MONEY */
.sub-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;}.sub-tab{padding:0.5rem 1rem;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:0.5rem;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}.sub-tab.active{background:var(--purple);color:var(--bg);border-color:var(--purple);font-weight:600;}.sub-tab:hover:not(.active){border-color:var(--purple);color:var(--purple);}/* Clock */
.clock-container{display:flex;flex-direction:column;align-items:center;gap:1.5rem;}#analogClock{width:300px;height:300px;background:var(--card);border:3px solid var(--border);border-radius:50%;position:relative;box-shadow:0 0 20px rgba(0,212,255,0.1);}.clock-controls{display:flex;gap:1rem;align-items:center;}.digital-readout{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--cyan);min-width:150px;text-align:center;}.am-pm-toggle{display:flex;border:1px solid var(--border);border-radius:0.5rem;overflow:hidden;}.am-pm-btn{padding:0.5rem 1rem;background:var(--card);border:none;color:var(--text2);cursor:pointer;font-weight:600;transition:all 0.2s;}.am-pm-btn.active{background:var(--yellow);color:var(--bg);}.skip-count-text{font-size:0.9rem;color:var(--text2);text-align:center;min-height:1.2rem;animation:fadeInOut 2s ease-in-out infinite;}@keyframes fadeInOut{0%,100%{opacity:0.5;}50%{opacity:1;}}/* Coin Container */
.coins-workspace{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:1rem;width:100%;max-width:600px;padding:2rem;background:var(--card);border-radius:1rem;border:1px solid var(--border);min-height:300px;}.coin{cursor:grab;transition:transform 0.1s;user-select:none;}.coin:hover{transform:scale(1.05);}.coin:active{cursor:grabbing;}.coin-palette{display:flex;gap:1rem;margin-bottom:2rem;justify-content:center;}.coin-source{cursor:grab;display:flex;flex-direction:column;align-items:center;gap:0.5rem;}.coin-source:active{cursor:grabbing;}.coin-label{font-size:0.8rem;color:var(--text2);font-weight:600;}.money-display{display:flex;gap:2rem;justify-content:center;margin-bottom:1.5rem;font-size:1.2rem;font-weight:600;}.money-value{background:var(--card);padding:1rem 1.5rem;border-radius:0.5rem;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;color:var(--cyan);}.clear-coins-btn{padding:0.5rem 1rem;background:var(--pink);border:none;color:var(--bg);border-radius:0.5rem;cursor:pointer;font-weight:600;margin-top:1rem;}/* Practice/Play Content */
.practice-content{width:100%;max-width:600px;}.practice-item{background:var(--card);padding:1.5rem;border-radius:0.5rem;border:1px solid var(--border);margin-bottom:1rem;}.practice-title{font-size:1rem;font-weight:700;color:var(--cyan);margin-bottom:0.75rem;}.practice-level{display:inline-block;font-size:0.75rem;padding:0.25rem 0.75rem;background:var(--card2);border-radius:0.25rem;color:var(--text2);margin-bottom:0.75rem;}.practice-text{color:var(--text2);font-size:0.95rem;line-height:1.5;}.answer-choices{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin:1.5rem 0;}.practice-choice-btn{padding:0.75rem 1rem;background:var(--card2);border:1px solid var(--border);border-radius:0.375rem;color:var(--text);font-size:0.95rem;cursor:pointer;transition:all 0.2s;font-weight:500;}.practice-choice-btn:hover{background:var(--cyan);color:var(--bg);border-color:var(--cyan);}.practice-choice-btn:active{transform:scale(0.98);}.practice-feedback{margin-top:1rem;padding:0.75rem;border-radius:0.375rem;font-weight:600;min-height:1.5rem;}.play-content{width:100%;max-width:600px;}.play-game{background:var(--card);padding:2rem;border-radius:0.5rem;border:1px solid var(--border);text-align:center;}.play-question{font-size:1.2rem;color:var(--text);margin-bottom:2rem;font-weight:600;}.play-input{width:100%;padding:0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:0.5rem;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:1rem;margin-bottom:1rem;}.play-input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 10px rgba(0,212,255,0.2);}.play-buttons{display:flex;gap:1rem;justify-content:center;}.btn{padding:0.75rem 1.5rem;border:none;border-radius:0.5rem;cursor:pointer;font-weight:600;transition:all 0.2s;font-size:0.95rem;}.btn-primary{background:var(--cyan);color:var(--bg);}.btn-primary:hover{box-shadow:0 0 15px rgba(0,212,255,0.3);}.btn-secondary{background:var(--card2);color:var(--cyan);border:1px solid var(--cyan);}.btn-secondary:hover{background:var(--cyan);color:var(--bg);}.play-score{display:flex;justify-content:space-around;margin-bottom:2rem;padding:1rem;background:var(--card2);border-radius:0.5rem;}.score-item{text-align:center;}.score-label{font-size:0.8rem;color:var(--text2);}.score-value{font-size:1.5rem;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace;}/* Side Panel */
.panel-section{margin-bottom:2rem;}.panel-title{font-size:0.9rem;font-weight:700;color:var(--cyan);text-transform:uppercase;margin-bottom:1rem;letter-spacing:0.05em;}.vocab-item{margin-bottom:1rem;}.vocab-term{font-weight:600;color:var(--text);font-size:0.9rem;}.vocab-def{font-size:0.8rem;color:var(--text2);margin-top:0.25rem;line-height:1.4;}.hidden{display:none;}/* Responsive */
@media (max-width:1024px){.main-container{flex-direction:column;}.side-panel{width:100%;border-left:none;border-top:1px solid var(--border);}.workspace{min-height:400px;}}</style>
</head>
<body>
    
    <div class="vinculum-header">
        <div class="vinculum-header-left">
            
      <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
      <div class="vinculum-header-title"><span>VINCULUM</span> Time & Money</div>
            <div class="vinculum-header-meta">
                <span class="meta-tag">2.MD</span>
                <span class="meta-tag">2.MD.C.7</span>
                <span class="meta-tag">2.MD.C.8</span>
            </div>
        </div>
        <div class="pill-tabs">
            <button class="pill-btn" id="diffEmergent">Emergent</button>
            <button class="pill-btn" id="diffProficient">Proficient</button>
            <button class="pill-btn" id="diffAdvanced">Advanced</button>
        </div>
    </div>

    
    <div class="main-container">
        
        <div class="workspace" role="main" id="workspace">
            
            </div>
  </div>

  <div class="vinculum-mode-tabs">
                <button class="vinculum-mode-tab active" data-mode="explore">EXPLORE</button>
                <button class="vinculum-mode-tab" data-mode="practice">PRACTICE</button>
                <button class="vinculum-mode-tab" data-mode="play">PLAY</button>
            </div>

            
            <div class="mode-content" id="explore">
                <div class="sub-tabs">
                    <button class="sub-tab active" data-subject="time">TIME</button>
                    <button class="sub-tab" data-subject="money">MONEY</button>
                </div>

                
                <div class="subject-content active" id="time-content">
                    <div class="clock-container">

                        <div class="clock-controls">
                            <div class="digital-readout" id="digitalTime">12:00</div>
                            <div class="am-pm-toggle">
                                <button class="am-pm-btn active" data-period="AM">AM</button>
                                <button class="am-pm-btn" data-period="PM">PM</button>
                            </div>
                        </div>

                        <div class="skip-count-text" id="skipCountText">Skip count by 5s around the clock!</div>
                    </div>
                </div>

                
                <div class="subject-content hidden" id="money-content">
                    <div>
                        <div class="coin-palette" id="coinPalette">
                            
                        </div>

                        <div class="money-display">
                            <div class="money-value">
                                <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 0.25rem;">Total</div>
                                <div><span id="totalCents">0</span>¢</div>
                            </div>
                            <div class="money-value">
                                <div style="font-size: 0.8rem; color: var(--text2); margin-bottom: 0.25rem;">= $</div>
                                <div id="totalDollars">0.00</div>
                            </div>
                        </div>

                        <div class="coins-workspace" id="coinsWorkspace"></div>

                        <button class="clear-coins-btn" id="clearCoinsBtn">Clear All</button>
                    </div>
                </div>
            </div>

            
            <div class="mode-content hidden" id="practice">
                <div class="practice-content" id="practiceContent"></div>
            </div>

            
            <div class="mode-content hidden" id="play">
                <div class="play-content" id="playContent"></div>
            </div>
        </div>

        
        <div class="side-panel" id="sidePanel"></div>
    </div>

<div class="feedback" id="feedback"></div>
    <script>
        // State Management
        const S = {
            mode: 'explore',
            subject: 'time',
            difficulty: 'proficient',
            isPM: false,
            hours: 12,
            minutes: 0,
            coinsInWorkspace: [],
            totalCents: 0,
            playScore: 0,
            playStreak: 0,
            draggedCoin: null,
            coinIdCounter: 0,
            dragOffsetX: 0,
            dragOffsetY: 0
        };

        // Data loaded from JSON
        let COINS = [];
        let VOCAB = {};
        let CLOCK_SVG = '';

        // Initialize
        async function init() {
            try {
                const [c, v, s] = await Promise.all([
                    fetch('./data/coins.json').then(r => r.json()),
                    fetch('./data/vocab.json').then(r => r.json()),
                    fetch('./data/clock-svg.json').then(r => r.json())
                ]);
                COINS = c;
                VOCAB = v;
                const el = document.querySelector('.clock-container');
                if (el) el.innerHTML = s.clockSvg + el.innerHTML;
            } catch (e) {}
            setupEventListeners();
            setupClockDragging();
            render();
        }

        function setupEventListeners() {
            // Mode tabs
            document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    S.mode = e.target.dataset.mode;
                    render();
                });
            });

            // Sub-tabs
            document.querySelectorAll('.sub-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    S.subject = e.target.dataset.subject;
                    render();
                });
            });

            // Difficulty pills
            ['Emergent', 'Proficient', 'Advanced'].forEach(diff => {
                const btn = document.getElementById(`diff${diff}`);
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    S.difficulty = diff.toLowerCase();
                    render();
                });
            });

            // AM/PM toggle
            document.querySelectorAll('.am-pm-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.am-pm-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    S.isPM = e.target.dataset.period === 'PM';
                    updateClock();
                });
            });

            // Clear coins button
            document.getElementById('clearCoinsBtn').addEventListener('click', () => {
                S.coinsInWorkspace = [];
                S.totalCents = 0;
                render();
            });
        }

        function setupClockDragging() {
            const clock = document.getElementById('analogClock');
            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');

            let draggingHand = null;

            clock.addEventListener('mousedown', (e) => {
                const rect = clock.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Determine which hand is being dragged
                const distToHour = Math.sqrt(
                    Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2)
                );

                if (distToHour < 50) {
                    draggingHand = 'hour';
                } else {
                    draggingHand = 'minute';
                }

                document.addEventListener('mousemove', dragHand);
                document.addEventListener('mouseup', stopDrag);
            });

            function dragHand(e) {
                const rect = clock.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const angle = Math.atan2(y - centerY, x - centerX) * 180 / Math.PI + 90;
                const normalizedAngle = (angle + 360) % 360;

                if (draggingHand === 'minute') {
                    S.minutes = Math.round(normalizedAngle / 6) * 5;
                    if (S.minutes >= 60) S.minutes = 0;
                } else if (draggingHand === 'hour') {
                    S.hours = Math.round(normalizedAngle / 30) % 12;
                    if (S.hours === 0) S.hours = 12;
                }

                updateClock();
            }

            function stopDrag() {
                draggingHand = null;
                document.removeEventListener('mousemove', dragHand);
                document.removeEventListener('mouseup', stopDrag);
            }
        }

        function updateClock() {
            const clock = document.getElementById('analogClock');
            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');
            const digitalTime = document.getElementById('digitalTime');

            const minuteAngle = (S.minutes / 60) * 360;
            const hourAngle = ((S.hours % 12) / 12) * 360 + (S.minutes / 60) * 30;

            minuteHand.setAttribute('transform', `rotate(${minuteAngle} 100 100)`);
            hourHand.setAttribute('transform', `rotate(${hourAngle} 100 100)`);

            const displayHours = S.hours === 0 ? 12 : S.hours;
            const displayMinutes = String(S.minutes).padStart(2, '0');
            const period = S.isPM ? 'PM' : 'AM';

            digitalTime.textContent = `${displayHours}:${displayMinutes} ${period}`;

            // Update skip count text
            const skipTexts = ['...count by 5s!', '5, 10, 15, 20...', '...25, 30, 35, 40...', '...45, 50, 55, 60!'];
            document.getElementById('skipCountText').textContent = skipTexts[Math.floor(Math.random() * skipTexts.length)];
        }

        function renderCoinPalette() {
            const palette = document.getElementById('coinPalette');
            palette.innerHTML = '';

            COINS.forEach(coin => {
                const coinDiv = document.createElement('div');
                coinDiv.className = 'coin-source';
                coinDiv.draggable = true;

                const svg = createCoinSVG(coin);
                coinDiv.appendChild(svg);

                const label = document.createElement('div');
                label.className = 'coin-label';
                label.textContent = coin.label;
                coinDiv.appendChild(label);

                coinDiv.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'copy';
                    e.dataTransfer.setData('coinType', coin.name);
                });

                palette.appendChild(coinDiv);
            });
        }

        function createCoinSVG(coin) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 100 100');
            svg.setAttribute('width', coin.size);
            svg.setAttribute('height', coin.size);
            svg.setAttribute('class', 'coin');
            svg.style.cursor = 'grab';

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', '50');
            circle.setAttribute('cy', '50');
            circle.setAttribute('r', '45');
            circle.setAttribute('fill', coin.color);
            circle.setAttribute('stroke', '#333');
            circle.setAttribute('stroke-width', '2');

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', '50');
            text.setAttribute('y', '55');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('font-size', '16');
            text.setAttribute('font-weight', 'bold');
            text.setAttribute('fill', coin.name === 'penny' ? '#FFD700' : '#333');
            text.textContent = coin.label;

            svg.appendChild(circle);
            svg.appendChild(text);

            return svg;
        }

        function setupCoinDragAndDrop() {
            const workspace = document.getElementById('coinsWorkspace');

            workspace.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });

            workspace.addEventListener('drop', (e) => {
                e.preventDefault();
                const coinType = e.dataTransfer.getData('coinType');
                const coin = COINS.find(c => c.name === coinType);

                if (coin) {
                    const rect = workspace.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    addCoinToWorkspace(coin, x, y);
                }
            });

            // Setup dragging of coins in workspace
            workspace.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'svg' || e.target.closest('svg')) {
                    const svg = e.target.closest('svg');
                    const coinId = svg.dataset.coinId;
                    const coin = S.coinsInWorkspace.find(c => c.id == coinId);

                    if (coin) {
                        S.draggedCoin = coin;
                        const rect = workspace.getBoundingClientRect();
                        S.dragOffsetX = e.clientX - rect.left - coin.x;
                        S.dragOffsetY = e.clientY - rect.top - coin.y;

                        document.addEventListener('mousemove', dragCoinInWorkspace);
                        document.addEventListener('mouseup', stopDragCoin);
                    }
                }
            });
        }

        function dragCoinInWorkspace(e) {
            if (S.draggedCoin) {
                const workspace = document.getElementById('coinsWorkspace');
                const rect = workspace.getBoundingClientRect();
                S.draggedCoin.x = e.clientX - rect.left - S.dragOffsetX;
                S.draggedCoin.y = e.clientY - rect.top - S.dragOffsetY;

                // Clamp to workspace bounds
                S.draggedCoin.x = Math.max(0, Math.min(S.draggedCoin.x, rect.width - 80));
                S.draggedCoin.y = Math.max(0, Math.min(S.draggedCoin.y, rect.height - 80));

                render();
            }
        }

        function stopDragCoin() {
            S.draggedCoin = null;
            document.removeEventListener('mousemove', dragCoinInWorkspace);
            document.removeEventListener('mouseup', stopDragCoin);
        }

        function addCoinToWorkspace(coin, x = 50, y = 50) {
            S.coinsInWorkspace.push({
                id: S.coinIdCounter++,
                ...coin,
                x: x,
                y: y
            });

            S.totalCents += coin.value;
            render();
        }

        function renderCoinsWorkspace() {
            const workspace = document.getElementById('coinsWorkspace');
            workspace.innerHTML = '';
            workspace.style.position = 'relative';

            S.coinsInWorkspace.forEach(coin => {
                const coinDiv = document.createElement('div');
                coinDiv.style.position = 'absolute';
                coinDiv.style.left = coin.x + 'px';
                coinDiv.style.top = coin.y + 'px';
                coinDiv.style.cursor = 'grab';

                const svg = createCoinSVG(coin);
                svg.dataset.coinId = coin.id;
                coinDiv.appendChild(svg);

                workspace.appendChild(coinDiv);
            });

            // Update totals
            S.totalCents = S.coinsInWorkspace.reduce((sum, coin) => sum + coin.value, 0);
            document.getElementById('totalCents').textContent = S.totalCents;
            document.getElementById('totalDollars').textContent = (S.totalCents / 100).toFixed(2);
        }

        function renderPractice() {
            const content = document.getElementById('practiceContent');

            if (S.subject === 'time') {
                generateTimePracticeQuestion();
            } else {
                generateMoneyPracticeQuestion();
            }
        }

        function generateTimePracticeQuestion() {
            const content = document.getElementById('practiceContent');
            let hours, minutes, choices;

            if (S.difficulty === 'emergent') {
                hours = Math.floor(Math.random() * 12) + 1;
                minutes = Math.random() < 0.5 ? 0 : 30;
                const minuteLabel = minutes === 0 ? 'o\'clock' : 'thirty';
                choices = [
                    `${hours}:00 (${hours} ${minuteLabel})`,
                    `${hours}:30 (${hours} thirty)`,
                    `${(hours % 12) + 1}:00 (${(hours % 12) + 1} o\'clock)`,
                    `${(hours % 12) + 1}:30 (${(hours % 12) + 1} thirty)`
                ];
            } else if (S.difficulty === 'proficient') {
                hours = Math.floor(Math.random() * 12) + 1;
                minutes = Math.floor(Math.random() / 0.2) * 5;
                const hourStr = String(hours).padStart(2, '0');
                const minStr = String(minutes).padStart(2, '0');
                const choiceHours = [hours, (hours % 12) + 1, hours === 1 ? 12 : hours - 1, (hours % 12) + 2];
                const choiceMinutes = [minutes, (minutes + 5) % 60, (minutes + 10) % 60, (minutes - 5 + 60) % 60];
                choices = [
                    `${String(choiceHours[0]).padStart(2, '0')}:${String(choiceMinutes[0]).padStart(2, '0')}`,
                    `${String(choiceHours[1]).padStart(2, '0')}:${String(choiceMinutes[1]).padStart(2, '0')}`,
                    `${String(choiceHours[2]).padStart(2, '0')}:${String(choiceMinutes[2]).padStart(2, '0')}`,
                    `${String(choiceHours[3]).padStart(2, '0')}:${String(choiceMinutes[3]).padStart(2, '0')}`
                ];
            } else {
                hours = Math.floor(Math.random() * 12) + 1;
                minutes = Math.floor(Math.random() * 60);
                const hourStr = String(hours).padStart(2, '0');
                const minStr = String(minutes).padStart(2, '0');
                const choiceHours = [hours, (hours % 12) + 1, hours === 1 ? 12 : hours - 1, (hours % 12) + 2];
                const choiceMinutes = [minutes, (minutes + 5) % 60, (minutes + 15) % 60, (minutes - 10 + 60) % 60];
                choices = [
                    `${String(choiceHours[0]).padStart(2, '0')}:${String(choiceMinutes[0]).padStart(2, '0')}`,
                    `${String(choiceHours[1]).padStart(2, '0')}:${String(choiceMinutes[1]).padStart(2, '0')}`,
                    `${String(choiceHours[2]).padStart(2, '0')}:${String(choiceMinutes[2]).padStart(2, '0')}`,
                    `${String(choiceHours[3]).padStart(2, '0')}:${String(choiceMinutes[3]).padStart(2, '0')}`
                ];
            }

            const correctAnswer = S.difficulty === 'emergent'
                ? `${hours}:${String(minutes).padStart(2, '0')} (${hours} ${minutes === 0 ? 'o\'clock' : 'thirty'})`
                : `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            const minuteAngle = (minutes / 60) * 360;
            const hourAngle = (hours / 12) * 360 + (minutes / 60) * 30;

            S.currentPracticeQuestion = { type: 'time', hours, minutes, correctAnswer, choices };

            const choicesShuffled = choices.sort(() => Math.random() - 0.5);
            const choicesHtml = choicesShuffled.map(choice =>
                `<button class="practice-choice-btn" onclick="checkPracticeAnswer('${choice}')">${choice}</button>`
            ).join('');

            const html = `
                <div class="practice-item">
                    <div class="practice-title">What time is shown?</div>
                    <svg viewBox="0 0 200 200" width="150" height="150" style="margin: 1rem auto; display: block;">
                        <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="2"/>
                        <circle cx="100" cy="100" r="3" fill="currentColor"/>
                        <line x1="100" y1="100" x2="100" y2="60" stroke="currentColor" stroke-width="3" stroke-linecap="round" transform="rotate(${hourAngle} 100 100)"/>
                        <line x1="100" y1="100" x2="100" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round" transform="rotate(${minuteAngle} 100 100)"/>
                    </svg>
                    <div class="answer-choices">
                        ${choicesHtml}
                    </div>
                    <div class="practice-feedback" id="practiceFeedback"></div>
                    <button class="btn btn-secondary" onclick="generateTimePracticeQuestion()" style="margin-top: 1rem;">Next</button>
                </div>
            `;
            content.innerHTML = html;
        }

        function generateMoneyPracticeQuestion() {
            const content = document.getElementById('practiceContent');
            let coinSet, totalAmount, choices;

            if (S.difficulty === 'emergent') {
                const coinTypes = [COINS[0], COINS[1]];
                const numCoins = Math.floor(Math.random() * 3) + 2;
                coinSet = [];
                totalAmount = 0;
                for (let i = 0; i < numCoins; i++) {
                    const coin = coinTypes[Math.floor(Math.random() * coinTypes.length)];
                    coinSet.push(coin);
                    totalAmount += coin.value;
                }
                const variations = [totalAmount, totalAmount + 1, totalAmount + 5, Math.max(1, totalAmount - 1)];
                choices = variations.map(v => `${v}¢`);
            } else if (S.difficulty === 'proficient') {
                const numCoins = Math.floor(Math.random() * 3) + 2;
                coinSet = [];
                totalAmount = 0;
                for (let i = 0; i < numCoins; i++) {
                    const coin = COINS[Math.floor(Math.random() * COINS.length)];
                    coinSet.push(coin);
                    totalAmount += coin.value;
                }
                const variations = [totalAmount, totalAmount + 5, totalAmount + 10, Math.max(1, totalAmount - 5)];
                choices = variations.map(v => `${v}¢`);
            } else {
                const numCoins = Math.floor(Math.random() * 4) + 2;
                coinSet = [];
                totalAmount = 0;
                for (let i = 0; i < numCoins; i++) {
                    const coin = COINS[Math.floor(Math.random() * COINS.length)];
                    coinSet.push(coin);
                    totalAmount += coin.value;
                }
                const variations = [totalAmount, totalAmount + 5, totalAmount + 10, Math.max(1, totalAmount - 5)];
                choices = variations.map(v => `${v}¢`);
            }

            const correctAnswer = `${totalAmount}¢`;
            S.currentPracticeQuestion = { type: 'money', coins: coinSet, totalAmount, correctAnswer, choices };

            let coinDisplay = '<div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0;">';
            coinSet.forEach(coin => {
                const svg = createCoinSVG(coin);
                coinDisplay += `<div style="width: 60px; height: 60px;">${svg.outerHTML}</div>`;
            });
            coinDisplay += '</div>';

            const choicesShuffled = choices.sort(() => Math.random() - 0.5);
            const choicesHtml = choicesShuffled.map(choice =>
                `<button class="practice-choice-btn" onclick="checkPracticeAnswer('${choice}')">${choice}</button>`
            ).join('');

            const html = `
                <div class="practice-item">
                    <div class="practice-title">How much money?</div>
                    ${coinDisplay}
                    <div class="answer-choices">
                        ${choicesHtml}
                    </div>
                    <div class="practice-feedback" id="practiceFeedback"></div>
                    <button class="btn btn-secondary" onclick="generateMoneyPracticeQuestion()" style="margin-top: 1rem;">Next</button>
                </div>
            `;
            content.innerHTML = html;
        }

        function checkPracticeAnswer(answer) {
            const feedback = document.getElementById('practiceFeedback');
            if (answer === S.currentPracticeQuestion.correctAnswer) {
                feedback.innerHTML = '<div style="color: #4CAF50; font-weight: bold;">Correct!</div>';
                feedback.style.color = '#4CAF50';
                showFB('✓ Correct!','correct');
            } else {
                feedback.innerHTML = `<div style="color: #F44336; font-weight: bold;">Not quite. The answer is ${S.currentPracticeQuestion.correctAnswer}</div>`;
                feedback.style.color = '#F44336';
                showFB('Try again!','incorrect');
            }
        }

        function renderPlay() {
            const content = document.getElementById('playContent');
            let html = '';

            if (S.subject === 'time') {
                html = `
                    <div class="play-score">
                        <div class="score-item">
                            <div class="score-label">SCORE</div>
                            <div class="score-value" id="playScore">${S.playScore}</div>
                        </div>
                        <div class="score-item">
                            <div class="score-label">STREAK</div>
                            <div class="score-value" id="playStreak">${S.playStreak}</div>
                        </div>
                    </div>
                    <div class="play-game">
                        <div class="play-question" id="playQuestion">What time is it?</div>
                        <input type="text" class="play-input" id="playInput" placeholder="12:00" />
                        <div class="play-buttons">
                            <button class="btn btn-primary" id="playSubmit">Check</button>
                            <button class="btn btn-secondary" id="playNext">Skip</button>
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="play-score">
                        <div class="score-item">
                            <div class="score-label">SCORE</div>
                            <div class="score-value" id="playScore">${S.playScore}</div>
                        </div>
                        <div class="score-item">
                            <div class="score-label">STREAK</div>
                            <div class="score-value" id="playStreak">${S.playStreak}</div>
                        </div>
                    </div>
                    <div class="play-game">
                        <div class="play-question" id="playQuestion">How much money?</div>
                        <input type="text" class="play-input" id="playInput" placeholder="¢" />
                        <div class="play-buttons">
                            <button class="btn btn-primary" id="playSubmit">Check</button>
                            <button class="btn btn-secondary" id="playNext">Skip</button>
                        </div>
                    </div>
                `;
            }

            content.innerHTML = html;

            // Setup game logic
            setTimeout(() => {
                generatePlayQuestion();
                document.getElementById('playSubmit').addEventListener('click', checkPlayAnswer);
                document.getElementById('playNext').addEventListener('click', generatePlayQuestion);
                document.getElementById('playInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkPlayAnswer();
                });
            }, 0);
        }

        function generatePlayQuestion() {
            const input = document.getElementById('playInput');
            input.value = '';
            input.focus();

            if (S.subject === 'time') {
                const hours = Math.floor(Math.random() * 12) + 1;
                const minutes = Math.floor(Math.random() / 0.2) * 5; // 0, 5, 10, ..., 55
                S.currentQuestion = { type: 'time', hours, minutes };
                updatePlayClockDisplay(hours, minutes);
            } else {
                const numCoins = Math.floor(Math.random() * 4) + 2;
                let amount = 0;
                const coinSet = [];
                for (let i = 0; i < numCoins; i++) {
                    const coin = COINS[Math.floor(Math.random() * COINS.length)];
                    coinSet.push(coin);
                    amount += coin.value;
                }
                S.currentQuestion = { type: 'money', amount, coins: coinSet };
                updatePlayCoinsDisplay(coinSet);
            }
        }

        function updatePlayClockDisplay(hours, minutes) {
            // Update the test clock in the play game
            const question = document.getElementById('playQuestion');
            question.innerHTML = `
                <div style="font-size: 1rem; margin-bottom: 1rem;">What time is shown?</div>
                <svg id="playClockSVG" viewBox="0 0 200 200" width="150" height="150" style="margin: 0 auto; display: block;">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="2"/>
                    <circle cx="100" cy="100" r="3" fill="currentColor"/>
                    <line id="playHourHand" x1="100" y1="100" x2="100" y2="60" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <line id="playMinuteHand" x1="100" y1="100" x2="100" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            `;

            const playHourHand = document.getElementById('playHourHand');
            const playMinuteHand = document.getElementById('playMinuteHand');
            const minuteAngle = (minutes / 60) * 360;
            const hourAngle = (hours / 12) * 360 + (minutes / 60) * 30;

            playMinuteHand.setAttribute('transform', `rotate(${minuteAngle} 100 100)`);
            playHourHand.setAttribute('transform', `rotate(${hourAngle} 100 100)`);
        }

        function updatePlayCoinsDisplay(coinSet) {
            const question = document.getElementById('playQuestion');
            let coinDisplay = '<div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0;">';
            coinSet.forEach(coin => {
                const svg = createCoinSVG(coin);
                coinDisplay += `<div style="width: 60px; height: 60px;">${svg.outerHTML}</div>`;
            });
            coinDisplay += '</div><div>How much money in total?</div>';
            question.innerHTML = coinDisplay;
        }

        function checkPlayAnswer() {
            const input = document.getElementById('playInput').value.trim();
            let isCorrect = false;

            if (S.subject === 'time') {
                const [h, m] = input.split(':').map(x => parseInt(x));
                if (!isNaN(h) && !isNaN(m)) {
                    isCorrect = h === S.currentQuestion.hours && m === S.currentQuestion.minutes;
                }
            } else {
                const amount = parseInt(input);
                isCorrect = amount === S.currentQuestion.amount;
            }

            if (isCorrect) {
                showFB('✓ Correct!','correct');
                S.playScore += 10;
                S.playStreak++;
                document.getElementById('playScore').textContent = S.playScore;
                document.getElementById('playStreak').textContent = S.playStreak;
                const input_elem = document.getElementById('playInput');
                input_elem.style.borderColor = 'var(--green)';
                setTimeout(() => {
                    input_elem.style.borderColor = '';
                    generatePlayQuestion();
                }, 500);
            } else {
                showFB('Try again!','incorrect');
                S.playStreak = 0;
                document.getElementById('playStreak').textContent = S.playStreak;
                const input_elem = document.getElementById('playInput');
                input_elem.style.borderColor = 'var(--pink)';
                setTimeout(() => {
                    input_elem.style.borderColor = '';
                }, 500);
            }
        }

        function renderSidePanel() {
            const panel = document.getElementById('sidePanel');
            let html = '<div class="panel-section">';
            html += '<div class="panel-title">Vocabulary</div>';

            const items = VOCAB[S.subject] || VOCAB.time;
            items.forEach(item => {
                html += `
                    <div class="vocab-item">
                        <div class="vocab-term">${item.term}</div>
                        <div class="vocab-def">${item.def}</div>
                    </div>
                `;
            });

            html += '</div>';

            if (S.subject === 'money' && S.mode === 'explore') {
                html += `
                    <div class="panel-section">
                        <div class="panel-title">Tips</div>
                        <div class="vocab-item">
                            <div class="vocab-def">Drag coins from the top into the workspace to count them. Watch the total update!</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-def">5 pennies = 1 nickel. 2 nickels = 1 dime. 2 dimes + 1 nickel = 1 quarter.</div>
                        </div>
                    </div>
                `;
            }

            if (S.subject === 'time' && S.mode === 'explore') {
                html += `
                    <div class="panel-section">
                        <div class="panel-title">Tips</div>
                        <div class="vocab-item">
                            <div class="vocab-def">Drag the hour hand (short) and minute hand (long) to set different times.</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-def">The minute hand moves by 5s: count 5, 10, 15... starting from 12.</div>
                        </div>
                    </div>
                `;
            }

            panel.innerHTML = html;
        }

        function render() {
            // Show/hide mode content
            document.querySelectorAll('.mode-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(S.mode).classList.remove('hidden');

            // Render based on mode
            if (S.mode === 'explore') {
                // Show/hide subject content
                document.querySelectorAll('.subject-content').forEach(el => el.classList.add('hidden'));
                document.getElementById(`${S.subject}-content`).classList.remove('hidden');

                if (S.subject === 'time') {
                    updateClock();
                } else {
                    renderCoinPalette();
                    renderCoinsWorkspace();
                    setupCoinDragAndDrop();
                }
            } else if (S.mode === 'practice') {
                renderPractice();
            } else if (S.mode === 'play') {
                renderPlay();
            }

            renderSidePanel();
        }

        // Start app
        init();
        document.getElementById('diffProficient').click();
    </script>
