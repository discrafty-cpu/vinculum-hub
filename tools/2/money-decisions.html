<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VINCULUM Learning Hub - Money Decisions">
    <meta name="author" content="VINCULUM">
    <title>Money Decisions — VINCULUM Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../vinculum-core.css">

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #0066cc;
            --success: #00a854;
            --error: #ff4d4f;
        }

        .explore-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin: 1rem 0;
        }

        .store-section {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .store-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: grab;
            transition: all 0.3s;
            color: white;
        }

        .item:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .item:active {
            cursor: grabbing;
        }

        .item-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .item-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .item-price {
            font-weight: 700;
            color: #ffeb3b;
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .wallet-section {
            background: var(--card);
            border: 2px dashed var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .wallet-header {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .coin-display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .coin-item {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .coin-icon {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .total-display {
            background: linear-gradient(135deg, #00a854 0%, #52c41a 100%);
            color: white;
            padding: 1rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1.3rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .cart-section {
            background: var(--card);
            border: 2px solid var(--success);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .cart-header {
            font-weight: 600;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: #f5f5f5;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .cart-item-name {
            font-weight: 500;
        }

        .cart-item-price {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 600;
        }

        .practice-content {
            max-width: 650px;
        }

        .scenario-card {
            background: var(--card);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .scenario-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .scenario-info {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
        }

        .comparison-item {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid #ddd;
        }

        .comparison-item.better {
            border-left-color: var(--success);
            background: rgba(0, 168, 84, 0.05);
        }

        .option-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .option-btn {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #ddd;
            background: white;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: rgba(0,102,204,0.05);
        }

        .option-btn.correct {
            border-color: var(--success);
            background: var(--success);
            color: white;
        }

        .option-btn.incorrect {
            border-color: var(--error);
            background: var(--error);
            color: white;
        }

        .play-content {
            max-width: 700px;
        }

        .game-board {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 1.5rem;
            color: white;
            margin-bottom: 1.5rem;
        }

        .game-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }

        .budget-display {
            background: rgba(255,255,255,0.2);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .budget-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .budget-amount {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .shopping-challenge {
            background: var(--card);
            border-radius: 8px;
            padding: 1.5rem;
            color: var(--text);
        }

        .available-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .shop-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .shop-item:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shop-item.disabled:hover {
            transform: none;
            border-color: transparent;
        }

        .shop-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .shop-name {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .shop-price {
            font-weight: 700;
            color: #ffeb3b;
            font-family: 'JetBrains Mono', monospace;
        }

        .purchases {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }

        .purchase-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .purchase-badge {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .complete-btn {
            width: 100%;
            padding: 1rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .complete-btn:hover {
            background: #008c3a;
        }

        .complete-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .explore-content {
                grid-template-columns: 1fr;
            }

            .comparison {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="vinculum-header">
        <h1>Money Decisions</h1>
        <span>Grade 2</span>
        <span>TEKS 2.6A-E</span>
    </div>

    <div class="vinculum-mode-tabs">
        <button class="vinculum-mode-tab" data-mode="explore"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore</button>
        <button class="vinculum-mode-tab" data-mode="practice"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button>
        <button class="vinculum-mode-tab" data-mode="play"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button>

        <div class="difficulty-selector">
            <label for="difficulty-select">Difficulty:</label>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="explore">
        <div class="card">
            <h2>Explore: Virtual Store</h2>
            <div id="explore-content" class="explore-content"></div>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="practice">
        <div class="card">
            <h2>Practice: Make Smart Choices</h2>
            <div id="practice-content" class="practice-content"></div>
        </div>
    </div>

    <div class="vinculum-mode-content" data-mode="play">
        <div class="card">
            <h2>Play: Shopping Spree</h2>
            <div id="play-content" class="play-content"></div>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>

    <script src="../../lib/vinculum-input.js"></script>
    <script src="../../lib/vinculum-feedback.js"></script><script src="../../vinculum-guide.js"></script><script src="../../vinculum-indigenous.js"></script><script src="../../indigenous-context-panel.js"></script>

    <script>
        const storeItems = [
            { name: 'Apple', icon: '🍎', price: 5 },
            { name: 'Pencil', icon: '✏️', price: 10 },
            { name: 'Notebook', icon: '📓', price: 25 },
            { name: 'Toy', icon: '🧸', price: 50 },
            { name: 'Book', icon: '📖', price: 30 },
            { name: 'Candy', icon: '🍭', price: 15 }
        ];

        let currentDifficulty = 'medium';
        let cartItems = [];
        let practiceIndex = 0;
        let gameCart = [];
        let gameBudget = 100;

        document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                switchMode(this.getAttribute('data-mode'));
            });
        });

        document.getElementById('difficulty-select').addEventListener('change', function() {
            currentDifficulty = this.value;
        });

        function switchMode(mode) {
            document.querySelectorAll('.vinculum-mode-content').forEach(el => {
                el.style.display = 'none';
            });
            document.querySelectorAll('.vinculum-mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).style.display = 'block';
            document.querySelector(`.vinculum-mode-tab[data-mode="${mode}"]`).classList.add('active');

            if (mode === 'explore') renderExplore();
            else if (mode === 'practice') renderPractice();
            else if (mode === 'play') renderPlay();
        }

        function renderExplore() {
            const container = document.getElementById('explore-content');
            const coins = [
                { icon: '🪙', name: 'Penny', value: 1 },
                { icon: '🪙', name: 'Nickel', value: 5 },
                { icon: '🪙', name: 'Dime', value: 10 },
                { icon: '🪙', name: 'Quarter', value: 25 }
            ];

            const storeHtml = `
                <div class="store-section">
                    <div class="store-header">🏪 Store Items</div>
                    <div class="items-grid">
                        ${storeItems.map((item, i) => `
                            <div class="item" draggable="true" data-index="${i}" ondragstart="dragStart(event)">
                                <div class="item-icon">${item.icon}</div>
                                <div class="item-name">${item.name}</div>
                                <div class="item-price">${item.price}¢</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const walletHtml = `
                <div class="wallet-section">
                    <div class="wallet-header">💰 Your Coins</div>
                    <div class="coin-display">
                        ${coins.map(coin => `
                            <div class="coin-item">
                                <div class="coin-icon">${coin.icon}</div>
                                <div>${coin.name}</div>
                                <div style="font-size: 0.8rem;">${coin.value}¢</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="total-display" id="total-money">100¢</div>
                    <div class="cart-section">
                        <div class="cart-header">🛒 Shopping Cart</div>
                        <div id="explore-cart" style="min-height: 60px;">
                            <p style="text-align: center; color: #999;">Drag items here</p>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = storeHtml + walletHtml;
            setupExploreCart();
        }

        function dragStart(event) {
            event.dataTransfer.setData('itemIndex', event.target.closest('.item').dataset.index);
        }

        function setupExploreCart() {
            const cart = document.getElementById('explore-cart');
            cart.addEventListener('dragover', (e) => e.preventDefault());
            cart.addEventListener('drop', (event) => {
                event.preventDefault();
                const index = event.dataTransfer.getData('itemIndex');
                const item = storeItems[index];
                cartItems.push(item);
                updateExploreDisplay();
            });
        }

        function updateExploreDisplay() {
            const total = 100 - cartItems.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-money').textContent = total + '¢ left';

            const cartHtml = cartItems.length ? cartItems.map(item => `
                <div class="cart-item">
                    <span>${item.icon} ${item.name}</span>
                    <span class="cart-item-price">${item.price}¢</span>
                </div>
            `).join('') : '<p style="text-align: center; color: #999;">Drag items here</p>';

            document.getElementById('explore-cart').innerHTML = cartHtml;
        }

        function renderPractice() {
            const container = document.getElementById('practice-content');
            const scenarios = [
                {
                    title: 'Price Comparison',
                    description: 'Which is the better deal?',
                    option1: { name: 'Apple (5¢)', price: 5 },
                    option2: { name: 'Big Apple (8¢)', price: 8 },
                    better: 1
                },
                {
                    title: 'Making Fair Trades',
                    description: 'Which trade is fair?',
                    option1: { name: '2 Pennies = 2¢', price: 2 },
                    option2: { name: '1 Dime = 10¢', price: 10 },
                    better: 0
                },
                {
                    title: 'Counting Change',
                    description: 'If you pay 25¢ for a 15¢ item, how much change?',
                    option1: { name: '10¢ change', price: 10 },
                    option2: { name: '15¢ change', price: 15 },
                    better: 0
                },
                {
                    title: 'Budget Decision',
                    description: 'You have 50¢. Which is better?',
                    option1: { name: 'Buy 1 item (30¢)', price: 30 },
                    option2: { name: 'Buy 2 items (40¢)', price: 40 },
                    better: 1
                }
            ];

            practiceIndex = 0;
            renderPracticeQuestion(scenarios);

            function renderPracticeQuestion(scenarios) {
                if (practiceIndex >= scenarios.length) {
                    container.innerHTML = '<div class="scenario-card"><div class="scenario-title">🎉 Excellent! All questions complete!</div></div>';
                    return;
                }

                const scenario = scenarios[practiceIndex];
                const html = `
                    <div class="scenario-card">
                        <div class="scenario-title">Question ${practiceIndex + 1} of ${scenarios.length}</div>
                        <div class="scenario-title">${scenario.title}</div>
                        <div class="scenario-info">${scenario.description}</div>
                        <div class="comparison">
                            <div class="comparison-item ${scenario.better === 0 ? 'better' : ''}">
                                ${scenario.option1.name}
                            </div>
                            <div class="comparison-item ${scenario.better === 1 ? 'better' : ''}">
                                ${scenario.option2.name}
                            </div>
                        </div>
                        <div class="option-buttons">
                            <button class="option-btn" id="opt1" onclick="checkPracticeAnswer(0, ${scenario.better})">First Option</button>
                            <button class="option-btn" id="opt2" onclick="checkPracticeAnswer(1, ${scenario.better})">Second Option</button>
                        </div>
                    </div>
                `;

                container.innerHTML = html;
            }
        }

        function checkPracticeAnswer(chosen, better) {
            const isCorrect = chosen === better;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === better) btn.classList.add('correct');
                else if (i === chosen) btn.classList.add('incorrect');
            });

            if (isCorrect) {
                showFeedback('Great choice!', 'success');
            } else {
                showFeedback('Try again on the next one!', 'error');
            }

            setTimeout(() => {
                practiceIndex++;
                renderPractice();
            }, 2000);
        }

        function renderPlay() {
            const container = document.getElementById('play-content');
            const budgetAmount = currentDifficulty === 'easy' ? 75 : currentDifficulty === 'medium' ? 100 : 150;
            gameBudget = budgetAmount;
            gameCart = [];

            const items = currentDifficulty === 'easy' ? storeItems.slice(0, 3) : currentDifficulty === 'medium' ? storeItems.slice(0, 5) : storeItems;

            const html = `
                <div class="game-board">
                    <div class="game-header">🛍️ Shopping Spree!</div>
                    <div class="budget-display">
                        <div class="budget-label">Budget Remaining</div>
                        <div class="budget-amount" id="budget">$${(gameBudget / 100).toFixed(2)}</div>
                    </div>
                </div>
                <div class="shopping-challenge">
                    <div style="font-weight: 600; margin-bottom: 1rem;">Select items to buy (stay within budget):</div>
                    <div class="available-items" id="play-items">
                        ${items.map((item, i) => `
                            <button class="shop-item" id="item-${i}" onclick="buyItem(${i}, '${item.name}', ${item.price})">
                                <div class="shop-icon">${item.icon}</div>
                                <div class="shop-name">${item.name}</div>
                                <div class="shop-price">${item.price}¢</div>
                            </button>
                        `).join('')}
                    </div>
                    <div class="purchases">
                        <div style="font-weight: 600; margin-bottom: 0.75rem;">Items in Cart:</div>
                        <div class="purchase-list" id="play-cart">
                            <span style="color: #999;">No items yet</span>
                        </div>
                    </div>
                    <button class="complete-btn" id="complete-btn" onclick="completeGame()" disabled>Complete Purchase</button>
                </div>
            `;

            container.innerHTML = html;
        }

        function buyItem(index, name, price) {
            if (gameBudget >= price) {
                gameBudget -= price;
                gameCart.push({ name, price });
                document.getElementById('budget').textContent = '$' + (gameBudget / 100).toFixed(2);

                const cartHtml = gameCart.map(item => `
                    <div class="purchase-badge">${item.name}</div>
                `).join('');
                document.getElementById('play-cart').innerHTML = cartHtml || '<span style="color: #999;">No items yet</span>';

                document.getElementById('complete-btn').disabled = gameCart.length === 0;
                showFeedback(`Added ${name}!`, 'success');
            } else {
                showFeedback('Not enough money!', 'error');
            }
        }

        function completeGame() {
            const spent = (150 - gameBudget) / 100;
            showFeedback(`Great shopping! You spent $${spent.toFixed(2)} on ${gameCart.length} items!`, 'success');
            setTimeout(() => {
                renderPlay();
            }, 2000);
        }

        function showFeedback(message, type = 'info') {
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `<div class="feedback-${type}">${message}</div>`;
            feedback.style.display = 'block';
            setTimeout(() => {
                feedback.style.display = 'none';
            }, 2000);
        }

        switchMode('explore');
    </script>
</body>
</html>
