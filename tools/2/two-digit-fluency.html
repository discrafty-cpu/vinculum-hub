<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM — Two-Digit Fluency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .vinculum-back-btn {
  display:inline-block;padding:6px 12px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:13px;font-family:inherit;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.vinculum-back-btn:hover { background:var(--card); color:var(--cyan); }
.vinculum-header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .vinculum-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .vinculum-header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .badge {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: var(--bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Mode & Difficulty Tabs */
        .controls-row {
            display: flex;
            gap: 20px;
            padding: 12px 24px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }

        .control-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pill-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pill-btn:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        .pill-btn.active {
            background: var(--grad);
            color: var(--bg);
            border-color: transparent;
        }

        /* Main Container */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
            background: var(--bg);
        }

        .panel {
            width: 280px;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Explore Mode */
        .explore-container {
            display: flex;
            gap: 40px;
            width: 100%;
            justify-content: center;
        }

        .base-ten-block {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .number-display {
            font-size: 24px;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        .base-ten-visual {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .tens-group, .ones-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .tens-rod {
            width: 20px;
            height: 120px;
            background: linear-gradient(90deg, var(--cyan), #0095cc);
            border-radius: 4px;
            border: 2px solid var(--cyan);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-weight: 700;
            font-size: 12px;
        }

        .ones-cube {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--pink), #cc0066);
            border-radius: 2px;
            border: 2px solid var(--pink);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .group-label {
            font-size: 11px;
            color: var(--text2);
            font-weight: 600;
            text-transform: uppercase;
        }

        .algorithm-side {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .algorithm-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            line-height: 2;
            min-width: 200px;
        }

        .algorithm-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .carry {
            color: var(--yellow);
            font-weight: 700;
            animation: carry-bounce 0.6s ease;
        }

        @keyframes carry-bounce {
            0% { transform: translateY(-10px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .algorithm-result {
            border-top: 2px solid var(--border);
            margin-top: 8px;
            padding-top: 8px;
            color: var(--green);
        }

        .number-line {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            min-width: 300px;
        }

        .number-line-visual {
            display: flex;
            align-items: center;
            gap: 4px;
            position: relative;
            height: 60px;
        }

        .number-line-tick {
            width: 2px;
            height: 20px;
            background: var(--text2);
        }

        .number-line-label {
            font-size: 11px;
            color: var(--text2);
            position: absolute;
            bottom: -20px;
            width: 30px;
            text-align: center;
        }

        .jump-arrow {
            position: absolute;
            height: 3px;
            background: var(--cyan);
            top: 10px;
        }

        .jump-label {
            position: absolute;
            font-size: 12px;
            color: var(--cyan);
            top: -20px;
        }

        /* Strategy Selector */
        .strategy-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .strategy-btn {
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .strategy-btn:hover {
            background: var(--card2);
            border-color: var(--muted);
        }

        .strategy-btn.active {
            background: var(--grad);
            color: var(--bg);
            border-color: transparent;
        }

        /* Practice Mode */
        .practice-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            max-width: 600px;
        }

        .problem-display {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
        }

        .problem-text {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        .equation {
            font-size: 36px;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 16px;
        }

        .scaffolding {
            background: var(--bg2);
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text2);
            border-left: 3px solid var(--purple);
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .choice-btn {
            padding: 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .choice-btn:hover:not(.disabled) {
            border-color: var(--cyan);
            background: var(--card2);
        }

        .choice-btn.correct {
            background: var(--green);
            color: var(--bg);
            border-color: var(--green);
            animation: correct-glow 0.4s ease;
        }

        @keyframes correct-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
            100% { box-shadow: 0 0 0 12px rgba(0, 230, 118, 0); }
        }

        .choice-btn.wrong {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .choice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Play Mode */
        .play-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            max-width: 500px;
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        .score-label {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            font-weight: 600;
        }

        .score-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        .timer {
            font-size: 48px;
            font-weight: 700;
            color: var(--yellow);
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            margin: 16px 0;
        }

        .timer.warning {
            color: var(--pink);
            animation: timer-pulse 0.5s infinite;
        }

        @keyframes timer-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Panel Content */
        .panel-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text2);
        }

        .panel-section strong {
            color: var(--text);
        }

        .comparison-item {
            padding: 8px;
            background: var(--bg);
            border-radius: 4px;
            margin: 4px 0;
            border-left: 3px solid var(--cyan);
        }

        .comparison-item.decomp {
            border-left-color: var(--pink);
        }

        .comparison-item.comp {
            border-left-color: var(--purple);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--muted);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text2);
        }
    </style>
</head>
<body>
    <div class="vinculum-header">
        <div class="vinculum-header-left">
            
      <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
      <div class="vinculum-header-title"><span>VINCULUM</span> Two-Digit Fluency</div>
            <div class="badge">2.NBT</div>
            <div class="tags">
                <div class="tag">2.NBT.B.5</div>
                <div class="tag">2.NBT.B.6</div>
            </div>
        </div>
    </div>

    <div class="controls-row">
        <div class="control-group">
            <div class="control-label">Mode</div>
            <button class="pill-btn active" onclick="S.setMode('explore')">Explore</button>
            <button class="pill-btn" onclick="S.setMode('practice')">Practice</button>
            <button class="pill-btn" onclick="S.setMode('play')">Play</button>
        </div>
        <div class="control-group" id="difficultyGroup" style="display: none;">
            <div class="control-label">Difficulty</div>
            <button class="pill-btn active" onclick="S.setDifficulty('emergent')">Emergent</button>
            <button class="pill-btn" onclick="S.setDifficulty('proficient')">Proficient</button>
            <button class="pill-btn" onclick="S.setDifficulty('advanced')">Advanced</button>
        </div>
    </div>

    <div class="main">
        <div class="workspace" role="main" id="workspace"></div>
        <div class="panel" id="panel"></div>
    </div>

<div class="feedback" id="feedback"></div>
    <script>
        const S = {
            mode: 'explore',
            difficulty: 'emergent',
            strategy: 'standard',
            currentProblem: null,
            problemIndex: 0,
            score: 0,
            streak: 0,
            timeLeft: 8,
            timerInterval: null,
            answered: false,

            init() {
                this.generateNewProblem();
                this.render();
            },

            setMode(m) {
                this.mode = m;
                this.answered = false;
                this.problemIndex = 0;
                this.score = 0;
                this.streak = 0;
                if (this.timerInterval) clearInterval(this.timerInterval);

                if (m === 'explore') {
                    this.strategy = 'standard';
                    this.generateNewProblem();
                } else if (m === 'practice') {
                    this.difficulty = 'emergent';
                    this.generateNewProblem();
                } else if (m === 'play') {
                    this.difficulty = 'emergent';
                    this.generateNewProblem();
                    this.startTimer();
                }
                this.render();
            },

            setDifficulty(d) {
                this.difficulty = d;
                this.problemIndex = 0;
                this.score = 0;
                this.streak = 0;
                this.answered = false;
                this.generateNewProblem();
                if (this.mode === 'play') {
                    this.timeLeft = 8;
                    if (this.timerInterval) clearInterval(this.timerInterval);
                    this.startTimer();
                }
                this.render();
            },

            setStrategy(st) {
                this.strategy = st;
                this.render();
            },

            generateNewProblem() {
                let addends = [];
                let max = 100;

                if (this.difficulty === 'emergent') {
                    addends = [this.randomRange(10, 25), this.randomRange(10, 25)];
                    max = 50;
                } else if (this.difficulty === 'proficient') {
                    addends = [this.randomRange(10, 99), this.randomRange(10, 99)];
                } else if (this.difficulty === 'advanced') {
                    const count = Math.random() > 0.5 ? 3 : 4;
                    for (let i = 0; i < count; i++) {
                        addends.push(this.randomRange(10, 40));
                    }
                }

                const answer = addends.reduce((a, b) => a + b, 0);

                // Clamp answer to max
                if (answer > max) {
                    addends[0] = Math.floor(max / addends.length);
                    const correctedAnswer = addends.reduce((a, b) => a + b, 0);
                    this.currentProblem = {
                        addends,
                        answer: correctedAnswer,
                        choices: this.generateChoices(correctedAnswer)
                    };
                } else {
                    this.currentProblem = {
                        addends,
                        answer,
                        choices: this.generateChoices(answer)
                    };
                }
            },

            randomRange(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            },

            generateChoices(correct) {
                const choices = [correct];
                while (choices.length < 4) {
                    let distractor = correct + this.randomRange(-10, 10);
                    if (distractor < 0) distractor = Math.abs(distractor);
                    if (!choices.includes(distractor)) {
                        choices.push(distractor);
                    }
                }
                return choices.sort(() => Math.random() - 0.5);
            },

            selectAnswer(choice) {
                if (this.answered) return;
                this.answered = true;

                const isCorrect = choice === this.currentProblem.answer;

                if (this.mode === 'practice' || this.mode === 'play') {
                    if (isCorrect) {
                        showFB('✓ Correct!','correct');
                        this.score++;
                        this.streak++;
                    } else {
                        showFB('Try again!','incorrect');
                        this.streak = 0;
                    }
                }

                if (this.mode === 'play') {
                    setTimeout(() => {
                        this.generateNewProblem();
                        this.answered = false;
                        this.timeLeft = 8;
                        this.render();
                    }, 400);
                } else {
                    this.render();
                }
            },

            nextProblem() {
                this.generateNewProblem();
                this.answered = false;
                this.render();
            },

            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    if (this.timeLeft <= 0) {
                        this.generateNewProblem();
                        this.answered = false;
                        this.timeLeft = 8;
                    }
                    this.render();
                }, 1000);
            },

            getTensAndOnes(num) {
                return { tens: Math.floor(num / 10), ones: num % 10 };
            },

            renderExplore() {
                const { addends, answer } = this.currentProblem;
                const [a, b] = addends;
                const { tens: aTens, ones: aOnes } = this.getTensAndOnes(a);
                const { tens: bTens, ones: bOnes } = this.getTensAndOnes(b);
                const { tens: resTens, ones: resOnes } = this.getTensAndOnes(answer);

                let algorithmHTML = '';
                let numberLineHTML = '';

                if (this.strategy === 'standard') {
                    const newOnes = aOnes + bOnes;
                    const carry = newOnes >= 10 ? 1 : 0;
                    const finalOnes = newOnes % 10;
                    const finalTens = aTens + bTens + carry;

                    algorithmHTML = `
                        <div class="algorithm-box">
                            <div class="algorithm-line">
                                <span>${String(a).padStart(2, ' ')}</span>
                            </div>
                            <div class="algorithm-line">
                                <span>+ ${String(b).padStart(1, ' ')}</span>
                            </div>
                            ${carry ? `<div class="algorithm-line"><span class="carry">${carry} </span><span style="color: var(--yellow);">← carry</span></div>` : ''}
                            <div class="algorithm-line algorithm-result">
                                <span>${String(answer).padStart(2, ' ')}</span>
                            </div>
                        </div>
                    `;
                } else if (this.strategy === 'decomp') {
                    numberLineHTML = `
                        <div class="number-line">
                            <div style="margin-bottom: 12px; color: var(--text); font-weight: 600;">Number Line: Break Apart & Jump</div>
                            <div class="number-line-visual">
                                <div style="width: 100%; position: relative; height: 100px; background: var(--bg2); border-radius: 4px; padding: 12px;">
                                    <div style="color: var(--text2); font-size: 12px; margin-bottom: 8px;">Start: ${a}</div>
                                    <div style="color: var(--cyan); font-size: 13px; font-weight: 600; margin: 8px 0;">Jump +${Math.floor(b/10)*10} = ${a + Math.floor(b/10)*10}</div>
                                    <div style="color: var(--pink); font-size: 13px; font-weight: 600;">Jump +${b % 10} = ${answer}</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (this.strategy === 'comp') {
                    algorithmHTML = `
                        <div class="algorithm-box">
                            <div style="font-size: 12px; color: var(--text2); margin-bottom: 12px;">49 is close to 50...</div>
                            <div class="algorithm-line">
                                <span>${a} + ${b}</span>
                            </div>
                            <div class="algorithm-line" style="color: var(--purple); font-size: 13px;">
                                <span>→ ${a + 1} + ${b - 1}</span>
                            </div>
                            <div class="algorithm-line algorithm-result">
                                <span>${answer}</span>
                            </div>
                        </div>
                    `;
                }

                const baseTenHTML = `
                    <div class="base-ten-block">
                        <div class="number-display">${a}</div>
                        <div class="base-ten-visual">
                            <div class="tens-group">
                                ${Array(aTens).fill(0).map(() => '<div class="tens-rod"></div>').join('')}
                                <div class="group-label">Tens</div>
                            </div>
                            <div class="ones-group">
                                ${Array(aOnes).fill(0).map(() => '<div class="ones-cube"></div>').join('')}
                                <div class="group-label">Ones</div>
                            </div>
                        </div>
                    </div>
                    <div style="font-size: 24px; color: var(--cyan); font-weight: 700;">+</div>
                    <div class="base-ten-block">
                        <div class="number-display">${b}</div>
                        <div class="base-ten-visual">
                            <div class="tens-group">
                                ${Array(bTens).fill(0).map(() => '<div class="tens-rod"></div>').join('')}
                                <div class="group-label">Tens</div>
                            </div>
                            <div class="ones-group">
                                ${Array(bOnes).fill(0).map(() => '<div class="ones-cube"></div>').join('')}
                                <div class="group-label">Ones</div>
                            </div>
                        </div>
                    </div>
                    <div style="font-size: 24px; color: var(--green); font-weight: 700;">=</div>
                    <div class="base-ten-block">
                        <div class="number-display">${answer}</div>
                        <div class="base-ten-visual">
                            <div class="tens-group">
                                ${Array(resTens).fill(0).map(() => '<div class="tens-rod"></div>').join('')}
                                <div class="group-label">Tens</div>
                            </div>
                            <div class="ones-group">
                                ${Array(resOnes).fill(0).map(() => '<div class="ones-cube"></div>').join('')}
                                <div class="group-label">Ones</div>
                            </div>
                        </div>
                    </div>
                `;

                return `
                    <div class="explore-container">
                        <div>${baseTenHTML}</div>
                        <div class="algorithm-side">
                            ${algorithmHTML}
                            ${numberLineHTML}
                        </div>
                    </div>
                `;
            },

            renderPractice() {
                const { addends, answer, choices } = this.currentProblem;
                const equation = addends.join(' + ');

                let scaffolding = '';
                if (this.difficulty === 'emergent') {
                    const { tens: t1, ones: o1 } = this.getTensAndOnes(addends[0]);
                    const { tens: t2, ones: o2 } = this.getTensAndOnes(addends[1]);
                    scaffolding = `<div class="scaffolding">Hint: ${addends[0]} has ${t1} tens and ${o1} ones. ${addends[1]} has ${t2} tens and ${o2} ones.</div>`;
                }

                return `
                    <div class="practice-container">
                        <div class="problem-display">
                            <div class="problem-text">What is the sum?</div>
                            <div class="equation">${equation}</div>
                            ${scaffolding}
                        </div>
                        <div class="choices-grid">
                            ${choices.map(choice => {
                                let classes = 'choice-btn';
                                if (this.answered) {
                                    if (choice === answer) {
                                        classes += ' correct';
                                    } else if (choice === this.currentProblem.selectedChoice) {
                                        classes += ' wrong';
                                    } else {
                                        classes += ' disabled';
                                    }
                                }
                                return `<button class="${classes}" ${this.answered ? 'disabled' : ''} onclick="S.selectAnswerPractice(${choice})">${choice}</button>`;
                            }).join('')}
                        </div>
                        ${this.answered ? `<button class="pill-btn" style="width: 100%; padding: 12px; cursor: pointer; background: var(--grad); color: var(--bg); border: none; font-weight: 600;" onclick="S.nextProblem()">Next</button>` : ''}
                    </div>
                `;
            },

            selectAnswerPractice(choice) {
                this.currentProblem.selectedChoice = choice;
                this.selectAnswer(choice);
            },

            renderPlay() {
                const { addends, answer, choices } = this.currentProblem;
                const equation = addends.join(' + ');
                const timerClass = this.timeLeft <= 3 ? 'warning' : '';

                return `
                    <div class="play-container">
                        <div class="score-header">
                            <div class="score-item">
                                <div class="score-label">Score</div>
                                <div class="score-value">${this.score}</div>
                            </div>
                            <div class="score-item">
                                <div class="score-label">Streak</div>
                                <div class="score-value">${this.streak}</div>
                            </div>
                        </div>
                        <div class="timer ${timerClass}">${this.timeLeft}s</div>
                        <div class="problem-display">
                            <div class="equation">${equation}</div>
                        </div>
                        <div class="choices-grid">
                            ${choices.map(choice => {
                                let classes = 'choice-btn';
                                if (this.answered) {
                                    if (choice === answer) {
                                        classes += ' correct';
                                    } else if (choice === this.currentProblem.selectedChoice) {
                                        classes += ' wrong';
                                    } else {
                                        classes += ' disabled';
                                    }
                                }
                                return `<button class="${classes}" ${this.answered ? 'disabled' : ''} onclick="S.selectAnswerPlay(${choice})">${choice}</button>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            },

            selectAnswerPlay(choice) {
                this.currentProblem.selectedChoice = choice;
                this.selectAnswer(choice);
            },

            renderPanel() {
                if (this.mode === 'explore') {
                    const strategies = [
                        { key: 'standard', label: 'Standard Algorithm', desc: 'Add ones, add tens, regroup if needed' },
                        { key: 'decomp', label: 'Number Line Jumps', desc: 'Break apart and jump on a number line' },
                        { key: 'comp', label: 'Compensation', desc: 'Adjust one number to make it easier' }
                    ];

                    return `
                        <div class="panel-title">Strategies</div>
                        <div class="strategy-buttons">
                            ${strategies.map(s => `
                                <button class="strategy-btn ${this.strategy === s.key ? 'active' : ''}" onclick="S.setStrategy('${s.key}')">
                                    <div style="font-weight: 600;">${s.label}</div>
                                    <div style="font-size: 11px; color: var(--muted); margin-top: 4px;">${s.desc}</div>
                                </button>
                            `).join('')}
                        </div>
                        <div class="panel-title" style="margin-top: 16px;">When to Use</div>
                        <div class="panel-section">
                            <strong>Standard Algorithm:</strong> Most reliable. Good for building fluency.
                        </div>
                        <div class="panel-section">
                            <strong>Number Line:</strong> Great for visualizing jumps. Helps with skip counting.
                        </div>
                        <div class="panel-section">
                            <strong>Compensation:</strong> Fast for numbers like 49+26. Makes mental math easier.
                        </div>
                    `;
                } else if (this.mode === 'practice') {
                    return `
                        <div class="panel-title">Problem ${this.problemIndex + 1}</div>
                        <div class="panel-section">
                            <strong>Difficulty:</strong> ${this.difficulty.charAt(0).toUpperCase() + this.difficulty.slice(1)}
                        </div>
                        <div class="panel-section">
                            <strong>Correct:</strong> ${this.score}
                        </div>
                        <div class="panel-title" style="margin-top: 16px;">Tips</div>
                        <div class="panel-section">
                            • Line up the tens and ones<br>
                            • Add ones first<br>
                            • If ones ≥ 10, make a new ten<br>
                            • Add all tens together
                        </div>
                    `;
                } else if (this.mode === 'play') {
                    return `
                        <div class="panel-title">Speed Round</div>
                        <div class="panel-section">
                            <strong>Score:</strong> ${this.score}<br>
                            <strong>Streak:</strong> ${this.streak}
                        </div>
                        <div class="panel-title" style="margin-top: 16px;">How to Play</div>
                        <div class="panel-section">
                            • Answer before timer ends<br>
                            • Each correct = +1 point<br>
                            • Break streak = reset counter<br>
                            • Get the longest streak!
                        </div>
                    `;
                }
            },

            render() {
                const diffGroup = document.getElementById('difficultyGroup');
                diffGroup.style.display = this.mode === 'explore' ? 'none' : 'flex';

                const modeBtns = document.querySelectorAll('.controls-row .pill-btn');
                modeBtns.forEach(btn => btn.classList.remove('active'));
                modeBtns[this.mode === 'explore' ? 0 : this.mode === 'practice' ? 1 : 2].classList.add('active');

                if (this.mode !== 'explore') {
                    const diffBtns = document.querySelectorAll('#difficultyGroup .pill-btn');
                    diffBtns.forEach(btn => btn.classList.remove('active'));
                    diffBtns[this.difficulty === 'emergent' ? 0 : this.difficulty === 'proficient' ? 1 : 2].classList.add('active');
                }

                const workspace = document.getElementById('workspace');
                const panel = document.getElementById('panel');

                if (this.mode === 'explore') {
                    workspace.innerHTML = this.renderExplore();
                } else if (this.mode === 'practice') {
                    workspace.innerHTML = this.renderPractice();
                } else if (this.mode === 'play') {
                    workspace.innerHTML = this.renderPlay();
                }

                panel.innerHTML = this.renderPanel();
            }
        };

        // Initialize
        window.addEventListener('load', () => S.init());
    </script>
