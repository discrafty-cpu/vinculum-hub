<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Unknown Factor Solver</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.vinculum-std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-mode-tab:hover { color: var(--text2); background: var(--card); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.vinculum-mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.vinculum-mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.vinculum-diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-diff-btn:hover { color: var(--text2); }
.vinculum-diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── UNKNOWN FACTOR CONTAINER ── */
.uf-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 600px;
}

/* Mystery box with equation */
.mystery-equation {
  text-align: center;
  padding: 32px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  width: 100%;
}

.mystery-box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 60px;
  height: 60px;
  border-radius: 12px;
  background: rgba(0,212,255,0.15);
  border: 3px dashed var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 900;
  color: var(--cyan);
  margin: 0 8px;
  position: relative;
}

.mystery-box.active {
  animation: pulse 1.5s infinite;
}

.equation-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 40px;
  font-weight: 900;
  color: var(--cyan);
  margin: 20px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.operator {
  color: var(--text2);
  font-size: 32px;
}

/* Visual array with hidden dimension */
.array-grid {
  display: inline-flex;
  flex-direction: column;
  gap: 6px;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  justify-content: center;
  align-items: center;
  min-width: 240px;
  min-height: 200px;
  position: relative;
}

.array-row {
  display: flex;
  gap: 6px;
}

.array-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
  animation: pop 0.3s ease-out;
}

.array-dot:hover {
  transform: scale(1.15);
}

.array-dot.row-0 { background: var(--cyan); color: var(--bg); }
.array-dot.row-1 { background: var(--green); color: var(--bg); }
.array-dot.row-2 { background: #F59E0B; color: var(--bg); }
.array-dot.row-3 { background: #EC4899; color: var(--bg); }
.array-dot.row-4 { background: var(--red); color: var(--bg); }

.array-dot.hidden {
  opacity: 0.15;
  background: var(--border);
}

/* Array info and connection display */
.connection-display {
  text-align: center;
  padding: 16px 20px;
  background: rgba(0,212,255,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
}

.connection-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text2);
  margin: 8px 0;
  line-height: 1.8;
}

.connection-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 600;
}

/* Slider for hidden dimension */
.slider-control {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
}

.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.control-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-width: 80px;
}

.control-slider {
  flex: 1;
  max-width: 200px;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.control-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  transition: all 0.2s;
}

.control-slider::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.control-value {
  font-size: 14px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  min-width: 40px;
  text-align: center;
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 12px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* Input fields */
.input-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 70px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* Fact family display */
.fact-family {
  text-align: center;
  padding: 16px;
  background: rgba(0,230,118,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
  margin-top: 12px;
}

.fact-family-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.fact-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text2);
  margin: 6px 0;
  font-weight: 500;
}

/* Game info */
.game-info {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.8; }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .array-grid {
    min-width: 180px;
    min-height: 180px;
    gap: 4px;
    padding: 12px;
  }
  .array-dot {
    width: 20px;
    height: 20px;
    font-size: 10px;
  }
  .side-panel {
    width: 220px;
  }
  .equation-display {
    font-size: 28px;
  }
  .mystery-box {
    width: 48px;
    height: 48px;
    font-size: 24px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Unknown Factor Solver</div>
    <span class="vinculum-header-badge">3 · OA</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">3.OA.4</span>
    <span class="vinculum-std-tag">3.OA.6</span>
    <span class="std-tag mn">MN 3.1.1.2</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">1–5</button>
    <button class="vinculum-diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">1–10</button>
    <button class="vinculum-diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">1–12</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure

  // Explore
  unknownPosition: 'first',  // first | middle | divisor
  knownFactor: 4,
  knownProduct: 20,
  unknownValue: 5,
  sliderVal: 5,
  displayMode: 'multi',  // multi | div

  // Practice
  questionType: null,   // solve-mult | solve-div | connection
  targetProduct: 0,
  targetKnown: 0,
  targetUnknown: 0,
  targetPosition: 'first',
  userAnswer: null,
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  gameEnded: false,
  challengeProduct: 0,
  challengeKnown: 0,
  challengeUnknown: 0,
  challengePosition: 'first'
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Finding the unknown factor means solving for the missing number.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getMaxFactor() {
  return { emergent: 5, developing: 10, secure: 12 }[S.diff];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getFactors(product) {
  const factors = [];
  for (let i = 1; i <= Math.sqrt(product); i++) {
    if (product % i === 0) {
      factors.push([i, product / i]);
      if (i !== product / i) {
        factors.push([product / i, i]);
      }
    }
  }
  return factors;
}

function generateExploreEquation() {
  const max = getMaxFactor();
  const positions = ['first', 'middle', 'divisor'];
  S.unknownPosition = positions[Math.floor(Math.random() * positions.length)];

  if (S.unknownPosition === 'divisor' && S.diff === 'emergent') {
    S.unknownPosition = 'first';
  }

  S.knownFactor = randInt(2, max);
  S.unknownValue = randInt(2, max);
  S.knownProduct = S.knownFactor * S.unknownValue;

  if (S.unknownPosition === 'middle') {
    S.knownFactor = S.unknownValue;
  } else if (S.unknownPosition === 'divisor') {
    S.displayMode = 'div';
  } else {
    S.displayMode = 'multi';
  }

  S.sliderVal = S.unknownValue;
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.gameEnded = false;
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'vinculum-mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'vinculum-mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.unknownPosition = 'first';
  S.knownFactor = 3;
  S.knownProduct = 12;
  S.unknownValue = 4;
  S.sliderVal = 4;
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  let html = '<div class="uf-container">';

  // Mystery equation box
  html += '<div class="mystery-equation">';
  html += '<div style="color:var(--muted);font-size:12px;margin-bottom:8px;">Find the Unknown Factor</div>';

  if (S.displayMode === 'multi') {
    if (S.unknownPosition === 'first') {
      html += `<div class="equation-display">
        <div class="mystery-box active">?</div>
        <span class="operator">×</span>
        <span style="color:var(--text);">${S.knownFactor}</span>
        <span class="operator">=</span>
        <span style="color:var(--green);">${S.knownProduct}</span>
      </div>`;
    } else {
      html += `<div class="equation-display">
        <span style="color:var(--text);">${S.knownFactor}</span>
        <span class="operator">×</span>
        <div class="mystery-box active">?</div>
        <span class="operator">=</span>
        <span style="color:var(--green);">${S.knownProduct}</span>
      </div>`;
    }
  } else {
    html += `<div class="equation-display">
      <span style="color:var(--green);">${S.knownProduct}</span>
      <span class="operator">÷</span>
      <div class="mystery-box active">?</div>
      <span class="operator">=</span>
      <span style="color:var(--text);">${S.knownFactor}</span>
    </div>`;
  }

  html += '</div>';

  // Visual array showing the unknown sliding
  html += '<div class="array-grid" id="arrayGrid">';
  const rows = S.displayMode === 'div' ? S.knownFactor : S.sliderVal;
  const cols = S.displayMode === 'div' ? S.sliderVal : S.knownFactor;

  for (let r = 0; r < rows; r++) {
    html += '<div class="array-row">';
    for (let c = 0; c < cols; c++) {
      html += `<div class="array-dot row-${r % 5}" style="animation-delay:${(r * cols + c) * 0.03}s;"></div>`;
    }
    html += '</div>';
  }
  html += '</div>';

  // Connection display
  html += '<div class="connection-display">';
  html += '<div class="connection-label">Multiplication & Division Connection</div>';

  if (S.displayMode === 'multi') {
    if (S.unknownPosition === 'first') {
      html += `<div class="connection-line"><strong>? × ${S.knownFactor} = ${S.knownProduct}</strong></div>`;
      html += `<div class="connection-line" style="color:var(--muted);">means</div>`;
      html += `<div class="connection-line"><strong>${S.knownProduct} ÷ ${S.knownFactor} = ?</strong></div>`;
    } else {
      html += `<div class="connection-line"><strong>${S.knownFactor} × ? = ${S.knownProduct}</strong></div>`;
      html += `<div class="connection-line" style="color:var(--muted);">means</div>`;
      html += `<div class="connection-line"><strong>${S.knownProduct} ÷ ${S.knownFactor} = ?</strong></div>`;
    }
  } else {
    html += `<div class="connection-line"><strong>${S.knownProduct} ÷ ? = ${S.knownFactor}</strong></div>`;
    html += `<div class="connection-line" style="color:var(--muted);">means</div>`;
    html += `<div class="connection-line"><strong>${S.knownFactor} × ? = ${S.knownProduct}</strong></div>`;
  }

  html += '</div>';

  // Slider to explore
  html += '<div class="slider-control">';
  html += `<div class="control-row">
    <label class="control-label">Unknown</label>
    <input type="range" min="1" max="${getMaxFactor()}" value="${S.sliderVal}" class="control-slider" id="sliderUnknown" oninput="updateSlider(this.value)">
    <span class="control-value" id="sliderValue">${S.sliderVal}</span>
  </div>`;
  html += '</div>';

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">What's Happening?</div>
      <div class="panel-text">
        A <strong>mystery box</strong> hides a number. You can see the <strong>known factor</strong> and the <strong>product</strong>.<br><br>
        Move the slider to find the <strong>missing number</strong> that makes the equation true!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">The Connection</div>
      <div class="panel-text">
        Multiplication and division are <strong>inverse operations</strong>. They're different ways of asking the same question!<br><br>
        <strong>? × 4 = 20</strong> is the same as <strong>20 ÷ 4 = ?</strong>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Toward Algebra</div>
      <div class="panel-text">
        This mystery box <strong>? is a variable</strong> — like <strong>x</strong> in algebra. <strong>Solving</strong> means finding what number makes the equation true!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standards</div>
      <div class="panel-text">
        <strong>3.OA.4</strong> — Determine unknown in multiplication<br><br>
        <strong>3.OA.6</strong> — Division as unknown-factor problem
      </div>
    </div>
  `;
}

function updateSlider(val) {
  S.sliderVal = parseInt(val);
  document.getElementById('sliderValue').textContent = S.sliderVal;
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  let html = '<div class="uf-container">';

  // Score
  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  const max = getMaxFactor();

  if (S.questionType === 'solve-mult') {
    // ? × known = product  OR  known × ? = product
    const isFirst = S.targetPosition === 'first';

    html += '<div class="mystery-equation">';
    if (isFirst) {
      html += `<div class="equation-display">
        <div class="mystery-box">?</div>
        <span class="operator">×</span>
        <span style="color:var(--text);">${S.targetKnown}</span>
        <span class="operator">=</span>
        <span style="color:var(--green);">${S.targetProduct}</span>
      </div>`;
    } else {
      html += `<div class="equation-display">
        <span style="color:var(--text);">${S.targetKnown}</span>
        <span class="operator">×</span>
        <div class="mystery-box">?</div>
        <span class="operator">=</span>
        <span style="color:var(--green);">${S.targetProduct}</span>
      </div>`;
    }
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">Find the unknown factor:</div>
      <div class="input-group">
        <div id="vi-container"></div>
        <button class="play-btn primary" onclick="submitPracticeAnswer(${S.targetUnknown})">✓ Check</button>
      </div>
    </div>`;

    // Show fact family after answering
    if (S.userAnswer !== null && S.userAnswer === S.targetUnknown) {
      html += `<div class="fact-family">
        <div class="fact-family-title">Related Facts</div>
        <div class="fact-line">${S.targetKnown} × ${S.targetUnknown} = ${S.targetProduct}</div>
        <div class="fact-line">${S.targetUnknown} × ${S.targetKnown} = ${S.targetProduct}</div>
        <div class="fact-line">${S.targetProduct} ÷ ${S.targetKnown} = ${S.targetUnknown}</div>
        <div class="fact-line">${S.targetProduct} ÷ ${S.targetUnknown} = ${S.targetKnown}</div>
      </div>`;
    }

  } else if (S.questionType === 'solve-div') {
    // product ÷ ? = known
    html += '<div class="mystery-equation">';
    html += `<div class="equation-display">
      <span style="color:var(--green);">${S.targetProduct}</span>
      <span class="operator">÷</span>
      <div class="mystery-box">?</div>
      <span class="operator">=</span>
      <span style="color:var(--text);">${S.targetKnown}</span>
    </div>`;
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">Find the unknown divisor:</div>
      <div class="input-group">
        <div id="vi-container"></div>
        <button class="play-btn primary" onclick="submitPracticeAnswer(${S.targetUnknown})">✓ Check</button>
      </div>
    </div>`;

    if (S.userAnswer !== null && S.userAnswer === S.targetUnknown) {
      html += `<div class="fact-family">
        <div class="fact-family-title">Related Facts</div>
        <div class="fact-line">${S.targetKnown} × ${S.targetUnknown} = ${S.targetProduct}</div>
        <div class="fact-line">${S.targetUnknown} × ${S.targetKnown} = ${S.targetProduct}</div>
        <div class="fact-line">${S.targetProduct} ÷ ${S.targetKnown} = ${S.targetUnknown}</div>
        <div class="fact-line">${S.targetProduct} ÷ ${S.targetUnknown} = ${S.targetKnown}</div>
      </div>`;
    }

  } else if (S.questionType === 'connection') {
    // Show multiplication, ask for division
    html += `<div class="practice-question">
      <div class="question-text">Given this multiplication fact:</div>
      <div class="question-highlight">${S.targetUnknown} × ${S.targetKnown} = ${S.targetProduct}</div>
      <div style="margin-top:16px;font-size:13px;color:var(--text2);">Find the answer to:</div>
      <div class="question-highlight" style="font-size:24px;color:var(--cyan);">${S.targetProduct} ÷ ${S.targetKnown} = ?</div>
      <div class="input-group">
        <div id="vi-container"></div>
        <button class="play-btn primary" onclick="submitPracticeAnswer(${S.targetUnknown})">✓ Check</button>
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  setTimeout(() => {
    var vi = VinculumInput.create(document.getElementById('vi-container'), {
      type: 'auto',
      answer: S.targetUnknown,
      onSubmit: function(value) { submitPracticeAnswer(S.targetUnknown, value); }
    });
  }, 50);

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Your Task</div>
      <div class="panel-text">
        ${S.questionType === 'solve-mult' ? 'Solve the multiplication equation for the unknown factor.' : ''}
        ${S.questionType === 'solve-div' ? 'Solve the division equation for the unknown divisor.' : ''}
        ${S.questionType === 'connection' ? 'Use the multiplication fact to solve the division problem.' : ''}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        ${S.questionType === 'solve-mult' ? 'Ask: "What number times ' + S.targetKnown + ' equals ' + S.targetProduct + '?"' : ''}
        ${S.questionType === 'solve-div' ? 'Ask: "What number times ' + S.targetKnown + ' equals ' + S.targetProduct + '?"' : ''}
        ${S.questionType === 'connection' ? 'Division "undoes" multiplication. Use the fact you know!' : ''}
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;

  const max = getMaxFactor();
  const types = ['solve-mult', 'solve-div', 'connection'];

  S.questionType = types[Math.floor(Math.random() * types.length)];

  // Generate numbers
  S.targetUnknown = randInt(2, max);
  S.targetKnown = randInt(2, max);
  S.targetProduct = S.targetUnknown * S.targetKnown;

  // Position for multiplication
  S.targetPosition = Math.random() > 0.5 ? 'first' : 'middle';

  S.userAnswer = null;
}

function submitPracticeAnswer(correct, value) {
  const val = value !== undefined ? value : parseInt(document.getElementById('answerInput')?.value || 0);

  if (val === correct) {
    showFB('✓ Correct!', 'correct');
    S.userAnswer = val;
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 1200);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  let html = '<div class="uf-container">';

  const max = getMaxFactor();

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Challenge Complete!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Round</span>
        <span>${S.playRound} / 10</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🔥 Streak</span>
        <span>${S.playStreak}</span>
      </div>
    </div>`;

    // Challenge equation
    const isFirst = S.challengePosition === 'first';
    const isDiv = S.challengePosition === 'divisor';

    html += '<div class="mystery-equation">';
    if (isDiv) {
      html += `<div class="equation-display">
        <span style="color:var(--green);">${S.challengeProduct}</span>
        <span class="operator">÷</span>
        <div class="mystery-box">?</div>
        <span class="operator">=</span>
        <span style="color:var(--text);">${S.challengeKnown}</span>
      </div>`;
    } else if (isFirst) {
      html += `<div class="equation-display">
        <div class="mystery-box">?</div>
        <span class="operator">×</span>
        <span style="color:var(--text);">${S.challengeKnown}</span>
        <span class="operator">=</span>
        <span style="color:var(--green);">${S.challengeProduct}</span>
      </div>`;
    } else {
      html += `<div class="equation-display">
        <span style="color:var(--text);">${S.challengeKnown}</span>
        <span class="operator">×</span>
        <div class="mystery-box">?</div>
        <span class="operator">=</span>
        <span style="color:var(--green);">${S.challengeProduct}</span>
      </div>`;
    }
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">Solve for the unknown:</div>
      <div class="input-group">
        <div id="vi-play-container"></div>
        <button class="play-btn primary" onclick="submitPlayAnswer()">✓</button>
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  if (!S.gameEnded) {
    setTimeout(() => {
      var vi = VinculumInput.create(document.getElementById('vi-play-container'), {
        type: 'auto',
        answer: S.challengeUnknown,
        onSubmit: function(value) { submitPlayAnswer(value); }
      });
    }, 50);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 10, 100)}%;"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        Each round shows an equation with a <strong>hidden number</strong>.<br><br>
        <strong>Solve for ?</strong> as fast as you can!<br><br>
        Build your <strong>streak</strong> with consecutive correct answers.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Base: <strong>10 points</strong><br>
        Streak bonus: <strong>+2 × streak</strong><br>
        <strong>Max: 30 pts/round</strong>
      </div>
    </div>
  `;
}

function startPlayChallenge() {
  const max = getMaxFactor();
  const positions = ['first', 'middle', 'divisor'];

  S.challengePosition = positions[Math.floor(Math.random() * positions.length)];

  // emergent level: only multiplication, first position
  if (S.diff === 'emergent') {
    S.challengePosition = 'first';
  }

  S.challengeUnknown = randInt(2, max);
  S.challengeKnown = randInt(2, max);
  S.challengeProduct = S.challengeUnknown * S.challengeKnown;
}

function submitPlayAnswer(value) {
  const val = value !== undefined ? value : parseInt(document.getElementById('playAnswer')?.value || 0);

  if (val === S.challengeUnknown) {
    showFB('✓ Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 2);
    S.playStreak++;
    S.playRound++;

    if (S.playRound > 10) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      setTimeout(() => {
        startPlayChallenge();
        render();
      }, 800);
    }
  } else {
    showFB('✗ Try again', 'incorrect');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  startPlayChallenge();
  render();
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
generateExploreEquation();
render();
</script>
