<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Fractions on a Number Line</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

/* ── MODE TABS ── */
.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-mode-tab:hover { color: var(--text2); background: var(--card); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.vinculum-mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.vinculum-mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.vinculum-diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-diff-btn:hover { color: var(--text2); }
.vinculum-diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── NUMBER LINE CONTAINER ── */
.number-line-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 700px;
}

.number-line-wrapper {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.number-line {
  position: relative;
  width: 100%;
  height: 120px;
  background: var(--card);
  border-radius: 12px;
  border: 2px solid var(--border);
  padding: 30px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.number-line-svg {
  width: 100%;
  height: 60px;
  position: relative;
}

.number-line-line {
  stroke: var(--text2);
  stroke-width: 3;
}

.number-line-tick {
  stroke: var(--text2);
  stroke-width: 2;
}

.number-line-tick.major {
  stroke-width: 3;
  stroke: var(--text);
}

.number-line-label {
  font-size: 12px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  fill: var(--text2);
  text-anchor: middle;
}

.number-line-label.major {
  font-size: 14px;
  font-weight: 800;
  fill: var(--text);
}

.number-line-tick-label {
  font-size: 10px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  fill: var(--cyan);
  text-anchor: middle;
  cursor: pointer;
  transition: fill 0.2s;
}

.number-line-tick-label:hover {
  fill: var(--green);
  font-weight: 800;
}

.number-line-tick-label.highlighted {
  fill: var(--green);
  font-weight: 800;
  font-size: 11px;
}

.marker {
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--cyan);
  border: 3px solid var(--bg);
  border-radius: 50%;
  cursor: grab;
  top: 52%;
  transform: translate(-50%, -50%);
  z-index: 100;
  transition: all 0.1s;
  box-shadow: 0 0 8px rgba(0,212,255,0.4);
}

.marker:hover {
  transform: translate(-50%, -50%) scale(1.2);
}

.marker.dragging {
  cursor: grabbing;
  box-shadow: 0 0 16px rgba(0,212,255,0.8);
  transform: translate(-50%, -50%) scale(1.3);
}

/* Partition buttons */
.partition-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  border: 2px solid var(--border);
}

.partition-btn {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.partition-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

.partition-btn.active {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.15);
  color: var(--cyan);
}

/* Fraction bar reference */
.fraction-bar-ref {
  width: 100%;
  height: 40px;
  display: flex;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: transparent;
}

.bar-part {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 2px solid var(--border);
  background: rgba(0,212,255,0.1);
  color: white;
  font-weight: 700;
  font-size: 11px;
}

.bar-part:last-child {
  border-right: none;
}

.bar-part.shaded {
  background: var(--cyan);
  color: var(--bg);
  font-weight: 800;
}

.fraction-display {
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text2);
  margin-top: 8px;
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 8px 0;
}

/* Answer buttons */
.answer-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
  max-width: 400px;
  width: 100%;
}

.answer-btn {
  padding: 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}

.answer-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}

.answer-btn.correct-flash {
  border-color: var(--green);
  background: rgba(0,230,118,0.15);
  color: var(--green);
}

.answer-btn.incorrect-flash {
  border-color: var(--pink);
  background: rgba(255,59,139,0.15);
  color: var(--pink);
}

/* Game info */
.game-info {
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Play controls */
.play-controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .side-panel {
    width: 220px;
  }
  .number-line-container {
    max-width: 100%;
  }
  .number-line {
    padding: 25px 16px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Fractions on a Number Line</div>
    <span class="vinculum-header-badge">3 · NF</span>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">3.NF.2a</span>
    <span class="vinculum-std-tag">3.NF.2b</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">Emergent</button>
    <button class="vinculum-diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">Developing</button>
    <button class="vinculum-diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">Secure</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>

const S = {
  mode: 'explore',
  diff: 'emergent',
  score: 0,
  total: 0,

  // Explore
  activeDenom: null,
  activeTick: null,
  markerPos: 0.5,

  // Practice
  questionType: null,
  targetFraction: null,
  targetFraction2: null,
  markerFraction: null,

  // Play
  gameRound: 0,
  gameScore: 0,
  gameStreak: 0,
  gameEnded: false,
  placementTarget: null,
  placementAttempt: 0,
  playMarkerPos: 0
};

function getDenominators() {
  if (S.diff === 'emergent') return [2, 4];
  if (S.diff === 'developing') return [2, 3, 4, 6];
  return [2, 3, 4, 6, 8];
}

function getRange() {
  return S.diff === 'secure' ? 2 : 1;
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function setMode(mode) {
  S.mode = mode;
  S.activeDenom = null;
  S.activeTick = null;
  S.markerPos = 0.5;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.gameRound === 0) {
    S.gameScore = 0;
    S.gameStreak = 0;
    S.gameRound = 1;
    S.gameEnded = false;
    newPlayRound();
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'vinculum-mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'vinculum-mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.score = 0;
  S.total = 0;
  S.activeDenom = null;
  S.activeTick = null;
  S.gameScore = 0;
  S.gameStreak = 0;
  S.gameRound = 0;
  S.gameEnded = false;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  const denoms = getDenominators();
  const range = getRange();

  let html = '<div class="number-line-container">';

  // Number line
  html += '<div class="number-line-wrapper">';
  html += '<div class="number-line" id="numberLineArea">';
  html += renderNumberLine(S.activeDenom, S.activeTick, S.markerPos, range);
  html += '</div>';

  // Reference bar if denom selected
  if (S.activeDenom) {
    html += '<div style="width:100%;padding:0 20px;">';
    html += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Fraction Bar Reference</div>';
    html += '<div class="fraction-bar-ref">';
    for (let i = 0; i < S.activeDenom; i++) {
      const isShaded = S.activeTick !== null && i < S.activeTick;
      html += '<div class="bar-part' + (isShaded ? ' shaded' : '') + '"></div>';
    }
    html += '</div>';
    if (S.activeTick !== null) {
      html += '<div class="fraction-display">' + S.activeTick + '/' + S.activeDenom + '</div>';
    }
    html += '</div>';
  }

  html += '</div>';

  // Partition buttons
  html += '<div class="partition-buttons">';
  denoms.forEach(d => {
    const isActive = S.activeDenom === d;
    html += '<button class="partition-btn' + (isActive ? ' active' : '') + '" onclick="setActiveDenom(' + d + ')">÷ ' + d + '</button>';
  });
  html += '</div>';

  html += '</div>';
  ws.innerHTML = html;

  // Setup drag after render
  setTimeout(() => {
    const marker = document.querySelector('.marker');
    if (marker) setupMarkerDrag(marker);
  }, 0);

  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">Fractions on a Number Line</div>
      <div class="panel-text">
        Fractions are numbers! They live on the number line between 0 and 1 (and beyond).
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Explore</div>
      <div class="panel-text">
        <strong>1.</strong> Tap a ÷ button to partition the line<br><br>
        <strong>2.</strong> Tap tick marks to label them<br><br>
        <strong>3.</strong> Drag the marker to see positions
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Try This</div>
      <div class="panel-text">
        Where is <strong>1/2</strong>? Where is <strong>3/4</strong>? Notice: <strong>2/2 = 1</strong> and <strong>4/4 = 1</strong>.
      </div>
    </div>
  `;
}

function renderNumberLine(denom, activeTick, markerPos, maxRange) {
  const tickCount = denom ? denom + 1 : 2;
  const svgWidth = 500;
  const margin = 30;
  const lineWidth = svgWidth - margin * 2;

  let svg = '<svg class="number-line-svg" viewBox="0 0 ' + svgWidth + ' 60">';

  // Main line
  svg += '<line x1="' + margin + '" y1="30" x2="' + (svgWidth - margin) + '" y2="30" class="number-line-line" />';

  // Ticks and labels
  for (let i = 0; i < tickCount; i++) {
    const x = margin + (lineWidth / (tickCount - 1)) * i;
    const isMajor = i === 0 || i === tickCount - 1;
    const fracValue = i / (tickCount - 1) * maxRange;

    const label = maxRange === 1
      ? i + '/' + (tickCount - 1)
      : (i === 0 ? '0' : i + '/' + (tickCount - 1));

    if (isMajor) {
      svg += '<line x1="' + x + '" y1="22" x2="' + x + '" y2="38" class="number-line-tick major" />';
      svg += '<text x="' + x + '" y="50" class="number-line-label major">' + (i === tickCount - 1 ? maxRange : i) + '</text>';
    } else if (denom) {
      svg += '<line x1="' + x + '" y1="24" x2="' + x + '" y2="36" class="number-line-tick" />';
      const isHighlighted = activeTick === i;
      svg += '<text x="' + x + '" y="15" class="number-line-tick-label' + (isHighlighted ? ' highlighted' : '') + '" onclick="setActiveTick(' + i + ')" role="button" tabindex="0">' + i + '/' + denom + '</text>';
    }
  }

  svg += '</svg>';
  svg += '<div class="marker" style="left:' + ((markerPos * lineWidth + margin) / svgWidth * 100) + '%;"></div>';

  return svg;
}

function setActiveDenom(d) {
  S.activeDenom = S.activeDenom === d ? null : d;
  S.activeTick = null;
  render();
}

function setActiveTick(tick) {
  S.activeTick = S.activeTick === tick ? null : tick;
  render();
}

function setupMarkerDrag(marker) {
  let isDragging = false;

  marker.addEventListener('mousedown', () => {
    isDragging = true;
    marker.classList.add('dragging');
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging || !S.activeDenom) return;
    const area = document.getElementById('numberLineArea');
    if (!area) return;
    const rect = area.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const margin = 30 / 500 * rect.width;
    const lineWidth = rect.width - margin * 2;
    const pos = Math.max(0, Math.min(1, (x - margin) / lineWidth));
    S.markerPos = pos;
    render();
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    marker?.classList.remove('dragging');
  });

  marker.addEventListener('touchstart', () => {
    isDragging = true;
    marker.classList.add('dragging');
  });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging || !S.activeDenom) return;
    const area = document.getElementById('numberLineArea');
    if (!area) return;
    const rect = area.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const margin = 30 / 500 * rect.width;
    const lineWidth = rect.width - margin * 2;
    const pos = Math.max(0, Math.min(1, (x - margin) / lineWidth));
    S.markerPos = pos;
    render();
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
    marker?.classList.remove('dragging');
  });
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  const denoms = getDenominators();
  const range = getRange();

  let html = '<div class="number-line-container">';

  // Score
  html += '<div style="text-align:center;margin-bottom:12px;">';
  html += '<div style="font-size:14px;color:var(--muted);">⭐ ' + S.score + '/' + S.total + '</div>';
  html += '</div>';

  if (S.questionType === 'place') {
    // Place a fraction on the line
    const frac = S.targetFraction;
    const targetPos = frac.num / frac.denom;

    html += '<div class="practice-question" style="margin-bottom:20px;">';
    html += '<div class="question-text">Place on the number line:</div>';
    html += '<div class="question-highlight">' + frac.num + '/' + frac.denom + '</div>';
    html += '</div>';

    html += '<div class="number-line-wrapper">';
    html += '<div class="number-line" id="practiceNumberLine">';
    html += renderNumberLine(frac.denom, null, S.markerFraction ? S.markerFraction.pos : 0.5, range);
    html += '</div>';
    html += '</div>';

    html += '<div class="play-controls">';
    html += '<button class="play-btn primary" onclick="checkPlacement()">✓ Check</button>';
    html += '</div>';

  } else if (S.questionType === 'identify') {
    // Identify a fraction from position
    const frac = S.targetFraction;

    html += '<div class="practice-question" style="margin-bottom:20px;">';
    html += '<div class="question-text">What fraction is marked?</div>';
    html += '</div>';

    html += '<div class="number-line-wrapper">';
    html += '<div class="number-line" id="identifyNumberLine">';
    html += renderNumberLine(frac.denom, null, frac.num / frac.denom, range);
    html += '</div>';
    html += '</div>';

    html += '<div class="answer-grid">';
    for (let i = 1; i <= frac.denom; i++) {
      const isCorrect = i === frac.num;
      html += '<button class="answer-btn" onclick="practiceAnswer(' + i + ',' + frac.denom + ',' + isCorrect + ')">' + i + '/' + frac.denom + '</button>';
    }
    html += '</div>';

  } else if (S.questionType === 'compare') {
    // Compare two fractions
    const f1 = S.targetFraction;
    const f2 = S.targetFraction2;

    html += '<div class="practice-question" style="margin-bottom:20px;">';
    html += '<div class="question-text">Which is greater?</div>';
    html += '</div>';

    html += '<div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;width:100%;max-width:500px;margin-bottom:20px;">';

    [f1, f2].forEach((frac, idx) => {
      const pos = frac.num / frac.denom;
      const isCorrect = f1.num / f1.denom > f2.num / f2.denom ? (idx === 0 ? 1 : 0) : (idx === 0 ? 0 : 1);

      html += '<div style="flex:1;min-width:200px;">';
      html += '<div class="number-line" style="margin-bottom:12px;height:100px;" id="compareLine' + idx + '">';
      html += renderNumberLine(Math.max(frac.denom, 1), null, pos, range);
      html += '</div>';
      html += '<button class="answer-btn" onclick="practiceAnswer(' + frac.num + ',' + frac.denom + ',' + isCorrect + ')" style="width:100%;">' + frac.num + '/' + frac.denom + '</button>';
      html += '</div>';
    });

    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  setTimeout(() => {
    const marker = document.querySelector('.marker');
    if (marker && S.questionType === 'place') setupMarkerDrag(marker);
  }, 0);

  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        Read the question and use the number line to help you.<br><br>
        Remember: the denominator tells you how many parts, and the numerator tells you how many of those parts.
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total++;
  const denoms = getDenominators();
  const range = getRange();
  const types = ['place', 'identify', 'compare'];

  S.questionType = types[Math.floor(Math.random() * types.length)];
  S.markerFraction = null;

  if (S.questionType === 'place') {
    const denom = denoms[Math.floor(Math.random() * denoms.length)];
    const maxNum = Math.min(denom * range - 1, denom + 2);
    const num = randInt(1, maxNum);
    S.targetFraction = {num: num, denom: denom};
    S.markerFraction = {pos: 0.5};
  } else if (S.questionType === 'identify') {
    const denom = denoms[Math.floor(Math.random() * denoms.length)];
    const num = randInt(1, Math.min(denom - 1, range * denom - 1));
    S.targetFraction = {num: num, denom: denom};
  } else if (S.questionType === 'compare') {
    const d1 = denoms[Math.floor(Math.random() * denoms.length)];
    const d2 = denoms[Math.floor(Math.random() * denoms.length)];
    const n1 = randInt(1, Math.min(d1 - 1, 2));
    const n2 = randInt(1, Math.min(d2 - 1, 2));
    S.targetFraction = {num: n1, denom: d1};
    S.targetFraction2 = {num: n2, denom: d2};
  }
}

function checkPlacement() {
  const target = S.targetFraction.num / S.targetFraction.denom;
  const tolerance = 1 / (S.targetFraction.denom * 2);
  const diff = Math.abs(S.markerPos - target);

  if (diff <= tolerance) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'try-again');
  }
}

function practiceAnswer(num, denom, isCorrect) {
  if (isCorrect) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

// ─── PLAY MODE ───
function newPlayRound() {
  const denoms = getDenominators();
  const range = getRange();

  const maxNum = Math.min(denoms[denoms.length - 1] * range - 1, denoms[denoms.length - 1] + 3);
  const denom = denoms[Math.floor(Math.random() * denoms.length)];
  const num = randInt(1, maxNum);

  S.placementTarget = {num: num, denom: denom};
  S.playMarkerPos = 0.5;
  S.placementAttempt = 0;
}

function renderPlay(ws, sp) {
  const range = getRange();

  let html = '<div class="number-line-container">';

  if (S.gameEnded) {
    html += '<div style="text-align:center;padding:40px;">';
    html += '<div style="font-size:32px;font-weight:800;margin-bottom:20px;">Game Over!</div>';
    html += '<div style="font-size:48px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0;">' + S.gameScore + '</div>';
    html += '<button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>';
    html += '</div>';
  } else {
    html += '<div class="game-info">';
    html += '<div class="info-item"><span class="info-label">Round</span><span>' + S.gameRound + '/12</span></div>';
    html += '<div class="info-item"><span class="info-label">Score</span><span>⭐ ' + S.gameScore + '</span></div>';
    html += '</div>';

    html += '<div class="practice-question" style="margin-bottom:20px;">';
    html += '<div class="question-text">Place this fraction:</div>';
    html += '<div class="question-highlight">' + S.placementTarget.num + '/' + S.placementTarget.denom + '</div>';
    html += '</div>';

    html += '<div class="number-line-wrapper">';
    html += '<div class="number-line" id="playNumberLine">';
    html += renderNumberLine(S.placementTarget.denom, null, S.playMarkerPos, range);
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  setTimeout(() => {
    const marker = document.querySelector('.marker');
    if (marker && !S.gameEnded) setupPlayMarkerDrag(marker);
  }, 0);

  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.gameScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Place It!</div>
      <div class="panel-text">
        Drag the marker to place each fraction on the number line.<br><br>
        <strong>12 rounds</strong> • Be accurate!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Accurate placement = +10 points
      </div>
    </div>
  `;
}

function setupPlayMarkerDrag(marker) {
  let isDragging = false;

  const finishRound = () => {
    if (!isDragging) return;
    isDragging = false;
    marker?.classList.remove('dragging');

    const target = S.placementTarget.num / S.placementTarget.denom;
    const tolerance = 1 / (S.placementTarget.denom * 2);
    const diff = Math.abs(S.playMarkerPos - target);

    if (diff <= tolerance) {
      showFB('✓ Correct!', 'correct');
      S.gameScore += 10;
      S.gameRound++;

      if (S.gameRound > 12) {
        S.gameEnded = true;
      } else {
        newPlayRound();
      }

      setTimeout(() => render(), 800);
    } else {
      showFB('✗ Close...', 'try-again');
    }
  };

  marker.addEventListener('mousedown', () => {
    isDragging = true;
    marker.classList.add('dragging');
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const area = document.getElementById('playNumberLine');
    if (!area) return;
    const rect = area.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const margin = 30 / 500 * rect.width;
    const lineWidth = rect.width - margin * 2;
    const pos = Math.max(0, Math.min(getRange(), (x - margin) / lineWidth * getRange()));
    S.playMarkerPos = pos;
    render();
  });

  document.addEventListener('mouseup', finishRound);

  marker.addEventListener('touchstart', () => {
    isDragging = true;
    marker.classList.add('dragging');
  });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const area = document.getElementById('playNumberLine');
    if (!area) return;
    const rect = area.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const margin = 30 / 500 * rect.width;
    const lineWidth = rect.width - margin * 2;
    const pos = Math.max(0, Math.min(getRange(), (x - margin) / lineWidth * getRange()));
    S.playMarkerPos = pos;
    render();
  });

  document.addEventListener('touchend', finishRound);
}

function playAgain() {
  S.gameScore = 0;
  S.gameRound = 1;
  S.gameEnded = false;
  newPlayRound();
  render();
}

render();
</script>
