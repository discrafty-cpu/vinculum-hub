<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Two-Step Word Problems</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.back-btn:hover { background: var(--card); color: var(--cyan); }
.header-title {
  font-size: 18px;
  font-weight: 800;
}
.header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.std-tags {
  display: flex;
  gap: 6px;
}
.std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.mode-tab:hover { color: var(--text2); background: var(--card); }
.mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.diff-btn:hover { color: var(--text2); }
.diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── PROBLEM CARD ── */
.problem-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 650px;
}

.problem-card {
  padding: 24px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  width: 100%;
  text-align: center;
  min-height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.problem-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.6;
  color: var(--text2);
}

/* Step breakdown */
.step-breakdown {
  width: 100%;
  padding: 20px;
  background: rgba(0,212,255,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.step-item {
  padding: 16px;
  margin-bottom: 12px;
  background: var(--card);
  border-radius: 10px;
  border-left: 4px solid var(--cyan);
  text-align: left;
}

.step-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 6px;
}

.step-text {
  font-size: 15px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 8px;
}

.step-equation {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--cyan);
  margin-top: 8px;
}

.step-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--cyan);
  opacity: 0.7;
}

.dot.remove {
  opacity: 0.3;
  text-decoration: line-through;
}

/* Navigation buttons */
.nav-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  width: 100%;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* Operation buttons */
.op-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 12px 0;
}

.op-btn {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 50px;
}

.op-btn:hover { border-color: var(--cyan); color: var(--cyan); }

.op-btn.selected {
  background: var(--cyan);
  color: var(--bg);
  border-color: var(--cyan);
}

/* Input fields */
.input-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 70px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

.letter-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 50px;
  transition: all 0.2s;
  text-transform: uppercase;
}

.letter-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* Game info */
.game-info {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .problem-card {
    min-height: 120px;
  }
  .problem-text {
    font-size: 16px;
  }
  .side-panel {
    width: 220px;
  }
  .step-equation {
    font-size: 14px;
  }
}
</style>
</head>

<div class="mode-tabs">

    <button class="diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">1-50</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',
  diff: 'emergent',

  // Explore
  currentProblem: 0,

  // Practice
  problemIndex: 0,
  score: 0,

    },
    {
      text: "Sophia has 48 stickers. She arranges them in 6 equal rows. Then uses 3 rows for her scrapbook. How many used?",
      step1: { text: "Stickers per row (48 ÷ 6)", op: "÷", a: 48, b: 6, result: 8 },
      step2: { text: "3 rows used (3 × 8)", op: "×", a: 3, b: 8, result: 24 }
    },
    {
      text: "A bakery made 72 cupcakes for a party. They're divided equally into 8 boxes. 3 boxes are strawberry. How many strawberry cupcakes?",
      step1: { text: "Cupcakes per box (72 ÷ 8)", op: "÷", a: 72, b: 8, result: 9 },
      step2: { text: "3 boxes of strawberry (3 × 9)", op: "×", a: 3, b: 9, result: 27 }
    },
    {
      text: "A store has 5 shelves with 20 action figures each. Customers buy 35 figures. How many remain?",
      step1: { text: "Total action figures (5 × 20)", op: "×", a: 5, b: 20, result: 100 },
      step2: { text: "Customers buy 35", op: "−", a: 100, b: 35, result: 65 }
    },
    {
      text: "A teacher has 144 pencils to distribute equally among 9 students. Later, 2 more students join. How many pencils per student now?",
      step1: { text: "Originally 9 students get (144 ÷ 9)", op: "÷", a: 144, b: 9, result: 16 },
      step2: { text: "Now 11 students total; each gets (144 ÷ 11)", op: "÷", a: 144, b: 11, result: 13 }
    },
    {
      text: "Miguel has 4 dozen eggs (48 total). He sells 2 dozen and uses 6 for baking. How many eggs left?",
      step1: { text: "He sells 24 eggs", op: "−", a: 48, b: 24, result: 24 },

    },
    {

      step1: { text: "Total items (6 × 25)", op: "×", a: 6, b: 25, result: 150 },

    },
    {
      text: "A library has 96 books to organize into 8 equal sections. Then adds 24 more books equally. How many per section now?",
      step1: { text: "Original books per section (96 ÷ 8)", op: "÷", a: 96, b: 8, result: 12 },
      step2: { text: "Add 24 books; new total (120 ÷ 8)", op: "÷", a: 120, b: 8, result: 15 }
    }
  ]
};

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getMaxValue() {
  return { emergent: 10, developing: 20, secure: 50 }[S.diff];
}

function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Two-step problems need careful reading.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'practice') {
    S.score = 0;
    S.total = 0;
    S.problemIndex = 0;
  }

  if (mode === 'play') {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.gameEnded = false;
    generatePlayProblems();
  }

  document.querySelectorAll('.mode-tab').forEach(t => t.className = 'mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.score = 0;
  S.total = 0;
  S.problemIndex = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;
  S.gameEnded = false;

  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  const problems = PROBLEMS[S.diff];
  const p = problems[S.currentProblem % problems.length];

  let html = '<div class="problem-container">';

  // Problem card
  html += `<div class="problem-card"><div class="problem-text">${p.text}</div></div>`;

  // Step breakdown
  html += '<div class="step-breakdown">';

  // Step 1
  const step1Highlight = S.currentStep >= 0;
  html += `<div class="step-item" style="border-left-color: ${step1Highlight ? 'var(--cyan)' : 'var(--border)'}; opacity: ${step1Highlight ? '1' : '0.6'};">
    <div class="step-label">Step 1</div>
    <div class="step-text">${p.step1.text}</div>
    <div class="step-equation">${p.step1.a} ${p.step1.op} ${p.step1.b} = ${p.step1.result}</div>
  </div>`;

  // Step 2
  const step2Highlight = S.currentStep >= 1;
  html += `<div class="step-item" style="border-left-color: ${step2Highlight ? 'var(--green)' : 'var(--border)'}; opacity: ${step2Highlight ? '1' : '0.6'};">
    <div class="step-label">Step 2</div>
    <div class="step-text">${p.step2.text}</div>
    <div class="step-equation">${p.step2.a} ${p.step2.op} ${p.step2.b} = ${p.step2.result}</div>
  </div>`;

  html += '</div>';

  // Navigation buttons
  html += '<div class="nav-buttons">';
  if (S.currentStep < 1) {
    html += '<button class="play-btn primary" onclick="nextStep()">Next Step ▶</button>';
  } else {
    html += '<button class="play-btn" onclick="previousStep()">◀ Back</button>';
    html += '<button class="play-btn primary" onclick="nextProblem()">Next Problem ▶</button>';
  }
  html += '</div>';

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">How To Read</div>
      <div class="panel-text">
        <strong>Two-step problems</strong> need <strong>TWO calculations</strong>. Read carefully to find both!<br><br>
        First, look for the <strong>first calculation</strong>. Then use that answer in the <strong>second calculation</strong>.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Key Words</div>
      <div class="panel-text">
        <strong>Add (+):</strong> more, total, altogether<br><br>
        <strong>Subtract (−):</strong> left, away, give, lose<br><br>
        <strong>Multiply (×):</strong> groups, each, times<br><br>
        <strong>Divide (÷):</strong> share, equal, each
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standards</div>
      <div class="panel-text">
        <strong>3.OA.8</strong> — Solve two-step word problems<br><br>
        <strong>3.MD.3</strong> — Solve measurement word problems
      </div>
    </div>
  `;
}

function nextStep() {
  if (S.currentStep < 1) {
    S.currentStep++;
    render();
  }
}

function previousStep() {
  if (S.currentStep > 0) {
    S.currentStep--;
    render();
  }
}

function nextProblem() {
  S.currentProblem++;
  S.currentStep = 0;
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  const problems = PROBLEMS[S.diff];
  const p = problems[S.problemIndex % problems.length];

  let html = '<div class="problem-container">';

  // Score
  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  // Problem card
  html += `<div class="problem-card"><div class="problem-text">${p.text}</div></div>`;

  // Step prompts
  html += '<div class="step-breakdown">';
  html += '<div class="step-item"><div class="step-label">Step 1: Choose the operation</div><div class="op-group">';
  html += '<button class="op-btn' + (S.userOp1 === '+' ? ' selected' : '') + '" onclick="selectOp1(\'+\')">+</button>';
  html += '<button class="op-btn' + (S.userOp1 === '−' ? ' selected' : '') + '" onclick="selectOp1(\'−\')">−</button>';
  html += '<button class="op-btn' + (S.userOp1 === '×' ? ' selected' : '') + '" onclick="selectOp1(\'×\')">×</button>';
  html += '<button class="op-btn' + (S.userOp1 === '÷' ? ' selected' : '') + '" onclick="selectOp1(\'÷\')">÷</button>';
  html += '</div></div>';

  html += '<div class="step-item"><div class="step-label">Step 2: Choose the operation</div><div class="op-group">';
  html += '<button class="op-btn' + (S.userOp2 === '+' ? ' selected' : '') + '" onclick="selectOp2(\'+\')">+</button>';
  html += '<button class="op-btn' + (S.userOp2 === '−' ? ' selected' : '') + '" onclick="selectOp2(\'−\')">−</button>';
  html += '<button class="op-btn' + (S.userOp2 === '×' ? ' selected' : '') + '" onclick="selectOp2(\'×\')">×</button>';
  html += '<button class="op-btn' + (S.userOp2 === '÷' ? ' selected' : '') + '" onclick="selectOp2(\'÷\')">÷</button>';
  html += '</div></div>';

  html += '<div class="step-item"><div class="step-label">Write the equation</div>';
  html += `<div style="text-align:center;margin:12px 0;font-size:14px;color:var(--text2);">`;
  html += `${p.step1.a} <select id="opSelect1" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:600;"><option value="">op</option><option>+</option><option>−</option><option>×</option><option>÷</option></select>`;
  html += ` ${p.step1.b} <span style="color:var(--cyan);font-weight:700;"> = </span> <input type="number" class="number-input" id="step1Result" placeholder="?" style="width:60px;" /> <br>`;
  html += `(result) <select id="opSelect2" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:600;margin-top:8px;"><option value="">op</option><option>+</option><option>−</option><option>×</option><option>÷</option></select>`;
  html += ` ${p.step2.op === '+' || p.step2.op === '−' ? p.step2.b : (p.step2.a === p.step1.result ? p.step2.b : p.step2.a)} <span style="color:var(--cyan);font-weight:700;"> = </span> <input type="number" class="number-input" id="finalAnswer" placeholder="?" style="width:60px;" />`;
  html += `</div>`;
  html += '<div style="text-align:center;margin-top:12px;"><button class="play-btn primary" onclick="submitPracticeAnswer()">✓ Check Answer</button></div>';
  html += '</div>';

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        <strong>1.</strong> Identify both operations needed.<br><br>
        <strong>2.</strong> Write the equation with a letter for the unknown.<br><br>
        <strong>3.</strong> Solve and submit!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        Read the problem <strong>carefully</strong>. Find TWO things to calculate. Use the <strong>first answer</strong> in the second step!
      </div>
    </div>
  `;
}

function selectOp1(op) {
  S.userOp1 = S.userOp1 === op ? null : op;
  render();
}

function selectOp2(op) {
  S.userOp2 = S.userOp2 === op ? null : op;
  render();
}

function submitPracticeAnswer() {
  const problems = PROBLEMS[S.diff];
  const p = problems[S.problemIndex % problems.length];

  S.total = (S.total || 0) + 1;

  const step1 = parseInt(document.getElementById('step1Result')?.value || 0);
  const finalAns = parseInt(document.getElementById('finalAnswer')?.value || 0);

  if (step1 === p.step1.result && finalAns === p.step2.result) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      S.problemIndex++;
      S.userOp1 = null;
      S.userOp2 = null;
      render();
    }, 800);
  } else if (step1 !== p.step1.result) {
    showFB('✗ Check Step 1', 'incorrect');
  } else {
    showFB('✗ Check Step 2', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  let html = '<div class="problem-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Race Complete!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    const p = S.playProblems[S.playRound - 1];

    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Problem</span>
        <span>${S.playRound} / 8</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🔥 Streak</span>
        <span>${S.playStreak}</span>
      </div>
    </div>`;

    // Problem card
    html += `<div class="problem-card"><div class="problem-text">${p.text}</div></div>`;

    // Answer input
    html += '<div class="practice-question">';
    html += '<div class="question-text">What is the final answer?</div>';
    html += `<div class="input-group">
      <input type="number" class="number-input" id="playAnswer" placeholder="?" min="0" />
      <button class="play-btn primary" onclick="submitPlayAnswer()">✓</button>
    </div>`;
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  if (!S.gameEnded) {
    setTimeout(() => document.getElementById('playAnswer')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 12.5, 100)}%;"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Problem Solver Race</div>
      <div class="panel-text">
        <strong>Solve 8 problems</strong> as fast as you can!<br><br>
        Type just the <strong>final answer</strong> for each problem.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Base: <strong>10 points</strong><br>
        Streak bonus: <strong>+5 × streak</strong><br>
        <strong>Max: 50 pts/problem</strong>
      </div>
    </div>
  `;
}

function generatePlayProblems() {
  const problems = PROBLEMS[S.diff];
  S.playProblems = [];
  for (let i = 0; i < 8; i++) {
    S.playProblems.push(problems[Math.floor(Math.random() * problems.length)]);
  }
}

function submitPlayAnswer() {
  const p = S.playProblems[S.playRound - 1];
  const answer = parseInt(document.getElementById('playAnswer')?.value || 0);

  if (answer === p.step2.result) {
    showFB('✓ Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 5);
    S.playStreak++;
    S.playRound++;

    if (S.playRound > 8) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      setTimeout(() => {
        render();
      }, 800);
    }
  } else {
    showFB('✗ Try again', 'incorrect');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  generatePlayProblems();
  render();
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
render();
</script>
