<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Multiply by Tens</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.vinculum-std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-mode-tab:hover { color: var(--text2); background: var(--card); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.vinculum-mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.vinculum-mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.vinculum-diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-diff-btn:hover { color: var(--text2); }
.vinculum-diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── MULTIPLY CONTAINER ── */
.multiply-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 650px;
}

/* Base-ten blocks visualization */
.blocks-container {
  width: 100%;
  padding: 24px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  min-height: 240px;
}

.blocks-title {
  font-size: 14px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 8px;
}

.blocks-visualization {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
  align-items: flex-start;
}

.group-set {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.ten-rod {
  display: flex;
  gap: 2px;
  align-items: center;
}

.unit-cube {
  width: 16px;
  height: 16px;
  background: var(--cyan);
  border-radius: 3px;
  border: 2px solid var(--text);
  transition: all 0.2s;
}

.group-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-align: center;
}

/* Pattern display */
.pattern-display {
  text-align: center;
  padding: 16px 20px;
  background: rgba(0,212,255,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
}

.pattern-line {
  font-size: 15px;
  color: var(--text2);
  margin: 6px 0;
  font-weight: 500;
}

.pattern-line .highlight {
  font-weight: 700;
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
}

.pattern-line .highlight.equals {
  color: var(--green);
}

.pattern-explanation {
  font-size: 13px;
  color: var(--muted);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-style: italic;
}

/* Control sliders */
.control-slider-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
}

.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.control-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-width: 80px;
}

.control-slider {
  flex: 1;
  max-width: 250px;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.control-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  transition: all 0.2s;
}

.control-slider::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.control-value {
  font-size: 14px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  min-width: 50px;
  text-align: center;
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 12px 0;
}

.question-parts {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  margin: 12px 0;
  color: var(--text2);
}

.blank-space {
  width: 60px;
  height: 40px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Input fields */
.input-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 70px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* Answer buttons (for practice/play) */
.answer-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.answer-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}

.answer-btn:hover {
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border-color: var(--cyan);
}

.answer-btn.selected {
  background: rgba(0,212,255,0.15);
  color: var(--cyan);
  border-color: var(--cyan);
}

/* Play mode */
.game-info {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL (Instructions / Score) ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .blocks-container {
    min-height: 200px;
    padding: 16px;
  }
  .side-panel {
    width: 220px;
  }
  .control-slider {
    max-width: 150px;
  }
  .multiply-container {
    max-width: 90%;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Multiply by Tens</div>
    <span class="vinculum-header-badge">3 · NBT</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">3.NBT.3</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">×10</button>
    <button class="vinculum-diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">×10–50</button>
    <button class="vinculum-diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">×10–90</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure

  // Explore
  oneDigit: 3,          // 1-9
  tensFactor: 10,       // 10, 20, 30... 90

  // Practice
  practiceType: null,   // multiply | missing-factor | pattern
  practiceQ1: 0,
  practiceQ2: 0,
  practiceCorrect: 0,
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  gameEnded: false,
  playQ1: 0,
  playQ2: 0,
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Multiply by tens using place value and patterns.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getOneDigitRange() {
  return S.diff === 'emergent' ? [1, 5] : [1, 9];
}

function getTensFactors() {
  if (S.diff === 'emergent') return [10];
  if (S.diff === 'developing') return [10, 20, 30, 40, 50];
  return [10, 20, 30, 40, 50, 60, 70, 80, 90];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function renderTenRods(count) {
  let html = '';
  for (let i = 0; i < count; i++) {
    html += '<div class="unit-cube"></div>';
  }
  return html;
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.gameEnded = false;
    startPlayRound();
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'vinculum-mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'vinculum-mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.oneDigit = 3;
  S.tensFactor = 10;
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;
  S.gameEnded = false;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  let html = '<div class="multiply-container">';

  const result = S.oneDigit * S.tensFactor;
  const tensFact = S.tensFactor / 10;

  // Visualization: groups of ten-rods
  html += '<div class="blocks-container">';
  html += '<div class="blocks-title">Place Value Visualization: ' + S.oneDigit + ' groups of ' + tensFact + ' tens</div>';

  html += '<div class="blocks-visualization">';
  for (let g = 0; g < S.oneDigit; g++) {
    html += '<div class="group-set">';
    html += '<div class="ten-rod">';
    for (let r = 0; r < tensFact; r++) {
      html += '<div class="unit-cube"></div>';
    }
    html += '</div>';
    html += '<div class="group-label">Group ' + (g + 1) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Pattern section
  html += '<div class="pattern-display">';
  html += '<div class="pattern-line">Basic multiply: <span class="highlight">' + S.oneDigit + ' × ' + tensFact + ' = ' + (S.oneDigit * tensFact) + '</span></div>';
  html += '<div class="pattern-line">So: <span class="highlight">' + S.oneDigit + ' × ' + S.tensFactor + ' = <span class="highlight equals">' + result + '</span></span></div>';
  html += '<div class="pattern-explanation">Multiply the digits, then add a zero! ' + S.oneDigit + ' × ' + tensFact + ' = ' + (S.oneDigit * tensFact) + ', append zero → ' + result + '</div>';
  html += '</div>';

  html += '</div>';

  // Sliders
  html += '<div class="control-slider-container">';
  html += '<div class="control-row">';
  html += '<label class="control-label">One-Digit</label>';
  html += '<input type="range" min="1" max="9" value="' + S.oneDigit + '" class="control-slider" id="oneDigitSlider" oninput="updateOneDigit(this.value)">';
  html += '<span class="control-value" id="oneDigitValue">' + S.oneDigit + '</span>';
  html += '</div>';
  html += '<div class="control-row">';
  html += '<label class="control-label">Tens Factor</label>';
  html += '<select class="number-input" id="tensFactorSelect" onchange="updateTensFactor(this.value)" style="min-width:180px;">';
  const factors = getTensFactors();
  factors.forEach(f => {
    html += '<option value="' + f + '"' + (S.tensFactor === f ? ' selected' : '') + '>' + f + '</option>';
  });
  html += '</select>';
  html += '</div>';
  html += '</div>';

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">The Pattern</div>
      <div class="panel-text">
        <strong>Step 1:</strong> Multiply the one-digit number by the tens digit (without the zero).<br><br>
        <strong>Step 2:</strong> Add a zero to the end!<br><br>
        Example: 3 × 4 = 12, so 3 × 40 = 120
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Why It Works</div>
      <div class="panel-text">
        Each group is worth 10 times more because of place value. When you multiply by a multiple of 10, you're grouping by tens instead of ones.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Later On</div>
      <div class="panel-text">
        This pattern extends to × 100, × 1,000 (and beyond!). It's the foundation of exponential thinking and scientific notation.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standard</div>
      <div class="panel-text">
        <strong>3.NBT.3</strong> — Multiply one-digit whole numbers by multiples of 10 (10–90) using place value and properties of operations
      </div>
    </div>
  `;
}

function updateOneDigit(val) {
  S.oneDigit = parseInt(val);
  render();
}

function updateTensFactor(val) {
  S.tensFactor = parseInt(val);
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  let html = '<div class="multiply-container">';

  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  const result = S.practiceQ1 * S.practiceQ2;

  if (S.practiceType === 'multiply') {
    // Standard: What is 6 × 30?
    html += `<div class="practice-question">
      <div class="question-text">What is <span class="question-highlight">${S.practiceQ1} × ${S.practiceQ2}</span>?</div>
      <div class="input-group">
        <div id="vi-container"></div>
        <button class="play-btn primary" onclick="submitPracticeAnswer(${result})">✓ Check</button>
      </div>
    </div>`;
  } else if (S.practiceType === 'missing-factor') {
    // Missing factor: 7 × ___ = 280
    html += `<div class="practice-question">
      <div class="question-text">Find the missing factor:</div>
      <div class="question-parts">
        <span>${S.practiceQ1}</span>
        <span>×</span>
        <div class="blank-space" id="vi-container"></div>
        <span>=</span>
        <span>${result}</span>
      </div>
      <button class="play-btn primary" onclick="submitPracticeAnswer(${S.practiceQ2})" style="margin-top:16px;">✓ Check</button>
    </div>`;
  } else {
    // Pattern completion: 4 × 2 = 8, 4 × 20 = ___
    const basicResult = S.practiceQ1 * (S.practiceQ2 / 10);
    html += `<div class="practice-question">
      <div class="question-text">Complete the pattern:</div>
      <div class="question-parts" style="font-size:18px;flex-direction:column;gap:12px;">
        <div>${S.practiceQ1} × ${S.practiceQ2 / 10} = <strong>${basicResult}</strong></div>
        <div>${S.practiceQ1} × ${S.practiceQ2} =
          <div id="vi-container"></div>
        </div>
      </div>
      <button class="play-btn primary" onclick="submitPracticeAnswer(${result})" style="margin-top:16px;">✓ Check</button>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  setTimeout(() => {
    let answer;
    if (S.practiceType === 'multiply') {
      answer = S.practiceQ1 * S.practiceQ2;
    } else if (S.practiceType === 'missing-factor') {
      answer = S.practiceQ2;
    } else {
      answer = S.practiceQ1 * S.practiceQ2;
    }
    var vi = VinculumInput.create(document.getElementById('vi-container'), {
      type: 'auto',
      answer: answer,
      onSubmit: function(value) { submitPracticeAnswer(answer, value); }
    });
  }, 50);

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Solve</div>
      <div class="panel-text">
        <strong>Remember:</strong> Multiply the one-digit by the tens digit, then add a zero.<br><br>
        For ${S.practiceQ1} × ${S.practiceQ2}:<br>
        ${S.practiceQ1} × ${S.practiceQ2 / 10} = ${S.practiceQ1 * (S.practiceQ2 / 10)}<br>
        Add zero → ${result}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        Think about groups of 10. ${S.practiceQ1} groups of ${S.practiceQ2 / 10} tens = ${result}
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;

  const oneDigitRange = getOneDigitRange();
  const factors = getTensFactors();

  S.practiceQ1 = randInt(oneDigitRange[0], oneDigitRange[1]);
  S.practiceQ2 = factors[Math.floor(Math.random() * factors.length)];

  const types = ['multiply', 'missing-factor', 'pattern'];
  S.practiceType = types[Math.floor(Math.random() * types.length)];
}

function submitPracticeAnswer(correct, value) {
  const val = value !== undefined ? value : parseInt(document.getElementById('practiceAnswer')?.value || 0);

  if (val === correct) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  let html = '<div class="multiply-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Race Complete!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Race Again</button>
    </div>`;
  } else {
    const result = S.playQ1 * S.playQ2;

    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Round</span>
        <span>${S.playRound} / 10</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🔥 Streak</span>
        <span>${S.playStreak}</span>
      </div>
    </div>`;

    const factors = getTensFactors();
    const randFactor = factors[Math.floor(Math.random() * factors.length)];
    const options = [randFactor, factors[(factors.indexOf(randFactor) + 1) % factors.length]].sort(() => Math.random() - 0.5);

    html += `<div class="practice-question">
      <div class="question-text" style="margin-bottom:20px;">What is <strong style="font-size:24px;color:var(--cyan);">${S.playQ1} × ${S.playQ2}</strong>?</div>
      <div class="answer-buttons">
        <button class="answer-btn" onclick="submitPlayAnswer(${S.playQ1 * options[0]}, ${result})">${S.playQ1 * options[0]}</button>
        <button class="answer-btn" onclick="submitPlayAnswer(${S.playQ1 * options[1]}, ${result})">${S.playQ1 * options[1]}</button>
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 10, 100)}%;"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        Each round shows a <strong>multiplication</strong> problem.<br><br>
        <strong>Tap the correct answer</strong> as fast as you can!<br><br>
        Keep your <strong>streak alive</strong> for big points!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Base: <strong>10 points</strong><br>
        Streak bonus: <strong>+2 × streak</strong><br>
        <strong>Max: 30 pts/round</strong>
      </div>
    </div>
  `;
}

function startPlayRound() {
  const oneDigitRange = getOneDigitRange();
  const factors = getTensFactors();

  S.playQ1 = randInt(oneDigitRange[0], oneDigitRange[1]);
  S.playQ2 = factors[Math.floor(Math.random() * factors.length)];
  render();
}

function submitPlayAnswer(selected, correct) {
  if (selected === correct) {
    showFB('✓ Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 2);
    S.playStreak++;
    S.playRound++;

    if (S.playRound > 10) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      setTimeout(() => {
        startPlayRound();
      }, 800);
    }
  } else {
    showFB('✗ Try again', 'incorrect');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  startPlayRound();
  render();
}

render();
</script>
