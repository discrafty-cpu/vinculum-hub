<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Area & Perimeter Lab</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.back-btn:hover { background: var(--card); color: var(--cyan); }
.header-title {
  font-size: 18px;
  font-weight: 800;
}
.header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.std-tags {
  display: flex;
  gap: 6px;
}
.std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.mode-tab:hover { color: var(--text2); background: var(--card); }
.mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.diff-btn:hover { color: var(--text2); }
.diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── GRID BUILDER ── */
.grid-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 700px;
}

.grid-builder {
  display: inline-block;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  position: relative;
  user-select: none;
}

.grid-cells {
  display: inline-grid;
  grid-auto-flow: row dense;
  gap: 0;
  grid-template-columns: repeat(10, 30px);
  grid-template-rows: repeat(10, 30px);
  user-select: none;
}

.grid-cell {
  width: 30px;
  height: 30px;
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: all 0.1s;
  position: relative;
}

.grid-cell:hover {
  background: rgba(0,212,255,0.15);
}

.grid-cell.selected {
  background: rgba(0,212,255,0.4);
  border-color: var(--cyan);
}

.grid-cell.perimeter-top {
  border-top: 3px solid var(--orange);
}

.grid-cell.perimeter-bottom {
  border-bottom: 3px solid var(--orange);
}

.grid-cell.perimeter-left {
  border-left: 3px solid var(--orange);
}

.grid-cell.perimeter-right {
  border-right: 3px solid var(--orange);
}

/* Dimension labels */
.grid-labels {
  position: relative;
  margin-top: 8px;
  margin-left: 20px;
  height: 20px;
  width: 300px;
}

.width-label {
  position: absolute;
  bottom: 0;
  left: 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
}

.height-label {
  position: absolute;
  left: -20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  width: 20px;
  text-align: right;
}

/* Measurements display */
.measurements {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 16px 20px;
  background: rgba(0,212,255,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
}

.measurement-item {
  text-align: center;
  padding: 12px 16px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--border);
  min-width: 120px;
}

.measurement-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  font-weight: 600;
}

.measurement-value {
  font-size: 24px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
}

.measurement-item.area .measurement-value {
  color: var(--cyan);
}

.measurement-item.perimeter .measurement-value {
  color: var(--orange);
}

.measurement-desc {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
}

/* Controls */
.builder-controls {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
}

.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.control-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-width: 50px;
}

.control-slider {
  flex: 1;
  max-width: 200px;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.control-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  transition: all 0.2s;
}

.control-slider::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.control-value {
  font-size: 14px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  min-width: 30px;
  text-align: center;
}

/* Practice/Play buttons */
.action-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.play-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 12px 0;
}

/* Input fields */
.input-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 70px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* Game info */
.game-info {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* Animations */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .grid-cells {
    grid-template-columns: repeat(8, 25px);
    grid-template-rows: repeat(8, 25px);
  }
  .grid-cell {
    width: 25px;
    height: 25px;
  }
  .side-panel {
    width: 220px;
  }
  .measurements {
    flex-direction: column;
    gap: 12px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <a class="back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="header-title"><span>VINCULUM</span> Area & Perimeter Lab</div>
    <span class="header-badge">3 · MD</span>
    <button class="back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="std-tags">
    <span class="std-tag">3.MD.5</span>
    <span class="std-tag">3.MD.6</span>
    <span class="std-tag">3.MD.7</span>
    <span class="std-tag">3.MD.8</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="mode-tabs">
  <button class="mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="diff-selector">
    <span class="diff-label">Level</span>
    <button class="diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">1–5</button>
    <button class="diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">1–10</button>
    <button class="diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">1–10+</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure

  // Explore
  width: 3,
  height: 4,
  selectedCells: new Set(),

  // Practice
  questionType: null,   // count-area | count-perimeter | build-area | build-perimeter | find-same
  targetWidth: 0,
  targetHeight: 0,
  targetArea: 0,
  targetPerimeter: 0,
  userWidth: null,
  userHeight: null,
  userArea: null,
  userPerimeter: null,
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  gameEnded: false,
  challengeType: 'area', // area | perimeter
  challengeValue: 0
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Area is the space inside. Perimeter is the distance around.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getMaxDim() {
  return { emergent: 5, developing: 10, secure: 10 }[S.diff];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function calculateArea(w, h) {
  return w * h;
}

function calculatePerimeter(w, h) {
  return 2 * (w + h);
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.gameEnded = false;
    newPlayChallenge();
  }

  document.querySelectorAll('.mode-tab').forEach(t => t.className = 'mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.width = 3;
  S.height = 4;
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;

  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  let html = '<div class="grid-container">';

  // Grid builder
  html += '<div class="grid-builder">';
  html += '<div class="grid-cells" id="gridCells">';
  for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 10; c++) {
      const isSelected = c < S.width && r < S.height;
      const classes = ['grid-cell'];
      if (isSelected) classes.push('selected');
      // Add perimeter highlights
      if (isSelected) {
        if (r === 0) classes.push('perimeter-top');
        if (r === S.height - 1) classes.push('perimeter-bottom');
        if (c === 0) classes.push('perimeter-left');
        if (c === S.width - 1) classes.push('perimeter-right');
      }
      html += `<div class="${classes.join(' ')}" data-row="${r}" data-col="${c}" onclick="selectRect(${r},${c})"></div>`;
    }
  }
  html += '</div>';
  html += '</div>';

  const area = calculateArea(S.width, S.height);
  const perimeter = calculatePerimeter(S.width, S.height);

  html += `<div class="measurements">
    <div class="measurement-item area">
      <div class="measurement-label">Area</div>
      <div class="measurement-value">${area}</div>
      <div class="measurement-desc">square units</div>
    </div>
    <div class="measurement-item perimeter">
      <div class="measurement-label">Perimeter</div>
      <div class="measurement-value">${perimeter}</div>
      <div class="measurement-desc">units</div>
    </div>
  </div>`;

  html += `<div class="builder-controls">
    <div class="control-row">
      <label class="control-label">Width</label>
      <input type="range" min="1" max="10" value="${S.width}" class="control-slider" id="widthSlider" oninput="updateWidth(this.value)">
      <span class="control-value" id="widthValue">${S.width}</span>
    </div>
    <div class="control-row">
      <label class="control-label">Height</label>
      <input type="range" min="1" max="10" value="${S.height}" class="control-slider" id="heightSlider" oninput="updateHeight(this.value)">
      <span class="control-value" id="heightValue">${S.height}</span>
    </div>
  </div>`;

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">How It Works</div>
      <div class="panel-text">
        <strong>Cyan squares</strong> = Area (inside)<br><br>
        <strong>Orange edges</strong> = Perimeter (around)<br><br>
        Use sliders to change size!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Area</div>
      <div class="panel-text">
        Count the <strong>filled squares</strong> inside the rectangle. This is <strong>Area</strong>.<br><br>
        Formula: <strong>L × W</strong>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Perimeter</div>
      <div class="panel-text">
        Count the <strong>edges around</strong> the rectangle. This is <strong>Perimeter</strong>.<br><br>
        Formula: <strong>2(L + W)</strong>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Challenge</div>
      <div class="panel-text">
        Can you make a rectangle with area 12 but different perimeter?<br><br>
        Try: 3×4 (P=14) vs 2×6 (P=16)
      </div>
    </div>
  `;
}

function selectRect(r, c) {
  S.width = c + 1;
  S.height = r + 1;
  render();
}

function updateWidth(val) {
  S.width = parseInt(val);
  render();
}

function updateHeight(val) {
  S.height = parseInt(val);
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  let html = '<div class="grid-container">';

  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  const max = getMaxDim();

  if (S.questionType === 'count-area') {
    // Show grid, count area
    html += '<div class="grid-builder">';
    html += '<div class="grid-cells">';
    for (let r = 0; r < 10; r++) {
      for (let c = 0; c < 10; c++) {
        const isSelected = c < S.targetWidth && r < S.targetHeight;
        const cls = isSelected ? 'grid-cell selected' : 'grid-cell';
        html += `<div class="${cls}"></div>`;
      }
    }
    html += '</div></div>';

    html += `<div class="practice-question">
      <div class="question-text">How many square units?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="answerInput" min="0" max="999" placeholder="?" />
        <button class="play-btn primary" onclick="submitPractice('area',${S.targetArea})">✓ Check</button>
      </div>
    </div>`;

  } else if (S.questionType === 'count-perimeter') {
    // Show grid, count perimeter
    html += '<div class="grid-builder">';
    html += '<div class="grid-cells">';
    for (let r = 0; r < 10; r++) {
      for (let c = 0; c < 10; c++) {
        const isSelected = c < S.targetWidth && r < S.targetHeight;
        const classes = ['grid-cell'];
        if (isSelected) {
          classes.push('selected');
          if (r === 0) classes.push('perimeter-top');
          if (r === S.targetHeight - 1) classes.push('perimeter-bottom');
          if (c === 0) classes.push('perimeter-left');
          if (c === S.targetWidth - 1) classes.push('perimeter-right');
        }
        html += `<div class="${classes.join(' ')}"></div>`;
      }
    }
    html += '</div></div>';

    html += `<div class="practice-question">
      <div class="question-text">What is the perimeter?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="answerInput" min="0" max="999" placeholder="?" />
        <button class="play-btn primary" onclick="submitPractice('perim',${S.targetPerimeter})">✓ Check</button>
      </div>
    </div>`;

  } else if (S.questionType === 'build-area') {
    // Build rectangle with target area
    html += `<div class="practice-question">
      <div class="question-text">Build a rectangle with area:</div>
      <div class="question-highlight">${S.targetArea} square units</div>
    </div>`;

    html += '<div class="grid-builder">';
    html += '<div class="grid-cells">';
    for (let r = 0; r < 10; r++) {
      for (let c = 0; c < 10; c++) {
        const isSelected = c < S.width && r < S.height;
        const cls = isSelected ? 'grid-cell selected' : 'grid-cell';
        html += `<div class="${cls}"></div>`;
      }
    }
    html += '</div></div>';

    const area = calculateArea(S.width, S.height);
    const match = area === S.targetArea;

    html += `<div class="builder-controls">
      <div class="control-row">
        <label class="control-label">W</label>
        <input type="range" min="1" max="10" value="${S.width}" class="control-slider" oninput="updateBuildWidth(this.value)">
        <span class="control-value">${S.width}</span>
      </div>
      <div class="control-row">
        <label class="control-label">H</label>
        <input type="range" min="1" max="10" value="${S.height}" class="control-slider" oninput="updateBuildHeight(this.value)">
        <span class="control-value">${S.height}</span>
      </div>
      <div style="text-align:center;margin-top:8px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Area = ${area}</div>
        ${match ? '<button class="play-btn primary" onclick="submitBuild()">✓ Correct!</button>' : '<div style="color:var(--muted);font-size:12px;">Keep trying...</div>'}
      </div>
    </div>`;

  } else if (S.questionType === 'build-perimeter') {
    // Build rectangle with target perimeter
    html += `<div class="practice-question">
      <div class="question-text">Build a rectangle with perimeter:</div>
      <div class="question-highlight">${S.targetPerimeter} units</div>
    </div>`;

    html += '<div class="grid-builder">';
    html += '<div class="grid-cells">';
    for (let r = 0; r < 10; r++) {
      for (let c = 0; c < 10; c++) {
        const isSelected = c < S.width && r < S.height;
        const classes = ['grid-cell'];
        if (isSelected) {
          classes.push('selected');
          if (r === 0) classes.push('perimeter-top');
          if (r === S.height - 1) classes.push('perimeter-bottom');
          if (c === 0) classes.push('perimeter-left');
          if (c === S.width - 1) classes.push('perimeter-right');
        }
        html += `<div class="${classes.join(' ')}"></div>`;
      }
    }
    html += '</div></div>';

    const perim = calculatePerimeter(S.width, S.height);
    const match = perim === S.targetPerimeter;

    html += `<div class="builder-controls">
      <div class="control-row">
        <label class="control-label">W</label>
        <input type="range" min="1" max="10" value="${S.width}" class="control-slider" oninput="updateBuildWidth(this.value)">
        <span class="control-value">${S.width}</span>
      </div>
      <div class="control-row">
        <label class="control-label">H</label>
        <input type="range" min="1" max="10" value="${S.height}" class="control-slider" oninput="updateBuildHeight(this.value)">
        <span class="control-value">${S.height}</span>
      </div>
      <div style="text-align:center;margin-top:8px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Perimeter = ${perim}</div>
        ${match ? '<button class="play-btn primary" onclick="submitBuild()">✓ Correct!</button>' : '<div style="color:var(--muted);font-size:12px;">Keep trying...</div>'}
      </div>
    </div>`;

  } else if (S.questionType === 'find-same' && S.diff === 'secure') {
    // Find rectangles with same area, different perimeter
    html += `<div class="practice-question">
      <div class="question-text">Find TWO rectangles with same area but different perimeter:</div>
      <div class="question-highlight">Area = ${S.targetArea}</div>
      <div style="margin-top:12px;font-size:12px;color:var(--text2);">Hints: Look for different width/height pairs that multiply to ${S.targetArea}</div>
    </div>`;

    html += `<div class="input-group" style="margin-top:20px;flex-direction:column;width:100%;align-items:center;">
      <div style="font-size:12px;margin-bottom:8px;color:var(--text2);">First rectangle:</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;">
        <input type="number" class="number-input" id="rect1w" placeholder="width" min="1" max="${max}" />
        <span>×</span>
        <input type="number" class="number-input" id="rect1h" placeholder="height" min="1" max="${max}" />
      </div>
      <div style="font-size:12px;margin-bottom:8px;color:var(--text2);">Second rectangle:</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;">
        <input type="number" class="number-input" id="rect2w" placeholder="width" min="1" max="${max}" />
        <span>×</span>
        <input type="number" class="number-input" id="rect2h" placeholder="height" min="1" max="${max}" />
      </div>
      <button class="play-btn primary" onclick="submitFindSame(${S.targetArea})">✓ Check</button>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  if (S.questionType === 'count-area' || S.questionType === 'count-perimeter') {
    setTimeout(() => document.getElementById('answerInput')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        ${S.questionType === 'count-area' ? 'Count the cyan squares to find the area.' : ''}
        ${S.questionType === 'count-perimeter' ? 'Count the orange edges around the rectangle.' : ''}
        ${S.questionType === 'build-area' ? 'Use the sliders to make the target area.' : ''}
        ${S.questionType === 'build-perimeter' ? 'Use the sliders to make the target perimeter.' : ''}
        ${S.questionType === 'find-same' ? 'Find two rectangles with the same area but different perimeter.' : ''}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        ${S.questionType === 'count-area' ? 'Area = length × width' : ''}
        ${S.questionType === 'count-perimeter' ? 'Perimeter = 2(length + width)' : ''}
        ${S.questionType === 'build-area' ? 'What two numbers multiply to make the target?' : ''}
        ${S.questionType === 'build-perimeter' ? 'Add all four sides!' : ''}
        ${S.questionType === 'find-same' ? 'Same area can have different shapes!' : ''}
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;

  const max = getMaxDim();
  const types = ['count-area', 'count-perimeter', 'build-area', 'build-perimeter'];

  if (S.diff === 'secure') types.push('find-same');

  S.questionType = types[Math.floor(Math.random() * types.length)];

  // Pick random dimensions
  S.targetWidth = randInt(2, Math.max(3, max - 2));
  S.targetHeight = randInt(2, Math.max(3, max - 2));
  S.targetArea = calculateArea(S.targetWidth, S.targetHeight);
  S.targetPerimeter = calculatePerimeter(S.targetWidth, S.targetHeight);

  // For find-same, pick area with multiple factorizations
  if (S.questionType === 'find-same') {
    const areas = [12, 16, 18, 20, 24];
    S.targetArea = areas[Math.floor(Math.random() * areas.length)];
  }

  S.width = 2;
  S.height = 2;
}

function submitPractice(type, correct) {
  const input = document.getElementById('answerInput');
  const val = parseInt(input?.value || 0);

  if (val === correct) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function updateBuildWidth(val) {
  S.width = parseInt(val);
  render();
}

function updateBuildHeight(val) {
  S.height = parseInt(val);
  render();
}

function submitBuild() {
  const area = calculateArea(S.width, S.height);
  const perim = calculatePerimeter(S.width, S.height);

  let isCorrect = false;
  if (S.questionType === 'build-area') {
    isCorrect = area === S.targetArea;
  } else if (S.questionType === 'build-perimeter') {
    isCorrect = perim === S.targetPerimeter;
  }

  if (isCorrect) {
    showFB('✓ Perfect!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  }
}

function submitFindSame(targetArea) {
  const w1 = parseInt(document.getElementById('rect1w')?.value || 0);
  const h1 = parseInt(document.getElementById('rect1h')?.value || 0);
  const w2 = parseInt(document.getElementById('rect2w')?.value || 0);
  const h2 = parseInt(document.getElementById('rect2h')?.value || 0);

  const a1 = w1 * h1;
  const a2 = w2 * h2;
  const p1 = 2 * (w1 + h1);
  const p2 = 2 * (w2 + h2);

  if (a1 === targetArea && a2 === targetArea && p1 !== p2) {
    showFB('✓ Great!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Check areas & perimeters', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  let html = '<div class="grid-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Game Complete!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Round</span>
        <span>${S.playRound} / 10</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🔥 Streak</span>
        <span>${S.playStreak}</span>
      </div>
    </div>`;

    // Show rectangle
    html += '<div class="grid-builder">';
    html += '<div class="grid-cells">';
    for (let r = 0; r < 10; r++) {
      for (let c = 0; c < 10; c++) {
        const isSelected = c < S.challengeType === 'area' ? S.challengeValue : 4 && r < (S.challengeType === 'area' ? 4 : S.challengeValue / 4);
        const isSelected2 = S.challengeType === 'area' ? (c < S.challengeValue && r < 4) : (c < 4 && r < S.challengeValue / 4);
        const cls = isSelected2 ? 'grid-cell selected' : 'grid-cell';
        html += `<div class="${cls}"></div>`;
      }
    }
    html += '</div></div>';

    const type = S.challengeType === 'area' ? 'Area' : 'Perimeter';
    html += `<div class="practice-question">
      <div class="question-text">What is the ${type}?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="playAnswer" placeholder="?" min="0" max="999" />
        <button class="play-btn primary" onclick="submitPlayAnswer()">✓</button>
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  if (!S.gameEnded) {
    setTimeout(() => document.getElementById('playAnswer')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 10, 100)}%;"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        Each round alternates between <strong>Area</strong> and <strong>Perimeter</strong>.<br><br>
        <strong>Answer correctly</strong> to build your streak!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Base: <strong>10 points</strong><br>
        Streak bonus: <strong>+2 × streak</strong><br>
        <strong>Max: 30 pts/round</strong>
      </div>
    </div>
  `;
}

function newPlayChallenge() {
  const max = getMaxDim();
  const w = randInt(2, max);
  const h = randInt(2, max);

  S.challengeType = S.playRound % 2 === 1 ? 'area' : 'perimeter';

  if (S.challengeType === 'area') {
    S.challengeValue = w * h;
  } else {
    S.challengeValue = 2 * (w + h);
  }
}

function submitPlayAnswer() {
  const input = document.getElementById('playAnswer');
  const val = parseInt(input?.value || 0);

  if (val === S.challengeValue) {
    showFB('✓ Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 2);
    S.playStreak++;
    S.playRound++;

    if (S.playRound > 10) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      setTimeout(() => {
        newPlayChallenge();
        render();
      }, 800);
    }
  } else {
    showFB('✗ Try again', 'incorrect');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  newPlayChallenge();
  render();
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
render();
</script>
