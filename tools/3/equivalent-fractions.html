<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Equivalent Fractions</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

.vinculum-rtm-btn .rtm-icon{font-size:14px;}

*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-mode-tab:hover { color: var(--text2); background: var(--card); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.vinculum-mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.vinculum-mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.vinculum-diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  data-diff: '';
}
.vinculum-diff-btn:hover { color: var(--text2); }
.vinculum-diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

.equiv-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 680px;
}

.bar-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
}

.bar-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 4px;
}

.fraction-bar {
  width: 100%;
  height: 48px;
  display: flex;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid var(--border);
  position: relative;
}

.bar-part {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 700;
  font-size: 12px;
  position: relative;
  background: var(--card);
}

.bar-part:last-child {
  border-right: none;
}

.bar-part:hover {
  opacity: 0.8;
  transform: scale(1.05);
}

.bar-part.shaded {
  color: white;
  font-weight: 800;
}

.bar-halves .bar-part { background: rgba(0,212,255,0.15); }
.bar-halves .bar-part.shaded { background: var(--cyan); }

.bar-thirds .bar-part { background: rgba(0,230,118,0.15); }
.bar-thirds .bar-part.shaded { background: var(--green); }

.bar-fourths .bar-part { background: rgba(255,193,7,0.15); }
.bar-fourths .bar-part.shaded { background: var(--yellow); }

.bar-sixths .bar-part { background: rgba(255,59,139,0.15); }
.bar-sixths .bar-part.shaded { background: var(--pink); }

.bar-eighths .bar-part { background: rgba(147,112,219,0.15); }
.bar-eighths .bar-part.shaded { background: var(--purple); }

.fraction-label {
  font-size: 18px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  color: var(--text2);
  margin-top: 8px;
}

.equals-sign {
  font-size: 32px;
  font-weight: 800;
  color: var(--muted);
  margin: 8px 0;
}

.equiv-feedback {
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  padding: 12px 16px;
  border-radius: 10px;
  margin-top: 8px;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.equiv-feedback.match {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 1px solid var(--green);
}

.equiv-feedback.no-match {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 1px solid var(--yellow);
}

.denom-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 12px;
}

.denom-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.denom-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

.denom-btn.active {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.15);
  color: var(--cyan);
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}

.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 520px;
}

.question-text {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 16px;
  font-weight: 600;
}

.question-highlight {
  font-size: 24px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 8px 0;
}

.answer-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
  max-width: 420px;
  width: 100%;
}

.answer-btn {
  padding: 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}

.answer-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}

.answer-btn.correct-flash {
  border-color: var(--green);
  background: rgba(0,230,118,0.15);
  color: var(--green);
}

.answer-btn.incorrect-flash {
  border-color: var(--pink);
  background: rgba(255,59,139,0.15);
  color: var(--pink);
}

.game-info {
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 520px;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 2px solid var(--border);
}

.match-card {
  aspect-ratio: 1;
  padding: 8px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.match-card:hover:not(.matched) {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}

.match-card.matched {
  opacity: 0.3;
  pointer-events: none;
}

.match-card.flipped {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.1);
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.pop-in { animation: pop 0.3s ease-out forwards; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 768px) {
  .side-panel { width: 220px; }
  .equiv-container { max-width: 100%; }
  .bar-part { font-size: 10px; }
  .card-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Equivalent Fractions</div>
    <span class="vinculum-header-badge">3 · NF</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">3.NF.3a</span>
    <span class="vinculum-std-tag">3.NF.3b</span>
  </div>
</div>

<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">Emergent</button>
    <button class="vinculum-diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">Developing</button>
    <button class="vinculum-diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">Secure</button>
  </div>
</div>

<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}

const S = {
  mode: 'explore',
  diff: 'emergent',
  score: 0,
  total: 0,
  topFrac: {num: 1, denom: 2},
  bottomFrac: {num: 1, denom: 4},
  questionType: null,
  targetFraction: null,
  gameEnded: false,
  gameScore: 0,
  cardPairs: [],
  flipped: []
};

function getDenominators() {
  if (S.diff === 'emergent') return [2, 4];
  if (S.diff === 'developing') return [2, 3, 4, 6];
  return [2, 3, 4, 6, 8];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function areEquivalent(f1, f2) {
  return f1.num * f2.denom === f1.denom * f2.num;
}

function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Equivalent fractions are the same amount written different ways.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

function setMode(mode) {
  S.mode = mode;
  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }
  if (mode === 'play' && S.gameScore === 0) {
    S.gameScore = 0;
    S.gameEnded = false;
    initGame();
  }
  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'vinculum-mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'vinculum-mode-tab active-' + mode;
  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.score = 0;
  S.total = 0;
  S.gameScore = 0;
  S.gameEnded = false;
  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');
  setMode(S.mode);
}

function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');
  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

function renderFractionBar(frac, onClick) {
  const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[frac.denom];
  let html = '<div class="fraction-bar bar-' + denomClass + '">';
  for (let i = 0; i < frac.denom; i++) {
    const isShaded = i < frac.num ? 'shaded' : '';
    html += '<div class="bar-part ' + isShaded + '" onclick="' + onClick + '(' + i + ')" style="cursor:pointer;"></div>';
  }
  html += '</div>';
  return html;
}

function renderExplore(ws, sp) {
  const denoms = getDenominators();
  let html = '<div class="equiv-container">';

  html += '<div class="bar-section">';
  html += '<div class="bar-label">First Fraction (Pick a denominator)</div>';
  html += '<div style="margin:12px 0;">' + renderFractionBar(S.topFrac, 'toggleTopShade') + '</div>';
  html += '<div class="fraction-label">' + S.topFrac.num + '/' + S.topFrac.denom + '</div>';
  html += '<div class="denom-buttons">';
  denoms.forEach(d => {
    const active = d === S.topFrac.denom ? 'active' : '';
    html += '<button class="denom-btn ' + active + '" onclick="setTopDenom(' + d + ')">÷ ' + d + '</button>';
  });
  html += '</div>';
  html += '</div>';

  html += '<div class="equals-sign">=</div>';

  html += '<div class="bar-section">';
  html += '<div class="bar-label">Second Fraction (Pick a different denominator)</div>';
  html += '<div style="margin:12px 0;">' + renderFractionBar(S.bottomFrac, 'toggleBottomShade') + '</div>';
  html += '<div class="fraction-label">' + S.bottomFrac.num + '/' + S.bottomFrac.denom + '</div>';
  html += '<div class="denom-buttons">';
  denoms.forEach(d => {
    const active = d === S.bottomFrac.denom ? 'active' : '';
    html += '<button class="denom-btn ' + active + '" onclick="setBottomDenom(' + d + ')">÷ ' + d + '</button>';
  });
  html += '</div>';

  const isEquiv = areEquivalent(S.topFrac, S.bottomFrac);
  if (isEquiv) {
    html += '<div class="equiv-feedback match">✓ They\'re the same! ' + S.topFrac.num + '/' + S.topFrac.denom + ' = ' + S.bottomFrac.num + '/' + S.bottomFrac.denom + '</div>';
  } else {
    const topVal = (S.topFrac.num / S.topFrac.denom).toFixed(2);
    const botVal = (S.bottomFrac.num / S.bottomFrac.denom).toFixed(2);
    html += '<div class="equiv-feedback no-match">Not quite — try adjusting the shading!</div>';
  }

  html += '</div>';
  html += '</div>';
  ws.innerHTML = html;

  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">What are Equivalent Fractions?</div>
      <div class="panel-text">
        <strong>Equivalent fractions</strong> represent the same amount, even though they look different.<br><br>
        <strong>1/2</strong> and <strong>2/4</strong> both cover the same space!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Explore</div>
      <div class="panel-text">
        <strong>1.</strong> Pick denominators<br><br>
        <strong>2.</strong> Shade parts<br><br>
        <strong>3.</strong> See if they match!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Try This</div>
      <div class="panel-text">
        Can you find 3 different fractions that equal <strong>1/2</strong>?
      </div>
    </div>
  `;
}

function setTopDenom(d) {
  S.topFrac = {num: 1, denom: d};
  render();
}

function setBottomDenom(d) {
  S.bottomFrac = {num: 1, denom: d};
  render();
}

function toggleTopShade(idx) {
  if (S.topFrac.num === idx + 1) {
    S.topFrac.num = idx;
  } else {
    S.topFrac.num = idx + 1;
  }
  render();
}

function toggleBottomShade(idx) {
  if (S.bottomFrac.num === idx + 1) {
    S.bottomFrac.num = idx;
  } else {
    S.bottomFrac.num = idx + 1;
  }
  render();
}

function renderPractice(ws, sp) {
  const denoms = getDenominators();
  let html = '<div class="equiv-container">';

  html += '<div style="text-align:center;margin-bottom:12px;font-size:14px;color:var(--muted);">⭐ ' + S.score + '/' + S.total + '</div>';

  if (S.questionType === 'match') {
    const target = S.targetFraction;
    html += '<div class="practice-question">';
    html += '<div class="question-text">Find an equivalent fraction</div>';
    html += '<div class="question-highlight">' + target.num + '/' + target.denom + ' = ?</div>';
    html += '<div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:8px;">';
    const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[target.denom];
    html += '<div class="fraction-bar bar-' + denomClass + '" style="margin-bottom:8px;">';
    for (let i = 0; i < target.denom; i++) {
      const isShaded = i < target.num ? 'shaded' : '';
      html += '<div class="bar-part ' + isShaded + '" style="cursor:default;"></div>';
    }
    html += '</div>';
    html += '<div class="fraction-label">' + target.num + '/' + target.denom + '</div>';
    html += '</div>';
    html += '<div class="answer-grid" style="margin-top:16px;">';
    const candidates = [];
    denoms.forEach(d => {
      if (d !== target.denom) {
        for (let n = 1; n <= Math.min(d - 1, 3); n++) {
          if (areEquivalent({num: n, denom: d}, target)) {
            candidates.push({num: n, denom: d});
          }
        }
      }
    });
    candidates.forEach(frac => {
      html += '<button class="answer-btn" onclick="practiceAnswerMatch(' + frac.num + ',' + frac.denom + ',true)">' + frac.num + '/' + frac.denom + '</button>';
    });
    denoms.forEach(d => {
      if (d !== target.denom && candidates.length < 3) {
        const n = randInt(1, Math.min(d - 1, 2));
        if (!areEquivalent({num: n, denom: d}, target)) {
          html += '<button class="answer-btn" onclick="practiceAnswerMatch(' + n + ',' + d + ',false)">' + n + '/' + d + '</button>';
        }
      }
    });
    html += '</div>';
    html += '</div>';

  } else if (S.questionType === 'shade') {
    const target = S.targetFraction;
    html += '<div class="bar-section" style="width:100%;max-width:520px;">';
    html += '<div class="bar-label">Shade ' + target.num + '/' + target.denom + ' of this bar</div>';
    const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[target.denom];
    html += '<div style="margin:12px 0;" id="shadeBarContainer">';
    html += '<div class="fraction-bar bar-' + denomClass + '" id="shadeBar">';
    if (!S.currentBar) S.currentBar = {num: 0, denom: target.denom};
    for (let i = 0; i < target.denom; i++) {
      const isShaded = i < S.currentBar.num ? 'shaded' : '';
      html += '<div class="bar-part ' + isShaded + '" onclick="shadeBarPart(' + i + ')" style="cursor:pointer;"></div>';
    }
    html += '</div>';
    html += '<div class="fraction-label">' + S.currentBar.num + '/' + target.denom + '</div>';
    html += '</div>';
    html += '<button class="play-btn primary" onclick="checkShade()">✓ Check</button>';
    html += '</div>';

  } else if (S.questionType === 'yesno') {
    const f1 = S.targetFraction;
    const f2 = S.targetFraction2;
    const isEquiv = areEquivalent(f1, f2);
    html += '<div class="practice-question">';
    html += '<div class="question-text">Are these equivalent?</div>';
    html += '<div style="display:flex;gap:24px;justify-content:center;margin:16px 0;">';
    [f1, f2].forEach(frac => {
      const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[frac.denom];
      html += '<div style="display:flex;flex-direction:column;gap:8px;">';
      html += '<div class="fraction-bar bar-' + denomClass + '" style="width:120px;height:40px;">';
      for (let i = 0; i < frac.denom; i++) {
        const isShaded = i < frac.num ? 'shaded' : '';
        html += '<div class="bar-part ' + isShaded + '" style="cursor:default;"></div>';
      }
      html += '</div>';
      html += '<div class="fraction-label" style="font-size:14px;">' + frac.num + '/' + frac.denom + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="answer-grid" style="grid-template-columns:repeat(2,1fr);max-width:300px;">';
    html += '<button class="answer-btn" onclick="practiceAnswerYesNo(true,' + isEquiv + ')">Yes</button>';
    html += '<button class="answer-btn" onclick="practiceAnswerYesNo(false,' + isEquiv + ')">No</button>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        Use the fraction bars to find equivalent fractions.<br><br>
        Remember: Same shaded area = equivalent!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        Look at how much of the bar is covered. If two fractions cover the same amount, they're equivalent!
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;
  const denoms = getDenominators();
  const types = [];

  if (S.diff === 'emergent') {
    types.push('match', 'yesno');
  } else if (S.diff === 'developing') {
    types.push('match', 'shade', 'yesno');
  } else {
    types.push('match', 'shade', 'yesno');
  }

  S.questionType = types[Math.floor(Math.random() * types.length)];

  if (S.questionType === 'match') {
    const denom = denoms[Math.floor(Math.random() * denoms.length)];
    const num = randInt(1, Math.min(denom - 1, 2));
    S.targetFraction = {num: num, denom: denom};
  } else if (S.questionType === 'shade') {
    const denom = denoms[Math.floor(Math.random() * denoms.length)];
    const num = randInt(1, Math.min(denom - 1, 2));
    S.targetFraction = {num: num, denom: denom};
    S.currentBar = {num: 0, denom: denom};
  } else if (S.questionType === 'yesno') {
    const d1 = denoms[Math.floor(Math.random() * denoms.length)];
    const n1 = randInt(1, Math.min(d1 - 1, 2));
    S.targetFraction = {num: n1, denom: d1};
    const d2 = denoms[Math.floor(Math.random() * denoms.length)];
    const n2 = randInt(1, Math.min(d2 - 1, 2));
    S.targetFraction2 = {num: n2, denom: d2};
  }
}

function shadeBarPart(idx) {
  if (S.currentBar.num === idx + 1) {
    S.currentBar.num = idx;
  } else {
    S.currentBar.num = idx + 1;
  }
  render();
}

function checkShade() {
  if (S.currentBar.num === S.targetFraction.num) {
    showFB('✓ Perfect!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function practiceAnswerMatch(num, denom, isCorrect) {
  if (isCorrect) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function practiceAnswerYesNo(answer, isCorrect) {
  if (answer === isCorrect) {
    showFB('✓ Right!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function initGame() {
  S.cardPairs = [];
  const denoms = getDenominators();
  const pairs = [];

  denoms.forEach(d => {
    for (let n = 1; n <= Math.min(d - 1, 2); n++) {
      pairs.push({num: n, denom: d});
    }
  });

  pairs.sort(() => Math.random() - 0.5);
  const selected = pairs.slice(0, 5);

  const doubled = [];
  selected.forEach((frac, idx) => {
    doubled.push({id: idx * 2, frac: frac, type: 'bar', matched: false, flipped: false});
    doubled.push({id: idx * 2 + 1, frac: frac, type: 'number', matched: false, flipped: false});
  });

  S.cardPairs = doubled.sort(() => Math.random() - 0.5);
  S.flipped = [];
}

function renderPlay(ws, sp) {
  let html = '<div class="equiv-container">';

  if (S.gameEnded) {
    html += '<div style="text-align:center;padding:40px;">';
    html += '<div style="font-size:32px;font-weight:800;margin-bottom:20px;">Level Complete!</div>';
    html += '<div style="font-size:48px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0;">' + S.gameScore + ' ⭐</div>';
    html += '<button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>';
    html += '</div>';
  } else {
    html += '<div class="game-info">';
    html += '<div class="info-item"><span class="info-label">Matches</span><span>' + Math.floor(S.gameScore / 20) + '/5</span></div>';
    html += '<div class="info-item"><span class="info-label">⭐ Score</span><span>' + S.gameScore + '</span></div>';
    html += '</div>';

    html += '<div class="card-grid">';
    S.cardPairs.forEach((card, idx) => {
      if (card.matched) {
        html += '<div class="match-card" style="opacity:0.3;pointer-events:none;"></div>';
      } else {
        let cardContent = '?';
        if (card.flipped) {
          if (card.type === 'bar') {
            const f = card.frac;
            const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[f.denom];
            cardContent = '<div class="fraction-bar bar-' + denomClass + '" style="width:85%;height:24px;">';
            for (let i = 0; i < f.denom; i++) {
              const isShaded = i < f.num ? 'shaded' : '';
              cardContent += '<div class="bar-part ' + isShaded + '" style="font-size:8px;cursor:default;"></div>';
            }
            cardContent += '</div>';
          } else {
            cardContent = '<div style="font-size:18px;">' + card.frac.num + '/' + card.frac.denom + '</div>';
          }
        }
        const flippedClass = card.flipped ? 'flipped' : '';
        html += '<button class="match-card ' + flippedClass + '" onclick="flipCard(' + idx + ')">' + cardContent + '</button>';
      }
    });
    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.gameScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Equivalent Match</div>
      <div class="panel-text">
        Match bars to their fractions!<br><br>
        <strong>Tap cards</strong> to flip them.<br><br>
        <strong>Find pairs</strong> of the same fraction.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Each match = 20 points<br>
        Finish all 5 matches to win!
      </div>
    </div>
  `;
}

function flipCard(idx) {
  if (S.cardPairs[idx].matched || S.cardPairs[idx].flipped || S.flipped.length >= 2) return;

  S.cardPairs[idx].flipped = true;
  S.flipped.push(idx);

  if (S.flipped.length === 2) {
    const c1 = S.cardPairs[S.flipped[0]];
    const c2 = S.cardPairs[S.flipped[1]];

    if (c1.frac.num === c2.frac.num && c1.frac.denom === c2.frac.denom) {
      showFB('✓ Match!', 'correct');
      S.gameScore += 20;
      c1.matched = true;
      c2.matched = true;

      const matched = S.cardPairs.filter(c => c.matched).length;
      if (matched === S.cardPairs.length) {
        setTimeout(() => {
          S.gameEnded = true;
          render();
        }, 800);
      } else {
        setTimeout(() => {
          S.flipped = [];
          render();
        }, 800);
      }
    } else {
      showFB('✗ No match', 'incorrect');
      setTimeout(() => {
        c1.flipped = false;
        c2.flipped = false;
        S.flipped = [];
        render();
      }, 1200);
    }
  } else {
    render();
  }
}

function playAgain() {
  S.gameScore = 0;
  S.gameEnded = false;
  S.flipped = [];
  initGame();
  render();
}

render();
</script>
