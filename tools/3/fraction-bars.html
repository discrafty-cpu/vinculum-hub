<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Fraction Bars Explorer</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.vinculum-std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-mode-tab:hover { color: var(--text2); background: var(--card); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.vinculum-mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.vinculum-mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.vinculum-diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  data-diff: '';
}
.vinculum-diff-btn:hover { color: var(--text2); }
.vinculum-diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── FRACTION BARS CONTAINER ── */
.fraction-bars-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 600px;
}

.bar-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
}

.bar-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 4px;
}

.whole-bar {
  width: 100%;
  height: 40px;
  background: rgba(0,212,255,0.1);
  border: 2px solid var(--cyan);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
}

.fraction-bar {
  width: 100%;
  height: 40px;
  display: flex;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid var(--border);
  position: relative;
}

.bar-part {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 700;
  font-size: 12px;
  position: relative;
  background: var(--card);
}

.bar-part:last-child {
  border-right: none;
}

.bar-part:hover {
  opacity: 0.8;
  transform: scale(1.05);
}

.bar-part.shaded {
  color: white;
  font-weight: 800;
}

/* Color by denominator */
.bar-halves .bar-part { background: rgba(0,212,255,0.15); }
.bar-halves .bar-part.shaded { background: var(--cyan); }

.bar-thirds .bar-part { background: rgba(0,230,118,0.15); }
.bar-thirds .bar-part.shaded { background: var(--green); }

.bar-fourths .bar-part { background: rgba(255,193,7,0.15); }
.bar-fourths .bar-part.shaded { background: var(--yellow); }

.bar-sixths .bar-part { background: rgba(255,59,139,0.15); }
.bar-sixths .bar-part.shaded { background: var(--pink); }

.bar-eighths .bar-part { background: rgba(147,112,219,0.15); }
.bar-eighths .bar-part.shaded { background: var(--purple); }

.fraction-label {
  font-size: 16px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  color: var(--text2);
  margin-top: 8px;
}

/* Denominator buttons */
.denom-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 12px;
}

.denom-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}

.denom-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}

.denom-btn.active {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.15);
  color: var(--cyan);
}

/* Bar display area */
.bars-display {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 2px solid var(--border);
  min-height: 100px;
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 8px 0;
}

/* Answer buttons */
.answer-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
  max-width: 400px;
  width: 100%;
}

.answer-btn {
  padding: 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}

.answer-btn:hover {
  border-color: var(--cyan);
  background: rgba(0,212,255,0.05);
  transform: scale(1.05);
}

.answer-btn.correct-flash {
  border-color: var(--green);
  background: rgba(0,230,118,0.15);
  color: var(--green);
}

.answer-btn.incorrect-flash {
  border-color: var(--pink);
  background: rgba(255,59,139,0.15);
  color: var(--pink);
}

/* Game info */
.game-info {
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Play controls */
.play-controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL (Instructions / Score) ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .side-panel {
    width: 220px;
  }
  .fraction-bars-container {
    max-width: 100%;
  }
  .bar-part {
    font-size: 10px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Fraction Bars Explorer</div>
    <span class="vinculum-header-badge">3 · NF</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">3.NF.1</span>
    <span class="vinculum-std-tag">3.NF.2</span>
    <span class="vinculum-std-tag">3.NF.3</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">Emergent</button>
    <button class="vinculum-diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">Developing</button>
    <button class="vinculum-diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">Secure</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure
  score: 0,
  total: 0,
  streak: 0,

  // Explore
  bars: [],             // Array of {denom, shaded}

  // Practice
  questionType: null,
  targetFraction: null, // {num, denom}
  currentBar: null,
  score: 0,
  total: 0,

  // Play
  gameRound: 0,
  gameScore: 0,
  gameStreak: 0,
  gameBest: 0,
  gameEnded: false,
  cardPairs: []
};

// ════════════════════════════════════════
// HELPER FUNCTIONS
// ════════════════════════════════════════
function getDenominators() {
  if (S.diff === 'emergent') return [2, 3, 4];
  if (S.diff === 'developing') return [2, 3, 4, 6];
  return [2, 3, 4, 6, 8];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Fractions show parts of a whole.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;
  S.bars = [];

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.gameRound === 0) {
    S.gameScore = 0;
    S.gameStreak = 0;
    S.gameRound = 1;
    S.gameBest = 0;
    S.gameEnded = false;
    initGame();
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'vinculum-mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'vinculum-mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.score = 0;
  S.total = 0;
  S.bars = [];
  S.gameScore = 0;
  S.gameStreak = 0;
  S.gameRound = 0;
  S.gameBest = 0;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  const denoms = getDenominators();

  let html = '<div class="fraction-bars-container">';

  // Whole bar reference
  html += '<div class="bar-section">';
  html += '<div class="bar-label">1 Whole</div>';
  html += '<div class="whole-bar">1 whole</div>';
  html += '</div>';

  // Current bars
  html += '<div class="bars-display" id="barsDisplay">';
  if (S.bars.length === 0) {
    html += '<div style="text-align:center;color:var(--muted);padding:20px;font-style:italic;">Tap a denominator below to create a fraction bar</div>';
  } else {
    S.bars.forEach((bar, idx) => {
      const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[bar.denom];
      const shaded = bar.shaded || 0;
      const frac = shaded + '/' + bar.denom;

      html += '<div style="display:flex;flex-direction:column;gap:8px;">';
      html += '<div class="bar-section">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      html += '<div class="bar-label">Bar ' + (idx + 1) + '</div>';
      html += '<button class="denom-btn" onclick="removeBar(' + idx + ')" style="background:rgba(255,59,139,0.1);border-color:var(--pink);color:var(--pink);padding:4px 8px;font-size:11px;">✕ Remove</button>';
      html += '</div>';
      html += '<div class="fraction-bar bar-' + denomClass + '" id="bar' + idx + '">';
      for (let i = 0; i < bar.denom; i++) {
        const isShaded = i < shaded ? 'shaded' : '';
        html += '<div class="bar-part ' + isShaded + '" onclick="toggleShade(' + idx + ',' + i + ')"></div>';
      }
      html += '</div>';
      html += '<div class="fraction-label">' + frac + '</div>';
      html += '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Denominator buttons
  html += '<div class="bar-section">';
  html += '<div class="bar-label">Create a fraction bar</div>';
  html += '<div class="denom-buttons">';
  denoms.forEach(d => {
    html += '<button class="denom-btn" onclick="addBar(' + d + ')">÷ ' + d + ' (' + {2:'halves',3:'thirds',4:'fourths',6:'sixths',8:'eighths'}[d] + ')</button>';
  });
  html += '</div>';
  html += '</div>';

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">What is a Fraction?</div>
      <div class="panel-text">
        A <strong>fraction</strong> names part of a whole.<br><br>
        <strong>Bottom number</strong> = how many equal parts the whole is cut into<br><br>
        <strong>Top number</strong> = how many parts we are talking about
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Explore</div>
      <div class="panel-text">
        <strong>1.</strong> Tap a denominator to divide a bar<br><br>
        <strong>2.</strong> Tap parts of the bar to shade them<br><br>
        <strong>3.</strong> Watch the fraction change!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Try This</div>
      <div class="panel-text">
        Create multiple bars and compare them. What's bigger: <strong>1/2</strong> or <strong>1/4</strong>?
      </div>
    </div>
  `;
}

function addBar(denom) {
  S.bars.push({denom: denom, shaded: 0});
  render();
}

function removeBar(idx) {
  S.bars.splice(idx, 1);
  render();
}

function toggleShade(barIdx, partIdx) {
  if (S.bars[barIdx].shaded === partIdx) {
    S.bars[barIdx].shaded = partIdx;
  } else if (S.bars[barIdx].shaded === partIdx + 1) {
    S.bars[barIdx].shaded = partIdx;
  } else {
    S.bars[barIdx].shaded = partIdx + 1;
  }
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  const denoms = getDenominators();

  let html = '<div class="fraction-bars-container">';

  // Score
  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  html += '<div class="bars-display" id="practiceDisplay">';

  if (S.questionType === 'identify') {
    // Show bar, ask to identify fraction
    const bar = S.currentBar;
    const denom = bar.denom;
    const shaded = bar.shaded;
    const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[denom];

    html += '<div class="bar-section" style="margin-bottom:16px;">';
    html += '<div class="bar-label">What fraction is shaded?</div>';
    html += '<div class="fraction-bar bar-' + denomClass + '">';
    for (let i = 0; i < denom; i++) {
      const isShaded = i < shaded ? 'shaded' : '';
      html += '<div class="bar-part ' + isShaded + '"></div>';
    }
    html += '</div>';
    html += '</div>';

    html += '<div class="practice-question">';
    html += '<div class="answer-grid">';
    for (let i = 1; i <= denom; i++) {
      const isCorrct = i === shaded;
      html += `<button class="answer-btn" onclick="practiceAnswer('identify', ${i}, ${isCorrct})">${i}/${denom}</button>`;
    }
    html += '</div>';
    html += '</div>';

  } else if (S.questionType === 'shade') {
    // Show bar, ask to shade a fraction
    const target = S.targetFraction;

    html += '<div class="bar-section" style="margin-bottom:16px;">';
    html += '<div class="bar-label">Shade ' + target.num + '/' + target.denom + ' of the bar</div>';
    const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[target.denom];

    html += '<div class="fraction-bar bar-' + denomClass + '" id="shadeBar">';
    for (let i = 0; i < target.denom; i++) {
      const shaded = S.currentBar ? (i < S.currentBar.shaded ? 'shaded' : '') : '';
      html += '<div class="bar-part ' + shaded + '" onclick="shadeBarPart(' + i + ')"></div>';
    }
    html += '</div>';
    html += '<div class="fraction-label" style="margin-top:8px;">' + (S.currentBar?.shaded || 0) + '/' + target.denom + '</div>';
    html += '</div>';

    html += '<button class="play-btn primary" onclick="checkShade()" style="margin-top:16px;">✓ Check</button>';

  } else if (S.questionType === 'compare') {
    // Show two bars, ask which is bigger
    const f1 = S.targetFraction;
    const f2 = S.targetFraction2 || {num: 1, denom: 4};

    html += '<div class="bar-section" style="margin-bottom:16px;">';
    html += '<div class="bar-label">Which is MORE?</div>';
    html += '<div style="display:flex;gap:16px;justify-content:center;">';

    [f1, f2].forEach((frac, idx) => {
      const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[frac.denom];
      html += '<div style="display:flex;flex-direction:column;gap:8px;">';
      html += '<div class="fraction-bar bar-' + denomClass + '" style="width:120px;" onclick="compareAnswer(' + idx + ',' + (f1.num/f1.denom > f2.num/f2.denom ? (idx === 0 ? 1 : 0) : (idx === 0 ? 0 : 1)) + ')">';
      for (let i = 0; i < frac.denom; i++) {
        const shaded = i < frac.num ? 'shaded' : '';
        html += '<div class="bar-part ' + shaded + '" style="font-size:10px;"></div>';
      }
      html += '</div>';
      html += '<div class="fraction-label" style="font-size:14px;">' + frac.num + '/' + frac.denom + '</div>';
      html += '</div>';
    });

    html += '</div>';
    html += '</div>';
  }

  html += '</div>';
  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        Read the question and use the fraction bar to help you answer.<br><br>
        Think about how many parts and how many are shaded!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        The <strong>denominator</strong> (bottom) tells you how many pieces. The <strong>numerator</strong> (top) tells you how many pieces are shaded.
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;
  const denoms = getDenominators();
  const types = [];

  if (S.diff === 'emergent') {
    types.push('identify', 'shade');
  } else if (S.diff === 'developing') {
    types.push('identify', 'shade', 'compare');
  } else {
    types.push('identify', 'shade', 'compare');
  }

  S.questionType = types[Math.floor(Math.random() * types.length)];

  if (S.questionType === 'identify') {
    const denom = denoms[Math.floor(Math.random() * denoms.length)];
    const shaded = randInt(1, Math.min(denom - 1, 3));
    S.currentBar = {denom: denom, shaded: shaded};
  } else if (S.questionType === 'shade') {
    const denom = denoms[Math.floor(Math.random() * denoms.length)];
    const num = randInt(1, Math.min(denom - 1, 3));
    S.targetFraction = {num: num, denom: denom};
    S.currentBar = {denom: denom, shaded: 0};
  } else if (S.questionType === 'compare') {
    const d1 = denoms[Math.floor(Math.random() * denoms.length)];
    const d2 = denoms[Math.floor(Math.random() * denoms.length)];
    const n1 = randInt(1, Math.min(d1 - 1, 2));
    const n2 = randInt(1, Math.min(d2 - 1, 2));
    S.targetFraction = {num: n1, denom: d1};
    S.targetFraction2 = {num: n2, denom: d2};
  }
}

function shadeBarPart(partIdx) {
  if (S.currentBar.shaded === partIdx + 1) {
    // Already shaded up to here, toggle off
    S.currentBar.shaded = partIdx;
  } else {
    // Shade up to and including this part
    S.currentBar.shaded = partIdx + 1;
  }
  render();
}

function checkShade() {
  if (S.currentBar.shaded === S.targetFraction.num) {
    showFB('✓ Perfect!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function practiceAnswer(type, answer, isCorrect) {
  if (isCorrect) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function compareAnswer(idx, isCorrect) {
  if (isCorrect === 1) {
    showFB('✓ You\'re right!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

// ─── PLAY MODE ───
function initGame() {
  S.cardPairs = [];
  const denoms = getDenominators();
  const pairs = [];

  denoms.forEach(d => {
    for (let n = 1; n <= Math.min(d - 1, 2); n++) {
      pairs.push({num: n, denom: d});
    }
  });

  // Shuffle and take first 5 pairs
  pairs.sort(() => Math.random() - 0.5);
  S.cardPairs = pairs.slice(0, 5).map((frac, idx) => ({
    id: idx,
    frac: frac,
    type: Math.random() > 0.5 ? 'bar' : 'number',
    matched: false,
    flipped: false
  }));

  // Duplicate for matching pairs
  const doubled = [];
  S.cardPairs.forEach(card => {
    doubled.push({...card, id: card.id * 2, type: 'bar', flipped: false});
    doubled.push({...card, id: card.id * 2 + 1, type: 'number', flipped: false});
  });

  S.cardPairs = doubled.sort(() => Math.random() - 0.5);
}

function renderPlay(ws, sp) {
  let html = '<div class="fraction-bars-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;">
      <div style="font-size:32px;font-weight:800;margin-bottom:20px;">Game Complete!</div>
      <div style="font-size:48px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0;">
        ${S.gameScore} ⭐
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Matches</span>
        <span>${Math.floor(S.gameScore / 20)}/5</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.gameScore}</span>
      </div>
    </div>`;

    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:500px;padding:20px;background:var(--card);border-radius:12px;border:2px solid var(--border);">';

    S.cardPairs.forEach((card, idx) => {
      if (card.matched) {
        html += '<div style="opacity:0.3;pointer-events:none;aspect-ratio:1;border-radius:10px;background:var(--bg);border:2px dashed var(--border);"></div>';
      } else {
        html += '<button class="play-btn" onclick="flipCard(' + idx + ')" style="aspect-ratio:1;padding:0;display:flex;align-items:center;justify-content:center;font-size:32px;flex-direction:column;">';

        if (card.flipped) {
          if (card.type === 'bar') {
            const f = card.frac;
            const denomClass = {2:'halves', 3:'thirds', 4:'fourths', 6:'sixths', 8:'eighths'}[f.denom];
            html += '<div class="fraction-bar bar-' + denomClass + '" style="width:80%;height:30px;">';
            for (let i = 0; i < f.denom; i++) {
              const shaded = i < f.num ? 'shaded' : '';
              html += '<div class="bar-part ' + shaded + '" style="font-size:8px;"></div>';
            }
            html += '</div>';
          } else {
            html += '<div style="font-family:JetBrains Mono;font-weight:800;font-size:24px;color:var(--cyan);">' + card.frac.num + '/' + card.frac.denom + '</div>';
          }
        } else {
          html += '?';
        }

        html += '</button>';
      }
    });

    html += '</div>';
  }

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.gameScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Fraction Match</div>
      <div class="panel-text">
        Match bars to their fractions!<br><br>
        <strong>Tap cards</strong> to flip them.<br><br>
        <strong>Find pairs</strong> that show the same fraction.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Each match = 20 points<br>
        Bonus for streaks!
      </div>
    </div>
  `;
}

let flipped = [];

function flipCard(idx) {
  if (S.cardPairs[idx].matched || S.cardPairs[idx].flipped || flipped.length >= 2) return;

  S.cardPairs[idx].flipped = true;
  flipped.push(idx);

  if (flipped.length === 2) {
    const c1 = S.cardPairs[flipped[0]];
    const c2 = S.cardPairs[flipped[1]];

    if (c1.frac.num === c2.frac.num && c1.frac.denom === c2.frac.denom) {
      // Match!
      showFB('✓ Match!', 'correct');
      S.gameScore += 20;
      c1.matched = true;
      c2.matched = true;

      const matched = S.cardPairs.filter(c => c.matched).length;
      if (matched === S.cardPairs.length) {
        setTimeout(() => {
          S.gameEnded = true;
          render();
        }, 800);
      } else {
        setTimeout(() => {
          flipped = [];
          render();
        }, 800);
      }
    } else {
      showFB('✗ No match', 'incorrect');
      setTimeout(() => {
        c1.flipped = false;
        c2.flipped = false;
        flipped = [];
        render();
      }, 1200);
    }
  } else {
    render();
  }
}

function playAgain() {
  S.gameScore = 0;
  S.gameStreak = 0;
  S.gameRound = 1;
  S.gameEnded = false;
  flipped = [];
  initGame();
  render();
}

render();
