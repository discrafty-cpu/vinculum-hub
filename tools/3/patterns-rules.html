<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Patterns & Rules</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.vinculum-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.vinculum-back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-back-btn:hover { background: var(--card); color: var(--cyan); }
.vinculum-header-title {
  font-size: 18px;
  font-weight: 800;
}
.vinculum-header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.vinculum-header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.vinculum-std-tags {
  display: flex;
  gap: 6px;
}
.vinculum-std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.vinculum-std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.vinculum-mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vinculum-mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.vinculum-mode-tab:hover { color: var(--text2); background: var(--card); }
.vinculum-mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.vinculum-mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.vinculum-mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.vinculum-diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.vinculum-diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.vinculum-diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.vinculum-diff-btn:hover { color: var(--text2); }
.vinculum-diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── PATTERN CONTAINER ── */
.pattern-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 600px;
}

/* Multiplication table grid */
.mult-table {
  display: inline-grid;
  gap: 2px;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  border: 2px solid var(--border);
  grid-auto-flow: dense;
}

.mult-cell {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}

.mult-cell:hover {
  background: rgba(0,212,255,0.1);
  border-color: var(--cyan);
  transform: scale(1.1);
}

.mult-cell.header-cell {
  background: transparent;
  border: none;
  cursor: default;
  font-weight: 700;
  color: var(--cyan);
}

.mult-cell.header-cell:hover {
  background: transparent;
  border: none;
  transform: none;
}

.mult-cell.highlight {
  background: rgba(0,212,255,0.2);
  border-color: var(--cyan);
}

/* Pattern info card */
.pattern-info {
  text-align: center;
  padding: 16px 20px;
  background: rgba(0,212,255,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.pattern-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  margin-bottom: 8px;
}

.pattern-sequence {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin: 6px 0;
}

.pattern-description {
  font-size: 13px;
  color: var(--text2);
  margin-top: 6px;
}

/* Sequence cards for play mode */
.sequence-display {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.number-card {
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 24px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  animation: pop 0.3s ease-out;
}

.number-card.blank {
  color: var(--muted);
  background: transparent;
  border-style: dashed;
  font-size: 28px;
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 28px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 12px 0;
}

/* Input fields */
.input-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 70px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* Play mode game */
.game-info {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* Detective badge for rules */
.detective-badge {
  padding: 16px 20px;
  background: rgba(255,193,7,0.1);
  border-radius: 12px;
  border: 2px solid var(--yellow);
  text-align: center;
  margin-top: 12px;
}

.detective-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--yellow);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.rule-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
}

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL (Instructions / Score) ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .mult-cell {
    width: 32px;
    height: 32px;
    font-size: 10px;
  }
  .number-card {
    width: 50px;
    height: 50px;
    font-size: 20px;
  }
  .side-panel {
    width: 220px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Patterns & Rules</div>
    <span class="vinculum-header-badge">3 · OA</span>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">3.OA.9</span>
    <span class="std-tag mn">MN 3.1.2.1</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">1–5</button>
    <button class="vinculum-diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">1–10</button>
    <button class="vinculum-diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">1–12</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure

  // Explore
  highlightRow: -1,
  highlightCol: -1,

  // Practice
  questionType: null,
  targetSequence: [],
  targetRule: '',
  userAnswer: '',
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  gameEnded: false,
  playSequence: [],
  playRule: ''
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Patterns help us predict! Finding patterns in multiplication makes facts easier to remember.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getMaxFactor() {
  return { emergent: 5, developing: 10, secure: 12 }[S.diff];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateMultTable() {
  const max = getMaxFactor();
  let table = [];
  for (let i = 1; i <= max; i++) {
    let row = [];
    for (let j = 1; j <= max; j++) {
      row.push(i * j);
    }
    table.push(row);
  }
  return table;
}

// Pattern observations for different rules
const PATTERN_FACTS = {
  evens: { title: 'Multiples of 2', desc: 'All multiples of 2 are even!' },
  fives: { title: 'Multiples of 5', desc: 'All multiples of 5 end in 0 or 5!' },
  nines: { title: 'Multiples of 9', desc: 'Digit sum equals 9! (18: 1+8=9)' },
  doubles: { title: 'The 4s Pattern', desc: 'The 4 column is double the 2 column!' },
  threes: { title: 'Multiples of 3', desc: 'Every third number in order!' }
};

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.gameEnded = false;
    generatePlaySequence();
  }

  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.className = 'vinculum-mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'vinculum-mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.highlightRow = -1;
  S.highlightCol = -1;
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;

  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  let html = '<div class="pattern-container">';

  const table = generateMultTable();
  const max = getMaxFactor();

  // Build multiplication table
  html += '<div class="mult-table" style="grid-template-columns: repeat(' + (max + 1) + ', 1fr);">';

  // Header row
  html += '<div class="mult-cell header-cell"></div>';
  for (let i = 1; i <= max; i++) {
    html += '<div class="mult-cell header-cell">' + i + '</div>';
  }

  // Data rows
  for (let i = 0; i < max; i++) {
    html += '<div class="mult-cell header-cell">' + (i + 1) + '</div>';
    for (let j = 0; j < max; j++) {
      const isHighlight = (S.highlightRow === i) || (S.highlightCol === j);
      const cellClass = isHighlight ? 'mult-cell highlight' : 'mult-cell';
      html += '<div class="' + cellClass + '" onclick="highlightRowCol(' + i + ',' + j + ')" title="Click to highlight">' + table[i][j] + '</div>';
    }
  }

  html += '</div>';

  // Pattern info card
  let patternHtml = '<div class="pattern-info">';
  if (S.highlightRow >= 0) {
    const num = S.highlightRow + 1;
    const seq = [];
    for (let i = 1; i <= max; i++) seq.push(num * i);
    patternHtml += '<div class="pattern-title">Multiples of ' + num + '</div>';
    patternHtml += '<div class="pattern-sequence">' + seq.join(', ') + '</div>';
  } else if (S.highlightCol >= 0) {
    const num = S.highlightCol + 1;
    const seq = [];
    for (let i = 1; i <= max; i++) seq.push(num * i);
    patternHtml += '<div class="pattern-title">Multiples of ' + num + '</div>';
    patternHtml += '<div class="pattern-sequence">' + seq.join(', ') + '</div>';
  } else {
    patternHtml += '<div class="pattern-title">Click a row or column</div>';
    patternHtml += '<div class="pattern-sequence" style="font-size:14px;">Tap a number to see its pattern</div>';
  }
  patternHtml += '</div>';
  html += patternHtml;

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">How It Works</div>
      <div class="panel-text">
        <strong>Tap any number</strong> in the table.<br><br>
        All numbers in that <strong>row or column</strong> will highlight.<br><br>
        You'll see a <strong>pattern</strong> emerge!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Key Concept</div>
      <div class="panel-text">
        <strong>Patterns</strong> are sequences that repeat a rule. The multiplication table is full of patterns!<br><br>
        Knowing patterns helps you learn facts faster.
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Patterns to Find</div>
      <div class="panel-text">
        <strong>Evens:</strong> 2, 4, 6, 8...<br><br>
        <strong>Fives:</strong> 5, 10, 15, 20... (end in 0 or 5)<br><br>
        <strong>Nines:</strong> Digits add to 9!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standards</div>
      <div class="panel-text">
        <strong>3.OA.9</strong> — Identify patterns in arithmetic
      </div>
    </div>
  `;
}

function highlightRowCol(row, col) {
  if (S.highlightRow === row && S.highlightCol === -1) {
    S.highlightRow = -1;
  } else if (S.highlightCol === col && S.highlightRow === -1) {
    S.highlightCol = -1;
  } else {
    S.highlightRow = row;
    S.highlightCol = -1;
  }
  render();
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  let html = '<div class="pattern-container">';

  html += '<div style="text-align:center;margin-bottom:12px;"><div style="font-size:14px;color:var(--muted);">⭐ ' + S.score + '/' + S.total + '</div></div>';

  if (S.questionType === 'next-number') {
    // Sequence: what comes next?
    html += '<div class="sequence-display">';
    for (let i = 0; i < S.targetSequence.length; i++) {
      html += '<div class="number-card">' + S.targetSequence[i] + '</div>';
    }
    html += '<div class="number-card blank">?</div>';
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">What comes next?</div>
      <div class="input-group">
        <div id="vi-container"></div>
        <button class="play-btn primary" onclick="submitPatternAnswer()">✓ Check</button>
      </div>
    </div>`;

  } else if (S.questionType === 'fill-missing') {
    // Fill in missing numbers
    html += '<div class="sequence-display">';
    const blanks = [1, 3];
    for (let i = 0; i < 5; i++) {
      if (blanks.includes(i)) {
        html += '<input type="number" class="number-input" id="blank' + i + '" placeholder="?" style="width:60px;" />';
      } else {
        html += '<div class="number-card">' + S.targetSequence[i] + '</div>';
      }
    }
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">Fill in the missing numbers</div>
      <div class="input-group">
        <button class="play-btn primary" onclick="submitFillMissing()">✓ Check</button>
      </div>
    </div>`;

  } else if (S.questionType === 'name-rule') {
    // What's the rule?
    html += '<div class="sequence-display">';
    for (let i = 0; i < Math.min(4, S.targetSequence.length); i++) {
      html += '<div class="number-card">' + S.targetSequence[i] + '</div>';
    }
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">What's the rule?</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;">Examples: "Add 3", "Multiples of 5", "Skip count by 2"</div>
      <div class="input-group" style="flex-direction:column;margin-top:12px;">
        <input type="text" class="number-input" id="ruleInput" placeholder="Type the rule..." style="width:100%;font-family:inherit;" />
        <button class="play-btn primary" style="width:100%;margin-top:8px;" onclick="submitRuleName()">✓ Check</button>
      </div>
    </div>`;

  } else if (S.questionType === 'true-false' && S.diff === 'developing') {
    // True or false: about patterns
    html += `<div class="practice-question">
      <div class="question-text">${S.targetRule}</div>
      <div class="input-group" style="gap:16px;margin-top:20px;">
        <button class="play-btn primary" style="background:rgba(0,230,118,0.2);color:var(--green);border-color:var(--green);" onclick="submitTrueFalse(true)">✓ True</button>
        <button class="play-btn primary" style="background:rgba(255,59,139,0.2);color:var(--pink);border-color:var(--pink);" onclick="submitTrueFalse(false)">✗ False</button>
      </div>
    </div>`;

  } else if (S.questionType === 'explain' && S.diff === 'secure') {
    // More complex: find relationship
    html += `<div class="practice-question">
      <div class="question-text">${S.targetRule}</div>
      <div class="input-group" style="flex-direction:column;margin-top:12px;">
        <input type="text" class="number-input" id="explainInput" placeholder="Explain..." style="width:100%;font-family:inherit;" />
        <button class="play-btn primary" style="width:100%;margin-top:8px;" onclick="submitExplanation()">✓ Submit</button>
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  if (S.questionType === 'next-number') {
    setTimeout(() => {
      const expected = S.targetSequence[S.targetSequence.length - 1] + (S.targetSequence[1] - S.targetSequence[0]);
      var vi = VinculumInput.create(document.getElementById('vi-container'), {
        type: 'auto',
        answer: expected,
        onSubmit: function(value) { submitPatternAnswer(value); }
      });
    }, 50);
  } else if (S.questionType === 'fill-missing' || S.questionType === 'name-rule') {
    setTimeout(() => document.getElementById('blank1')?.focus() || document.getElementById('ruleInput')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        ${S.questionType === 'next-number' ? 'Look at the pattern and predict the next number.' : ''}
        ${S.questionType === 'fill-missing' ? 'Fill in the blank numbers following the pattern.' : ''}
        ${S.questionType === 'name-rule' ? 'Describe the rule in the sequence.' : ''}
        ${S.questionType === 'true-false' ? 'Decide if the statement is true or false.' : ''}
        ${S.questionType === 'explain' ? 'Explain your thinking in a sentence or two.' : ''}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        ${S.questionType === 'next-number' ? 'What do you add (or multiply by) each time?' : ''}
        ${S.questionType === 'fill-missing' ? 'Keep the same rule consistent!' : ''}
        ${S.questionType === 'name-rule' ? 'Is it "Add X" or "Multiples of X"?' : ''}
        ${S.questionType === 'true-false' ? 'Think about what you know about the numbers.' : ''}
        ${S.questionType === 'explain' ? 'Look at similar patterns you\'ve seen.' : ''}
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;

  const types = ['next-number', 'fill-missing', 'name-rule'];
  if (S.diff === 'developing') types.push('true-false');
  if (S.diff === 'secure') types.push('explain');

  S.questionType = types[Math.floor(Math.random() * types.length)];

  // Generate sequences based on difficulty
  let start, step;
  if (S.diff === 'emergent') {
    step = randInt(2, 5);
    start = randInt(1, 10);
  } else if (S.diff === 'developing') {
    step = randInt(2, 10);
    start = randInt(1, 10);
  } else {
    step = randInt(3, 12);
    start = randInt(1, 20);
  }

  S.targetSequence = [];
  for (let i = 0; i < 4; i++) {
    S.targetSequence.push(start + (i * step));
  }

  S.targetRule = 'Add ' + step + ' each time';
}

function submitPatternAnswer(value) {
  const expected = S.targetSequence[S.targetSequence.length - 1] + (S.targetSequence[1] - S.targetSequence[0]);
  const val = value !== undefined ? value : parseInt(document.getElementById('answerInput')?.value || 0);

  if (val === expected) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function submitFillMissing() {
  const v1 = parseInt(document.getElementById('blank1')?.value || 0);
  const v3 = parseInt(document.getElementById('blank3')?.value || 0);

  if (v1 === S.targetSequence[1] && v3 === S.targetSequence[3]) {
    showFB('✓ Perfect!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Check the pattern', 'incorrect');
  }
}

function submitRuleName() {
  const input = document.getElementById('ruleInput')?.value.toLowerCase() || '';
  const step = S.targetSequence[1] - S.targetSequence[0];
  const keyPhrases = ['add ' + step, 'skip count', 'multiples', '+' + step];

  if (keyPhrases.some(p => input.includes(p))) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Think about what changes', 'try-again');
  }
}

function submitTrueFalse(answer) {
  // Simplified: randomly decide for now
  const isTrue = Math.random() > 0.4;
  if (answer === isTrue) {
    showFB('✓ Correct!', 'correct');
    S.score++;
  } else {
    showFB('✗ Not quite', 'incorrect');
  }
  setTimeout(() => {
    newPracticeQuestion();
    render();
  }, 800);
}

function submitExplanation() {
  const input = document.getElementById('explainInput')?.value || '';
  if (input.length > 10) {
    showFB('✓ Great explanation!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Tell me more', 'try-again');
  }
}

// ─── PLAY MODE ───
function generatePlaySequence() {
  let step, start;
  if (S.diff === 'emergent') {
    step = randInt(2, 5);
    start = randInt(2, 10);
  } else if (S.diff === 'developing') {
    step = randInt(2, 10);
    start = randInt(2, 20);
  } else {
    step = randInt(3, 12);
    start = randInt(5, 30);
  }

  S.playSequence = [];
  for (let i = 0; i < 4; i++) {
    S.playSequence.push(start + (i * step));
  }
  S.playRule = 'Add ' + step;
}

function renderPlay(ws, sp) {
  let html = '<div class="pattern-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Pattern Master!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Round</span>
        <span>${S.playRound} / 10</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🔥 Streak</span>
        <span>${S.playStreak}</span>
      </div>
    </div>`;

    // Display sequence
    html += '<div class="sequence-display">';
    for (let n of S.playSequence) {
      html += '<div class="number-card">' + n + '</div>';
    }
    html += '<div class="number-card blank">?</div>';
    html += '<div class="number-card blank">?</div>';
    html += '</div>';

    html += `<div class="practice-question">
      <div class="question-text">What are the next TWO numbers?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="playN1" placeholder="?" />
        <input type="number" class="number-input" id="playN2" placeholder="?" />
        <button class="play-btn primary" onclick="submitPlayPattern()">✓</button>
      </div>
    </div>`;

    // Show rule hint after a few rounds
    if (S.playRound > 3) {
      html += `<div class="detective-badge" style="margin-top:16px;">
        <div class="detective-title">🔍 Pattern Rule</div>
        <div class="rule-text">${S.playRule}</div>
      </div>`;
    }
  }

  html += '</div>';
  ws.innerHTML = html;

  if (!S.gameEnded) {
    setTimeout(() => document.getElementById('playN1')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 10, 100)}%;"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        You see <strong>4 numbers</strong> in a pattern.<br><br>
        Type the <strong>next 2 numbers</strong>.<br><br>
        Keep your <strong>streak</strong> alive!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Base: <strong>10 points</strong><br>
        Streak bonus: <strong>+2 × streak</strong><br>
        <strong>Max: 30 pts/round</strong>
      </div>
    </div>
  `;
}

function submitPlayPattern() {
  const n1 = parseInt(document.getElementById('playN1')?.value || 0);
  const n2 = parseInt(document.getElementById('playN2')?.value || 0);

  const step = S.playSequence[1] - S.playSequence[0];
  const expected1 = S.playSequence[3] + step;
  const expected2 = expected1 + step;

  if (n1 === expected1 && n2 === expected2) {
    showFB('✓ Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 2);
    S.playStreak++;
    S.playRound++;

    if (S.playRound > 10) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      setTimeout(() => {
        generatePlaySequence();
        render();
      }, 800);
    }
  } else {
    showFB('✗ Try again', 'incorrect');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  generatePlaySequence();
  render();
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
render();
</script>
