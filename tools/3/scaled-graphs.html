<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Scaled Graphs</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.back-btn:hover { background: var(--card); color: var(--cyan); }
.header-title {
  font-size: 18px;
  font-weight: 800;
}
.header-title span {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.2);
  letter-spacing: 1px;
}
.std-tags {
  display: flex;
  gap: 6px;
}
.std-tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,212,255,0.08);
  color: var(--cyan);
}
.std-tag.mn { background: rgba(255,145,0,0.08); color: var(--orange); }

/* ── MODE TABS ── */
.mode-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mode-tab {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.mode-tab:hover { color: var(--text2); background: var(--card); }
.mode-tab.active-explore { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }
.mode-tab.active-practice { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
.mode-tab.active-play { background: rgba(255,59,139,0.1); color: var(--pink); border-color: rgba(255,59,139,0.3); }

/* Difficulty selector */
.diff-selector {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.diff-label {
  font-size: 11px;
  color: var(--muted);
  margin-right: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.diff-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.diff-btn:hover { color: var(--text2); }
.diff-btn.active { background: rgba(0,212,255,0.1); color: var(--cyan); border-color: rgba(0,212,255,0.3); }

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── WORKSPACE ── */
.workspace {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-y: auto;
}

/* ── GRAPH BUILDER ── */
.graph-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 700px;
}

.graph-area {
  display: flex;
  gap: 24px;
  align-items: flex-end;
  padding: 20px;
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  position: relative;
  min-height: 320px;
  min-width: 400px;
}

.y-axis {
  display: flex;
  flex-direction: column-reverse;
  gap: 8px;
  align-items: flex-end;
  font-size: 11px;
  color: var(--muted);
  min-width: 40px;
  font-weight: 600;
}

.bars-wrapper {
  display: flex;
  gap: 20px;
  align-items: flex-end;
  flex: 1;
}

.bar-column {
  display: flex;
  flex-direction: column-reverse;
  gap: 8px;
  align-items: center;
  cursor: pointer;
}

.bar-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-align: center;
  min-width: 50px;
}

.bar-segment {
  width: 40px;
  height: 30px;
  border-radius: 4px 4px 0 0;
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bar-segment:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.5);
}

.bar-segment.bar-0 { background: var(--cyan); }
.bar-segment.bar-1 { background: var(--green); }
.bar-segment.bar-2 { background: #F59E0B; }
.bar-segment.bar-3 { background: #EC4899; }

.bar-ticks {
  font-size: 8px;
  color: rgba(0,0,0,0.3);
  position: absolute;
  width: 100%;
  display: flex;
  flex-direction: column-reverse;
  justify-content: space-between;
  padding: 2px 4px;
  box-sizing: border-box;
}

.bar-tick { width: 6px; height: 1px; background: rgba(0,0,0,0.3); }

/* Data table */
.data-table {
  background: rgba(0,212,255,0.05);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 16px;
  font-size: 13px;
  width: 100%;
}

.table-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.table-row:last-child {
  border-bottom: none;
}

.table-label {
  color: var(--text2);
  font-weight: 600;
}

.table-value {
  font-family: 'JetBrains Mono', monospace;
  color: var(--cyan);
  font-weight: 700;
}

/* Scale and type selector */
.controls-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.control-box {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.control-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.scale-buttons {
  display: flex;
  gap: 6px;
}

.scale-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.scale-btn:hover { background: var(--card); }
.scale-btn.active {
  background: rgba(0,212,255,0.1);
  color: var(--cyan);
  border-color: rgba(0,212,255,0.3);
}

.type-buttons {
  display: flex;
  gap: 6px;
}

.type-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.type-btn:hover { background: var(--card); }
.type-btn.active {
  background: rgba(0,230,118,0.1);
  color: var(--green);
  border-color: rgba(0,230,118,0.3);
}

/* Practice question */
.practice-question {
  text-align: center;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
}

.question-text {
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
}

.question-highlight {
  font-size: 24px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
  margin: 12px 0;
}

/* Input fields */
.input-group {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

.number-input {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  width: 70px;
  transition: all 0.2s;
}

.number-input:focus {
  border-color: var(--cyan);
  outline: none;
}

/* Play mode game */
.game-info {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.play-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.play-btn:hover { background: rgba(0,212,255,0.1); color: var(--cyan); }

.play-btn.primary {
  background: var(--grad);
  color: var(--bg);
  border-color: transparent;
  font-weight: 700;
}

.play-btn.primary:hover { opacity: 0.9; }

/* ── FEEDBACK ── */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 28px;
  font-weight: 800;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.correct {
  background: rgba(0,230,118,0.15);
  color: var(--green);
  border: 2px solid var(--green);
}
.feedback.incorrect {
  background: rgba(255,59,139,0.15);
  color: var(--pink);
  border: 2px solid var(--pink);
}
.feedback.try-again {
  background: rgba(255,193,7,0.15);
  color: var(--yellow);
  border: 2px solid var(--yellow);
}

/* ── SIDE PANEL (Instructions / Score) ── */
.side-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-section {
  margin-bottom: 20px;
}
.panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}
.score-display {
  text-align: center;
  padding: 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
}
.score-value {
  font-size: 36px;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.score-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.streak-bar {
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.streak-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.pop-in { animation: pop 0.3s ease-out forwards; }
.shake { animation: shake 0.3s ease-in-out; }
.hop { animation: hop 0.4s ease-in-out; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .graph-area {
    min-width: 280px;
    gap: 12px;
    padding: 12px;
  }
  .bar-segment {
    width: 32px;
    height: 24px;
  }
  .side-panel {
    width: 220px;
  }
  .bars-wrapper {
    gap: 12px;
  }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <a class="back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="header-title"><span>VINCULUM</span> Scaled Graphs</div>
    <span class="header-badge">3 · MD</span>
    <button class="back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud">🔊 Read to Me</button>
  </div>
  <div class="std-tags">
    <span class="std-tag">3.MD.3</span>
  </div>
</div>

<!-- ═══ MODE TABS ═══ -->
<div class="mode-tabs">
  <button class="mode-tab active-explore" id="tabExplore" onclick="setMode('explore')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore
  </button>
  <button class="mode-tab" id="tabPractice" onclick="setMode('practice')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice
  </button>
  <button class="mode-tab" id="tabPlay" onclick="setMode('play')">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play
  </button>
  <div class="diff-selector">
    <span class="diff-label">Level</span>
    <button class="diff-btn active" id="diffE" onclick="setDiff('emergent')" data-diff="emergent">1–2</button>
    <button class="diff-btn" id="diffD" onclick="setDiff('developing')" data-diff="developing">1–5</button>
    <button class="diff-btn" id="diffS" onclick="setDiff('secure')" data-diff="secure">1–10</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>

<!-- ═══ FEEDBACK POPUP ═══ -->
<div class="feedback" id="feedback"></div>

<script>
function showFB(t,c){var f=document.getElementById("feedback");if(!f)return;f.textContent=t;f.className="feedback "+c+" show";setTimeout(function(){f.classList.remove("show");},1200);}

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  mode: 'explore',      // explore | practice | play
  diff: 'emergent',     // emergent | developing | secure

  // Data
  data: {
    'Apples': 6,
    'Bananas': 9,
    'Grapes': 3,
    'Oranges': 12
  },

  // Explore
  scale: 1,
  graphType: 'bar',     // bar | picture
  barHeights: { 'Apples': 0, 'Bananas': 0, 'Grapes': 0, 'Oranges': 0 },

  // Practice
  questionType: null,   // read-scale | interpret-graph | compare | build-graph | choose-scale
  targetData: {},
  targetScale: 1,
  userAnswers: {},
  score: 0,
  total: 0,

  // Play
  playScore: 0,
  playStreak: 0,
  playRound: 0,
  gameEnded: false
};

// ════════════════════════════════════════
// READ-ALOUD
// ════════════════════════════════════════
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
  } else {
    const text = document.getElementById('sidePanel')?.textContent || 'Scaled graphs use a scale to represent data.';
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').textContent = '🔊 Read to Me';
      }});
      document.getElementById('readAloudBtn').textContent = '⏹ Stop';
    }
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getScaleOptions() {
  const scales = { emergent: [1, 2], developing: [1, 2, 3, 5], secure: [1, 2, 3, 5, 10] };
  return scales[S.diff];
}

function getMaxValue() {
  return Math.max(...Object.values(S.data));
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getRandomItem(obj) {
  const keys = Object.keys(obj);
  return keys[Math.floor(Math.random() * keys.length)];
}

// ════════════════════════════════════════
// MODE SWITCHING
// ════════════════════════════════════════
function setMode(mode) {
  S.mode = mode;

  if (mode === 'practice' && S.total === 0) {
    S.score = 0;
    S.total = 0;
    newPracticeQuestion();
  }

  if (mode === 'play' && S.playRound === 0) {
    S.playScore = 0;
    S.playStreak = 0;
    S.playRound = 1;
    S.gameEnded = false;
  }

  document.querySelectorAll('.mode-tab').forEach(t => t.className = 'mode-tab');
  const tabEl = document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1));
  tabEl.className = 'mode-tab active-' + mode;

  render();
}

function setDiff(diff) {
  S.diff = diff;
  S.scale = 1;
  S.score = 0;
  S.total = 0;
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 0;

  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + diff.charAt(0).toUpperCase()).classList.add('active');

  setMode(S.mode);
}

// ════════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════════
function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');

  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

// ─── EXPLORE MODE ───
function renderExplore(ws, sp) {
  let html = '<div class="graph-container">';

  // Graph area
  html += '<div class="graph-area" id="graphArea">';
  html += '<div class="y-axis" id="yAxis">';
  for (let i = 0; i <= 5; i++) {
    html += `<div>${i * S.scale}</div>`;
  }
  html += '</div>';

  html += '<div class="bars-wrapper">';
  const categories = Object.keys(S.data);
  categories.forEach((cat, idx) => {
    const val = S.data[cat];
    const barHeight = (val / S.scale) * 30;
    html += `<div class="bar-column">`;
    html += `<div style="display:flex;flex-direction:column;gap:4px;height:${barHeight}px;justify-content:flex-start;">`;
    for (let i = 0; i < val / S.scale; i++) {
      html += `<div class="bar-segment bar-${idx}" onclick="addBarSegment('${cat}')"></div>`;
    }
    html += `</div>`;
    html += `<div class="bar-label">${cat}</div>`;
    html += `</div>`;
  });
  html += '</div>';
  html += '</div>';

  // Data table
  html += '<div class="data-table">';
  html += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;">Data</div>';
  Object.entries(S.data).forEach(([cat, val]) => {
    html += `<div class="table-row">
      <span class="table-label">${cat}</span>
      <span class="table-value">${val}</span>
    </div>`;
  });
  html += '</div>';

  // Controls
  html += `<div class="controls-row">
    <div class="control-box">
      <div class="control-label">Scale</div>
      <div class="scale-buttons">
        ${getScaleOptions().map(s => `<button class="scale-btn ${s === S.scale ? 'active' : ''}" onclick="setScale(${s})">Each = ${s}</button>`).join('')}
      </div>
    </div>
    <div class="control-box">
      <div class="control-label">Type</div>
      <div class="type-buttons">
        <button class="type-btn ${S.graphType === 'bar' ? 'active' : ''}" onclick="setGraphType('bar')">Bar</button>
        <button class="type-btn ${S.graphType === 'picture' ? 'active' : ''}" onclick="setGraphType('picture')">Picture</button>
      </div>
    </div>
  </div>`;

  html += '</div>';
  ws.innerHTML = html;

  // Side panel
  sp.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">How It Works</div>
      <div class="panel-text">
        <strong>Scaled graphs</strong> help us show big numbers clearly.<br><br>
        Each bar segment or picture represents <strong>multiple items</strong>, not just one!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Understanding Scale</div>
      <div class="panel-text">
        When <strong>scale = 2</strong>: Each picture = 2 items<br>
        <strong>3 pictures = 6 items</strong><br><br>
        When <strong>scale = 5</strong>: Each picture = 5 items<br>
        <strong>3 pictures = 15 items</strong>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Why Use Scales?</div>
      <div class="panel-text">
        When data values are large, using a scale makes the graph easier to draw and read!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Standards</div>
      <div class="panel-text">
        <strong>3.MD.3</strong> — Draw scaled picture and bar graphs
      </div>
    </div>
  `;
}

function setScale(s) {
  S.scale = s;
  render();
}

function setGraphType(t) {
  S.graphType = t;
  render();
}

function addBarSegment(cat) {
  // Placeholder for future interactive bar building
}

// ─── PRACTICE MODE ───
function renderPractice(ws, sp) {
  let html = '<div class="graph-container">';

  html += `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:14px;color:var(--muted);">⭐ ${S.score}/${S.total}</div>
  </div>`;

  const types = S.questionType;

  if (types === 'read-scale') {
    // "If each square = 2, how many does 4 squares represent?"
    const scaleVal = S.targetScale;
    const numSquares = randInt(1, 5);
    const correct = numSquares * scaleVal;

    html += `<div class="practice-question">
      <div class="question-text">If each square = ${scaleVal}, how many does ${numSquares} square${numSquares > 1 ? 's' : ''} represent?</div>
      <div class="question-highlight">${numSquares} × ${scaleVal} = ?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="answerInput" placeholder="?" />
        <button class="play-btn primary" onclick="submitPracticeAnswer(${correct})">✓ Check</button>
      </div>
    </div>`;

  } else if (types === 'interpret-graph') {
    // Show scaled graph, ask "How many chose X?"
    const categories = Object.keys(S.targetData);
    const q = getRandomItem(S.targetData);
    const answer = S.targetData[q];

    html += `<div style="margin-bottom:20px;"><strong style="color:var(--text2);">Graph with scale = ${S.targetScale}:</strong></div>`;
    html += '<div class="graph-area">';
    html += '<div class="y-axis">';
    for (let i = 0; i <= 5; i++) {
      html += `<div>${i * S.targetScale}</div>`;
    }
    html += '</div>';
    html += '<div class="bars-wrapper">';
    categories.forEach((cat, idx) => {
      const val = S.targetData[cat];
      const barHeight = (val / S.targetScale) * 30;
      html += `<div class="bar-column">`;
      html += `<div style="display:flex;flex-direction:column;gap:4px;height:${barHeight}px;justify-content:flex-start;">`;
      for (let i = 0; i < val / S.targetScale; i++) {
        html += `<div class="bar-segment bar-${idx}"></div>`;
      }
      html += `</div><div class="bar-label">${cat}</div></div>`;
    });
    html += '</div></div>';

    html += `<div class="practice-question">
      <div class="question-text">How many chose <strong>${q}</strong>?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="answerInput" placeholder="?" />
        <button class="play-btn primary" onclick="submitPracticeAnswer(${answer})">✓ Check</button>
      </div>
    </div>`;

  } else if (types === 'compare') {
    // "How many more chose X than Y?"
    const categories = Object.keys(S.targetData);
    const cat1 = categories[0];
    const cat2 = categories[1];
    const val1 = S.targetData[cat1];
    const val2 = S.targetData[cat2];
    const answer = Math.abs(val1 - val2);

    html += `<div style="margin-bottom:20px;"><strong style="color:var(--text2);">Graph with scale = ${S.targetScale}:</strong></div>`;
    html += '<div class="graph-area">';
    html += '<div class="y-axis">';
    for (let i = 0; i <= 5; i++) {
      html += `<div>${i * S.targetScale}</div>`;
    }
    html += '</div>';
    html += '<div class="bars-wrapper">';
    categories.forEach((cat, idx) => {
      const val = S.targetData[cat];
      const barHeight = (val / S.targetScale) * 30;
      html += `<div class="bar-column">`;
      html += `<div style="display:flex;flex-direction:column;gap:4px;height:${barHeight}px;justify-content:flex-start;">`;
      for (let i = 0; i < val / S.targetScale; i++) {
        html += `<div class="bar-segment bar-${idx}"></div>`;
      }
      html += `</div><div class="bar-label">${cat}</div></div>`;
    });
    html += '</div></div>';

    html += `<div class="practice-question">
      <div class="question-text">How many more chose <strong>${cat1}</strong> than <strong>${cat2}</strong>?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="answerInput" placeholder="?" />
        <button class="play-btn primary" onclick="submitPracticeAnswer(${answer})">✓ Check</button>
      </div>
    </div>`;

  } else if (types === 'choose-scale' && S.diff === 'secure') {
    const maxVal = getMaxValue();
    html += `<div class="practice-question">
      <div class="question-text">What scale would work best for this data?</div>
      <div style="font-size:13px;margin:12px 0;color:var(--text2);">Max value: ${maxVal}</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;">
        ${getScaleOptions().map(s => `<button class="scale-btn" onclick="submitChooseScale(${s})">${s}</button>`).join('')}
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  setTimeout(() => document.getElementById('answerInput')?.focus(), 100);

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.score}/${S.total}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Instructions</div>
      <div class="panel-text">
        ${types === 'read-scale' ? 'Multiply: number of units × scale value.' : ''}
        ${types === 'interpret-graph' ? 'Count the segments in the bar or pictures.' : ''}
        ${types === 'compare' ? 'Find the difference between two categories.' : ''}
        ${types === 'choose-scale' ? 'Pick a scale that keeps the graph reasonable.' : ''}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Hint</div>
      <div class="panel-text">
        ${types === 'read-scale' ? 'Remember: scale tells you what each unit equals!' : ''}
        ${types === 'interpret-graph' ? 'Multiply the number of units by the scale.' : ''}
        ${types === 'compare' ? 'Subtract the smaller from the larger.' : ''}
        ${types === 'choose-scale' ? 'Choose a scale where the tallest bar fits nicely.' : ''}
      </div>
    </div>
  `;
}

function newPracticeQuestion() {
  S.total = (S.total || 0) + 1;

  const types = ['read-scale', 'interpret-graph', 'compare'];
  if (S.diff === 'secure') types.push('choose-scale');

  S.questionType = types[Math.floor(Math.random() * types.length)];

  const scales = getScaleOptions();
  S.targetScale = scales[Math.floor(Math.random() * scales.length)];

  // Generate small data set
  const cats = ['Apples', 'Bananas', 'Grapes', 'Oranges'];
  S.targetData = {};
  cats.forEach(cat => {
    S.targetData[cat] = randInt(1, 5) * S.targetScale;
  });

  S.userAnswers = {};
}

function submitPracticeAnswer(correct) {
  const input = document.getElementById('answerInput');
  const val = parseInt(input?.value || 0);

  if (val === correct) {
    showFB('✓ Correct!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try again', 'incorrect');
  }
}

function submitChooseScale(scale) {
  const maxVal = getMaxValue();
  // Good scales keep max bar height reasonable (6-10 units)
  const unitsNeeded = Math.ceil(maxVal / scale);
  if (unitsNeeded >= 3 && unitsNeeded <= 10) {
    showFB('✓ Good choice!', 'correct');
    S.score++;
    setTimeout(() => {
      newPracticeQuestion();
      render();
    }, 800);
  } else {
    showFB('✗ Try another scale', 'incorrect');
  }
}

// ─── PLAY MODE ───
function renderPlay(ws, sp) {
  let html = '<div class="graph-container">';

  if (S.gameEnded) {
    html += `<div style="text-align:center;padding:40px;font-size:32px;font-weight:800;">
      Game Complete!<br>
      <div style="font-size:48px;margin:20px 0;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${S.playScore}
      </div>
      <button class="play-btn primary" onclick="playAgain()" style="margin-top:20px;">▶ Play Again</button>
    </div>`;
  } else {
    html += `<div class="game-info">
      <div class="info-item">
        <span class="info-label">Round</span>
        <span>${S.playRound} / 8</span>
      </div>
      <div class="info-item">
        <span class="info-label">⭐ Score</span>
        <span>${S.playScore}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🔥 Streak</span>
        <span>${S.playStreak}</span>
      </div>
    </div>`;

    // Show challenge graph with scale
    const challengeScale = getScaleOptions()[Math.floor(Math.random() * getScaleOptions().length)];
    const challengeData = {};
    const cats = ['Apples', 'Bananas', 'Grapes', 'Oranges'];
    cats.forEach(cat => {
      challengeData[cat] = randInt(1, 5) * challengeScale;
    });

    html += `<div style="margin-bottom:20px;font-size:12px;color:var(--text2);"><strong>Scale: Each = ${challengeScale}</strong></div>`;
    html += '<div class="graph-area">';
    html += '<div class="y-axis">';
    for (let i = 0; i <= 5; i++) {
      html += `<div>${i * challengeScale}</div>`;
    }
    html += '</div>';
    html += '<div class="bars-wrapper">';
    cats.forEach((cat, idx) => {
      const val = challengeData[cat];
      const barHeight = (val / challengeScale) * 30;
      html += `<div class="bar-column">`;
      html += `<div style="display:flex;flex-direction:column;gap:4px;height:${barHeight}px;justify-content:flex-start;">`;
      for (let i = 0; i < val / challengeScale; i++) {
        html += `<div class="bar-segment bar-${idx}"></div>`;
      }
      html += `</div><div class="bar-label">${cat}</div></div>`;
    });
    html += '</div></div>';

    const q = getRandomItem(challengeData);

    html += `<div class="practice-question">
      <div class="question-text">How many chose <strong>${q}</strong>?</div>
      <div class="input-group">
        <input type="number" class="number-input" id="answerInput" placeholder="?" />
        <button class="play-btn primary" onclick="submitPlayAnswer(${challengeData[q]})">✓ Check</button>
      </div>
    </div>`;
  }

  html += '</div>';
  ws.innerHTML = html;

  if (!S.gameEnded) {
    setTimeout(() => document.getElementById('answerInput')?.focus(), 100);
  }

  // Side panel
  sp.innerHTML = `
    <div class="score-display">
      <div class="score-value">${S.playScore}</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-display" style="background:transparent; padding:8px;">
      <div style="font-size:18px; font-weight:700; color:var(--yellow);">🔥 ${S.playStreak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.playStreak * 12.5, 100)}%;"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">How to Play</div>
      <div class="panel-text">
        Read the <strong>scaled graph</strong> each round.<br><br>
        Answer questions about the data.<br><br>
        <strong>Streak</strong> bonus for consecutive correct!
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Scoring</div>
      <div class="panel-text">
        Base: <strong>10 points</strong><br>
        Streak bonus: <strong>+5 × streak</strong><br>
        <strong>Max: 50 pts/round</strong>
      </div>
    </div>
  `;
}

function submitPlayAnswer(correct) {
  const input = document.getElementById('answerInput');
  const val = parseInt(input?.value || 0);

  if (val === correct) {
    showFB('✓ Yes!', 'correct');
    S.playScore += 10 + (S.playStreak * 5);
    S.playStreak++;
    S.playRound++;

    if (S.playRound > 8) {
      setTimeout(() => {
        S.gameEnded = true;
        render();
      }, 800);
    } else {
      setTimeout(() => {
        render();
      }, 800);
    }
  } else {
    showFB('✗ Try again', 'incorrect');
    S.playStreak = 0;
  }
}

function playAgain() {
  S.playScore = 0;
  S.playStreak = 0;
  S.playRound = 1;
  S.gameEnded = false;
  render();
}
