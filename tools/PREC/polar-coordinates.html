<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polar Coordinates — VINCULUM PREC</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; min-height: calc(100vh - 60px); }
    .vinculum-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; margin-bottom: 1.5rem; }
    .vinculum-header-left { display: flex; align-items: center; gap: 1rem; }
    .vinculum-back-btn { background: transparent; border: none; color: var(--cyan); cursor: pointer; padding: 0.5rem; display: flex; transition: all 0.3s ease; }
    .vinculum-back-btn:hover { color: var(--green); transform: translateX(-3px); }
    .vinculum-title-group h1 { margin: 0; font-size: 1.75rem; background: var(--grad, linear-gradient(135deg, var(--cyan), var(--green))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
    .vinculum-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .badge, .tag { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 0.25rem; background: rgba(0, 217, 255, 0.15); color: var(--cyan); border: 1px solid var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .tag { background: rgba(0, 255, 136, 0.15); color: var(--green); border-color: var(--green); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
    .tab-btn { padding: 0.75rem 1.25rem; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .control-group label { font-size: 0.85rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .control-group select, .control-group input { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-family: inherit; font-size: 0.9rem; }
    .control-group input[type="range"] { width: 200px; }
    .layout { display: flex; gap: 1.5rem; flex: 1; }
    .workspace { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
    .side-panel { width: 280px; display: flex; flex-direction: column; gap: 1rem; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .panel-title { font-size: 1rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); padding-bottom: 0.75rem; }
    svg { display: block; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; }
    .stat { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .stat-label { color: var(--text2); }
    .stat-value { font-weight: 700; color: var(--cyan); font-family: 'JetBrains Mono', monospace; }
    .difficulty-btn { padding: 0.5rem 1rem; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .difficulty-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
    .feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--card); border: 2px solid var(--border); border-radius: 1rem; padding: 2rem; z-index: 1000; text-align: center; min-width: 300px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); transition: transform 0.3s ease; }
    .feedback.show { transform: translate(-50%, -50%) scale(1); }
    .feedback-text { font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .feedback.correct .feedback-text { color: var(--green); }
    .feedback.incorrect .feedback-text { color: var(--pink); }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 1rem; }
    .btn { padding: 0.75rem 1.5rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn:hover { background: var(--green); transform: translateY(-2px); }
    .practice-question { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; }
    .question-text { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; }
    .options { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .option { padding: 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; transition: all 0.3s ease; color: var(--text); }
    .option:hover { border-color: var(--cyan); background: color-mix(in srgb, var(--cyan) 10%, var(--card)); }
    .option.selected { background: color-mix(in srgb, var(--cyan) 20%, var(--card)); border-color: var(--cyan); }
    .option.correct { background: color-mix(in srgb, var(--green) 20%, var(--card)); border-color: var(--green); color: var(--green); }
    .option.incorrect { background: color-mix(in srgb, var(--pink) 20%, var(--card)); border-color: var(--pink); color: var(--pink); }
    .input-field { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .input-field input { flex: 1; padding: 0.5rem 0.75rem; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 0.5rem; font-family: 'JetBrains Mono', monospace; }
    @media (max-width: 960px) { .layout { flex-direction: column; } .side-panel { width: 100%; } }
  </style>
</head>
<body>
<div class="container">
  <div class="vinculum-header">
    <div class="vinculum-header-left">
      <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn" aria-label="Back to Hub">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="vinculum-title-group">
        <h1 class="vinculum-title"><span>VINCULUM</span> — Polar Coordinates</h1>
        <div class="vinculum-badges">
          <span class="badge">PREC.G-GPE</span>
          <span class="tag">Polar Forms</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Polar Curve Type</label>
      <select id="curveType" onchange="changeCurve()">
        <option value="circle">Circle (r = a)</option>
        <option value="rose">Rose (r = a·cos(nθ))</option>
        <option value="cardioid">Cardioid (r = a(1 + cos(θ)))</option>
        <option value="limaçon">Limaçon (r = a + b·cos(θ))</option>
        <option value="spiral">Spiral (r = aθ)</option>
      </select>
    </div>
    <div class="control-group">
      <label>θ (angle in radians)</label>
      <input type="range" id="thetaSlider" min="0" max="6.28" step="0.1" value="0" onchange="updatePolar()">
      <span id="thetaValue">θ = 0.00</span>
    </div>
    <div class="control-group">
      <label>Difficulty</label>
      <div style="display: flex; gap: 0.5rem;">
        <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('explore')">Explore</button>
    <button class="tab-btn" onclick="switchTab('practice')">Practice</button>
    <button class="tab-btn" onclick="switchTab('play')">Play</button>
  </div>

  <div class="layout">
    <div class="workspace">
      <div id="explore" class="tab-content active">
        <div class="panel">
          <div class="panel-title">Polar Grid & Curve</div>
          <svg id="polarSvg" width="100%" height="400" viewBox="-250 -250 500 500"></svg>
        </div>
        <div class="panel">
          <div class="panel-title">Polar to Rectangular Conversion</div>
          <div id="conversionDisplay" style="font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; line-height: 1.6;"></div>
        </div>
      </div>

      <div id="practice" class="tab-content">
        <div class="panel">
          <div class="panel-title">Practice Problems</div>
          <div id="practiceContainer"></div>
        </div>
      </div>

      <div id="play" class="tab-content">
        <div class="panel">
          <div class="panel-title">Speed Challenge</div>
          <div id="gameContainer" style="text-align: center;">
            <p style="color: var(--text2); margin-bottom: 1rem;">Convert polar to rectangular coordinates quickly!</p>
            <button class="btn" onclick="startGame()">Start Challenge</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Current Point</div>
        <div class="stat">
          <span class="stat-label">r:</span>
          <span class="stat-value" id="statR">0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">θ:</span>
          <span class="stat-value" id="statTheta">0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">x:</span>
          <span class="stat-value" id="statX">0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">y:</span>
          <span class="stat-value" id="statY">0.00</span>
        </div>
      </div>

      <div class="panel" id="scorePanel" style="display: none;">
        <div class="panel-title">Score</div>
        <div class="stat">
          <span class="stat-label">Correct:</span>
          <span class="stat-value" id="scoreCorrect">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak:</span>
          <span class="stat-value" id="scoreStreak">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-text" id="feedbackText"></div>
</div>

<script>
const state = {
  curveType: 'circle',
  theta: 0,
  difficulty: 'easy',
  score: 0,
  streak: 0
};

const curves = {
  circle: { formula: (θ) => 100, label: 'r = 100' },
  rose: { formula: (θ) => 100 * Math.cos(3 * θ), label: 'r = 100·cos(3θ)' },
  cardioid: { formula: (θ) => 50 * (1 + Math.cos(θ)), label: 'r = 50(1 + cos(θ))' },
  limaçon: { formula: (θ) => 70 + 50 * Math.cos(θ), label: 'r = 70 + 50·cos(θ)' },
  spiral: { formula: (θ) => 20 * θ, label: 'r = 20θ' }
};

function changeCurve() {
  state.curveType = document.getElementById('curveType').value;
  updatePolar();
}

function setDifficulty(level) {
  state.difficulty = level;
  document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  generatePracticeProblems();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function updatePolar() {
  state.theta = parseFloat(document.getElementById('thetaSlider').value);
  document.getElementById('thetaValue').textContent = `θ = ${state.theta.toFixed(2)}`;
  drawPolarCurve();
}

function drawPolarCurve() {
  const svg = document.getElementById('polarSvg');
  svg.innerHTML = '';
  const curve = curves[state.curveType];

  // Draw concentric circles (grid)
  for (let r = 50; r <= 200; r += 50) {
    svg.innerHTML += `<circle cx="0" cy="0" r="${r}" fill="none" stroke="var(--border)" stroke-width="1" opacity="0.4"/>`;
  }

  // Draw radial lines
  for (let angle = 0; angle < 2 * Math.PI; angle += Math.PI / 6) {
    const x = 200 * Math.cos(angle);
    const y = 200 * Math.sin(angle);
    svg.innerHTML += `<line x1="0" y1="0" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
  }

  // Draw axes
  svg.innerHTML += `<line x1="-250" y1="0" x2="250" y2="0" stroke="var(--text)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="0" y1="-250" x2="0" y2="250" stroke="var(--text)" stroke-width="2"/>`;

  // Draw polar curve
  let lastX = null, lastY = null;
  const maxTheta = state.curveType === 'spiral' ? 2 * Math.PI : 2 * Math.PI;
  for (let θ = 0; θ <= maxTheta; θ += 0.05) {
    const r = curve.formula(θ);
    const x = r * Math.cos(θ);
    const y = r * Math.sin(θ);

    if (lastX !== null && lastY !== null) {
      svg.innerHTML += `<line x1="${lastX}" y1="${lastY}" x2="${x}" y2="${y}" stroke="var(--cyan)" stroke-width="2.5"/>`;
    }
    lastX = x;
    lastY = y;
  }

  // Draw current point
  const r = curve.formula(state.theta);
  const px = r * Math.cos(state.theta);
  const py = r * Math.sin(state.theta);
  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="6" fill="var(--pink)"/>`;

  // Draw angle line
  svg.innerHTML += `<line x1="0" y1="0" x2="${px}" y2="${py}" stroke="var(--green)" stroke-width="2" stroke-dasharray="5,5"/>`;

  // Update stats
  document.getElementById('statR').textContent = r.toFixed(2);
  document.getElementById('statTheta').textContent = state.theta.toFixed(2);
  document.getElementById('statX').textContent = px.toFixed(2);
  document.getElementById('statY').textContent = py.toFixed(2);

  // Update conversion display
  document.getElementById('conversionDisplay').innerHTML = `
    <div>Polar: (${r.toFixed(2)}, ${state.theta.toFixed(2)})</div>
    <div>x = r·cos(θ) = ${r.toFixed(2)}·cos(${state.theta.toFixed(2)}) = ${px.toFixed(2)}</div>
    <div>y = r·sin(θ) = ${r.toFixed(2)}·sin(${state.theta.toFixed(2)}) = ${py.toFixed(2)}</div>
    <div style="color: var(--green); margin-top: 0.5rem;">Rectangular: (${px.toFixed(2)}, ${py.toFixed(2)})</div>
  `;
}

function generatePracticeProblems() {
  const container = document.getElementById('practiceContainer');
  container.innerHTML = '';

  for (let i = 0; i < 3; i++) {
    const r = Math.floor(Math.random() * 8) + 2;
    const theta = Math.floor(Math.random() * 12) * Math.PI / 6;
    const x = (r * Math.cos(theta)).toFixed(2);
    const y = (r * Math.sin(theta)).toFixed(2);

    const div = document.createElement('div');
    div.className = 'practice-question';
    div.innerHTML = `
      <div class="question-text">Question ${i + 1}: Convert (${r}, ${theta.toFixed(2)}) to rectangular</div>
      <div class="input-field">
        <input type="number" id="x${i}" placeholder="x" step="0.01">
        <input type="number" id="y${i}" placeholder="y" step="0.01">
      </div>
      <button class="btn" onclick="submitPracticeAnswer(${i}, ${x}, ${y})">Check</button>
    `;
    container.appendChild(div);
  }
}

function submitPracticeAnswer(idx, correctX, correctY) {
  const userX = parseFloat(document.getElementById(`x${idx}`).value);
  const userY = parseFloat(document.getElementById(`y${idx}`).value);

  if (isNaN(userX) || isNaN(userY)) {
    showFeedback('Enter both x and y', false);
    return;
  }

  const isCorrect = Math.abs(userX - correctX) < 0.1 && Math.abs(userY - correctY) < 0.1;
  showFeedback(isCorrect ? 'Correct!' : `Wrong! (${correctX}, ${correctY})`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function startGame() {
  state.score = 0;
  state.streak = 0;
  document.getElementById('scorePanel').style.display = 'block';
  updateScoreDisplay();

  const gameContainer = document.getElementById('gameContainer');
  gameContainer.innerHTML = `
    <div class="practice-question">
      <div class="question-text" id="gameQuestion"></div>
      <div class="input-field">
        <input type="number" id="gameX" placeholder="x" step="0.01">
        <input type="number" id="gameY" placeholder="y" step="0.01">
      </div>
      <button class="btn" onclick="submitGameAnswer()">Check</button>
      <button class="btn" style="margin-top: 0.5rem; width: 100%;" onclick="nextGameQuestion()">Skip</button>
    </div>
  `;

  nextGameQuestion();
}

function nextGameQuestion() {
  const r = Math.floor(Math.random() * 10) + 2;
  const angleIdx = Math.floor(Math.random() * 12);
  const theta = angleIdx * Math.PI / 6;
  const x = r * Math.cos(theta);
  const y = r * Math.sin(theta);

  document.getElementById('gameQuestion').textContent = `Convert (${r}, ${theta.toFixed(2)}) to rectangular`;
  document.getElementById('gameX').value = '';
  document.getElementById('gameY').value = '';

  state.currentQuestion = { r, theta, x, y };
}

function submitGameAnswer() {
  const userX = parseFloat(document.getElementById('gameX').value);
  const userY = parseFloat(document.getElementById('gameY').value);

  if (isNaN(userX) || isNaN(userY)) {
    showFeedback('Enter both coordinates', false);
    return;
  }

  const q = state.currentQuestion;
  const isCorrect = Math.abs(userX - q.x) < 0.1 && Math.abs(userY - q.y) < 0.1;
  showFeedback(isCorrect ? 'Correct!' : `Wrong! (${q.x.toFixed(2)}, ${q.y.toFixed(2)})`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = state.score;
  document.getElementById('scoreStreak').textContent = state.streak;
}

function showFeedback(text, isCorrect) {
  const feedback = document.getElementById('feedback');
  feedback.classList.remove('correct', 'incorrect');
  feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
  document.getElementById('feedbackText').textContent = text;
  feedback.classList.add('show');
  setTimeout(() => feedback.classList.remove('show'), 1500);
}

updatePolar();
generatePracticeProblems();
</script>

<script src="../../vinculum-input.js"></script>
<script src="../../vinculum-core.js"></script>
<script src="../../vinculum-data.js"></script>
<script src="../../vinculum-adaptive-hook.js"></script>
<script src="../../vinculum-3reads.js"></script>
<script src="../../vinculum-stories.js"></script>
<script src="../../vinculum-feedback.js"></script>
<script src="../../vinculum-guide.js"></script>
<script src="../../vinculum-identity.js"></script>
<script src="../../vinculum-indigenous.js"></script>
<script src="../../vinculum-dashboard.js"></script>
</body>
</html>
