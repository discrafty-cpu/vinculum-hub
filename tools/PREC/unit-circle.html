<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Circle — VINCULUM PREC</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; min-height: calc(100vh - 60px); }
    .vinculum-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; margin-bottom: 1.5rem; }
    .vinculum-header-left { display: flex; align-items: center; gap: 1rem; }
    .vinculum-back-btn { background: transparent; border: none; color: var(--cyan); cursor: pointer; padding: 0.5rem; display: flex; transition: all 0.3s ease; }
    .vinculum-back-btn:hover { color: var(--green); transform: translateX(-3px); }
    .vinculum-title-group h1 { margin: 0; font-size: 1.75rem; background: var(--grad, linear-gradient(135deg, var(--cyan), var(--green))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
    .vinculum-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .badge, .tag { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 0.25rem; background: rgba(0, 217, 255, 0.15); color: var(--cyan); border: 1px solid var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .tag { background: rgba(0, 255, 136, 0.15); color: var(--green); border-color: var(--green); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
    .tab-btn { padding: 0.75rem 1.25rem; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .control-group label { font-size: 0.85rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .control-group input[type="range"] { width: 200px; }
    .layout { display: flex; gap: 1.5rem; flex: 1; }
    .workspace { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
    .side-panel { width: 280px; display: flex; flex-direction: column; gap: 1rem; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .panel-title { font-size: 1rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); padding-bottom: 0.75rem; }
    svg { display: block; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; cursor: move; }
    .stat { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .stat-label { color: var(--text2); }
    .stat-value { font-weight: 700; color: var(--cyan); font-family: 'JetBrains Mono', monospace; }
    .difficulty-btn { padding: 0.5rem 1rem; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .difficulty-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
    .feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--card); border: 2px solid var(--border); border-radius: 1rem; padding: 2rem; z-index: 1000; text-align: center; min-width: 300px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); transition: transform 0.3s ease; }
    .feedback.show { transform: translate(-50%, -50%) scale(1); }
    .feedback-text { font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .feedback.correct .feedback-text { color: var(--green); }
    .feedback.incorrect .feedback-text { color: var(--pink); }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 1rem; }
    .btn { padding: 0.75rem 1.5rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn:hover { background: var(--green); transform: translateY(-2px); }
    .practice-question { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; }
    .question-text { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; }
    .options { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .option { padding: 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; transition: all 0.3s ease; color: var(--text); }
    .option:hover { border-color: var(--cyan); background: color-mix(in srgb, var(--cyan) 10%, var(--card)); }
    .option.selected { background: color-mix(in srgb, var(--cyan) 20%, var(--card)); border-color: var(--cyan); }
    @media (max-width: 960px) { .layout { flex-direction: column; } .side-panel { width: 100%; } }
  </style>
</head>
<body>
<div class="container">
  <div class="vinculum-header">
    <div class="vinculum-header-left">
      <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn" aria-label="Back to Hub">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="vinculum-title-group">
        <h1 class="vinculum-title"><span>VINCULUM</span> — Unit Circle</h1>
        <div class="vinculum-badges">
          <span class="badge">F-TF.1-4</span>
          <span class="tag">Trig Functions</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Angle (degrees)</label>
      <input type="range" id="angleSlider" min="0" max="360" step="1" value="0" onchange="updateCircle()">
      <span id="angleDisplay">0° / 0 rad</span>
    </div>
    <div class="control-group">
      <label>Difficulty</label>
      <div style="display: flex; gap: 0.5rem;">
        <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('explore')">Explore</button>
    <button class="tab-btn" onclick="switchTab('practice')">Practice</button>
    <button class="tab-btn" onclick="switchTab('play')">Play</button>
  </div>

  <div class="layout">
    <div class="workspace">
      <div id="explore" class="tab-content active">
        <div class="panel">
          <div class="panel-title">Interactive Unit Circle (Drag Point)</div>
          <svg id="circleSvg" width="100%" height="400" viewBox="-240 -240 480 480" onclick="handleSvgClick(event)"></svg>
        </div>
        <div class="panel">
          <div class="panel-title">Reference Triangle & Values</div>
          <svg id="triangleSvg" width="100%" height="200" viewBox="-120 -50 240 200"></svg>
        </div>
      </div>

      <div id="practice" class="tab-content">
        <div class="panel">
          <div class="panel-title">Practice Problems</div>
          <div id="practiceContainer"></div>
        </div>
      </div>

      <div id="play" class="tab-content">
        <div class="panel">
          <div class="panel-title">Speed Challenge</div>
          <div id="gameContainer" style="text-align: center;">
            <p style="color: var(--text2); margin-bottom: 1rem;">Recall trig values for special angles!</p>
            <button class="btn" onclick="startGame()">Start Challenge</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Current Values</div>
        <div class="stat">
          <span class="stat-label">Angle:</span>
          <span class="stat-value" id="statAngle">0°</span>
        </div>
        <div class="stat">
          <span class="stat-label">sin(θ):</span>
          <span class="stat-value" id="statSin">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">cos(θ):</span>
          <span class="stat-value" id="statCos">1</span>
        </div>
        <div class="stat">
          <span class="stat-label">tan(θ):</span>
          <span class="stat-value" id="statTan">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Quadrant:</span>
          <span class="stat-value" id="statQuad">I</span>
        </div>
      </div>

      <div class="panel" id="scorePanel" style="display: none;">
        <div class="panel-title">Score</div>
        <div class="stat">
          <span class="stat-label">Correct:</span>
          <span class="stat-value" id="scoreCorrect">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak:</span>
          <span class="stat-value" id="scoreStreak">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-text" id="feedbackText"></div>
</div>

<script>
const state = {
  angle: 0,
  difficulty: 'easy',
  score: 0,
  streak: 0
};

const specialAngles = {
  0: { deg: 0, sin: '0', cos: '1', tan: '0' },
  30: { deg: 30, sin: '1/2', cos: '√3/2', tan: '1/√3' },
  45: { deg: 45, sin: '√2/2', cos: '√2/2', tan: '1' },
  60: { deg: 60, sin: '√3/2', cos: '1/2', tan: '√3' },
  90: { deg: 90, sin: '1', cos: '0', tan: '∞' },
  120: { deg: 120, sin: '√3/2', cos: '-1/2', tan: '-√3' },
  135: { deg: 135, sin: '√2/2', cos: '-√2/2', tan: '-1' },
  150: { deg: 150, sin: '1/2', cos: '-√3/2', tan: '-1/√3' },
  180: { deg: 180, sin: '0', cos: '-1', tan: '0' },
  270: { deg: 270, sin: '-1', cos: '0', tan: '∞' }
};

function setDifficulty(level) {
  state.difficulty = level;
  document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  generatePracticeProblems();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function updateCircle() {
  state.angle = parseInt(document.getElementById('angleSlider').value);
  drawCircle();
}

function handleSvgClick(evt) {
  const svg = document.getElementById('circleSvg');
  const rect = svg.getBoundingClientRect();
  const x = (evt.clientX - rect.left) * 480 / rect.width - 240;
  const y = (evt.clientY - rect.top) * 480 / rect.height - 240;

  const angle = Math.atan2(y, x) * 180 / Math.PI;
  state.angle = (angle + 360) % 360;
  document.getElementById('angleSlider').value = state.angle;
  drawCircle();
}

function drawCircle() {
  const svg = document.getElementById('circleSvg');
  svg.innerHTML = '';

  svg.innerHTML += '<circle cx="0" cy="0" r="150" fill="none" stroke="var(--cyan)" stroke-width="2"/>';
  svg.innerHTML += '<line x1="-200" y1="0" x2="200" y2="0" stroke="var(--text)" stroke-width="2"/>';
  svg.innerHTML += '<line x1="0" y1="-200" x2="0" y2="200" stroke="var(--text)" stroke-width="2"/>';

  // Special angles
  [0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330].forEach(deg => {
    const rad = deg * Math.PI / 180;
    const x = 150 * Math.cos(rad);
    const y = 150 * Math.sin(rad);
    svg.innerHTML += `<circle cx="${x}" cy="${y}" r="4" fill="var(--green)" opacity="0.5"/>`;
  });

  // Current angle line
  const rad = state.angle * Math.PI / 180;
  const px = 150 * Math.cos(rad);
  const py = 150 * Math.sin(rad);

  svg.innerHTML += `<line x1="0" y1="0" x2="${px}" y2="${py}" stroke="var(--pink)" stroke-width="2.5"/>`;
  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="8" fill="var(--pink)"/>`;

  // Reference triangle
  svg.innerHTML += `<line x1="${px}" y1="${py}" x2="${px}" y2="0" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="3,3"/>`;
  svg.innerHTML += `<line x1="${px}" y1="0" x2="0" y2="0" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="3,3"/>`;

  updateStats();
  drawTriangle();
}

function drawTriangle() {
  const svg = document.getElementById('triangleSvg');
  svg.innerHTML = '';

  const rad = state.angle * Math.PI / 180;
  const sin = Math.sin(rad);
  const cos = Math.cos(rad);
  const tan = sin / cos;

  svg.innerHTML += '<text x="0" y="-20" text-anchor="middle" font-size="14" fill="var(--text)">Reference Triangle</text>';
  svg.innerHTML += `<line x1="0" y1="80" x2="80" y2="80" stroke="var(--orange)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="80" y1="80" x2="80" y2="${80 - sin * 80}" stroke="var(--orange)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="0" y1="80" x2="80" y2="${80 - sin * 80}" stroke="var(--cyan)" stroke-width="2"/>`;

  svg.innerHTML += `<text x="40" y="100" text-anchor="middle" font-size="12" fill="var(--text2)">cos = ${cos.toFixed(3)}</text>`;
  svg.innerHTML += `<text x="90" y="${80 - sin * 40}" text-anchor="start" font-size="12" fill="var(--text2)">sin = ${sin.toFixed(3)}</text>`;
}

function updateStats() {
  const rad = state.angle * Math.PI / 180;
  const sin = Math.sin(rad);
  const cos = Math.cos(rad);
  const tan = sin / cos;

  document.getElementById('statAngle').textContent = `${state.angle}°`;
  document.getElementById('statSin').textContent = sin.toFixed(3);
  document.getElementById('statCos').textContent = cos.toFixed(3);
  document.getElementById('statTan').textContent = isFinite(tan) ? tan.toFixed(3) : '∞';

  let quad = 'I';
  if (state.angle > 90 && state.angle <= 180) quad = 'II';
  else if (state.angle > 180 && state.angle <= 270) quad = 'III';
  else if (state.angle > 270 && state.angle < 360) quad = 'IV';
  document.getElementById('statQuad').textContent = quad;

  document.getElementById('angleDisplay').textContent = `${state.angle}° / ${(state.angle * Math.PI / 180).toFixed(2)} rad`;
}

function generatePracticeProblems() {
  const container = document.getElementById('practiceContainer');
  container.innerHTML = '';

  const angles = Object.keys(specialAngles).map(Number);
  for (let i = 0; i < 3; i++) {
    const angle = angles[Math.floor(Math.random() * angles.length)];
    const data = specialAngles[angle];
    const fn = ['sin', 'cos', 'tan'][Math.floor(Math.random() * 3)];

    const div = document.createElement('div');
    div.className = 'practice-question';
    const value = data[fn];
    div.innerHTML = `
      <div class="question-text">What is ${fn}(${angle}°)?</div>
      <div class="options" id="options-${i}"></div>
      <button class="btn" onclick="submitPracticeAnswer(${i}, '${value}')">Check</button>
    `;
    container.appendChild(div);

    const options = new Set([value]);
    const allValues = Object.values(specialAngles).flatMap(d => [d.sin, d.cos, d.tan]);
    while (options.size < 4) {
      options.add(allValues[Math.floor(Math.random() * allValues.length)]);
    }

    const optionsDiv = div.querySelector(`#options-${i}`);
    Array.from(options).sort(() => Math.random() - 0.5).forEach(opt => {
      const label = document.createElement('div');
      label.className = 'option';
      label.textContent = opt;
      label.onclick = () => {
        document.querySelectorAll(`#options-${i} .option`).forEach(o => o.classList.remove('selected'));
        label.classList.add('selected');
      };
      optionsDiv.appendChild(label);
    });
  }
}

function submitPracticeAnswer(idx, correctAnswer) {
  const selected = document.querySelector(`#options-${idx} .option.selected`);
  if (!selected) {
    showFeedback('Select an answer', false);
    return;
  }

  const isCorrect = selected.textContent === correctAnswer;
  showFeedback(isCorrect ? 'Correct!' : `Wrong! ${correctAnswer}`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function startGame() {
  state.score = 0;
  state.streak = 0;
  document.getElementById('scorePanel').style.display = 'block';
  updateScoreDisplay();

  const gameContainer = document.getElementById('gameContainer');
  gameContainer.innerHTML = `
    <div class="practice-question">
      <div class="question-text" id="gameQuestion"></div>
      <div id="gameOptions" class="options"></div>
      <button class="btn" onclick="submitGameAnswer()">Check</button>
      <button class="btn" style="margin-top: 0.5rem; width: 100%;" onclick="nextGameQuestion()">Skip</button>
    </div>
  `;

  nextGameQuestion();
}

function nextGameQuestion() {
  const angles = Object.keys(specialAngles).map(Number);
  const angle = angles[Math.floor(Math.random() * angles.length)];
  const data = specialAngles[angle];
  const fn = ['sin', 'cos', 'tan'][Math.floor(Math.random() * 3)];

  document.getElementById('gameQuestion').textContent = `${fn}(${angle}°) = ?`;

  const options = new Set([data[fn]]);
  const allValues = Object.values(specialAngles).flatMap(d => [d.sin, d.cos, d.tan]);
  while (options.size < 4) {
    options.add(allValues[Math.floor(Math.random() * allValues.length)]);
  }

  const gameOptions = document.getElementById('gameOptions');
  gameOptions.innerHTML = '';
  Array.from(options).sort(() => Math.random() - 0.5).forEach(opt => {
    const label = document.createElement('div');
    label.className = 'option';
    label.textContent = opt;
    label.onclick = () => {
      document.querySelectorAll('#gameOptions .option').forEach(o => o.classList.remove('selected'));
      label.classList.add('selected');
    };
    gameOptions.appendChild(label);
  });

  state.currentQuestion = { value: data[fn] };
}

function submitGameAnswer() {
  const selected = document.querySelector('#gameOptions .option.selected');
  if (!selected) {
    showFeedback('Select an answer', false);
    return;
  }

  const isCorrect = selected.textContent === state.currentQuestion.value;
  showFeedback(isCorrect ? 'Correct!' : `Wrong! ${state.currentQuestion.value}`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = state.score;
  document.getElementById('scoreStreak').textContent = state.streak;
}

function showFeedback(text, isCorrect) {
  const feedback = document.getElementById('feedback');
  feedback.classList.remove('correct', 'incorrect');
  feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
  document.getElementById('feedbackText').textContent = text;
  feedback.classList.add('show');
  setTimeout(() => feedback.classList.remove('show'), 1500);
}

drawCircle();
generatePracticeProblems();
</script>

<script src="../../vinculum-input.js"></script>
<script src="../../vinculum-core.js"></script>
<script src="../../vinculum-data.js"></script>
<script src="../../vinculum-adaptive-hook.js"></script>
<script src="../../vinculum-3reads.js"></script>
<script src="../../vinculum-stories.js"></script>
<script src="../../vinculum-feedback.js"></script>
<script src="../../vinculum-guide.js"></script>
<script src="../../vinculum-identity.js"></script>
<script src="../../vinculum-indigenous.js"></script>
<script src="../../vinculum-dashboard.js"></script>
</body>
</html>
