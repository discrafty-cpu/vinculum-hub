<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vectors — Introduction — VINCULUM PREC</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; min-height: calc(100vh - 60px); }
    .vinculum-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; margin-bottom: 1.5rem; }
    .vinculum-header-left { display: flex; align-items: center; gap: 1rem; }
    .vinculum-back-btn { background: transparent; border: none; color: var(--cyan); cursor: pointer; padding: 0.5rem; display: flex; transition: all 0.3s ease; }
    .vinculum-back-btn:hover { color: var(--green); transform: translateX(-3px); }
    .vinculum-title-group h1 { margin: 0; font-size: 1.75rem; background: var(--grad, linear-gradient(135deg, var(--cyan), var(--green))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
    .vinculum-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .badge, .tag { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 0.25rem; background: rgba(0, 217, 255, 0.15); color: var(--cyan); border: 1px solid var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .tag { background: rgba(0, 255, 136, 0.15); color: var(--green); border-color: var(--green); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
    .tab-btn { padding: 0.75rem 1.25rem; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .control-group label { font-size: 0.85rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .control-group select { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-family: inherit; font-size: 0.9rem; }
    .layout { display: flex; gap: 1.5rem; flex: 1; }
    .workspace { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
    .side-panel { width: 280px; display: flex; flex-direction: column; gap: 1rem; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .panel-title { font-size: 1rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); padding-bottom: 0.75rem; }
    svg { display: block; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; cursor: move; }
    .stat { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .stat-label { color: var(--text2); }
    .stat-value { font-weight: 700; color: var(--cyan); font-family: 'JetBrains Mono', monospace; }
    .difficulty-btn { padding: 0.5rem 1rem; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 0.5rem; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .difficulty-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
    .feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--card); border: 2px solid var(--border); border-radius: 1rem; padding: 2rem; z-index: 1000; text-align: center; min-width: 300px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); transition: transform 0.3s ease; }
    .feedback.show { transform: translate(-50%, -50%) scale(1); }
    .feedback-text { font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .feedback.correct .feedback-text { color: var(--green); }
    .feedback.incorrect .feedback-text { color: var(--pink); }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 1rem; }
    .btn { padding: 0.75rem 1.5rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn:hover { background: var(--green); transform: translateY(-2px); }
    .practice-question { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; }
    .question-text { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 1rem; }
    .input-field { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .input-field input { flex: 1; padding: 0.5rem 0.75rem; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 0.5rem; font-family: 'JetBrains Mono', monospace; }
    @media (max-width: 960px) { .layout { flex-direction: column; } .side-panel { width: 100%; } }
  </style>
</head>
<body>
<div class="container">
  <div class="vinculum-header">
    <div class="vinculum-header-left">
      <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn" aria-label="Back to Hub">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="vinculum-title-group">
        <h1 class="vinculum-title"><span>VINCULUM</span> — Vectors</h1>
        <div class="vinculum-badges">
          <span class="badge">N-VM.1-5</span>
          <span class="tag">Vector Ops</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Operation</label>
      <select id="opType" onchange="updateVectors()">
        <option value="add">Vector Addition (A + B)</option>
        <option value="subtract">Vector Subtraction (A - B)</option>
        <option value="scalar">Scalar Multiplication (2·A)</option>
        <option value="magnitude">Magnitude & Direction</option>
        <option value="dot">Dot Product (A · B)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Difficulty</label>
      <div style="display: flex; gap: 0.5rem;">
        <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('explore')">Explore</button>
    <button class="tab-btn" onclick="switchTab('practice')">Practice</button>
    <button class="tab-btn" onclick="switchTab('play')">Play</button>
  </div>

  <div class="layout">
    <div class="workspace">
      <div id="explore" class="tab-content active">
        <div class="panel">
          <div class="panel-title">Vector Visualization (Drag Points)</div>
          <svg id="vecSvg" width="100%" height="400" viewBox="-250 -250 500 500"></svg>
        </div>
        <div class="panel">
          <div class="panel-title">Vector Calculations</div>
          <div id="calcDisplay" style="font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; line-height: 1.8; color: var(--text);"></div>
        </div>
      </div>

      <div id="practice" class="tab-content">
        <div class="panel">
          <div class="panel-title">Practice Problems</div>
          <div id="practiceContainer"></div>
        </div>
      </div>

      <div id="play" class="tab-content">
        <div class="panel">
          <div class="panel-title">Speed Challenge</div>
          <div id="gameContainer" style="text-align: center;">
            <p style="color: var(--text2); margin-bottom: 1rem;">Perform vector operations quickly!</p>
            <button class="btn" onclick="startGame()">Start Challenge</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Vector A</div>
        <div class="stat">
          <span class="stat-label">x:</span>
          <span class="stat-value" id="vecAx">3</span>
        </div>
        <div class="stat">
          <span class="stat-label">y:</span>
          <span class="stat-value" id="vecAy">4</span>
        </div>
        <div class="stat">
          <span class="stat-label">|A|:</span>
          <span class="stat-value" id="vecAMag">5.00</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Vector B</div>
        <div class="stat">
          <span class="stat-label">x:</span>
          <span class="stat-value" id="vecBx">1</span>
        </div>
        <div class="stat">
          <span class="stat-label">y:</span>
          <span class="stat-value" id="vecBy">2</span>
        </div>
        <div class="stat">
          <span class="stat-label">|B|:</span>
          <span class="stat-value" id="vecBMag">2.24</span>
        </div>
      </div>

      <div class="panel" id="scorePanel" style="display: none;">
        <div class="panel-title">Score</div>
        <div class="stat">
          <span class="stat-label">Correct:</span>
          <span class="stat-value" id="scoreCorrect">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak:</span>
          <span class="stat-value" id="scoreStreak">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-text" id="feedbackText"></div>
</div>

<script>
const state = {
  vecA: { x: 3, y: 4 },
  vecB: { x: 1, y: 2 },
  opType: 'add',
  difficulty: 'easy',
  score: 0,
  streak: 0,
  draggingVec: null
};

function setDifficulty(level) {
  state.difficulty = level;
  document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  generatePracticeProblems();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function updateVectors() {
  state.opType = document.getElementById('opType').value;
  drawVectors();
  updateCalcs();
}

function drawVectors() {
  const svg = document.getElementById('vecSvg');
  svg.innerHTML = '';

  // Grid
  for (let i = -4; i <= 4; i++) {
    svg.innerHTML += `<line x1="${i * 50}" y1="-250" x2="${i * 50}" y2="250" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
    svg.innerHTML += `<line x1="-250" y1="${-i * 50}" x2="250" y2="${-i * 50}" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
  }

  // Axes
  svg.innerHTML += `<line x1="-250" y1="0" x2="250" y2="0" stroke="var(--text)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="0" y1="-250" x2="0" y2="250" stroke="var(--text)" stroke-width="2"/>`;

  const scale = 50;

  // Draw vectors
  if (state.opType === 'add') {
    // Vector A (cyan)
    svg.innerHTML += `<line x1="0" y1="0" x2="${state.vecA.x * scale}" y2="${-state.vecA.y * scale}" stroke="var(--cyan)" stroke-width="3" marker-end="url(#arrowCyan)"/>`;
    svg.innerHTML += `<circle cx="${state.vecA.x * scale}" cy="${-state.vecA.y * scale}" r="6" fill="var(--cyan)" class="draggable" onmousedown="startDrag('A', event)"/>`;

    // Vector B (green) - placed at A's tip
    const bStartX = state.vecA.x * scale;
    const bStartY = -state.vecA.y * scale;
    svg.innerHTML += `<line x1="${bStartX}" y1="${bStartY}" x2="${bStartX + state.vecB.x * scale}" y2="${bStartY - state.vecB.y * scale}" stroke="var(--green)" stroke-width="3" marker-end="url(#arrowGreen)"/>`;
    svg.innerHTML += `<circle cx="${bStartX + state.vecB.x * scale}" cy="${bStartY - state.vecB.y * scale}" r="6" fill="var(--green)" class="draggable" onmousedown="startDrag('B', event)"/>`;

    // Sum vector (pink)
    const sumX = state.vecA.x + state.vecB.x;
    const sumY = state.vecA.y + state.vecB.y;
    svg.innerHTML += `<line x1="0" y1="0" x2="${sumX * scale}" y2="${-sumY * scale}" stroke="var(--pink)" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowPink)"/>`;
  } else if (state.opType === 'subtract') {
    // Vector A
    svg.innerHTML += `<line x1="0" y1="0" x2="${state.vecA.x * scale}" y2="${-state.vecA.y * scale}" stroke="var(--cyan)" stroke-width="3" marker-end="url(#arrowCyan)"/>`;
    svg.innerHTML += `<circle cx="${state.vecA.x * scale}" cy="${-state.vecA.y * scale}" r="6" fill="var(--cyan)" class="draggable" onmousedown="startDrag('A', event)"/>`;

    // Vector B (shown as negative, dashed)
    svg.innerHTML += `<line x1="0" y1="0" x2="${-state.vecB.x * scale}" y2="${state.vecB.y * scale}" stroke="var(--green)" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowGreen)"/>`;

    // Difference (A - B)
    const diffX = state.vecA.x - state.vecB.x;
    const diffY = state.vecA.y - state.vecB.y;
    svg.innerHTML += `<line x1="0" y1="0" x2="${diffX * scale}" y2="${-diffY * scale}" stroke="var(--pink)" stroke-width="3" marker-end="url(#arrowPink)"/>`;
  } else {
    // General drawing for other operations
    svg.innerHTML += `<line x1="0" y1="0" x2="${state.vecA.x * scale}" y2="${-state.vecA.y * scale}" stroke="var(--cyan)" stroke-width="3" marker-end="url(#arrowCyan)"/>`;
    svg.innerHTML += `<circle cx="${state.vecA.x * scale}" cy="${-state.vecA.y * scale}" r="6" fill="var(--cyan)" class="draggable" onmousedown="startDrag('A', event)"/>`;

    svg.innerHTML += `<line x1="0" y1="0" x2="${state.vecB.x * scale}" y2="${-state.vecB.y * scale}" stroke="var(--green)" stroke-width="3" marker-end="url(#arrowGreen)"/>`;
    svg.innerHTML += `<circle cx="${state.vecB.x * scale}" cy="${-state.vecB.y * scale}" r="6" fill="var(--green)" class="draggable" onmousedown="startDrag('B', event)"/>`;
  }

  // Arrow markers
  svg.innerHTML += `
    <defs>
      <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--cyan)"/>
      </marker>
      <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--green)"/>
      </marker>
      <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--pink)"/>
      </marker>
    </defs>
  `;

  updateStats();
}

function startDrag(vec, evt) {
  state.draggingVec = vec;
  evt.preventDefault();
}

function updateCalcs() {
  const a = state.vecA;
  const b = state.vecB;

  let html = '';

  switch (state.opType) {
    case 'add':
      const sum = { x: a.x + b.x, y: a.y + b.y };
      html = `<div>A = <${a.x}, ${a.y}></div>`;
      html += `<div>B = <${b.x}, ${b.y}></div>`;
      html += `<div style="color: var(--pink); margin-top: 0.5rem;">A + B = <${sum.x}, ${sum.y}></div>`;
      break;
    case 'subtract':
      const diff = { x: a.x - b.x, y: a.y - b.y };
      html = `<div>A = <${a.x}, ${a.y}></div>`;
      html += `<div>B = <${b.x}, ${b.y}></div>`;
      html += `<div style="color: var(--pink); margin-top: 0.5rem;">A - B = <${diff.x}, ${diff.y}></div>`;
      break;
    case 'scalar':
      const scalar = 2;
      const scaled = { x: a.x * scalar, y: a.y * scalar };
      html = `<div>A = <${a.x}, ${a.y}></div>`;
      html += `<div>${scalar}·A = <${scaled.x}, ${scaled.y}></div>`;
      break;
    case 'magnitude':
      const magA = Math.sqrt(a.x * a.x + a.y * a.y);
      const magB = Math.sqrt(b.x * b.x + b.y * b.y);
      const angleA = Math.atan2(a.y, a.x) * 180 / Math.PI;
      html = `<div>|A| = √(${a.x}² + ${a.y}²) = ${magA.toFixed(2)}</div>`;
      html += `<div>θ_A = ${angleA.toFixed(1)}°</div>`;
      html += `<div style="margin-top: 0.5rem;">|B| = ${magB.toFixed(2)}</div>`;
      break;
    case 'dot':
      const dot = a.x * b.x + a.y * b.y;
      const magADot = Math.sqrt(a.x * a.x + a.y * a.y);
      const magBDot = Math.sqrt(b.x * b.x + b.y * b.y);
      html = `<div>A · B = (${a.x})(${b.x}) + (${a.y})(${b.y})</div>`;
      html += `<div>A · B = ${dot}</div>`;
      html += `<div style="margin-top: 0.5rem; color: var(--green);">|A| = ${magADot.toFixed(2)}, |B| = ${magBDot.toFixed(2)}</div>`;
      break;
  }

  document.getElementById('calcDisplay').innerHTML = html;
}

function updateStats() {
  const a = state.vecA;
  const b = state.vecB;

  document.getElementById('vecAx').textContent = a.x;
  document.getElementById('vecAy').textContent = a.y;
  document.getElementById('vecAMag').textContent = Math.sqrt(a.x * a.x + a.y * a.y).toFixed(2);

  document.getElementById('vecBx').textContent = b.x;
  document.getElementById('vecBy').textContent = b.y;
  document.getElementById('vecBMag').textContent = Math.sqrt(b.x * b.x + b.y * b.y).toFixed(2);
}

function generatePracticeProblems() {
  const container = document.getElementById('practiceContainer');
  container.innerHTML = '';

  for (let i = 0; i < 3; i++) {
    const a = { x: Math.floor(Math.random() * 8) - 4, y: Math.floor(Math.random() * 8) - 4 };
    const b = { x: Math.floor(Math.random() * 8) - 4, y: Math.floor(Math.random() * 8) - 4 };

    let question = '';
    let answer = '';

    if (state.opType === 'add') {
      question = `A = <${a.x}, ${a.y}>, B = <${b.x}, ${b.y}>. Find A + B.`;
      answer = `<${a.x + b.x}, ${a.y + b.y}>`;
    } else if (state.opType === 'magnitude') {
      const mag = Math.sqrt(a.x * a.x + a.y * a.y);
      question = `Find |<${a.x}, ${a.y}>|.`;
      answer = mag.toFixed(2);
    } else {
      question = `A = <${a.x}, ${a.y}>, B = <${b.x}, ${b.y}>. Find A - B.`;
      answer = `<${a.x - b.x}, ${a.y - b.y}>`;
    }

    const div = document.createElement('div');
    div.className = 'practice-question';
    div.innerHTML = `
      <div class="question-text">Question ${i + 1}: ${question}</div>
      <div class="input-field">
        <input type="text" id="ans${i}" placeholder="Answer (format: <x,y> or number)" data-answer="${answer}">
      </div>
      <button class="btn" onclick="submitPracticeAnswer(${i}, '${answer}')">Check</button>
    `;
    container.appendChild(div);
  }
}

function submitPracticeAnswer(idx, correctAnswer) {
  const userAns = document.getElementById(`ans${idx}`).value.trim();

  const isCorrect = userAns === correctAnswer ||
                    userAns.replace(/\s/g, '') === correctAnswer.replace(/\s/g, '') ||
                    (Math.abs(parseFloat(userAns) - parseFloat(correctAnswer)) < 0.05);

  showFeedback(isCorrect ? 'Correct!' : `Wrong! ${correctAnswer}`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function startGame() {
  state.score = 0;
  state.streak = 0;
  document.getElementById('scorePanel').style.display = 'block';
  updateScoreDisplay();

  const gameContainer = document.getElementById('gameContainer');
  gameContainer.innerHTML = `
    <div class="practice-question">
      <div class="question-text" id="gameQuestion"></div>
      <div class="input-field">
        <input type="text" id="gameAns" placeholder="Answer">
      </div>
      <button class="btn" onclick="submitGameAnswer()">Check</button>
      <button class="btn" style="margin-top: 0.5rem; width: 100%;" onclick="nextGameQuestion()">Skip</button>
    </div>
  `;

  nextGameQuestion();
}

function nextGameQuestion() {
  const a = { x: Math.floor(Math.random() * 8) - 4, y: Math.floor(Math.random() * 8) - 4 };
  const b = { x: Math.floor(Math.random() * 8) - 4, y: Math.floor(Math.random() * 8) - 4 };

  let question = '';
  let answer = '';

  const ops = ['add', 'magnitude', 'subtract'];
  const op = ops[Math.floor(Math.random() * ops.length)];

  if (op === 'add') {
    question = `A = <${a.x}, ${a.y}>, B = <${b.x}, ${b.y}>. Find A + B.`;
    answer = `<${a.x + b.x}, ${a.y + b.y}>`;
  } else if (op === 'magnitude') {
    const mag = Math.sqrt(a.x * a.x + a.y * a.y);
    question = `Find |<${a.x}, ${a.y}>|.`;
    answer = mag.toFixed(2);
  } else {
    question = `A = <${a.x}, ${a.y}>, B = <${b.x}, ${b.y}>. Find A - B.`;
    answer = `<${a.x - b.x}, ${a.y - b.y}>`;
  }

  document.getElementById('gameQuestion').textContent = question;
  document.getElementById('gameAns').value = '';

  state.currentQuestion = { answer };
}

function submitGameAnswer() {
  const userAns = document.getElementById('gameAns').value.trim();
  const q = state.currentQuestion;

  const isCorrect = userAns === q.answer || userAns.replace(/\s/g, '') === q.answer.replace(/\s/g, '') ||
                    (Math.abs(parseFloat(userAns) - parseFloat(q.answer)) < 0.05);

  showFeedback(isCorrect ? 'Correct!' : `Wrong! ${q.answer}`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = state.score;
  document.getElementById('scoreStreak').textContent = state.streak;
}

function showFeedback(text, isCorrect) {
  const feedback = document.getElementById('feedback');
  feedback.classList.remove('correct', 'incorrect');
  feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
  document.getElementById('feedbackText').textContent = text;
  feedback.classList.add('show');
  setTimeout(() => feedback.classList.remove('show'), 1500);
}

drawVectors();
updateCalcs();
generatePracticeProblems();
</script>
