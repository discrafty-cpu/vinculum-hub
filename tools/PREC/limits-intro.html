<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limits — Introduction — VINCULUM PREC</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: calc(100vh - 60px);
    }

    .vinculum-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      margin-bottom: 1.5rem;
    }

    .vinculum-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .vinculum-back-btn {
      background: transparent;
      border: none;
      color: var(--cyan);
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .vinculum-back-btn:hover {
      color: var(--green);
      transform: translateX(-3px);
    }

    .vinculum-title-group h1 {
      margin: 0;
      font-size: 1.75rem;
      background: var(--grad, linear-gradient(135deg, var(--cyan), var(--green)));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .vinculum-badges {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .badge, .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 0.25rem;
      background: rgba(0, 217, 255, 0.15);
      color: var(--cyan);
      border: 1px solid var(--cyan);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag {
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
      border-color: var(--green);
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
      text-transform: capitalize;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-group select,
    .control-group input {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .control-group input[type="range"] {
      width: 200px;
    }

    .layout {
      display: flex;
      gap: 1.5rem;
      flex: 1;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .side-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.75rem;
    }

    svg {
      display: block;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th, td {
      padding: 0.5rem;
      text-align: center;
      border: 1px solid var(--border);
    }

    th {
      background: var(--bg2);
      font-weight: 700;
      color: var(--cyan);
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .stat-label {
      color: var(--text2);
    }

    .stat-value {
      font-weight: 700;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
    }

    .difficulty-btn {
      padding: 0.5rem 1rem;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .difficulty-btn.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .difficulty-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 1rem;
      padding: 2rem;
      z-index: 1000;
      text-align: center;
      min-width: 300px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .feedback.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .feedback-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .feedback.correct .feedback-text {
      color: var(--green);
    }

    .feedback.incorrect .feedback-text {
      color: var(--pink);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-field {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .input-field input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: var(--green);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .practice-question {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .question-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .option {
      padding: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text);
    }

    .option:hover {
      border-color: var(--cyan);
      background: color-mix(in srgb, var(--cyan) 10%, var(--card));
    }

    .option.selected {
      background: color-mix(in srgb, var(--cyan) 20%, var(--card));
      border-color: var(--cyan);
    }

    .option.correct {
      background: color-mix(in srgb, var(--green) 20%, var(--card));
      border-color: var(--green);
      color: var(--green);
    }

    .option.incorrect {
      background: color-mix(in srgb, var(--pink) 20%, var(--card));
      border-color: var(--pink);
      color: var(--pink);
    }

    @media (max-width: 960px) {
      .layout {
        flex-direction: column;
      }

      .side-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="vinculum-header">
    <div class="vinculum-header-left">
      <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn" aria-label="Back to Hub">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="vinculum-title-group">
        <h1 class="vinculum-title"><span>VINCULUM</span> — Limits</h1>
        <div class="vinculum-badges">
          <span class="badge">PREC.F-IF</span>
          <span class="tag">Pre-Calc Bridge</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Function Type</label>
      <select id="functionSelect" onchange="changeFunction()">
        <option value="poly">Polynomial</option>
        <option value="rational">Rational (with hole)</option>
        <option value="piecewise">Piecewise</option>
        <option value="asymptote">Asymptotic</option>
      </select>
    </div>
    <div class="control-group">
      <label>Approach Point (a)</label>
      <input type="range" id="approachSlider" min="-5" max="5" step="0.5" value="2" onchange="updateGraph()">
      <span id="approachValue">a = 2</span>
    </div>
    <div class="control-group">
      <label>Difficulty</label>
      <div style="display: flex; gap: 0.5rem;">
        <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('explore')">Explore</button>
    <button class="tab-btn" onclick="switchTab('practice')">Practice</button>
    <button class="tab-btn" onclick="switchTab('play')">Play</button>
  </div>

  <div class="layout">
    <div class="workspace">
      <div id="explore" class="tab-content active">
        <div class="panel">
          <div class="panel-title">Function Graph</div>
          <svg id="graphSvg" width="100%" height="400" viewBox="-300 -250 600 500"></svg>
        </div>
        <div class="panel">
          <div class="panel-title">Values Table</div>
          <div class="table-container">
            <table id="valuesTable">
              <thead>
                <tr>
                  <th>x (left)</th>
                  <th>f(x)</th>
                  <th>x (right)</th>
                  <th>f(x)</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="practice" class="tab-content">
        <div class="panel">
          <div class="panel-title">Practice Problems</div>
          <div id="practiceContainer"></div>
        </div>
      </div>

      <div id="play" class="tab-content">
        <div class="panel">
          <div class="panel-title">Speed Challenge</div>
          <div id="gameContainer" style="text-align: center;">
            <p style="color: var(--text2); margin-bottom: 1rem;">Find the limit as quickly as possible!</p>
            <button class="btn" onclick="startGame()">Start Challenge</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Limit Info</div>
        <div class="stat">
          <span class="stat-label">lim (a→∞):</span>
          <span class="stat-value" id="limitValue">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Left Limit:</span>
          <span class="stat-value" id="leftLimit">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Right Limit:</span>
          <span class="stat-value" id="rightLimit">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Type:</span>
          <span class="stat-value" id="limitType">—</span>
        </div>
      </div>

      <div class="panel" id="scorePanel" style="display: none;">
        <div class="panel-title">Score</div>
        <div class="stat">
          <span class="stat-label">Correct:</span>
          <span class="stat-value" id="scoreCorrect">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak:</span>
          <span class="stat-value" id="scoreStreak">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-text" id="feedbackText"></div>
</div>

<script>
const state = {
  currentFunction: 'poly',
  approachPoint: 2,
  difficulty: 'easy',
  score: 0,
  streak: 0,
  gameActive: false,
  currentQuestion: null
};

const functions = {
  poly: {
    label: 'f(x) = x² - 1',
    formula: (x) => x * x - 1,
    limit: (a) => a * a - 1,
    leftLimit: (a) => a * a - 1,
    rightLimit: (a) => a * a - 1,
    description: 'Continuous polynomial'
  },
  rational: {
    label: 'f(x) = (x² - 4)/(x - 2), x ≠ 2',
    formula: (x) => x === 2 ? null : (x * x - 4) / (x - 2),
    limit: (a) => a === 2 ? 4 : (a * a - 4) / (a - 2),
    leftLimit: (a) => a === 2 ? 4 : (a * a - 4) / (a - 2),
    rightLimit: (a) => a === 2 ? 4 : (a * a - 4) / (a - 2),
    description: 'Removable discontinuity (hole)'
  },
  piecewise: {
    label: 'f(x) = { x+1 if x<2; 5 if x≥2 }',
    formula: (x) => x < 2 ? x + 1 : 5,
    limit: null,
    leftLimit: (a) => a === 2 ? 3 : (a < 2 ? a + 1 : 5),
    rightLimit: (a) => a === 2 ? 5 : (a < 2 ? a + 1 : 5),
    description: 'Jump discontinuity'
  },
  asymptote: {
    label: 'f(x) = 1/(x - 2)',
    formula: (x) => x === 2 ? null : 1 / (x - 2),
    limit: null,
    leftLimit: (a) => a === 2 ? -Infinity : 1 / (a - 2),
    rightLimit: (a) => a === 2 ? Infinity : 1 / (a - 2),
    description: 'Vertical asymptote'
  }
};

function changeFunction() {
  state.currentFunction = document.getElementById('functionSelect').value;
  updateGraph();
  updateTable();
  updateLimitInfo();
}

function setDifficulty(level) {
  state.difficulty = level;
  document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  generatePracticeProblems();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function updateGraph() {
  const svg = document.getElementById('graphSvg');
  svg.innerHTML = '';
  const f = functions[state.currentFunction];
  state.approachPoint = parseFloat(document.getElementById('approachSlider').value);
  document.getElementById('approachValue').textContent = `a = ${state.approachPoint.toFixed(1)}`;

  // Grid
  for (let i = -5; i <= 5; i += 1) {
    svg.innerHTML += `<line x1="${i * 50}" y1="-250" x2="${i * 50}" y2="250" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
    svg.innerHTML += `<line x1="-300" y1="${-i * 50}" x2="300" y2="${-i * 50}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
  }

  // Axes
  svg.innerHTML += `<line x1="-300" y1="0" x2="300" y2="0" stroke="var(--text)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="0" y1="-250" x2="0" y2="250" stroke="var(--text)" stroke-width="2"/>`;

  // Plot function
  let lastX = -5, lastY = f.formula(-5);
  for (let x = -4.9; x <= 5; x += 0.1) {
    const y = f.formula(x);
    if (y !== null && lastY !== null) {
      const isHole = state.currentFunction === 'rational' && x === 2;
      svg.innerHTML += `<line x1="${lastX * 50}" y1="${-lastY * 50}" x2="${x * 50}" y2="${-y * 50}" stroke="var(--cyan)" stroke-width="2.5"/>`;
    }
    lastX = x;
    lastY = y;
  }

  // Mark hole for rational function
  if (state.currentFunction === 'rational') {
    svg.innerHTML += `<circle cx="100" cy="-200" r="4" fill="none" stroke="var(--cyan)" stroke-width="2"/>`;
  }

  // Vertical line at approach point
  svg.innerHTML += `<line x1="${state.approachPoint * 50}" y1="-250" x2="${state.approachPoint * 50}" y2="250" stroke="var(--green)" stroke-width="2" stroke-dasharray="5,5"/>`;

  // Point on graph (if exists)
  const pointY = f.formula(state.approachPoint);
  if (pointY !== null) {
    svg.innerHTML += `<circle cx="${state.approachPoint * 50}" cy="${-pointY * 50}" r="5" fill="var(--pink)"/>`;
  }

  updateLimitInfo();
}

function updateTable() {
  const f = functions[state.currentFunction];
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  for (let offset = 0.5; offset <= 2; offset += 0.5) {
    const xLeft = state.approachPoint - offset;
    const xRight = state.approachPoint + offset;
    const yLeft = f.formula(xLeft);
    const yRight = f.formula(xRight);

    const row = tbody.insertRow();
    row.innerHTML = `
      <td>${xLeft.toFixed(2)}</td>
      <td>${yLeft !== null ? yLeft.toFixed(3) : '—'}</td>
      <td>${xRight.toFixed(2)}</td>
      <td>${yRight !== null ? yRight.toFixed(3) : '—'}</td>
    `;
  }
}

function updateLimitInfo() {
  const f = functions[state.currentFunction];
  const leftLim = f.leftLimit(state.approachPoint);
  const rightLim = f.rightLimit(state.approachPoint);

  document.getElementById('leftLimit').textContent = formatLimit(leftLim);
  document.getElementById('rightLimit').textContent = formatLimit(rightLim);

  if (leftLim === rightLim) {
    document.getElementById('limitValue').textContent = formatLimit(leftLim);
    document.getElementById('limitType').textContent = 'Exists';
  } else {
    document.getElementById('limitValue').textContent = '—';
    document.getElementById('limitType').textContent = 'Does Not Exist';
  }
}

function formatLimit(value) {
  if (value === null) return '—';
  if (value === Infinity) return '+∞';
  if (value === -Infinity) return '−∞';
  return value.toFixed(2);
}

function generatePracticeProblems() {
  const container = document.getElementById('practiceContainer');
  container.innerHTML = '';

  const questions = [];
  const funcs = ['poly', 'rational', 'piecewise', 'asymptote'];

  for (let i = 0; i < 3; i++) {
    const funcType = funcs[i % funcs.length];
    const a = Math.floor(Math.random() * 5) - 2;
    questions.push({
      id: i,
      funcType,
      a,
      f: functions[funcType]
    });
  }

  questions.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'practice-question';
    div.innerHTML = `
      <div class="question-text">Question ${idx + 1}: Find lim(x→${q.a}) of ${q.f.label}</div>
      <div class="options" id="options-${q.id}"></div>
      <button class="btn" onclick="submitPracticeAnswer(${q.id})">Check Answer</button>
    `;
    container.appendChild(div);

    const leftLim = q.f.leftLimit(q.a);
    const rightLim = q.f.rightLimit(q.a);
    const correctAnswer = leftLim === rightLim ? formatLimit(leftLim) : 'Does Not Exist';

    const options = new Set([correctAnswer]);
    while (options.size < 4) {
      const rand = Math.floor(Math.random() * 10) - 5;
      options.add(rand.toString());
    }

    const optionsArr = Array.from(options).sort(() => Math.random() - 0.5);
    const optionsDiv = div.querySelector(`#options-${q.id}`);

    optionsArr.forEach(opt => {
      const label = document.createElement('div');
      label.className = 'option';
      label.textContent = opt;
      label.onclick = () => {
        document.querySelectorAll(`#options-${q.id} .option`).forEach(o => o.classList.remove('selected'));
        label.classList.add('selected');
      };
      optionsDiv.appendChild(label);
    });
  });
}

function submitPracticeAnswer(questionId) {
  const selected = document.querySelector(`#options-${questionId} .option.selected`);
  if (!selected) {
    showFeedback('Please select an answer', false);
    return;
  }

  const questions = document.querySelectorAll('.practice-question');
  const q = questions[questionId];
  const funcType = ['poly', 'rational', 'piecewise', 'asymptote'][questionId % 4];
  const f = functions[funcType];
  const a = parseInt(q.querySelector('.question-text').textContent.match(/x→(-?\d)/)[1]);

  const leftLim = f.leftLimit(a);
  const rightLim = f.rightLimit(a);
  const correctAnswer = leftLim === rightLim ? formatLimit(leftLim) : 'Does Not Exist';

  const isCorrect = selected.textContent === correctAnswer;
  showFeedback(isCorrect ? 'Correct!' : `Incorrect! Answer: ${correctAnswer}`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function startGame() {
  state.gameActive = true;
  state.score = 0;
  state.streak = 0;
  document.getElementById('scorePanel').style.display = 'block';
  updateScoreDisplay();

  const gameContainer = document.getElementById('gameContainer');
  gameContainer.innerHTML = `
    <div class="practice-question">
      <div class="question-text" id="gameQuestion"></div>
      <div class="input-field">
        <input type="number" id="gameAnswer" placeholder="Enter limit value" step="0.01">
        <button class="btn" onclick="submitGameAnswer()">Check</button>
      </div>
      <button class="btn" style="margin-top: 1rem; width: 100%;" onclick="nextGameQuestion()">Skip / Next</button>
    </div>
  `;

  nextGameQuestion();
}

function nextGameQuestion() {
  const funcs = Object.keys(functions);
  const funcType = funcs[Math.floor(Math.random() * funcs.length)];
  const a = Math.floor(Math.random() * 5) - 2;
  const f = functions[funcType];

  const leftLim = f.leftLimit(a);
  const rightLim = f.rightLimit(a);
  const correctAnswer = leftLim === rightLim ? leftLim : null;

  state.currentQuestion = {
    funcType,
    a,
    f,
    correctAnswer
  };

  document.getElementById('gameQuestion').textContent = `Find lim(x→${a}) of ${f.label}`;
  document.getElementById('gameAnswer').value = '';
  document.getElementById('gameAnswer').focus();
}

function submitGameAnswer() {
  const answer = parseFloat(document.getElementById('gameAnswer').value);
  const q = state.currentQuestion;

  if (q.correctAnswer === null) {
    showFeedback('Answer: Does Not Exist', false);
  } else {
    const isCorrect = Math.abs(answer - q.correctAnswer) < 0.01;
    showFeedback(isCorrect ? 'Correct!' : `Wrong! Answer: ${q.correctAnswer.toFixed(2)}`, isCorrect);

    if (isCorrect) {
      state.score++;
      state.streak++;
    } else {
      state.streak = 0;
    }
    updateScoreDisplay();
  }
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = state.score;
  document.getElementById('scoreStreak').textContent = state.streak;
}

function showFeedback(text, isCorrect) {
  const feedback = document.getElementById('feedback');
  feedback.classList.remove('correct', 'incorrect');
  feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
  document.getElementById('feedbackText').textContent = text;
  feedback.classList.add('show');

  setTimeout(() => feedback.classList.remove('show'), 1500);
}

// Initialize
updateGraph();
updateTable();
generatePracticeProblems();
</script>
