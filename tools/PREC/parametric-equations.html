<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parametric Equations — VINCULUM PREC</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: calc(100vh - 60px);
    }

    .vinculum-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      margin-bottom: 1.5rem;
    }

    .vinculum-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .vinculum-back-btn {
      background: transparent;
      border: none;
      color: var(--cyan);
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .vinculum-back-btn:hover {
      color: var(--green);
      transform: translateX(-3px);
    }

    .vinculum-title-group h1 {
      margin: 0;
      font-size: 1.75rem;
      background: var(--grad, linear-gradient(135deg, var(--cyan), var(--green)));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .vinculum-badges {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .badge, .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 0.25rem;
      background: rgba(0, 217, 255, 0.15);
      color: var(--cyan);
      border: 1px solid var(--cyan);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag {
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
      border-color: var(--green);
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
      text-transform: capitalize;
    }

    .tab-btn.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-group select,
    .control-group input {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .control-group input[type="range"] {
      width: 200px;
    }

    .layout {
      display: flex;
      gap: 1.5rem;
      flex: 1;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .side-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.75rem;
    }

    svg {
      display: block;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .stat-label {
      color: var(--text2);
    }

    .stat-value {
      font-weight: 700;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
    }

    .difficulty-btn {
      padding: 0.5rem 1rem;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .difficulty-btn.active {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 1rem;
      padding: 2rem;
      z-index: 1000;
      text-align: center;
      min-width: 300px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .feedback.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .feedback-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .feedback.correct .feedback-text {
      color: var(--green);
    }

    .feedback.incorrect .feedback-text {
      color: var(--pink);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: var(--green);
      transform: translateY(-2px);
    }

    .practice-question {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .question-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .option {
      padding: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text);
    }

    .option:hover {
      border-color: var(--cyan);
      background: color-mix(in srgb, var(--cyan) 10%, var(--card));
    }

    .option.selected {
      background: color-mix(in srgb, var(--cyan) 20%, var(--card));
      border-color: var(--cyan);
    }

    .option.correct {
      background: color-mix(in srgb, var(--green) 20%, var(--card));
      border-color: var(--green);
      color: var(--green);
    }

    .option.incorrect {
      background: color-mix(in srgb, var(--pink) 20%, var(--card));
      border-color: var(--pink);
      color: var(--pink);
    }

    @media (max-width: 960px) {
      .layout {
        flex-direction: column;
      }

      .side-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="vinculum-header">
    <div class="vinculum-header-left">
      <a href="../../VINCULUM-Hub.html" class="vinculum-back-btn" aria-label="Back to Hub">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="vinculum-title-group">
        <h1 class="vinculum-title"><span>VINCULUM</span> — Parametric Equations</h1>
        <div class="vinculum-badges">
          <span class="badge">PREC.G-GPE</span>
          <span class="tag">Curves & Motion</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Preset Curves</label>
      <select id="curveSelect" onchange="changeCurve()">
        <option value="circle">Circle</option>
        <option value="ellipse">Ellipse</option>
        <option value="line">Line</option>
        <option value="lissajous">Lissajous</option>
        <option value="cycloid">Cycloid</option>
      </select>
    </div>
    <div class="control-group">
      <label>Parameter t</label>
      <input type="range" id="tSlider" min="0" max="6.28" step="0.1" value="0" onchange="updateCurve()">
      <span id="tValue">t = 0.00</span>
    </div>
    <div class="control-group">
      <label>Difficulty</label>
      <div style="display: flex; gap: 0.5rem;">
        <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('explore')">Explore</button>
    <button class="tab-btn" onclick="switchTab('practice')">Practice</button>
    <button class="tab-btn" onclick="switchTab('play')">Play</button>
  </div>

  <div class="layout">
    <div class="workspace">
      <div id="explore" class="tab-content active">
        <div class="panel">
          <div class="panel-title">Parametric Curve</div>
          <svg id="curveSvg" width="100%" height="400" viewBox="-300 -250 600 500"></svg>
        </div>
        <div class="panel">
          <div class="panel-title">Equations & Animation</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.95rem;">
            <div id="equationDisplay" style="margin-bottom: 1rem;"></div>
            <button class="btn" onclick="animateCurve()">Play Animation</button>
            <button class="btn" onclick="resetCurve()" style="margin-left: 0.5rem;">Reset</button>
          </div>
        </div>
      </div>

      <div id="practice" class="tab-content">
        <div class="panel">
          <div class="panel-title">Practice Problems</div>
          <div id="practiceContainer"></div>
        </div>
      </div>

      <div id="play" class="tab-content">
        <div class="panel">
          <div class="panel-title">Speed Challenge</div>
          <div id="gameContainer" style="text-align: center;">
            <p style="color: var(--text2); margin-bottom: 1rem;">Match the curve animation to its equations!</p>
            <button class="btn" onclick="startGame()">Start Game</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Current Point</div>
        <div class="stat">
          <span class="stat-label">t:</span>
          <span class="stat-value" id="statT">0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">x(t):</span>
          <span class="stat-value" id="statX">0.00</span>
        </div>
        <div class="stat">
          <span class="stat-label">y(t):</span>
          <span class="stat-value" id="statY">0.00</span>
        </div>
      </div>

      <div class="panel" id="scorePanel" style="display: none;">
        <div class="panel-title">Score</div>
        <div class="stat">
          <span class="stat-label">Correct:</span>
          <span class="stat-value" id="scoreCorrect">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak:</span>
          <span class="stat-value" id="scoreStreak">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-text" id="feedbackText"></div>
</div>

<script>
const state = {
  currentCurve: 'circle',
  t: 0,
  difficulty: 'easy',
  score: 0,
  streak: 0,
  gameActive: false,
  animating: false
};

const curves = {
  circle: {
    x: (t) => 100 * Math.cos(t),
    y: (t) => 100 * Math.sin(t),
    label: 'Circle: x(t) = 100·cos(t), y(t) = 100·sin(t)',
    rect: 'x² + y² = 10000'
  },
  ellipse: {
    x: (t) => 150 * Math.cos(t),
    y: (t) => 80 * Math.sin(t),
    label: 'Ellipse: x(t) = 150·cos(t), y(t) = 80·sin(t)',
    rect: 'x²/22500 + y²/6400 = 1'
  },
  line: {
    x: (t) => 50 * t - 150,
    y: (t) => 30 * t - 100,
    label: 'Line: x(t) = 50t - 150, y(t) = 30t - 100',
    rect: 'y = 0.6x + 10'
  },
  lissajous: {
    x: (t) => 100 * Math.sin(3 * t),
    y: (t) => 100 * Math.sin(2 * t),
    label: 'Lissajous: x(t) = 100·sin(3t), y(t) = 100·sin(2t)',
    rect: 'Lissajous curve (3:2 ratio)'
  },
  cycloid: {
    x: (t) => 50 * (t - Math.sin(t)),
    y: (t) => 50 * (1 - Math.cos(t)),
    label: 'Cycloid: x(t) = 50(t - sin(t)), y(t) = 50(1 - cos(t))',
    rect: 'Cycloid (rolling circle)'
  }
};

function changeCurve() {
  state.currentCurve = document.getElementById('curveSelect').value;
  resetCurve();
}

function setDifficulty(level) {
  state.difficulty = level;
  document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  generatePracticeProblems();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function updateCurve() {
  state.t = parseFloat(document.getElementById('tSlider').value);
  document.getElementById('tValue').textContent = `t = ${state.t.toFixed(2)}`;
  drawCurve();
}

function drawCurve() {
  const svg = document.getElementById('curveSvg');
  svg.innerHTML = '';
  const curve = curves[state.currentCurve];

  for (let i = -5; i <= 5; i++) {
    svg.innerHTML += `<line x1="${i * 50}" y1="-250" x2="${i * 50}" y2="250" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
    svg.innerHTML += `<line x1="-300" y1="${-i * 50}" x2="300" y2="${-i * 50}" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
  }

  svg.innerHTML += `<line x1="-300" y1="0" x2="300" y2="0" stroke="var(--text)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="0" y1="-250" x2="0" y2="250" stroke="var(--text)" stroke-width="2"/>`;

  const maxT = state.currentCurve === 'cycloid' ? 12.56 : 6.28;
  let lastX = curve.x(0), lastY = curve.y(0);
  for (let t = 0; t <= maxT; t += 0.1) {
    const x = curve.x(t);
    const y = curve.y(t);
    svg.innerHTML += `<line x1="${lastX}" y1="${-lastY}" x2="${x}" y2="${-y}" stroke="var(--cyan)" stroke-width="2.5"/>`;
    lastX = x;
    lastY = y;
  }

  const px = curve.x(state.t);
  const py = curve.y(state.t);
  svg.innerHTML += `<circle cx="${px}" cy="${-py}" r="6" fill="var(--pink)"/>`;

  document.getElementById('statT').textContent = state.t.toFixed(2);
  document.getElementById('statX').textContent = px.toFixed(2);
  document.getElementById('statY').textContent = py.toFixed(2);

  document.getElementById('equationDisplay').innerHTML = `
    <div>${curve.label}</div>
    <div style="color: var(--green); margin-top: 0.5rem;">Rectangular: ${curve.rect}</div>
  `;
}

function animateCurve() {
  if (state.animating) return;
  state.animating = true;

  let t = 0;
  const maxT = state.currentCurve === 'cycloid' ? 12.56 : 6.28;
  const interval = setInterval(() => {
    t += 0.15;
    if (t > maxT) {
      clearInterval(interval);
      state.animating = false;
      return;
    }
    document.getElementById('tSlider').value = t;
    updateCurve();
  }, 30);
}

function resetCurve() {
  state.t = 0;
  state.animating = false;
  document.getElementById('tSlider').value = 0;
  updateCurve();
}

function generatePracticeProblems() {
  const container = document.getElementById('practiceContainer');
  container.innerHTML = '';

  for (let i = 0; i < 3; i++) {
    const curveKeys = Object.keys(curves);
    const curveType = curveKeys[i % curveKeys.length];
    const curve = curves[curveType];

    const div = document.createElement('div');
    div.className = 'practice-question';
    div.innerHTML = `
      <div class="question-text">Question ${i + 1}: Identify the rectangular form</div>
      <div style="margin-bottom: 1rem; color: var(--green); font-family: 'JetBrains Mono', monospace;">${curve.label}</div>
      <div class="options" id="options-${i}"></div>
      <button class="btn" onclick="submitPracticeAnswer(${i})">Check</button>
    `;
    container.appendChild(div);

    const options = new Set([curve.rect]);
    const allRects = Object.values(curves).map(c => c.rect);
    while (options.size < 4 && allRects.length > 0) {
      const idx = Math.floor(Math.random() * allRects.length);
      options.add(allRects[idx]);
    }

    const optionsArr = Array.from(options).sort(() => Math.random() - 0.5);
    const optionsDiv = div.querySelector(`#options-${i}`);

    optionsArr.forEach(opt => {
      const label = document.createElement('div');
      label.className = 'option';
      label.textContent = opt;
      label.dataset.curve = curveType;
      label.dataset.correct = opt === curve.rect;
      label.onclick = () => {
        document.querySelectorAll(`#options-${i} .option`).forEach(o => o.classList.remove('selected'));
        label.classList.add('selected');
      };
      optionsDiv.appendChild(label);
    });
  }
}

function submitPracticeAnswer(questionId) {
  const selected = document.querySelector(`#options-${questionId} .option.selected`);
  if (!selected) {
    showFeedback('Select an answer', false);
    return;
  }

  const isCorrect = selected.dataset.correct === 'true';
  showFeedback(isCorrect ? 'Correct!' : `Wrong! ${selected.parentElement.querySelector('[data-correct="true"]').textContent}`, isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function startGame() {
  state.gameActive = true;
  state.score = 0;
  state.streak = 0;
  document.getElementById('scorePanel').style.display = 'block';
  updateScoreDisplay();

  const gameContainer = document.getElementById('gameContainer');
  gameContainer.innerHTML = `
    <div class="practice-question">
      <div class="question-text">Match the parametric curve to its equation:</div>
      <svg id="gameCurveSvg" width="100%" height="300" viewBox="-250 -150 500 350" style="margin: 1rem 0;"></svg>
      <div id="gameOptions" class="options"></div>
      <button class="btn" onclick="submitGameAnswer()">Check</button>
      <button class="btn" style="margin-top: 0.5rem; width: 100%;" onclick="nextGameQuestion()">Skip</button>
    </div>
  `;

  nextGameQuestion();
}

function nextGameQuestion() {
  const curveKeys = Object.keys(curves);
  const curveType = curveKeys[Math.floor(Math.random() * curveKeys.length)];
  const curve = curves[curveType];

  const svg = document.getElementById('gameCurveSvg');
  svg.innerHTML = '';

  for (let i = -3; i <= 3; i++) {
    svg.innerHTML += `<line x1="${i * 50}" y1="-150" x2="${i * 50}" y2="200" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
    svg.innerHTML += `<line x1="-250" y1="${-i * 50}" x2="250" y2="${-i * 50}" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`;
  }
  svg.innerHTML += `<line x1="-250" y1="0" x2="250" y2="0" stroke="var(--text)" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="0" y1="-150" x2="0" y2="200" stroke="var(--text)" stroke-width="2"/>`;

  const maxT = curveType === 'cycloid' ? 12.56 : 6.28;
  let lastX = curve.x(0), lastY = curve.y(0);
  for (let t = 0; t <= maxT; t += 0.1) {
    const x = curve.x(t);
    const y = curve.y(t);
    svg.innerHTML += `<line x1="${lastX}" y1="${-lastY}" x2="${x}" y2="${-y}" stroke="var(--cyan)" stroke-width="2.5"/>`;
    lastX = x;
    lastY = y;
  }

  const options = new Set([curve.label]);
  const allLabels = Object.values(curves).map(c => c.label);
  while (options.size < 4) {
    options.add(allLabels[Math.floor(Math.random() * allLabels.length)]);
  }

  const optionsDiv = document.getElementById('gameOptions');
  optionsDiv.innerHTML = '';
  Array.from(options).sort(() => Math.random() - 0.5).forEach(opt => {
    const label = document.createElement('div');
    label.className = 'option';
    label.textContent = opt;
    label.dataset.correct = opt === curve.label;
    label.onclick = () => {
      document.querySelectorAll('#gameOptions .option').forEach(o => o.classList.remove('selected'));
      label.classList.add('selected');
    };
    optionsDiv.appendChild(label);
  });

  state.currentQuestion = { curveType, curve };
}

function submitGameAnswer() {
  const selected = document.querySelector('#gameOptions .option.selected');
  if (!selected) {
    showFeedback('Select an answer', false);
    return;
  }

  const isCorrect = selected.dataset.correct === 'true';
  showFeedback(isCorrect ? 'Correct!' : 'Incorrect!', isCorrect);

  if (isCorrect) {
    state.score++;
    state.streak++;
  } else {
    state.streak = 0;
  }
  updateScoreDisplay();
}

function updateScoreDisplay() {
  document.getElementById('scoreCorrect').textContent = state.score;
  document.getElementById('scoreStreak').textContent = state.streak;
}

function showFeedback(text, isCorrect) {
  const feedback = document.getElementById('feedback');
  feedback.classList.remove('correct', 'incorrect');
  feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
  document.getElementById('feedbackText').textContent = text;
  feedback.classList.add('show');

  setTimeout(() => feedback.classList.remove('show'), 1500);
}

updateCurve();
generatePracticeProblems();
</script>
