<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VINCULUM Fluency Dashboard - Student Progress & Analytics">
    <meta name="author" content="VINCULUM">
    <title>Fluency Dashboard — VINCULUM Hub</title>

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- VINCULUM Core Styles -->
    <link rel="stylesheet" href="../vinculum-core.css">

    <style>
        /* ═══════════════════════════════════════════════════════
           Dashboard Layout & Components
           ═══════════════════════════════════════════════════════ */

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg);
        }

        .dashboard-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ─────────────────────────────────────
           Hero Section
           ───────────────────────────────────── */

        .hero-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .hero-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .hero-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .hero-stat-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .hero-stat-value {
            font-size: 48px;
            font-weight: 800;
            color: var(--text);
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .hero-stat-unit {
            font-size: 14px;
            color: var(--text2);
        }

        .hero-subtext {
            font-size: 13px;
            color: var(--text2);
            margin-top: 8px;
        }

        /* ─────────────────────────────────────
           Grade Progress Section
           ───────────────────────────────────── */

        .section-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            margin: 32px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grade-progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .grade-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .grade-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .grade-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .grade-percent {
            font-size: 18px;
            font-weight: 800;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: var(--grad);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .grade-info {
            font-size: 12px;
            color: var(--text2);
        }

        /* ─────────────────────────────────────
           Tool Mastery Grid
           ───────────────────────────────────── */

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
            gap: 8px;
            margin-bottom: 32px;
        }

        .tool-cell {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .tool-cell:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.2);
        }

        .tool-cell.mastered {
            background: var(--green);
            color: rgba(0, 0, 0, 0.8);
            border-color: var(--green);
        }

        .tool-cell.proficient {
            background: var(--cyan);
            color: rgba(0, 0, 0, 0.8);
            border-color: var(--cyan);
        }

        .tool-cell.developing {
            background: var(--yellow);
            color: rgba(0, 0, 0, 0.8);
            border-color: var(--yellow);
        }

        .tool-cell.emerging {
            background: var(--pink);
            color: rgba(255, 255, 255, 0.9);
            border-color: var(--pink);
        }

        .tool-cell.not-started {
            background: var(--card2);
            color: var(--text2);
            border-color: var(--border);
        }

        .tool-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-4px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            white-space: nowrap;
            color: var(--text2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 10;
            box-shadow: var(--shadow);
        }

        .tool-cell:hover .tool-tooltip {
            opacity: 1;
        }

        /* ─────────────────────────────────────
           Recommendations Section
           ───────────────────────────────────── */

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .rec-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .rec-card:hover {
            border-color: var(--cyan);
        }

        .rec-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .rec-badge.high {
            background: rgba(255, 59, 139, 0.2);
            color: var(--pink);
        }

        .rec-badge.medium {
            background: rgba(255, 193, 7, 0.2);
            color: var(--yellow);
        }

        .rec-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .rec-description {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.4;
        }

        /* ─────────────────────────────────────
           Misconception Tracker
           ───────────────────────────────────── */

        .misconception-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
            max-height: 400px;
            overflow-y: auto;
        }

        .misconception-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 4px solid var(--pink);
            border-radius: 8px;
            padding: 12px;
        }

        .misconception-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .misconception-tool {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        .misconception-frequency {
            font-size: 12px;
            font-weight: 700;
            background: rgba(255, 59, 139, 0.15);
            color: var(--pink);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .misconception-description {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 6px;
        }

        .misconception-example {
            font-size: 11px;
            color: var(--text2);
            padding: 6px;
            background: var(--bg);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─────────────────────────────────────
           Activity Timeline
           ───────────────────────────────────── */

        .activity-timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 32px;
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--cyan);
        }

        .activity-info {
            flex: 1;
        }

        .activity-tool {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .activity-meta {
            font-size: 11px;
            color: var(--text2);
            display: flex;
            gap: 8px;
        }

        /* ─────────────────────────────────────
           Streak Calendar (GitHub style)
           ───────────────────────────────────── */

        .streak-container {
            margin-bottom: 32px;
        }

        .streak-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .streak-stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .streak-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        .streak-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
        }

        .heatmap {
            display: inline-block;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            overflow-x: auto;
        }

        .heatmap-weeks {
            display: flex;
            gap: 4px;
        }

        .heatmap-week {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .heatmap-day {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: var(--border);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .heatmap-day:hover {
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        .heatmap-day.level-0 { background: var(--border); }
        .heatmap-day.level-1 { background: rgba(0, 212, 255, 0.3); }
        .heatmap-day.level-2 { background: rgba(0, 212, 255, 0.6); }
        .heatmap-day.level-3 { background: var(--cyan); }
        .heatmap-day.level-4 { background: var(--green); }

        /* ─────────────────────────────────────
           Empty State
           ───────────────────────────────────── */

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            gap: 16px;
            color: var(--text2);
        }

        .empty-icon {
            font-size: 64px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .empty-description {
            font-size: 14px;
            max-width: 300px;
            line-height: 1.6;
        }

        .empty-cta {
            display: inline-block;
            padding: 10px 20px;
            background: var(--grad);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            margin-top: 8px;
        }

        .empty-cta:hover {
            transform: scale(1.05);
        }

        /* ─────────────────────────────────────
           Responsive
           ───────────────────────────────────── */

        @media (max-width: 1024px) {
            .hero-section {
                grid-template-columns: 1fr 1fr;
            }

            .hero-stat-value {
                font-size: 36px;
            }

            .grade-progress-grid {
                grid-template-columns: 1fr;
            }

            .recommendations-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .dashboard-content {
                padding: 16px;
            }

            .hero-section {
                grid-template-columns: 1fr;
            }

            .hero-stat-value {
                font-size: 32px;
            }

            .section-title {
                font-size: 16px;
            }

            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            }

            .streak-stats {
                gap: 16px;
            }

            .streak-value {
                font-size: 22px;
            }
        }

        /* ─────────────────────────────────────
           Accessibility
           ───────────────────────────────────── */

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        /* ─────────────────────────────────────
           Theme Selector Support
           ───────────────────────────────────── */

        .theme-selector {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .theme-selector.show {
            display: flex;
        }

        .theme-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            background: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
        }

    </style>
</head>
<body>
    <!-- ═══════════════════════════════════════════════════════
         HEADER
         ═══════════════════════════════════════════════════════ -->
    <div class="vinculum-header">
        <div class="vinculum-header-left">
            <a href="../VINCULUM-Hub.html" class="vinculum-back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Hub
            </a>
        </div>
        <div class="vinculum-header-title">
            <span class="brand">Fluency</span> Dashboard
        </div>
        <div class="vinculum-header-right">
            <span class="vinculum-header-badge" id="version">v1.0</span>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         MAIN CONTENT
         ═══════════════════════════════════════════════════════ -->
    <div class="dashboard-container">
        <div class="dashboard-content" id="dashboard-main">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <!-- Theme Selector (development) -->
    <div class="theme-selector" id="theme-selector">
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="bright">Bright</button>
        <button class="theme-btn" data-theme="ocean">Ocean</button>
        <button class="theme-btn" data-theme="frost">Frost</button>
        <button class="theme-btn" data-theme="neonforge">Neon Forge</button>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SCRIPTS
         ═══════════════════════════════════════════════════════ -->
    <script src="../vinculum-feedback.js"></script>
    <script src="../vinculum-input.js"></script>
    <script src="../vinculum-data.js"></script>
    <script src="../vinculum-dashboard.js"></script>

    <script>
        'use strict';

        // ════════════════════════════════════════
        // INITIALIZATION
        // ════════════════════════════════════════

        var dashboard = {
            data: null,
            container: document.getElementById('dashboard-main'),

            init: function() {
                // Load theme preference
                var savedTheme = localStorage.getItem('vinculum-theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);

                // Load data
                this.data = {
                    summary: VinculumDashboard.getStudentSummary(),
                    recommendations: VinculumDashboard.getRecommendations(),
                    misconceptions: VinculumDashboard.getMisconceptionLog(),
                    streakData: VinculumDashboard.getStreakData()
                };

                // Render
                if (this.data.summary.totalSessions === 0) {
                    this.renderEmptyState();
                } else {
                    this.renderDashboard();
                }

                // Setup theme selector
                this.setupThemeSelector();
            },

            renderEmptyState: function() {
                var html = '<div class="empty-state">' +
                    '<div class="empty-icon">📚</div>' +
                    '<div class="empty-title">Welcome to Your Dashboard!</div>' +
                    '<div class="empty-description">Start by exploring a tool from the Hub to begin tracking your progress and building fluency.</div>' +
                    '<a href="../VINCULUM-Hub.html" class="empty-cta">Explore Tools</a>' +
                    '</div>';
                this.container.innerHTML = html;
            },

            renderDashboard: function() {
                var html = '';

                // Hero section
                html += this.renderHeroSection();

                // Grade progress
                html += this.renderGradeProgress();

                // Tool mastery grid
                html += this.renderToolGrid();

                // Recommendations
                if (this.data.recommendations.length > 0) {
                    html += this.renderRecommendations();
                }

                // Misconceptions
                if (this.data.misconceptions.length > 0) {
                    html += this.renderMisconceptions();
                }

                // Activity timeline
                html += this.renderActivityTimeline();

                // Streak calendar
                html += this.renderStreakCalendar();

                // Data export
                html += this.renderExportSection();

                this.container.innerHTML = html;
            },

            renderHeroSection: function() {
                var summary = this.data.summary;
                return '<div class="hero-section">' +
                    '<div class="hero-card">' +
                        '<div class="hero-stat-label">Overall Mastery</div>' +
                        '<div class="hero-stat-value">' + summary.masteryPercentage + '%</div>' +
                        '<div class="hero-stat-unit">' + summary.totalSessions + ' sessions completed</div>' +
                    '</div>' +
                    '<div class="hero-card">' +
                        '<div class="hero-stat-label">Average Accuracy</div>' +
                        '<div class="hero-stat-value">' + Math.round(summary.averageAccuracy * 100) + '%</div>' +
                        '<div class="hero-stat-unit">Across all tools</div>' +
                    '</div>' +
                    '<div class="hero-card">' +
                        '<div class="hero-stat-label">Current Streak</div>' +
                        '<div class="hero-stat-value">' + summary.currentStreak + '</div>' +
                        '<div class="hero-stat-unit">days (Best: ' + summary.longestStreak + ')</div>' +
                    '</div>' +
                    '</div>';
            },

            renderGradeProgress: function() {
                var html = '<h2 class="section-title">📊 Grade Progress</h2><div class="grade-progress-grid">';
                var grades = ['K', '1', '2', '3', '4', '5'];

                grades.forEach(function(grade) {
                    var gradeData = VinculumDashboard.getGradeProgress(grade);
                    var coverage = gradeData.overallCoverage;
                    html += '<div class="grade-card">' +
                        '<div class="grade-header">' +
                            '<div class="grade-label">Grade ' + grade + '</div>' +
                            '<div class="grade-percent">' + coverage + '%</div>' +
                        '</div>' +
                        '<div class="progress-bar">' +
                            '<div class="progress-fill" style="width: ' + coverage + '%"></div>' +
                        '</div>' +
                        '<div class="grade-info">' +
                            gradeData.completedTools + ' of ' + gradeData.totalTools + ' tools completed' +
                        '</div>' +
                    '</div>';
                });

                html += '</div>';
                return html;
            },

            renderToolGrid: function() {
                var html = '<h2 class="section-title">🎯 Tool Mastery Map</h2>' +
                    '<p style="color: var(--text2); font-size: 12px; margin-bottom: 12px; margin-top: -8px;">' +
                    'Green = Mastered | Blue = Proficient | Yellow = Developing | Pink = Emerging | Gray = Not Started' +
                    '</p>' +
                    '<div class="tool-grid">';

                var grades = ['K', '1', '2', '3', '4', '5'];
                var toolLookup = {};

                grades.forEach(function(g) {
                    var gradeData = VinculumDashboard.getGradeProgress(g);
                    Object.keys(gradeData.strands).forEach(function(strand) {
                        Object.keys(gradeData.strands[strand].tools).forEach(function(toolId) {
                            if (!toolLookup[toolId]) {
                                var toolProgress = VinculumDashboard.getToolProgress(toolId);
                                toolLookup[toolId] = {
                                    progress: toolProgress,
                                    grade: g
                                };
                            }
                        });
                    });
                });

                Object.keys(toolLookup).sort().forEach(function(toolId) {
                    var tool = toolLookup[toolId];
                    var progress = tool.progress;
                    var level = progress.masteryLevel;
                    var abbrev = toolId.substring(0, 3).toUpperCase();

                    html += '<div class="tool-cell ' + level + '" title="' + toolId + '">' +
                        abbrev +
                        '<div class="tool-tooltip">' + toolId + '<br/>' + progress.masteryLevel + '</div>' +
                    '</div>';
                });

                html += '</div>';
                return html;
            },

            renderRecommendations: function() {
                var html = '<h2 class="section-title">💡 Next Up</h2>' +
                    '<div class="recommendations-grid">';

                this.data.recommendations.slice(0, 6).forEach(function(rec) {
                    var priority = rec.priority || 'medium';
                    var title = '';
                    var description = '';

                    if (rec.type === 'spaced-retrieval') {
                        title = 'Review: ' + rec.concept;
                        description = 'Time to review this concept from ' + rec.sourceTool;
                    } else if (rec.type === 'remediation') {
                        title = 'More Practice: ' + rec.tool;
                        description = 'Your accuracy is ' + Math.round(rec.currentAccuracy * 100) + '% — let\'s build confidence';
                    } else if (rec.type === 'next-tool') {
                        title = 'New Tool: ' + rec.tool;
                        description = 'Grade ' + rec.grade + ' — ' + rec.strand;
                    }

                    html += '<div class="rec-card">' +
                        '<div class="rec-badge ' + priority + '">' + priority + ' Priority</div>' +
                        '<div class="rec-title">' + title + '</div>' +
                        '<div class="rec-description">' + description + '</div>' +
                    '</div>';
                });

                html += '</div>';
                return html;
            },

            renderMisconceptions: function() {
                var html = '<h2 class="section-title">⚠️ Misconception Tracker</h2>' +
                    '<div class="misconception-list">';

                this.data.misconceptions.slice(0, 5).forEach(function(m) {
                    var example = m.recentExamples && m.recentExamples[0] ?
                        'Your answer: ' + m.recentExamples[0].studentAnswer :
                        'Pattern identified';

                    html += '<div class="misconception-item">' +
                        '<div class="misconception-header">' +
                            '<div class="misconception-tool">' + m.tool + '</div>' +
                            '<div class="misconception-frequency">' + m.frequency + ' times</div>' +
                        '</div>' +
                        '<div class="misconception-description">' + m.description + '</div>' +
                        '<div class="misconception-example">' + example + '</div>' +
                    '</div>';
                });

                html += '</div>';
                return html;
            },

            renderActivityTimeline: function() {
                var html = '<h2 class="section-title">📅 Recent Activity</h2>' +
                    '<div class="activity-timeline">';

                var sessions = VinculumDashboard.exportData().sessionCount;
                if (sessions === 0) {
                    html += '<div style="color: var(--text2); padding: 20px; text-align: center;">No recent activity</div>';
                } else {
                    var allSessions = [];
                    var grades = ['K', '1', '2', '3', '4', '5'];

                    grades.forEach(function(g) {
                        var gradeData = VinculumDashboard.getGradeProgress(g);
                        Object.keys(gradeData.strands).forEach(function(strand) {
                            Object.keys(gradeData.strands[strand].tools).forEach(function(toolId) {
                                var toolProgress = VinculumDashboard.getToolProgress(toolId);
                                if (toolProgress.sessionCount > 0) {
                                    allSessions.push({
                                        tool: toolId,
                                        accuracy: toolProgress.accuracy,
                                        lastPlayed: toolProgress.lastPlayed
                                    });
                                }
                            });
                        });
                    });

                    allSessions.sort(function(a, b) {
                        return new Date(b.lastPlayed) - new Date(a.lastPlayed);
                    });

                    allSessions.slice(0, 5).forEach(function(item) {
                        var accuracyStr = Math.round(item.accuracy * 100) + '%';
                        html += '<div class="activity-item">' +
                            '<div class="activity-dot"></div>' +
                            '<div class="activity-info">' +
                                '<div class="activity-tool">' + item.tool + '</div>' +
                                '<div class="activity-meta">' +
                                    '<span>' + item.lastPlayed + '</span>' +
                                    '<span>• ' + accuracyStr + ' accuracy</span>' +
                                '</div>' +
                            '</div>' +
                        '</div>';
                    });
                }

                html += '</div>';
                return html;
            },

            renderStreakCalendar: function() {
                var streak = this.data.streakData;
                var heatmap = streak.heatmap;
                var html = '<div class="streak-container">' +
                    '<h2 class="section-title">🔥 Practice Streaks</h2>' +
                    '<div class="streak-stats">' +
                        '<div class="streak-stat">' +
                            '<div class="streak-label">Current Streak</div>' +
                            '<div class="streak-value">' + streak.currentStreak + '</div>' +
                        '</div>' +
                        '<div class="streak-stat">' +
                            '<div class="streak-label">Longest Streak</div>' +
                            '<div class="streak-value">' + streak.longestStreak + '</div>' +
                        '</div>' +
                        '<div class="streak-stat">' +
                            '<div class="streak-label">Last Activity</div>' +
                            '<div class="streak-value">' + (streak.lastActivityDate || 'None') + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="heatmap">' +
                        '<div class="heatmap-weeks" id="heatmap-container"></div>' +
                    '</div>' +
                    '</div>';

                // Build heatmap after HTML is inserted
                setTimeout(function() {
                    dashboard.buildHeatmap(heatmap);
                }, 0);

                return html;
            },

            buildHeatmap: function(heatmap) {
                var container = document.getElementById('heatmap-container');
                if (!container) return;

                var dates = Object.keys(heatmap).sort();
                var weeks = [];
                var currentWeek = [];

                dates.forEach(function(dateStr, idx) {
                    var date = new Date(dateStr + 'T00:00:00Z');
                    var dow = date.getUTCDay();

                    if (currentWeek.length === 0) {
                        // Start with current day of week
                        for (var i = 0; i < dow; i++) {
                            currentWeek.push(null);
                        }
                    }

                    currentWeek.push(dateStr);

                    if (currentWeek.length === 7) {
                        weeks.push(currentWeek);
                        currentWeek = [];
                    }
                });

                if (currentWeek.length > 0) {
                    weeks.push(currentWeek);
                }

                weeks.forEach(function(week) {
                    var weekEl = document.createElement('div');
                    weekEl.className = 'heatmap-week';

                    week.forEach(function(dateStr) {
                        var dayEl = document.createElement('div');
                        dayEl.className = 'heatmap-day';

                        if (dateStr) {
                            var count = heatmap[dateStr] || 0;
                            var level = Math.min(count, 4);
                            dayEl.classList.add('level-' + level);
                            dayEl.title = dateStr + ': ' + count + ' session(s)';
                        } else {
                            dayEl.style.visibility = 'hidden';
                        }

                        weekEl.appendChild(dayEl);
                    });

                    container.appendChild(weekEl);
                });
            },

            renderExportSection: function() {
                return '<h2 class="section-title">📥 Export Data</h2>' +
                    '<div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center;">' +
                        '<p style="color: var(--text2); margin-bottom: 12px;">Download your progress data for review or sharing with teachers</p>' +
                        '<button id="export-btn" style="padding: 10px 20px; background: var(--grad); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: transform 0.2s;">📊 Export as JSON</button>' +
                    '</div>';
            },

            setupThemeSelector: function() {
                var selector = document.getElementById('theme-selector');
                var buttons = selector.querySelectorAll('.theme-btn');

                buttons.forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var theme = this.getAttribute('data-theme');
                        document.documentElement.setAttribute('data-theme', theme);
                        localStorage.setItem('vinculum-theme', theme);
                    });
                });

                // Export button
                setTimeout(function() {
                    var exportBtn = document.getElementById('export-btn');
                    if (exportBtn) {
                        exportBtn.addEventListener('click', function() {
                            var data = VinculumDashboard.exportData();
                            var json = JSON.stringify(data, null, 2);
                            var blob = new Blob([json], { type: 'application/json' });
                            var url = URL.createObjectURL(blob);
                            var a = document.createElement('a');
                            a.href = url;
                            a.download = 'vinculum-dashboard-' + new Date().toISOString().split('T')[0] + '.json';
                            a.click();
                            URL.revokeObjectURL(url);
                        });
                    }
                }, 100);
            }
        };

        // Launch dashboard
        document.addEventListener('DOMContentLoaded', function() {
            dashboard.init();
        });
    </script>
<div id="feedback" class="feedback"></div>
</body>
</html>
