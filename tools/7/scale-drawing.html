<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Scale Drawing - VINCULUM</title><link rel="stylesheet" href="../../vinculum-core.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI';background-color:var(--bg);color:var(--text);padding:20px}.container{max-width:900px;margin:0 auto}.vinculum-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding:20px;background-color:var(--card);border-radius:12px}.vinculum-title{font-size:28px;font-weight:700;margin:0}.badge{background-color:var(--cyan);color:white;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}.mode-tabs{display:flex;gap:12px;margin-bottom:30px;border-bottom:2px solid var(--border)}.mode-tab{padding:12px 24px;background:0;border:0;color:var(--text2);font-size:16px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}.mode-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}.mode-content{display:none}.mode-content.active{display:block}.content-section{background-color:var(--card);border-radius:12px;padding:24px;margin-bottom:20px}.content-section h2{margin-bottom:20px;font-size:22px}.btn{padding:10px 24px;background-color:var(--cyan);color:white;border:0;border-radius:8px;cursor:pointer;font-weight:600}.input-group{display:flex;gap:12px;align-items:center;margin:15px 0}.input-group input{padding:8px 12px;border:2px solid var(--border);border-radius:8px;background-color:var(--bg2);color:var(--text);width:100px}canvas{border:2px solid var(--border);border-radius:8px;background-color:var(--bg2);display:block;margin:20px auto}#feedback{margin-top:20px}</style></head><body data-theme=""><div class="container"><div class="vinculum-header"><div style="display:flex;align-items:center;gap:20px"><a href="../../VINCULUM-Hub.html" style="text-decoration:none;color:var(--text)">← Hub</a><div><h1 class="vinculum-title">Scale Drawing Lab</h1><div style="display:flex;gap:8px"><span class="badge">7.G.1</span><span class="badge" style="background-color:var(--pink)">MN: 7.3.1.1</span></div></div></div></div><div class="mode-tabs"><button class="mode-tab active" data-mode="explore">Explore</button><button class="mode-tab" data-mode="practice">Practice</button><button class="mode-tab" data-mode="play">Play</button></div><div id="explore" class="mode-content active"><div class="content-section"><h2>Explore: Scale Drawings</h2><p style="margin-bottom:20px">Create scaled versions of shapes using different scale factors.</p><div class="input-group"><label>Scale Factor:</label><input type="number" id="exploreFactor" value="2" min="0.5" max="5" step="0.5" onchange="redrawExplore()"></div><canvas id="exploreCanvas" width="600" height="300"></canvas></div></div><div id="practice" class="mode-content"><div class="content-section"><h2>Practice: Calculate Scale</h2><div class="input-group"><button class="btn" onclick="changeDiff('easy')" id="easyBtn" style="background-color:var(--cyan)">Easy</button><button class="btn" onclick="changeDiff('medium')">Medium</button><button class="btn" onclick="changeDiff('hard')">Hard</button></div><div style="background-color:var(--bg2);padding:15px;border-radius:8px;margin-bottom:20px" id="practiceProblem">Actual: 10 ft. Scale factor: 2. Drawing: ? units</div><div class="input-group"><input type="number" id="practiceAnswer" placeholder="Answer"><button class="btn" onclick="checkPracticeAnswer()">Check</button></div><div id="feedback"></div></div></div><div id="play" class="mode-content"><div class="content-section"><h2>Play: Scale Challenge</h2><p style="margin-bottom:15px">Solve scale problems! 10 in 60 seconds.</p><div style="display:flex;gap:20px;margin-bottom:20px"><div><strong>Score:</strong> <span id="playScore">0/10</span></div><div><strong>Time:</strong> <span id="playTimer">60</span>s</div><button class="btn" id="startPlayBtn" onclick="startPlayMode()">Start</button></div><div style="background-color:var(--bg2);padding:15px;border-radius:8px" id="playProblem" style="display:none"></div><div class="input-group" id="playControls" style="display:none"><input type="number" id="playAnswer" placeholder="Answer"><button class="btn" onclick="submitPlayAnswer()">Submit</button></div><div id="playFeedback" style="display:none"></div></div></div></div><script src="../../vinculum-feedback.js"></script>
<script src="../../vinculum-input.js"></script>
<script>let diff='easy',playScore=0,playTimer=60,playActive=false;const problems={easy:[{actual:10,factor:2,answer:5},{actual:8,factor:2,answer:4},{actual:12,factor:3,answer:4}],medium:[{actual:15,factor:2.5,answer:6},{actual:20,factor:1.5,answer:13.33},{actual:10,factor:3,answer:3.33}],hard:[{actual:24,factor:0.5,answer:48},{actual:36,factor:1.5,answer:24},{actual:50,factor:0.8,answer:62.5}]};function switchMode(m){['explore','practice','play'].forEach(x=>{document.getElementById(x).classList.remove('active');document.querySelector(`[data-mode="${x}"]`).classList.remove('active')});document.getElementById(m).classList.add('active');document.querySelector(`[data-mode="${m}"]`).classList.add('active');if(m==='practice')generatePracticeProblem()}document.querySelectorAll('.mode-tab').forEach(t=>t.addEventListener('click',()=>switchMode(t.dataset.mode)));function redrawExplore(){const c=document.getElementById('exploreCanvas');const ctx=c.getContext('2d');const f=parseFloat(document.getElementById('exploreFactor').value)||2;ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim();ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='rgba(0,180,255,0.3)';ctx.strokeStyle='rgb(0,180,255)';ctx.lineWidth=2;const w=100,h=60;ctx.fillRect(50,50,w,h);ctx.strokeRect(50,50,w,h);ctx.fillStyle='rgba(0,200,100,0.3)';ctx.strokeStyle='rgb(0,200,100)';ctx.fillRect(200,50,w*f,h*f);ctx.strokeRect(200,50,w*f,h*f);ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim();ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('Actual',100,130);ctx.fillText('1:' +f,100,145);ctx.fillText('Scale Drawing',200+w*f/2,130);ctx.fillText('1:'+f,200+w*f/2,145)}function changeDiff(d){diff=d;document.querySelectorAll('#explore .btn').forEach(b=>b.style.backgroundColor='');event.target.style.backgroundColor='var(--cyan)';generatePracticeProblem()}function generatePracticeProblem(){window.currentProblem=problems[diff][Math.floor(Math.random()*3)];document.getElementById('practiceProblem').textContent=`Actual: ${window.currentProblem.actual}. Scale 1:${window.currentProblem.factor}. Drawing: ? units`;document.getElementById('practiceAnswer').value='';document.getElementById('feedback').textContent=''}function checkPracticeAnswer(){const a=parseFloat(document.getElementById('practiceAnswer').value);const fb=document.getElementById('feedback');if(isNaN(a)){fb.textContent='❌ Enter a number';fb.style.color='var(--pink)';return}const exp=Math.round(window.currentProblem.answer*100)/100;if(Math.abs(a-exp)<0.5){fb.textContent='✓ Correct!';fb.style.color='var(--green)';setTimeout(generatePracticeProblem,1500)}else{fb.textContent=`❌ Answer: ${exp}`;fb.style.color='var(--pink)'}}function startPlayMode(){playActive=true;playScore=0;playTimer=60;document.getElementById('startPlayBtn').style.display='none';document.getElementById('playProblem').style.display='block';document.getElementById('playControls').style.display='flex';document.getElementById('playFeedback').style.display='block';generatePlayProblem();const i=setInterval(()=>{playTimer--;document.getElementById('playTimer').textContent=playTimer;if(playTimer<=0){clearInterval(i);endPlayMode()}},1000)}function generatePlayProblem(){const all=[...problems.easy,...problems.medium,...problems.hard];window.currentPlayProblem=all[Math.floor(Math.random()*all.length)];document.getElementById('playProblem').textContent=`Actual: ${window.currentPlayProblem.actual}. Scale 1:${window.currentPlayProblem.factor}. Drawing: ?`;document.getElementById('playAnswer').value=''}function submitPlayAnswer(){if(!playActive)return;const a=parseFloat(document.getElementById('playAnswer').value);const fb=document.getElementById('playFeedback');if(isNaN(a))return;const exp=Math.round(window.currentPlayProblem.answer*100)/100;if(Math.abs(a-exp)<0.5){playScore++;document.getElementById('playScore').textContent=`${playScore}/10`;fb.textContent='✓';fb.style.color='var(--green)'}else{fb.textContent='✗';fb.style.color='var(--pink)'}setTimeout(generatePlayProblem,600)}function endPlayMode(){playActive=false;document.getElementById('playControls').style.display='none';document.getElementById('playFeedback').textContent=`Game Over! ${playScore}/10`;document.getElementById('playFeedback').style.color='var(--cyan)';document.getElementById('startPlayBtn').textContent='Play Again';document.getElementById('startPlayBtn').style.display='block'}redrawExplore();generatePracticeProblem()</script></body></html>
