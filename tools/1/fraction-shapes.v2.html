<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Fraction Shapes</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* === FOCUS VISIBLE (Keyboard Navigation) === */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

.main{flex:1;display:flex;overflow:hidden;}
.workspace{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;overflow-y:auto;}
.side-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);padding:20px;overflow-y:auto;flex-shrink:0;}
.panel-section{margin-bottom:20px;}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
.panel-text{font-size:13px;color:var(--text2);line-height:1.6;}

/* == Fraction Shape SVG == */
.fraction-shape{width:200px;height:200px;display:inline-block;margin:8px;cursor:pointer;}
.fraction-shape svg{width:100%;height:100%;display:block;}
.fraction-shape-row{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;}
.shape-section{cursor:pointer;transition:fill 0.2s;}
.shape-section:hover{opacity:0.85;}
.shaded{fill:var(--cyan,#00d4ff);opacity:0.7;}
.partition-line{stroke:var(--text,#e0e0e0);stroke-width:2;stroke-dasharray:6,3;}
.fraction-label{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;text-align:center;color:var(--purple,#b388ff);margin:8px 0;}
.fraction-notation{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;text-align:center;margin:4px 0;}

/* == Controls == */
.instruction-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;font-size:15px;color:var(--text2);font-weight:500;max-width:600px;transition:all 0.3s;}
.instruction-box.highlight-cyan{border-color:var(--cyan);color:var(--cyan);}
.instruction-box.highlight-pink{border-color:var(--pink);color:var(--pink);}
.instruction-box.highlight-green{border-color:var(--green);color:var(--green);}

.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{padding:10px 20px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.ctrl-btn:hover{background:var(--card2);color:var(--text);}
.ctrl-btn.primary{background:var(--grad);color:var(--bg);border-color:transparent;}
.ctrl-btn.active{border-color:var(--cyan);background:rgba(0,212,255,0.12);color:var(--cyan);}

/* == Shape Selector == */
.shape-selector{display:flex;gap:10px;justify-content:center;margin:8px 0;}
.shape-btn{width:64px;height:64px;border-radius:14px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.shape-btn:hover{border-color:var(--purple);transform:scale(1.08);}
.shape-btn.active{border-color:var(--purple);background:rgba(179,136,255,0.12);}
.shape-btn svg{width:36px;height:36px;}

/* == MC Grid == */
.mc-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;}
.mc-btn{min-width:140px;padding:12px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;text-align:center;}
.mc-btn:hover{border-color:var(--cyan);transform:scale(1.04);}
.mc-btn.correct-flash{border-color:var(--green);background:rgba(0,230,118,0.2);color:var(--green);animation:correctFlash 0.4s ease-out;}
.mc-btn.incorrect-flash{border-color:var(--pink);background:rgba(255,59,139,0.2);color:var(--pink);animation:shake 0.3s ease-in-out;}

@keyframes correctFlash{0%{transform:scale(1.1);} 100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);}}

.score-display{text-align:center;padding:16px;background:var(--card);border-radius:12px;margin-bottom:12px;}
.score-value{font-size:36px;font-weight:900;font-family:'JetBrains Mono',monospace;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.streak-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:8px;}
.streak-fill{height:100%;background:var(--grad);border-radius:3px;transition:width 0.3s;}

.feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);padding:24px 48px;border-radius:20px;font-size:28px;font-weight:800;z-index:200;pointer-events:none;transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.3s;opacity:0;max-width:90vw;text-align:center;}
.feedback.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
.feedback.correct{background:rgba(0,230,118,0.15);color:var(--green);border:2px solid var(--green);}
.feedback.incorrect{background:rgba(255,59,139,0.15);color:var(--pink);border:2px solid var(--pink);}
.feedback.try-again{background:rgba(255,193,7,0.15);color:var(--yellow);border:2px solid var(--yellow);}

/* == Equal-parts highlight == */
.equal-label{font-size:12px;font-weight:600;color:var(--green);text-align:center;margin-top:4px;}
.unequal-label{font-size:12px;font-weight:600;color:var(--pink);text-align:center;margin-top:4px;}

/* == Compare view == */
.compare-row{display:flex;gap:24px;align-items:flex-start;justify-content:center;flex-wrap:wrap;}
.compare-card{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 12px;}
.compare-vs{font-size:20px;font-weight:900;color:var(--muted);align-self:center;padding-top:60px;}

/* == Progress dots (practice) == */
.progress-dots{display:flex;gap:6px;justify-content:center;margin:8px 0;}
.progress-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all 0.2s;}
.progress-dot.correct{background:var(--green);}
.progress-dot.incorrect{background:var(--pink);}
.progress-dot.current{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}

/* == Game-over overlay == */
.game-over{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;}
.game-over-title{font-size:32px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.game-over-score{font-size:56px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--cyan);}
.game-over-stat{font-size:14px;color:var(--text2);font-weight:600;}
.game-over-stars{font-size:36px;letter-spacing:4px;}

::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">&#9664; Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Fraction Shapes</div>
    <span class="vinculum-header-badge">1.G</span>
  </div>
  <div class="vinculum-header-right">
    <div class="vinculum-std-tags">
      <span class="vinculum-std-tag">1.G.2</span>
      <span class="vinculum-std-tag">1.G.3</span>
      <span class="vinculum-std-tag mn">MN 1.4.1.2</span>
    </div>
    <button class="vinculum-back-btn" id="readAloudBtn" onclick="toggleReadAloud()" aria-label="Read Aloud" title="Read instructions aloud" style="margin-left:8px;white-space:nowrap;">&#128264; Read to Me</button>
  </div>
</div>

<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab active-explore" data-mode="explore" id="tabExplore" onclick="setMode('explore')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore</button>
  <button class="vinculum-mode-tab" id="tabPractice" data-mode="practice" onclick="setMode('practice')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button>
  <button class="vinculum-mode-tab" id="tabPlay" data-mode="play" onclick="setMode('play')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn active" id="diffE" data-diff="emergent" onclick="setDiff('emergent')">Halves</button>
    <button class="vinculum-diff-btn" id="diffP" data-diff="proficient" onclick="setDiff('proficient')">Fourths</button>
    <button class="vinculum-diff-btn" id="diffA" data-diff="advanced" onclick="setDiff('advanced')">Explain</button>
  </div>
</div>

<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>
<div class="feedback" id="feedback"></div>

<script src="../../vinculum-input.js"></script>
<script>
let S = {
  mode: 'explore', diff: 'emergent',
  shapeType: 'circle',
  partitions: 2,
  shaded: new Set(),
  showCompare: false,
  pShape: 'circle', pPartitions: 2, pShaded: 0, pAnswer: 0, pType: 'partition', pChoices: [],
  pCorrect: 0, pAttempted: 0, pHistory: [],
  score: 0, streak: 0, best: 0, round: 0, total: 10,
  playShape: '', playPartitions: 0, playType: '', playAnswer: 0, playChoices: [],
  gameOver: false, roundResults: []
};

/* == Misconceptions (6 types for targeted feedback) == */
const MISCONCEPTIONS = {
  congruence: {
    id: 'congruence',
    msg: () => 'Equal parts must be the same SIZE, but they do not have to look the same. Each part takes up the same amount of space.'
  },
  wholeSize: {
    id: 'whole-size',
    msg: () => 'The size of the whole matters! One half of a small circle is NOT the same as one half of a big circle.'
  },
  offByOne: {
    id: 'off-by-one',
    msg: (ans, got) => `Close! You said ${got} but the answer is ${ans}. Count the shaded parts carefully.`
  },
  randomGuess: {
    id: 'random',
    msg: () => 'Look at the shape. How many EQUAL parts? How many are shaded?'
  },
  halvesVsFourths: {
    id: 'halves-vs-fourths',
    msg: () => 'Halves means 2 equal parts. Fourths means 4 equal parts. Count the lines that divide the shape!'
  },
  shadedVsUnshaded: {
    id: 'shaded-vs-unshaded',
    msg: (shaded, total) => `You may have counted the UNSHADED parts instead! There are ${shaded} shaded and ${total - shaded} unshaded.`
  }
};

/* == Read-Aloud == */
function toggleReadAloud() {
  if (window.VinculumStories && VinculumStories.isReading()) {
    VinculumStories.stopReading();
    document.getElementById('readAloudBtn').innerHTML = '&#128264; Read to Me';
  } else {
    const fb = document.getElementById('feedback');
    const storyEl = document.getElementById('storyBanner');
    const instEl = document.querySelector('.instruction-box');
    const text = storyEl ? storyEl.textContent
               : instEl ? instEl.textContent
               : (fb ? fb.textContent : 'Welcome to Fraction Shapes!');
    if (window.VinculumStories) {
      VinculumStories.readAloud(text, { rate: 0.85, onComplete: () => {
        document.getElementById('readAloudBtn').innerHTML = '&#128264; Read to Me';
      }});
      document.getElementById('readAloudBtn').innerHTML = '&#9209; Stop';
    }
  }
}

function rand(a, b) {
  return Math.floor(Math.random() * (b - a + 1)) + a;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showFB(msg, type) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + type;
  fb.textContent = msg;
  fb.classList.add('show');
  setTimeout(() => { fb.classList.remove('show'); }, 2200);
}

/* == Mode & Difficulty == */
function setMode(m) {
  S.mode = m;
  S.shaded = new Set();
  S.showCompare = false;
  S.gameOver = false;
  document.querySelectorAll('.vinculum-mode-tab').forEach(t => t.classList.remove('active-explore', 'active-practice', 'active-play'));
  document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active-' + m);
  S.round = 0;
  S.score = 0;
  S.streak = 0;
  S.pCorrect = 0;
  S.pAttempted = 0;
  S.pHistory = [];
  S.roundResults = [];
  if (m === 'practice') newPractice();
  if (m === 'play') S.round = 0;
  render();
}

function setDiff(d) {
  S.diff = d;
  S.partitions = d === 'emergent' ? 2 : (d === 'proficient' ? 4 : 2);
  document.querySelectorAll('.vinculum-diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff' + d.charAt(0).toUpperCase()).classList.add('active');
  S.shaded = new Set();
  S.showCompare = false;
  S.gameOver = false;
  S.roundResults = [];
  if (S.mode === 'practice') { S.pCorrect = 0; S.pAttempted = 0; S.pHistory = []; newPractice(); }
  if (S.mode === 'play') S.round = 0;
  render();
}

function render() {
  const ws = document.getElementById('workspace');
  const sp = document.getElementById('sidePanel');
  if (S.mode === 'explore') renderExplore(ws, sp);
  else if (S.mode === 'practice') renderPractice(ws, sp);
  else renderPlay(ws, sp);
}

/* ============================
   SVG SHAPE BUILDERS
   ============================ */

function buildCircleSVG(parts, shadedSet, interactive, idPrefix, size) {
  idPrefix = idPrefix || 'sec';
  size = size || 200;
  const vb = 200;
  const cx = 100, cy = 100, r = 90;
  let svg = `<svg viewBox="0 0 ${vb} ${vb}" width="${size}" height="${size}">`;

  // Draw sections as pie slices
  for (let i = 0; i < parts; i++) {
    const startAngle = (i * 360 / parts) - 90;
    const endAngle = ((i + 1) * 360 / parts) - 90;
    const startRad = startAngle * Math.PI / 180;
    const endRad = endAngle * Math.PI / 180;
    const x1 = cx + r * Math.cos(startRad);
    const y1 = cy + r * Math.sin(startRad);
    const x2 = cx + r * Math.cos(endRad);
    const y2 = cy + r * Math.sin(endRad);
    const largeArc = (360 / parts) > 180 ? 1 : 0;
    const isShaded = shadedSet.has(i);
    const fillColor = isShaded ? 'var(--cyan,#00d4ff)' : 'var(--card,#1a1f2e)';
    const fillOpacity = isShaded ? '0.55' : '1';
    const onclick = interactive ? ` onclick="toggleSection(${i})" style="cursor:pointer;"` : '';
    const role = interactive ? ' role="button" tabindex="0" aria-label="Section ' + (i+1) + ' of ' + parts + (isShaded ? ', shaded' : ', not shaded') + '"' : '';
    svg += `<path id="${idPrefix}${i}" d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${fillColor}" fill-opacity="${fillOpacity}" stroke="var(--border,#2a3654)" stroke-width="2" class="shape-section${isShaded ? ' shaded' : ''}"${onclick}${role}/>`;
  }

  // Partition lines (dashed)
  for (let i = 0; i < parts; i++) {
    const angle = (i * 360 / parts) - 90;
    const rad = angle * Math.PI / 180;
    const x = cx + r * Math.cos(rad);
    const y = cy + r * Math.sin(rad);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" class="partition-line"/>`;
  }

  // Outer circle
  svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--text,#e0e0e0)" stroke-width="2.5"/>`;
  svg += '</svg>';
  return svg;
}

function buildRectSVG(parts, shadedSet, interactive, idPrefix, size) {
  idPrefix = idPrefix || 'sec';
  size = size || 200;
  const vb = 200;
  const w = 180, h = 140, x0 = 10, y0 = 30;
  let svg = `<svg viewBox="0 0 ${vb} ${vb}" width="${size}" height="${size}">`;

  if (parts === 2) {
    // Two halves: left and right
    const halfW = w / 2;
    for (let i = 0; i < 2; i++) {
      const isShaded = shadedSet.has(i);
      const fillColor = isShaded ? 'var(--cyan,#00d4ff)' : 'var(--card,#1a1f2e)';
      const fillOpacity = isShaded ? '0.55' : '1';
      const onclick = interactive ? ` onclick="toggleSection(${i})" style="cursor:pointer;"` : '';
      const role = interactive ? ' role="button" tabindex="0" aria-label="Section ' + (i+1) + ' of 2' + (isShaded ? ', shaded' : ', not shaded') + '"' : '';
      svg += `<rect id="${idPrefix}${i}" x="${x0 + i * halfW}" y="${y0}" width="${halfW}" height="${h}" fill="${fillColor}" fill-opacity="${fillOpacity}" stroke="var(--border,#2a3654)" stroke-width="2" class="shape-section${isShaded ? ' shaded' : ''}"${onclick}${role}/>`;
    }
    // Partition line
    svg += `<line x1="${x0 + halfW}" y1="${y0}" x2="${x0 + halfW}" y2="${y0 + h}" class="partition-line"/>`;
  } else {
    // Four fourths: 2x2 grid
    const halfW = w / 2, halfH = h / 2;
    const positions = [
      [x0, y0], [x0 + halfW, y0],
      [x0, y0 + halfH], [x0 + halfW, y0 + halfH]
    ];
    for (let i = 0; i < 4; i++) {
      const isShaded = shadedSet.has(i);
      const fillColor = isShaded ? 'var(--cyan,#00d4ff)' : 'var(--card,#1a1f2e)';
      const fillOpacity = isShaded ? '0.55' : '1';
      const onclick = interactive ? ` onclick="toggleSection(${i})" style="cursor:pointer;"` : '';
      const role = interactive ? ' role="button" tabindex="0" aria-label="Section ' + (i+1) + ' of 4' + (isShaded ? ', shaded' : ', not shaded') + '"' : '';
      svg += `<rect id="${idPrefix}${i}" x="${positions[i][0]}" y="${positions[i][1]}" width="${halfW}" height="${halfH}" fill="${fillColor}" fill-opacity="${fillOpacity}" stroke="var(--border,#2a3654)" stroke-width="2" class="shape-section${isShaded ? ' shaded' : ''}"${onclick}${role}/>`;
    }
    // Partition lines
    svg += `<line x1="${x0 + halfW}" y1="${y0}" x2="${x0 + halfW}" y2="${y0 + h}" class="partition-line"/>`;
    svg += `<line x1="${x0}" y1="${y0 + halfH}" x2="${x0 + w}" y2="${y0 + halfH}" class="partition-line"/>`;
  }

  // Outer rectangle
  svg += `<rect x="${x0}" y="${y0}" width="${w}" height="${h}" fill="none" stroke="var(--text,#e0e0e0)" stroke-width="2.5" rx="4"/>`;
  svg += '</svg>';
  return svg;
}

function buildShapeSVG(type, parts, shadedSet, interactive, idPrefix, size) {
  if (type === 'circle') return buildCircleSVG(parts, shadedSet, interactive, idPrefix, size);
  return buildRectSVG(parts, shadedSet, interactive, idPrefix, size);
}

function toggleSection(idx) {
  if (S.shaded.has(idx)) S.shaded.delete(idx);
  else S.shaded.add(idx);
  render();
}

/* == Fraction naming helpers == */
function fractionWord(num, denom) {
  if (num === 0) return '0 ' + (denom === 2 ? 'halves' : 'fourths');
  if (denom === 2) return num === 1 ? '1 half' : num + ' halves';
  if (denom === 4) return num === 1 ? '1 fourth' : num + ' fourths';
  return num + '/' + denom;
}

function fractionSymbol(num, denom) {
  if (num === 0) return '0';
  if (num === 1 && denom === 2) return '\u00BD';
  if (num === 1 && denom === 4) return '\u00BC';
  if (num === 3 && denom === 4) return '\u00BE';
  if (num === 2 && denom === 4) return '\u00BD';
  if (num === 2 && denom === 2) return '1';
  if (num === 4 && denom === 4) return '1';
  return '<sup>' + num + '</sup>\u2044<sub>' + denom + '</sub>';
}

/* == Stars helper for game-over == */
function getStars(score, total) {
  const pct = score / (total * 12);
  if (pct >= 0.9) return 3;
  if (pct >= 0.6) return 2;
  if (pct >= 0.3) return 1;
  return 0;
}

function starsHTML(count) {
  let h = '';
  for (let i = 0; i < 3; i++) {
    h += i < count ? '&#11088;' : '&#9734;';
  }
  return h;
}

function newPractice() {
  const shapes = ['circle', 'rectangle'];
  S.pShape = shapes[rand(0, 1)];

  if (S.diff === 'emergent') {
    S.pPartitions = 2;
  } else if (S.diff === 'proficient') {
    S.pPartitions = rand(0, 1) ? 2 : 4;
  } else {
    S.pPartitions = rand(0, 1) ? 2 : 4;
  }

  const types = [];
  if (S.diff === 'emergent') {
    types.push('shade'); // "Shade one half"
  } else if (S.diff === 'proficient') {
    types.push('shade', 'count', 'yesno');
  } else {
    types.push('explain', 'count', 'yesno');
  }

  S.pType = types[rand(0, types.length - 1)];

  if (S.pType === 'shade') {
    // Target: shade a specific number of sections
    S.pShaded = rand(1, S.pPartitions === 2 ? 1 : 2);
    S.pAnswer = S.pShaded;
    S.shaded = new Set();
  } else if (S.pType === 'count') {
    // Pre-shade some sections, ask "how many are shaded?"
    S.pShaded = rand(1, S.pPartitions);
    const sections = [];
    for (let i = 0; i < S.pPartitions; i++) sections.push(i);
    shuffle(sections);
    S.shaded = new Set(sections.slice(0, S.pShaded));
    S.pAnswer = S.pShaded;
    // MC choices — include the shaded-vs-unshaded distractor
    const choices = new Set([S.pAnswer]);
    const complement = S.pPartitions - S.pShaded;
    if (complement !== S.pShaded && complement >= 0) choices.add(complement);
    while (choices.size < 4) {
      const d = rand(0, S.pPartitions);
      choices.add(d);
    }
    S.pChoices = shuffle(Array.from(choices));
  } else if (S.pType === 'yesno') {
    // "Are these halves?" or "Are these fourths?" — sometimes show unequal
    S.pAnswer = rand(0, 1); // 1 = yes, 0 = no
    S.pChoices = ['Yes', 'No'];
    S.shaded = new Set();
  } else if (S.pType === 'explain') {
    // "Which fraction is shaded?" — MC with words
    S.pShaded = rand(1, S.pPartitions);
    const sections = [];
    for (let i = 0; i < S.pPartitions; i++) sections.push(i);
    shuffle(sections);
    S.shaded = new Set(sections.slice(0, S.pShaded));
    S.pAnswer = fractionWord(S.pShaded, S.pPartitions);
    const choices = new Set([S.pAnswer]);
    // Generate distractors
    const wrongDenoms = [2, 4];
    for (const wd of wrongDenoms) {
      for (let n = 0; n <= wd; n++) {
        const w = fractionWord(n, wd);
        if (w !== S.pAnswer) choices.add(w);
        if (choices.size >= 4) break;
      }
      if (choices.size >= 4) break;
    }
    S.pChoices = shuffle(Array.from(choices).slice(0, 4));
  }
}

/* Unequal partition SVG (for yes/no questions) */
function buildUnequalSVG(type, parts) {
  if (type === 'circle') {
    // Draw a circle with an off-center line
    const cx = 100, cy = 100, r = 90;
    let svg = `<svg viewBox="0 0 200 200" width="200" height="200">`;
    // Two unequal pieces via off-center vertical chord
    const offX = 65;
    // Calculate intersection points of vertical line x=offX with circle
    const dx = offX - cx;
    const dy = Math.sqrt(r * r - dx * dx);
    const topY = cy - dy;
    const botY = cy + dy;
    // Left piece (smaller)
    svg += `<path d="M${offX},${topY.toFixed(2)} A${r},${r} 0 0,0 ${offX},${botY.toFixed(2)} Z" fill="var(--cyan,#00d4ff)" fill-opacity="0.55" stroke="var(--border)" stroke-width="2"/>`;
    // Right piece (larger)
    svg += `<path d="M${offX},${topY.toFixed(2)} A${r},${r} 0 0,1 ${offX},${botY.toFixed(2)} Z" fill="var(--card,#1a1f2e)" stroke="var(--border)" stroke-width="2"/>`;
    svg += `<line x1="${offX}" y1="${topY.toFixed(2)}" x2="${offX}" y2="${botY.toFixed(2)}" class="partition-line"/>`;
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--text,#e0e0e0)" stroke-width="2.5"/>`;
    svg += '</svg>';
    return svg;
  } else {
    // Rectangle with off-center line
    const w = 180, h = 140, x0 = 10, y0 = 30;
    let svg = `<svg viewBox="0 0 200 200" width="200" height="200">`;
    const splitX = x0 + 50; // off-center
    svg += `<rect x="${x0}" y="${y0}" width="${splitX - x0}" height="${h}" fill="var(--cyan,#00d4ff)" fill-opacity="0.55" stroke="var(--border)" stroke-width="2" rx="2"/>`;
    svg += `<rect x="${splitX}" y="${y0}" width="${x0 + w - splitX}" height="${h}" fill="var(--card,#1a1f2e)" stroke="var(--border)" stroke-width="2" rx="2"/>`;
    svg += `<line x1="${splitX}" y1="${y0}" x2="${splitX}" y2="${y0 + h}" class="partition-line"/>`;
    svg += `<rect x="${x0}" y="${y0}" width="${w}" height="${h}" fill="none" stroke="var(--text,#e0e0e0)" stroke-width="2.5" rx="4"/>`;
    svg += '</svg>';
    return svg;
  }
}

/* == Practice Checkers == */
function checkShade() {
  const current = S.shaded.size;
  const target = S.pShaded;
  S.pAttempted++;
  if (current === target) {
    S.pCorrect++;
    S.pHistory.push('correct');
    showFB('Correct! ' + fractionWord(target, S.pPartitions) + ' shaded!', 'correct');
    setTimeout(() => { newPractice(); render(); }, 1500);
  } else if (current === 0) {
    S.pHistory.push('incorrect');
    showFB('Tap sections of the shape to shade them first!', 'try-again');
  } else if (current > target) {
    S.pHistory.push('incorrect');
    showFB('Too many shaded! You need ' + fractionWord(target, S.pPartitions) + '. Tap a section to unshade it.', 'try-again');
  } else {
    S.pHistory.push('incorrect');
    showFB('Not enough! Shade ' + (target - current) + ' more section' + (target - current > 1 ? 's' : '') + '.', 'try-again');
  }
}

function detectCountMisconception(clicked, answer, total) {
  // Check if student counted unshaded instead of shaded
  const complement = total - answer;
  if (clicked === complement && complement !== answer) {
    return MISCONCEPTIONS.shadedVsUnshaded.msg(answer, total);
  }
  // Off-by-one
  if (Math.abs(clicked - answer) === 1) {
    return MISCONCEPTIONS.offByOne.msg(answer, clicked);
  }
  return MISCONCEPTIONS.randomGuess.msg();
}

function checkCount(clicked, idx) {
  const btn = document.getElementById('mc' + idx);
  S.pAttempted++;
  if (clicked === S.pAnswer) {
    S.pCorrect++;
    S.pHistory.push('correct');
    btn.classList.add('correct-flash');
    showFB('Correct! ' + fractionWord(S.pAnswer, S.pPartitions) + ' shaded!', 'correct');
    setTimeout(() => { newPractice(); render(); }, 1500);
  } else {
    S.pHistory.push('incorrect');
    btn.classList.add('incorrect-flash');
    const msg = detectCountMisconception(clicked, S.pAnswer, S.pPartitions);
    showFB(msg, 'try-again');
    setTimeout(() => { btn.classList.remove('incorrect-flash'); }, 400);
  }
}

function checkYesNo(clicked, idx) {
  const btn = document.getElementById('mc' + idx);
  S.pAttempted++;
  if (clicked === S.pAnswer) {
    S.pCorrect++;
    S.pHistory.push('correct');
    btn.classList.add('correct-flash');
    if (S.pAnswer === 1) {
      showFB('Yes! These are equal parts!', 'correct');
    } else {
      showFB('Right! These parts are NOT equal in size.', 'correct');
    }
    setTimeout(() => { newPractice(); render(); }, 1500);
  } else {
    S.pHistory.push('incorrect');
    btn.classList.add('incorrect-flash');
    showFB(MISCONCEPTIONS.congruence.msg(), 'try-again');
    setTimeout(() => { btn.classList.remove('incorrect-flash'); }, 400);
  }
}

function checkExplain(clicked, idx) {
  const btn = document.getElementById('mc' + idx);
  S.pAttempted++;
  if (clicked === S.pAnswer) {
    S.pCorrect++;
    S.pHistory.push('correct');
    btn.classList.add('correct-flash');
    showFB('Correct! ' + S.pAnswer + ' is shaded!', 'correct');
    setTimeout(() => { newPractice(); render(); }, 1500);
  } else {
    S.pHistory.push('incorrect');
    btn.classList.add('incorrect-flash');
    // Check if it is a halves-vs-fourths confusion
    const isHalvesVsFourths = (clicked.includes('half') && S.pAnswer.includes('fourth'))
                           || (clicked.includes('fourth') && S.pAnswer.includes('half'));
    if (isHalvesVsFourths) {
      showFB(MISCONCEPTIONS.halvesVsFourths.msg(), 'try-again');
    } else {
      showFB(MISCONCEPTIONS.randomGuess.msg(), 'try-again');
    }
    setTimeout(() => { btn.classList.remove('incorrect-flash'); }, 400);
  }

function startGame() {
  S.round = 1;
  S.score = 0;
  S.streak = 0;
  S.gameOver = false;
  S.roundResults = [];
  newPlayRound();
}

function newPlayRound() {
  const shapes = ['circle', 'rectangle'];
  S.playShape = shapes[rand(0, 1)];

  if (S.diff === 'emergent') {
    S.playPartitions = 2;
  } else if (S.diff === 'proficient') {
    S.playPartitions = rand(0, 1) ? 2 : 4;
  } else {
    S.playPartitions = rand(0, 1) ? 2 : 4;
  }

  // Question types: 'identify' (how many shaded?) or 'name' (which fraction?)
  const types = S.diff === 'advanced' ? ['name', 'identify'] : ['identify'];
  S.playType = types[rand(0, types.length - 1)];

  // Pre-shade random sections
  const numShaded = rand(1, S.playPartitions);
  const sections = [];
  for (let i = 0; i < S.playPartitions; i++) sections.push(i);
  shuffle(sections);
  S.shaded = new Set(sections.slice(0, numShaded));

  if (S.playType === 'identify') {
    S.playAnswer = numShaded;
    const choices = new Set([numShaded]);
    // Include complement as a deliberate distractor
    const complement = S.playPartitions - numShaded;
    if (complement !== numShaded && complement >= 0) choices.add(complement);
    while (choices.size < 4) {
      choices.add(rand(0, S.playPartitions));
    }
    S.playChoices = shuffle(Array.from(choices));
  } else {
    S.playAnswer = fractionWord(numShaded, S.playPartitions);
    const choices = new Set([S.playAnswer]);
    const denoms = [2, 4];
    for (const d of denoms) {
      for (let n = 0; n <= d; n++) {
        const w = fractionWord(n, d);
        if (w !== S.playAnswer) choices.add(w);
        if (choices.size >= 4) break;
      }
      if (choices.size >= 4) break;
    }
    S.playChoices = shuffle(Array.from(choices).slice(0, 4));
  }
}

function renderPlay(ws, sp) {
  // Game-over screen
  if (S.gameOver) {
    renderGameOver(ws, sp);
    return;
  }

  if (S.round === 0) startGame();

  let h = '';

  // Round progress bar
  h += '<div class="progress-dots">';
  for (let i = 0; i < S.total; i++) {
    if (i < S.roundResults.length) {
      h += `<div class="progress-dot ${S.roundResults[i]}"></div>`;
    } else if (i === S.roundResults.length) {
      h += '<div class="progress-dot current"></div>';
    } else {
      h += '<div class="progress-dot"></div>';
    }
  }
  h += '</div>';

  h += `<div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Round ${S.round} of ${S.total}</div>`;

  const denom = S.playPartitions;
  const denomWord = denom === 2 ? 'halves' : 'fourths';

  if (S.playType === 'identify') {
    h += `<div class="instruction-box highlight-cyan">How many ${denomWord} are shaded?</div>`;
  } else {
    h += `<div class="instruction-box highlight-cyan">Which fraction of the ${S.playShape} is shaded?</div>`;
  }

  h += '<div class="fraction-shape">';
  h += buildShapeSVG(S.playShape, denom, S.shaded, false, 'plsec');
  h += '</div>';

  h += '<div class="mc-grid">';
  S.playChoices.forEach((c, i) => {
    if (S.playType === 'identify') {
      h += `<button class="mc-btn" id="play${i}" onclick="playPick(${c}, ${i})">${c}</button>`;
    } else {
      h += `<button class="mc-btn" id="play${i}" onclick="playPickName('${c.replace(/'/g, "\\'")}', ${i})">${c}</button>`;
    }
  });
  h += '</div>';

  ws.innerHTML = h;

  // Side panel with score
  sp.innerHTML = `
    <div class="score-display"><div class="score-value">${S.score}</div><div class="score-label">Score</div></div>
    <div class="score-display" style="background:transparent;padding:8px;">
      <div style="font-size:18px;font-weight:700;color:var(--yellow);">&#128293; ${S.streak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.streak * 20, 100)}%;"></div></div>
    </div>
    <div class="panel-section"><div class="panel-title">Best Streak</div>
    <div class="panel-text" style="font-size:24px;font-weight:800;color:var(--purple);">&#127942; ${S.best}</div></div>
    <div class="panel-section"><div class="panel-title">Scoring</div>
    <div class="panel-text" style="font-size:12px;">
      <div style="margin-bottom:4px;"><strong style="color:var(--green);">+10</strong> base points per correct answer</div>
      <div style="margin-bottom:4px;"><strong style="color:var(--yellow);">+streak x2</strong> bonus for consecutive correct</div>
      <div><strong style="color:var(--pink);">0</strong> points for wrong answers</div>
    </div></div>
    <div class="panel-section"><div class="panel-title">Tip</div>
    <div class="panel-text">Count the total equal parts, then count the shaded parts. That tells you the fraction!</div></div>`;
}

/* == Game-over summary screen == */
function renderGameOver(ws, sp) {
  const correctCount = S.roundResults.filter(r => r === 'correct').length;
  const stars = getStars(S.score, S.total);
  let h = '<div class="game-over">';
  h += '<div class="game-over-title">Game Over!</div>';
  h += `<div class="game-over-stars">${starsHTML(stars)}</div>`;
  h += `<div class="game-over-score">${S.score}</div>`;
  h += '<div class="score-label">POINTS</div>';
  h += `<div class="game-over-stat">${correctCount} of ${S.total} correct</div>`;
  h += `<div class="game-over-stat">Best streak: ${S.best}</div>`;

  // Round results review
  h += '<div class="progress-dots" style="margin-top:16px;">';
  S.roundResults.forEach((r, i) => {
    h += `<div class="progress-dot ${r}" title="Round ${i+1}: ${r}" style="width:14px;height:14px;"></div>`;
  });
  h += '</div>';

  // Encouragement message
  if (stars === 3) {
    h += '<div class="instruction-box highlight-green" style="margin-top:16px;">Amazing! You are a fraction expert!</div>';
  } else if (stars === 2) {
    h += '<div class="instruction-box highlight-cyan" style="margin-top:16px;">Great job! Keep practicing to get 3 stars!</div>';
  } else if (stars === 1) {
    h += '<div class="instruction-box" style="margin-top:16px;">Good try! Practice more with Explore mode.</div>';
  } else {
    h += '<div class="instruction-box highlight-pink" style="margin-top:16px;">Keep learning! Try Explore mode first to build your skills.</div>';
  }

  h += '<div class="controls" style="margin-top:16px;">';
  h += `<button class="ctrl-btn primary" onclick="S.gameOver=false;S.round=0;render();">&#9654; Play Again</button>`;
  h += `<button class="ctrl-btn" onclick="setMode('explore');">&#128065; Explore</button>`;
  h += `<button class="ctrl-btn" onclick="setMode('practice');">&#9998; Practice</button>`;
  h += '</div>';
  h += '</div>';

  ws.innerHTML = h;

  // Side panel summary
  let sp_h = '';
  sp_h += `<div class="score-display"><div class="score-value">${S.score}</div><div class="score-label">Final Score</div></div>`;
  sp_h += `<div class="panel-section"><div class="panel-title">Stats</div>
    <div class="panel-text">
      <div style="margin-bottom:4px;">Correct: <strong style="color:var(--green);">${correctCount}</strong></div>
      <div style="margin-bottom:4px;">Incorrect: <strong style="color:var(--pink);">${S.total - correctCount}</strong></div>
      <div style="margin-bottom:4px;">Best streak: <strong style="color:var(--yellow);">${S.best}</strong></div>
      <div>Stars: ${starsHTML(stars)}</div>
    </div></div>`;

  sp_h += `<div class="panel-section"><div class="panel-title">What to Work On</div>
    <div class="panel-text" style="font-size:12px;">`;
  if (correctCount < 5) {
    sp_h += 'Try the Explore tab to build your understanding of halves and fourths before playing again.';
  } else if (correctCount < 8) {
    sp_h += 'Good work! Use Practice mode to strengthen your fraction naming skills.';
  } else {
    sp_h += 'Excellent! Try a harder difficulty level or help a friend learn about fractions!';
  }
  sp_h += '</div></div>';

  sp.innerHTML = sp_h;
}

function advanceRound() {
  if (S.round >= S.total) {
    S.gameOver = true;
    render();
    return;
  }
  S.round++;
  newPlayRound();
  render();
}

function playPick(clicked, idx) {
  const btn = document.getElementById('play' + idx);

  if (clicked === S.playAnswer) {
    S.roundResults.push('correct');
    btn.classList.add('correct-flash');
    S.score += 10 + S.streak * 2;
    S.streak++;
    if (S.streak > S.best) S.best = S.streak;
    showFB('Correct!', 'correct');
  } else {
    S.roundResults.push('incorrect');
    btn.classList.add('incorrect-flash');
    S.streak = 0;
    // Targeted misconception detection
    const complement = S.playPartitions - S.playAnswer;
    if (clicked === complement && complement !== S.playAnswer) {
      showFB(MISCONCEPTIONS.shadedVsUnshaded.msg(S.playAnswer, S.playPartitions), 'incorrect');
    } else if (Math.abs(clicked - S.playAnswer) === 1) {
      showFB(MISCONCEPTIONS.offByOne.msg(S.playAnswer, clicked), 'incorrect');
    } else {
      showFB(MISCONCEPTIONS.randomGuess.msg(), 'incorrect');
    }
  }

  setTimeout(() => { advanceRound(); }, 1200);
}

function playPickName(clicked, idx) {
  const btn = document.getElementById('play' + idx);

  if (clicked === S.playAnswer) {
    S.roundResults.push('correct');
    btn.classList.add('correct-flash');
    S.score += 10 + S.streak * 2;
    S.streak++;
    if (S.streak > S.best) S.best = S.streak;
    showFB('Correct! ' + clicked + '!', 'correct');
  } else {
    S.roundResults.push('incorrect');
    btn.classList.add('incorrect-flash');
    S.streak = 0;
    // Targeted misconception detection
    const isHalvesVsFourths = (clicked.includes('half') && S.playAnswer.includes('fourth'))
                           || (clicked.includes('fourth') && S.playAnswer.includes('half'));
    if (isHalvesVsFourths) {
      showFB(MISCONCEPTIONS.halvesVsFourths.msg(), 'incorrect');
    } else {
      showFB(MISCONCEPTIONS.randomGuess.msg(), 'incorrect');
    }
  }

  setTimeout(() => { advanceRound(); }, 1200);
}

/* == Init == */
render();
</script>
