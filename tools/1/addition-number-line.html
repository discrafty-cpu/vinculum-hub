<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINCULUM — Addition Number Line</title>
<link rel="stylesheet" href="../../vinculum-core.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
/* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}























.main{flex:1;display:flex;overflow:hidden;}
.workspace{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;}
.side-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);padding:20px;overflow-y:auto;flex-shrink:0;}
.panel-section{margin-bottom:20px;}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
.panel-text{font-size:13px;color:var(--text2);line-height:1.6;}

/* ── Equation Display ── */
.equation{display:flex;align-items:center;gap:12px;font-size:40px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.eq-num{padding:8px 16px;border-radius:12px;min-width:60px;text-align:center;}
.eq-a{background:rgba(0,212,255,0.1);color:var(--cyan);}
.eq-op{color:var(--text2);}
.eq-b{background:rgba(255,59,139,0.1);color:var(--pink);}
.eq-eq{color:var(--text2);}
.eq-result{background:rgba(0,230,118,0.1);color:var(--green);min-width:60px;border:2px dashed rgba(0,230,118,0.3);}
.eq-result.revealed{border-style:solid;}

/* ── Number Line (all-in-one SVG) ── */
.nl-svg-wrap{width:100%;max-width:850px;}
.nl-svg-wrap svg{width:100%;height:auto;display:block;}

/* ── Input controls ── */
.input-row{display:flex;gap:12px;align-items:center;}
.num-input{width:80px;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;transition:border-color 0.2s;}
.num-input:focus{border-color:var(--cyan);}
.op-select{padding:10px 16px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;cursor:pointer;}

.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{padding:10px 20px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.ctrl-btn:hover{background:var(--card2);color:var(--text);}
.ctrl-btn.primary{background:var(--grad);color:var(--bg);border-color:transparent;}

.answer-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.answer-btn{width:64px;height:64px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.answer-btn:hover{border-color:var(--cyan);transform:scale(1.08);}
.answer-btn.correct-flash{border-color:var(--green);background:rgba(0,230,118,0.15);color:var(--green);}
.answer-btn.incorrect-flash{border-color:var(--pink);background:rgba(255,59,139,0.15);color:var(--pink);}

.score-display{text-align:center;padding:16px;background:var(--card);border-radius:12px;margin-bottom:12px;}
.score-value{font-size:36px;font-weight:900;font-family:'JetBrains Mono',monospace;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.streak-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:8px;}
.streak-fill{height:100%;background:var(--grad);border-radius:3px;transition:width 0.3s;}

.instruction-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;font-size:15px;color:var(--text2);font-weight:500;max-width:700px;transition:all 0.3s;}
.instruction-box.highlight-cyan{border-color:var(--cyan);color:var(--cyan);}
.instruction-box.highlight-pink{border-color:var(--pink);color:var(--pink);}
.instruction-box.highlight-green{border-color:var(--green);color:var(--green);}

.feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);padding:24px 48px;border-radius:20px;font-size:28px;font-weight:800;z-index:200;pointer-events:none;transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.3s;opacity:0;}
.feedback.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
.feedback.correct{background:rgba(0,230,118,0.15);color:var(--green);border:2px solid var(--green);}
.feedback.incorrect{background:rgba(255,59,139,0.15);color:var(--pink);border:2px solid var(--pink);}
.feedback.try-again{background:rgba(255,193,7,0.15);color:var(--yellow);border:2px solid var(--yellow);}

/* ── Tick hover/click styling (in SVG via JS) ── */
@keyframes drawIn { from { opacity:0; } to { opacity:1; } }
@keyframes pulseGlow { 0%,100%{filter:drop-shadow(0 0 4px currentColor);} 50%{filter:drop-shadow(0 0 12px currentColor);} }
@keyframes stepPulse { 0%,100%{ r:10; opacity:0.7; } 50%{ r:14; opacity:1; } }
@keyframes stepRipple { 0%{ r:8; opacity:0.6; } 100%{ r:24; opacity:0; } }
.anim { opacity:0; }

::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="vinculum-header">
  <div class="vinculum-header-left">
    <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
    <div class="vinculum-header-title"><span>VINCULUM</span> Addition Number Line</div>
    <span class="vinculum-header-badge">1.OA</span>
  </div>
  <div class="vinculum-std-tags">
    <span class="vinculum-std-tag">1.OA.1</span>
    <span class="vinculum-std-tag">1.OA.5</span>
    <span class="vinculum-std-tag">1.OA.6</span>
    <span class="vinculum-std-tag">MN 1.2.2.1</span>
  </div>
</div>

<div class="vinculum-mode-tabs">
  <button class="vinculum-mode-tab" id="tabExplore" onclick="setMode('explore')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore</button>
  <button class="vinculum-mode-tab" id="tabPractice" onclick="setMode('practice')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button>
  <button class="vinculum-mode-tab" id="tabPlay" onclick="setMode('play')"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button>
  <div class="vinculum-diff-selector">
    <span class="vinculum-diff-label">Level</span>
    <button class="vinculum-diff-btn" id="diffE" onclick="setDiff('emergent')">Within 10</button>
    <button class="vinculum-diff-btn" id="diffP" onclick="setDiff('proficient')">Within 20</button>
    <button class="vinculum-diff-btn" id="diffA" onclick="setDiff('advanced')">Missing Addend</button>
  </div>
</div>

<div class="main">
  <div class="workspace" role="main" id="workspace"></div>
  <div class="side-panel" id="sidePanel"></div>
</div>
<div class="feedback" id="feedback"></div>

    <script src="../../vinculum-input.js"></script>
    <script>
/* ════════════════════════════════════════════════════════════
   VINCULUM — Addition Number Line — Interactive Click-to-Place
   ════════════════════════════════════════════════════════════ */

let S = {
  mode:'explore', diff:'emergent', maxNL:10,
  // Explore inputs
  a:3, b:4, op:'+', eTotal:7,
  // Interactive state machine
  // phase: 'ready' | 'click1' | 'stepping' | 'click2' | 'answer' | 'done'
  phase:'ready',
  clickedA: null, // tick value student clicked for first jump
  clickedR: null, // tick value student clicked for second jump (result)
  stepCurrent: null, // current position during stepping
  stepsCompleted: [], // ticks already tapped during step-through
  // Practice
  pA:0, pB:0, pOp:'+', pAnswer:0, pMissing:'result',
  // Play
  score:0, streak:0, best:0, round:0, total:10,
  playA:0, playB:0, playOp:'+', playAnswer:0, playChoices:[]
};

// ── SVG layout constants ──
const W = 800, PAD_L = 40, PAD_R = 40, NL_Y = 180, ARROW1_Y = 130, ARROW2_Y = 75, SVG_H = 230;
const NL_W = W - PAD_L - PAD_R;
function nx(n, max){ return PAD_L + (n / max) * NL_W; }

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function setMode(m){
  S.mode=m; S.phase='ready'; S.clickedA=null; S.clickedR=null; S.stepCurrent=null; S.stepsCompleted=[];
  document.querySelectorAll('.vinculum-mode-tab').forEach(t=>t.className='mode-tab');
  document.getElementById('tab'+m.charAt(0).toUpperCase()+m.slice(1)).className='mode-tab active-'+m;
  S.round=0; S.score=0; S.streak=0;
  if(m==='practice') newPractice();
  render();
}
function setDiff(d){
  S.diff=d; S.maxNL=d==='emergent'?10:20;
  document.querySelectorAll('.vinculum-diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('diff'+d.charAt(0).toUpperCase()).classList.add('active');
  S.phase='ready'; S.clickedA=null; S.clickedR=null; S.stepCurrent=null; S.stepsCompleted=[];
  if(S.mode==='practice') newPractice();
  if(S.mode==='play'){S.round=0;}
  render();
}

function render(){
  const ws=document.getElementById('workspace'), sp=document.getElementById('sidePanel');
  if(S.mode==='explore') renderExplore(ws,sp);
  else if(S.mode==='practice') renderPractice(ws,sp);
  else renderPlay(ws,sp);
}

/* ══════════════════════════════════════════
   INTERACTIVE NUMBER LINE SVG BUILDER
   ══════════════════════════════════════════ */

function buildInteractiveNL(a, b, op, max, phase, clickedA, clickedR, clickable, missing){
  const result = op==='+'? a+b : a-b;

  let html = `<div class="nl-svg-wrap">`;
  html += `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${SVG_H}" style="overflow:visible;" id="nlSVG">`;

  // ── Arrowhead markers ──
  html += `<defs>
    <marker id="ahCyan" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#00d4ff"/>
    </marker>
    <marker id="ahPink" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#ff3b8b"/>
    </marker>
    <marker id="ahGreen" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#00e676"/>
    </marker>
  </defs>`;

  // ── Number line base ──
  html += `<line x1="${PAD_L}" y1="${NL_Y}" x2="${PAD_L + NL_W}" y2="${NL_Y}" stroke="#2a3654" stroke-width="3" stroke-linecap="round"/>`;

  // ── Ticks and labels ──
  for(let i = 0; i <= max; i++){
    const x = nx(i, max);
    const isHighlight1 = (clickedA === i);
    const isHighlight2 = (clickedR === i);
    const tickColor = isHighlight2 ? '#00e676' : isHighlight1 ? '#00d4ff' : '#2a3654';
    const labelColor = isHighlight2 ? '#00e676' : isHighlight1 ? '#00d4ff' : '#5a6b8f';
    const labelSize = (isHighlight1 || isHighlight2) ? 16 : 13;
    const labelWeight = (isHighlight1 || isHighlight2) ? 900 : 600;
    const tickW = (isHighlight1 || isHighlight2) ? 3 : 2;
    const tickH = (isHighlight1 || isHighlight2) ? 12 : 8;

    html += `<line x1="${x}" y1="${NL_Y - tickH}" x2="${x}" y2="${NL_Y + tickH}" stroke="${tickColor}" stroke-width="${tickW}"/>`;
    html += `<text x="${x}" y="${NL_Y + 28}" text-anchor="middle" fill="${labelColor}" font-size="${labelSize}" font-weight="${labelWeight}" font-family="JetBrains Mono, monospace">${i}</text>`;
  }

  // ── Zero dot (always) ──
  html += `<circle cx="${nx(0, max)}" cy="${NL_Y}" r="5" fill="#8b9cc0"/>`;

  // ── STEP-THROUGH DOTS (show completed steps + next step glow) ──
  const stepsCompleted = S.stepsCompleted || [];
  const stepCurrent = S.stepCurrent;

  // Draw completed step dots (small pink filled dots along the path)
  if(stepsCompleted.length > 0 && clickedA !== null){
    stepsCompleted.forEach((tick, idx) => {
      const sx = nx(tick, max);
      html += `<circle cx="${sx}" cy="${NL_Y}" r="6" fill="#ff3b8b" stroke="#0a0e1a" stroke-width="1.5" opacity="0.9">
        <animate attributeName="opacity" values="0;0.9" dur="0.2s" fill="freeze"/>
      </circle>`;
      // Small hop arc from previous position to this tick
      const prevTick = idx === 0 ? clickedA : stepsCompleted[idx - 1];
      const px = nx(prevTick, max);
      const arcMidX = (px + sx) / 2;
      const arcY = NL_Y - 28;
      html += `<path d="M${px},${NL_Y - 6} Q${arcMidX},${arcY} ${sx},${NL_Y - 6}"
        fill="none" stroke="#ff3b8b" stroke-width="2" stroke-dasharray="4,3" opacity="0.5">
        <animate attributeName="opacity" values="0;0.5" dur="0.3s" fill="freeze"/>
      </path>`;
    });
  }

  // ── CLICKABLE TICK ZONES (invisible wider hit areas) ──
  if(clickable){
    for(let i = 0; i <= max; i++){
      const x = nx(i, max);
      // Determine expected click based on phase
      let isExpected = false;
      let isNextStep = false;
      if(phase === 'click1' && i === a) isExpected = true;
      if(phase === 'click2' && i === result) isExpected = true;
      if(phase === 'stepping') {
        // During stepping, highlight the NEXT tick to tap
        const nextTick = S.stepCurrent !== null ? S.stepCurrent + (op === '+' ? 1 : -1) : (clickedA + (op === '+' ? 1 : -1));
        if(i === nextTick) isNextStep = true;
        // Also show upcoming dots as faint guides
        const startFrom = clickedA;
        const endAt = result;
        const direction = op === '+' ? 1 : -1;
        const isOnPath = op === '+' ? (i > clickedA && i <= result) : (i < clickedA && i >= result);
        const isAlreadyDone = stepsCompleted.includes(i);
        if(isOnPath && !isAlreadyDone && !isNextStep){
          // Faint upcoming dot
          html += `<circle cx="${x}" cy="${NL_Y}" r="6" fill="none" stroke="#ff3b8b" stroke-width="1.5" opacity="0.2"/>`;
        }
      }

      // Glow ring for expected click1/click2
      if(isExpected){
        const glowColor = phase === 'click1' ? '#00d4ff' : '#ff3b8b';
        html += `<circle cx="${x}" cy="${NL_Y}" r="14" fill="none" stroke="${glowColor}" stroke-width="2" opacity="0.5" style="animation: pulseGlow 1.5s ease-in-out infinite; color:${glowColor};">
          <animate attributeName="r" values="12;16;12" dur="1.5s" repeatCount="indefinite"/>
        </circle>`;
      }

      // Glowing pulsing dot for next step during stepping phase
      if(isNextStep){
        // Ripple ring
        html += `<circle cx="${x}" cy="${NL_Y}" r="8" fill="none" stroke="#ff3b8b" stroke-width="2" opacity="0">
          <animate attributeName="r" values="8;24" dur="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0" dur="1.5s" repeatCount="indefinite"/>
        </circle>`;
        // Main glowing dot
        html += `<circle cx="${x}" cy="${NL_Y}" fill="#ff3b8b" stroke="#fff" stroke-width="2" opacity="0.8">
          <animate attributeName="r" values="8;11;8" dur="1s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
        </circle>`;
      }

      // Invisible click zone
      html += `<rect x="${x-18}" y="${NL_Y-25}" width="36" height="50" fill="transparent" style="cursor:pointer;" onclick="tickClick(${i})"/>`;
    }
  }

  // ── ARROW 1: BLUE — 0 → clickedA ──
  if(clickedA !== null && clickedA > 0){
    const x0 = nx(0, max);
    const xA = nx(clickedA, max);
    const midX = (x0 + xA) / 2;

    // Dashed connector from arrow to tick at start
    html += `<line x1="${x0}" y1="${ARROW1_Y}" x2="${x0}" y2="${NL_Y - 10}"
      stroke="#2a3654" stroke-width="1.5" stroke-dasharray="4,3"
      class="anim" style="animation: drawIn 0.2s 0s forwards;"/>`;

    // Arrow shaft 0→A
    html += `<line x1="${x0}" y1="${ARROW1_Y}" x2="${xA - 6}" y2="${ARROW1_Y}"
      stroke="#00d4ff" stroke-width="5" stroke-linecap="round" marker-end="url(#ahCyan)"
      class="anim" style="animation: drawIn 0.4s 0.1s forwards;"/>`;

    // Label pill
    html += `<rect x="${midX - 18}" y="${ARROW1_Y - 26}" width="36" height="22" rx="8"
      fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5"
      class="anim" style="animation: drawIn 0.3s 0.35s forwards;"/>`;
    html += `<text x="${midX}" y="${ARROW1_Y - 11}" text-anchor="middle" fill="#00d4ff"
      font-size="14" font-weight="800" font-family="JetBrains Mono, monospace"
      class="anim" style="animation: drawIn 0.3s 0.35s forwards;">${clickedA}</text>`;

    // Dashed connector at A
    html += `<line x1="${xA}" y1="${ARROW1_Y}" x2="${xA}" y2="${NL_Y - 10}"
      stroke="#2a3654" stroke-width="1.5" stroke-dasharray="4,3"
      class="anim" style="animation: drawIn 0.2s 0.25s forwards;"/>`;

    // Blue dot at A on number line
    html += `<circle cx="${xA}" cy="${NL_Y}" r="7" fill="#00d4ff" stroke="#0a0e1a" stroke-width="2"
      class="anim" style="animation: drawIn 0.3s 0.3s forwards;"/>`;
  }

  // ── ARROW 2: PINK — clickedA → clickedR ──
  if(clickedA !== null && clickedR !== null){
    const xA = nx(clickedA, max);
    const xR = nx(clickedR, max);
    const midX2 = (xA + xR) / 2;
    const isForward = op === '+';
    const labelText = (missing === 'addend') ? (isForward ? '+?' : '–?') : (isForward ? `+${b}` : `–${b}`);

    // Dashed connector from arrow1 up to arrow2 at A
    html += `<line x1="${xA}" y1="${ARROW1_Y}" x2="${xA}" y2="${ARROW2_Y}"
      stroke="#2a3654" stroke-width="1.5" stroke-dasharray="4,3"
      class="anim" style="animation: drawIn 0.2s 0.5s forwards;"/>`;

    // Arrow shaft A→R
    const arrowEndX = isForward ? xR - 6 : xR + 6;
    html += `<line x1="${xA}" y1="${ARROW2_Y}" x2="${arrowEndX}" y2="${ARROW2_Y}"
      stroke="#ff3b8b" stroke-width="5" stroke-linecap="round" marker-end="url(#ahPink)"
      class="anim" style="animation: drawIn 0.4s 0.6s forwards;"/>`;

    // Label pill
    const pillW = labelText.length > 2 ? 44 : 36;
    html += `<rect x="${midX2 - pillW/2}" y="${ARROW2_Y - 26}" width="${pillW}" height="22" rx="8"
      fill="rgba(255,59,139,0.15)" stroke="#ff3b8b" stroke-width="1.5"
      class="anim" style="animation: drawIn 0.3s 0.8s forwards;"/>`;
    html += `<text x="${midX2}" y="${ARROW2_Y - 11}" text-anchor="middle" fill="#ff3b8b"
      font-size="14" font-weight="800" font-family="JetBrains Mono, monospace"
      class="anim" style="animation: drawIn 0.3s 0.8s forwards;">${labelText}</text>`;

    // Dashed connector from result down to number line
    html += `<line x1="${xR}" y1="${ARROW2_Y}" x2="${xR}" y2="${NL_Y - 10}"
      stroke="#00e676" stroke-width="2" stroke-dasharray="4,3"
      class="anim" style="animation: drawIn 0.2s 0.9s forwards;"/>`;

    // Green result dot on number line
    html += `<circle cx="${xR}" cy="${NL_Y}" r="8" fill="#00e676" stroke="#0a0e1a" stroke-width="2"
      class="anim" style="animation: drawIn 0.3s 1.0s forwards;"/>`;

    // Result label below
    const resLabel = `= ${clickedR}`;
    html += `<rect x="${xR - 24}" y="${NL_Y + 36}" width="48" height="22" rx="8"
      fill="rgba(0,230,118,0.15)" stroke="#00e676" stroke-width="1.5"
      class="anim" style="animation: drawIn 0.3s 1.1s forwards;"/>`;
    html += `<text x="${xR}" y="${NL_Y + 51}" text-anchor="middle" fill="#00e676"
      font-size="14" font-weight="900" font-family="JetBrains Mono, monospace"
      class="anim" style="animation: drawIn 0.3s 1.1s forwards;">${resLabel}</text>`;
  }

  html += '</svg></div>';
  return html;
}


/* ══════════════════════════════════════════
   TICK CLICK HANDLER (shared by Explore & Practice)
   ══════════════════════════════════════════ */

function tickClick(n){
  if(S.mode === 'explore') tickClickExplore(n);
  else if(S.mode === 'practice') tickClickPractice(n);
}

function tickClickExplore(n){
  const isMissingAddend = (S.diff === 'advanced');

  if(isMissingAddend){
    // Missing addend mode: click start (a), then step to total (eTotal)
    const target2 = S.eTotal;
    if(S.phase === 'click1'){
      if(n === S.a){
        S.clickedA = n;
        S.stepsCompleted = [];
        S.stepCurrent = n;
        S.phase = 'stepping';
        render();
      } else {
        showFB(`Click on ${S.a}!`, 'try-again');
      }
    } else if(S.phase === 'stepping'){
      const nextExpected = S.stepCurrent + 1; // always forward for missing addend
      if(n === nextExpected){
        S.stepsCompleted.push(n);
        S.stepCurrent = n;
        if(n === target2){
          // All steps done
          S.clickedR = n;
          S.phase = 'answer';
        }
        render();
      } else {
        showFB(`Tap ${nextExpected} — one step at a time!`, 'try-again');
      }
    }
  } else {
    // Standard mode: click start (a), then step to result
    const result = S.op==='+'? S.a+S.b : S.a-S.b;
    if(S.phase === 'click1'){
      if(n === S.a){
        S.clickedA = n;
        S.stepsCompleted = [];
        S.stepCurrent = n;
        S.phase = 'stepping';
        render();
      } else {
        showFB(`Click on ${S.a}!`, 'try-again');
      }
    } else if(S.phase === 'stepping'){
      const direction = S.op === '+' ? 1 : -1;
      const nextExpected = S.stepCurrent + direction;
      if(n === nextExpected){
        S.stepsCompleted.push(n);
        S.stepCurrent = n;
        if(n === result){
          // All steps done — complete the arrow
          S.clickedR = n;
          S.phase = 'done';
        }
        render();
      } else {
        const word = S.op === '+' ? 'forward' : 'backward';
        showFB(`Tap ${nextExpected} — count ${word} one step!`, 'try-again');
      }
    }
  }
}

function tickClickPractice(n){
  const correctResult = S.pOp==='+'? S.pA+S.pB : S.pA-S.pB;

  if(S.phase === 'click1'){
    if(n === S.pA){
      S.clickedA = n;
      S.stepsCompleted = [];
      S.stepCurrent = n;
      S.phase = 'stepping';
      render();
    } else {
      showFB(`Click on ${S.pA} first!`, 'try-again');
    }
  } else if(S.phase === 'stepping'){
    const direction = S.pOp === '+' ? 1 : -1;
    const nextExpected = S.stepCurrent + direction;
    if(n === nextExpected){
      S.stepsCompleted.push(n);
      S.stepCurrent = n;
      if(n === correctResult){
        S.clickedR = n;
        S.phase = 'answer';
        render();
        setTimeout(()=>{
          const inp = document.getElementById('practiceAnswer');
          if(inp) inp.focus();
        }, 200);
      } else {
        render();
      }
    } else {
      const word = S.pOp === '+' ? 'forward' : 'backward';
      showFB(`Tap ${nextExpected} — count ${word} one step!`, 'try-again');
    }
  }
}


/* ══════════════════════════════════════════
   EXPLORE MODE
   ══════════════════════════════════════════ */

function startExplore(){
  // Safety: prevent negative results in K-2
  if(S.op==='-' && S.b > S.a){ S.b = S.a; }
  const result = S.op==='+'? S.a+S.b : S.a-S.b;
  if(result < 0){ showFB('Result can\'t be negative!','try-again'); return; }
  if(result > S.maxNL){ S.maxNL = Math.min(result+2, 20); }
  S.phase = 'click1';
  S.clickedA = null;
  S.clickedR = null;
  S.stepCurrent = null;
  S.stepsCompleted = [];
  render();
}

function checkExploreAddend(){
  const input = document.getElementById('exploreAnswer');
  const val = parseInt(input.value);
  const missingVal = S.eTotal - S.a;
  if(isNaN(val)){ showFB('Type a number!','try-again'); return; }
  if(val === missingVal){
    showFB(`✓ Correct! ${S.a} + ${missingVal} = ${S.eTotal}`,'correct');
    S.phase = 'done';
    render();
  } else {
    showFB('Not quite — count the jumps again!','incorrect');
    input.value = '';
    input.focus();
  }
}

function renderExplore(ws, sp){
  const isMissingAddend = (S.diff === 'advanced');
  const res = S.op==='+'? S.a+S.b : S.a-S.b;
  let h = '';

  if(isMissingAddend){
    // ── MISSING ADDEND EXPLORE ──
    // Shows: a + ? = total  — student discovers the missing number
    if(!S.eTotal) S.eTotal = S.a + S.b; // store the total
    const missingVal = S.eTotal - S.a;

    // Instruction banner
    if(S.phase === 'ready'){
      h += `<div class="instruction-box" style="border-color:var(--pink);">Set the <strong>start</strong> and <strong>total</strong>, then click <strong>Start</strong> to find the missing addend!</div>`;
    } else if(S.phase === 'click1'){
      h += `<div class="instruction-box highlight-cyan">Click on <strong>${S.a}</strong> — that's your starting number</div>`;
    } else if(S.phase === 'stepping'){
      const stepsLeft = S.eTotal - S.stepCurrent;
      const nextTick = S.stepCurrent + 1;
      h += `<div class="instruction-box highlight-pink">Tap the glowing dot on <strong>${nextTick}</strong> — ${stepsLeft} step${stepsLeft!==1?'s':''} to go!</div>`;
    } else if(S.phase === 'answer'){
      h += `<div class="instruction-box highlight-green">Count the jumps from ${S.a} to ${S.eTotal}. How many is that?</div>`;
    } else if(S.phase === 'done'){
      h += `<div class="instruction-box highlight-green">${S.a} + <strong style="color:var(--pink);">${missingVal}</strong> = ${S.eTotal} — The missing addend is ${missingVal}!</div>`;
    }

    // Equation display: a + ? = total
    h += '<div class="equation">';
    h += `<div class="eq-num eq-a">${S.a}</div>`;
    h += `<div class="eq-op">+</div>`;
    if(S.phase === 'done'){
      h += `<div class="eq-num eq-b revealed" style="border:2px solid var(--pink);">${missingVal}</div>`;
    } else {
      h += `<div class="eq-num eq-b" style="border:2px dashed var(--pink);color:var(--pink);font-size:32px;">?</div>`;
    }
    h += `<div class="eq-eq">=</div>`;
    h += `<div class="eq-num eq-result revealed">${S.eTotal}</div>`;
    h += '</div>';

    // Number line — use missingVal as b for the arrow
    const clickable = (S.phase === 'click1' || S.phase === 'click2' || S.phase === 'stepping');
    h += buildInteractiveNL(S.a, missingVal, '+', S.maxNL, S.phase, S.clickedA, S.clickedR, clickable, 'addend');

    // Controls
    if(S.phase === 'ready'){
      h += '<div class="input-row">';
      h += `<input type="number" class="num-input" id="inputA" value="${S.a}" min="0" max="${S.eTotal-1}" onchange="S.a=Math.max(0,Math.min(S.eTotal-1,+this.value));render();" style="border-color:var(--cyan);">`;
      h += `<span style="color:var(--pink);font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;">+ ? =</span>`;
      h += `<input type="number" class="num-input" id="inputTotal" value="${S.eTotal}" min="${S.a+1}" max="${S.maxNL}" onchange="S.eTotal=Math.max(S.a+1,Math.min(${S.maxNL},+this.value));render();" style="border-color:var(--green);">`;
      h += '</div>';
      h += `<div style="font-size:12px;color:var(--text2);text-align:center;margin-top:4px;">${S.a} + <span style="color:var(--pink);">?</span> = ${S.eTotal} — What goes in the blank?</div>`;
      h += '<div class="controls">';
      h += `<button class="ctrl-btn primary" onclick="S.b=S.eTotal-S.a;startExplore();">Start →</button>`;
      h += `<button class="ctrl-btn" onclick="S.a=rand(1,${S.maxNL>10?8:4});S.eTotal=S.a+rand(1,${S.maxNL>10?10:5});if(S.eTotal>S.maxNL)S.eTotal=S.maxNL;S.b=S.eTotal-S.a;render();">🎲 Random</button>`;
      h += '</div>';
    } else if(S.phase === 'answer'){
      h += `<div class="answer-row" style="display:flex;gap:12px;justify-content:center;align-items:center;margin-top:12px;">`;
      h += `<span style="color:var(--text2);font-size:14px;">The missing addend is:</span>`;
      h += `<input type="number" class="num-input" id="exploreAnswer" min="0" max="${S.maxNL}" style="width:80px;border-color:var(--pink);" onkeydown="if(event.key==='Enter')checkExploreAddend();">`;
      h += `<button class="ctrl-btn primary" onclick="checkExploreAddend()">Check</button>`;
      h += `</div>`;
    } else if(S.phase === 'done'){
      h += '<div class="controls">';
      h += `<button class="ctrl-btn primary" onclick="S.a=rand(1,${S.maxNL>10?8:4});S.eTotal=S.a+rand(1,${S.maxNL>10?10:5});if(S.eTotal>S.maxNL)S.eTotal=S.maxNL;S.b=S.eTotal-S.a;S.phase='ready';S.clickedA=null;S.clickedR=null;render();">🎲 New Problem</button>`;
      h += `<button class="ctrl-btn" onclick="S.phase='ready';S.clickedA=null;S.clickedR=null;render();">↺ Reset</button>`;
      h += '</div>';
    }

  } else {
    // ── STANDARD EXPLORE (Within 10 / Within 20) ──

    // Instruction banner
    if(S.phase === 'ready'){
      h += `<div class="instruction-box">Set your numbers, then click <strong>Start</strong> to build the jumps!</div>`;
    } else if(S.phase === 'click1'){
      h += `<div class="instruction-box highlight-cyan">Click on <strong>${S.a}</strong> on the number line to make the first jump</div>`;
    } else if(S.phase === 'stepping'){
      const direction = S.op === '+' ? 1 : -1;
      const target = S.op === '+' ? S.a + S.b : S.a - S.b;
      const stepsLeft = Math.abs(target - S.stepCurrent);
      const nextTick = S.stepCurrent + direction;
      h += `<div class="instruction-box highlight-pink">Tap <strong>${nextTick}</strong> — count ${S.op==='+'?'forward':'backward'} one step! (${stepsLeft} left)</div>`;
    } else if(S.phase === 'done'){
      h += `<div class="instruction-box highlight-green">${S.a} ${S.op} ${S.b} = ${res}</div>`;
    }

    // Equation display
    h += '<div class="equation">';
    h += `<div class="eq-num eq-a">${S.a}</div>`;
    h += `<div class="eq-op">${S.op}</div>`;
    h += `<div class="eq-num eq-b">${S.b}</div>`;
    h += `<div class="eq-eq">=</div>`;
    h += `<div class="eq-num eq-result ${S.phase==='done'?'revealed':''}">${S.phase==='done'?res:'?'}</div>`;
    h += '</div>';

    // Interactive number line
    const clickable = (S.phase === 'click1' || S.phase === 'click2' || S.phase === 'stepping');
    h += buildInteractiveNL(S.a, S.b, S.op, S.maxNL, S.phase, S.clickedA, S.clickedR, clickable, null);

    // Controls row
    if(S.phase === 'ready'){
      // Clamp b so subtraction never goes negative
      const maxB = S.op==='-' ? S.a : S.maxNL;
      if(S.op==='-' && S.b > S.a) { S.b = S.a; }
      h += '<div class="input-row">';
      h += `<input type="number" class="num-input" id="inputA" value="${S.a}" min="0" max="${S.maxNL}" onchange="S.a=Math.max(0,Math.min(${S.maxNL},+this.value));if(S.op==='-'&&S.b>S.a)S.b=S.a;render();">`;
      h += `<select class="op-select" id="opSel" onchange="S.op=this.value;if(S.op==='-'&&S.b style="min-width: 180px;">S.a)S.b=S.a;render();">
        <option value="+" ${S.op==='+'?'selected':''}>+</option>
        <option value="-" ${S.op==='-'?'selected':''}>−</option>
      </select>`;
      h += `<input type="number" class="num-input" id="inputB" value="${S.b}" min="0" max="${maxB}" onchange="S.b=Math.max(0,Math.min(${maxB},+this.value));render();">`;
      h += '</div>';
      // Result preview
      const previewResult = S.op==='+'? S.a+S.b : S.a-S.b;
      if(S.op==='-' && S.b > 0) {
        h += `<div style="font-size:11px;color:var(--text2);text-align:center;margin-top:4px;">${S.a} − ${S.b} = ${previewResult}</div>`;
      }
      h += '<div class="controls">';
      h += `<button class="ctrl-btn primary" onclick="startExplore()">Start →</button>`;
      h += `<button class="ctrl-btn" onclick="S.op=rand(1,3)===1?'-':'+';S.a=rand(S.op==='-'?2:0,${S.maxNL>10?10:5});S.b=rand(1,S.op==='-'?S.a:${S.maxNL>10?10:5});render();">🎲 Random</button>`;
      h += '</div>';
    } else if(S.phase === 'done'){
      h += '<div class="controls">';
      h += `<button class="ctrl-btn primary" onclick="S.op=rand(1,3)===1?'-':'+';S.a=rand(S.op==='-'?2:0,${S.maxNL>10?10:5});S.b=rand(1,S.op==='-'?S.a:${S.maxNL>10?10:5});S.phase='ready';S.clickedA=null;S.clickedR=null;render();">🎲 New Problem</button>`;
      h += `<button class="ctrl-btn" onclick="S.phase='ready';S.clickedA=null;S.clickedR=null;render();">↺ Reset</button>`;
      h += '</div>';
    }
  }

  ws.innerHTML = h;

  // Focus answer input if in answer phase
  if(isMissingAddend && S.phase === 'answer'){
    setTimeout(()=>{ const inp = document.getElementById('exploreAnswer'); if(inp) inp.focus(); }, 200);
  }

  sp.innerHTML = isMissingAddend ? `
    <div class="panel-section"><div class="panel-title">Missing Addend</div>
    <div class="panel-text">A <strong style="color:var(--pink);">missing addend</strong> is the number you need to add to get the total.<br><br>
    For example: <strong>3 + ? = 7</strong><br>
    The missing addend is <strong>4</strong> because 3 + 4 = 7.<br><br>
    <strong>Strategy:</strong> Start at the first number and count forward to the total. The number of jumps IS the missing addend!</div></div>
    <div class="panel-section"><div class="panel-title">On the Number Line</div>
    <div class="panel-text">1. <strong style="color:var(--cyan);">Click the start number</strong><br><br>
    2. <strong style="color:var(--pink);">Click the total</strong> to see the jump<br><br>
    3. <strong style="color:var(--green);">Count the jumps</strong> — that's your answer!</div></div>
    <div class="panel-section"><div class="panel-title">Vocabulary</div>
    <div class="panel-text"><strong style="color:var(--cyan);">Addend:</strong> a number being added<br><br>
    <strong style="color:var(--pink);">Missing Addend:</strong> the unknown number in an addition equation<br><br>
    <strong style="color:var(--green);">Sum/Total:</strong> the result of adding</div></div>` : `
    <div class="panel-section"><div class="panel-title">How to Use</div>
    <div class="panel-text">1. Type two numbers and pick + or −<br><br>
    2. Click <strong>Start</strong><br><br>
    3. <strong style="color:var(--cyan);">Click the first number</strong> on the number line to make the blue jump<br><br>
    4. <strong style="color:var(--pink);">Click the answer</strong> to complete the pink jump<br><br>
    The number line builds as you click!</div></div>
    <div class="panel-section"><div class="panel-title">Key Idea</div>
    <div class="panel-text">Every problem starts at <strong style="color:var(--text);">zero</strong>.<br><br>
    The <strong style="color:var(--cyan);">blue arrow</strong> shows the first number — jump forward from 0.<br><br>
    The <strong style="color:var(--pink);">pink arrow</strong> shows the operation — jump forward (+) or backward (−).<br><br>
    The <strong style="color:var(--green);">green dot</strong> is your answer.</div></div>
    <div class="panel-section"><div class="panel-title">Standards</div>
    <div class="panel-text"><strong>1.OA.1</strong> — Add and subtract within 20<br><br>
    <strong>1.OA.5</strong> — Relate counting to addition and subtraction<br><br>
    <strong>1.OA.6</strong> — Fluency within 20</div></div>`;
}


/* ══════════════════════════════════════════
   PRACTICE MODE
   ══════════════════════════════════════════ */

function newPractice(){
  const max = S.diff==='emergent'?10:20;
  S.clickedA = null; S.clickedR = null; S.phase = 'click1';
  S.stepCurrent = null; S.stepsCompleted = [];
  if(S.diff==='advanced'){
    S.pA = rand(1, Math.floor(max/2));
    S.pAnswer = rand(S.pA+1, Math.min(S.pA+10, max));
    S.pB = S.pAnswer - S.pA;
    S.pOp = '+';
    S.pMissing = 'addend';
  } else {
    S.pOp = rand(1,3)===1?'-':'+';
    if(S.pOp==='+'){
      S.pA = rand(0, Math.floor(max/2));
      S.pB = rand(1, Math.min(max-S.pA, 10));
      S.pAnswer = S.pA + S.pB;
    } else {
      S.pAnswer = rand(0, max-1);
      S.pB = rand(1, Math.min(10, max-S.pAnswer));
      S.pA = S.pAnswer + S.pB;
      S.pAnswer = S.pA - S.pB;
    }
    S.pMissing = 'result';
  }
}

function renderPractice(ws, sp){
  if(S.pA === undefined) newPractice();
  const max = S.maxNL;
  const correctResult = S.pOp==='+'? S.pA+S.pB : S.pA-S.pB;
  let h = '';

  // Instruction banner that evolves with phase
  if(S.phase === 'click1'){
    h += `<div class="instruction-box highlight-cyan">Click on <strong>${S.pA}</strong> on the number line to start</div>`;
  } else if(S.phase === 'stepping'){
    const direction = S.pOp === '+' ? 1 : -1;
    const target = S.pOp === '+' ? S.pA + S.pB : S.pA - S.pB;
    const stepsLeft = Math.abs(target - S.stepCurrent);
    const nextTick = S.stepCurrent + direction;
    h += `<div class="instruction-box highlight-pink">Tap <strong>${nextTick}</strong> — ${stepsLeft} step${stepsLeft!==1?'s':''} to go!</div>`;
  } else if(S.phase === 'answer'){
    h += `<div class="instruction-box highlight-green">Great jumps! Now type your answer below</div>`;
  }

  // Equation display
  h += '<div class="equation">';
  h += `<div class="eq-num eq-a">${S.pA}</div>`;
  h += `<div class="eq-op">${S.pOp}</div>`;
  if(S.pMissing==='addend'){
    h += `<div class="eq-num eq-b" style="border:2px dashed var(--pink);">?</div>`;
  } else {
    h += `<div class="eq-num eq-b">${S.pB}</div>`;
  }
  h += `<div class="eq-eq">=</div>`;
  if(S.pMissing==='result'){
    h += `<div class="eq-num eq-result">?</div>`;
  } else {
    h += `<div class="eq-num eq-result revealed">${S.pA+S.pB}</div>`;
  }
  h += '</div>';

  // Interactive number line with arrows built as they click
  const clickable = (S.phase === 'click1' || S.phase === 'click2' || S.phase === 'stepping');
  h += buildInteractiveNL(S.pA, S.pB, S.pOp, max, S.phase, S.clickedA, S.clickedR, clickable, S.pMissing);

  // Answer input only shows AFTER both arrows are placed
  if(S.phase === 'answer'){
    h += '<div class="input-row">';
    h += '<div id="vi-container"></div>';
    h += '</div>';
  }

  // Skip button always available
  h += '<div class="controls" style="margin-top:4px;">';
  h += `<button class="ctrl-btn" onclick="newPractice();render();" style="opacity:0.6;font-size:11px;">Skip →</button>`;
  h += '</div>';

  ws.innerHTML = h;

  // Initialize VinculumInput for answer
  if(S.phase === 'answer'){
    const correctAns = S.pMissing==='result'? (S.pOp==='+'?S.pA+S.pB:S.pA-S.pB) : S.pB;
    const vc = document.getElementById('vi-container');
    vc.innerHTML = '';
    VinculumInput.create(vc, { type:'auto', answer: correctAns, onSubmit: function(v){ checkPractice(v); } });
  }

  // Side panel — scaffold stays visible
  const correctAns = S.pMissing==='result'? correctResult : S.pB;
  sp.innerHTML = `
    <div class="panel-section"><div class="panel-title">Steps</div>
    <div class="panel-text" style="background:var(--card);padding:12px;border-radius:8px;">
    <div style="margin-bottom:8px;opacity:${S.phase==='click1'?1:0.5};">
      <strong style="color:var(--cyan);">① Click ${S.pA}</strong><br>
      <span style="font-size:12px;">Place the first dot on the number line</span>
    </div>
    <div style="margin-bottom:8px;opacity:${S.phase==='stepping'?1:(S.clickedA!==null?0.5:0.3)};">
      <strong style="color:var(--pink);">② Tap each dot ${S.pOp==='+'?'forward':'backward'}</strong><br>
      <span style="font-size:12px;">One step at a time to ${S.pMissing==='addend'?'the total':'the answer'}!</span>
    </div>
    <div style="opacity:${S.phase==='answer'?1:0.3};">
      <strong style="color:var(--green);">③ Type the answer</strong><br>
      <span style="font-size:12px;">${S.pMissing==='result'?'Where did you land?':'How many jumps?'}</span>
    </div>
    </div></div>
    <div class="panel-section"><div class="panel-title">Tip</div>
    <div class="panel-text">Touch each tick mark on the number line and count: "one, two, three..." as you go. The arrows show exactly how far you jumped!</div></div>`;
}

function checkPractice(val){
  const correctAns = S.pMissing==='result'? (S.pOp==='+'?S.pA+S.pB:S.pA-S.pB) : S.pB;
  if(isNaN(val)){showFB('Type a number!','try-again');return;}
  if(val === correctAns){
    showFB('✓ Correct! '+S.pA+' '+S.pOp+' '+S.pB+' = '+(S.pA+(S.pOp==='+'?S.pB:-S.pB)),'correct');
    setTimeout(()=>{ newPractice(); render(); }, 1500);
  } else {
    showFB('Not quite — try again!','incorrect');
  }
}


/* ══════════════════════════════════════════
   PLAY MODE (fast-paced, answer buttons)
   ══════════════════════════════════════════ */

function renderPlay(ws, sp){
  if(S.round===0) startGame();
  const max = S.maxNL;
  let h = '';
  h += `<div style="font-size:13px;color:var(--muted);">Round ${S.round} of ${S.total}</div>`;

  h += '<div class="equation">';
  h += `<div class="eq-num eq-a">${S.playA}</div>`;
  h += `<div class="eq-op">${S.playOp}</div>`;
  h += `<div class="eq-num eq-b">${S.playB}</div>`;
  h += `<div class="eq-eq">=</div>`;
  h += `<div class="eq-num eq-result">?</div>`;
  h += '</div>';

  // Static number line (no clicks, just reference)
  h += buildInteractiveNL(S.playA, S.playB, S.playOp, max, 'ready', null, null, false, null);

  h += '<div class="answer-grid">';
  S.playChoices.forEach(n => {
    h += `<button class="answer-btn" id="pans${n}" onclick="playPick(${n})">${n}</button>`;
  });
  h += '</div>';

  ws.innerHTML = h;

  sp.innerHTML = `
    <div class="score-display"><div class="score-value">${S.score}</div><div class="score-label">Score</div></div>
    <div class="score-display" style="background:transparent;padding:8px;">
      <div style="font-size:18px;font-weight:700;color:var(--yellow);"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><path d="M12 23c-4.97 0-8-3.58-8-7.5 0-3.07 2.17-5.84 4.5-7.5-.28 2.5 1.5 4.5 1.5 4.5s2-2.5 2-5.5c0-1.5-.5-3-1-4 3 1.5 5 4 5 7 0 .5-.08 1-.08 1s1.08-1.18 1.58-2.5C19.78 11.72 20 14.5 20 15.5c0 3.92-3.03 7.5-8 7.5z"/></svg> ${S.streak}</div>
      <div class="score-label">Streak</div>
      <div class="streak-bar"><div class="streak-fill" style="width:${Math.min(S.streak*20,100)}%;"></div></div>
    </div>
    <div class="panel-section"><div class="panel-title">Best Streak</div>
    <div class="panel-text" style="font-size:24px;font-weight:800;color:var(--purple);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M6 4h12v2a6 6 0 01-12 0V4z" fill="currentColor" opacity="0.2"/><path d="M6 4h12v2a6 6 0 01-12 0V4z"/><path d="M6 6H3v2a3 3 0 003 3"/><path d="M18 6h3v2a3 3 0 01-3 3"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="8" y1="18" x2="16" y2="18" stroke-linecap="round"/></svg> ${S.best}</div></div>`;
}

function startGame(){ S.round=1;S.score=0;S.streak=0; newPlayRound(); }
function newPlayRound(){
  const max=S.maxNL;
  S.playOp=rand(1,3)===1?'-':'+';
  if(S.playOp==='+'){
    S.playA=rand(0,Math.floor(max/2));
    S.playB=rand(1,Math.min(10,max-S.playA));
    S.playAnswer=S.playA+S.playB;
  } else {
    S.playB=rand(1,Math.min(10,Math.floor(max/2)));
    S.playA=rand(S.playB,max);
    S.playAnswer=S.playA-S.playB;
  }
  const choices=new Set([S.playAnswer]);
  while(choices.size<5){
    let c=S.playAnswer+rand(-3,3);
    if(c>=0&&c<=max) choices.add(c);
    else choices.add(rand(0,max));
  }
  S.playChoices=Array.from(choices).sort((a,b)=>a-b);
}
function playPick(n){
  const btn=document.getElementById('pans'+n);
  if(n===S.playAnswer){
    btn.classList.add('correct-flash');
    S.score+=10+S.streak*2;
    S.streak++;
    if(S.streak>S.best)S.best=S.streak;
    showFB(`✓ ${S.playA} ${S.playOp} ${S.playB} = ${S.playAnswer}`,'correct');
  } else {
    btn.classList.add('incorrect-flash');
    S.streak=0;
    showFB(`${S.playAnswer} was correct`,'incorrect');
  }
  setTimeout(()=>{
    if(S.round>=S.total){
      showFB(`Game Over! Score: ${S.score}`,'correct');
      setTimeout(()=>{S.round=0;render();},2000);
      return;
    }
    S.round++;
    newPlayRound();
    render();
  },1200);
}

render();
</script>
