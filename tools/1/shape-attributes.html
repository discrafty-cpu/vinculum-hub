    <script>
        const SHAPES = {
            triangle: {
                name: 'Triangle',
                sides: 3,
                corners: 3,
                vertices: [[150, 50], [50, 250], [250, 250]],
                definingSVG: (color, rotation, scale, thickness) => {
                    const cx = 150, cy = 150;
                    const verts = [[150, 50], [50, 250], [250, 250]];
                    const rotated = verts.map(([x, y]) => {
                        const rads = rotation * Math.PI / 180;
                        const nx = (x - cx) * Math.cos(rads) - (y - cy) * Math.sin(rads) + cx;
                        const ny = (x - cx) * Math.sin(rads) + (y - cy) * Math.cos(rads) + cy;
                        const scaled = [(nx - cx) * scale + cx, (ny - cy) * scale + cy];
                        return scaled;
                    });
                    const d = `M${rotated[0][0]},${rotated[0][1]} L${rotated[1][0]},${rotated[1][1]} L${rotated[2][0]},${rotated[2][1]} Z`;
                    return `
                        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <path d="${d}" fill="${color}" stroke="${color}" stroke-width="${thickness}" stroke-linejoin="round"/>
                            ${rotated.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="white" stroke="${color}" stroke-width="2"/>`).join('')}
                        </svg>
                    `;
                }
            },
            rectangle: {
                name: 'Rectangle',
                sides: 4,
                corners: 4,
                definingSVG: (color, rotation, scale, thickness) => {
                    const cx = 150, cy = 150;
                    const w = 160 * scale, h = 80 * scale;
                    const x = cx - w / 2, y = cy - h / 2;
                    const corners = [[x, y], [x + w, y], [x + w, y + h], [x, y + h]];
                    const rotated = corners.map(([px, py]) => {
                        const rads = rotation * Math.PI / 180;
                        const nx = (px - cx) * Math.cos(rads) - (py - cy) * Math.sin(rads) + cx;
                        const ny = (px - cx) * Math.sin(rads) + (py - cy) * Math.cos(rads) + cy;
                        return [nx, ny];
                    });
                    const d = `M${rotated[0][0]},${rotated[0][1]} L${rotated[1][0]},${rotated[1][1]} L${rotated[2][0]},${rotated[2][1]} L${rotated[3][0]},${rotated[3][1]} Z`;
                    return `
                        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <path d="${d}" fill="${color}" stroke="${color}" stroke-width="${thickness}" stroke-linejoin="round"/>
                            ${rotated.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="white" stroke="${color}" stroke-width="2"/>`).join('')}
                        </svg>
                    `;
                }
            },
            square: {
                name: 'Square',
                sides: 4,
                corners: 4,
                definingSVG: (color, rotation, scale, thickness) => {
                    const cx = 150, cy = 150;
                    const s = 100 * scale;
                    const x = cx - s / 2, y = cy - s / 2;
                    const corners = [[x, y], [x + s, y], [x + s, y + s], [x, y + s]];
                    const rotated = corners.map(([px, py]) => {
                        const rads = rotation * Math.PI / 180;
                        const nx = (px - cx) * Math.cos(rads) - (py - cy) * Math.sin(rads) + cx;
                        const ny = (px - cx) * Math.sin(rads) + (py - cy) * Math.cos(rads) + cy;
                        return [nx, ny];
                    });
                    const d = `M${rotated[0][0]},${rotated[0][1]} L${rotated[1][0]},${rotated[1][1]} L${rotated[2][0]},${rotated[2][1]} L${rotated[3][0]},${rotated[3][1]} Z`;
                    return `
                        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <path d="${d}" fill="${color}" stroke="${color}" stroke-width="${thickness}" stroke-linejoin="round"/>
                            ${rotated.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="white" stroke="${color}" stroke-width="2"/>`).join('')}
                        </svg>
                    `;
                }
            },
            trapezoid: {
                name: 'Trapezoid',
                sides: 4,
                corners: 4,
                definingSVG: (color, rotation, scale, thickness) => {
                    const cx = 150, cy = 150;
                    const w1 = 140 * scale, w2 = 80 * scale, h = 100 * scale;
                    const corners = [[cx - w1/2, cy - h/2], [cx + w1/2, cy - h/2], [cx + w2/2, cy + h/2], [cx - w2/2, cy + h/2]];
                    const rotated = corners.map(([px, py]) => {
                        const rads = rotation * Math.PI / 180;
                        const nx = (px - cx) * Math.cos(rads) - (py - cy) * Math.sin(rads) + cx;
                        const ny = (px - cx) * Math.sin(rads) + (py - cy) * Math.cos(rads) + cy;
                        return [nx, ny];
                    });
                    const d = `M${rotated[0][0]},${rotated[0][1]} L${rotated[1][0]},${rotated[1][1]} L${rotated[2][0]},${rotated[2][1]} L${rotated[3][0]},${rotated[3][1]} Z`;
                    return `
                        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <path d="${d}" fill="${color}" stroke="${color}" stroke-width="${thickness}" stroke-linejoin="round"/>
                            ${rotated.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="white" stroke="${color}" stroke-width="2"/>`).join('')}
                        </svg>
                    `;
                }
            },
            hexagon: {
                name: 'Hexagon',
                sides: 6,
                corners: 6,
                definingSVG: (color, rotation, scale, thickness) => {
                    const cx = 150, cy = 150;
                    const r = 80 * scale;
                    const corners = [];
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * 60 - 90) * Math.PI / 180;
                        corners.push([cx + r * Math.cos(angle), cy + r * Math.sin(angle)]);
                    }
                    const rotated = corners.map(([px, py]) => {
                        const rads = rotation * Math.PI / 180;
                        const nx = (px - cx) * Math.cos(rads) - (py - cy) * Math.sin(rads) + cx;
                        const ny = (px - cx) * Math.sin(rads) + (py - cy) * Math.cos(rads) + cy;
                        return [nx, ny];
                    });
                    const d = rotated.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ') + ' Z';
                    return `
                        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <path d="${d}" fill="${color}" stroke="${color}" stroke-width="${thickness}" stroke-linejoin="round"/>
                            ${rotated.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="white" stroke="${color}" stroke-width="2"/>`).join('')}
                        </svg>
                    `;
                }
            },
            circle: {
                name: 'Circle',
                sides: 0,
                corners: 0,
                definingSVG: (color, rotation, scale, thickness) => {
                    const cx = 150, cy = 150;
                    const r = 80 * scale;
                    return `
                        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="${color}" stroke-width="${thickness}"/>
                        </svg>
                    `;
                }
            }
        };

        const COLORS = ['#00d4ff', '#ff3b8b', '#ffc107', '#00e676', '#b388ff', '#ff9100'];
        const COLORS_NAME = ['Cyan', 'Pink', 'Yellow', 'Green', 'Purple', 'Orange'];

        // STATE MANAGEMENT
        const S = {
            mode: 'explore',
            selectedShape: 'triangle',
            color: 0,
            size: 1,
            rotation: 0,
            thickness: 1,
            difficulty: 'emergent',
            practiceIndex: 0,
            practiceShapes: [],
            practiceAnswered: false,
            practiceCorrect: false,
            playScore: 0,
            playStreak: 0,
            playQuestionIndex: 0,
            playAnswered: false,
            playQuestions: []
        };

        const COLOR_VALUES = { 0: 2, 1: 1.5, 2: 1 };
        const SIZE_NAMES = ['Small', 'Medium', 'Large'];
        const ROTATION_VALUES = [0, 45, 90];
        const ROTATION_NAMES = ['0°', '45°', '90°'];
        const THICKNESS_VALUES = [1, 2, 3];
        const THICKNESS_NAMES = ['Thin', 'Normal', 'Thick'];

        function renderSidePanel() {
            const panel = document.getElementById('side-panel');
            if (S.mode === 'explore') {
                panel.innerHTML = `
                    <h3>Vocabulary</h3>
                    <div class="side-panel-content">
                        <div class="vocab-item">
                            <div class="vocab-label">DEFINING ATTRIBUTE</div>
                            <div class="vocab-def">What MUST a shape have to be that shape</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-label">NON-DEFINING ATTRIBUTE</div>
                            <div class="vocab-def">What CAN change without changing the shape</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-label">SIDES</div>
                            <div class="vocab-def">Straight lines that make up a shape</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-label">CORNERS (VERTICES)</div>
                            <div class="vocab-def">Points where sides meet</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-label">SHAPE NAME</div>
                            <div class="vocab-def">${SHAPES[S.selectedShape].name}</div>
                        </div>
                    </div>
                `;
            } else if (S.mode === 'practice') {
                panel.innerHTML = `
                    <h3>Difficulty Level</h3>
                    <div class="side-panel-content">
                        <button class="shape-btn ${S.difficulty === 'emergent' ? 'active' : ''}" data-difficulty="emergent">Emergent</button>
                        <button class="shape-btn ${S.difficulty === 'proficient' ? 'active' : ''}" data-difficulty="proficient">Proficient</button>
                        <button class="shape-btn ${S.difficulty === 'advanced' ? 'active' : ''}" data-difficulty="advanced">Advanced</button>
                        <p style="font-size: 0.8rem; color: var(--text2); margin-top: 1rem; line-height: 1.4;">
                            ${S.difficulty === 'emergent' ? 'Identify shapes with visual hints provided.' :
                              S.difficulty === 'proficient' ? 'Sort by attributes and explain why.' :
                              'Tricky cases and composite shapes.'}
                        </p>
                    </div>
                `;

                const diffBtns = panel.querySelectorAll('[data-difficulty]');
                diffBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        S.difficulty = e.target.dataset.difficulty;
                        S.practiceIndex = 0;
                        S.practiceAnswered = false;
                        generatePracticeShapes();
                        render();
                    });
                });
            } else if (S.mode === 'play') {
                panel.innerHTML = `
                    <h3>Game Rules</h3>
                    <div class="side-panel-content">
                        <p style="font-size: 0.8rem; color: var(--text2); line-height: 1.5;">
                            Answer true/false questions about shape attributes. Quick answers keep your streak alive!
                        </p>
                        <p style="font-size: 0.75rem; color: var(--muted); margin-top: 1rem;">
                            Defining attributes are what make a shape. Non-defining attributes can change.
                        </p>
                    </div>
                `;
            }
        }

        function renderExplore() {
            const workspace = document.getElementById('workspace');
            const shape = SHAPES[S.selectedShape];
            const color = COLORS[S.color];
            workspace.innerHTML = `
                <div class="explore-workspace">
                    <div>
                        <div class="shape-selector">
                            <div class="shape-selector-label">Select a Shape</div>
                            <div class="shape-buttons">
                                ${Object.keys(SHAPES).map(key => `
                                    <button class="shape-btn ${S.selectedShape === key ? 'active' : ''}" data-shape="${key}">
                                        ${SHAPES[key].name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <div class="toggles-group">
                            <div class="toggle-item">
                                <div class="toggle-label">
                                    <div class="toggle-title">Color</div>
                                    <div class="toggle-hint">Non-Defining</div>
                                </div>
                                <button class="toggle-switch" data-toggle="color">${COLORS_NAME[S.color]}</button>
                            </div>

                            <div class="toggle-item">
                                <div class="toggle-label">
                                    <div class="toggle-title">Size</div>
                                    <div class="toggle-hint">Non-Defining</div>
                                </div>
                                <button class="toggle-switch" data-toggle="size">${SIZE_NAMES[S.size]}</button>
                            </div>

                            <div class="toggle-item">
                                <div class="toggle-label">
                                    <div class="toggle-title">Rotation</div>
                                    <div class="toggle-hint">Non-Defining</div>
                                </div>
                                <button class="toggle-switch" data-toggle="rotation">${ROTATION_NAMES[S.rotation]}</button>
                            </div>

                            <div class="toggle-item">
                                <div class="toggle-label">
                                    <div class="toggle-title">Outline</div>
                                    <div class="toggle-hint">Non-Defining</div>
                                </div>
                                <button class="toggle-switch" data-toggle="thickness">${THICKNESS_NAMES[S.thickness]}</button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="shape-display">
                            <div class="shape-svg">
                                ${shape.definingSVG(color, ROTATION_VALUES[S.rotation], COLOR_VALUES[S.size], THICKNESS_VALUES[S.thickness])}
                            </div>
                        </div>

                        <div class="insight-panel">
                            <div class="insight-title">These are ALL ${shape.name}s!</div>
                            <div class="variations-row">
                                ${[
                                    {color: COLORS[0], rot: 0, size: 1, thick: 1},
                                    {color: COLORS[2], rot: 45, size: 0, thick: 1},
                                    {color: COLORS[1], rot: 90, size: 2, thick: 2},
                                    {color: COLORS[4], rot: 0, size: 2, thick: 3},
                                    {color: COLORS[5], rot: 45, size: 1, thick: 1}
                                ].map(v => `
                                    <div class="variation-mini">
                                        ${shape.definingSVG(v.color, ROTATION_VALUES[v.rot], COLOR_VALUES[v.size], THICKNESS_VALUES[v.thick])}
                                    </div>
                                `).join('')}
                            </div>

                            <div class="insight-subsection">
                                <div class="insight-question">What MUST a ${shape.name.toLowerCase()} have?</div>
                                <div class="insight-answer">
                                    ${shape.sides > 0 ? `${shape.sides} straight sides, ${shape.corners} corners` : 'No straight sides or corners (curved)'}
                                </div>
                            </div>

                            <div class="insight-subsection">
                                <div class="insight-question">What CAN change?</div>
                                <div class="insight-answer non-defining">
                                    Color, size, rotation, outline thickness — the shape stays the same!
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const shapeButtons = workspace.querySelectorAll('[data-shape]');
            shapeButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    S.selectedShape = e.target.dataset.shape;
                    render();
                });
            });

            const toggles = workspace.querySelectorAll('[data-toggle]');
            toggles.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const toggle = e.target.dataset.toggle;
                    if (toggle === 'color') {
                        S.color = (S.color + 1) % COLORS.length;
                    } else if (toggle === 'size') {
                        S.size = (S.size + 1) % 3;
                    } else if (toggle === 'rotation') {
                        S.rotation = (S.rotation + 1) % 3;
                    } else if (toggle === 'thickness') {
                        S.thickness = (S.thickness + 1) % 3;
                    }
                    render();
                });
            });
        }

        function generatePracticeShapes() {
            S.practiceShapes = [];
            if (S.difficulty === 'emergent') {
                const shapes = ['triangle', 'rectangle', 'square', 'circle'];
                for (let i = 0; i < 4; i++) {
                    S.practiceShapes.push({
                        shape: shapes[Math.floor(Math.random() * shapes.length)],
                        question: Math.random() > 0.5,
                        mode: 'yesno'
                    });
                }
            } else if (S.difficulty === 'proficient') {
                S.practiceShapes = [
                    { shape: 'triangle', mode: 'sort', attr: 'sides', value: 3 },
                    { shape: 'rectangle', mode: 'sort', attr: 'sides', value: 4 },
                    { shape: 'square', mode: 'sort', attr: 'sides', value: 4 },
                    { shape: 'circle', mode: 'sort', attr: 'sides', value: 0 }
                ];
            } else {
                S.practiceShapes = [
                    { shape: 'trapezoid', rotated: true, mode: 'yesno' },
                    { shape: 'hexagon', mode: 'sort', attr: 'sides', value: 6 },
                    { shape: 'rectangle', mode: 'yesno' },
                    { shape: 'square', mode: 'sort', attr: 'sides', value: 4 }
                ];
            }
        }

        function renderPractice() {
            const workspace = document.getElementById('workspace');
            if (S.practiceShapes.length === 0) {
                generatePracticeShapes();
            }

            const current = S.practiceShapes[S.practiceIndex];
            if (!current) {
                workspace.innerHTML = `<div class="empty-state"><p>All practice questions complete!</p></div>`;
                return;
            }

            const shape = SHAPES[current.shape];
            let html = `
                <div class="practice-workspace">
                    <div class="practice-question">
                        ${current.mode === 'yesno' ? `Is this a ${shape.name}?` : `Sort by: 4 sides`}
                    </div>

                    <div class="practice-shape-display">
                        ${shape.definingSVG(COLORS[Math.floor(Math.random() * COLORS.length)], current.rotated ? 45 : 0, 1, 2)}
                    </div>
            `;

            if (current.mode === 'yesno') {
                html += `
                    <div class="practice-controls">
                        <button class="practice-btn yes" data-answer="yes">Yes</button>
                        <button class="practice-btn no" data-answer="no">No</button>
                    </div>
                `;
                if (S.practiceAnswered) {
                    html += `<div class="feedback-message ${S.practiceCorrect ? '' : 'incorrect'}">${S.practiceCorrect ? 'Correct!' : 'Not quite. This is a ' + shape.name + '.'}</div>`;
                    html += `<button class="next-btn" data-action="next">Next</button>`;
                }
            } else if (current.mode === 'sort') {
                html += `
                    <div class="options-group">
                        <button class="option-btn" data-reason="Has 4 sides">Has 4 sides</button>
                        <button class="option-btn" data-reason="Does NOT have 4 sides">Does NOT have 4 sides</button>
                        <button class="option-btn" data-reason="Is a triangle">Is a triangle</button>
                    </div>
                `;
                if (S.practiceAnswered) {
                    html += `<button class="next-btn" data-action="next">Next</button>`;
                }
            }

            html += `</div>`;
            workspace.innerHTML = html;

            const answerBtns = workspace.querySelectorAll('[data-answer]');
            answerBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const answer = e.target.dataset.answer === 'yes';
                    S.practiceCorrect = answer === true;
                    S.practiceAnswered = true;
                    render();
                });
            });

            const reasonBtns = workspace.querySelectorAll('[data-reason]');
            reasonBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const correct = (current.attr === 'sides' && current.value === 4 && e.target.dataset.reason === 'Has 4 sides') ||
                                    (current.attr === 'sides' && current.value !== 4 && e.target.dataset.reason === 'Does NOT have 4 sides') ||
                                    (current.attr === 'sides' && current.value === 6 && e.target.dataset.reason === 'Does NOT have 4 sides');
                    S.practiceCorrect = correct;
                    S.practiceAnswered = true;
                    if (correct) {
                        showFB('✓ Correct!','correct');
                    } else {
                        showFB('Try again!','incorrect');
                    }
                    e.target.classList.add(correct ? 'correct' : 'incorrect');
                    render();
                });
            });

            const nextBtn = workspace.querySelector('[data-action="next"]');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    S.practiceIndex += 1;
                    S.practiceAnswered = false;
                    render();
                });
            }
        }

        function generatePlayQuestions() {
            const questions = [
                { question: 'A triangle can be blue', answer: true, reason: 'Color is non-defining' },
                { question: 'A rectangle can have 3 sides', answer: false, reason: '4 sides is defining' },
                { question: 'A square can be rotated', answer: true, reason: 'Rotation is non-defining' },
                { question: 'A circle has corners', answer: false, reason: 'Circles have no corners' },
                { question: 'A shape with 6 sides is a hexagon', answer: true, reason: '6 sides defines it' },
                { question: 'All squares are rectangles', answer: true, reason: 'Squares have defining rectangle properties' },
                { question: 'An outline thickness changes the shape', answer: false, reason: 'Thickness is non-defining' },
                { question: 'A trapezoid has 4 sides', answer: true, reason: 'Defining attribute' }
            ];
            S.playQuestions = questions.sort(() => 0.5 - Math.random()).slice(0, 6);
        }

        function renderPlay() {
            const workspace = document.getElementById('workspace');
            if (S.playQuestions.length === 0) {
                generatePlayQuestions();
            }

            if (S.playQuestionIndex >= S.playQuestions.length) {
                workspace.innerHTML = `
                    <div class="play-workspace">
                        <div style="text-align: center;">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--cyan); margin-bottom: 1rem;">Quiz Complete!</div>
                            <div class="score-bar">
                                <div class="score-item">
                                    <div class="score-label">Final Score</div>
                                    <div class="score-value">${S.playScore}/${S.playQuestions.length}</div>
                                </div>
                                <div class="score-item">
                                    <div class="score-label">Best Streak</div>
                                    <div class="score-value streak">${S.playStreak}</div>
                                </div>
                            </div>
                            <button class="next-btn" data-action="restart">Play Again</button>
                        </div>
                    </div>
                `;
                workspace.querySelector('[data-action="restart"]').addEventListener('click', () => {
                    S.playScore = 0;
                    S.playStreak = 0;
                    S.playQuestionIndex = 0;
                    S.playAnswered = false;
                    generatePlayQuestions();
                    render();
                });
                return;
            }

            const current = S.playQuestions[S.playQuestionIndex];
            let html = `
                <div class="play-workspace">
                    <div class="score-bar">
                        <div class="score-item">
                            <div class="score-label">Score</div>
                            <div class="score-value">${S.playScore}/${S.playQuestions.length}</div>
                        </div>
                        <div class="score-item">
                            <div class="score-label">Streak</div>
                            <div class="score-value streak">${S.playStreak}</div>
                        </div>
                    </div>

                    <div class="quiz-question">${current.question}</div>

                    <div class="quiz-options">
                        <button class="quiz-option" data-answer="true">True</button>
                        <button class="quiz-option" data-answer="false">False</button>
                    </div>
            `;

            if (S.playAnswered) {
                html += `<button class="next-btn" data-action="next">Next</button>`;
            }

            html += `</div>`;
            workspace.innerHTML = html;

            const optionBtns = workspace.querySelectorAll('[data-answer]');
            optionBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const answer = e.target.dataset.answer === 'true';
                    const correct = answer === current.answer;

                    if (correct) {
                        showFB('✓ Correct!','correct');
                        S.playScore += 1;
                        S.playStreak += 1;
                        e.target.classList.add('correct');
                    } else {
                        showFB('Try again!','incorrect');
                        S.playStreak = 0;
                        const otherBtn = workspace.querySelector(`[data-answer="${String(current.answer)}"]`);
                        otherBtn.classList.add('correct');
                        e.target.classList.add('incorrect');
                    }

                    S.playAnswered = true;
                    render();
                });
            });

            const nextBtn = workspace.querySelector('[data-action="next"]');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    S.playQuestionIndex += 1;
                    S.playAnswered = false;
                    render();
                });
            }
        }

        function render() {
            if (S.mode === 'explore') {
                renderExplore();
            } else if (S.mode === 'practice') {
                renderPractice();
            } else if (S.mode === 'play') {
                renderPlay();
            }
            renderSidePanel();
        }

        // EVENT LISTENERS
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('mode-tab')) {
                const mode = e.target.dataset.mode;
                S.mode = mode;
                document.querySelectorAll('.vinculum-mode-tab').forEach(tab => tab.classList.remove('active'));
                e.target.classList.add('active');
                if (mode === 'play' && S.playQuestions.length === 0) {
                    generatePlayQuestions();
                } else if (mode === 'practice' && S.practiceShapes.length === 0) {
                    generatePracticeShapes();
                }
                render();
            }
        });

        // Initial render
        render();
    </script>
<script src="../../vinculum-core.js"></script>
<script src="../../vinculum-data.js"></script>
<script src="../../vinculum-adaptive-hook.js"></script>

<script src="../../vinculum-stories.js"></script>
<script src="../../vinculum-feedback.js"></script>
<script src="../../vinculum-identity.js"></script>
<script src="../../vinculum-indigenous.js"></script>
