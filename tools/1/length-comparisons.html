<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINCULUM — Length Comparisons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../vinculum-core.css">
<style>
    /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header styles moved to vinculum-core.css */

    

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .title-badge {
      background: var(--card);
      color: var(--cyan);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border);
    }

    .standards {
      display: flex;
      gap: 8px;
      font-size: 10px;
      color: var(--text2);
    }

    .standard-tag {
      background: var(--card);
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    /* Mode Tabs */
    

    

    

    .vinculum-mode-tab.active {
      background: var(--card);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* Difficulty Tabs (Practice/Play) */
    .difficulty-tabs {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }

    .diff-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .diff-tab:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .diff-tab.active {
      background: var(--yellow);
      color: var(--bg);
    }

    /* Main Container */
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      gap: 20px;
    }

    .side-panel {
      width: 280px;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      font-size: 13px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel-title {
      color: var(--cyan);
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .vocab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .vocab-item {
      background: var(--card);
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 12px;
    }

    .vocab-item strong {
      color: var(--text);
      display: block;
      margin-bottom: 2px;
      font-weight: 600;
    }

    /* Object Selector */
    .object-selector {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 8px;
    }

    .selector-label {
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .object-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .object-thumb {
      width: 60px;
      height: 50px;
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text2);
    }

    .object-thumb:hover {
      border-color: var(--cyan);
      background: var(--card);
    }

    .object-thumb.selected {
      border-color: var(--cyan);
      background: var(--card);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
    }

    .thumb-rect {
      width: 30px;
      height: 12px;
      margin-bottom: 4px;
      border-radius: 2px;
    }

    /* Measurement Area */
    .measurement-area {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 8px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .object-display {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      position: relative;
    }

    .object-svg {
      flex-shrink: 0;
    }

    .units-container {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .unit-cube {
      width: 24px;
      height: 24px;
      background: var(--cyan);
      border: 1px solid rgba(0, 212, 255, 0.5);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--bg);
      animation: cubeAppear 0.3s ease-out forwards;
    }

    @keyframes cubeAppear {
      from {
        opacity: 0;
        transform: scale(0.6);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .unit-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .unit-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .unit-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    .unit-btn.active {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    .measurement-label {
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .measurement-detail {
      color: var(--text2);
      font-size: 13px;
    }

    /* Comparison Mode */
    .comparison-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .comparison-item {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .comparison-label {
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .compare-units {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
    }

    .difference-bracket {
      color: var(--green);
      font-size: 14px;
      font-weight: 600;
      margin-top: 8px;
    }

    /* Practice Mode */
    .practice-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .practice-task {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 8px;
    }

    .task-title {
      color: var(--cyan);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .task-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .measure-display {
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .measure-object {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .measure-units {
      display: flex;
      gap: 2px;
    }

    .measure-unit {
      width: 20px;
      height: 20px;
      background: var(--yellow);
      border: 1px solid rgba(255, 193, 7, 0.5);
      border-radius: 2px;
    }

    .measure-label {
      color: var(--text2);
      font-size: 12px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .choice-btn {
      background: var(--card2);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .choice-btn:hover {
      border-color: var(--cyan);
      background: var(--card);
    }

    .choice-btn.correct {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
    }

    .choice-btn.incorrect {
      border-color: var(--pink);
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .comparison-objects {
      display: flex;
      gap: 30px;
      align-items: flex-end;
      justify-content: center;
      margin: 20px 0;
    }

    .comparison-object {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .order-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 20px 0;
    }

    .draggable-object {
      background: var(--card2);
      border: 2px dashed var(--border);
      padding: 16px;
      border-radius: 6px;
      cursor: grab;
      transition: all 0.2s;
      flex: 0 0 120px;
      text-align: center;
    }

    .draggable-object.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .draggable-object:hover {
      border-color: var(--cyan);
      background: var(--card);
    }

    /* Play Mode */
    .play-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .play-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .score-info {
      display: flex;
      gap: 24px;
      font-size: 14px;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .score-label {
      color: var(--text2);
      font-size: 11px;
      text-transform: uppercase;
    }

    .score-value {
      color: var(--cyan);
      font-weight: 700;
      font-size: 18px;
      font-family: 'JetBrains Mono', monospace;
    }

    .timer {
      font-size: 24px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--yellow);
      min-width: 50px;
      text-align: right;
    }

    .timer.warning {
      color: var(--orange);
    }

    .timer.critical {
      color: var(--pink);
    }

    .play-challenge {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .challenge-title {
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }

    /* Utilities */
    .hidden {
      display: none !important;
    }

    .glow {
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }
  
</style>
</head>
<body>

  <div class="vinculum-header">
    <div class="vinculum-header-left">
      <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" aria-label="Back to Hub">← Hub</a>
      <div class="vinculum-header-title"><span>VINCULUM</span> Length Comparisons</div>
      <span class="vinculum-header-badge">1.MD</span>
    </div>
    <div class="vinculum-header-right">
      <div class="vinculum-std-tags">
        <span class="vinculum-std-tag">1.MD.A.1</span>
        <span class="vinculum-std-tag">1.MD.A.2</span>
      </div>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="vinculum-mode-tabs" style="display:flex; gap:8px; padding:12px 24px; background:var(--bg); border-bottom:1px solid var(--border);">
    <button class="vinculum-mode-tab active" data-mode="explore"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M4 24C4 24 12 12 24 12C36 12 44 24 44 24C44 24 36 36 24 36C12 36 4 24 4 24Z" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="3" fill="currentColor"/><line x1="24" y1="4" x2="24" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="8" x2="13" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="38" y1="8" x2="35" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/></svg> Explore</button>
    <button class="vinculum-mode-tab" data-mode="practice"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="126" stroke-dashoffset="32" stroke-linecap="round"/><polyline points="16,24 22,32 34,16" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> Practice</button>
    <button class="vinculum-mode-tab" data-mode="play"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><polygon points="28,4 12,28 22,28 18,44 36,18 26,18" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><polygon points="27,8 15,27 23,27 20,40 34,19 26,19" fill="currentColor" opacity="0.15"/></svg> Play</button>
    <div class="difficulty-tabs" id="difficultyTabs" style="display:none; margin-left:auto; gap:4px; flex-direction:row;">
      <button class="diff-tab active" data-difficulty="emergent">Emergent</button>
      <button class="diff-tab" data-difficulty="proficient">Proficient</button>
      <button class="diff-tab" data-difficulty="advanced">Advanced</button>
    </div>
  </div>

  <div class="main-container">
    <div class="workspace" role="main" id="workspace"></div>
    <div class="side-panel">
      <div class="panel-section">
        <div class="panel-title">Vocabulary</div>
        <div class="vocab-list">
          <div class="vocab-item">
            <strong>Length</strong>
            How long something is
          </div>
          <div class="vocab-item">
            <strong>Longer</strong>
            Greater in length
          </div>
          <div class="vocab-item">
            <strong>Shorter</strong>
            Less in length
          </div>
          <div class="vocab-item">
            <strong>Measure</strong>
            Find the length using units
          </div>
          <div class="vocab-item">
            <strong>Unit</strong>
            A fixed amount to measure with
          </div>
          <div class="vocab-item">
            <strong>Compare</strong>
            Look at differences
          </div>
        </div>
      </div>
    </div>
  </div>

<div class="feedback" id="feedback"></div>
      <script src="../../vinculum-input.js"></script>
    <script>
    // Objects with their unit lengths
    const OBJECTS = {
      pencil: { name: 'Pencil', length: 7, color: '#FF6B6B', shape: 'rect' },
      crayon: { name: 'Crayon', length: 5, color: '#4ECDC4', shape: 'rect' },
      eraser: { name: 'Eraser', length: 3, color: '#FFE66D', shape: 'rect' },
      ruler: { name: 'Ruler', length: 10, color: '#95E1D3', shape: 'rect' },
      paperclip: { name: 'Paper Clip', length: 2, color: '#F38181', shape: 'rect' },
      book: { name: 'Book', length: 8, color: '#AA96DA', shape: 'rect' }
    };

    const UNIT_SIZES = {
      cubes: { name: 'Cubes', size: 1 },
      paperclips: { name: 'Paper Clips', size: 2 }
    };

    // State management
    const S = {
      mode: 'explore',
      difficulty: 'emergent',
      selectedObject: null,
      unit: 'cubes',
      compareObject1: null,
      compareObject2: null,
      practiceTaskIndex: 0,
      practiceAnswered: false,
      playScore: 0,
      playStreak: 0,
      playTimer: 8,
      playStarted: false,
      playTimerInterval: null
    };

    // Render function
    function render() {
      const workspace = document.getElementById('workspace');

      if (S.mode === 'explore') {
        workspace.innerHTML = renderExplore();
      } else if (S.mode === 'practice') {
        workspace.innerHTML = renderPractice();
      } else if (S.mode === 'play') {
        workspace.innerHTML = renderPlay();
      }

      attachEventListeners();
    }

    function renderExplore() {
      let html = `
        <div class="object-selector">
          <div class="selector-label">Select an object to measure</div>
          <div class="object-row">
      `;

      for (const [key, obj] of Object.entries(OBJECTS)) {
        const isSelected = S.selectedObject === key ? 'selected' : '';
        html += `
          <button class="object-thumb ${isSelected}" data-object="${key}">
            <div class="thumb-rect" style="background-color: ${obj.color};"></div>
            <div>${obj.name}</div>
          </button>
        `;
      }

      html += `</div></div>`;

      if (S.selectedObject) {
        const obj = OBJECTS[S.selectedObject];
        html += renderMeasurementArea(obj);
      }

      return html;
    }

    function renderMeasurementArea(obj) {
      const unitType = UNIT_SIZES[S.unit];
      const numUnits = Math.ceil(obj.length / unitType.size);

      let html = `
        <div class="measurement-area">
          <div class="unit-selector">
            <button class="unit-btn ${S.unit === 'cubes' ? 'active' : ''}" data-unit="cubes">Cubes</button>
            <button class="unit-btn ${S.unit === 'paperclips' ? 'active' : ''}" data-unit="paperclips">Paper Clips</button>
          </div>

          <div class="object-display">
            <svg class="object-svg" width="200" height="80" viewBox="0 0 200 80">
              <rect x="10" y="30" width="${obj.length * 15}" height="30" fill="${obj.color}" rx="4"/>
              <text x="10" y="70" font-size="12" fill="#8b9cc0" font-family="Inter">${obj.name}</text>
            </svg>
            <div class="units-container">
      `;

      for (let i = 0; i < numUnits; i++) {
        html += `<div class="unit-cube" style="animation-delay: ${i * 0.1}s;">${i + 1}</div>`;
      }

      html += `
            </div>
          </div>

          <div>
            <div class="measurement-label">The ${obj.name.toLowerCase()} is ${numUnits} ${unitType.name.toLowerCase()} long</div>
          </div>
      `;

      if (S.compareObject1 && S.compareObject2) {
        html += renderComparison();
      } else if (S.selectedObject && !S.compareObject1) {
        html += `
          <div class="measurement-detail">
            <button class="choice-btn" onclick="S.compareObject1 = S.selectedObject; S.selectedObject = null; render();">
              Compare this object →
            </button>
          </div>
        `;
      }

      html += `</div>`;
      return html;
    }

    function renderComparison() {
      const obj1 = OBJECTS[S.compareObject1];
      const obj2 = OBJECTS[S.compareObject2];
      const unitType = UNIT_SIZES[S.unit];

      const len1 = Math.ceil(obj1.length / unitType.size);
      const len2 = Math.ceil(obj2.length / unitType.size);
      const diff = Math.abs(len1 - len2);
      const longer = len1 > len2 ? obj1.name : obj2.name;
      const shorter = len1 < len2 ? obj1.name : obj2.name;

      let html = `
        <div class="measurement-area">
          <div class="task-title">Comparison</div>
          <div class="comparison-container">
            <div class="comparison-item">
              <div class="comparison-label">${obj1.name}</div>
              <svg width="180" height="60" viewBox="0 0 180 60">
                <rect x="10" y="20" width="${obj1.length * 12}" height="25" fill="${obj1.color}" rx="4"/>
              </svg>
              <div class="measurement-detail">${len1} ${unitType.name.toLowerCase()}</div>
            </div>
            <div class="comparison-item">
              <div class="comparison-label">${obj2.name}</div>
              <svg width="180" height="60" viewBox="0 0 180 60">
                <rect x="10" y="20" width="${obj2.length * 12}" height="25" fill="${obj2.color}" rx="4"/>
              </svg>
              <div class="measurement-detail">${len2} ${unitType.name.toLowerCase()}</div>
            </div>
          </div>
          <div class="difference-bracket">
            The ${longer.toLowerCase()} is ${diff} ${unitType.name.toLowerCase()} longer than the ${shorter.toLowerCase()}
          </div>
          <button class="choice-btn" onclick="S.compareObject1 = null; S.compareObject2 = null; render();">
            New Comparison
          </button>
        </div>
      `;
      return html;
    }

    function renderPractice() {
      const tasks = generatePracticeTasks(S.difficulty);
      const currentTask = tasks[S.practiceTaskIndex % tasks.length];

      let html = `<div class="practice-container">`;

      if (currentTask.type === 'measure') {
        html += renderMeasureTask(currentTask);
      } else if (currentTask.type === 'compare') {
        html += renderCompareTask(currentTask);
      } else if (currentTask.type === 'order') {
        html += renderOrderTask(currentTask);
      }

      html += `</div>`;
      return html;
    }

    function renderMeasureTask(task) {
      const obj = OBJECTS[task.object];
      const unitType = UNIT_SIZES[task.unit || 'cubes'];
      const correctAnswer = Math.ceil(obj.length / unitType.size);

      let html = `
        <div class="practice-task">
          <div class="task-title">Measure It</div>
          <div class="task-content">
            <div class="measure-display">
              <div class="measure-object">
                <svg width="120" height="80" viewBox="0 0 120 80">
                  <rect x="10" y="30" width="${obj.length * 10}" height="30" fill="${obj.color}" rx="4"/>
                  <text x="10" y="70" font-size="12" fill="#8b9cc0" font-family="Inter">${obj.name}</text>
                </svg>
                <div class="measure-label">How many units?</div>
              </div>
            </div>
            <div class="choices">
      `;

      const choices = generateChoices(correctAnswer, 4);
      for (const choice of choices) {
        const isCorrect = choice === correctAnswer;
        const btnClass = S.practiceAnswered ? (isCorrect ? 'correct' : 'incorrect') : '';
        html += `<button class="choice-btn ${btnClass}" onclick="selectAnswer(${choice}, ${isCorrect})">${choice}</button>`;
      }

      html += `</div></div></div>`;

      if (S.practiceAnswered) {
        html += `
          <button class="choice-btn" onclick="S.practiceTaskIndex++; S.practiceAnswered = false; render();">
            Next Challenge
          </button>
        `;
      }

      return html;
    }

    function renderCompareTask(task) {
      const obj1 = OBJECTS[task.objects[0]];
      const obj2 = OBJECTS[task.objects[1]];
      const unitType = UNIT_SIZES['cubes'];

      const len1 = obj1.length;
      const len2 = obj2.length;
      const longer = len1 > len2 ? task.objects[0] : task.objects[1];

      let html = `
        <div class="practice-task">
          <div class="task-title">Which is longer?</div>
          <div class="task-content">
            <div class="comparison-objects">
              <div class="comparison-object">
                <svg width="100" height="120" viewBox="0 0 100 120">
                  <rect x="20" y="20" width="${obj1.length * 8}" height="30" fill="${obj1.color}" rx="4"/>
                  <text x="20" y="100" font-size="12" fill="#8b9cc0" font-family="Inter">${obj1.name}</text>
                </svg>
              </div>
              <div class="comparison-object">
                <svg width="100" height="120" viewBox="0 0 100 120">
                  <rect x="20" y="20" width="${obj2.length * 8}" height="30" fill="${obj2.color}" rx="4"/>
                  <text x="20" y="100" font-size="12" fill="#8b9cc0" font-family="Inter">${obj2.name}</text>
                </svg>
              </div>
            </div>
            <div class="choices">
      `;

      const choices = [task.objects[0], task.objects[1]];
      for (const choice of choices) {
        const isCorrect = choice === longer;
        const obj = OBJECTS[choice];
        const btnClass = S.practiceAnswered ? (isCorrect ? 'correct' : 'incorrect') : '';
        html += `<button class="choice-btn ${btnClass}" onclick="selectAnswer('${choice}', ${isCorrect})">${obj.name}</button>`;
      }

      html += `</div></div></div>`;

      if (S.practiceAnswered) {
        html += `
          <button class="choice-btn" onclick="S.practiceTaskIndex++; S.practiceAnswered = false; render();">
            Next Challenge
          </button>
        `;
      }

      return html;
    }

    function renderOrderTask(task) {
      const objects = task.objects.map(k => OBJECTS[k]);
      const sorted = [...task.objects].sort((a, b) => OBJECTS[a].length - OBJECTS[b].length);

      let html = `
        <div class="practice-task">
          <div class="task-title">Order by Length (Shortest to Longest)</div>
          <div class="task-content">
            <div class="order-container" id="orderContainer">
      `;

      for (const key of task.objects) {
        const obj = OBJECTS[key];
        html += `
          <div class="draggable-object" draggable="true" data-object="${key}">
            <svg width="80" height="60" viewBox="0 0 80 60">
              <rect x="5" y="15" width="${obj.length * 6}" height="20" fill="${obj.color}" rx="3"/>
            </svg>
            <div>${obj.name}</div>
          </div>
        `;
      }

      html += `</div><div class="choices">`;

      const isCorrect = JSON.stringify(task.currentOrder || task.objects) === JSON.stringify(sorted);
      const btnClass = S.practiceAnswered ? (isCorrect ? 'correct' : 'incorrect') : '';
      html += `<button class="choice-btn ${btnClass}" onclick="checkOrder([${task.objects.map(o => `'${o}'`).join(',')}])">Check Order</button>`;

      html += `</div></div></div>`;

      if (S.practiceAnswered) {
        html += `
          <button class="choice-btn" onclick="S.practiceTaskIndex++; S.practiceAnswered = false; render();">
            Next Challenge
          </button>
        `;
      }

      return html;
    }

    function renderPlay() {
      if (!S.playStarted) {
        return `
          <div class="play-container">
            <div class="play-header">
              <div class="challenge-title">Ready to measure fast?</div>
              <button class="choice-btn" onclick="startPlay();">Start Challenge!</button>
            </div>
          </div>
        `;
      }

      const tasks = generatePlayChallenges(S.difficulty);
      const currentTask = tasks[S.playScore % tasks.length];

      let html = `
        <div class="play-container">
          <div class="play-header">
            <div class="score-info">
              <div class="score-item">
                <div class="score-label">Score</div>
                <div class="score-value">${S.playScore}</div>
              </div>
              <div class="score-item">
                <div class="score-label">Streak</div>
                <div class="score-value">${S.playStreak}</div>
              </div>
            </div>
            <div class="timer" id="playTimer">${S.playTimer}</div>
          </div>
          <div class="play-challenge">
            <div class="challenge-title">${currentTask.title}</div>
      `;

      if (currentTask.type === 'measure') {
        const obj = OBJECTS[currentTask.object];
        html += `
          <div class="measure-display">
            <svg width="150" height="100" viewBox="0 0 150 100">
              <rect x="10" y="35" width="${obj.length * 12}" height="35" fill="${obj.color}" rx="4"/>
              <text x="10" y="85" font-size="14" fill="#8b9cc0" font-family="Inter">${obj.name}</text>
            </svg>
          </div>
          <div class="choices">
        `;

        const correctAnswer = obj.length;
        const choices = generateChoices(correctAnswer, 4);
        for (const choice of choices) {
          const isCorrect = choice === correctAnswer;
          html += `<button class="choice-btn" onclick="playAnswer(${choice}, ${isCorrect})">${choice}</button>`;
        }
      } else if (currentTask.type === 'compare') {
        const obj1 = OBJECTS[currentTask.objects[0]];
        const obj2 = OBJECTS[currentTask.objects[1]];
        html += `
          <div class="comparison-objects">
            <div class="comparison-object">
              <svg width="90" height="100" viewBox="0 0 90 100">
                <rect x="15" y="20" width="${obj1.length * 7}" height="28" fill="${obj1.color}" rx="3"/>
                <text x="15" y="75" font-size="11" fill="#8b9cc0" font-family="Inter">${obj1.name}</text>
              </svg>
            </div>
            <div class="comparison-object">
              <svg width="90" height="100" viewBox="0 0 90 100">
                <rect x="15" y="20" width="${obj2.length * 7}" height="28" fill="${obj2.color}" rx="3"/>
                <text x="15" y="75" font-size="11" fill="#8b9cc0" font-family="Inter">${obj2.name}</text>
              </svg>
            </div>
          </div>
          <div class="choices">
        `;

        const longer = obj1.length > obj2.length ? currentTask.objects[0] : currentTask.objects[1];
        const choices = [currentTask.objects[0], currentTask.objects[1]];
        for (const choice of choices) {
          const isCorrect = choice === longer;
          const obj = OBJECTS[choice];
          html += `<button class="choice-btn" onclick="playAnswer('${choice}', ${isCorrect})">${obj.name}</button>`;
        }
      }

      html += `</div></div></div>`;
      return html;
    }

    // Helper functions
    function generateChoices(correct, count) {
      const choices = new Set([correct]);
      while (choices.size < count) {
        const choice = Math.floor(Math.random() * 12) + 1;
        if (choice !== correct) choices.add(choice);
      }
      return Array.from(choices).sort(() => Math.random() - 0.5);
    }

    function generatePracticeTasks(difficulty) {
      const tasks = [];

      if (difficulty === 'emergent') {
        tasks.push(
          { type: 'compare', objects: ['pencil', 'eraser'] },
          { type: 'compare', objects: ['book', 'crayon'] },
          { type: 'compare', objects: ['ruler', 'paperclip'] }
        );
      } else if (difficulty === 'proficient') {
        tasks.push(
          { type: 'measure', object: 'pencil', unit: 'cubes' },
          { type: 'compare', objects: ['pencil', 'crayon'] },
          { type: 'measure', object: 'ruler', unit: 'cubes' }
        );
      } else if (difficulty === 'advanced') {
        tasks.push(
          { type: 'measure', object: 'book', unit: 'cubes' },
          { type: 'order', objects: ['pencil', 'eraser', 'ruler'] },
          { type: 'order', objects: ['crayon', 'paperclip', 'book'] }
        );
      }

      return tasks;
    }

    function generatePlayChallenges(difficulty) {
      const challenges = [];

      if (difficulty === 'emergent') {
        challenges.push(
          { type: 'compare', title: 'Which is longer?', objects: ['pencil', 'eraser'] },
          { type: 'compare', title: 'Pick the longer one', objects: ['book', 'crayon'] }
        );
      } else if (difficulty === 'proficient') {
        challenges.push(
          { type: 'measure', title: 'How many cubes?', object: 'pencil' },
          { type: 'measure', title: 'Count the units', object: 'ruler' },
          { type: 'compare', title: 'Which is longer?', objects: ['pencil', 'crayon'] }
        );
      } else {
        challenges.push(
          { type: 'measure', title: 'Measure this', object: 'book' },
          { type: 'measure', title: 'How many units?', object: 'ruler' },
          { type: 'compare', title: 'Which is longer?', objects: ['pencil', 'book'] }
        );
      }

      return challenges;
    }

    function selectAnswer(choice, isCorrect) {
      if (S.practiceAnswered) return;
      S.practiceAnswered = true;

      if (isCorrect) {
        showFB('✓ Correct!','correct');
        document.querySelectorAll('.choice-btn')[0].parentElement.children[Object.keys(OBJECTS).indexOf(choice)].classList.add('correct');
      } else {
        showFB('Try again!','incorrect');
        event.target.classList.add('incorrect');
      }

      render();
    }

    function playAnswer(choice, isCorrect) {
      if (isCorrect) {
        showFB('✓ Correct!','correct');
        S.playScore++;
        S.playStreak++;
      } else {
        showFB('Try again!','incorrect');
        S.playStreak = 0;
      }

      S.playTimer = 8;
      render();
    }

    function startPlay() {
      S.playStarted = true;
      S.playScore = 0;
      S.playStreak = 0;
      S.playTimer = 8;

      if (S.playTimerInterval) clearInterval(S.playTimerInterval);

      S.playTimerInterval = setInterval(() => {
        S.playTimer--;
        const timerEl = document.getElementById('playTimer');
        if (timerEl) {
          timerEl.textContent = S.playTimer;
          timerEl.classList.remove('warning', 'critical');
          if (S.playTimer <= 2) timerEl.classList.add('critical');
          else if (S.playTimer <= 4) timerEl.classList.add('warning');
        }

        if (S.playTimer <= 0) {
          S.playStarted = false;
          clearInterval(S.playTimerInterval);
          render();
        }
      }, 1000);

      render();
    }

    function checkOrder(expected) {
      S.practiceAnswered = true;
      render();
    }

    function attachEventListeners() {
      // Mode tabs
      document.querySelectorAll('.vinculum-mode-tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          S.mode = e.target.dataset.mode;
          S.practiceTaskIndex = 0;
          S.practiceAnswered = false;
          S.playStarted = false;
          document.querySelectorAll('.vinculum-mode-tab').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');

          const diffTabs = document.getElementById('difficultyTabs');
          diffTabs.style.display = S.mode === 'explore' ? 'none' : 'flex';

          render();
        });
      });

      // Difficulty tabs
      document.querySelectorAll('.diff-tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
          S.difficulty = e.target.dataset.difficulty;
          document.querySelectorAll('.diff-tab').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          render();
        });
      });

      // Object selector
      document.querySelectorAll('.object-thumb').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const objKey = e.target.closest('.object-thumb').dataset.object;
          S.selectedObject = S.selectedObject === objKey ? null : objKey;
          render();
        });
      });

      // Unit selector
      document.querySelectorAll('.unit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          S.unit = e.target.dataset.unit;
          render();
        });
      });
    }

    // Initial render
    document.getElementById('difficultyTabs').style.display = 'none';
    render();
  </script>
