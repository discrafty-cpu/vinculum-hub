<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM — Fact Family Houses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
        /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header styles moved to vinculum-core.css */


        

        .vinculum-header-badges {
            display: flex;
            gap: 0.5rem;
        }

        .badge {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
        }

        .badge.standard {
            color: var(--text2);
        }

        /* Mode Tabs */
        .mode-bar {
            padding: 1rem 2rem;
            background-color: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        

        .tab {
            flex: 1;
            padding: 0.6rem 1.2rem;
            border: none;
            background: transparent;
            color: var(--text2);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 0.8rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .tab.active {
            color: var(--bg);
            font-weight: 700;
        }

        .tab.active.explore {
            background-color: var(--cyan);
        }

        .tab.active.practice {
            background-color: var(--green);
        }

        .tab.active.play {
            background-color: var(--pink);
        }

        .difficulty-selector {
            display: flex;
            gap: 0.5rem;
        }

        

        

        /* Main Content */
        .content-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .side-panel {
            width: 280px;
            background-color: var(--bg2);
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* Explore Mode */
        .explore-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .number-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .number-btn {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border);
            background-color: var(--card);
            color: var(--text);
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .number-btn:hover {
            border-color: var(--cyan);
            background-color: var(--card2);
        }

        .number-btn.active {
            background-color: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
            font-weight: 800;
        }

        /* House SVG */
        .house-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .house-svg {
            width: 300px;
            height: 280px;
        }

        .house-whole-circle {
            fill: var(--card);
            stroke: var(--cyan);
            stroke-width: 2;
        }

        .house-part-circle {
            fill: var(--card);
            stroke: var(--border);
            stroke-width: 2;
            transition: stroke 0.3s ease;
        }

        .house-part-circle.active {
            stroke: var(--green);
            stroke-width: 3;
        }

        .number-text {
            fill: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: central;
        }

        .counter-dot {
            fill: var(--cyan);
            opacity: 0.7;
        }

        .house-line {
            stroke: var(--border);
            stroke-width: 2;
            fill: none;
        }

        .house-roof {
            fill: none;
            stroke: var(--cyan);
            stroke-width: 2;
        }

        .fact-display {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .fact-display .operand {
            color: var(--cyan);
        }

        .fact-display .operator {
            color: var(--text2);
            font-size: 1.8rem;
        }

        .fact-display .equals {
            color: var(--green);
            font-size: 1.8rem;
        }

        .fact-display .result {
            color: var(--green);
        }

        .replay-btn {
            padding: 0.8rem 1.6rem;
            background-color: var(--purple);
            color: var(--bg);
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 1rem;
        }

        .replay-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Practice Mode */
        .practice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            min-width: 120px;
            text-align: center;
        }

        .timer-display.warning {
            color: var(--orange);
        }

        .timer-display.danger {
            color: var(--pink);
        }

        .answer-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .answer-btn {
            width: 100px;
            height: 100px;
            border: 3px solid var(--border);
            background-color: var(--card);
            color: var(--text);
            font-weight: 700;
            font-size: 1.8rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .answer-btn:hover {
            border-color: var(--text);
            background-color: var(--card2);
        }

        .answer-btn.correct {
            background-color: var(--green);
            color: var(--bg);
            border-color: var(--green);
            animation: correctPulse 0.6s ease;
        }

        .answer-btn.wrong {
            border-color: var(--pink);
            animation: wrongShake 0.4s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes questionPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .question-mark {
            animation: questionPulse 1.2s ease infinite;
        }

        /* Play Mode */
        .play-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .play-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 1rem;
        }

        .score-display {
            font-size: 2rem;
            font-weight: 800;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
        }

        .streak-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--orange);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Side Panel Content */
        .panel-section {
            margin-bottom: 2rem;
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-content {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text2);
        }

        .vocab-item {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background-color: var(--card);
            border-left: 3px solid var(--cyan);
            border-radius: 0.4rem;
        }

        .vocab-term {
            font-weight: 700;
            color: var(--text);
            font-size: 0.9rem;
        }

        .vocab-desc {
            font-size: 0.8rem;
            color: var(--text2);
            margin-top: 0.3rem;
        }

        .tip-item {
            margin-bottom: 0.8rem;
            padding: 0.6rem;
            background-color: var(--card);
            border-radius: 0.4rem;
            border-left: 3px solid var(--green);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--card);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--green);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text2);
            margin-top: 0.5rem;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                transform: translateY(-60px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(60px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes hop {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fact-number {
            animation: slideDown 0.6s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .side-panel {
                width: 240px;
            }

            .workspace {
                padding: 1.5rem;
            }

            .house-svg {
                width: 250px;
                height: 230px;
            }
        }

        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column;
            }

            .side-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 200px;
            }

            .workspace {
                padding: 1rem;
            }
        }
    
</style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="vinculum-header">
            <div class="vinculum-header-left">
                <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" aria-label="Back to Hub">← Hub</a>
                <div class="vinculum-header-title"><span>VINCULUM</span> Fact Family Houses</div>
                <span class="vinculum-header-badge">1.OA</span>
            </div>
            <div class="vinculum-header-right">
                <div class="vinculum-std-tags">
                    <span class="vinculum-std-tag">1.OA.B.3</span>
                    <span class="vinculum-std-tag">1.OA.B.4</span>
                    <span class="vinculum-std-tag mn">MN 1.1.2.2</span>
                </div>
            </div>
        </div>

        <!-- Mode Bar -->
        <div class="mode-bar">
            <div class="vinculum-mode-tabs">
                <button class="tab active explore" data-mode="explore">Explore</button>
                <button class="tab practice" data-mode="practice">Practice</button>
                <button class="tab play" data-mode="play">Play</button>
            </div>
            <div class="difficulty-selector">
                <button class="vinculum-diff-btn" data-difficulty="emergent">Emergent</button>
                <button class="vinculum-diff-btn" data-difficulty="proficient">Proficient</button>
                <button class="vinculum-diff-btn" data-difficulty="advanced">Advanced</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content-wrapper">
            <div class="workspace" role="main" id="workspace"></div>
            <div class="side-panel" id="sidePanel"></div>
        </div>
    </div>

<div class="feedback" id="feedback"></div>
        <script src="../../vinculum-input.js"></script>
    <script>
        // State management
        const S = {
            mode: 'explore',
            difficulty: 'emergent',
            wholeNumber: 8,
            currentFactIndex: 0,
            isAnimating: false,
            practiceCorrect: 0,
            practiceTotal: 0,
            practiceCurrentProblem: null,
            playScore: 0,
            playStreak: 0,
            playPersonalBest: 0,
            playCurrentProblem: null,
            practiceTimer: null,
            practiceTimeLeft: 10
        };

        // Fact generation utilities
        function generateFactFamily(whole) {
            const facts = [];
            const parts = [];

            for (let i = 1; i < whole; i++) {
                parts.push([i, whole - i]);
            }

            parts.forEach(([a, b]) => {
                facts.push({ a, op: '+', b, result: whole });
                facts.push({ a: b, op: '+', b: a, result: whole });
                facts.push({ a: whole, op: '-', b: a, result: b });
                facts.push({ a: whole, op: '-', b: b, result: a });
            });

            return facts;
        }

        function generatePracticeProblem(difficulty, whole) {
            const parts = [];
            for (let i = 1; i < whole; i++) {
                parts.push([i, whole - i]);
            }

            const [a, b] = parts[Math.floor(Math.random() * parts.length)];
            const factTypes = ['add1', 'add2', 'sub1', 'sub2'];
            const type = factTypes[Math.floor(Math.random() * factTypes.length)];

            let problem = {};

            if (difficulty === 'emergent') {
                problem = { a, op: '+', b, result: whole, missing: 'result', type: 'add1' };
            } else {
                switch (type) {
                    case 'add1':
                        problem = { a, op: '+', b, result: whole, missing: 'result' };
                        break;
                    case 'add2':
                        problem = { a, op: '+', b, result: whole, missing: 'b' };
                        break;
                    case 'sub1':
                        problem = { a: whole, op: '-', b: a, result: b, missing: 'result' };
                        break;
                    case 'sub2':
                        problem = { a: whole, op: '-', b: a, result: b, missing: 'b' };
                        break;
                }
            }

            // Generate answer choices
            const correct = problem.missing === 'result' ? problem.result : problem.b;
            const choices = [correct];

            while (choices.length < 4) {
                let choice = Math.floor(Math.random() * (whole + 3)) + 1;
                if (!choices.includes(choice)) {
                    choices.push(choice);
                }
            }

            choices.sort(() => Math.random() - 0.5);

            return { ...problem, choices, correctAnswer: correct };
        }

        function generatePlayProblem() {
            const whole = 5 + Math.floor(S.playStreak / 3);
            return generatePracticeProblem('proficient', Math.min(whole, 18));
        }

        // Rendering functions
        function renderExplore() {
            const html = `
                <div class="explore-section">
                    <div>
                        <div style="color: var(--text2); margin-bottom: 0.5rem; font-size: 0.95rem; font-weight: 500;">Select a Whole Number:</div>
                        <div class="number-selector">
                            ${Array.from({length: 17}, (_, i) => i + 2).map(n => `
                                <button class="number-btn ${n === S.wholeNumber ? 'active' : ''}" data-number="${n}">${n}</button>
                            `).join('')}
                        </div>
                    </div>
                    ${renderHouse()}
                    <div class="fact-display" id="factDisplay"></div>
                    <button class="replay-btn" id="replayBtn">▶ Replay</button>
                </div>
            `;
            document.getElementById('workspace').innerHTML = html;

            // Event listeners
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    S.wholeNumber = parseInt(e.target.dataset.number);
                    S.currentFactIndex = 0;
                    S.isAnimating = false;
                    renderExplore();
                    playFactSequence();
                });
            });

            document.getElementById('replayBtn').addEventListener('click', playFactSequence);

            playFactSequence();
        }

        function renderHouse() {
            const facts = generateFactFamily(S.wholeNumber);
            const uniqueParts = new Set();
            facts.forEach(f => {
                if (f.op === '+') {
                    uniqueParts.add(f.a);
                }
            });
            const parts = Array.from(uniqueParts).slice(0, 2);

            let svg = `<svg class="house-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
                <!-- Roof -->
                <polygon points="150,30 220,120 80,120" class="house-roof" />

                <!-- Whole Number Circle (Top) -->
                <circle cx="150" cy="80" r="35" class="house-whole-circle" />
                <text x="150" y="85" class="number-text">${S.wholeNumber}</text>
                <g class="whole-dots" id="wholeDots">`;

            for (let i = 0; i < Math.min(S.wholeNumber, 10); i++) {
                const angle = (i / Math.min(S.wholeNumber, 10)) * Math.PI * 2 - Math.PI / 2;
                const x = 150 + Math.cos(angle) * 22;
                const y = 80 + Math.sin(angle) * 22;
                svg += `<circle cx="${x}" cy="${y}" r="2.5" class="counter-dot" />`;
            }

            svg += `</g>

                <!-- Part Circles (Bottom) -->
                <circle cx="80" cy="200" r="35" class="house-part-circle" id="part1" />
                <text x="80" y="205" class="number-text">${parts[0] || 0}</text>
                <g class="part1-dots">`;

            for (let i = 0; i < (parts[0] || 0); i++) {
                const angle = (i / Math.max(parts[0] || 1, 1)) * Math.PI * 2 - Math.PI / 2;
                const x = 80 + Math.cos(angle) * 22;
                const y = 200 + Math.sin(angle) * 22;
                svg += `<circle cx="${x}" cy="${y}" r="2" class="counter-dot" />`;
            }

            svg += `</g>
                <circle cx="220" cy="200" r="35" class="house-part-circle" id="part2" />
                <text x="220" y="205" class="number-text">${parts[1] || 0}</text>
                <g class="part2-dots">`;

            for (let i = 0; i < (parts[1] || 0); i++) {
                const angle = (i / Math.max(parts[1] || 1, 1)) * Math.PI * 2 - Math.PI / 2;
                const x = 220 + Math.cos(angle) * 22;
                const y = 200 + Math.sin(angle) * 22;
                svg += `<circle cx="${x}" cy="${y}" r="2" class="counter-dot" />`;
            }

            svg += `</g>

                <!-- Connection Lines -->
                <line x1="115" y1="165" x2="150" y2="115" class="house-line" />
                <line x1="185" y1="165" x2="150" y2="115" class="house-line" />
            </svg>`;

            return `<div class="house-container">${svg}</div>`;
        }

        function playFactSequence() {
            if (S.isAnimating) return;

            S.isAnimating = true;
            S.currentFactIndex = 0;

            const facts = generateFactFamily(S.wholeNumber);
            const parts = [];
            facts.forEach(f => {
                if (f.op === '+') parts.push([f.a, f.b]);
            });

            const selectedFacts = [];
            const firstPair = parts[0];
            selectedFacts.push({ a: firstPair[0], op: '+', b: firstPair[1], result: S.wholeNumber });
            selectedFacts.push({ a: firstPair[1], op: '+', b: firstPair[0], result: S.wholeNumber });
            selectedFacts.push({ a: S.wholeNumber, op: '-', b: firstPair[0], result: firstPair[1] });
            selectedFacts.push({ a: S.wholeNumber, op: '-', b: firstPair[1], result: firstPair[0] });

            function showNextFact() {
                if (S.currentFactIndex < selectedFacts.length) {
                    const fact = selectedFacts[S.currentFactIndex];
                    const display = document.getElementById('factDisplay');
                    display.innerHTML = `<span class="operand">${fact.a}</span> <span class="operator">${fact.op}</span> <span class="operand">${fact.b}</span> <span class="equals">=</span> <span class="result">${fact.result}</span>`;

                    S.currentFactIndex++;
                    setTimeout(showNextFact, 1500);
                } else {
                    S.isAnimating = false;
                }
            }

            showNextFact();
        }

        function renderPractice() {
            if (!S.practiceCurrentProblem) {
                S.practiceCurrentProblem = generatePracticeProblem(S.difficulty, 5 + Math.floor(Math.random() * 11));
                S.practiceTotal++;
            }

            const problem = S.practiceCurrentProblem;
            const timerDisplay = S.difficulty === 'advanced' ? `<div class="timer-display" id="timerDisplay">10</div>` : '';

            const html = `
                <div class="practice-section">
                    ${timerDisplay}
                    <div class="house-container">
                        ${renderPracticeHouse(problem)}
                    </div>
                    <div class="fact-display" id="problemDisplay"></div>
                    <div class="answer-buttons" id="answerButtons"></div>
                </div>
            `;

            document.getElementById('workspace').innerHTML = html;

            // Render problem
            const display = document.getElementById('problemDisplay');
            let displayHtml = '';
            displayHtml += `<span class="operand">${problem.missing === 'a' ? '?' : problem.a}</span> `;
            displayHtml += `<span class="operator">${problem.op}</span> `;
            displayHtml += `<span class="operand">${problem.missing === 'b' ? '?' : problem.b}</span> `;
            displayHtml += `<span class="equals">=</span> `;
            displayHtml += `<span class="result">${problem.missing === 'result' ? '<span class="question-mark">?</span>' : problem.result}</span>`;
            display.innerHTML = displayHtml;

            // Render answer buttons
            const buttonsHtml = problem.choices.map(choice =>
                `<button class="answer-btn" data-answer="${choice}">${choice}</button>`
            ).join('');
            document.getElementById('answerButtons').innerHTML = buttonsHtml;

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const answer = parseInt(e.target.dataset.answer);
                    if (answer === problem.correctAnswer) {
                        showFB('✓ Correct!','correct');
                        S.practiceCorrect++;
                        e.target.classList.add('correct');
                        setTimeout(() => {
                            S.practiceCurrentProblem = null;
                            renderPractice();
                            renderSidePanel();
                        }, 1000);
                    } else {
                        showFB('Try again!','incorrect');
                        e.target.classList.add('wrong');
                        setTimeout(() => {
                            e.target.classList.remove('wrong');
                        }, 400);
                    }
                });
            });

            if (S.difficulty === 'advanced') {
                S.practiceTimeLeft = 10;
                clearInterval(S.practiceTimer);
                S.practiceTimer = setInterval(() => {
                    S.practiceTimeLeft--;
                    const timerEl = document.getElementById('timerDisplay');
                    if (timerEl) {
                        timerEl.textContent = S.practiceTimeLeft;
                        if (S.practiceTimeLeft <= 3) {
                            timerEl.classList.add('danger');
                        } else if (S.practiceTimeLeft <= 5) {
                            timerEl.classList.add('warning');
                        }
                    }

                    if (S.practiceTimeLeft <= 0) {
                        clearInterval(S.practiceTimer);
                        S.practiceCurrentProblem = null;
                        renderPractice();
                    }
                }, 1000);
            }
        }

        function renderPracticeHouse(problem) {
            const whole = problem.result || problem.a;
            const svg = `<svg class="house-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
                <polygon points="150,30 220,120 80,120" class="house-roof" />
                <circle cx="150" cy="80" r="35" class="house-whole-circle" />
                <text x="150" y="85" class="number-text">${problem.op === '+' ? problem.result : problem.a}</text>
                <circle cx="80" cy="200" r="35" class="house-part-circle" />
                <text x="80" y="205" class="number-text">${problem.op === '+' ? problem.a : problem.b}</text>
                <circle cx="220" cy="200" r="35" class="house-part-circle" />
                <text x="220" y="205" class="number-text">${problem.op === '+' ? problem.b : problem.result}</text>
                <line x1="115" y1="165" x2="150" y2="115" class="house-line" />
                <line x1="185" y1="165" x2="150" y2="115" class="house-line" />
            </svg>`;
            return svg;
        }

        function renderPlay() {
            if (!S.playCurrentProblem) {
                S.playCurrentProblem = generatePlayProblem();
            }

            const problem = S.playCurrentProblem;

            const html = `
                <div class="play-section">
                    <div class="play-header">
                        <div class="score-display">Score: ${S.playScore}</div>
                        <div class="streak-display"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><path d="M12 23c-4.97 0-8-3.58-8-7.5 0-3.07 2.17-5.84 4.5-7.5-.28 2.5 1.5 4.5 1.5 4.5s2-2.5 2-5.5c0-1.5-.5-3-1-4 3 1.5 5 4 5 7 0 .5-.08 1-.08 1s1.08-1.18 1.58-2.5C19.78 11.72 20 14.5 20 15.5c0 3.92-3.03 7.5-8 7.5z"/></svg> ${S.playStreak}</div>
                    </div>
                    <div class="house-container">
                        ${renderPracticeHouse(problem)}
                    </div>
                    <div class="fact-display" id="problemDisplay"></div>
                    <div class="answer-buttons" id="answerButtons"></div>
                </div>
            `;

            document.getElementById('workspace').innerHTML = html;

            // Render problem
            const display = document.getElementById('problemDisplay');
            let displayHtml = '';
            displayHtml += `<span class="operand">${problem.missing === 'a' ? '?' : problem.a}</span> `;
            displayHtml += `<span class="operator">${problem.op}</span> `;
            displayHtml += `<span class="operand">${problem.missing === 'b' ? '?' : problem.b}</span> `;
            displayHtml += `<span class="equals">=</span> `;
            displayHtml += `<span class="result">${problem.missing === 'result' ? '?' : problem.result}</span>`;
            display.innerHTML = displayHtml;

            // Render answer buttons
            const buttonsHtml = problem.choices.map(choice =>
                `<button class="answer-btn" data-answer="${choice}">${choice}</button>`
            ).join('');
            document.getElementById('answerButtons').innerHTML = buttonsHtml;

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const answer = parseInt(e.target.dataset.answer);
                    if (answer === problem.correctAnswer) {
                        showFB('✓ Correct!','correct');
                        S.playScore += 10;
                        if (S.playStreak >= 5) {
                            S.playScore += 5;
                        }
                        S.playStreak++;
                        if (S.playScore > S.playPersonalBest) {
                            S.playPersonalBest = S.playScore;
                        }

                        e.target.classList.add('correct');
                        setTimeout(() => {
                            S.playCurrentProblem = null;
                            renderPlay();
                            renderSidePanel();
                        }, 800);
                    } else {
                        showFB('Try again!','incorrect');
                        S.playStreak = 0;
                        e.target.classList.add('wrong');
                        setTimeout(() => {
                            S.playCurrentProblem = null;
                            renderPlay();
                            renderSidePanel();
                        }, 800);
                    }
                });
            });
        }

        function renderSidePanel() {
            let html = '';

            if (S.mode === 'explore') {
                html = `
                    <div class="panel-section">
                        <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M12 5C10 3 6 3 3 4v16c3-1 7-1 9 1 2-2 6-2 9-1V4c-3-1-7-1-9 1z" fill="currentColor" opacity="0.1"/><line x1="12" y1="5" x2="12" y2="21"/></svg> Vocabulary</div>
                        <div class="vocab-item">
                            <div class="vocab-term">Fact Family</div>
                            <div class="vocab-desc">A group of related addition and subtraction facts that use the same three numbers.</div>
                        </div>
                        <div class="vocab-item">
                            <div class="vocab-term">Related Facts</div>
                            <div class="vocab-desc">Facts that use the same numbers in different ways.</div>
                        </div>
                    </div>
                    <div class="panel-section">
                        <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M9 18h6M10 21h4"/><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z" fill="currentColor" opacity="0.15"/><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></svg> How It Works</div>
                        <div class="panel-content">
                            <p>The Fact Family House shows how addition and subtraction are connected:</p>
                            <ul style="margin-top: 0.8rem; margin-left: 1rem; line-height: 1.8;">
                                <li>The whole number sits on top</li>
                                <li>The parts sit on the bottom</li>
                                <li>You can add in any order!</li>
                                <li>Subtraction finds missing parts</li>
                            </ul>
                        </div>
                    </div>
                `;
            } else if (S.mode === 'practice') {
                const percent = S.practiceTotal > 0 ? Math.round((S.practiceCorrect / S.practiceTotal) * 100) : 0;
                html = `
                    <div class="panel-section">
                        <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg> Progress</div>
                        <div style="font-size: 1.3rem; font-weight: 700; color: var(--green); margin-bottom: 0.5rem;">${S.practiceCorrect}/${S.practiceTotal}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                        <div class="progress-text">${percent}% Correct</div>
                    </div>
                    <div class="panel-section">
                        <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M9 18h6M10 21h4"/><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z" fill="currentColor" opacity="0.15"/><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></svg> Tips</div>
                        <div class="tip-item">Start with smaller numbers</div>
                        <div class="tip-item">Use your fingers to count</div>
                        <div class="tip-item">Look at the house shape</div>
                        <div class="tip-item">Try adding in different order</div>
                    </div>
                `;
            } else if (S.mode === 'play') {
                html = `
                    <div class="panel-section">
                        <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><rect x="3" y="14" width="4" height="7" rx="1" opacity="0.5"/><rect x="10" y="8" width="4" height="13" rx="1" opacity="0.7"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg> Score Tracking</div>
                        <div style="background-color: var(--card); padding: 1rem; border-radius: 0.5rem;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem;">
                                <span>Current:</span>
                                <span style="color: var(--green); font-weight: 700;">${S.playScore}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span>Personal Best:</span>
                                <span style="color: var(--cyan); font-weight: 700;">${S.playPersonalBest}</span>
                            </div>
                        </div>
                    </div>
                    <div class="panel-section">
                        <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><path d="M12 23c-4.97 0-8-3.58-8-7.5 0-3.07 2.17-5.84 4.5-7.5-.28 2.5 1.5 4.5 1.5 4.5s2-2.5 2-5.5c0-1.5-.5-3-1-4 3 1.5 5 4 5 7 0 .5-.08 1-.08 1s1.08-1.18 1.58-2.5C19.78 11.72 20 14.5 20 15.5c0 3.92-3.03 7.5-8 7.5z"/></svg> Streak Bonus</div>
                        <div class="panel-content">
                            Get 5 in a row for +5 bonus points!
                        </div>
                    </div>
                `;
            }

            document.getElementById('sidePanel').innerHTML = html;
        }

        function render() {
            // Update active tab
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.mode === S.mode) {
                    tab.classList.add('active');
                }
            });

            // Update active difficulty
            document.querySelectorAll('.vinculum-diff-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.difficulty === S.difficulty) {
                    btn.classList.add('active');
                }
            });

            // Render main content
            if (S.mode === 'explore') {
                renderExplore();
            } else if (S.mode === 'practice') {
                renderPractice();
            } else if (S.mode === 'play') {
                renderPlay();
            }

            renderSidePanel();
        }

        // Event listeners
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                S.mode = e.target.dataset.mode;
                S.practiceCorrect = 0;
                S.practiceTotal = 0;
                S.practiceCurrentProblem = null;
                S.playScore = 0;
                S.playStreak = 0;
                S.playCurrentProblem = null;
                clearInterval(S.practiceTimer);
                render();
            });
        });

        document.querySelectorAll('.vinculum-diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                S.difficulty = e.target.dataset.difficulty;
                S.practiceCurrentProblem = null;
                S.playCurrentProblem = null;
                render();
            });
        });

        // Initial render
        render();
    </script>
