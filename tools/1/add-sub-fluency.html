<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCULUM — Add & Sub Fluency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vinculum-core.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme system loaded from vinculum-core.css */
.vinculum-rtm-btn .rtm-icon{font-size:14px;}

/* ═══ FOCUS VISIBLE (Keyboard Navigation) ═══ */
*:focus-visible {
  outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px;
}
.sr-only {
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

        html, body {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* ===== HEADER ===== */
        



        

        

        .badge {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--cyan);
            padding: 0.35rem 0.7rem;
            border-radius: 0.35rem;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .tags {
            display: flex;
            gap: 0.5rem;
        }

        .tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
            padding: 0.25rem 0.6rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
        }

        

        .difficulty-select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.8rem;
            border-radius: 0.35rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .difficulty-select:hover {
            border-color: var(--cyan);
        }

        /* ===== MODE TABS ===== */
        .tabs {
            display: flex;
            padding: 1rem 1.5rem;
            gap: 0.5rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }

        .tab-button {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text2);
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: var(--grad);
            border: 1px solid var(--cyan);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .tab-button:hover:not(.active) {
            border-color: var(--cyan);
            color: var(--text);
        }

        /* ===== MAIN WORKSPACE ===== */
        .workspace-container {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 1rem;
            padding: 1.5rem;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .side-panel {
            width: 280px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ===== EXPLORE MODE ===== */
        .strategy-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .strategy-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 0.6rem 1rem;
            border-radius: 0.4rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .strategy-btn.active {
            background: var(--cyan);
            color: var(--bg);
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .strategy-btn:hover {
            border-color: var(--cyan);
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            background: rgba(0, 212, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            margin-bottom: 2rem;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .equation-display {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
            padding: 1rem;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }

        /* ===== PRACTICE MODE ===== */
        .problem-display {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 2rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .strategy-hint {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .strategy-choice {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .strategy-choice .strategy-btn {
            flex: 1;
            min-width: 120px;
        }

        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .answer-btn {
            padding: 1rem;
            background: var(--card2);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 0.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .answer-btn:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .answer-btn.correct {
            background: var(--green);
            color: var(--bg);
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
        }

        .answer-btn.incorrect {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .number-line-container {
            margin: 1.5rem 0;
            background: rgba(0, 212, 255, 0.05);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }

        /* ===== PLAY MODE ===== */
        .play-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .score-board {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .score-item {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .score-label {
            color: var(--text2);
            font-size: 0.9rem;
        }

        .score-value {
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
        }

        .timer-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .timer-bar {
            width: 100%;
            height: 8px;
            background: var(--card2);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--yellow), var(--pink));
            width: 100%;
            transition: width 0.1s linear;
        }

        .timer-text {
            color: var(--text2);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 700;
            color: var(--yellow);
            animation: celebrateFloat 2s ease-out forwards;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes celebrateFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%) scale(1.5);
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        /* ===== SIDE PANEL ===== */
        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .panel-text {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.5;
        }

        .panel-section {
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .panel-section:last-child {
            border-bottom: none;
        }

        .hint-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid var(--yellow);
            padding: 0.75rem;
            border-radius: 0.25rem;
            margin-top: 0.5rem;
        }

        .hint-box-text {
            font-size: 0.8rem;
            color: var(--yellow);
        }

        /* ===== UTILITIES ===== */
        .hidden {
            display: none !important;
        }

        .progress-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
        }

        svg {
            overflow: visible;
        }

        /* ===== SCROLLBAR ===== */
        .workspace::-webkit-scrollbar,
        .side-panel::-webkit-scrollbar {
            width: 6px;
        }

        .workspace::-webkit-scrollbar-track,
        .side-panel::-webkit-scrollbar-track {
            background: var(--bg2);
            border-radius: 3px;
        }

        .workspace::-webkit-scrollbar-thumb,
        .side-panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .workspace::-webkit-scrollbar-thumb:hover,
        .side-panel::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .workspace-container {
                flex-direction: column;
            }

            .side-panel {
                width: 100%;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="vinculum-header">
            <div class="vinculum-header-left">
                
      <a class="vinculum-back-btn" href="../../VINCULUM-Hub.html" style="text-decoration:none;">◀ Hub</a>
      <div class="vinculum-header-title"><span>VINCULUM</span> Add & Sub Fluency</div>
                <div class="badge">1.OA</div>
                <div class="tags">
                    <div class="tag">1.OA.C.5</div>
                    <div class="tag">1.OA.C.6</div>
                </div>
            </div>
            <div class="vinculum-header-right">
                <select class="difficulty-select" id="difficulty" style="min-width: 180px;">
                    <option value="emergent">Emergent (0-10)</option>
                    <option value="proficient" selected>Proficient (0-20)</option>
                    <option value="advanced">Advanced (0-20)</option>
                </select>
            </div>
        </div>

        <!-- MODE TABS -->
        <div class="tabs">
            <button class="tab-button active" data-mode="explore">Explore</button>
            <button class="tab-button" data-mode="practice">Practice</button>
            <button class="tab-button" data-mode="play">Play</button>
        </div>

        <!-- MAIN WORKSPACE -->
        <div class="workspace-container">
            <div class="workspace" role="main" id="workspace"></div>
            <div class="side-panel" id="sidePanel"></div>
        </div>
    </div>

<div class="feedback" id="feedback"></div>
        <script src="../../vinculum-input.js"></script>
    <script>
        // ===== STATE MANAGEMENT =====
        const S = {
            mode: 'explore',
            difficulty: 'proficient',
            strategy: 'countOn',
            currentProblem: null,
            chosenStrategy: null,
            answered: false,
            answerCorrect: null,
            playScore: 0,
            playStreak: 0,
            playCorrect: 0,
            playTimer: 5,
            playActive: false,
            animating: false
        };

        const STRATEGIES = {
            countOn: {
                name: 'Count On',
                explain: 'Start at the bigger number and count up by the smaller amount.',
                when: 'Good for addition when both numbers are small.',
                emoji: '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" opacity="0.7"/><circle cx="12" cy="9" r="2.5" fill="white"/></svg>'
            },
            countBack: {
                name: 'Count Back',
                explain: 'Start at the first number and count backwards by the second amount.',
                when: 'Works well for subtraction with small numbers.',
                emoji: '⬅️'
            },
            makeA10: {
                name: 'Make a 10',
                explain: 'Break one number apart to make 10, then add the rest.',
                when: 'Helpful when one number is close to 10.',
                emoji: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><rect x="2" y="7" width="20" height="10" rx="1.5"/><line x1="6.8" y1="7" x2="6.8" y2="17" stroke-width="1"/><line x1="11.6" y1="7" x2="11.6" y2="17" stroke-width="1"/><line x1="16.4" y1="7" x2="16.4" y2="17" stroke-width="1"/><line x1="2" y1="12" x2="22" y2="12" stroke-width="1"/></svg>'
            },
            doubles: {
                name: 'Doubles',
                explain: 'When both numbers are the same, double that number.',
                when: 'Fast strategy for problems like 6+6 or 7+7.',
                emoji: '🪞'
            },
            nearDoubles: {
                name: 'Near Doubles',
                explain: 'Use a doubles fact you know, then add or subtract 1.',
                when: 'Great when numbers are almost equal (7+8, 9+10).',
                emoji: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="7" x2="12" y2="17" stroke-linecap="round"/><line x1="7" y1="12" x2="17" y2="12" stroke-linecap="round"/></svg>'
            }
        };

        // ===== PROBLEM GENERATION =====
        function getMaxNumber() {
            return S.difficulty === 'emergent' ? 10 : 20;
        }

        function generateProblem() {
            const max = getMaxNumber();
            const type = Math.random() > 0.5 ? 'add' : 'sub';
            let a, b;

            if (type === 'add') {
                a = Math.floor(Math.random() * (max + 1));
                b = Math.floor(Math.random() * (max + 1 - a));
            } else {
                a = Math.floor(Math.random() * (max + 1));
                b = Math.floor(Math.random() * (a + 1));
            }

            return {
                a,
                b,
                type,
                answer: type === 'add' ? a + b : a - b
            };
        }

        function getProblemString(problem) {
            const op = problem.type === 'add' ? '+' : '−';
            return `${problem.a} ${op} ${problem.b}`;
        }

        // ===== CANVAS UTILITIES =====
        function createCanvas(w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            return canvas;
        }

        // ===== EXPLORE MODE RENDERING =====
        function drawNumberLine(canvas, start, end, highlight, hops) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const lineY = h / 2;
            const padding = 40;
            const lineWidth = w - 2 * padding;

            // Draw line
            ctx.strokeStyle = 'rgba(139, 156, 192, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, lineY);
            ctx.lineTo(w - padding, lineY);
            ctx.stroke();

            // Draw ticks and numbers
            const range = end - start;
            for (let i = 0; i <= range; i++) {
                const x = padding + (i / range) * lineWidth;
                const num = start + i;

                // Tick
                ctx.strokeStyle = num === highlight ? 'rgba(0, 212, 255, 0.8)' : 'rgba(139, 156, 192, 0.3)';
                ctx.lineWidth = num === highlight ? 3 : 1;
                ctx.beginPath();
                ctx.moveTo(x, lineY - 8);
                ctx.lineTo(x, lineY + 8);
                ctx.stroke();

                // Number
                ctx.fillStyle = num === highlight ? 'rgba(0, 212, 255, 1)' : 'rgba(139, 156, 192, 0.7)';
                ctx.font = 'bold 12px Inter';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(num, x, lineY + 15);
            }

            // Draw hops if provided
            if (hops && hops.length > 0) {
                hops.forEach((hop, idx) => {
                    const x1 = padding + ((hop.from - start) / range) * lineWidth;
                    const x2 = padding + ((hop.to - start) / range) * lineWidth;

                    ctx.strokeStyle = 'rgba(255, 59, 139, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x1, lineY - 25 - idx * 20, 8, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.strokeStyle = 'rgba(255, 59, 139, 0.8)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(x1 + 10, lineY - 25 - idx * 20);
                    ctx.lineTo(x2 - 10, lineY - 25 - idx * 20);
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(255, 59, 139, 0.8)';
                    ctx.beginPath();
                    ctx.moveTo(x2, lineY - 25 - idx * 20);
                    ctx.lineTo(x2 - 6, lineY - 30 - idx * 20);
                    ctx.lineTo(x2 - 6, lineY - 20 - idx * 20);
                    ctx.fill();
                });
            }
        }

        function drawTenFrame(canvas, filled, col, row) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const cellSize = Math.min(w / (col + 1), h / (row + 2)) - 5;
            const offsetX = (w - col * cellSize) / 2;
            const offsetY = (h - row * cellSize) / 2;

            let idx = 0;
            for (let r = 0; r < row; r++) {
                for (let c = 0; c < col; c++) {
                    const x = offsetX + c * cellSize + cellSize / 2;
                    const y = offsetY + r * cellSize + cellSize / 2;
                    const isFilled = idx < filled;

                    ctx.fillStyle = isFilled ? 'rgba(0, 230, 118, 0.9)' : 'rgba(139, 156, 192, 0.2)';
                    ctx.beginPath();
                    ctx.arc(x, y, cellSize * 0.3, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x - cellSize / 2, y - cellSize / 2, cellSize, cellSize);

                    idx++;
                }
            }
        }

        function animateExplore() {
            const problem = S.currentProblem;
            const canvas = document.querySelector('.canvas-container canvas');
            if (!canvas) return;

            const strategy = S.strategy;

            switch (strategy) {
                case 'countOn':
                    animateCountOn(canvas, problem);
                    break;
                case 'countBack':
                    animateCountBack(canvas, problem);
                    break;
                case 'makeA10':
                    animateMakeA10(canvas, problem);
                    break;
                case 'doubles':
                    animateDoubles(canvas, problem);
                    break;
                case 'nearDoubles':
                    animateNearDoubles(canvas, problem);
                    break;
            }
        }

        function animateCountOn(canvas, problem) {
            if (!problem || problem.type !== 'add') {
                S.currentProblem = generateProblem();
                if (S.currentProblem.type !== 'add') return animateCountOn(canvas, null);
            }

            const a = problem.a;
            const b = problem.b;
            const max = Math.max(20, a + b + 2);

            let frame = 0;
            const frames = b + 1;

            function draw() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const hops = [];
                for (let i = 0; i < frame; i++) {
                    hops.push({ from: a + i, to: a + i + 1 });
                }

                drawNumberLine(canvas, 0, max, a + frame, hops);
                frame++;

                if (frame <= frames) {
                    setTimeout(draw, 500);
                } else {
                    updateEquationDisplay(problem);
                }
            }

            draw();
        }

        function animateCountBack(canvas, problem) {
            if (!problem || problem.type !== 'sub') {
                S.currentProblem = generateProblem();
                if (S.currentProblem.type !== 'sub') return animateCountBack(canvas, null);
            }

            const a = problem.a;
            const b = problem.b;

            let frame = 0;
            const frames = b + 1;

            function draw() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const hops = [];
                for (let i = 0; i < frame; i++) {
                    hops.push({ from: a - i, to: a - i - 1 });
                }

                drawNumberLine(canvas, 0, Math.max(20, a + 2), a - frame, hops);
                frame++;

                if (frame <= frames) {
                    setTimeout(draw, 500);
                } else {
                    updateEquationDisplay(problem);
                }
            }

            draw();
        }

        function animateMakeA10(canvas, problem) {
            if (!problem || problem.type !== 'add') {
                S.currentProblem = generateProblem();
                if (S.currentProblem.type !== 'add') return animateMakeA10(canvas, null);
            }

            const a = problem.a;
            const b = problem.b;
            const toAdd = Math.max(0, 10 - a);
            const remaining = b - toAdd;

            let phase = 0;

            function draw() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const frameW = canvas.width / 2 - 10;
                const frameH = canvas.height;

                ctx.save();
                ctx.translate(10, 0);
                ctx.fillStyle = 'rgba(0, 212, 255, 0.1)';
                ctx.fillRect(0, 0, frameW, frameH);
                const filledFrame1 = phase === 0 ? a : 10;
                drawTenFrame(createCanvas(frameW, frameH), filledFrame1, 5, 2);
                ctx.restore();

                ctx.save();
                ctx.translate(frameW + 20, 0);
                ctx.fillStyle = 'rgba(179, 136, 255, 0.1)';
                ctx.fillRect(0, 0, frameW, frameH);
                const filledFrame2 = phase === 0 ? b : (phase === 1 ? remaining : 0);
                const tenFrameCanvas = createCanvas(frameW, frameH);
                drawTenFrame(tenFrameCanvas, filledFrame2, 5, 2);
                const img = tenFrameCanvas.getContext('2d').getImageData(0, 0, frameW, frameH);
                ctx.putImageData(img, 0, 0);
                ctx.restore();

                phase++;
                if (phase <= 2) {
                    setTimeout(draw, 800);
                } else {
                    updateEquationDisplay(problem);
                }
            }

            draw();
        }

        function animateDoubles(canvas, problem) {
            const a = Math.floor(Math.random() * (getMaxNumber() / 2 + 1));
            S.currentProblem = { a, b: a, type: 'add', answer: a * 2 };
            const p = S.currentProblem;

            let phase = 0;

            function draw() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const w = canvas.width / 2 - 10;
                const h = canvas.height;

                if (phase === 0 || phase === 1) {
                    ctx.translate(5, 0);
                    drawTenFrame(canvas, p.a, 5, 2);
                    ctx.translate(w + 10, 0);
                    drawTenFrame(canvas, p.b, 5, 2);
                    ctx.translate(-w - 15, 0);
                }

                ctx.font = 'bold 48px Inter';
                ctx.fillStyle = 'rgba(0, 230, 118, 0.8)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                if (phase >= 2) {
                    ctx.fillText(p.answer, canvas.width / 2, canvas.height / 2);
                }

                phase++;
                if (phase <= 3) {
                    setTimeout(draw, 600);
                } else {
                    updateEquationDisplay(p);
                }
            }

            draw();
        }

        function animateNearDoubles(canvas, problem) {
            const a = Math.floor(Math.random() * (getMaxNumber() / 2));
            S.currentProblem = { a, b: a + 1, type: 'add', answer: a * 2 + 1 };
            const p = S.currentProblem;

            let phase = 0;

            function draw() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const w = canvas.width / 3 - 5;
                const h = canvas.height;

                // First number (doubles part)
                ctx.translate(5, 0);
                drawTenFrame(canvas, p.a, 5, 2);

                // Second number with extra
                ctx.translate(w + 10, 0);
                drawTenFrame(canvas, p.b, 5, 2);

                // Extra 1
                ctx.translate(w + 10, 0);
                ctx.fillStyle = phase >= 1 ? 'rgba(255, 193, 7, 0.9)' : 'rgba(255, 193, 7, 0.3)';
                ctx.beginPath();
                ctx.arc(w / 2, h / 2, 20, 0, Math.PI * 2);
                ctx.fill();

                ctx.font = 'bold 24px Inter';
                ctx.fillStyle = 'rgba(255, 193, 7, 1)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('+1', w / 2, h / 2);

                ctx.translate(-2 * w - 20, 0);
                if (phase >= 2) {
                    ctx.font = 'bold 48px Inter';
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.8)';
                    ctx.fillText(p.answer, canvas.width / 2, 30);
                }

                phase++;
                if (phase <= 3) {
                    setTimeout(draw, 600);
                } else {
                    updateEquationDisplay(p);
                }
            }

            draw();
        }

        function updateEquationDisplay(problem) {
            const eqEl = document.querySelector('.equation-display');
            if (eqEl) {
                const op = problem.type === 'add' ? '+' : '−';
                eqEl.textContent = `${problem.a} ${op} ${problem.b} = ${problem.answer}`;
            }
        }

        // ===== PRACTICE MODE =====
        function generateAnswerChoices(problem) {
            const choices = [problem.answer];
            const max = getMaxNumber();

            while (choices.length < 4) {
                let wrong = Math.floor(Math.random() * (max + 1));
                if (!choices.includes(wrong)) {
                    choices.push(wrong);
                }
            }

            return choices.sort(() => Math.random() - 0.5);
        }

        // ===== PLAY MODE =====
        function startPlayRound() {
            S.playActive = true;
            S.playTimer = 5;
            S.currentProblem = generateProblem();
            S.answered = false;
            S.answerCorrect = null;

            const timerFill = document.querySelector('.timer-fill');
            if (timerFill) {
                timerFill.style.width = '100%';
            }

            const interval = setInterval(() => {
                S.playTimer -= 0.05;

                if (timerFill) {
                    timerFill.style.width = (S.playTimer / 5) * 100 + '%';
                }

                if (S.playTimer <= 0) {
                    clearInterval(interval);
                    S.playActive = false;
                    S.answered = true;
                    S.answerCorrect = false;
                    render();
                    setTimeout(() => {
                        startPlayRound();
                    }, 1000);
                }
            }, 50);
        }

        // ===== RENDERING =====
        function render() {
            const workspace = document.getElementById('workspace');
            const sidePanel = document.getElementById('sidePanel');

            workspace.innerHTML = '';
            sidePanel.innerHTML = '';

            switch (S.mode) {
                case 'explore':
                    renderExplore(workspace, sidePanel);
                    break;
                case 'practice':
                    renderPractice(workspace, sidePanel);
                    break;
                case 'play':
                    renderPlay(workspace, sidePanel);
                    break;
            }
        }

        function renderExplore(workspace, sidePanel) {
            if (!S.currentProblem) {
                S.currentProblem = generateProblem();
                if (S.currentProblem.type !== 'add') {
                    S.strategy = 'countBack';
                }
            }

            workspace.innerHTML = `
                <div class="strategy-selector" id="strategySelector">
                    <button class="strategy-btn ${S.strategy === 'countOn' ? 'active' : ''}" data-strategy="countOn">
                        ${STRATEGIES.countOn.emoji} Count On
                    </button>
                    <button class="strategy-btn ${S.strategy === 'countBack' ? 'active' : ''}" data-strategy="countBack">
                        ${STRATEGIES.countBack.emoji} Count Back
                    </button>
                    <button class="strategy-btn ${S.strategy === 'makeA10' ? 'active' : ''}" data-strategy="makeA10">
                        ${STRATEGIES.makeA10.emoji} Make a 10
                    </button>
                    <button class="strategy-btn ${S.strategy === 'doubles' ? 'active' : ''}" data-strategy="doubles">
                        ${STRATEGIES.doubles.emoji} Doubles
                    </button>
                    <button class="strategy-btn ${S.strategy === 'nearDoubles' ? 'active' : ''}" data-strategy="nearDoubles">
                        ${STRATEGIES.nearDoubles.emoji} Near Doubles
                    </button>
                </div>
                <div class="canvas-container">
                    <canvas id="exploreCanvas" width="600" height="300"></canvas>
                </div>
                <div class="equation-display">Tap a strategy to see it in action</div>
            `;

            document.querySelectorAll('.strategy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    S.strategy = e.target.closest('.strategy-btn').dataset.strategy;
                    S.answered = false;
                    S.currentProblem = generateProblem();
                    render();
                    setTimeout(animateExplore, 100);
                });
            });

            sidePanel.innerHTML = `
                <div class="panel-section">
                    <div class="panel-title">${STRATEGIES[S.strategy].emoji} ${STRATEGIES[S.strategy].name}</div>
                    <div class="panel-text">${STRATEGIES[S.strategy].explain}</div>
                </div>
                <div class="panel-section">
                    <div class="panel-title">When to use it</div>
                    <div class="panel-text">${STRATEGIES[S.strategy].when}</div>
                </div>
                <div class="hint-box">
                    <div class="hint-box-text"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg> Watch the animation above to see how this strategy works step by step.</div>
                </div>
            `;

            setTimeout(animateExplore, 100);
        }

        function renderPractice(workspace, sidePanel) {
            if (!S.currentProblem) {
                S.currentProblem = generateProblem();
                S.chosenStrategy = null;
                S.answered = false;
                S.answerCorrect = null;
            }

            const problem = S.currentProblem;
            const choices = generateAnswerChoices(problem);

            workspace.innerHTML = `
                <div class="problem-display">${getProblemString(problem)}</div>

                ${S.difficulty !== 'advanced' ? `
                    <div class="strategy-hint">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M9 18h6M10 21h4"/><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z" fill="currentColor" opacity="0.15"/><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></svg> Pick a strategy, then try to solve it!
                    </div>
                ` : ''}

                <div class="strategy-choice">
                    <button class="strategy-btn" data-strategy="countOn">Count On</button>
                    <button class="strategy-btn" data-strategy="countBack">Count Back</button>
                    <button class="strategy-btn" data-strategy="makeA10">Make a 10</button>
                    <button class="strategy-btn" data-strategy="doubles">Doubles</button>
                </div>

                <div class="answers">
                    ${choices.map(choice => `
                        <button class="answer-btn" data-answer="${choice}">
                            ${choice}
                        </button>
                    `).join('')}
                </div>

                ${S.answered ? `
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <button class="strategy-btn" style="background: var(--cyan); color: var(--bg); border-color: var(--cyan); cursor: pointer; padding: 0.8rem 1.5rem; font-size: 1rem;">
                            Next Problem →
                        </button>
                    </div>
                ` : ''}
            `;

            document.querySelectorAll('.strategy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    S.chosenStrategy = e.target.dataset.strategy;
                    render();
                });
            });

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (S.answered) return;

                    const answer = parseInt(e.target.dataset.answer);
                    S.answered = true;
                    S.answerCorrect = answer === problem.answer;

                    if (S.answerCorrect) {
                        showFB('✓ Correct!','correct');
                        e.target.classList.add('correct');
                    } else {
                        showFB('Try again!','incorrect');
                        e.target.classList.add('incorrect');
                    }

                    render();
                });
            });

            document.querySelector('.strategy-btn:last-of-type')?.addEventListener('click', () => {
                S.currentProblem = generateProblem();
                S.chosenStrategy = null;
                S.answered = false;
                S.answerCorrect = null;
                render();
            });

            sidePanel.innerHTML = `
                <div class="panel-section">
                    <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M12 5C10 3 6 3 3 4v16c3-1 7-1 9 1 2-2 6-2 9-1V4c-3-1-7-1-9 1z" fill="currentColor" opacity="0.1"/><line x1="12" y1="5" x2="12" y2="21"/></svg> Strategy Guide</div>
                    ${S.chosenStrategy ? `
                        <div class="panel-text">${STRATEGIES[S.chosenStrategy].explain}</div>
                        <div class="hint-box" style="margin-top: 1rem;">
                            <div class="hint-box-text">${STRATEGIES[S.chosenStrategy].when}</div>
                        </div>
                    ` : `
                        <div class="panel-text">Pick a strategy above to see tips for solving this problem.</div>
                    `}
                </div>
                <div class="panel-section">
                    <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;" opacity="0.7"><path d="M3 18v-4a4 4 0 014-4h2l2-4 3 1-1 3h3a3 3 0 013 3v5a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> Difficulty</div>
                    <div class="panel-text">
                        ${S.difficulty === 'emergent' ? 'Numbers up to 10' : S.difficulty === 'proficient' ? 'Numbers up to 20' : 'Numbers up to 20, speed round'}
                    </div>
                </div>
            `;
        }

        function renderPlay(workspace, sidePanel) {
            if (!S.currentProblem) {
                startPlayRound();
            }

            const problem = S.currentProblem;
            const choices = generateAnswerChoices(problem);

            workspace.innerHTML = `
                <div class="play-header">
                    <div class="score-board">
                        <div class="score-item">
                            <span class="score-label">Correct:</span>
                            <span class="score-value">${S.playCorrect}</span>
                        </div>
                        <div class="score-item">
                            <span class="score-label">Streak:</span>
                            <span class="score-value">${S.playStreak}</span>
                        </div>
                        <div class="score-item">
                            <span class="score-label">Score:</span>
                            <span class="score-value">${S.playScore}</span>
                        </div>
                    </div>
                </div>

                <div class="problem-display">${getProblemString(problem)}</div>

                <div class="timer-container">
                    <div class="timer-bar">
                        <div class="timer-fill"></div>
                    </div>
                    <div class="timer-text">${Math.max(0, S.playTimer).toFixed(1)}s</div>
                </div>

                <div class="answers">
                    ${choices.map(choice => `
                        <button class="answer-btn" data-answer="${choice}" ${!S.playActive ? 'disabled' : ''}>
                            ${choice}
                        </button>
                    `).join('')}
                </div>

                ${S.answered && !S.playActive ? `
                    <div style="text-align: center; margin-top: 1.5rem; padding: 1rem; background: ${S.answerCorrect ? 'rgba(0, 230, 118, 0.1)' : 'rgba(255, 59, 139, 0.1)'}; border-radius: 0.5rem; border: 1px solid ${S.answerCorrect ? 'var(--green)' : 'var(--pink)'};">
                        <div style="color: ${S.answerCorrect ? 'var(--green)' : 'var(--pink)'}; font-weight: 700; font-size: 1.1rem;">
                            ${S.answerCorrect ? '✓ Correct!' : '✗ Try again'}
                        </div>
                    </div>
                ` : ''}
            `;

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (!S.playActive || S.answered) return;

                    const answer = parseInt(e.target.dataset.answer);
                    S.answered = true;
                    S.answerCorrect = answer === problem.answer;

                    if (S.answerCorrect) {
                        S.playCorrect++;
                        S.playStreak++;
                        const basePts = 10;
                        const streakBonus = S.playStreak >= 5 ? 5 : 0;
                        S.playScore += basePts + streakBonus;

                        if (S.playCorrect % 10 === 0) {
                            createCelebration('<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><polygon points="12,1 14,9 22,9 16,14 18,22 12,17 6,22 8,14 2,9 10,9" opacity="0.8"/></svg>');
                        }
                        if (S.playCorrect % 25 === 0) {
                            createCelebration('<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;" opacity="0.7"><path d="M12 2s-4 4-4 10c0 2 .5 4 1 5h6c.5-1 1-3 1-5 0-6-4-10-4-10z"/><circle cx="12" cy="10" r="2" fill="white"/><path d="M7 17l-2 4h4zM17 17l2 4h-4z" opacity="0.5"/></svg>');
                        }
                        if (S.playCorrect % 50 === 0) {
                            createCelebration('<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><polygon points="12,2 15,9 22,9.5 17,14.5 18.5,22 12,18 5.5,22 7,14.5 2,9.5 9,9"/></svg>');
                        }
                    } else {
                        S.playStreak = 0;
                    }

                    render();

                    setTimeout(() => {
                        startPlayRound();
                    }, 1500);
                });
            });

            sidePanel.innerHTML = `
                <div class="panel-section">
                    <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><rect x="2" y="7" width="20" height="10" rx="5" fill="currentColor" opacity="0.15"/><line x1="7" y1="10" x2="7" y2="14"/><line x1="5" y1="12" x2="9" y2="12"/><circle cx="16" cy="11" r="1" fill="currentColor"/><circle cx="18" cy="13" r="1" fill="currentColor"/></svg> Speed Round</div>
                    <div class="panel-text">Answer as many as you can in 5 seconds per problem!</div>
                </div>
                <div class="panel-section">
                    <div class="panel-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M6 4h12v2a6 6 0 01-12 0V4z" fill="currentColor" opacity="0.2"/><path d="M6 4h12v2a6 6 0 01-12 0V4z"/><path d="M6 6H3v2a3 3 0 003 3"/><path d="M18 6h3v2a3 3 0 01-3 3"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="8" y1="18" x2="16" y2="18" stroke-linecap="round"/></svg> Scoring</div>
                    <div class="panel-text">Base: 10 points</div>
                    <div class="hint-box" style="margin-top: 0.75rem;">
                        <div class="hint-box-text">Streak bonus: +5 after 5 in a row!</div>
                    </div>
                </div>
                <div class="panel-section">
                    <div class="panel-title">Milestones</div>
                    <div class="panel-text">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><polygon points="12,1 14,9 22,9 16,14 18,22 12,17 6,22 8,14 2,9 10,9" opacity="0.8"/></svg> at 10 correct<br>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;" opacity="0.7"><path d="M12 2s-4 4-4 10c0 2 .5 4 1 5h6c.5-1 1-3 1-5 0-6-4-10-4-10z"/><circle cx="12" cy="10" r="2" fill="white"/><path d="M7 17l-2 4h4zM17 17l2 4h-4z" opacity="0.5"/></svg> at 25 correct<br>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;"><polygon points="12,2 15,9 22,9.5 17,14.5 18.5,22 12,18 5.5,22 7,14.5 2,9.5 9,9"/></svg> at 50 correct
                    </div>
                </div>
            `;
        }

        function createCelebration(emoji) {
            const celebration = document.createElement('div');
            celebration.className = 'celebration';
            celebration.textContent = emoji;
            document.body.appendChild(celebration);

            setTimeout(() => celebration.remove(), 2000);
        }

        // ===== EVENT LISTENERS =====
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                S.mode = e.target.dataset.mode;
                S.currentProblem = null;
                S.answered = false;
                S.answerCorrect = null;

                if (S.mode === 'play') {
                    S.playScore = 0;
                    S.playStreak = 0;
                    S.playCorrect = 0;
                }

                render();
            });
        });

        document.getElementById('difficulty').addEventListener('change', (e) => {
            S.difficulty = e.target.value;
            S.currentProblem = null;
            S.answered = false;
            S.answerCorrect = null;
            render();
        });

        // ===== INITIAL RENDER =====
        render();
    </script>
