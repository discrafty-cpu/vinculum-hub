<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radical Functions — VINCULUM ALG2</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .vinculum-header { display: flex; align-items: center; gap: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
    .back-btn { background: none; border: none; color: var(--cyan); cursor: pointer; padding: 0.5rem; font-size: 0.9rem; }
    .back-btn:hover { color: var(--green); transform: translateX(-3px); }
    .header-title { margin: 0; font-size: 1.75rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .badge { font-size: 0.7rem; padding: 0.35rem 0.7rem; border-radius: 0.35rem; background: rgba(0,217,255,0.15); color: var(--cyan); border: 1px solid; text-transform: uppercase; }
    .tag { background: rgba(0,255,136,0.15); color: var(--green); border-color: var(--green); }
    .tabs { display: flex; gap: 0.5rem; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .tab-btn { padding: 0.75rem 1.5rem; background: none; border: none; color: var(--text2); cursor: pointer; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .main-layout { display: flex; gap: 1.5rem; }
    .workspace { flex: 1; display: flex; flex-direction: column; gap: 1.5rem; }
    .side-panel { width: 280px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--cyan); margin-bottom: 1rem; }
    svg { width: 100%; height: auto; }
    .graph-container { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; }
    .slider-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .slider-label { font-size: 0.85rem; color: var(--text2); display: flex; justify-content: space-between; }
    input[type="range"] { width: 100%; }
    .info-box { background: var(--bg2); border-left: 3px solid var(--cyan); border-radius: 0.5rem; padding: 0.75rem; font-size: 0.85rem; margin-bottom: 0.75rem; }
    .info-value { color: var(--cyan); font-weight: 600; font-family: monospace; }
    .difficulty-selector { display: flex; gap: 0.5rem; }
    .diff-btn { flex: 1; padding: 0.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; }
    .diff-btn.active { background: var(--cyan); color: var(--bg); }
    .practice-container { display: flex; flex-direction: column; gap: 1rem; }
    .problem-display { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; text-align: center; font-family: monospace; }
    .problem-display .equation { color: var(--cyan); font-weight: 600; margin-bottom: 1rem; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .option-btn { padding: 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; font-family: monospace; }
    .option-btn.correct { background: var(--green); color: var(--bg); }
    .option-btn.incorrect { background: var(--pink); color: var(--bg); }
    .feedback { padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; display: none; border-left: 4px solid; }
    .feedback.show { display: block; }
    .feedback.correct { background: rgba(0,255,136,0.15); border-left-color: var(--green); color: var(--green); }
    .feedback.incorrect { background: rgba(255,0,110,0.15); border-left-color: var(--pink); color: var(--pink); }
    .score-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; text-align: center; }
    .score-value { font-size: 2rem; font-weight: 700; color: var(--green); font-family: monospace; }
    .btn { padding: 0.75rem 1.5rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; }
    .btn:hover { background: var(--green); }
    .btn.secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="container">
    <div class="vinculum-header">
      <a href="../../VINCULUM-Hub.html" class="back-btn">← Back</a>
      <div>
        <h1 class="header-title"><span style="color: var(--cyan);">RADICAL</span> Functions</h1>
        <div class="header-badges">
          <span class="badge">A-REI.2</span>
          <span class="badge">F-IF.7b</span>
          <span class="badge">N-RN.2</span>
          <span class="tag">ALG2</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(event, 'explore')">Explore</button>
      <button class="tab-btn" onclick="switchTab(event, 'practice')">Practice</button>
      <button class="tab-btn" onclick="switchTab(event, 'play')">Play</button>
    </div>

    <div id="explore" class="tab-content active">
      <div class="main-layout">
        <div class="workspace">
          <div class="card">
            <div class="card-title">Radical Function Grapher</div>
          </div>
          <div class="card graph-container">
            <svg id="graphSVG" viewBox="-350 -300 700 600" style="height: 400px;">
              <g stroke="var(--border)" stroke-width="0.5" opacity="0.3">
                <line x1="-300" y1="0" x2="300" y2="0" stroke="var(--cyan)" stroke-width="1" opacity="0.5"/>
                <line x1="0" y1="-300" x2="0" y2="300" stroke="var(--cyan)" stroke-width="1" opacity="0.5"/>
              </g>
              <path id="sqrtPath" stroke="var(--cyan)" stroke-width="2" fill="none"/>
              <line id="domainLine" x1="-300" y1="0" x2="300" y2="0" stroke="var(--pink)" stroke-width="1" opacity="0.5"/>
              <circle id="startPoint" cx="0" cy="0" r="4" fill="var(--pink)"/>
            </svg>
          </div>
        </div>
        <div class="side-panel">
          <div class="card">
            <div class="card-title">Parameters</div>
            <div class="slider-group">
              <div class="slider-label"><span>a (amplitude)</span><span class="slider-value" id="valA">1</span></div>
              <input type="range" id="sliderA" min="0.5" max="3" value="1" step="0.25" oninput="updateGraphs()">
            </div>
            <div class="slider-group">
              <div class="slider-label"><span>h (shift x)</span><span class="slider-value" id="valH">0</span></div>
              <input type="range" id="sliderH" min="-5" max="5" value="0" step="0.5" oninput="updateGraphs()">
            </div>
            <div class="slider-group">
              <div class="slider-label"><span>k (shift y)</span><span class="slider-value" id="valK">0</span></div>
              <input type="range" id="sliderK" min="-5" max="5" value="0" step="0.5" oninput="updateGraphs()">
            </div>
            <div class="info-box">
              <div class="info-value" id="funcForm">y = √(x)</div>
            </div>
            <div class="info-box">
              <div class="info-label">Domain</div>
              <div class="info-value" id="domainInfo">x ≥ 0</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="practice" class="tab-content">
      <div class="main-layout">
        <div class="workspace">
          <div class="card">
            <div class="difficulty-selector">
              <button class="diff-btn active" onclick="setPracticeDifficulty('easy')">Easy</button>
              <button class="diff-btn" onclick="setPracticeDifficulty('medium')">Medium</button>
              <button class="diff-btn" onclick="setPracticeDifficulty('hard')">Hard</button>
            </div>
          </div>
          <div class="practice-container">
            <div class="problem-display" id="problemDisplay">Select difficulty</div>
            <div class="options-grid" id="optionsGrid" style="display: none;"></div>
            <div class="feedback" id="feedback"></div>
            <button class="btn" onclick="nextProblem()" id="nextBtn" style="display: none;">Next</button>
          </div>
        </div>
        <div class="side-panel">
          <div class="score-panel">
            <div class="score-value" id="score">0</div>
            <div style="font-size: 0.75rem; color: var(--text2); text-transform: uppercase;">Score</div>
          </div>
        </div>
      </div>
    </div>

    <div id="play" class="tab-content">
      <div class="main-layout">
        <div class="workspace">
          <div class="card">
            <p style="color: var(--text2); margin-bottom: 1rem;">Simplify radicals in 60 seconds!</p>
            <div class="difficulty-selector">
              <button class="diff-btn active" onclick="setGameDifficulty('easy')">Easy</button>
              <button class="diff-btn" onclick="setGameDifficulty('medium')">Medium</button>
              <button class="diff-btn" onclick="setGameDifficulty('hard')">Hard</button>
            </div>
          </div>
          <div class="practice-container">
            <div style="display: flex; gap: 1rem; align-items: center;">
              <button class="btn" onclick="startGame()" id="startGameBtn">Start Game</button>
              <div style="text-align: center; flex: 1;">
                <div style="font-size: 2rem; font-weight: 700; color: var(--cyan);" id="gameTimer">60</div>
              </div>
            </div>
            <div class="problem-display" id="gameDisplay" style="display: none;">
              <div id="gameEquation"></div>
            </div>
            <div class="options-grid" id="gameOptions" style="display: none;"></div>
          </div>
        </div>
        <div class="side-panel">
          <div class="score-panel">
            <div class="score-value" id="gameScore">0</div>
            <div>Game Score</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let practiceDifficulty = null;
    let practiceScore = 0;
    let currentProblem = null;
    let gameActive = false;
    let gameTime = 60;
    let gameScore = 0;

    function updateGraphs() {
      const a = parseFloat(document.getElementById('sliderA').value);
      const h = parseFloat(document.getElementById('sliderH').value);
      const k = parseFloat(document.getElementById('sliderK').value);

      document.getElementById('valA').textContent = a.toFixed(2);
      document.getElementById('valH').textContent = h.toFixed(1);
      document.getElementById('valK').textContent = k.toFixed(1);
      document.getElementById('funcForm').textContent = `y = ${a.toFixed(2)}√(x-${h.toFixed(1)}) + ${k.toFixed(1)}`;
      document.getElementById('domainInfo').textContent = `x ≥ ${h.toFixed(1)}`;

      const scale = 50;
      let d = '';
      for (let x = h; x <= h + 10; x += 0.1) {
        const y = a * Math.sqrt(x - h) + k;
        if (Math.abs(y) < 6) {
          d += (d ? 'L' : 'M') + ((x - h) * scale) + ' ' + (-y * scale);
        }
      }
      document.getElementById('sqrtPath').setAttribute('d', d);
      document.getElementById('startPoint').setAttribute('cx', h * scale).setAttribute('cy', -k * scale);
    }

    function setPracticeDifficulty(level) {
      practiceDifficulty = level;
      document.querySelectorAll('#practice .diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      generatePracticeProblem();
    }

    function generatePracticeProblem() {
      const problems = ['√12', '√50', '√75', '√8', '∛16'];
      const answers = ['2√3', '5√2', '5√3', '2√2', '2∛2'];
      const idx = Math.floor(Math.random() * problems.length);
      
      document.getElementById('problemDisplay').innerHTML = `<div class="equation">Simplify: ${problems[idx]}</div>`;
      currentProblem = { answer: answers[idx] };
      
      const options = [answers[idx], answers[(idx+1)%5], answers[(idx+2)%5], answers[(idx+3)%5]];
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt === currentProblem.answer, btn);
        grid.appendChild(btn);
      });
      grid.style.display = 'grid';
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function checkAnswer(correct, btn) {
      document.querySelectorAll('#optionsGrid .option-btn').forEach(b => b.disabled = true);
      btn.classList.add(correct ? 'correct' : 'incorrect');
      if (correct) {
        practiceScore++;
        document.getElementById('score').textContent = practiceScore;
        document.getElementById('feedback').textContent = '✓ Correct!';
        document.getElementById('feedback').classList.add('correct', 'show');
      } else {
        document.getElementById('feedback').textContent = `✗ Answer: ${currentProblem.answer}`;
        document.getElementById('feedback').classList.add('incorrect', 'show');
      }
    }

    function nextProblem() {
      document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
      generatePracticeProblem();
    }

    function setGameDifficulty(level) {
      document.querySelectorAll('#play .diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    function startGame() {
      gameActive = true;
      gameTime = 60;
      gameScore = 0;
      document.getElementById('gameScore').textContent = '0';
      document.getElementById('gameTimer').textContent = '60';
      document.getElementById('gameDisplay').style.display = 'block';
      document.getElementById('gameOptions').style.display = 'grid';
      document.getElementById('startGameBtn').disabled = true;
      generateGameProblem();
      setInterval(() => {
        gameTime--;
        document.getElementById('gameTimer').textContent = gameTime;
        if (gameTime <= 0) {
          gameActive = false;
          document.getElementById('startGameBtn').disabled = false;
        }
      }, 1000);
    }

    function generateGameProblem() {
      if (!gameActive) return;
      const problems = [
        { expr: '√12', ans: '2√3' },
        { expr: '√50', ans: '5√2' },
        { expr: '√75', ans: '5√3' }
      ];
      const p = problems[Math.floor(Math.random() * problems.length)];
      document.getElementById('gameEquation').textContent = `Simplify: ${p.expr}`;
      const options = [p.ans, '3√2', '2√5', '√3'];
      const grid = document.getElementById('gameOptions');
      grid.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => {
          if (opt === p.ans) {
            gameScore++;
            document.getElementById('gameScore').textContent = gameScore;
            generateGameProblem();
          }
        };
        grid.appendChild(btn);
      });
    }

    function switchTab(e, tab) {
      e.preventDefault();
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      e.target.classList.add('active');
    }

    updateGraphs();
  </script>

  <script src="../../vinculum-input.js"></script>
  <script src="../../vinculum-core.js"></script>
  <script src="../../vinculum-data.js"></script>
  <script src="../../vinculum-adaptive-hook.js"></script>
  <script src="../../vinculum-3reads.js"></script>
  <script src="../../vinculum-stories.js"></script>
  <script src="../../vinculum-feedback.js"></script>
  <script src="../../vinculum-guide.js"></script>
  <script src="../../vinculum-identity.js"></script>
  <script src="../../vinculum-indigenous.js"></script>
  <script src="../../vinculum-dashboard.js"></script>
</body>
</html>
