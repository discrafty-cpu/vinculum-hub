<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regression & Modeling — VINCULUM ALG2</title>
  <link rel="stylesheet" href="../../vinculum-core.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .vinculum-header { display: flex; align-items: center; gap: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
    .back-btn { background: none; border: none; color: var(--cyan); cursor: pointer; font-size: 0.9rem; }
    .back-btn:hover { color: var(--green); }
    .header-title { margin: 0; font-size: 1.75rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .badge { font-size: 0.7rem; padding: 0.35rem 0.7rem; border-radius: 0.35rem; background: rgba(0,217,255,0.15); color: var(--cyan); border: 1px solid; text-transform: uppercase; }
    .tag { background: rgba(0,255,136,0.15); color: var(--green); border-color: var(--green); }
    .tabs { display: flex; gap: 0.5rem; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
    .tab-btn { padding: 0.75rem 1.5rem; background: none; border: none; color: var(--text2); cursor: pointer; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .main-layout { display: flex; gap: 1.5rem; }
    .workspace { flex: 1; }
    .side-panel { width: 280px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--cyan); margin-bottom: 1rem; }
    svg { width: 100%; height: auto; }
    .graph-container { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; }
    .model-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .model-btn { flex: 1; min-width: 80px; padding: 0.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; }
    .model-btn.active { background: var(--cyan); color: var(--bg); }
    .info-box { background: var(--bg2); border-left: 3px solid var(--cyan); border-radius: 0.5rem; padding: 0.75rem; font-size: 0.85rem; margin-bottom: 0.75rem; }
    .info-value { color: var(--cyan); font-weight: 600; font-family: monospace; }
    .difficulty-selector { display: flex; gap: 0.5rem; }
    .diff-btn { flex: 1; padding: 0.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; }
    .diff-btn.active { background: var(--cyan); color: var(--bg); }
    .practice-container { display: flex; flex-direction: column; gap: 1rem; }
    .problem-display { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; text-align: center; font-family: monospace; }
    .problem-display .equation { color: var(--cyan); font-weight: 600; margin-bottom: 1rem; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .option-btn { padding: 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; font-family: monospace; }
    .option-btn.correct { background: var(--green); color: var(--bg); }
    .option-btn.incorrect { background: var(--pink); color: var(--bg); }
    .feedback { padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; display: none; border-left: 4px solid; }
    .feedback.show { display: block; }
    .feedback.correct { background: rgba(0,255,136,0.15); color: var(--green); border-left-color: var(--green); }
    .feedback.incorrect { background: rgba(255,0,110,0.15); color: var(--pink); border-left-color: var(--pink); }
    .score-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; text-align: center; }
    .score-value { font-size: 2rem; font-weight: 700; color: var(--green); font-family: monospace; }
    .btn { padding: 0.75rem 1.5rem; background: var(--cyan); color: var(--bg); border: none; border-radius: 0.5rem; cursor: pointer; }
    .btn:hover { background: var(--green); }
    .btn.secondary { background: var(--bg2); color: var(--text); border: 1px solid; }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="container">
    <div class="vinculum-header">
      <a href="../../VINCULUM-Hub.html" class="back-btn">← Back</a>
      <div>
        <h1 class="header-title"><span style="color: var(--cyan);">REGRESSION &</span> MODELING</h1>
        <div class="header-badges">
          <span class="badge">S-ID.6a</span>
          <span class="badge">S-ID.6b</span>
          <span class="badge">S-ID.6c</span>
          <span class="tag">ALG2</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(event, 'explore')">Explore</button>
      <button class="tab-btn" onclick="switchTab(event, 'practice')">Practice</button>
      <button class="tab-btn" onclick="switchTab(event, 'play')">Play</button>
    </div>

    <div id="explore" class="tab-content active">
      <div class="main-layout">
        <div class="workspace">
          <div class="card">
            <div class="card-title">Model Types</div>
            <div class="model-selector">
              <button class="model-btn active" onclick="setModel('linear')">Linear</button>
              <button class="model-btn" onclick="setModel('quadratic')">Quadratic</button>
              <button class="model-btn" onclick="setModel('exponential')">Exponential</button>
            </div>
          </div>
          <div class="card graph-container">
            <svg id="graphSVG" viewBox="-350 -300 700 600" style="height: 400px;">
              <g stroke="var(--border)" stroke-width="0.5" opacity="0.3">
                <line x1="-300" y1="0" x2="300" y2="0" stroke="var(--cyan)" stroke-width="1"/>
                <line x1="0" y1="-300" x2="0" y2="300" stroke="var(--cyan)" stroke-width="1"/>
              </g>
              <circle id="point1" cx="-100" cy="-50" r="4" fill="var(--pink)"/>
              <circle id="point2" cx="0" cy="0" r="4" fill="var(--pink)"/>
              <circle id="point3" cx="100" cy="50" r="4" fill="var(--pink)"/>
              <path id="fitLine" stroke="var(--cyan)" stroke-width="2" fill="none"/>
            </svg>
          </div>
        </div>
        <div class="side-panel">
          <div class="card">
            <div class="card-title">Model Statistics</div>
            <div class="info-box">
              <div class="info-label">Equation</div>
              <div class="info-value" id="modelEquation">y = x</div>
            </div>
            <div class="info-box">
              <div class="info-label">R² Value</div>
              <div class="info-value" id="rSquared">0.95</div>
            </div>
            <div class="info-box">
              <div class="info-label">Correlation</div>
              <div class="info-value" id="correlation">Strong</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="practice" class="tab-content">
      <div class="main-layout">
        <div class="workspace">
          <div class="card">
            <div class="difficulty-selector">
              <button class="diff-btn active" onclick="setPracticeDifficulty('easy')">Easy</button>
              <button class="diff-btn" onclick="setPracticeDifficulty('medium')">Medium</button>
              <button class="diff-btn" onclick="setPracticeDifficulty('hard')">Hard</button>
            </div>
          </div>
          <div class="practice-container">
            <div class="problem-display" id="problemDisplay">Select difficulty</div>
            <div class="options-grid" id="optionsGrid" style="display: none;"></div>
            <div class="feedback" id="feedback"></div>
            <button class="btn" onclick="nextProblem()" id="nextBtn" style="display: none;">Next</button>
          </div>
        </div>
        <div class="side-panel">
          <div class="score-panel">
            <div class="score-value" id="score">0</div>
            <div style="font-size: 0.75rem;">Score</div>
          </div>
        </div>
      </div>
    </div>

    <div id="play" class="tab-content">
      <div class="main-layout">
        <div class="workspace">
          <div class="card">
            <p style="color: var(--text2); margin-bottom: 1rem;">Choose best model fit in 60 seconds!</p>
            <div class="difficulty-selector">
              <button class="diff-btn active" onclick="setGameDifficulty('easy')">Easy</button>
              <button class="diff-btn" onclick="setGameDifficulty('medium')">Medium</button>
              <button class="diff-btn" onclick="setGameDifficulty('hard')">Hard</button>
            </div>
          </div>
          <div class="practice-container">
            <div style="display: flex; gap: 1rem;">
              <button class="btn" onclick="startGame()">Start</button>
              <div style="font-size: 2rem; color: var(--cyan); font-weight: 700;" id="gameTimer">60</div>
            </div>
            <div class="problem-display" id="gameDisplay" style="display: none;">
              <div style="color: var(--text2); margin-bottom: 1rem;">Best model?</div>
              <div id="gameEquation"></div>
            </div>
            <div class="options-grid" id="gameOptions" style="display: none;"></div>
          </div>
        </div>
        <div class="side-panel">
          <div class="score-panel">
            <div class="score-value" id="gameScore">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setModel(type) {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      const models = {
        linear: { eq: 'y = 0.5x + 2', r2: '0.92' },
        quadratic: { eq: 'y = 0.1x² - 2', r2: '0.96' },
        exponential: { eq: 'y = 2(1.3)^x', r2: '0.94' }
      };
      
      document.getElementById('modelEquation').textContent = models[type].eq;
      document.getElementById('rSquared').textContent = models[type].r2;
      document.getElementById('correlation').textContent = parseFloat(models[type].r2) > 0.95 ? 'Very Strong' : 'Strong';
    }

    let practiceDifficulty = null;
    let practiceScore = 0;

    function setPracticeDifficulty(level) {
      practiceDifficulty = level;
      document.querySelectorAll('#practice .diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      generatePracticeProblem();
    }

    function generatePracticeProblem() {
      document.getElementById('problemDisplay').innerHTML = `<div class="equation">Which model fits best?</div><div style="color: var(--text2); font-size: 0.9rem;">R²: 0.94</div>`;
      const options = ['Linear', 'Quadratic', 'Exponential'];
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => {
          document.querySelectorAll('#optionsGrid .option-btn').forEach(b => b.disabled = true);
          const correct = opt === 'Exponential';
          btn.classList.add(correct ? 'correct' : 'incorrect');
          if (correct) {
            practiceScore++;
            document.getElementById('score').textContent = practiceScore;
          }
          document.getElementById('feedback').textContent = correct ? '✓' : '✗';
          document.getElementById('feedback').classList.add(correct ? 'correct' : 'incorrect', 'show');
        };
        grid.appendChild(btn);
      });
      grid.style.display = 'grid';
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function nextProblem() {
      document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
      generatePracticeProblem();
    }

    function setGameDifficulty(level) {
      document.querySelectorAll('#play .diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    function startGame() {
      document.getElementById('gameDisplay').style.display = 'block';
      document.getElementById('gameOptions').style.display = 'grid';
      let time = 60;
      document.getElementById('gameScore').textContent = '0';
      setInterval(() => {
        if (time > 0) {
          time--;
          document.getElementById('gameTimer').textContent = time;
        }
      }, 1000);
    }

    function switchTab(e, tab) {
      e.preventDefault();
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      e.target.classList.add('active');
    }
  </script>

  <script src="../../vinculum-input.js"></script>
  <script src="../../vinculum-core.js"></script>
  <script src="../../vinculum-data.js"></script>
  <script src="../../vinculum-adaptive-hook.js"></script>
  <script src="../../vinculum-3reads.js"></script>
  <script src="../../vinculum-stories.js"></script>
  <script src="../../vinculum-feedback.js"></script>
  <script src="../../vinculum-guide.js"></script>
  <script src="../../vinculum-identity.js"></script>
  <script src="../../vinculum-indigenous.js"></script>
  <script src="../../vinculum-dashboard.js"></script>
</body>
</html>
